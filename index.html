 timer = 0;\n            Vector2 head = { snake[0].x+dir.x, snake[0].y+dir.y };\n            <span class='cm'>// wall death</span>\n            <span class='pr'>if</span> (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID) dead=<span class='ok'>true</span>;\n            <span class='cm'>// self death</span>\n            <span class='pr'>for</span> (<span class='am'>auto</span>&amp; s : snake)\n                <span class='pr'>if</span> (s.x==head.x &amp;&amp; s.y==head.y) dead=<span class='ok'>true</span>;\n            <span class='pr'>if</span> (!dead) {\n                snake.insert(snake.begin(), head);  <span class='cm'>// grow front</span>\n                <span class='pr'>if</span> (head.x==food.x &amp;&amp; head.y==food.y) {\n                    food = { (<span class='am'>float</span>)GetRandomValue(0,GRID-1),\n                             (<span class='am'>float</span>)GetRandomValue(0,GRID-1) };\n                } <span class='pr'>else</span> snake.pop_back();        <span class='cm'>// else trim tail</span>\n            }\n        }\n\n        BeginDrawing();\n        ClearBackground((Color){15,20,15,255});\n        DrawRectangle(food.x*CELL, food.y*CELL, CELL, CELL, RED);\n        <span class='pr'>for</span> (<span class='am'>auto</span>&amp; s : snake)\n            DrawRectangle(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, LIME);\n        <span class='pr'>if</span> (dead) DrawText(<span class='ok'>\"DEAD - R\"</span>, W/2-70, H/2, 30, RAYWHITE);\n        <span class='pr'>if</span> (dead &amp;&amp; IsKeyPressed(KEY_R)) {\n            snake={{12,12}}; dir={1,0}; dead=<span class='ok'>false</span>;\n        }\n        EndDrawing();\n    }\n    CloseWindow();\n    <span class='pr'>return</span> 0;\n}</div></div><p>The eat-or-trim trick is elegant: every step we add a new head; if we ate food we keep the tail (snake grows by one), otherwise we drop the tail (snake appears to slither). <code>std::vector</code> gives us a resizable list — our first standard-library container in a game.</p><div class='box tip'><div class='bt'>Tip.</div> Reading direction with <code>IsKeyPressed</code> (not <code>IsKeyDown</code>) and gating it on the timer prevents the classic bug where mashing two keys in one step lets the snake reverse into itself.</div><div class='box lab'><div class='bt'>Lab.</div> Add a score equal to snake length minus one. Speed the game up slightly each time food is eaten (lower <code>step</code> to a floor of 0.05). Make sure new food never spawns on the snake's body.</div><div class='game'><div class='game-head'>🎮 Build This: Grid — Snake</div><div class='game-body'><p>This <strong>STARTS a new genre: grid-based logic</strong>. Completely different from your arcade games — discrete cells and a list-based body.</p><ol><li>Get the timer-stepped snake eating and growing.</li><li>Add the speed-up and safe food spawn from the Lab.</li><li>Show the score and a high score that persists during the session.</li><li>Bonus: wrap around the walls instead of dying (use modulo on head coords) as a selectable mode toggled with TAB on the death screen.</li></ol></div></div>"},{"id":"p4-6","part":"04 · C++ (from scratch)","nav":"Sprites → Asteroids","num":"4.6","kicker":"Part 04 · Lesson 6","title":"Sprites, Animation & Asteroids","html":"<h3>From shapes to textures</h3><p>Colored rectangles get you far, but real games use <strong>textures</strong> — images loaded into the GPU. raylib makes this trivial. Load once before the loop, draw every frame, unload at the end.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>texture.cpp</span></div><div class='term-body'>Texture2D ship = LoadTexture(<span class='ok'>\"ship.png\"</span>);  <span class='cm'>// once, after InitWindow</span>\n...\nDrawTexture(ship, x, y, WHITE);             <span class='cm'>// simple</span>\n<span class='cm'>// with rotation/scale, draw from a source rect to a dest rect:</span>\nDrawTexturePro(ship,\n    (Rectangle){0,0,(<span class='am'>float</span>)ship.width,(<span class='am'>float</span>)ship.height}, <span class='cm'>// source</span>\n    (Rectangle){x, y, ship.width*2.0f, ship.height*2.0f},  <span class='cm'>// dest</span>\n    (Vector2){ship.width, ship.height},   <span class='cm'>// origin (rotate around center)</span>\n    angle, WHITE);\n...\nUnloadTexture(ship);   <span class='cm'>// before CloseWindow</span></div></div><div class='box danger'><div class='bt'>Watch out.</div> <code>LoadTexture</code> uses a path relative to the working directory, which during development is often your build folder. Copy assets next to the binary, or use raylib's <code>ChangeDirectory(GetApplicationDirectory())</code> at startup so paths are predictable. We'll bundle assets properly in Lesson 8.</div><h3>Sprite-sheet animation</h3><p>An animation is several frames packed in one image. You draw a moving <em>source rectangle</em> that slides across the sheet, advancing on a timer (the same accumulator pattern from Snake):</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>anim.cpp</span></div><div class='term-body'><span class='am'>int</span> frame = 0, frames = 6;\n<span class='am'>float</span> at = 0, frameTime = 0.1f;\n<span class='am'>int</span> fw = sheet.width / frames;    <span class='cm'>// width of one frame</span>\n...\nat += GetFrameTime();\n<span class='pr'>if</span> (at >= frameTime) { at = 0; frame = (frame+1) % frames; }\nRectangle src = { (<span class='am'>float</span>)frame*fw, 0, (<span class='am'>float</span>)fw, (<span class='am'>float</span>)sheet.height };\nDrawTextureRec(sheet, src, (Vector2){x,y}, WHITE);</div></div><h3>Asteroids: vectors, rotation & wrapping</h3><p>Asteroids is the ultimate vector playground: a ship that rotates, thrusts in the direction it faces, drifts with momentum, and wraps around screen edges — plus bullets and breakable rocks. We'll draw the ship as a triangle for clarity (swap in a texture once it works).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>asteroids.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n<span class='pr'>#include</span> <span class='ok'>\"raymath.h\"</span>\n<span class='pr'>#include</span> <span class='ok'>&lt;vector&gt;</span>\n<span class='pr'>#include</span> <span class='ok'>&lt;algorithm&gt;</span>\n<span class='pr'>#include</span> <span class='ok'>&lt;cmath&gt;</span>\n\n<span class='am'>const int</span> W=800, H=600;\n<span class='am'>struct</span> Body { Vector2 pos, vel; <span class='am'>float</span> r; };\n\nVector2 wrap(Vector2 p) {            <span class='cm'>// toroidal screen</span>\n    <span class='pr'>if</span> (p.x<0) p.x+=W; <span class='pr'>if</span> (p.x>W) p.x-=W;\n    <span class='pr'>if</span> (p.y<0) p.y+=H; <span class='pr'>if</span> (p.y>H) p.y-=H;\n    <span class='pr'>return</span> p;\n}\n\n<span class='am'>int</span> main() {\n    InitWindow(W,H,<span class='ok'>\"Asteroids\"</span>); SetTargetFPS(60);\n    Vector2 pos={W/2.0f,H/2.0f}, vel={0,0};\n    <span class='am'>float</span> ang=0;\n    std::vector&lt;Body&gt; rocks, bullets;\n    <span class='pr'>for</span> (<span class='am'>int</span> i=0;i<5;i++)\n        rocks.push_back({ {(<span class='am'>float</span>)GetRandomValue(0,W),(<span class='am'>float</span>)GetRandomValue(0,H)},\n                          {(<span class='am'>float</span>)GetRandomValue(-60,60),(<span class='am'>float</span>)GetRandomValue(-60,60)}, 40 });\n\n    <span class='pr'>while</span> (!WindowShouldClose()) {\n        <span class='am'>float</span> dt=GetFrameTime();\n        <span class='cm'>// rotate &amp; thrust</span>\n        <span class='pr'>if</span> (IsKeyDown(KEY_LEFT))  ang -= 200*dt;\n        <span class='pr'>if</span> (IsKeyDown(KEY_RIGHT)) ang += 200*dt;\n        <span class='am'>float</span> rad = ang*DEG2RAD;\n        Vector2 face = { sinf(rad), -cosf(rad) }; <span class='cm'>// up = -y</span>\n        <span class='pr'>if</span> (IsKeyDown(KEY_UP))\n            vel = Vector2Add(vel, Vector2Scale(face, 200*dt));\n        pos = wrap(Vector2Add(pos, Vector2Scale(vel, dt)));\n        vel = Vector2Scale(vel, 0.99f);  <span class='cm'>// slight drag</span>\n\n        <span class='cm'>// fire</span>\n        <span class='pr'>if</span> (IsKeyPressed(KEY_SPACE))\n            bullets.push_back({ pos, Vector2Scale(face, 400), 3 });\n\n        <span class='cm'>// move bodies</span>\n        <span class='pr'>for</span> (<span class='am'>auto</span>&amp; b : bullets) b.pos = wrap(Vector2Add(b.pos, Vector2Scale(b.vel, dt)));\n        <span class='pr'>for</span> (<span class='am'>auto</span>&amp; a : rocks)   a.pos = wrap(Vector2Add(a.pos, Vector2Scale(a.vel, dt)));\n\n        <span class='cm'>// bullet vs rock</span>\n        <span class='pr'>for</span> (<span class='am'>auto</span>&amp; a : rocks) <span class='pr'>for</span> (<span class='am'>auto</span>&amp; b : bullets)\n            <span class='pr'>if</span> (a.r>0 &amp;&amp; CheckCollisionCircles(a.pos,a.r,b.pos,b.r)) {\n                a.r=-1; b.r=-1;  <span class='cm'>// mark dead</span>\n            }\n        <span class='cm'>// remove dead (erase-remove idiom)</span>\n        <span class='pr'>auto</span> dead=[](Body&amp; x){<span class='pr'>return</span> x.r<0;};\n        rocks.erase(std::remove_if(rocks.begin(),rocks.end(),dead),rocks.end());\n        bullets.erase(std::remove_if(bullets.begin(),bullets.end(),dead),bullets.end());\n\n        BeginDrawing(); ClearBackground(BLACK);\n        <span class='pr'>for</span> (<span class='am'>auto</span>&amp; a : rocks) DrawCircleLines(a.pos.x,a.pos.y,a.r,GRAY);\n        <span class='pr'>for</span> (<span class='am'>auto</span>&amp; b : bullets) DrawCircleV(b.pos,b.r,YELLOW);\n        <span class='cm'>// ship triangle around pos, rotated by ang</span>\n        DrawPoly(pos, 3, 18, ang+90, RAYWHITE);\n        EndDrawing();\n    }\n    CloseWindow(); <span class='pr'>return</span> 0;\n}</div></div><p>Two big ideas debut here. <strong>Structs</strong> (<code>Body</code>) bundle related data so a vector of them models many objects cleanly. The <strong>erase-remove idiom</strong> deletes dead objects from a vector in one pass — your standard tool for despawning bullets and enemies (note the <code>#include &lt;algorithm&gt;</code>).</p><div class='box lab'><div class='bt'>Lab.</div> When a bullet kills a rock with <code>r &gt; 20</code>, spawn two smaller rocks (half radius, random velocities) instead of just deleting it — classic Asteroids splitting. Add a score and ship-vs-rock death.</div><div class='game'><div class='game-head'>🎮 Build This: Space shooter — Asteroids</div><div class='game-body'><p>This <strong>STARTS a new genre: vector-based space shooter</strong>, using rotation, thrust, momentum, and toroidal wrapping.</p><ol><li>Get the rotating, thrusting, wrapping ship firing bullets that destroy rocks.</li><li>Add rock splitting and a score from the Lab.</li><li>Load a ship sprite and replace the triangle with <code>DrawTexturePro</code> rotated by <code>ang</code>.</li><li>Add lives and a respawn with brief invulnerability.</li><li>Bonus: animate an explosion sprite-sheet at each rock's death using the animation pattern above.</li></ol></div></div>"},{"id":"p4-7","part":"04 · C++ (from scratch)","nav":"Sound, gravity → Platformer & Survival","num":"4.7","kicker":"Part 04 · Lesson 7","title":"Sound, a Platformer & a Wave-Survival Shooter","html":"<h3>Audio in three lines</h3><p>Sound transforms feel. raylib's audio is as simple as its graphics. Initialize the device, load sounds once, play them on events.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio.cpp</span></div><div class='term-body'>InitAudioDevice();                       <span class='cm'>// after InitWindow</span>\nSound jump = LoadSound(<span class='ok'>\"jump.wav\"</span>);\nMusic bgm  = LoadMusicStream(<span class='ok'>\"theme.ogg\"</span>);\nPlayMusicStream(bgm);\n...\n<span class='cm'>// in the loop:</span>\nUpdateMusicStream(bgm);                  <span class='cm'>// keep streaming music fed</span>\n<span class='pr'>if</span> (IsKeyPressed(KEY_SPACE)) PlaySound(jump);\n...\nUnloadSound(jump); UnloadMusicStream(bgm); CloseAudioDevice();</div></div><p>Use <code>Sound</code> for short effects (fully loaded into memory) and <code>Music</code> for long tracks (streamed). Music needs <code>UpdateMusicStream</code> called every frame.</p><h3>Gravity & jumping: the platformer core</h3><p>A platformer is gravity plus collision plus the all-important <strong>grounded</strong> check. Gravity is just constant downward acceleration on the player's vertical velocity; jumping sets that velocity to a negative burst — but only when standing on something.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>platformer.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n<span class='pr'>#include</span> <span class='ok'>&lt;vector&gt;</span>\n<span class='am'>const int</span> W=900,H=540;\n\n<span class='am'>int</span> main(){\n    InitWindow(W,H,<span class='ok'>\"Platformer\"</span>); SetTargetFPS(60);\n    Rectangle player={100,100,32,48};\n    Vector2 vel={0,0};\n    <span class='am'>const float</span> GRAV=1400, MOVE=260, JUMP=560;\n    <span class='am'>bool</span> grounded=<span class='ok'>false</span>;\n    std::vector&lt;Rectangle&gt; tiles = {\n        {0,H-40,W,40}, {220,H-150,160,24}, {460,H-260,160,24}, {700,H-360,160,24}\n    };\n\n    <span class='pr'>while</span>(!WindowShouldClose()){\n        <span class='am'>float</span> dt=GetFrameTime();\n        <span class='cm'>// horizontal input</span>\n        vel.x=0;\n        <span class='pr'>if</span>(IsKeyDown(KEY_LEFT))  vel.x=-MOVE;\n        <span class='pr'>if</span>(IsKeyDown(KEY_RIGHT)) vel.x= MOVE;\n        <span class='pr'>if</span>(IsKeyPressed(KEY_SPACE) &amp;&amp; grounded) vel.y=-JUMP;\n        vel.y += GRAV*dt;                <span class='cm'>// gravity</span>\n\n        <span class='cm'>// move X, resolve</span>\n        player.x += vel.x*dt;\n        <span class='pr'>for</span>(<span class='am'>auto</span>&amp; t:tiles) <span class='pr'>if</span>(CheckCollisionRecs(player,t)){\n            <span class='pr'>if</span>(vel.x>0) player.x=t.x-player.width;\n            <span class='pr'>else if</span>(vel.x<0) player.x=t.x+t.width;\n        }\n        <span class='cm'>// move Y, resolve, set grounded</span>\n        player.y += vel.y*dt; grounded=<span class='ok'>false</span>;\n        <span class='pr'>for</span>(<span class='am'>auto</span>&amp; t:tiles) <span class='pr'>if</span>(CheckCollisionRecs(player,t)){\n            <span class='pr'>if</span>(vel.y>0){ player.y=t.y-player.height; grounded=<span class='ok'>true</span>; }\n            <span class='pr'>else if</span>(vel.y<0) player.y=t.y+t.height;\n            vel.y=0;\n        }\n\n        BeginDrawing(); ClearBackground((Color){30,30,46,255});\n        <span class='pr'>for</span>(<span class='am'>auto</span>&amp; t:tiles) DrawRectangleRec(t,(Color){90,80,120,255});\n        DrawRectangleRec(player,SKYBLUE);\n        EndDrawing();\n    }\n    CloseWindow(); <span class='pr'>return</span> 0;\n}</div></div><p>The key technique is <strong>resolving each axis separately</strong>: move on X and push out of overlaps, then move on Y and push out — setting <code>grounded</code> true only when we land from above. Axis-separated resolution avoids the corner-snag bugs of resolving both at once and is the standard approach for tile platformers.</p><div class='box tip'><div class='bt'>Tip.</div> Add <strong>coyote time</strong> for great feel: allow a jump for ~0.1s after leaving a ledge by tracking time-since-grounded and checking it instead of <code>grounded</code> directly. Tiny detail, huge difference.</div><h3>Wave-survival: spawning over time</h3><p>The survival genre is about a stream of enemies that grows harder. The mechanic is a <strong>spawn timer</strong> that fires faster as time passes, pushing enemies into a vector that home toward the player — your normalize-then-scale movement from Lesson 5.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>survival.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raymath.h\"</span>\n<span class='cm'>// player at mouse; enemies chase; spawn speeds up</span>\nstd::vector&lt;Vector2&gt; enemies;\n<span class='am'>float</span> spawnT=0, spawnEvery=1.5f, survived=0;\n...\n<span class='am'>float</span> dt=GetFrameTime(); survived+=dt;\nspawnT+=dt; spawnEvery=fmaxf(0.3f, 1.5f - survived*0.02f);\n<span class='pr'>if</span>(spawnT>=spawnEvery){ spawnT=0;\n    enemies.push_back({(<span class='am'>float</span>)GetRandomValue(0,W),(<span class='am'>float</span>)GetRandomValue(0,H)});\n}\nVector2 player=GetMousePosition();\n<span class='pr'>for</span>(<span class='am'>auto</span>&amp; e:enemies){\n    Vector2 d=Vector2Normalize(Vector2Subtract(player,e));\n    e=Vector2Add(e, Vector2Scale(d, 90*dt));   <span class='cm'>// chase</span>\n    <span class='pr'>if</span>(Vector2Distance(e,player)<16) { <span class='cm'>/* you died */</span> }\n}</div></div><div class='box lab'><div class='bt'>Lab.</div> Wire sound into both games: a jump SFX and a landing thud in the platformer; a spawn blip and a hit sound in survival. Add a survived-time score to the survival game shown on a death screen.</div><div class='game'><div class='game-head'>🎮 Build This: Two new genres — Platformer + Survival</div><div class='game-body'><p>This <strong>STARTS two new genres</strong>: a 2D platformer (gravity, tiles, jumping) and a wave-survival shooter (timed spawning, chasing AI). Build both as separate small games.</p><ol><li><strong>Platformer:</strong> finish the tile platformer; add coyote time, a collectible coin (AABB vs player) with a pickup sound, and a goal flag that wins the level.</li><li><strong>Survival:</strong> player aims with mouse and shoots bullets (reuse Asteroids' bullet vector) to destroy chasing enemies; spawn rate rises over time; score is seconds survived.</li><li>Add sound to both per the Lab.</li><li>Pick the one you enjoy more — it is your CAPSTONE candidate next lesson.</li></ol></div></div>"},{"id":"p4-8","part":"04 · C++ (from scratch)","nav":"Structure, build & capstone","num":"4.8","kicker":"Part 04 · Lesson 8","title":"Structuring a Game, Building a Binary & the Capstone","html":"<h3>Structuring a real game: entities & states</h3><p>Your games have grown past loose variables. Two patterns scale them: <strong>entity structs</strong> and a <strong>game-state machine</strong>. Bundle each object's data in a struct and keep them in vectors; drive the whole game with an explicit state enum.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>structure.cpp</span></div><div class='term-body'><span class='am'>struct</span> Entity {\n    Vector2 pos, vel;\n    <span class='am'>float</span> radius;\n    <span class='am'>bool</span> alive = <span class='ok'>true</span>;\n};\n\n<span class='am'>enum</span> GameState { MENU, PLAYING, GAME_OVER };\nGameState state = MENU;\n\n<span class='cm'>// the loop switches behavior on state</span>\n<span class='pr'>switch</span> (state) {\n    <span class='pr'>case</span> MENU:\n        <span class='pr'>if</span> (IsKeyPressed(KEY_ENTER)) state = PLAYING;\n        <span class='pr'>break</span>;\n    <span class='pr'>case</span> PLAYING:\n        <span class='cm'>// update entities; if player dies -> state = GAME_OVER;</span>\n        <span class='pr'>break</span>;\n    <span class='pr'>case</span> GAME_OVER:\n        <span class='pr'>if</span> (IsKeyPressed(KEY_ENTER)) { resetGame(); state = PLAYING; }\n        <span class='pr'>break</span>;\n}</div></div><p>This single <code>state</code> variable cleanly separates your menu screen, gameplay, and game-over screen — each with its own input handling and drawing. Almost every finished game is built on exactly this skeleton.</p><h4>Splitting into files</h4><p>One <code>main.cpp</code> works, but for the capstone, split declarations into headers (<code>entity.h</code>) and definitions into <code>.cpp</code> files, then list them in CMake:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>CMakeLists.txt</span></div><div class='term-body'>add_executable(mygame\n    src/main.cpp\n    src/entity.cpp\n    src/world.cpp)\ntarget_link_libraries(mygame raylib)</div></div><h3>Saving a high score</h3><p>Persist a number between runs with plain C file I/O — no database needed:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>highscore.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>&lt;cstdio&gt;</span>\n<span class='am'>int</span> loadHi(){ <span class='am'>int</span> v=0; FILE* f=fopen(<span class='ok'>\"hi.dat\"</span>,<span class='ok'>\"r\"</span>);\n    <span class='pr'>if</span>(f){ fscanf(f,<span class='ok'>\"%d\"</span>,&amp;v); fclose(f);} <span class='pr'>return</span> v; }\n<span class='am'>void</span> saveHi(<span class='am'>int</span> v){ FILE* f=fopen(<span class='ok'>\"hi.dat\"</span>,<span class='ok'>\"w\"</span>);\n    <span class='pr'>if</span>(f){ fprintf(f,<span class='ok'>\"%d\"</span>,v); fclose(f);} }</div></div><h3>Building a distributable binary</h3><p>Time to ship. Always do a <strong>Release</strong> build — it is far faster and smaller than the default Debug build:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'>cmake -B build -DCMAKE_BUILD_TYPE=Release\ncmake --build build --config Release</div></div><p>raylib links <strong>statically</strong> by default with the FetchContent setup, so your single executable has no external raylib dependency — great for sharing.</p><h4>Bundling assets reliably</h4><p>Tell CMake to copy your <code>assets/</code> folder next to the binary so paths just work on any machine:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>CMakeLists.txt</span></div><div class='term-body'>add_custom_command(TARGET mygame POST_BUILD\n    COMMAND ${CMAKE_COMMAND} -E copy_directory\n        ${CMAKE_SOURCE_DIR}/assets\n        $&lt;TARGET_FILE_DIR:mygame&gt;/assets)</div></div><p>Then load with <code>LoadTexture(\"assets/ship.png\")</code> after calling <code>ChangeDirectory(GetApplicationDirectory())</code> at startup.</p><table><thead><tr><th>Platform</th><th>What you ship</th></tr></thead><tbody><tr><td>Windows</td><td><code>mygame.exe</code> + <code>assets/</code> folder, zipped</td></tr><tr><td>macOS</td><td>the binary + <code>assets/</code>; optionally bundle into a <code>.app</code></td></tr><tr><td>Linux</td><td>the binary + <code>assets/</code>; or build per-distro / AppImage</td></tr><tr><td>Web</td><td>compile to WASM with Emscripten — raylib supports it</td></tr></tbody></table><div class='box law'><div class='bt'>Ship law.</div> A game on your hard drive is a hobby; a zipped, double-clickable build someone else can run is a portfolio piece. Always test your zip on a clean folder before sharing.</div><div class='box tip'><div class='bt'>Tip.</div> For the web, install Emscripten and configure raylib's <code>PLATFORM_WEB</code> target — you get a playable browser link, perfect for showing recruiters. It mirrors the single-file static-hosting style you may already know.</div><div class='game'><div class='game-head'>🎮 Build This: CAPSTONE — Polish One Game to Portfolio Quality</div><div class='game-body'><p>This is the <strong>CAPSTONE</strong>. Take your favorite game from the arc — Asteroids, the platformer, or the survival shooter — and finish it into something you would proudly show.</p><ol><li>Refactor objects into <code>Entity</code> structs in vectors; split code across at least two files via CMake.</li><li>Add a <code>MENU → PLAYING → GAME_OVER</code> state machine with a real title screen and a restart flow.</li><li>Add a persistent high score saved to disk and shown on the menu.</li><li>Add sound effects and one music track; pause with P.</li><li>Polish: a particle burst or screen shake on hits, clean centered UI with <code>MeasureText</code>, and a difficulty ramp.</li><li>Do a <strong>Release</strong> build, bundle the <code>assets/</code> folder, zip it, and test the zip in a clean directory on another machine.</li><li>Write a short README with controls and a screenshot, and you have your first from-scratch C++ game ready for your portfolio. You did it — seven genres, one language, no engine.</li></ol></div></div>"},{"id":"p5-1","part":"05 · Python (from scratch)","nav":"Install & Window","num":"5.1","kicker":"Part 05 · Lesson 1","title":"Install Pygame, Open a Window & Run the Game Loop","html":"<h3>Welcome to your path: games from scratch in Python</h3><p>You finished Foundations and you chose this track on purpose. Good. This is the whole journey — no engine, no editor, just <strong>Python + Pygame</strong>, where you write every line that moves a pixel. Across these eight lessons you will build a real portfolio that spans genres: a bouncing-sprite <em>toy</em>, then <strong>Pong</strong> (arcade), <strong>Snake</strong> (grid), <strong>Space Invaders</strong> (shoot-em-up), a <strong>2D platformer</strong> (gravity), a <strong>top-down dungeon shooter</strong> (Sprite Groups), a <strong>match-3 puzzle</strong>, and finally a polished, packaged <strong>capstone</strong> you can hand to anyone. Everything stands on its own. Let's get a window on the screen.</p><h3>Install Python and Pygame</h3><p>Pygame is a thin, friendly wrapper over <strong>SDL2</strong>. It hands you a window, a drawable frame buffer, input events, and audio. First make sure you have Python 3.9+ (<code>python --version</code>). Then install Pygame with pip. We use the maintained <strong>pygame-ce</strong> (Community Edition) — same <code>import pygame</code>, more fixes.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>shell</span></div><div class='term-body'><span class='cm'># macOS / Linux</span>\npython3 -m pip install pygame-ce\n<span class='cm'># Windows</span>\npy -m pip install pygame-ce\n<span class='cm'># verify the install — opens a tiny demo</span>\npython3 -m pygame.examples.aliens</div></div><div class='box tip'><div class='bt'>Use a virtual environment.</div> Run <code>python3 -m venv .venv</code> then activate it (<code>source .venv/bin/activate</code>, or <code>.venv\\Scripts\\activate</code> on Windows). Installing into a venv keeps each game's dependencies clean and makes packaging in Lesson 8 painless.</div><h3>The three pillars: init, display, loop</h3><p>Every Pygame program does the same three things. It <strong>initializes</strong> the library, <strong>creates a display surface</strong> (the window you draw onto), and then spins a <strong>game loop</strong> that repeats forever: read input, update state, draw, repeat. Here is the smallest complete program that does all of it.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.py</span></div><div class='term-body'><span class='pr'>import</span> pygame\n\npygame.init()                              <span class='cm'># start all subsystems</span>\nscreen = pygame.display.set_mode((640, 480))<span class='cm'># the display surface</span>\npygame.display.set_caption(<span class='ok'>'Hello Pygame'</span>)\nclock = pygame.time.Clock()                <span class='cm'># controls frame rate</span>\n\nrunning = <span class='pr'>True</span>\n<span class='pr'>while</span> running:\n    <span class='cm'># 1) INPUT — drain the event queue</span>\n    <span class='pr'>for</span> event <span class='pr'>in</span> pygame.event.get():\n        <span class='pr'>if</span> event.type == pygame.QUIT:\n            running = <span class='pr'>False</span>\n\n    <span class='cm'># 2) UPDATE — game logic goes here (nothing yet)</span>\n\n    <span class='cm'># 3) DRAW — clear, then present</span>\n    screen.fill((<span class='am'>20</span>, <span class='am'>20</span>, <span class='am'>30</span>))     <span class='cm'># dark blue-grey background</span>\n    pygame.display.flip()                  <span class='cm'># swap buffers to screen</span>\n\n    clock.tick(<span class='am'>60</span>)                       <span class='cm'># cap at 60 FPS</span>\n\npygame.quit()</div></div><h3>What each line actually does</h3><ul><li><code>pygame.init()</code> boots every subsystem (display, font, mixer, etc.). Call it once, first.</li><li><code>set_mode((w,h))</code> returns the <strong>display surface</strong> — a special <code>Surface</code> that maps to your window. Whatever you blit onto it appears after <code>flip()</code>.</li><li>The <strong>event loop</strong> <code>pygame.event.get()</code> must run every frame. If you never drain the queue, the OS thinks your app froze and the window stops responding.</li><li><code>screen.fill(color)</code> wipes last frame so you draw on a clean slate. Skip it and you get smeared trails.</li><li><code>display.flip()</code> presents the finished frame. <code>clock.tick(60)</code> sleeps just enough to hold 60 frames per second.</li></ul><div class='box lab'><div class='bt'>Colors are RGB tuples.</div> Pygame uses <code>(red, green, blue)</code> with each channel 0–255. <code>(255,0,0)</code> is pure red, <code>(0,0,0)</code> black, <code>(255,255,255)</code> white. An optional 4th value is alpha (transparency).</div><h3>delta time, briefly</h3><p><code>clock.tick(60)</code> returns the milliseconds the last frame took. Capture it as <code>dt = clock.tick(60)</code> and you can later make motion frame-rate independent by multiplying speeds by <code>dt</code>. For now the fixed 60 FPS cap is enough — we'll lean on <code>dt</code> when things start moving.</p><div class='game'><div class='game-head'>🎮 Build This: Toy — Bouncing Square</div><div class='game-body'><p><strong>Genre: a toy (a tech demo, not yet a game).</strong> This <strong>starts the arc</strong> — it is brand new and everything later extends from these same three pillars.</p><ol><li>Open a 640×480 window titled <code>Bouncer</code> with the loop above.</li><li>Make variables <code>x, y = 100, 100</code> and <code>vx, vy = 4, 3</code>.</li><li>In UPDATE, add velocity to position: <code>x += vx</code>, <code>y += vy</code>.</li><li>If <code>x &lt; 0</code> or <code>x &gt; 600</code>, flip horizontal direction: <code>vx = -vx</code>. Do the same for <code>y</code> with the height.</li><li>In DRAW, after the fill, call <code>pygame.draw.rect(screen, (255,200,0), (x, y, 40, 40))</code>.</li><li>Run it and watch a gold square bounce around the box. You just built your first frame-by-frame animation.</li></ol></div></div>"},{"id":"p5-2","part":"05 · Python (from scratch)","nav":"Drawing & Images","num":"5.2","kicker":"Part 05 · Lesson 2","title":"Drawing Shapes, Loading Images & Surfaces","html":"<h3>Everything is a Surface</h3><p>In Pygame a <strong>Surface</strong> is just a rectangle of pixels you can draw onto. Your window is one Surface (the display surface). An image you load is another Surface. You build a frame by <em>blitting</em> (copying) smaller Surfaces onto the display surface, then calling <code>flip()</code>. Understand Surfaces and the rest of Pygame falls into place.</p><h3>Drawing primitives</h3><p>The <code>pygame.draw</code> module paints shapes directly onto any Surface. These are perfect for prototypes — Pong and Snake will be built almost entirely from rectangles.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>draw.py</span></div><div class='term-body'><span class='cm'># signatures: pygame.draw.shape(surface, color, geometry, width=0)</span>\npygame.draw.rect(screen, (<span class='am'>200</span>,<span class='am'>50</span>,<span class='am'>50</span>), (<span class='am'>30</span>, <span class='am'>30</span>, <span class='am'>120</span>, <span class='am'>80</span>))   <span class='cm'># filled rect</span>\npygame.draw.rect(screen, (<span class='am'>255</span>,<span class='am'>255</span>,<span class='am'>255</span>), (<span class='am'>30</span>, <span class='am'>30</span>, <span class='am'>120</span>, <span class='am'>80</span>), <span class='am'>3</span>) <span class='cm'># outline, 3px</span>\npygame.draw.circle(screen, (<span class='am'>80</span>,<span class='am'>200</span>,<span class='am'>120</span>), (<span class='am'>320</span>, <span class='am'>240</span>), <span class='am'>40</span>)  <span class='cm'># center, radius</span>\npygame.draw.line(screen, (<span class='am'>255</span>,<span class='am'>220</span>,<span class='am'>0</span>), (<span class='am'>0</span>,<span class='am'>0</span>), (<span class='am'>640</span>,<span class='am'>480</span>), <span class='am'>2</span>)\npygame.draw.polygon(screen, (<span class='am'>120</span>,<span class='am'>120</span>,<span class='am'>255</span>), [(<span class='am'>400</span>,<span class='am'>100</span>),(<span class='am'>460</span>,<span class='am'>160</span>),(<span class='am'>400</span>,<span class='am'>220</span>)])</div></div><p>A <code>width</code> of <strong>0</strong> (the default) fills the shape; any positive number draws only the outline at that thickness.</p><h3>Loading images</h3><p>Real games use art. <code>pygame.image.load(path)</code> returns a Surface from a PNG/JPG. Immediately call <code>.convert()</code> (or <code>.convert_alpha()</code> for transparency) — this re-encodes the image into the display's pixel format so every later blit is fast.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>images.py</span></div><div class='term-body'><span class='cm'># load once, before the loop — never inside it!</span>\nplayer_img = pygame.image.load(<span class='ok'>'assets/ship.png'</span>).convert_alpha()\nbg_img     = pygame.image.load(<span class='ok'>'assets/sky.png'</span>).convert()\n\n<span class='cm'># a Rect tracks the image's position and size</span>\nplayer_rect = player_img.get_rect(center=(<span class='am'>320</span>, <span class='am'>240</span>))\n\n<span class='cm'># ... inside the DRAW phase of the loop ...</span>\nscreen.blit(bg_img, (<span class='am'>0</span>, <span class='am'>0</span>))            <span class='cm'># draw background first</span>\nscreen.blit(player_img, player_rect)   <span class='cm'># then the ship on top</span></div></div><div class='box danger'><div class='bt'>Load outside the loop.</div> <code>image.load</code> hits the disk. Doing it every frame will tank your FPS and may crash. Load all art and sound <strong>once</strong> at startup, store the Surfaces in variables, and reuse them.</div><h3>Transforming Surfaces</h3><p>The <code>pygame.transform</code> module returns <em>new</em> Surfaces — scaled, rotated, or flipped. These are also relatively expensive, so cache results when you can rather than recomputing each frame.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>transform.py</span></div><div class='term-body'>big   = pygame.transform.scale(player_img, (<span class='am'>96</span>, <span class='am'>96</span>))\nspun  = pygame.transform.rotate(player_img, <span class='am'>45</span>)      <span class='cm'># degrees, CCW</span>\nmirror = pygame.transform.flip(player_img, <span class='pr'>True</span>, <span class='pr'>False</span>) <span class='cm'># flip x, not y</span></div></div><h3>Text with Fonts</h3><p>You'll need a score readout in almost every game. Create a <code>Font</code> once, then <code>render</code> the text to a Surface and blit it.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>text.py</span></div><div class='term-body'>font = pygame.font.SysFont(<span class='ok'>'consolas'</span>, <span class='am'>32</span>)        <span class='cm'># or Font(None, 32)</span>\nlabel = font.render(<span class='ok'>'Score: 0'</span>, <span class='pr'>True</span>, (<span class='am'>255</span>,<span class='am'>255</span>,<span class='am'>255</span>)) <span class='cm'># antialias=True</span>\nscreen.blit(label, (<span class='am'>16</span>, <span class='am'>16</span>))</div></div><div class='box tip'><div class='bt'>Draw order = paint order.</div> Pygame has no z-index. Whatever you blit <em>last</em> sits on top. Background first, gameplay objects next, UI/text last.</div><div class='game'><div class='game-head'>🎮 Build This: Toy — Bouncing Sprite (upgraded)</div><div class='game-body'><p><strong>Genre: still a toy.</strong> This <strong>extends Lesson 1's Bouncing Square</strong> — swap the bare rectangle for a real image and add a HUD, so you practice loading, blitting, and text.</p><ol><li>Find or make a small PNG (a ball or ship). Load it with <code>.convert_alpha()</code> before the loop.</li><li>Replace the <code>draw.rect</code> from Lesson 1 with <code>screen.blit(img, (x, y))</code>.</li><li>Use <code>img.get_rect()</code> to read the image's real width/height for the wall-bounce checks instead of hard-coded 40s.</li><li>Add a <code>SysFont</code> and render a live counter of how many times it has bounced; blit it top-left.</li><li>Draw a 3px white outline rectangle as a 'frame' around the play area so the bouncing reads clearly.</li></ol></div></div>"},{"id":"p5-3","part":"05 · Python (from scratch)","nav":"Events & Input","num":"5.3","kicker":"Part 05 · Lesson 3","title":"Events, Keyboard & Mouse Input","html":"<h3>Two ways to read input</h3><p>Pygame gives you input in two flavors, and good games use both. <strong>Events</strong> are discrete one-shot facts — 'the A key went down this frame', 'the window closed', 'a mouse button was clicked'. <strong>State polling</strong> asks 'is the A key held down right now?' every frame. Use events for <em>actions that fire once</em> (jump, shoot, pause) and polling for <em>continuous</em> things (walking, holding a paddle up).</p><h3>The event queue</h3><p>Each frame, <code>pygame.event.get()</code> hands you every event since last frame. You <em>must</em> loop over all of them. Match on <code>event.type</code>; key events carry <code>event.key</code>, mouse events carry <code>event.pos</code> and <code>event.button</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>events.py</span></div><div class='term-body'><span class='pr'>for</span> event <span class='pr'>in</span> pygame.event.get():\n    <span class='pr'>if</span> event.type == pygame.QUIT:\n        running = <span class='pr'>False</span>\n    <span class='pr'>elif</span> event.type == pygame.KEYDOWN:\n        <span class='pr'>if</span> event.key == pygame.K_SPACE:\n            shoot()                 <span class='cm'># fires exactly once per press</span>\n        <span class='pr'>elif</span> event.key == pygame.K_ESCAPE:\n            running = <span class='pr'>False</span>\n    <span class='pr'>elif</span> event.type == pygame.MOUSEBUTTONDOWN:\n        <span class='pr'>if</span> event.button == <span class='am'>1</span>:        <span class='cm'># 1=left, 2=middle, 3=right</span>\n            place_block(event.pos)  <span class='cm'># event.pos is (x, y)</span></div></div><h3>Polling held keys</h3><p>For movement you want to know what is held <em>right now</em>. <code>pygame.key.get_pressed()</code> returns a big boolean sequence indexed by key constant. Read it once per frame in your UPDATE phase.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>polling.py</span></div><div class='term-body'>keys = pygame.key.get_pressed()\n<span class='pr'>if</span> keys[pygame.K_LEFT]  <span class='pr'>or</span> keys[pygame.K_a]:\n    player_x -= speed\n<span class='pr'>if</span> keys[pygame.K_RIGHT] <span class='pr'>or</span> keys[pygame.K_d]:\n    player_x += speed\n<span class='cm'># diagonal works for free — both branches can run the same frame</span></div></div><div class='box tip'><div class='bt'>Events fire once, polling repeats.</div> Put <em>jump/shoot/menu-select</em> in <code>KEYDOWN</code> so one tap = one action. Put <em>run/steer</em> in <code>get_pressed()</code> so holding keeps it going. Mixing these up is the #1 beginner input bug.</div><h3>The mouse</h3><p><code>pygame.mouse.get_pos()</code> gives the current cursor <code>(x, y)</code>; <code>pygame.mouse.get_pressed()</code> returns <code>(left, middle, right)</code> booleans. Combine cursor position with a click event to build buttons and aim weapons.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>mouse.py</span></div><div class='term-body'>mx, my = pygame.mouse.get_pos()\nbutton_rect = pygame.Rect(<span class='am'>270</span>, <span class='am'>200</span>, <span class='am'>100</span>, <span class='am'>40</span>)\nhovering = button_rect.collidepoint(mx, my)\ncolor = (<span class='am'>90</span>,<span class='am'>160</span>,<span class='am'>255</span>) <span class='pr'>if</span> hovering <span class='pr'>else</span> (<span class='am'>60</span>,<span class='am'>60</span>,<span class='am'>90</span>)\npygame.draw.rect(screen, color, button_rect)</div></div><h3>Common key constants</h3><table><thead><tr><th>Constant</th><th>Key</th></tr></thead><tbody><tr><td><code>K_UP K_DOWN K_LEFT K_RIGHT</code></td><td>Arrow keys</td></tr><tr><td><code>K_w K_a K_s K_d</code></td><td>WASD movement</td></tr><tr><td><code>K_SPACE K_RETURN</code></td><td>Space / Enter</td></tr><tr><td><code>K_ESCAPE</code></td><td>Escape (quit/pause)</td></tr></tbody></table><div class='game'><div class='game-head'>🎮 Build This: Arcade — PONG</div><div class='game-body'><p><strong>Genre: arcade (NEW GENRE).</strong> This <strong>starts Pong</strong> from a fresh file, but reuses your loop, drawing, and the ball-bounce logic from the toy. It is your first true <em>game</em> with a player and a win condition.</p><ol><li>Make two paddle rects (left and right, each ~10×80) and a ball rect (~14×14) centered.</li><li>Left paddle: poll <code>K_w</code>/<code>K_s</code>. Right paddle: poll <code>K_UP</code>/<code>K_DOWN</code>. Clamp paddles inside the screen.</li><li>Move the ball each frame with <code>ball_vx, ball_vy</code>; bounce off top/bottom walls by negating <code>ball_vy</code>.</li><li>When the ball's rect overlaps a paddle rect, negate <code>ball_vx</code> (you'll formalize this next lesson — for now <code>paddle.colliderect(ball)</code> works).</li><li>If the ball exits left or right, award a point to the other side and recenter the ball. Render both scores with a Font.</li></ol></div></div>"},{"id":"p5-4","part":"05 · Python (from scratch)","nav":"Rects & Movement","num":"5.4","kicker":"Part 05 · Lesson 4","title":"Rects, Vectors & Grid-Based Movement","html":"<h3>The Rect: Pygame's workhorse</h3><p>A <code>pygame.Rect</code> stores an axis-aligned rectangle as <code>(x, y, width, height)</code> and gives you dozens of helpers for positioning, alignment, and overlap tests. Almost everything you move on screen will <em>be</em> a Rect or own one. Master it and movement, collision, and layout all get easy.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>rects.py</span></div><div class='term-body'>r = pygame.Rect(<span class='am'>100</span>, <span class='am'>50</span>, <span class='am'>40</span>, <span class='am'>40</span>)   <span class='cm'># x, y, w, h</span>\nr.x += <span class='am'>5</span>                          <span class='cm'># move right</span>\nr.center = (<span class='am'>320</span>, <span class='am'>240</span>)         <span class='cm'># snap center to a point</span>\nr.right  = <span class='am'>640</span>                  <span class='cm'># align right edge to the wall</span>\nr.bottom = <span class='am'>480</span>\n<span class='cm'># readable edges & anchors:</span>\n<span class='cm'># r.left r.top r.right r.bottom r.centerx r.centery r.topleft ...</span>\nmoved = r.move(<span class='am'>10</span>, <span class='am'>0</span>)            <span class='cm'># returns a NEW shifted Rect</span>\ninside = r.clamp(screen.get_rect())  <span class='cm'># keep r inside another rect</span></div></div><div class='box lab'><div class='bt'>Anchors keep layout clean.</div> Instead of math to center something, set the anchor: <code>label_rect = label.get_rect(center=screen.get_rect().center)</code>. Setting any anchor moves the whole Rect; the size stays fixed.</div><h3>Smooth movement with Vector2</h3><p>Rects store <strong>integers</strong>, so they can't hold fractional speed like 2.5 px/frame. For smooth motion, keep a float <code>Vector2</code> position and copy it into the Rect each frame. <code>pygame.math.Vector2</code> also gives you length, normalize, and rotation — essential for the platformer and the dungeon shooter later.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>vectors.py</span></div><div class='term-body'><span class='pr'>from</span> pygame.math <span class='pr'>import</span> Vector2\npos = Vector2(<span class='am'>100</span>, <span class='am'>100</span>)\nvel = Vector2(<span class='am'>2.5</span>, <span class='am'>-1.5</span>)\npos += vel                          <span class='cm'># float-accurate motion</span>\nrect.center = (round(pos.x), round(pos.y))  <span class='cm'># sync the Rect</span>\n\n<span class='cm'># aim a bullet toward the mouse at constant speed:</span>\ndirection = (Vector2(mx, my) - pos)\n<span class='pr'>if</span> direction.length() &gt; <span class='am'>0</span>:\n    bullet_vel = direction.normalize() * <span class='am'>8</span></div></div><h3>Grid-based movement</h3><p>Many genres think in <strong>tiles</strong>, not pixels: Snake, Sokoban, match-3, tile maps. Pick a <code>TILE</code> size, store positions in grid coordinates <code>(col, row)</code>, and multiply by <code>TILE</code> only when drawing. Movement becomes adding ±1 to a coordinate.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>grid.py</span></div><div class='term-body'>TILE = <span class='am'>24</span>\nhead = (<span class='am'>5</span>, <span class='am'>5</span>)                 <span class='cm'># grid coords (col, row)</span>\nd = (<span class='am'>1</span>, <span class='am'>0</span>)                    <span class='cm'># moving right one tile</span>\nhead = (head[<span class='am'>0</span>] + d[<span class='am'>0</span>], head[<span class='am'>1</span>] + d[<span class='am'>1</span>])\n\n<span class='cm'># draw a grid cell as a pixel rect:</span>\npx, py = head[<span class='am'>0</span>] * TILE, head[<span class='am'>1</span>] * TILE\npygame.draw.rect(screen, (<span class='am'>80</span>,<span class='am'>220</span>,<span class='am'>120</span>), (px, py, TILE, TILE))</div></div><div class='box tip'><div class='bt'>Step the grid on a timer, not every frame.</div> 60 grid-steps/second is unplayable. Use a counter: increment each frame and only advance the snake when it crosses a threshold (e.g., every 8 frames), or use <code>pygame.time.get_ticks()</code> to step every 120 ms.</div><h3>Timed steps</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>timer.py</span></div><div class='term-body'>move_every = <span class='am'>120</span>          <span class='cm'># milliseconds per grid step</span>\nlast_move = <span class='am'>0</span>\n<span class='cm'># ... in UPDATE ...</span>\nnow = pygame.time.get_ticks()\n<span class='pr'>if</span> now - last_move &gt;= move_every:\n    last_move = now\n    advance_snake()</div></div><div class='game'><div class='game-head'>🎮 Build This: Grid — SNAKE</div><div class='game-body'><p><strong>Genre: grid arcade (NEW GENRE).</strong> This <strong>starts Snake</strong> in a new file. It cements Rects, grid coordinates, and timed stepping — none of which Pong needed.</p><ol><li>Define <code>TILE=24</code> and a board (e.g., 25×20 tiles). Store the snake as a list of <code>(col,row)</code> tuples, head first.</li><li>Read <code>KEYDOWN</code> arrows to set a direction vector; reject reversing directly into yourself.</li><li>On each timed step, prepend a new head = old head + direction, and pop the tail (unless food was eaten).</li><li>Spawn food at a random empty tile. When the head lands on it, grow (skip the pop) and increment score.</li><li>Game over if the head hits a wall or any body segment. Draw each segment and the food as <code>TILE</code>-sized rects, and show the score with a Font.</li></ol></div></div>"},{"id":"p5-5","part":"05 · Python (from scratch)","nav":"Collision","num":"5.5","kicker":"Part 05 · Lesson 5","title":"Collision Detection: Rects, Lists & Masks","html":"<h3>Why collision is the heart of gameplay</h3><p>Bullets hitting aliens, a snake biting itself, a player landing on a platform — all collision. Pygame gives you a ladder of techniques from cheap-and-approximate to pixel-perfect. Pick the cheapest one that feels right; reach for masks only when rectangles lie to the player.</p><h3>Rect vs Rect</h3><p>The everyday test is <code>rect.colliderect(other)</code> — true if two rectangles overlap. <code>rect.collidepoint(x, y)</code> tests a single point (great for mouse-on-button and click-to-place).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>rectcoll.py</span></div><div class='term-body'><span class='pr'>if</span> player_rect.colliderect(enemy_rect):\n    take_damage()\n<span class='pr'>if</span> button_rect.collidepoint(pygame.mouse.get_pos()):\n    highlight()</div></div><h3>One thing vs many things</h3><p>Shoot-em-ups test one bullet against a whole list of enemies. <code>rect.collidelist(rects)</code> returns the <em>index</em> of the first hit (or -1); <code>collidelistall</code> returns every hit index. For lists of objects, just iterate.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>manycoll.py</span></div><div class='term-body'><span class='cm'># iterate safely while removing — loop over a copy</span>\n<span class='pr'>for</span> bullet <span class='pr'>in</span> bullets[:]:\n    bullet.y -= <span class='am'>10</span>\n    <span class='pr'>for</span> enemy <span class='pr'>in</span> enemies[:]:\n        <span class='pr'>if</span> bullet.colliderect(enemy):\n            bullets.remove(bullet)\n            enemies.remove(enemy)\n            score += <span class='am'>10</span>\n            <span class='pr'>break</span>                 <span class='cm'># this bullet is spent</span></div></div><div class='box danger'><div class='bt'>Never mutate a list you're iterating.</div> Removing from a list mid-loop skips elements or crashes. Loop over a shallow copy (<code>for x in items[:]</code>) and remove from the original, or collect doomed items and remove them after the loop.</div><h3>Resolving collisions, not just detecting</h3><p>Detection says <em>that</em> they touched; resolution decides <em>what to do</em>. For platforms, the classic trick is to move on one axis at a time and push the player back out using the platform's edge — this is exactly what the platformer needs.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>resolve.py</span></div><div class='term-body'><span class='cm'># move horizontally, then fix overlaps</span>\nplayer.x += vel_x\n<span class='pr'>for</span> wall <span class='pr'>in</span> walls:\n    <span class='pr'>if</span> player.colliderect(wall):\n        <span class='pr'>if</span> vel_x &gt; <span class='am'>0</span>: player.right = wall.left   <span class='cm'># hit left side</span>\n        <span class='pr'>elif</span> vel_x &lt; <span class='am'>0</span>: player.left = wall.right <span class='cm'># hit right side</span>\n<span class='cm'># then repeat the same pattern for the vertical axis</span></div></div><h3>Pixel-perfect masks</h3><p>Rectangles over-approximate round ships and diagonal sprites — players notice 'phantom' hits in the transparent corners. A <code>pygame.mask.Mask</code> records which pixels are solid (non-transparent). Build one with <code>from_surface</code>, then test the <em>offset</em> between two masks.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>masks.py</span></div><div class='term-body'>mask_a = pygame.mask.from_surface(ship_img)\nmask_b = pygame.mask.from_surface(rock_img)\noffset = (rock_rect.x - ship_rect.x, rock_rect.y - ship_rect.y)\n<span class='pr'>if</span> mask_a.overlap(mask_b, offset):\n    explode()        <span class='cm'># only true when solid pixels actually touch</span></div></div><div class='box tip'><div class='bt'>Cheap test first, then refine.</div> Masks are slower. Do a fast <code>colliderect</code> as a broad-phase gate; only run the mask overlap when the rectangles already intersect. You get pixel accuracy at almost no average cost.</div><div class='game'><div class='game-head'>🎮 Build This: Shoot-em-up — SPACE INVADERS</div><div class='game-body'><p><strong>Genre: shoot-em-up (NEW GENRE).</strong> This <strong>starts Space Invaders</strong> in a new file, putting list-collision and the bullet/enemy loop to work. (Optional: add masks for satisfying pixel-perfect hits.)</p><ol><li>Build a grid of ~5×8 enemy rects that slide as a block left/right, dropping down and reversing at the edges.</li><li>The player ship at the bottom moves with arrows/AD; <code>KEYDOWN</code> Space appends a bullet rect at the ship's top.</li><li>Each frame move bullets up; use the safe copy-loop to remove bullets that exit or hit an enemy, and remove hit enemies, adding score.</li><li>Let enemies occasionally drop bombs; if a bomb's rect collides the player, lose a life.</li><li>Win when all enemies are cleared; lose when an enemy reaches the bottom or lives hit zero. Show score and lives with a Font.</li></ol></div></div>"},{"id":"p5-6","part":"05 · Python (from scratch)","nav":"Sprites & Groups","num":"5.6","kicker":"Part 05 · Lesson 6","title":"The Sprite Class, Groups & Gravity","html":"<h3>Why Sprite and Group exist</h3><p>Tracking parallel lists of rects, images, and velocities gets messy fast. Pygame's <code>pygame.sprite.Sprite</code> bundles an <code>image</code> and a <code>rect</code> into one object with its own <code>update()</code> behavior, and <code>pygame.sprite.Group</code> manages a collection of them — updating, drawing, and collision-checking the whole set with one call. This is how you keep big games like a dungeon shooter sane.</p><h3>A Sprite subclass</h3><p>Subclass <code>Sprite</code>, set <code>self.image</code> and <code>self.rect</code> in <code>__init__</code>, and put per-frame logic in <code>update()</code>. The Group will call <code>update()</code> on every member for you.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>player.py</span></div><div class='term-body'><span class='pr'>class</span> Player(pygame.sprite.Sprite):\n    <span class='pr'>def</span> __init__(self, x, y):\n        super().__init__()\n        self.image = pygame.image.load(<span class='ok'>'hero.png'</span>).convert_alpha()\n        self.rect  = self.image.get_rect(midbottom=(x, y))\n        self.vel   = pygame.math.Vector2(<span class='am'>0</span>, <span class='am'>0</span>)\n        self.on_ground = <span class='pr'>False</span>\n\n    <span class='pr'>def</span> update(self, walls):\n        keys = pygame.key.get_pressed()\n        self.vel.x = (keys[pygame.K_d] - keys[pygame.K_a]) * <span class='am'>5</span>\n        self.vel.y += <span class='am'>0.6</span>                    <span class='cm'># GRAVITY pulls down</span>\n        <span class='pr'>if</span> keys[pygame.K_SPACE] <span class='pr'>and</span> self.on_ground:\n            self.vel.y = <span class='am'>-13</span>               <span class='cm'># JUMP impulse</span>\n        self._move(walls)\n\n    <span class='pr'>def</span> _move(self, walls):\n        self.rect.x += round(self.vel.x)\n        <span class='pr'>for</span> w <span class='pr'>in</span> walls:\n            <span class='pr'>if</span> self.rect.colliderect(w):\n                <span class='pr'>if</span> self.vel.x &gt; <span class='am'>0</span>: self.rect.right = w.left\n                <span class='pr'>elif</span> self.vel.x &lt; <span class='am'>0</span>: self.rect.left = w.right\n        self.on_ground = <span class='pr'>False</span>\n        self.rect.y += round(self.vel.y)\n        <span class='pr'>for</span> w <span class='pr'>in</span> walls:\n            <span class='pr'>if</span> self.rect.colliderect(w):\n                <span class='pr'>if</span> self.vel.y &gt; <span class='am'>0</span>:\n                    self.rect.bottom = w.top; self.on_ground = <span class='pr'>True</span>\n                <span class='pr'>elif</span> self.vel.y &lt; <span class='am'>0</span>: self.rect.top = w.bottom\n                self.vel.y = <span class='am'>0</span></div></div><div class='box lab'><div class='bt'>Gravity in three lines.</div> Add a constant to <code>vel.y</code> every frame (acceleration), apply velocity to position, and zero <code>vel.y</code> when you land. That's a complete platformer physics core — no math library needed.</div><h3>Groups do the busywork</h3><p>Add sprites to a <code>Group</code> and it updates and draws them all at once. <code>Group.draw(surface)</code> blits each sprite's <code>image</code> at its <code>rect</code>; <code>Group.update(*args)</code> forwards arguments to every <code>update()</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>groups.py</span></div><div class='term-body'>all_sprites = pygame.sprite.Group()\nbullets     = pygame.sprite.Group()\nenemies     = pygame.sprite.Group()\nplayer = Player(<span class='am'>100</span>, <span class='am'>300</span>); all_sprites.add(player)\n\n<span class='cm'># in UPDATE:</span>\nall_sprites.update()\n<span class='cm'># group-vs-group collision, auto-removing the killed sprites:</span>\nhits = pygame.sprite.groupcollide(bullets, enemies, <span class='pr'>True</span>, <span class='pr'>True</span>)\nscore += <span class='am'>10</span> * len(hits)\n<span class='cm'># one sprite vs a group:</span>\n<span class='pr'>if</span> pygame.sprite.spritecollideany(player, enemies):\n    player_hit()\n\n<span class='cm'># in DRAW:</span>\nall_sprites.draw(screen)</div></div><table><thead><tr><th>Helper</th><th>Use</th></tr></thead><tbody><tr><td><code>spritecollide(s, group, dokill)</code></td><td>list of sprites in group hitting s</td></tr><tr><td><code>groupcollide(g1, g2, k1, k2)</code></td><td>every cross-hit; optionally kill both sides</td></tr><tr><td><code>spritecollideany(s, group)</code></td><td>fast 'did s hit anything?' check</td></tr><tr><td><code>sprite.kill()</code></td><td>remove a sprite from all its groups</td></tr></tbody></table><div class='box tip'><div class='bt'>Pass <code>collided=...</code> for masks.</div> The collide helpers accept <code>collided=pygame.sprite.collide_mask</code> to do pixel-perfect group collisions, combining Lesson 5's masks with Groups in one line.</div><div class='game'><div class='game-head'>🎮 Build This: Platformer — Tiny Jump Quest</div><div class='game-body'><p><strong>Genre: 2D platformer (NEW GENRE).</strong> This <strong>starts a platformer</strong> in a new file using the gravity Player above, then you'll <em>also</em> reuse Groups next for the dungeon shooter.</p><ol><li>Use the <code>Player</code> class with gravity and jump. Build a level as a list of wall rects (ground + a few floating platforms).</li><li>Stay on one screen first: place coins (small sprites) the player collects via <code>spritecollide(player, coins, True)</code>.</li><li>Add spike rects; touching one respawns the player at the start and costs a life.</li><li>Add a goal flag rect; reaching it shows 'You Win!'. Track coins collected with a Font HUD.</li><li><strong>Dungeon teaser:</strong> spin up a second mini-scene with a top-down <code>Player</code> (remove gravity, WASD 8-way), an <code>enemies</code> Group, and a <code>bullets</code> Group fired toward the mouse using Lesson 4's <code>normalize()</code> — proving Groups carry you across genres.</li></ol></div></div>"},{"id":"p5-7","part":"05 · Python (from scratch)","nav":"Sound, Music & Scenes","num":"5.7","kicker":"Part 05 · Lesson 7","title":"Sound, Music & a Scene/State System","html":"<h3>Audio: the mixer</h3><p>Sound is the cheapest way to make a game feel alive. Pygame's <code>mixer</code> handles short <strong>sound effects</strong> (<code>Sound</code> objects, loaded fully into memory) and long <strong>streaming music</strong> (<code>music</code>, streamed from disk so one big file doesn't eat RAM). Initialize the mixer before loading audio — <code>pygame.init()</code> already does, but calling <code>pre_init</code> first lowers latency.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio.py</span></div><div class='term-body'>pygame.mixer.pre_init(<span class='am'>44100</span>, <span class='am'>-16</span>, <span class='am'>2</span>, <span class='am'>512</span>)  <span class='cm'># low-latency buffer</span>\npygame.init()\n\nshoot_sfx = pygame.mixer.Sound(<span class='ok'>'assets/shoot.wav'</span>)\nshoot_sfx.set_volume(<span class='am'>0.4</span>)\nshoot_sfx.play()                      <span class='cm'># fire-and-forget</span>\n\npygame.mixer.music.load(<span class='ok'>'assets/theme.ogg'</span>)\npygame.mixer.music.set_volume(<span class='am'>0.5</span>)\npygame.mixer.music.play(<span class='am'>-1</span>)              <span class='cm'># -1 = loop forever</span></div></div><div class='box tip'><div class='bt'>WAV for SFX, OGG for music.</div> Short effects load best as small <code>.wav</code> files; long tracks belong in compressed <code>.ogg</code> streamed via <code>music</code>. MP3 support varies by platform — OGG is the safe, free choice.</div><h3>Why you need scenes</h3><p>So far each game has been one big loop. Real games have a <strong>title menu</strong>, the <strong>gameplay</strong>, a <strong>pause</strong> overlay, and a <strong>game-over</strong> screen. Cramming all of that into one loop with tangled <code>if</code> flags becomes unmaintainable. The fix is a <strong>scene (state) system</strong>: each screen is its own object that knows how to handle input, update, and draw itself.</p><h3>A clean Scene base class</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>scene.py</span></div><div class='term-body'><span class='pr'>class</span> Scene:\n    next_scene = <span class='pr'>None</span>      <span class='cm'># set to request a switch</span>\n    <span class='pr'>def</span> handle(self, event): <span class='pr'>pass</span>\n    <span class='pr'>def</span> update(self): <span class='pr'>pass</span>\n    <span class='pr'>def</span> draw(self, screen): <span class='pr'>pass</span>\n\n<span class='pr'>class</span> MenuScene(Scene):\n    <span class='pr'>def</span> handle(self, event):\n        <span class='pr'>if</span> event.type == pygame.KEYDOWN <span class='pr'>and</span> event.key == pygame.K_RETURN:\n            self.next_scene = GameScene()   <span class='cm'># start playing</span>\n    <span class='pr'>def</span> draw(self, screen):\n        screen.fill((<span class='am'>15</span>,<span class='am'>15</span>,<span class='am'>30</span>))\n        draw_centered(screen, <span class='ok'>'PRESS ENTER'</span>)\n\n<span class='pr'>class</span> GameScene(Scene):\n    <span class='pr'>def</span> __init__(self):\n        self.score = <span class='am'>0</span>; self.sprites = pygame.sprite.Group()\n    <span class='pr'>def</span> update(self):\n        self.sprites.update()\n        <span class='pr'>if</span> self.player_dead:\n            self.next_scene = GameOverScene(self.score)\n    <span class='pr'>def</span> draw(self, screen):\n        screen.fill((<span class='am'>10</span>,<span class='am'>10</span>,<span class='am'>15</span>))\n        self.sprites.draw(screen)</div></div><h3>The driver loop owns the current scene</h3><p>Your <code>main()</code> holds <em>one</em> reference to the active scene and just forwards events, update, and draw to it. When a scene sets <code>next_scene</code>, you swap. Adding a new screen never touches existing code.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>driver.py</span></div><div class='term-body'>scene = MenuScene()\n<span class='pr'>while</span> running:\n    <span class='pr'>for</span> event <span class='pr'>in</span> pygame.event.get():\n        <span class='pr'>if</span> event.type == pygame.QUIT: running = <span class='pr'>False</span>\n        scene.handle(event)\n    scene.update()\n    scene.draw(screen)\n    pygame.display.flip()\n    clock.tick(<span class='am'>60</span>)\n    <span class='pr'>if</span> scene.next_scene:           <span class='cm'># a switch was requested</span>\n        scene = scene.next_scene</div></div><div class='box lab'><div class='bt'>Pause is just a scene that remembers the previous one.</div> Store <code>self.paused_under = current_scene</code> when entering a PauseScene; on resume, set <code>next_scene</code> back to it. Because the gameplay scene isn't updated while paused, it simply freezes in place.</div><div class='game'><div class='game-head'>🎮 Build This: Puzzle — MATCH-3 (Gem Crush)</div><div class='game-body'><p><strong>Genre: match-3 puzzle (NEW GENRE).</strong> This <strong>starts a puzzle game</strong> in a new file and is the first one built <em>with</em> the scene system and audio from day one.</p><ol><li>Make a 2D list grid of colored gems (reuse Lesson 4's tile drawing). Wrap it in a <code>GameScene</code>.</li><li>Click to select a gem, click an adjacent one to swap (mouse events from Lesson 3).</li><li>After a swap, scan rows and columns for runs of 3+ same-color gems; clear them, play a <code>Sound</code>, and add score.</li><li>Collapse gems down into empty cells and refill the top with new random gems; re-scan for chain reactions.</li><li>Wrap everything in a <code>MenuScene</code> -&gt; <code>GameScene</code> -&gt; <code>GameOverScene</code> flow (game over on a move limit), with looping <code>music</code> playing throughout.</li></ol></div></div>"},{"id":"p5-8","part":"05 · Python (from scratch)","nav":"Polish & Package","num":"5.8","kicker":"Part 05 · Lesson 8","title":"Capstone: Polish, Menu, Score & Packaging with PyInstaller","html":"<h3>From prototype to portfolio piece</h3><p>You've built across six genres. The final step turns one of them into something you can put your name on and hand to anyone — no Python required. That means three things: a complete <strong>game-feel loop</strong> (menu -&gt; play -&gt; game over -&gt; restart), real <strong>polish</strong> (juice, persistent high score), and a single distributable <strong>executable</strong> built with PyInstaller.</p><h3>Pick one and finish it</h3><p>Choose the game you love most — Space Invaders, the platformer, the dungeon shooter, or match-3. Fold in the scene system from Lesson 7 so it has a title screen and a game-over screen with a restart prompt. A polished loop is what separates a demo from a game.</p><h3>Polish: juice and persistence</h3><p>Small touches read as 'professional'. Add screen shake on hits, a particle burst on explosions, a tween on score numbers, and — crucially — a <strong>high score saved to disk</strong> so progress persists between runs.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>polish.py</span></div><div class='term-body'><span class='pr'>import</span> json, random, os\n\n<span class='cm'># --- persistent high score ---</span>\nSAVE = <span class='ok'>'highscore.json'</span>\n<span class='pr'>def</span> load_high():\n    <span class='pr'>if</span> os.path.exists(SAVE):\n        <span class='pr'>return</span> json.load(open(SAVE)).get(<span class='ok'>'high'</span>, <span class='am'>0</span>)\n    <span class='pr'>return</span> <span class='am'>0</span>\n<span class='pr'>def</span> save_high(v):\n    json.dump({<span class='ok'>'high'</span>: v}, open(SAVE, <span class='ok'>'w'</span>))\n\n<span class='cm'># --- screen shake: offset the whole frame for a few frames ---</span>\nshake = <span class='am'>0</span>\n<span class='pr'>def</span> on_explosion():\n    <span class='pr'>global</span> shake; shake = <span class='am'>12</span>\n<span class='cm'># in DRAW, render the world to a buffer then blit it shifted:</span>\noff = (random.randint(-shake, shake), random.randint(-shake, shake)) <span class='pr'>if</span> shake <span class='pr'>else</span> (<span class='am'>0</span>,<span class='am'>0</span>)\nscreen.blit(world_surf, off)\n<span class='pr'>if</span> shake &gt; <span class='am'>0</span>: shake -= <span class='am'>1</span></div></div><div class='box tip'><div class='bt'>Restart without leaks.</div> Make 'restart' build a <em>fresh</em> <code>GameScene()</code> rather than mutating the old one. New Groups, new score, new player — no stale state carried over. The scene system makes this one line.</div><h3>Load assets so they survive packaging</h3><p>When PyInstaller bundles your app, the working directory changes. Resolve asset paths relative to the script (and PyInstaller's temp dir) so loads don't fail in the .exe.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>resource_path.py</span></div><div class='term-body'><span class='pr'>import</span> sys, os\n<span class='pr'>def</span> resource_path(rel):\n    base = getattr(sys, <span class='ok'>'_MEIPASS'</span>, os.path.abspath(<span class='ok'>'.'</span>))\n    <span class='pr'>return</span> os.path.join(base, rel)\n\n<span class='cm'># use it everywhere you load:</span>\nimg = pygame.image.load(resource_path(<span class='ok'>'assets/ship.png'</span>)).convert_alpha()</div></div><h3>Package with PyInstaller</h3><p><code>pyinstaller</code> freezes your script and its dependencies into a standalone build. <code>--onefile</code> produces a single executable; <code>--windowed</code> (a.k.a. <code>--noconsole</code>) hides the terminal; <code>--add-data</code> bundles your assets folder.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>shell</span></div><div class='term-body'>python3 -m pip install pyinstaller\n\n<span class='cm'># Windows (note the ; path separator)</span>\npyinstaller --onefile --windowed --add-data <span class='ok'>'assets;assets'</span> main.py\n<span class='cm'># macOS / Linux (note the : path separator)</span>\npyinstaller --onefile --windowed --add-data <span class='ok'>'assets:assets'</span> main.py\n\n<span class='cm'># result lands in dist/ — ship that file</span>\n<span class='ok'>dist/main</span>      <span class='cm'># or dist/main.exe on Windows</span></div></div><div class='box danger'><div class='bt'>Build on the OS you target.</div> PyInstaller does not cross-compile. A Windows <code>.exe</code> must be built on Windows; a macOS <code>.app</code> on macOS. Use a clean venv when building so only the libraries you actually use get bundled, keeping the binary small.</div><div class='box law'><div class='bt'>Ship the source too.</div> For a portfolio, a recruiter wants to read your code. Put the project on GitHub with a short README (controls, a GIF, how to run), the <code>requirements.txt</code> (<code>pip freeze &gt; requirements.txt</code>), and a download link to the packaged build. The polish lives in the repo as much as the binary.</div><div class='game'><div class='game-head'>🎮 Build This: CAPSTONE — Finish & Ship One Game</div><div class='game-body'><p><strong>Genre: your choice — the portfolio capstone.</strong> This <strong>extends one earlier game</strong> (Invaders, platformer, dungeon shooter, or match-3) into a complete, polished, packaged product. This is the deliverable that proves the whole track.</p><ol><li>Pick your favorite earlier game and wrap it in the Lesson 7 scene system: Menu -&gt; Game -&gt; Game Over, with restart and quit.</li><li>Add sound effects and looping music, a live score HUD, and a <strong>persistent high score</strong> saved to JSON.</li><li>Add at least two pieces of juice (screen shake, particles, a hit flash, or score pop).</li><li>Route every asset load through <code>resource_path()</code> so the bundle works.</li><li>Build a standalone executable with PyInstaller, test it on a clean machine/folder, and publish the repo with a README, a GIF, and the download. You now have a packaged, portfolio-ready game built entirely from scratch.</li></ol></div></div>"},{"id":"p6-1","part":"06 · JavaScript (from scratch)","nav":"Canvas & the loop","num":"6.1","kicker":"Part 06 · Lesson 1","title":"The Canvas & The Game Loop","html":"<h3>Welcome to your chosen path</h3><p>You finished Foundations, and you have <strong>chosen JavaScript with HTML5 Canvas</strong> as your single track. Great choice. This path stands completely on its own: by the end you will have built a small <em>portfolio</em> of real games, FROM SCRATCH, with no engine, no install, and no build step. Just a browser and a text file.</p><p>Here is the arc you will build, one game per lesson, each teaching something new:</p><ul><li><strong>Toy</strong> — a bouncing box on a canvas (this lesson)</li><li><strong>Pong</strong> — the original arcade classic (input &amp; movement)</li><li><strong>Breakout</strong> — bricks, paddle, collision (AABB)</li><li><strong>Flappy-style tapper</strong> — a NEW genre (gravity, tap input)</li><li><strong>Platformer</strong> — a NEW genre (gravity + jumping + tiles)</li><li><strong>Top-down shooter</strong> — a NEW genre (bullets, spawning, vectors)</li><li><strong>Match puzzle</strong> — a NEW genre (grids, matching, state)</li><li><strong>Capstone</strong> — a polished arcade game, DEPLOYED to the web</li></ul><p>Several distinct genres, all in one language. Let us begin.</p><h3>One self-contained page</h3><p>A canvas game is just an HTML page. No frameworks. Create a file called <code>index.html</code>, paste this, and double-click it. It runs.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>index.html</span></div><div class='term-body'><span class='cm'>&lt;!-- The whole game lives in one file --&gt;</span>\n&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;head&gt;&lt;meta charset='utf-8'&gt;&lt;title&gt;My Game&lt;/title&gt;&lt;/head&gt;\n&lt;body style='margin:0;background:#111'&gt;\n  &lt;canvas id='game' width='480' height='320'&gt;&lt;/canvas&gt;\n  &lt;script&gt;\n    <span class='cm'>// all our game code goes here</span>\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</div></div><p>The <code>&lt;canvas&gt;</code> is a rectangle of pixels you draw onto with JavaScript. To draw, grab the element and ask it for a <strong>2D context</strong> — the object with all the drawing methods.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.js</span></div><div class='term-body'><span class='pr'>const</span> canvas = document.getElementById(<span class='ok'>'game'</span>);\n<span class='pr'>const</span> ctx = canvas.getContext(<span class='ok'>'2d'</span>);\n\nctx.fillStyle = <span class='ok'>'#3cf'</span>;          <span class='cm'>// set color</span>\nctx.fillRect(<span class='am'>40</span>, <span class='am'>40</span>, <span class='am'>80</span>, <span class='am'>60</span>);  <span class='cm'>// x, y, width, height</span></div></div><p>That draws one cyan rectangle. The origin <code>(0,0)</code> is the <strong>top-left</strong>; x grows right, y grows <em>down</em>. Remember that — y-down trips up everyone at first.</p><h3>The game loop &amp; delta time</h3><p>A game is the same three steps, sixty times a second: <strong>update</strong> the world, <strong>clear</strong> the screen, <strong>draw</strong> it again. The browser gives us <code>requestAnimationFrame</code> (rAF) to sync that to the monitor's refresh.</p><p>Crucially, frames are not perfectly even. So we never move things by a fixed amount per frame — we multiply by <strong>delta time</strong> (<code>dt</code>), the seconds elapsed since the last frame. Speeds become \"pixels per second\" and your game runs the same on a 60Hz or 144Hz screen.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>loop.js</span></div><div class='term-body'><span class='pr'>let</span> last = <span class='am'>0</span>;\n\n<span class='pr'>function</span> <span class='pr'>frame</span>(now) {\n  <span class='pr'>const</span> dt = Math.min((now - last) / <span class='am'>1000</span>, <span class='am'>0.05</span>); <span class='cm'>// ms -&gt; secs, clamped</span>\n  last = now;\n  <span class='pr'>update</span>(dt);\n  <span class='pr'>render</span>();\n  requestAnimationFrame(frame); <span class='cm'>// ask for the next frame</span>\n}\nrequestAnimationFrame(frame);     <span class='cm'>// kick it off</span></div></div><div class='box tip'><div class='bt'>Tip.</div> The first <code>dt</code> is weird because <code>last</code> starts at 0. The <code>Math.min</code> clamp caps it so a paused tab does not t
