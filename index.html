m-title'>rig setup</span></div><div class='term-body'><span class='cm'># Build skeleton in Edit Mode</span>\nShift+A &gt; Armature\nE <span class='dim'>extrude bone chains, name them .L/.R</span>\n<span class='cm'># Bind mesh to armature</span>\nselect mesh, Shift+select armature\nCtrl+P &gt; With Automatic Weights <span class='ok'>✓</span>\nCtrl+Tab <span class='dim'>→ Pose Mode, test deformation</span></div></div><h3>Weight Painting</h3><p>Automatic weights are a good start but imperfect — a knee bone might pull belly vertices. Switch to <strong>Weight Paint</strong> mode (with the mesh selected and a bone chosen). Red means full influence (1.0), blue means none (0.0). Paint to fix bad deformation: add weight where a joint should pull, subtract where it should not. Use a low brush strength and the <strong>Blur</strong> brush to smooth the falloff across joints so bends look natural rather than creased.</p><div class='box law'><div class='bt'>Rule.</div> Each vertex's weights across all bones should sum to 1.0. Use <em>Normalize All</em> to enforce this — stray un-normalized weights cause vertices to fly off or collapse during animation.</div><h3>Animating a Walk Cycle</h3><p>Animation uses <strong>keyframes</strong>: you pose the rig at certain frames and Blender interpolates between them. Open the <strong>Animation</strong> workspace. Set the scene to a manageable length (e.g. 24 frames for a one-second loop). A basic walk cycle has four key poses:</p><ol><li><strong>Contact</strong> (frame 1): legs apart, one heel forward, opposite arm forward.</li><li><strong>Down/passing</strong> (frame 6-7): weight on the planted leg, body lowest.</li><li><strong>Contact mirrored</strong> (frame 13): the opposite stride.</li><li><strong>Passing mirrored</strong> (frame 18-19), then back to frame 1 to loop.</li></ol><p>Pose bones in Pose Mode and press <strong>I</strong> to insert a keyframe (choose Location/Rotation or use a keying set). Make frame 24 identical to frame 1 so the loop is seamless. Group these keyframes as an <strong>Action</strong> in the Dope Sheet's Action Editor and name it <code>Walk</code> — engines import each action as a named animation clip.</p><div class='box tip'><div class='bt'>Tip.</div> Use the <strong>Graph Editor</strong> to smooth motion, and set the loop's interpolation to keep velocity consistent. Stamp a <em>Fake User</em> (the shield icon) on the Action so Blender does not discard it on save.</div><div class='game'><div class='game-head'>🎮 Build This: Rig and Walk-Cycle a Character</div><div class='game-body'><p>Goal: rig a simple low-poly character and author a looping walk action ready for an engine.</p><ol><li>Model or import a simple humanoid (a blocky biped is fine). Apply transforms (Ctrl+A).</li><li>Add an armature; in Edit Mode extrude a hip, spine, two leg chains, and two arm chains. Name bones with .L/.R.</li><li>Select mesh, Shift-select armature, Ctrl+P &gt; With Automatic Weights.</li><li>Enter Pose Mode, test bends, then Weight Paint to fix any pinching at the joints.</li><li>In the Animation workspace, set the end frame to 24. Pose the four walk keys, inserting keyframes with I.</li><li>Copy frame 1's pose to frame 24 for a seamless loop; name the Action <code>Walk</code> and give it a Fake User.</li><li>Scrub the timeline to confirm the loop reads clearly. Save the file.</li></ol></div></div>"},{"id":"p8-8","part":"07 · 3D Art (Blender)","nav":"Export & Optimization","num":"7.8","kicker":"Part 07 · Lesson 8","title":"Export Pipeline and Optimization: glTF/FBX into a Game Engine","html":"<h3>Choosing a Format</h3><p>Two formats dominate game-art handoff. <strong>glTF</strong> (<code>.glb</code>/<code>.gltf</code>) is an open, modern standard — it carries meshes, PBR materials, textures, skins, and animations in one file and maps almost perfectly onto the Principled BSDF. <strong>FBX</strong> is older and proprietary but still the default for Unity and Unreal. As a rule: prefer glTF for Godot and for clean PBR transfer; use FBX when a Unity/Unreal pipeline expects it.</p><table><thead><tr><th>Engine</th><th>Best format</th></tr></thead><tbody><tr><td>Godot</td><td>glTF (.glb) — native, recommended</td></tr><tr><td>Unity</td><td>FBX (or glTF via package)</td></tr><tr><td>Unreal</td><td>FBX or glTF</td></tr></tbody></table><h3>The Scale and Orientation Gotchas</h3><p>This is where most assets break. Two long-standing conventions collide:</p><ul><li><strong>Units</strong>: Blender's default unit is meters, which matches Godot, Unity, and Unreal — but only if you actually modeled at real-world scale and applied your transforms. A character should be roughly 1.8 units tall, not 0.018 or 180.</li><li><strong>Up axis</strong>: Blender is <strong>Z-up</strong>; most engines (Unity, glTF) are <strong>Y-up</strong>. The exporter has <em>Forward</em> and <em>Up</em> settings to convert. The glTF exporter handles Y-up automatically. For FBX into Unity, set Forward <code>-Z</code> and Up <code>Y</code>, or models import lying on their back.</li></ul><div class='box law'><div class='bt'>Rule.</div> Before <em>every</em> export: <strong>Apply All Transforms</strong> (Ctrl+A) so scale is 1,1,1 and rotation is zero. Un-applied scale is the number-one cause of objects that import tiny, giant, or with broken physics and animation.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>export checklist</span></div><div class='term-body'>Ctrl+A &gt; All Transforms <span class='ok'>✓ scale 1,1,1</span>\nRecalculate Normals (Shift+N) <span class='ok'>✓</span>\nApply / enable modifiers on export <span class='ok'>✓</span>\nUVs present, materials assigned <span class='ok'>✓</span>\nArmature + Action selected for skinned export\n<span class='cm'>File &gt; Export &gt; glTF 2.0 (.glb)</span>\n  Include: Selected Objects, +Y up\n  Data: Mesh, Materials, Animations <span class='ok'>✓</span></div></div><h3>Exporting</h3><p>Use <em>File &gt; Export &gt; glTF 2.0</em>. In the panel: under <strong>Include</strong> enable <em>Selected Objects</em> (export only what you mean to); under <strong>Transform</strong> keep +Y Up; under <strong>Data</strong> enable Mesh, Materials, and (for the character) the Armature and Animation tabs with <em>all actions</em> exported as separate clips. For FBX use <em>File &gt; Export &gt; FBX</em>, set <em>Apply Scalings</em> to <em>FBX All</em>, tick <em>Apply Modifiers</em>, and choose the right Forward/Up.</p><h3>Optimization for Runtime</h3><p>Shipping an asset is not the end — it must run fast at scale.</p><h4>Poly count and LODs</h4><p>A <strong>Level of Detail (LOD)</strong> system swaps in simpler meshes as an object moves away from the camera. Author LOD0 (full), LOD1 (~50%), LOD2 (~25%) using the <strong>Decimate</strong> modifier or manual retopology, and let the engine switch based on screen size. Distant objects costing thousands of tris is pure waste.</p><h4>Texture atlases</h4><p>Each material is typically a separate <strong>draw call</strong>, and draw calls are expensive. Combine many small textures into one larger <strong>atlas</strong> and re-pack UVs so several objects share a single material — fewer draw calls, faster frames. This is why we packed UVs into one square earlier.</p><h4>Other wins</h4><ul><li>Power-of-two texture sizes (512, 1024, 2048) for proper mipmapping.</li><li>Remove hidden faces and interior geometry the camera never sees.</li><li>Reuse materials and instances; do not duplicate unique meshes that could be instanced.</li><li>Keep bone counts reasonable for skinned meshes on lower-end hardware.</li></ul><div class='box tip'><div class='bt'>Tip.</div> After import, always test in-engine: confirm scale against a known reference, play the animation clip, and check that albedo reads in sRGB while normals/roughness read as linear. A five-minute import sanity check saves hours of confusion.</div><div class='game'><div class='game-head'>🎮 Build This: Export and Import Into an Engine</div><div class='game-body'><p>Goal: deliver your rigged, textured character into Godot, Unity, or Unreal with materials and animation intact.</p><ol><li>Select the character mesh and its armature. Apply all transforms (Ctrl+A &gt; All Transforms) and confirm scale is 1,1,1.</li><li>Recalculate normals (Shift+N) and verify UVs and the PBR material are assigned.</li><li>Export as glTF 2.0 (.glb): Selected Objects, +Y up, include Mesh, Materials, Armature, and the <code>Walk</code> animation.</li><li>Also export an FBX with Apply Scalings = FBX All and Apply Modifiers on, for comparison.</li><li>Import the .glb into your engine. Verify the character stands upright at the correct height.</li><li>Check the material maps assigned correctly (albedo sRGB, normal/roughness linear) and play the Walk clip.</li><li>Bonus: add a Decimate-based LOD1 and a texture atlas, then re-import and compare draw calls.</li></ol></div></div>"},{"id":"p9-1","part":"08 · Game Audio","nav":"Audio & Game Feel","num":"8.1","kicker":"Part 08 · Lesson 1","title":"The Role of Audio in Game Feel","html":"<h3>Why audio is half of game feel</h3><p>Game feel is the felt sense of control and responsiveness a game gives you, and audio carries far more of it than most people realize. When a button click has a crisp sound, a jump has a satisfying <em>whoomph</em>, and a hit lands with a meaty thud, the game feels <strong>tactile</strong> even though you are only touching a controller. Mute a great game and it instantly feels lifeless. Audio is the fastest, cheapest way to make actions feel like they matter.</p><p>Audio in games does three jobs at once: it provides <strong>feedback</strong> (confirming an action happened), <strong>information</strong> (telling you where an enemy is, that your health is low, that a quest updated), and <strong>emotion</strong> (tension, triumph, dread, calm). A single gunshot sound confirms you fired, tells nearby players your direction, and contributes to the visceral mood of combat.</p><h3>The four audio layers</h3><p>Almost every game soundscape decomposes into four layers. Learning to hear them separately is the core skill of an audio designer.</p><table><thead><tr><th>Layer</th><th>What it is</th><th>Examples</th></tr></thead><tbody><tr><td>UI</td><td>Menu and HUD feedback</td><td>Button clicks, hovers, error beeps, level-up chimes</td></tr><tr><td>SFX</td><td>Diegetic gameplay sounds</td><td>Footsteps, weapons, doors, pickups, impacts</td></tr><tr><td>Ambience</td><td>The continuous bed of the world</td><td>Wind, rain, crowd murmur, machine hum, birds</td></tr><tr><td>Music</td><td>Scored, often non-diegetic emotion</td><td>Loops, stingers, adaptive layers</td></tr></tbody></table><p><strong>Diegetic</strong> sounds exist in the game world (a character can hear them); <strong>non-diegetic</strong> sounds are for the player only (most music, UI). Knowing which is which guides spatialization and mixing decisions later.</p><h3>Feedback timing and the 100ms rule</h3><p>Feedback that arrives late feels broken. Aim for sound to trigger within roughly <strong>100 milliseconds</strong> of the action. Latency beyond that breaks the cause-and-effect illusion. This is why UI clicks fire on press, not on release, and why footstep sounds are tied to the exact frame a foot plants.</p><div class='box tip'><div class='bt'>Tip.</div> When a game feels mushy or unresponsive, check audio latency before you blame the controls. A 200ms delay on hit-confirmation sounds will make perfectly tuned combat feel sluggish.</div><h3>Auditing a soundscape critically</h3><p>To analyze any clip, listen four times, once for each layer, ignoring the others. Ask of each sound: <strong>Why is it here? What does it tell me? Could the player function without it?</strong> Good audio is intentional. Bad audio is either missing (silence where feedback should be) or cluttered (everything loud, nothing readable).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio-audit-checklist</span></div><div class='term-body'><span class='cm'># For each gameplay moment, ask:</span>\n<span class='ok'>UI</span>      <span class='dim'>Does every interaction give feedback within 100ms?</span>\n<span class='ok'>SFX</span>     <span class='dim'>Does each action have a distinct, readable sound?</span>\n<span class='ok'>Ambience</span> <span class='dim'>Is there a continuous bed selling the location?</span>\n<span class='ok'>Music</span>   <span class='dim'>Does it match emotional intensity and adapt?</span>\n<span class='am'>Mix</span>     <span class='dim'>Can you hear the important sound over everything?</span></div></div><h3>Writing an audio brief</h3><p>Before making a single sound, list what the game needs. An <strong>audio brief</strong> is a spreadsheet-like inventory: every event that needs a sound, its layer, its mood, and a reference. This prevents the classic mistake of polishing one cool sound while the game has fifty silent events.</p><div class='box lab'><div class='bt'>Lab note.</div> A brief column for <code>variation count</code> matters: footsteps with one sample sound robotic. Plan 3-5 variations for any frequently repeated sound from the start.</div><div class='game'><div class='game-head'>🎮 Build This: Audit & Brief</div><div class='game-body'><p>Map the audio of a real game, then plan the audio for your own prototype.</p><ol><li>Pick a 60-second gameplay clip of any game you know well.</li><li>Watch it four times, once per layer (UI, SFX, ambience, music). Write down every sound you hear in that layer.</li><li>For each, note: diegetic or not, what it communicates, and whether it could be removed.</li><li>Now make an audio brief for a simple prototype (say, a top-down explorer). List every event needing sound: footsteps, UI click, item pickup, door, ambient wind, one music loop.</li><li>Add columns for layer, mood (1-3 words), reference sound, and variation count.</li><li>You now have a shopping list that drives every following lesson.</li></ol></div></div>"},{"id":"p9-2","part":"08 · Game Audio","nav":"Sourcing & Creating SFX","num":"8.2","kicker":"Part 08 · Lesson 2","title":"Sourcing and Creating Sound Effects: Recording, Foley, Libraries, and Synthesis","html":"<h3>Four ways to get a sound</h3><p>Every SFX you will ever use comes from one of four sources: you <strong>record</strong> the real thing, you perform <strong>foley</strong> (fake the real thing with props), you pull from a <strong>library</strong> of pre-made sounds, or you <strong>synthesize</strong> it from scratch. Real projects mix all four. The art is picking the right source for each sound.</p><h3>Field recording</h3><p>Recording real-world sound gives unmatched authenticity. You do not need a film rig: a modern phone records usable audio, and a cheap USB or handheld recorder (Zoom H1n class) is a huge upgrade. The rules that matter most:</p><ul><li><strong>Get close.</strong> Proximity beats expensive gear. Microphones capture the room as much as the source, so reduce the distance to reduce unwanted reverb.</li><li><strong>Record quiet.</strong> Background hum, traffic, and fridge noise are nearly impossible to remove cleanly. Find the quietest moment and place.</li><li><strong>Set levels with headroom.</strong> Aim for peaks around <strong>-12 dB</strong>. Digital clipping (going over 0 dB) is unrecoverable distortion.</li><li><strong>Record many takes.</strong> You want variations, and most takes have a cough, a click, or a bump you will discard.</li></ul><h3>Foley</h3><p>Foley is performing sound with surrogate props. Footsteps are recorded by a person stepping in a box of gravel or on a wood board. Classic substitutions that sound better than the real thing:</p><table><thead><tr><th>Game sound</th><th>Foley prop</th></tr></thead><tbody><tr><td>Footsteps on snow</td><td>Squeezing a bag of cornstarch</td></tr><tr><td>Fire crackle</td><td>Crumpling cellophane / crushing a chip bag</td></tr><tr><td>Bone break / punch</td><td>Snapping celery, hitting raw meat</td></tr><tr><td>Leather creak / saddle</td><td>Twisting an old wallet or belt</td></tr></tbody></table><div class='box tip'><div class='bt'>Tip.</div> Foley a footstep by recording on the actual surface the prop suggests. Step deliberately and record at least eight individual steps so you have variations to layer later.</div><h3>Free libraries</h3><p>You do not have to make everything. High-quality free sources include <strong>Freesound.org</strong> (community uploads, check licenses), <strong>BBC Sound Effects</strong> archive, and bundled engine libraries. Always verify the license: many require attribution (Creative Commons BY) and some forbid commercial use. Keep a record of every clip's source and license in your project.</p><div class='box law'><div class='bt'>Licensing.</div> Using a sound without checking its license can force you to pull a shipped game. Save the URL, author, and license text for every downloaded asset. CC0 means no attribution required; CC-BY requires credit; never assume.</div><h3>Synthesis</h3><p>Synthetic sounds are generated from oscillators and noise rather than recordings. They are ideal for UI blips, sci-fi effects, lasers, and retro game sounds because they are clean, tiny, and infinitely tweakable. A basic UI blip is a short sine or square tone with a fast attack and a quick decay envelope. Free synth tools include the synth built into any DAW, the web-based <strong>Bfxr/Sfxr</strong> (perfect for arcade-style blips and pickups), and Audacity's <code>Generate</code> menu.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>synthesize a UI blip in Audacity</span></div><div class='term-body'><span class='cm'># A simple confirmation blip from a tone + envelope</span>\n<span class='pr'>1.</span> Generate &gt; Tone: <span class='ok'>Sine</span>, frequency <span class='am'>880 Hz</span>, duration <span class='am'>0.12s</span>\n<span class='pr'>2.</span> Select the clip, Effect &gt; <span class='ok'>Fade Out</span>  <span class='cm'># gives a percussive decay</span>\n<span class='pr'>3.</span> Generate a second tone at <span class='am'>1320 Hz</span> on a new track\n<span class='pr'>4.</span> Offset it ~20ms later for a two-note &quot;ding&quot;\n<span class='pr'>5.</span> Export &gt; <span class='ok'>blip_confirm.wav</span></div></div><div class='game'><div class='game-head'>🎮 Build This: Three Sounds, Three Sources</div><div class='game-body'><p>Build a tiny SFX palette using a different source for each sound.</p><ol><li><strong>Foley:</strong> Record 8 footsteps on a real surface with your phone or a recorder, peaks near -12 dB. Save the raw file.</li><li><strong>Library:</strong> Find a clean ambience or impact on Freesound. Record its URL, author, and license in a text file in your project.</li><li><strong>Synthesis:</strong> Make a UI confirmation blip using the Audacity tone steps above, or Bfxr.</li><li>Keep all raw files unedited for now in a <code>raw/</code> folder. The next lesson polishes them.</li></ol></div></div>"},{"id":"p9-3","part":"08 · Game Audio","nav":"Editing in a DAW","num":"8.3","kicker":"Part 08 · Lesson 3","title":"Editing Audio: Trim, Fades, Layering, and Pitch in a DAW","html":"<h3>From raw take to game-ready asset</h3><p>Raw recordings are never ready to ship. They have silence at the start, room noise, inconsistent volume, and no punch. Editing turns a raw clip into a tight, reliable game asset. You can do all of it in a free tool like <strong>Audacity</strong> or any DAW (Reaper, Ableton, GarageBand, FL Studio). The five core operations are <strong>trim, normalize, fade, layer, and pitch</strong>.</p><h3>1. Trim</h3><p>The single most important edit. Game sounds must trigger instantly, so dead air at the start adds latency and makes feedback feel late. Zoom in on the waveform, find where the sound actually begins, and cut everything before it. Trim the tail too, leaving only as much as the natural decay needs.</p><div class='box tip'><div class='bt'>Tip.</div> Always leave the very first sample a hair before the transient, but never trim into the attack. Cutting too tight clicks; cutting too loose feels laggy. Zero-crossing trims (cut where the wave crosses 0) avoid clicks.</div><h3>2. Normalize / level</h3><p>Bring each clip to a consistent peak (commonly <strong>-3 to -1 dB</strong> for one-shots) so your sounds are roughly balanced before they ever reach the engine. Use <code>Effect &gt; Normalize</code> in Audacity. Remove steady background hiss with noise reduction: sample a silent region, then apply it gently. Heavy noise reduction sounds underwater, so use the lightest setting that works.</p><h3>3. Fades</h3><p>A fade is a gradual volume ramp. Tiny fades (5-20ms) at the start and end of a clip eliminate the <strong>click</strong> that happens when a waveform starts or stops mid-cycle. Longer fades shape character: a fast fade-in keeps a transient punchy, a slow fade-out makes a tail feel natural. Apply with <code>Effect &gt; Fade In / Fade Out</code>.</p><h3>4. Layering</h3><p>Big game sounds are almost always several sounds stacked. A satisfying footstep might be a <em>thud</em> (the weight) plus a <em>scuff</em> (the surface) plus a tiny <em>cloth rustle</em>. Place each on its own track, line up their transients, and balance their levels. The classic recipe: a <strong>low</strong> layer for body, a <strong>mid</strong> layer for the main character, and a <strong>high</strong> layer for detail and definition.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>layer a footstep</span></div><div class='term-body'><span class='cm'># Three tracks, transients aligned</span>\n<span class='ok'>Track 1 (low)</span>  <span class='dim'>soft heel thud, EQ low-pass ~400Hz</span>  <span class='am'>-6 dB</span>\n<span class='ok'>Track 2 (mid)</span>  <span class='dim'>the foley step itself</span>             <span class='am'>0 dB</span>\n<span class='ok'>Track 3 (high)</span> <span class='dim'>gravel/cloth scuff, slight delay</span>   <span class='am'>-9 dB</span>\n<span class='cm'># Mixdown &gt; one punchy step. Repeat with different takes for variations.</span></div></div><h3>5. Pitch</h3><p>Pitch shifting transposes a sound up or down. Two big uses: <strong>tuning</strong> (a UI ding sounds nicer in tune with your music) and <strong>variation</strong> (shifting the same footstep by &plusmn;2-4 semitones gives free variety so repeats do not sound robotic). Use <code>Effect &gt; Change Pitch</code>. Pitching down also adds weight and size; pitching up adds energy and smallness.</p><div class='box lab'><div class='bt'>Lab note.</div> Generate variations programmatically at runtime too: many engines let you randomize pitch &plusmn;5% per playback. But baking a few distinct files plus runtime randomization gives the most natural result.</div><h3>Export discipline</h3><p>Export each finished sound as its own file with a clear name: <code>footstep_grass_01.wav</code>, <code>footstep_grass_02.wav</code>, <code>ui_click.wav</code>. Consistent naming saves hours when wiring into the engine. We choose formats and sample rates in the next lesson; for now export as 44.1kHz WAV.</p><div class='game'><div class='game-head'>🎮 Build This: Polish Your Palette</div><div class='game-body'><p>Turn last lesson's raw sounds into clean, punchy assets.</p><ol><li>Open your raw footstep recording. Split out 3 of the best individual steps.</li><li>Trim each tight to the transient with a 10ms fade in and out. Normalize to about -2 dB.</li><li>Layer in a low thud and a high scuff under one step, mix down to a punchy master step.</li><li>Pitch-shift copies by -2 and +2 semitones to create <code>footstep_01/02/03.wav</code>.</li><li>Trim and fade your UI blip, tune its pitch if needed, export as <code>ui_click.wav</code>.</li><li>Export all files at 44.1kHz WAV with clear names.</li></ol></div></div>"},{"id":"p9-4","part":"08 · Game Audio","nav":"Formats & Looping","num":"8.4","kicker":"Part 08 · Lesson 4","title":"Audio Formats and Optimization: WAV vs OGG, Mono vs Stereo, and Seamless Loops","html":"<h3>The format trade-off</h3><p>Game audio balances <strong>quality, file size, CPU cost, and latency</strong>. The two formats you will use most are uncompressed <strong>WAV/PCM</strong> and compressed <strong>OGG Vorbis</strong> (or MP3/AAC on some platforms). The rule of thumb is simple:</p><table><thead><tr><th>Use case</th><th>Format</th><th>Why</th></tr></thead><tbody><tr><td>Short SFX, UI, footsteps</td><td>WAV (PCM)</td><td>Tiny anyway; no decode latency; can fire instantly and often</td></tr><tr><td>Music, long ambience, dialogue</td><td>OGG / compressed</td><td>10x smaller; the decode cost is worth it for long files</td></tr></tbody></table><p>WAV is uncompressed, so a 2-second clip is small but a 3-minute track is huge. Compressed formats shrink that 10:1 but cost CPU to decode and add a little latency, which matters for a rapid-fire footstep but not for a 90-second loop. Engines often re-import to their own format anyway; you control this with import settings (Unity: Decompress on Load / Compressed in Memory / Streaming; Godot: Force Mono, loop, compression mode; Unreal: compression quality slider).</p><h3>Mono vs stereo</h3><p>This decision saves more memory than almost anything else. <strong>Mono</strong> = one channel; <strong>stereo</strong> = two (left and right). Critical rule: <strong>any sound that will be positioned in 3D must be mono.</strong> The engine places a mono source in space and computes the left/right balance itself based on listener position. A stereo source cannot be spatialized correctly. So:</p><ul><li><strong>Mono:</strong> footsteps, weapons, impacts, anything 3D-positioned, most SFX.</li><li><strong>Stereo:</strong> music, 2D UI sounds, and wide ambience beds that are not positional.</li></ul><div class='box tip'><div class='bt'>Tip.</div> Importing a stereo footstep into a 3D game wastes double the memory and breaks attenuation. In Godot tick <code>Force Mono</code>; in Unity tick <code>Force To Mono</code> on the import settings.</div><h3>Sample rate and bit depth</h3><p>Sample rate is how many times per second the audio is measured. <strong>44.1kHz</strong> (CD quality) is the standard for music and most SFX; <strong>48kHz</strong> aligns with video. You rarely need higher. You can drop very dull sounds (a low rumble, a muffled thud) to 22kHz to save space since they have no high frequencies to lose. Keep <strong>16-bit</strong> for delivery; 24-bit is for editing headroom only.</p><h3>Seamless looping</h3><p>A loop that clicks or stutters at the seam ruins immersion. Two things cause a bad loop: a <strong>discontinuity</strong> in the waveform at the loop point (click), and an <strong>audible event</strong> that does not line up (gap or bump). To author a seamless loop:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>author a seamless ambience loop</span></div><div class='term-body'><span class='pr'>1.</span> <span class='dim'>Find a region with consistent texture (no unique one-off events).</span>\n<span class='pr'>2.</span> <span class='dim'>Trim start AND end to zero-crossings to avoid clicks.</span>\n<span class='pr'>3.</span> <span class='ok'>Crossfade the tail over the head:</span> copy the last ~1s, fade it\n   <span class='dim'>over the first ~1s so the seam blends. (Audacity: paste + Fade.)</span>\n<span class='pr'>4.</span> <span class='dim'>Test by looping playback. Listen for the seam at the boundary.</span>\n<span class='pr'>5.</span> <span class='ok'>Export as OGG</span>, and set the import loop flag in the engine.\n<span class='bad'># Avoid MP3 for loops: it can pad silence at the ends, breaking seams.</span></div></div><div class='box danger'><div class='bt'>Watch out.</div> MP3 and some AAC encoders add tiny silent padding to the start/end of files, which creates an audible gap on every loop. Use OGG Vorbis or WAV for anything that loops.</div><h3>Loudness across formats</h3><p>Lossy compression slightly changes peaks; if you normalized to exactly 0 dB before encoding, the OGG can clip. Leave 1 dB of headroom (normalize to -1 dB) before exporting compressed audio.</p><div class='game'><div class='game-head'>🎮 Build This: Export the Right Way</div><div class='game-body'><p>Make correct format and channel choices for two different assets.</p><ol><li>Take a 30-60s ambience bed (wind, room tone). Author a seamless loop using the crossfade steps above.</li><li>Normalize it to -1 dB, export as <strong>stereo OGG</strong>, and verify the seam is inaudible on repeat.</li><li>Take your three footsteps and UI click. Export them as <strong>mono WAV, 44.1kHz, 16-bit</strong>.</li><li>Write one sentence per file justifying its format and channel count.</li></ol></div></div>"},{"id":"p9-5","part":"08 · Game Audio","nav":"Implementing in Engines","num":"8.5","kicker":"Part 08 · Lesson 5","title":"Implementing Audio in Engines: Event Triggers, 3D Spatial Sound, and Buses","html":"<h3>From file to playing sound</h3><p>An audio file in your project does nothing until something <strong>triggers</strong> it. Implementation is wiring sounds to game events, choosing whether they play in 2D or 3D space, and routing them through <strong>buses</strong> so you can mix them. The concepts are identical across engines; only the API names differ.</p><h3>Triggering on events</h3><p>You play a sound when a game event fires: a button is pressed, a foot plants, a bullet hits. Two patterns dominate. <strong>One-shots</strong> fire and forget (footstep, click). <strong>Looping sources</strong> start and stop with state (engine hum while driving, ambience while in a zone). For footsteps, the cleanest trigger is the animation system: an animation event on the frame the foot touches the ground. Simpler prototypes trigger on a timer while moving.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>trigger a footstep with pitch variation (Godot 4)</span></div><div class='term-body'><span class='cm'># AudioStreamPlayer3D on the player, footsteps[] = your 3 WAVs</span>\n<span class='pr'>func</span> <span class='ok'>play_footstep</span>():\n    $Step.stream = footsteps[<span class='am'>randi</span>() % footsteps.size()]\n    $Step.pitch_scale = <span class='am'>randf_range</span>(0.95, 1.05)  <span class='cm'># subtle variety</span>\n    $Step.play()</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>UI click on a button (Unity C#)</span></div><div class='term-body'><span class='cm'>// AudioSource set to 2D (Spatial Blend = 0), assigned to UI bus</span>\n<span class='pr'>public</span> <span class='ok'>AudioSource</span> uiSource;\n<span class='pr'>public</span> <span class='ok'>AudioClip</span> click;\n<span class='cm'>// Hook OnClick in the Button inspector:</span>\n<span class='pr'>public void</span> <span class='ok'>OnButtonClick</span>() { uiSource.PlayOneShot(click); }</div></div><h3>2D vs 3D spatial audio</h3><p><strong>2D sound</strong> plays at a fixed left/right balance regardless of where things are; it is for UI and music. <strong>3D sound</strong> is positioned in the world: the engine pans and attenuates it based on the listener (usually the camera or player). Footsteps, weapons, and world objects should be 3D so players can locate them by ear.</p><table><thead><tr><th>Engine</th><th>2D control</th><th>3D control</th></tr></thead><tbody><tr><td>Unity</td><td>Spatial Blend = 0</td><td>Spatial Blend = 1, set rolloff curve</td></tr><tr><td>Godot</td><td>AudioStreamPlayer (2D)</td><td>AudioStreamPlayer3D + Attenuation</td></tr><tr><td>Unreal</td><td>No attenuation asset</td><td>Attenuation Settings asset</td></tr></tbody></table><h3>Attenuation</h3><p>Attenuation is how a 3D sound fades with distance. You set a <strong>min distance</strong> (full volume inside this radius) and a <strong>max distance</strong> (silent beyond it), plus a falloff curve. <strong>Logarithmic</strong> rolloff is realistic; <strong>linear</strong> is simpler and easier to tune for gameplay readability. Set the max distance so distant sounds do not clutter the mix but important nearby ones stay clear.</p><div class='box tip'><div class='bt'>Tip.</div> One listener only. Make sure exactly one AudioListener (Unity) / Listener / Camera (Godot, Unreal) is active, usually on the camera or player. Two listeners cause doubled, phasey audio.</div><h3>Buses and mixing</h3><p>A <strong>bus</strong> (or mixer group) is a channel that many sounds route into, so you can control them as a group. Set up a bus per layer: <code>Master</code> &rarr; (<code>Music</code>, <code>SFX</code>, <code>UI</code>, <code>Ambience</code>). Now a single SFX volume slider in your options menu controls every gameplay sound at once, and you can apply effects (reverb, EQ, compression) to a whole group. In Godot you add buses in the Audio panel and set each player's <code>Bus</code> property; in Unity you create groups in an AudioMixer and assign <code>Output</code>; in Unreal you use Submixes and Sound Classes.</p><div class='box lab'><div class='bt'>Lab note.</div> Always route through buses from day one, even with three sounds. Retrofitting bus routing late is tedious, and you will want it the moment you build an options menu or set up ducking.</div><div class='game'><div class='game-head'>🎮 Build This: Wire the SFX</div><div class='game-body'><p>Get your edited sounds playing in an engine with proper routing.</p><ol><li>Create buses: Master with child buses Music, SFX, UI, Ambience.</li><li>Add a 3D audio source to your player; assign your 3 footstep WAVs, route to the SFX bus. Trigger one per step (animation event or movement timer) with random selection and &plusmn;5% pitch.</li><li>Set attenuation: min distance ~1m, max ~20m, so a distant character's steps fade out.</li><li>Add a 2D audio source on a UI button; play <code>ui_click.wav</code> on press, routed to the UI bus.</li><li>Walk toward and away from a sound source and confirm the footsteps attenuate and pan correctly.</li></ol></div></div>"},{"id":"p9-6","part":"08 · Game Audio","nav":"Composing Game Music","num":"8.6","kicker":"Part 08 · Lesson 6","title":"Composing Simple Game Music: Loops, Motifs, and Tension and Release","html":"<h3>Music that survives repetition</h3><p>Game music is different from a song. A song plays once; a game loop plays for hours. The central challenge of composing for games is writing music that <strong>does not fatigue</strong> when repeated. That changes how you write: simpler, more spacious, motif-driven, and arranged to support gameplay rather than demand attention.</p><h3>You do not need to be a trained composer</h3><p>A DAW (GarageBand, Reaper, LMMS, FL Studio) plus free instrument plugins is enough. You will work with a <strong>MIDI piano roll</strong>, drawing notes on a grid, so you do not need to play an instrument. The musical building blocks are few: pick a <strong>key</strong>, build chords from its scale, write a <strong>motif</strong>, and arrange.</p><h3>Motif: the memorable hook</h3><p>A <strong>motif</strong> is a short, recognizable musical idea, often just 3-5 notes. Think of the most famous game themes; their hooks are tiny. A motif gives a loop identity and lets you create variation by transforming the same idea (move it up, change its rhythm, harmonize it) instead of writing endless new material. Write one short motif and reuse it. Repetition with variation feels intentional; random new melodies feel noisy.</p><h3>Harmony, tension, and release</h3><p>Music creates emotion by building <strong>tension</strong> and then <strong>releasing</strong> it. The simplest engine for this is a chord progression that moves away from the home chord (<strong>tonic</strong>) and returns. A reliable, pleasant loop in a minor key:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>a calm loopable progression (A minor)</span></div><div class='term-body'><span class='cm'># 4 bars, one chord per bar, ~80 BPM</span>\n<span class='ok'>Am</span>  <span class='dim'>(home / rest)</span>  &rarr;  <span class='ok'>F</span>  <span class='dim'>(lift, warmth)</span>\n<span class='ok'>C</span>   <span class='dim'>(brightness)</span>  &rarr;  <span class='ok'>G</span>  <span class='dim'>(tension, wants to resolve)</span>\n<span class='cm'># G pulls back to Am, so the loop point feels natural, not abrupt.</span>\n<span class='am'>Tip:</span> <span class='dim'>end the loop on G so returning to Am at bar 1 = release.</span></div></div><p>The trick for a seamless musical loop: arrange so the <strong>last chord wants to move to the first chord</strong>. The harmonic pull across the loop seam makes the repeat feel like a continuation rather than a restart.</p><h3>Arrangement for low fatigue</h3><ul><li><strong>Leave space.</strong> Constant busy melody tires the ear fast. Let the motif breathe; use sustained pads and gaps.</li><li><strong>Limit the high-attention layer.</strong> A prominent lead melody draws focus. For background loops, keep melody sparse and lean on harmony and texture.</li><li><strong>Match the gameplay.</strong> Exploration music is calm and slow; combat is driving and dense. Tempo and density carry mood more than melody.</li><li><strong>Keep loops longer than they feel.</strong> A 30-60 second loop fatigues far less than an 8-second one, even though both repeat.</li></ul><div class='box tip'><div class='bt'>Tip.</div> Compose to a <strong>grid and fixed tempo</strong> from the start. Bar-aligned, tempo-locked music is essential for the adaptive layering and crossfading you will build next lesson.</div><h3>Mixing the loop</h3><p>Keep the music mix simple: bass, a pad/harmony, a light melody, and optionally percussion. Pan layers slightly for width, leave headroom (peaks around -6 dB so SFX have room to sit on top), and export as a seamless loop using the techniques from Lesson 8.4. Music is usually stereo and OGG.</p><div class='box lab'><div class='bt'>Lab note.</div> If you cannot write a melody, a loop can be just a bass line plus a pad plus rhythmic texture. Atmospheric exploration music often has no real melody at all, which also makes it less fatiguing.</div><div class='game'><div class='game-head'>🎮 Build This: A Loop With a Motif</div><div class='game-body'><p>Compose a short, seamless background loop.</p><ol><li>In a DAW, set a tempo (e.g. 80 BPM) and pick a minor key.</li><li>Lay down a 4-bar chord progression that ends wanting to return to the home chord (e.g. Am-F-C-G).</li><li>Write a 3-5 note motif over it; keep it sparse and leave space.</li><li>Add a bass line following the chord roots and a soft pad for warmth.</li><li>Make it loop: ensure the end leads musically into the start, and that any reverb tail does not cut off abruptly.</li><li>Mix with peaks around -6 dB, export as a seamless stereo OGG. Loop it for 5 minutes and check that it does not grate.</li></ol></div></div>"},{"id":"p9-7","part":"08 · Game Audio","nav":"Adaptive Music & Middleware","num":"8.7","kicker":"Part 08 · Lesson 7","title":"Adaptive Music and Middleware: Vertical Layering, Horizontal Re-sequencing, FMOD vs Wwise","html":"<h3>Music that responds to the game</h3><p>A static loop ignores what the player is doing. <strong>Adaptive (or dynamic) music</strong> changes with the game state: it intensifies in combat, calms when you explore, swells at a discovery. There are two fundamental techniques, and most games use both.</p><h3>Vertical layering (re-orchestration)</h3><p>You compose multiple layers that all play in <strong>perfect sync</strong> on the same timeline and the same chord progression. You then change the music by fading layers in and out. A calm scene plays just the pad and bass; as danger rises you fade in a percussion layer, then a lead/strings layer. Because all layers share tempo and harmony, they can be mixed in any combination at any moment without a transition point.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>vertical layers, one shared 60s timeline</span></div><div class='term-body'><span class='ok'>Layer A (base)</span>   <span class='dim'>pad + bass</span>          <span class='am'>always on</span>\n<span class='ok'>Layer B (tension)</span> <span class='dim'>percussion + arp</span>    <span class='am'>fade in at intensity &gt; 0.5</span>\n<span class='ok'>Layer C (combat)</span>  <span class='dim'>lead + heavy drums</span>  <span class='am'>fade in at intensity &gt; 0.8</span>\n<span class='cm'># All three loop in sync. Crossfade volumes, never restart playback.</span></div></div><h3>Horizontal re-sequencing</h3><p>Here you have distinct music <strong>segments</strong> (explore, combat, victory) and you switch between them over time. The key problem is the <strong>transition</strong>: jumping mid-bar sounds jarring. Solutions include waiting for the next bar or beat to switch (<strong>quantized transitions</strong>), and using short <strong>transition stingers</strong> to bridge segments. Horizontal works well for distinct gameplay phases; vertical works well for a continuously variable intensity.</p><table><thead><tr><th></th><th>Vertical layering</th><th>Horizontal re-sequencing</th></tr></thead><tbody><tr><td>Changes</td><td>Density / orchestration</td><td>Which section plays</td></tr><tr><td>Best for</td><td>Continuous intensity (a threat meter)</td><td>Discrete states (explore vs boss)</td></tr><tr><td>Transition</td><td>Instant crossfade, always in sync</td><td>Needs quantization or stingers</td></tr></tbody></table><h3>Middleware vs engine-native</h3><p><strong>Middleware</strong> is dedicated audio software that sits between your sounds and the engine. The two industry standards are <strong>FMOD</strong> and <strong>Wwise</strong>. Both let sound designers build adaptive behavior (layers, transitions, randomization, real-time parameters, mixing) in their own authoring tool, then the programmer just sends simple events and parameters from the game. This decouples audio work from code.</p><table><thead><tr><th>Option</th><th>Strengths</th><th>Consider when</th></tr></thead><tbody><tr><td>Engine-native (Unity/Godot/Unreal audio)</td><td>No extra integration; free; fine for simple needs</td><td>Small projects, basic layering, learning</td></tr><tr><td>FMOD</td><td>Approachable, great for music systems, free for small budgets</td><td>Indie to mid-size, music-heavy games</td></tr><tr><td>Wwise</td><td>Deep, powerful profiler, huge AAA adoption</td><td>Large projects, big SFX counts, complex mixing</td></tr></tbody></table><div class='box tip'><div class='bt'>Tip.</div> For your first adaptive system, engine-native is perfect. The concepts (synced layers, crossfading, parameters) transfer directly to FMOD/Wwise later. Do not adopt middleware until you feel native audio limiting you.</div><h3>Building vertical layering natively</h3><p>The implementation is straightforward. Start both layers playing at the same time (so they stay sample-synced) and animate their <strong>volumes</strong> with an intensity value. Never start a layer late, or it will be out of phase.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>2-layer crossfade by intensity (Godot 4)</span></div><div class='term-body'><span class='cm'># Two AudioStreamPlayers, both .play() at start, both looping in sync</span>\n<span class='pr'>func</span> <span class='ok'>set_intensity</span>(t: float):  <span class='cm'># t = 0.0 calm .. 1.0 intense</span>\n    $Base.volume_db   = <span class='am'>linear_to_db</span>(1.0)        <span class='cm'># base always full</span>\n    $Layer.volume_db  = <span class='am'>linear_to_db</span>(clamp(t, 0, 1)) <span class='cm'># fade in tension</span>\n<span class='cm'># Smooth t over ~1s with lerp so the change is a crossfade, not a jump.</span></div></div><div class='game'><div class='game-head'>🎮 Build This: 2-Layer Adaptive Loop</div><div class='game-body'><p>Turn your composition into a system that responds to game state.</p><ol><li>From last lesson's loop, bounce two synced versions on the same timeline: a <strong>base</strong> (pad + bass) and an <strong>intensity</strong> layer (add percussion + lead). Same tempo, length, and loop point.</li><li>Export both as seamless OGG loops.</li><li>In the engine, load both into separate audio sources on the Music bus. Start both playing and looping at the same moment.</li><li>Add an <code>intensity</code> variable (0-1). Map it to the intensity layer's volume; keep the base at full.</li><li>Smoothly lerp intensity over ~1 second so transitions crossfade. Bind it to a key or a proximity trigger (near enemy = 1, far = 0).</li><li>Test: the music should thicken near danger and thin out when safe, with no restart or sync drift.</li></ol></div></div>"},{"id":"p9-8","part":"08 · Game Audio","nav":"Mixing for Games","num":"8.8","kicker":"Part 08 · Lesson 8","title":"Mixing for Games: Ducking, Loudness, and the Final Soundscape","html":"<h3>The mix is where it all comes together</h3><p>You can have great sounds and still have a bad soundscape if the <strong>mix</strong> is wrong: music drowning footsteps, a UI click that pierces, ambience so loud nobody hears dialogue. Mixing for games is balancing every layer so the <strong>most important sound at any moment is always audible</strong>, and the whole output sits at a comfortable, consistent loudness.</p><h3>Set a level hierarchy</h3><p>Decide what matters most and build the mix around it. A common priority order: <strong>dialogue/critical cues &gt; key SFX (the player's own actions) &gt; music &gt; ambience &gt; minor SFX</strong>. Set your bus levels to reflect that. Music in particular is almost always too loud in first drafts; pull it back until SFX read clearly.</p><table><thead><tr><th>Bus</th><th>Typical relationship</th></tr></thead><tbody><tr><td>SFX (player actions)</td><td>Reference level, the loudest gameplay element</td><td></td></tr><tr><td>Music</td><td>Sits under SFX; ducks when key sounds play</td><td></td></tr><tr><td>Ambience</td><td>Quiet bed, felt more than heard</td><td></td></tr><tr><td>UI</td><td>Clear but not piercing</td><td></td></tr></tbody></table><h3>Ducking: making room automatically</h3><p><strong>Ducking</strong> lowers one bus when another plays, so important sounds cut through. The classic use is ducking <strong>music and ambience under dialogue</strong> or under loud SFX. It is implemented with a <strong>sidechain compressor</strong>: the dialogue bus signal triggers volume reduction on the music bus. When dialogue stops, music returns. This keeps music full when it can be, but gets out of the way the instant something important happens.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sidechain duck: music under dialogue</span></div><div class='term-body'><span class='cm'># On the Music bus, add a Compressor in sidechain mode:</span>\n<span class='ok'>Sidechain input</span> = Dialogue bus\n<span class='ok'>Threshold</span>       <span class='dim'>set so dialogue triggers it</span>\n<span class='ok'>Ratio</span>           <span class='am'>4:1</span>  <span class='dim'>(amount of duck)</span>\n<span class='ok'>Attack</span>          <span class='am'>~20ms</span> <span class='dim'>(fast, so it ducks promptly)</span>\n<span class='ok'>Release</span>         <span class='am'>~300ms</span> <span class='dim'>(smooth return after dialogue)</span>\n<span class='cm'># Unity: AudioMixer + Duck Volume effect. FMOD/Wwise: sidechain/ducking built in.</span></div></div><div class='box tip'><div class='bt'>Tip.</div> No dialogue in your game? Duck music slightly under important SFX (hits, pickups, alerts) instead. A small, fast duck makes every key action pop without you turning the music down permanently.</div><h3>Loudness: the target that matters</h3><p>Loudness is not peak level; it is <strong>perceived</strong> volume measured in <strong>LUFS</strong> (Loudness Units Full Scale). Mixing to a consistent integrated loudness keeps players from constantly reaching for the volume knob and meets platform requirements. Useful targets:</p><ul><li><strong>-14 LUFS</strong> integrated is a common, sensible target for game output (also the streaming norm).</li><li>Keep <strong>true peak</strong> below <strong>-1 dBTP</strong> to avoid clipping after compression/encoding.</li><li>Preserve <strong>dynamic range</strong>: games are not loudness-war pop tracks. A quiet exploration scene should be quieter than combat. Do not crush everything to maximum.</li></ul><div class='box danger'><div class='bt'>Watch out.</div> Do not mix loud. Set a comfortable monitoring volume and leave it. If you mix at high volume, everything sounds good and balanced; played back quietly it falls apart. Mix at a moderate, fixed level and check on different devices (headphones, laptop speakers, phone).</div><h3>Metering and final delivery</h3><p>Put a <strong>loudness meter</strong> on the master bus (free options exist for every DAW; engines and middleware have built-in meters too). Play through representative gameplay and watch the integrated LUFS over time. Adjust the master so typical gameplay sits near your target, then verify true peak stays under -1 dBTP. Finally, do a <strong>mono check</strong>: collapse to mono and confirm nothing important disappears (phase cancellation between stereo layers can erase sounds in mono playback on some devices).</p><div class='box lab'><div class='bt'>Lab note.</div> Add a brick-wall <strong>limiter</strong> as the last effect on the master to catch stray peaks, but use it as a safety net, not as a way to make the whole game louder. The limiter should barely engage during normal play.</div><div class='game'><div class='game-head'>🎮 Build This: Final Mix Pass</div><div class='game-body'><p>Mix your full prototype soundscape into a cohesive whole.</p><ol><li>With footsteps, UI click, ambience loop, and 2-layer adaptive music all running, set bus levels: SFX clear and present, music under it, ambience as a quiet bed.</li><li>Add ducking: a fast, light duck on the Music bus triggered by key SFX (or dialogue if you have it).</li><li>Put a loudness meter on the master. Play through calm and intense states; aim for roughly -14 LUFS integrated.</li><li>Add a limiter on the master with a ceiling of -1 dBTP as a safety net.</li><li>Check the mix on headphones, laptop speakers, and in mono. Confirm footsteps stay audible during music, and nothing clips or vanishes.</li><li>Adjust until the important sound is always readable in every game state.</li></ol></div></div>"},{"id":"p7-1","part":"09 · Ship It","nav":"Builds Per Platform","num":"9.1","kicker":"Part 09 · Lesson 1","title":"Building & Exporting for Every Platform","html":"<h3>Debug vs release builds</h3><p>A <strong>debug build</strong> keeps symbols, assertions, verbose logging, and the engine's hot-reload hooks. It is bigger, slower, and only for you. A <strong>release build</strong> strips debug symbols, enables optimizations, disables the in-engine console, and is what players install. The single most common shipping mistake is sending a debug build to a store: it leaks stack traces, runs at half the framerate, and may include test assets. Always produce both, but only ship the release.</p><p>The second most common mistake is testing only on your dev machine. Your machine has the engine, the SDKs, fonts, codecs, and a graphics driver you updated last week. A player's machine has none of that. <em>You must run the release build on a clean machine</em> (or a fresh VM / a friend's PC) with no dev tools installed.</p><h3>The export pipeline conceptually</h3><p>Every engine does the same four things when it exports: (1) bundle your scripts/scenes/assets into a package format, (2) link them against a platform-specific runtime binary, (3) embed metadata (icon, name, version, permissions), and (4) sign/package the result for the target OS. Knowing these stages helps you debug: a black screen usually means assets did not bundle; a crash on launch usually means the runtime/architecture is wrong; a refusal to open usually means signing.</p><h4>Godot (export templates + presets)</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='cm'># headless export from CI or command line</span>\n<span class='pr'>$</span> godot --headless --export-debug \"Windows Desktop\" build/game_debug.exe\n<span class='pr'>$</span> godot --headless --export-release \"Windows Desktop\" build/game.exe\n<span class='cm'># macOS must be a signed .app or notarized .dmg to open without warnings</span>\n<span class='pr'>$</span> godot --headless --export-release \"macOS\" build/game.dmg</div></div><p>In the editor: <code>Project &gt; Export</code>, add a preset per platform, install export templates first (<code>Editor &gt; Manage Export Templates</code>), set the icon and version, then export. The <em>Embed PCK</em> option keeps everything in one file.</p><h4>Unity</h4><p><code>File &gt; Build Settings</code>, pick the platform, click <em>Switch Platform</em> (this re-imports assets and can take a while), set <em>Development Build</em> for debug, uncheck it for release. <em>Player Settings</em> holds icon, company name, bundle identifier, scripting backend (IL2CPP for release on most platforms), and target architecture.</p><h4>Web (WASM/HTML5)</h4><p>Web builds need the right MIME types and headers. WASM threads require <code>Cross-Origin-Opener-Policy: same-origin</code> and <code>Cross-Origin-Embedder-Policy: require-corp</code>, or the game silently fails to start. Test the exported folder over HTTP, never by double-clicking <code>index.html</code> (browsers block module/WASM loads from <code>file://</code>).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>serve-web-build</span></div><div class='term-body'><span class='pr'>$</span> cd build/web\n<span class='pr'>$</span> python3 -m http.server 8080\n<span class='ok'>Serving HTTP on 0.0.0.0 port 8080</span>\n<span class='cm'># open http://localhost:8080 in a fresh browser profile</span></div></div><div class='box danger'><div class='bt'>Architecture mismatch is silent and deadly.</div> An ARM64 build will not run on x86, and a 64-bit build will not run on 32-bit Windows. For macOS, ship a Universal binary (x86_64 + arm64) or Apple Silicon users get nothing. Always confirm the target arch matches the test machine.</div><h3>Versioning and verification</h3><p>Stamp every build with a version string (<code>1.0.3+build142</code>) and show it on the title screen. When a player reports a bug, the version tells you exactly which binary they ran. Keep a checklist: build, copy to clean machine, launch, play five minutes, check the version string, confirm no console window pops up, confirm saves write to a real user folder (not your project directory).</p><div class='box tip'><div class='bt'>Clean machine = clean truth.</div> A spare laptop, a fresh VM snapshot, or a cloud Windows instance you reset each test is worth more than any amount of in-editor testing for catching missing-dependency crashes.</div><div class='game'><div class='game-head'>🎮 Build This: Clean-Machine Verification</div><div class='game-body'><p>Goal: prove your game runs for a stranger, not just for you.</p><ol><li>Export a <strong>debug</strong> build and a <strong>release</strong> build for one platform.</li><li>Stamp both with a visible version string on the title screen.</li><li>Copy the release build to a clean machine or fresh VM with no engine/SDKs installed.</li><li>Launch it; confirm no dev console, correct icon, correct arch, and saves go to the OS user folder.</li><li>Play five minutes and write down anything that differs from your dev machine.</li></ol></div></div>"},{"id":"p7-2","part":"09 · Ship It","nav":"itch.io","num":"9.2","kicker":"Part 09 · Lesson 2","title":"Publishing on itch.io, Step by Step","html":"<h3>Why start on itch.io</h3><p>itch.io is the lowest-friction storefront in games: no application fee, no review queue, no gatekeeper. You can have a live page in fifteen minutes. It is the ideal place to publish jam games, demos, prototypes, and early commercial releases, and it is where you should make your <em>first</em> public release to learn the mechanics of shipping without Steam's $100 fee and review delay.</p><h3>Create the project</h3><p>From your dashboard choose <em>Create new project</em>. The key fields:</p><ul><li><strong>Title</strong> and <strong>Project URL</strong> (the slug; pick it carefully, changing it later breaks links).</li><li><strong>Classification</strong>: Game.</li><li><strong>Kind of project</strong>: <em>Downloadable</em> for desktop binaries, or <em>HTML</em> for a web build that plays in the browser.</li><li><strong>Pricing</strong>: <em>$0 or donate</em> (name-your-price), a fixed price, or <em>No payments</em>. Name-your-price is the friendliest default for early work.</li></ul><h3>Upload the build</h3><p>For downloadable games, zip each platform build into its own archive (<code>game-win.zip</code>, <code>game-mac.zip</code>, <code>game-linux.zip</code>). Upload each, then tag each file with its platform using the checkboxes (Windows / macOS / Linux). This makes the itch desktop app and the download buttons work correctly.</p><div class='box danger'><div class='bt'>Zip the contents, not the parent folder twice.</div> Players should unzip and immediately see <code>game.exe</code> (or a single folder containing it). A double-nested zip or a zip that only contains a <code>.pck</code> with no executable is the number-one itch support complaint.</div><h4>HTML5 web games</h4><p>For an HTML build, your zip's <strong>root must contain <code>index.html</code></strong>. Check <em>This file will be played in the browser</em>. Set the viewport dimensions to match your game's resolution and enable <em>Mobile friendly</em> and <em>Fullscreen button</em> if relevant. itch serves these with the COOP/COEP headers needed for threaded WASM if you enable <em>SharedArrayBuffer support</em> in the embed options.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>web-build.zip layout</span></div><div class='term-body'>web-build.zip\n├── index.html   <span class='ok'>← required at root</span>\n├── game.wasm\n├── game.js\n└── game.pck</div></div><h3>Page craft on itch</h3><p>itch pages support a cover image (<strong>630×500</strong> recommended, shown in listings), a banner, embedded screenshots, GIFs, and YouTube/Vimeo trailers. The description uses a simple rich-text editor. Above the fold you need: a one-sentence hook, an animated GIF showing the core loop, and the download/play button. Add at least three screenshots and a 30-second GIF — motion sells far better than static shots on itch.</p><h3>Publishing and butler</h3><p>Set <em>Visibility &amp; access</em> to <strong>Draft</strong> while you work, <strong>Restricted</strong> for a private test link you can DM to testers, and <strong>Public</strong> when ready. A restricted page is the perfect way to verify the full purchase/download flow before launch.</p><p>For repeated updates, install <strong>butler</strong>, itch's command-line uploader. It does delta patching, so updates only transfer changed bytes:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>butler</span></div><div class='term-body'><span class='pr'>$</span> butler login\n<span class='pr'>$</span> butler push build/win user/game-slug:windows\n<span class='pr'>$</span> butler push build/web user/game-slug:html5\n<span class='ok'>✓ Build is now processing, should be up in a bit.</span>\n<span class='pr'>$</span> butler status user/game-slug:windows</div></div><p>The <code>:channel</code> suffix (e.g. <code>:windows</code>, <code>:html5</code>) maps to the platform tags automatically based on the binaries it finds.</p><div class='box tip'><div class='bt'>Channels beat manual uploads.</div> Once you wire butler into your build script, shipping an update is one command. This habit pays off enormously when you move to Steam's depot system, which works the same way.</div><div class='game'><div class='game-head'>🎮 Build This: Ship a Test Release to itch.io</div><div class='game-body'><p>Goal: a real, downloadable/playable release behind a private link.</p><ol><li>Create the project; set Kind to Downloadable or HTML and pick a permanent slug.</li><li>Upload zipped builds (root-level executable / <code>index.html</code>) and tag each platform.</li><li>Add a 630×500 cover, three screenshots, and one GIF of the core loop.</li><li>Set pricing (name-your-price is fine) and visibility to <strong>Restricted</strong>.</li><li>Open the link on another device, download/play it end to end, then flip to Public.</li></ol></div></div>"},{"id":"p7-3","part":"09 · Ship It","nav":"Steam & Steamworks","num":"9.3","kicker":"Part 09 · Lesson 3","title":"Steam: Steamworks, the Page & Wishlists","html":"<h3>The Steamworks onramp</h3><p>Steam is where most PC games make most of their money, and wishlists are its engine. Getting on Steam: create a Steamworks partner account, pay the <strong>$100 Steam Direct recoupable fee per app</strong> (returned after you earn $1,000), complete tax and bank forms (this can take days — start early), then you get an <strong>App ID</strong>. The fee is per game, not per account.</p><h3>App admin and the store page</h3><p>Inside the App's admin you build the store page in the <em>Store Presence</em> section. The required assets and their exact sizes are the part developers always get wrong:</p><table><thead><tr><th>Asset</th><th>Size (px)</th><th>Where it shows</th></tr></thead><tbody><tr><td>Header capsule</td><td>460×215</td><td>Top of page, search results</td></tr><tr><td>Small capsule</td><td>231×87</td><td>Search lists, recommendations</td></tr><tr><td>Main capsule</td><td>616×353</td><td>Front-page features</td></tr><tr><td>Vertical capsule</td><td>374×448</td><td>Sales, daily deals</td></tr><tr><td>Library capsule</td><td>600×900</td><td>Player's library grid</td></tr><tr><td>Screenshots</td><td>1920×1080</td><td>Page gallery (min 5)</td></tr></tbody></table><div class='box danger'><div class='bt'>The capsule must be readable at thumbnail size.</div> Steam shows your small capsule the size of a postage stamp. If the logo isn't legible and the art isn't instantly readable when scaled down, you lose clicks. Put the title big, use one strong focal image, avoid busy backgrounds.</div><h3>Trailer, description, tags</h3><p>Upload a <strong>trailer</strong> (the first video — Steam autoplays it muted, so the first 3 seconds must show gameplay, not your logo). Write a <strong>short description</strong> (the blurb under the capsule, ~300 chars, your elevator pitch) and a <strong>long description</strong> with embedded GIFs/headers. Tags drive Steam's discovery algorithm: pick the 5-7 tags that genuinely match your game; let players add the rest. Wrong tags poison your recommendations.</p><h3>Wishlists are the whole game</h3><p>Wishlists are the single most important pre-launch metric. They drive Steam's algorithmic visibility, and on launch day every wishlister gets an email. A launch-day wishlist-to-sale conversion of 10-20% in week one is typical for a healthy page. The strategy: <strong>get the page live as early as possible</strong> (often a year before launch) so wishlists accrue for the entire dev period, because you cannot collect a wishlist before the page exists.</p><div class='box law'><div class='bt'>Launch your store page, not your game, first.</div> A &quot;Coming Soon&quot; page with a trailer and a wishlist button is the foundation of every PC marketing plan. Aim to enter launch with a strong wishlist base; many successful indies target 7,000+ before launching.</div><h3>Builds, depots, and SteamPipe</h3><p>You upload builds via <strong>SteamPipe</strong> using <code>steamcmd</code> and VDF scripts. A <em>depot</em> is a bucket of files (often one per OS); a <em>build</em> assigns depot manifests to a <em>branch</em> (e.g. <code>default</code> or a private <code>beta</code>).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>app_build_480.vdf</span></div><div class='term-body'>\"appbuild\"\n{\n  \"appid\" \"480\"\n  \"desc\" \"v1.0.0 launch\"\n  \"buildoutput\" \"output/\"\n  \"contentroot\" \"build/win/\"\n  \"setlive\" \"\"  <span class='cm'>// blank = do NOT auto-publish; set branch manually</span>\n  \"depots\" { \"481\" \"depot_481.vdf\" }\n}</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>upload</span></div><div class='term-body'><span class='pr'>$</span> steamcmd +login partner_account +run_app_build app_build_480.vdf +quit\n<span class='ok'>Successfully finished AppID build</span></div></div><p>Set the build live on a private <code>beta</code> branch first, password-protect it, and test the full Steam install path before ever touching <code>default</code>.</p><div class='game'><div class='game-head'>🎮 Build This: Draft Your Steam Page</div><div class='game-body'><p>Goal: a review-ready &quot;Coming Soon&quot; page that collects wishlists.</p><ol><li>Register the Steamworks app, pay the $100, and finish tax/bank forms.</li><li>Produce the five capsule sizes (460×215, 231×87, 616×353, 374×448, 600×900) and 5+ 1080p screenshots.</li><li>Upload a trailer whose first 3 seconds are gameplay; write short + long descriptions.</li><li>Pick 5-7 accurate tags; set a release window so wishlists open.</li><li>Submit the page for Valve review and confirm the wishlist button is live.</li></ol></div></div>"},{"id":"p7-4","part":"09 · Ship It","nav":"Mobile, Web & Console","num":"9.4","kicker":"Part 09 · Lesson 4","title":"Mobile, Web Hosting & a Console Overview","html":"<h3>App Store (iOS)</h3><p>Publishing to iOS requires the <strong>Apple Developer Program ($99/year)</strong>, a Mac with Xcode, and code signing. The flow: in App Store Connect create the app record with a unique <strong>bundle identifier</strong> (<code>com.studio.game</code>), build/archive in Xcode, upload via Xcode or Transporter, then submit for <strong>App Review</strong>. Review typically takes a day or two and is a real human who will reject you for crashes, broken links in metadata, missing privacy labels, or misuse of IAP.</p><p>You must provide: an app icon (1024×1024, no alpha, no rounded corners — Apple rounds them), screenshots at exact device sizes (e.g. 6.7&quot; iPhone, 12.9&quot; iPad), a privacy policy URL, an age rating questionnaire, and a <strong>privacy nutrition label</strong> declaring what data you collect.</p><h3>Google Play (Android)</h3><p>Google Play requires a <strong>one-time $25</strong> developer registration. Modern Play requires the <strong>Android App Bundle (.aab)</strong>, not a raw APK; Google generates per-device APKs from it. You must <strong>sign</strong> the bundle (enroll in Play App Signing so Google manages the upload/release keys).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>build & sign aab</span></div><div class='term-body'><span class='pr'>$</span> ./gradlew bundleRelease\n<span class='pr'>$</span> jarsigner -keystore release.keystore app-release.aab my-key\n<span class='cm'># or let Play App Signing manage keys; you keep only the upload key</span></div></div><p>Use <strong>internal testing</strong> and <strong>closed testing</strong> tracks before production. New personal developer accounts now require a closed test with a minimum number of testers over several days before you can publish to production — plan for this.</p><div class='box danger'><div class='bt'>Lose your signing key, lose your app.</div> If you self-manage keys and lose the keystore, you can never update that app again. Back up keystores and passwords in two places. Play App Signing exists specifically to avoid this.</div><h3>Web hosting</h3><p>A web build is just static files (<code>index.html</code>, <code>.wasm</code>, <code>.js</code>, data). Host on itch.io (easiest), GitHub Pages, Netlify, Cloudflare Pages, or any static host. The non-obvious requirement: threaded WASM needs cross-origin isolation headers, which you set on the host.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>_headers (Netlify / Cloudflare Pages)</span></div><div class='term-body'>/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: require-corp\n  Content-Type: application/wasm  <span class='cm'>// ensure .wasm served correctly</span></div></div><p>If the game starts but threading fails, it is almost always these headers. Also enable gzip/brotli — WASM compresses dramatically and load time is your retention.</p><h3>Console overview (Switch, PlayStation, Xbox)</h3><p>Consoles are <strong>closed platforms</strong>: you cannot publish without being an approved developer. The path:</p><ol><li><strong>Apply</strong> to the platform's developer program (Nintendo Developer Portal, PlayStation Partners, ID@Xbox). They vet your studio and game.</li><li>Once approved, buy or borrow a <strong>devkit</strong> — specialized hardware that runs unsigned/debug builds. Devkits are NDA'd and not for sale to the public.</li><li>Port using the platform SDK (often through an engine's console export, which itself requires approval and a separate licensed module).</li><li>Pass <strong>certification (&quot;cert&quot;)</strong>: a long checklist (suspend/resume, controller disconnect handling, correct error messages, save-data rules, trophy/achievement compliance). Failing cert means resubmitting.</li></ol><div class='box tip'><div class='bt'>Don't plan consoles as your first launch.</div> Ship on PC/mobile first to prove the game, then apply for console programs with sales numbers and a polished build. Approval is far easier when you have traction.</div><div class='game'><div class='game-head'>🎮 Build This: Prepare One Mobile/Web Submission</div><div class='game-body'><p>Goal: a submittable mobile listing or a live, isolated web build.</p><ol><li>Pick one track: App Store, Google Play, or web hosting.</li><li>Mobile: create the app record, set the bundle/package ID, generate the icon (1024×1024) and required screenshot sizes, write the privacy policy and age-rating answers.</li><li>Build the signed artifact (.aab / archived .ipa) and push to an internal/test track.</li><li>Web: deploy the static build with COOP/COEP headers and confirm it loads cross-origin-isolated.</li><li>Open it on a real device and verify input, audio, and saves work.</li></ol></div></div>"},{"id":"p7-5","part":"09 · Ship It","nav":"Store-Page Craft","num":"9.5","kicker":"Part 09 · Lesson 5","title":"Store-Page Craft: Capsule, Screenshots & Trailer","html":"<h3>The page is the product, for buyers</h3><p>Players never see your code, your clever architecture, or your hundred hours of polish. They see a capsule, a few screenshots, a trailer, and a paragraph — and they decide in under ten seconds. Treating the store page as an afterthought is the most expensive mistake an indie makes. Every asset has one job: communicate the game's fantasy fast.</p><h3>Capsule art</h3><p>The capsule is a thumbnail, not a poster. It must work at <strong>postage-stamp size</strong> in a crowded grid.</p><ul><li><strong>One focal subject.</strong> A character, a creature, an iconic object — not a wide vista.</li><li><strong>Legible logo.</strong> Big, high-contrast, readable when shrunk 80%.</li><li><strong>Strong silhouette and color.</strong> Pick a distinctive palette so it pops against Steam's dark UI.</li><li><strong>No fine detail.</strong> Tiny text and intricate scenes vanish at thumbnail size.</li></ul><div class='box tip'><div class='bt'>The squint test.</div> Shrink your capsule to 231×87, blur it slightly, and look from across the room. If you can't tell what genre it is and read the title, redesign it.</div><h3>Screenshots</h3><p>You need at least five, and order matters because most players only look at the first two or three. Rules:</p><ul><li><strong>First shot = the hook.</strong> Show the core gameplay at its most exciting, with HUD on.</li><li>Show <em>variety</em>: different environments, abilities, enemies, modes.</li><li>Use real gameplay, not posed beauty shots that misrepresent the experience (Valve and players punish this).</li><li>Capture at native store resolution (1920×1080) with the UI players will actually see.</li><li>Avoid screenshots that are 90% empty sky or menu.</li></ul><h3>The trailer</h3><p>A 30-60 second trailer converts better than a 3-minute one. Structure:</p><ol><li><strong>0-3s: gameplay immediately.</strong> Steam autoplays muted; lead with motion, not a studio logo or slow fade.</li><li><strong>3-20s: the core loop.</strong> Show what the player does, repeatedly and clearly.</li><li><strong>20-45s: escalation/variety.</strong> Bigger moments, more systems, the &quot;oh, it also does this&quot; beats.</li><li><strong>End: title card + &quot;Wishlist Now&quot; + platform logos.</strong></li></ol><div class='box danger'><div class='bt'>Cutscenes and logos are not gameplay.</div> The fastest way to kill trailer retention is 8 seconds of your team logo before anything moves. Players bounce in the first 5 seconds. Show the game.</div><h3>Description and tags</h3><p>The <strong>short description</strong> (the blurb) is your one-sentence pitch: genre + hook + fantasy. The <strong>long description</strong> should front-load with a GIF and a punchy paragraph, then use short feature bullets — not walls of lore. Most players skim. Lead each bullet with the benefit.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>short-description.txt</span></div><div class='term-body'>A roguelike deck-builder where every card is also a spell\nyou can cast OR craft into a weapon. Build a deck, forge a\nblade, descend the shifting tower.</div></div><p><strong>Tags</strong> feed discovery algorithms. Choose 5-7 that are genuinely accurate and order them by relevance. Mixing aspirational-but-false tags (&quot;Open World&quot; on a linear game) tanks your recommendation quality and earns refunds. On Steam, also fill <em>features</em> (controller support, cloud saves, co-op) accurately — these are filters players use.</p><h3>Iterate with data</h3><p>Your capsule's job is the <strong>click-through rate</strong> from impressions; the page's job is the wishlist/buy <strong>conversion</strong>. Steam shows both in your analytics. If impressions are high but clicks are low, fix the capsule. If clicks are high but conversion is low, fix the screenshots/trailer/price. A/B test the capsule by swapping it and watching CTR shift.</p><div class='game'><div class='game-head'>🎮 Build This: Finalize Your Store-Page Assets</div><div class='game-body'><p>Goal: a complete, conversion-ready set of page assets.</p><ol><li>Design capsule art that passes the squint test at 231×87.</li><li>Capture 5+ 1080p screenshots; order so the first shows the core loop with HUD.</li><li>Cut a 30-60s trailer that opens with gameplay in the first 3 seconds and ends on &quot;Wishlist Now.&quot;</li><li>Write a one-sentence short description and a bulleted long description.</li><li>Pick 5-7 accurate, relevance-ordered tags and fill the features checkboxes honestly.</li></ol></div></div>"},{"id":"p7-6","part":"09 · Ship It","nav":"Marketing","num":"9.6","kicker":"Part 09 · Lesson 6","title":"Marketing: Wishlists, Devlogs, Press & Festivals","html":"<h3>Marketing starts the day you have a vertical slice</h3><p>The biggest marketing mistake is starting at launch. By then it's over — Steam's launch-week visibility is gated by your existing wishlists, and press/streamers plan weeks ahead. Marketing is a slow accrual that should begin as soon as you have one beautiful, GIF-able moment, often a year out. The goal of all pre-launch marketing is one number: <strong>wishlists</strong>.</p><h3>Devlogs and social</h3><p>A devlog is a regular post (text, video, or both) about making the game. It builds an audience that feels invested. The discipline that works:</p><ul><li><strong>Post the same hook everywhere on a schedule.</strong> One good GIF/clip per week to Twitter/X, Bluesky, TikTok, Reddit, and YouTube Shorts.</li><li><strong>Lead with motion.</strong> A 5-second loop of a satisfying mechanic outperforms paragraphs.</li><li><strong>End with a call to action:</strong> &quot;Wishlist on Steam&quot; + link, every time.</li><li><strong>Use the right subreddits and hashtags</strong> (#screenshotsaturday, #indiedev, #wishlistwednesday) and genre communities — don't spam, contribute.</li></ul><div class='box tip'><div class='bt'>One repeatable, shareable moment beats a feature list.</div> Vampire Survivors, Brotato, and countless hits spread on a single hypnotic GIF. Find your game's GIF and post it relentlessly.</div><h3>Press and streamer outreach</h3><p>Build a <strong>contact list</strong>: journalists who covered games like yours, and streamers/YouTubers whose audience matches your genre. Personalize every email — the &quot;Dear Sir/Madam, please cover my game&quot; blast gets deleted. A good pitch is short, leads with the hook, includes a GIF/trailer link and a <strong>press kit</strong>, and offers a free key.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>outreach-email.txt</span></div><div class='term-body'>Subject: Roguelike deck-builder where cards become weapons — review key?\n\nHi [Name],\n\nI loved your coverage of [Specific Game They Covered]. I think\n[My Game] hits the same itch: every card is a spell you can cast\nOR forge into a weapon.\n\n30s trailer: [link]   Press kit: [link]\nLaunches [date] on Steam. Happy to send a key — interested?\n\nThanks,\n[Name], [Studio]</div></div><p>A <strong>press kit</strong> (presskit() / itch page / a simple folder) contains: logo, capsule, 5-10 screenshots, the trailer, fact sheet (price, platforms, release date, studio), a short and long description, and contact
