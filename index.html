<style>
  :root{
    --bg:#0b0713;--bg-2:#0f0a1c;--panel:#120c22;--panel-2:#170f2c;--grid:#241640;

    --shadow:0 0 0 1px rgba(255,60,175,.07), 0 24px 60px -28px rgba(0,0,0,.92);
    --mono:'JetBrains Mono',monospace;--body:'IBM Plex Mono',monospace;--crt:'VT323',monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.72;-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.18) 3px, rgba(0,0,0,0) 4px);mix-blend-mode:overlay;opacity:.5;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at 50% 0%, rgba(94,243,140,.05), transparent 60%),radial-gradient(ellipse at 100% 100%, rgba(0,0,0,.6), transparent 55%);}
  ::selection{background:var(--green);color:#04130a;}
  .shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh;}
  aside{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg-2),var(--bg));border-right:1px solid var(--border);padding:0 0 60px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  aside::-webkit-scrollbar{width:8px;}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  .brand{padding:26px 24px 18px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:linear-gradient(180deg,var(--bg-2),rgba(10,17,12,.96));backdrop-filter:blur(6px);z-index:5;}
  .brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--green);opacity:.8;}
  .brand h1{font-family:var(--crt);font-weight:400;font-size:38px;line-height:.92;margin:6px 0 2px;color:var(--green-bright);text-shadow:0 0 18px rgba(94,243,140,.35);letter-spacing:.02em;}
  .brand .sub{font-size:11px;color:var(--ink-dim);letter-spacing:.04em;}
  .progress-wrap{margin-top:14px;}
  .progress-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;}
  .progress-bar{height:5px;background:var(--grid);border-radius:99px;overflow:hidden;border:1px solid var(--border-soft);}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(94,243,140,.6);}
  nav{padding:14px 12px 0;}
  .part-label{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);padding:18px 12px 7px;display:block;}
  .nav-item{display:flex;gap:10px;align-items:baseline;width:100%;text-align:left;background:none;border:none;cursor:pointer;color:var(--ink-dim);font-family:var(--body);font-size:13.5px;padding:8px 12px;border-radius:7px;line-height:1.4;transition:.16s;border:1px solid transparent;}
  .nav-item:hover{background:var(--panel);color:var(--ink);}
  .nav-item.active{background:var(--panel-2);color:var(--green-bright);border-color:var(--border);box-shadow:inset 2px 0 0 var(--green);}
  .nav-item .num{font-family:var(--mono);font-size:11px;color:var(--green);opacity:.7;min-width:30px;}
  .nav-item.active .num{opacity:1;}
  .nav-item .done{margin-left:auto;color:var(--green);font-size:12px;opacity:0;transition:.2s;}
  .nav-item.completed .done{opacity:1;}
  .nav-item.completed{color:var(--ink-faint);}
  main{padding:0;max-width:980px;}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:14px 40px;background:rgba(7,11,8,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-soft);}
  .crumbs{font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.05em;}
  .crumbs b{color:var(--green);font-weight:700;}
  .blink{animation:blink 1.1s steps(1) infinite;color:var(--green);}
  @keyframes blink{50%{opacity:0;}}
  .content{padding:46px 56px 120px;animation:fade .45s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .lesson-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--amber);}
  h2.lesson-title{font-family:var(--mono);font-weight:800;font-size:30px;line-height:1.12;margin:8px 0 6px;color:#eaf6ee;letter-spacing:-.01em;}
  .lede{font-size:16px;color:#cfe6d8;border-left:2px solid var(--green);padding-left:16px;margin:18px 0 30px;}
  h3{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--green-bright);margin:34px 0 10px;letter-spacing:.01em;}

  .pill.t{border-color:var(--cyan);color:var(--cyan);}
  .cover h2.lesson-title{font-family:var(--crt);font-size:64px;color:var(--green-bright);text-shadow:0 0 30px rgba(94,243,140,.3);font-weight:400;line-height:.95;}
  .cover .lede{font-size:17px;border:none;padding:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0;}

    .menu-btn{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--border);color:var(--green);padding:8px 12px;border-radius:8px;cursor:pointer;}
    .content{padding:28px 22px 100px;}

<script>
const L = [{"id":"cover","part":"START","nav":"Welcome","cover":true,"html":"\n<div class=\"cover\">\n<span class=\"lesson-kicker\">press start · zero → shipped game</span>\n<h2 class=\"lesson-title\">make<br>games.</h2>\n<p class=\"lede\">The complete path from \"I've never made a game\" to shipping one. Foundations that work in any engine, full courses in three engines (Godot, Unity, Unreal) and three from-scratch languages (C++, Python, JavaScript), 3D art in Blender, game audio, and how to publish &amp; monetize. Every lesson ends with a small game you actually build.</p>\n<div class=\"grid2\">\n  <div class=\"card\"><div class=\"ct\">🎮 Build every step</div><p>Each lesson ends with a \"Build This\" — a small playable game using the skill you just learned. You learn game dev by making games, not by reading about them.</p></div>\n  <div class=\"card\"><div class=\"ct\">🧠 Engine-agnostic first</div><p>Part 00 teaches the universal ideas — the game loop, sprites, collision, vectors, state machines — so every engine afterward just clicks.</p></div>\n  <div class=\"card\"><div class=\"ct\">🛠 Three engines, three languages</div><p>Full courses in Godot, Unity, and Unreal — plus making games from scratch in C++, Python, and JavaScript. Pick your path or learn them all.</p></div>\n  <div class=\"card\"><div class=\"ct\">🚀 Art, audio &amp; shipping</div><p>3D modeling in Blender, sound design &amp; music, then deploying, marketing, and monetizing your finished game.</p></div>\n</div>\n<h3>How this course is structured</h3>\n<p>Ten parts that build on each other. Start with Foundations, then dive into whichever engine or language calls to you — each is self-contained. Mark lessons complete as you go; your progress bar lives in the sidebar.</p>\n<div class=\"box tip\"><div class=\"bt\">The one rule.</div> Finish each \"Build This.\" A game you can actually play, however tiny, teaches more than a chapter you only read.</div>\n</div>\n"},{"id":"p0-1","part":"00 · Foundations","nav":"What Is a Game?","num":"0.1","kicker":"Part 00 · Lesson 1","title":"What a Game Is (and the Core Genres)","html":"<h3>A game is a system, not a story</h3><p>Strip away the art and the plot and every video game reduces to the same skeleton: a set of <strong>rules</strong>, one or more <strong>goals</strong>, and <strong>feedback</strong> that tells the player how they are doing. The player acts, the system reacts, the player adjusts. That tight cycle of action and reaction is the beating heart of every title from <em>Tetris</em> to <em>Elden Ring</em>.</p><ul><li><strong>Rules</strong> define what is possible: gravity pulls Mario down, blocks fall in Tetris, you can carry two weapons in Halo.</li><li><strong>Goals</strong> give the rules a point: survive, score, reach the exit, defeat the boss. Goals stack from moment-to-moment (dodge that bullet) up through session (clear the level) to meta (finish the campaign).</li><li><strong>Feedback</strong> closes the loop: a score ticks up, an enemy flashes red, a controller rumbles. Without feedback the player is acting blind.</li></ul><h3>The core loop</h3><p>The most useful lens for any game is its <strong>core loop</strong>: the smallest repeating chunk of play. In <em>Doom</em> it is see enemy, aim, shoot, collect ammo, repeat. In <em>Stardew Valley</em> it is plant, water, wait, harvest, sell, buy more seeds. If the core loop is fun the game has a chance. If it is boring, no amount of story or graphics will save it. You will spend most of your design time tuning this loop.</p><div class='box tip'><div class='bt'>Find the verb.</div> Every game has a dominant verb: jump, shoot, build, match, drive, talk. Naming it instantly clarifies the genre and what you must make feel good.</div><h3>Genres and sub-genres</h3><p>Genres are shorthand for a game's dominant mechanics and camera. They are not rigid boxes (modern games blend freely) but they help you communicate and find reference material.</p><table><thead><tr><th>Genre</th><th>Dominant verb</th><th>Examples</th></tr></thead><tbody><tr><td>Platformer</td><td>Jump / traverse</td><td>Super Mario Bros, Celeste, Hollow Knight</td></tr><tr><td>Shooter (FPS/TPS)</td><td>Aim / shoot</td><td>Doom, Halo, Fortnite</td></tr><tr><td>RPG</td><td>Grow / decide</td><td>Final Fantasy, The Witcher 3, Disco Elysium</td></tr><tr><td>Strategy (RTS/TBS)</td><td>Plan / command</td><td>StarCraft, Civilization, XCOM</td></tr><tr><td>Puzzle</td><td>Solve / arrange</td><td>Tetris, Portal, Baba Is You</td></tr><tr><td>Simulation / Management</td><td>Build / optimize</td><td>The Sims, Factorio, Cities: Skylines</td></tr><tr><td>Fighting</td><td>Time / combo</td><td>Street Fighter, Tekken, Smash Bros</td></tr><tr><td>Racing</td><td>Drive / line</td><td>Mario Kart, Forza, Trackmania</td></tr><tr><td>Survival / Sandbox</td><td>Gather / craft</td><td>Minecraft, Valheim, Rust</td></tr></tbody></table><p>Sub-genres refine these: a Metroidvania is a platformer with an interconnected, ability-gated map; a roguelike is a dungeon crawler with permadeath and procedural runs; a MOBA is a strategy/action hybrid. When you pitch a project, the fastest way to be understood is it is an X with a twist of Y.</p><h3>Why this matters before you touch an engine</h3><p>Choosing a genre early constrains every technical decision that follows: a platformer needs precise collision and a fixed-timestep feel; an RPG needs save systems and dialogue trees; an RTS needs pathfinding for hundreds of units. The genre tells you which of the systems in this Foundations part you must master first.</p><div class='game'><div class='game-head'>🎮 Build This: Three-Game Teardown</div><div class='game-body'><p>Train your eye to see the system behind the surface.</p><ol><li>Pick three games you love from different genres.</li><li>For each write one line: <em>Core loop</em> (the smallest repeating action), <em>Goal</em> (what victory means), <em>Genre + sub-genre</em>.</li><li>Underline the dominant verb in each core loop.</li><li>Note one piece of feedback each game gives for a successful action.</li></ol></div></div>"},{"id":"p0-2","part":"00 · Foundations","nav":"The Game Loop","num":"0.2","kicker":"Part 00 · Lesson 2","title":"The Game Loop, Frames & Delta Time","html":"<h3>The loop that never stops</h3><p>A game is software that redraws itself many times per second while reacting to input. The structure that makes this happen is the <strong>game loop</strong>: a tight cycle that runs as fast as it can (or as fast as the display allows) for the entire time the game is open.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>game-loop (pseudocode)</span></div><div class='term-body'>while running:\n    input = pollInput()       <span class='cm'>// what is the player doing?</span>\n    update(input, dt)         <span class='cm'>// advance the simulation</span>\n    render()                  <span class='cm'>// draw the new state to screen</span></div></div><p>One pass through that cycle is a <strong>frame</strong>. The rate at which frames complete is <strong>FPS</strong> (frames per second). 60 FPS means the loop ran 60 times in one second, so each frame had about 16.7 milliseconds to finish all three steps. Miss that budget and the game stutters.</p><h3>Why delta time exists</h3><p>Different machines run the loop at different speeds. A 144Hz monitor runs the loop 144 times per second; a tired laptop might manage 40. If you move a player <code>position += 5</code> every frame, the fast machine sends the player flying and the slow one crawls. The fix is <strong>delta time</strong> (<code>dt</code>): the number of seconds the previous frame actually took. Multiply all motion by <code>dt</code> and movement becomes <em>framerate-independent</em>: five units per <em>second</em>, not per frame.</p><div class='box danger'><div class='bt'>The classic bug.</div> Forgetting to multiply by <code>dt</code> is the number-one beginner mistake. The game feels fine on your machine and is unplayable on everyone else's. If something moves by speed, it must be <code>speed * dt</code>.</div><h3>Fixed vs variable timestep</h3><p>There are two ways to feed time into <code>update</code>, and most games use both:</p><table><thead><tr><th></th><th>Variable timestep</th><th>Fixed timestep</th></tr></thead><tbody><tr><td>dt each frame</td><td>Whatever the frame took</td><td>Always the same (e.g. 1/60s)</td></tr><tr><td>Good for</td><td>Rendering, camera, UI, simple movement</td><td>Physics, networking, deterministic logic</td></tr><tr><td>Risk</td><td>Large dt tunnels through walls; physics jitters</td><td>Must be decoupled from render rate</td></tr></tbody></table><p>Physics engines hate variable timesteps: a sudden long frame can teleport a fast object straight through a thin wall (tunneling), and integration becomes inaccurate. The professional solution is the <strong>accumulator pattern</strong>: render as fast as you can, but step physics in fixed chunks.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>fixed-accumulator (pseudocode)</span></div><div class='term-body'>const STEP = 1.0 / 60.0      <span class='cm'>// fixed physics step, 60Hz</span>\nlet accumulator = 0\nlet last = now()\n\nwhile running:\n    let current = now()\n    let frameTime = current - last\n    last = current\n    accumulator += frameTime\n\n    while accumulator &gt;= STEP:        <span class='cm'>// catch up in fixed slices</span>\n        physicsUpdate(STEP)\n        accumulator -= STEP\n\n    const alpha = accumulator / STEP  <span class='cm'>// leftover 0..1</span>\n    render(alpha)                     <span class='cm'>// interpolate for smoothness</span></div></div><p>The inner <code>while</code> runs physics zero, one, or several times depending on how long the frame took, keeping the simulation deterministic. The <code>alpha</code> value lets you interpolate the rendered position between the last two physics states so motion stays buttery. This is the model Unity exposes as <code>FixedUpdate</code> vs <code>Update</code>, and Godot as <code>_physics_process</code> vs <code>_process</code>.</p><div class='box law'><div class='bt'>Rule of thumb.</div> Put movement that must be deterministic or collide accurately in the <em>fixed</em> step. Put camera, animation blending, and UI in the <em>variable</em> step and multiply by <code>dt</code>.</div><div class='game'><div class='game-head'>🎮 Build This: Delta-Time Loop on Paper</div><div class='game-body'><p>Write a loop that moves an object framerate-independently, then add fixed physics.</p><ol><li>Write pseudocode for a loop that computes <code>dt</code> in seconds and does <code>x += speed * dt</code>.</li><li>Trace it for two frames: one 16ms, one 33ms. Confirm the object moves the same distance per second in both.</li><li>Wrap the physics in a fixed-timestep accumulator using the pattern above.</li></ol></div></div>"},{"id":"p0-3","part":"00 · Foundations","nav":"Math for Games","num":"0.3","kicker":"Part 00 · Lesson 3","title":"Coordinates, Vectors & Transforms","html":"<h3>Where things are: coordinate systems</h3><p>Every object in a game has a position expressed in a <strong>coordinate system</strong>. In 2D you have an X axis (horizontal) and a Y axis (vertical); in 3D you add Z (depth). The catch that trips up beginners: engines disagree on which way is up and which way Y points.</p><table><thead><tr><th>System</th><th>+Y direction</th><th>Up axis (3D)</th></tr></thead><tbody><tr><td>Most 2D canvases / screens</td><td>Down</td><td>—</td></tr><tr><td>Unity (3D)</td><td>Up</td><td>Y, left-handed</td></tr><tr><td>Godot 2D</td><td>Down</td><td>—</td></tr><tr><td>Godot 3D / OpenGL</td><td>Up</td><td>Y, right-handed</td></tr></tbody></table><p>You will also hear <strong>world space</strong> (position in the whole level), <strong>local space</strong> (position relative to a parent), and <strong>screen space</strong> (pixel position after the camera projects the world). A child at local <code>(0,1)</code> sits one unit above its parent no matter where the parent moves.</p><h3>Vectors: the workhorse of game math</h3><p>A <strong>vector</strong> is just an ordered list of numbers (<code>(x, y)</code> in 2D) but it does double duty as both a <em>position</em> and a <em>direction with magnitude</em>. A handful of operations cover 90% of gameplay code:</p><ul><li><strong>Add</strong>: <code>a + b = (ax+bx, ay+by)</code>. Moving by a velocity is <code>pos + vel*dt</code>.</li><li><strong>Scale</strong>: <code>a * s = (ax*s, ay*s)</code>. Doubles or halves a vector's length.</li><li><strong>Magnitude (length)</strong>: <code>|a| = sqrt(ax*ax + ay*ay)</code> via Pythagoras. The distance from the origin.</li><li><strong>Normalize</strong>: <code>a / |a|</code> gives a unit vector (length 1): pure direction, no speed. Essential before applying a speed.</li><li><strong>Dot product</strong>: <code>a.b = ax*bx + ay*by</code>, equal to <code>|a||b|cos(theta)</code>. Positive means the vectors point the same way, zero means perpendicular, negative means opposing. Use it to check if an enemy is in front of you.</li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>move-toward (pseudocode)</span></div><div class='term-body'><span class='cm'>// move mover toward target at 5 units/sec</span>\nlet dir = target - mover           <span class='cm'>// vector from mover to target</span>\nlet dist = length(dir)\nif dist &gt; 0.001:\n    dir = dir / dist               <span class='cm'>// normalize -&gt; unit direction</span>\n    mover = mover + dir * 5 * dt    <span class='cm'>// step along it, dt-scaled</span></div></div><div class='box tip'><div class='bt'>Normalize before scaling.</div> Diagonal movement is the classic gotcha: pressing right+up gives <code>(1,1)</code> which has length 1.41, so the player moves 41% faster diagonally. Normalize the input vector first.</div><h3>A little trig</h3><p>To turn an angle into a direction use <code>dir = (cos(angle), sin(angle))</code>. To get the angle of a vector use <code>angle = atan2(y, x)</code> (always <code>atan2</code>, never plain <code>atan</code>, because it handles all four quadrants). This is how you aim a turret at the mouse or rotate a sprite to face its velocity.</p><h3>Transforms: position, rotation, scale</h3><p>A <strong>transform</strong> bundles an object's <em>position</em>, <em>rotation</em>, and <em>scale</em>. Engines store it as a matrix, but you rarely touch the math directly: you set <code>transform.position</code>, <code>transform.rotation</code>, <code>transform.scale</code> and the engine composes them. The key idea is the <strong>hierarchy</strong>: a child's final world transform is its local transform multiplied by its parent's. Move a car and its wheels (children) come along; rotate the car and the wheels orbit with it. This parenting is how you build a hand attached to an arm attached to a body.</p><div class='game'><div class='game-head'>🎮 Build This: Direction & Step on Paper</div><div class='game-body'><p>Compute a real movement step by hand.</p><ol><li>Let A = (2, 1) and B = (6, 4). Compute the vector B - A.</li><li>Find its length, then divide to get the normalized direction.</li><li>The mover travels at 5 units/sec. Compute the new position after 0.2s: <code>A + dir * 5 * 0.2</code>.</li><li>Check your work: the step length should be exactly 1.0 unit.</li></ol></div></div>"},{"id":"p0-4","part":"00 · Foundations","nav":"Sprites & Models","num":"0.4","kicker":"Part 00 · Lesson 4","title":"Sprites, Textures, Atlases, Meshes & Materials","html":"<h3>2D assets</h3><p>In 2D games the visible objects are <strong>sprites</strong>: flat images drawn on screen, usually with transparency. The raw image data (the grid of colored pixels stored in memory or on the GPU) is a <strong>texture</strong>. A sprite is essentially draw this texture, or part of it, at this position, rotation and scale.</p><p>Textures have a few properties you must understand:</p><ul><li><strong>Resolution</strong>: width x height in pixels. GPUs historically preferred power-of-two sizes (256, 512, 1024); modern hardware is flexible but POT still helps with mipmaps and compression.</li><li><strong>Filtering</strong>: <em>nearest-neighbor</em> keeps pixels crisp (essential for pixel art); <em>bilinear/linear</em> smooths them (good for high-res art). Pick wrong and your crisp pixel art turns into a blurry mess.</li><li><strong>Alpha channel</strong>: the transparency. PNG carries it; JPEG does not.</li></ul><h3>Atlases: why you pack sprites together</h3><p>Switching the active texture is one of the most expensive things a GPU does, and each switch can force a separate draw call. A <strong>texture atlas</strong> (also called a sprite sheet) packs many sprites into one big image so the GPU binds it once and draws everything from it. This is the foundation of batching (Lesson 11).</p><p>To draw one sprite from an atlas you need its <strong>UV coordinates</strong>: a rectangle inside the texture expressed from 0 to 1, where (0,0) is one corner and (1,1) the opposite. If a 64px frame sits at pixel (128, 0) in a 256x256 atlas, its UVs run from (0.5, 0.0) to (0.75, 0.25).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>uv-from-pixels (pseudocode)</span></div><div class='term-body'><span class='cm'>// frame rect in pixels -&gt; UV rect (0..1)</span>\nu0 = frameX / atlasWidth\nv0 = frameY / atlasHeight\nu1 = (frameX + frameW) / atlasWidth\nv1 = (frameY + frameH) / atlasHeight</div></div><div class='box tip'><div class='bt'>Mind the bleed.</div> Leave 1-2 px of padding between atlas frames or bilinear filtering will sample neighboring pixels and you will see thin colored seams. Tools like TexturePacker add this extrude automatically.</div><h3>3D assets</h3><p>3D objects are built from <strong>meshes</strong>: collections of <em>vertices</em> (points in 3D space) joined into <em>triangles</em> (the only shape GPUs draw). A cube has 8 vertices and 12 triangles. Each vertex carries data beyond position: a <em>normal</em> (which way the surface faces, for lighting) and <em>UVs</em> (where to sample the texture, exactly like 2D).</p><p>A <strong>model</strong> is the broader asset: usually a mesh plus its materials, and often a skeleton and animations (Lesson 8). Files like <code>.glTF/.glb</code>, <code>.fbx</code>, and <code>.obj</code> store models. glTF is the modern open standard and the safest default.</p><h3>Materials and shaders</h3><p>A <strong>material</strong> describes how a surface looks: which textures it uses and how it responds to light. Modern engines use <strong>PBR</strong> (physically based rendering) materials with maps like:</p><table><thead><tr><th>Map</th><th>Controls</th></tr></thead><tbody><tr><td>Albedo / Base Color</td><td>The raw surface color</td></tr><tr><td>Normal</td><td>Fake surface bumps without extra geometry</td></tr><tr><td>Metallic</td><td>How metal-like the surface is</td></tr><tr><td>Roughness</td><td>How sharp or blurry reflections are</td></tr><tr><td>Ambient Occlusion</td><td>Soft contact shadows in crevices</td></tr></tbody></table><p>Under the hood a material runs a <strong>shader</strong>: a small GPU program (covered in Lesson 11) that computes the final pixel color. For now the mental model is: mesh = shape, material = look, texture = the image data the material samples.</p><div class='game'><div class='game-head'>🎮 Build This: Walk-Cycle Atlas Layout</div><div class='game-body'><p>Design a sprite atlas and compute one frame's UVs.</p><ol><li>Sketch a 4-frame walk cycle laid out horizontally in a 256x64 atlas (each frame 64x64).</li><li>Label the pixel position (x,y,w,h) of each frame.</li><li>Pick frame 3 and compute its UV rect using the formula above.</li><li>Mark where you would add padding to avoid bleed.</li></ol></div></div>"},{"id":"p0-5","part":"00 · Foundations","nav":"Rendering & Cameras","num":"0.5","kicker":"Part 00 · Lesson 5","title":"The Rendering Pipeline, Cameras & Viewports","html":"<h3>From world to pixels</h3><p>Rendering is the process of turning your game's data (positions, meshes, textures) into the colored pixels on screen. Every frame the GPU runs your geometry through a <strong>pipeline</strong> of transformations. You will not write most of it by hand, but understanding the stages explains nearly every camera and resolution problem you will ever debug.</p><ol><li><strong>Model space</strong>: vertices as the artist made them, centered on the object's origin.</li><li><strong>World transform</strong>: place the object in the level (its transform from Lesson 3). Now in <em>world space</em>.</li><li><strong>View transform</strong>: move everything so the camera sits at the origin looking down one axis. Now in <em>view space</em>.</li><li><strong>Projection transform</strong>: squash 3D into a 2D image, either <em>perspective</em> (distant things shrink) or <em>orthographic</em> (no shrink, used for 2D and isometric). Now in <em>clip space</em>.</li><li><strong>Clipping and perspective divide</strong>: throw away anything outside the view, divide by depth. Now in <em>normalized device coordinates</em>, a -1..1 cube.</li><li><strong>Viewport transform</strong>: map that cube onto the actual pixel rectangle on screen. Now in <em>screen space</em>.</li><li><strong>Rasterization and fragment shading</strong>: fill triangles with pixels, run the fragment shader per pixel to compute color, write to the framebuffer.</li></ol><div class='box tip'><div class='bt'>The acronym.</div> The matrix chain is often called MVP: <strong>M</strong>odel x <strong>V</strong>iew x <strong>P</strong>rojection. A vertex's clip position is <code>MVP * vertexPosition</code>.</div><h3>Cameras</h3><p>A <strong>camera</strong> is just an object whose transform defines the view stage, plus a choice of projection. Two flavors:</p><ul><li><strong>Orthographic</strong>: parallel projection, no perspective. The default for 2D games and for isometric/2.5D. You set an <em>orthographic size</em> (how many world units tall the view is).</li><li><strong>Perspective</strong>: objects shrink with distance, governed by a <strong>field of view</strong> (FOV) angle. Higher FOV sees more but distorts edges; 60-90 degrees is typical. You also set a <em>near</em> and <em>far clip plane</em>: anything closer than near or farther than far is not drawn.</li></ul><h3>Viewport and resolution</h3><p>The <strong>viewport</strong> is the rectangle of the window the camera draws into (you can have several; split-screen is two viewports). <strong>Resolution</strong> is how many pixels that rectangle contains. The hard part is <strong>aspect ratio</strong>: players have 16:9 monitors, ultrawides, and phones. If you design for one and ignore the rest, the image stretches or crops badly.</p><table><thead><tr><th>Mode</th><th>Behavior</th><th>Use when</th></tr></thead><tbody><tr><td>Stretch / scale</td><td>Fill the window, may distort</td><td>Rarely; looks wrong on odd ratios</td></tr><tr><td>Keep aspect (letterbox)</td><td>Add black bars, never distort</td><td>Fixed-camera arcade / pixel-art games</td></tr><tr><td>Expand</td><td>Show more world on wider screens</td><td>Most 3D games and modern 2D</td></tr></tbody></table><div class='box danger'><div class='bt'>Pixel-art shimmer.</div> If your camera or sprite positions land on fractional pixels, pixel art shimmers and tears. Use an integer scale factor and snap the camera to whole pixels, or render to a low-res target and upscale it whole.</div><p>Many engines distinguish the <strong>render resolution</strong> (how many pixels you draw) from the <strong>window size</strong> (how big it appears). Rendering at a lower internal resolution and upscaling is a key performance lever, especially on consoles and phones.</p><div class='game'><div class='game-head'>🎮 Build This: Diagram the Pipeline</div><div class='game-body'><p>Cement the world-to-pixels path by drawing it.</p><ol><li>Draw seven boxes left to right: model, world, view, clip, NDC, screen, pixels.</li><li>Label which transform sits between each pair (M, V, P, divide, viewport).</li><li>Mark where the camera defines the View and Projection stages.</li><li>Mark where the viewport rectangle and resolution decide the final pixel mapping.</li></ol></div></div>"},{"id":"p0-6","part":"00 · Foundations","nav":"Input","num":"0.6","kicker":"Part 00 · Lesson 6","title":"Reading Input: Keyboard, Mouse, Gamepad & Touch","html":"<h3>Devices give raw signals; games want actions</h3><p>Input devices report low-level events: key W is down, mouse moved to (812, 410), gamepad left stick is at (-0.7, 0.2), finger touched at (200, 600). Your game does not care about W; it cares about <em>move forward</em>. The professional pattern is an <strong>action map</strong> (also called an input map or bindings) that translates raw device signals into named game actions. This is the single most important idea in this lesson.</p><div class='box law'><div class='bt'>Never check device keys in gameplay code.</div> Do not write <code>if key W is down: moveForward()</code>. Write <code>if action(\"Forward\")</code> and bind Forward to W, the up arrow, the left stick, and a touch button. This is what makes rebinding, controller support, and accessibility possible later.</div><h3>Polling vs event-driven</h3><p>There are two ways to read input, and most games use both:</p><table><thead><tr><th></th><th>Polling</th><th>Event-driven</th></tr></thead><tbody><tr><td>How</td><td>Ask each frame: is Jump held?</td><td>The system calls you when something changes</td></tr><tr><td>Good for</td><td>Continuous state: movement, aiming, held buttons</td><td>Discrete moments: a click, a key press, text entry</td></tr><tr><td>Risk</td><td>Can miss a press+release inside one frame</td><td>Events can queue up or arrive out of loop order</td></tr></tbody></table><p>The crucial distinction for buttons is three states, not one:</p><ul><li><strong>Pressed</strong> (this frame only): the button went from up to down. Use for jump, fire, menu select: anything that should happen once per press.</li><li><strong>Held / Down</strong>: the button is currently down. Use for movement, holding a charge.</li><li><strong>Released</strong> (this frame only): went from down to up. Use for charged shots or jump-height cutoff.</li></ul><div class='box danger'><div class='bt'>The double-jump bug.</div> If you trigger jump on held instead of pressed, the player jumps every frame the button is down, dozens of times. Always gate one-shot actions on the <em>pressed</em> edge.</div><h3>Per-device gotchas</h3><ul><li><strong>Keyboard/mouse</strong>: mouse position is in <em>screen space</em>; you must unproject it through the camera to get a world position. Mouse delta (movement) is better for first-person look than absolute position.</li><li><strong>Gamepad</strong>: analog sticks report a continuous vector and never quite rest at zero. Apply a <strong>dead zone</strong> (ignore magnitudes below ~0.15) or the character drifts. Triggers are analog (0..1), not buttons.</li><li><strong>Touch</strong>: there is no hover and no precise pointer; design for fat fingers, support multi-touch (a virtual stick plus a button), and remember a tap is a touch-down + touch-up close together in time and space.</li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>action-map (pseudocode)</span></div><div class='term-body'>actions = {\n  \"Jump\":  { keys:[SPACE, W], pad:[BUTTON_A], touch:[\"btnJump\"] },\n  \"MoveX\": { keys:[A,-1, D,+1], pad:[LSTICK_X], touch:[\"vstickX\"] }\n}\n\n<span class='cm'>// each frame, build a clean action state</span>\nfunction update():\n    moveX = readAxis(\"MoveX\")          <span class='cm'>// -1..1, dead-zoned</span>\n    if pressed(\"Jump\"): doJump()        <span class='cm'>// edge, fires once</span></div></div><div class='game'><div class='game-head'>🎮 Build This: Platformer Action Map</div><div class='game-body'><p>Design bindings for jump, move, and dash across three device types.</p><ol><li>Make a table with rows Move, Jump, Dash and columns Keyboard, Gamepad, Touch.</li><li>Fill each cell with the concrete binding (e.g. Move = A/D, left stick, virtual stick).</li><li>Mark which actions read the <em>pressed</em> edge vs continuous <em>held</em> state.</li><li>Note one dead-zone or fat-finger consideration for the gamepad and touch columns.</li></ol></div></div>"},{"id":"p0-7","part":"00 · Foundations","nav":"Collision & Physics","num":"0.7","kicker":"Part 00 · Lesson 7","title":"Collision Detection & Physics Basics","html":"<h3>Detecting that two things touch</h3><p><strong>Collision detection</strong> answers do these two shapes overlap? Games use simplified <em>collider</em> shapes, not the full visual mesh, because cheap shapes test thousands of times per frame. The three you must know:</p><h4>AABB (Axis-Aligned Bounding Box)</h4><p>A non-rotated rectangle defined by min and max corners. Overlap is true only if the boxes overlap on <em>both</em> axes: fast and the workhorse of 2D and broad-phase 3D.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>aabb-overlap (pseudocode)</span></div><div class='term-body'>function aabbOverlap(a, b):\n    return a.minX &lt; b.maxX and a.maxX &gt; b.minX\n       and a.minY &lt; b.maxY and a.maxY &gt; b.minY\n<span class='cm'>// all four must be true; one separating axis = no hit</span></div></div><h4>Circle / sphere</h4><p>Two circles overlap when the distance between their centers is less than the sum of their radii. To skip the square root, compare squared distances:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>circle-overlap (pseudocode)</span></div><div class='term-body'>dx = b.x - a.x; dy = b.y - a.y\nrSum = a.r + b.r\nreturn (dx*dx + dy*dy) &lt; (rSum*rSum)   <span class='cm'>// cheaper than sqrt</span></div></div><h4>Raycast</h4><p>A <strong>ray</strong> is an origin plus a direction; a <em>raycast</em> finds the first collider it hits and where. This is how you do line-of-sight (can the guard see the player?), shooting hitscan weapons, ground checks under a character's feet, and mouse-picking objects in 3D. The result usually returns the hit point, distance, and surface normal.</p><div class='box tip'><div class='bt'>Broad phase vs narrow phase.</div> Engines first do a cheap broad-phase pass (often AABBs in a spatial grid or tree) to find <em>possible</em> pairs, then an expensive narrow-phase exact test only on those. You get this for free, but knowing it explains why fewer, larger colliders perform better.</div><h3>Physics: making things move believably</h3><p>A <strong>rigidbody</strong> is a collider with mass and velocity that the physics engine simulates. You generally do not set its position directly; you apply <strong>forces</strong> or <strong>impulses</strong> and let the integrator move it:</p><ul><li><strong>Force</strong>: applied over time (like thrust or gravity), changes velocity gradually. <code>F = m * a</code>.</li><li><strong>Impulse</strong>: instant change in velocity (like a jump or an explosion kick).</li><li><strong>Gravity</strong>: a constant downward acceleration applied every fixed step.</li></ul><table><thead><tr><th>Property</th><th>Meaning</th></tr></thead><tbody><tr><td>Mass</td><td>Resistance to force; heavier = harder to push</td></tr><tr><td>Restitution (bounciness)</td><td>0 = no bounce (clay), 1 = perfect bounce (super ball)</td></tr><tr><td>Friction</td><td>Resistance to sliding along a surface</td></tr><tr><td>Drag</td><td>Resistance to moving through space (air/water)</td></tr></tbody></table><p><strong>Restitution</strong> drives bouncing. On impact the engine reflects the velocity component along the surface normal and scales it by restitution: a ball hitting the floor with vy = -10 and restitution 0.8 leaves with vy = +8. Each bounce keeps 80%, so it gradually settles, exactly what you would expect.</p><h3>Triggers vs solid colliders</h3><p>A <strong>solid collider</strong> physically stops things: the player cannot walk through a wall. A <strong>trigger</strong> (sensor) detects overlap but lets objects pass through, firing a callback like <code>onTriggerEnter</code>. Use triggers for pickups, checkpoints, damage zones, and player entered the boss arena events.</p><div class='box danger'><div class='bt'>Move rigidbodies in the fixed step.</div> Apply forces and set velocity in <code>FixedUpdate</code>/<code>_physics_process</code>, not in the render frame. Mixing physics with variable timestep (Lesson 2) causes jitter and tunneling.</div><div class='game'><div class='game-head'>🎮 Build This: AABB Test & Bouncing Ball</div><div class='game-body'><p>Write the overlap test and reason about restitution.</p><ol><li>Write the boolean <code>aabbOverlap(a, b)</code> from scratch without peeking.</li><li>Test it on two boxes you draw: one overlapping pair, one separated pair.</li><li>Sketch a ball falling and bouncing with restitution 0.7. Mark the velocity right before and right after each of the first three bounces.</li><li>Note at which restitution value the ball would never stop bouncing.</li></ol></div></div>"},{"id":"p0-8","part":"00 · Foundations","nav":"Animation","num":"0.8","kicker":"Part 00 · Lesson 8","title":"Animation: Frames, Skeletons & Easing","html":"<h3>Three ways to make things move</h3><p>Animation is changing a property over time. Games use three distinct techniques, and choosing the right one for a given motion is the skill this lesson builds.</p><h3>1. Frame-based (sprite) animation</h3><p>The oldest and simplest: flip through a sequence of pre-drawn images, like a flipbook. A walk cycle might be 8 frames played at 12 frames per second. You store the frames in an atlas (Lesson 4) and advance an index on a timer.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sprite-anim (pseudocode)</span></div><div class='term-body'>timer += dt\nif timer &gt;= 1.0 / fps:\n    timer -= 1.0 / fps\n    frame = (frame + 1) % frameCount   <span class='cm'>// loop the cycle</span>\ndrawSprite(atlas, frames[frame], pos)</div></div><p><strong>Use it for</strong>: pixel-art and 2D games, particle-like effects, anything where hand-drawn frames give the look you want. <strong>Cost</strong>: memory (every frame is a separate image) and inflexibility (you cannot retarget or blend).</p><h3>2. Skeletal animation</h3><p>A <strong>skeleton</strong> (rig) is a hierarchy of <em>bones</em>, really just transforms parented to each other (Lesson 3). The mesh's vertices are <em>skinned</em> to the bones with weights, so when a bone rotates the nearby vertices follow. Animators store <strong>keyframes</strong> of bone rotations over time, and the engine interpolates between them.</p><ul><li>Tiny storage: you save bone rotations, not whole images.</li><li><strong>Blending</strong>: smoothly transition from walk to run, or layer an upper-body aim onto a lower-body run.</li><li><strong>Inverse kinematics (IK)</strong>: pin a foot to the ground or a hand to a ledge and let the engine solve the joint angles.</li><li><strong>Retargeting</strong>: reuse one animation on many characters sharing a skeleton.</li></ul><div class='box tip'><div class='bt'>Blend trees and state machines.</div> Modern engines drive skeletal animation with an <em>animation state machine</em> (compare Lesson 10): states like Idle/Walk/Run/Jump with transition conditions, and blend trees that mix clips by a parameter such as speed.</div><h3>3. Tweening and easing</h3><p>A <strong>tween</strong> (in-between) animates a single property from a start value to an end value over a duration: a menu sliding in, a health bar filling, a chest popping open. You compute a normalized time <code>t</code> from 0 to 1, pass it through an <strong>easing function</strong>, and interpolate.</p><p>Linear motion (constant speed) looks robotic. Easing curves make it feel alive:</p><table><thead><tr><th>Easing</th><th>Feel</th><th>Use for</th></tr></thead><tbody><tr><td>Linear</td><td>Mechanical, constant</td><td>Conveyor belts, loading bars</td></tr><tr><td>Ease-out</td><td>Fast start, slow stop</td><td>UI arriving, things settling</td></tr><tr><td>Ease-in</td><td>Slow start, fast end</td><td>Objects accelerating away</td></tr><tr><td>Ease-in-out</td><td>Smooth both ends</td><td>Camera moves, transitions</td></tr><tr><td>Back / elastic / bounce</td><td>Overshoots / springs</td><td>Juicy pops, pickups, buttons</td></tr></tbody></table><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>tween-easeout (pseudocode)</span></div><div class='term-body'>elapsed += dt\nt = clamp(elapsed / duration, 0, 1)\ne = 1 - (1 - t) * (1 - t)        <span class='cm'>// ease-out quad: fast start, slow stop</span>\nvalue = lerp(start, end, e)       <span class='cm'>// lerp(a,b,e) = a + (b-a)*e</span></div></div><div class='box law'><div class='bt'>Match technique to motion.</div> Discrete, hand-drawn looks use frame-based. Articulated characters use skeletal. A single property moving from A to B uses a tween with the right easing. Many games use all three at once.</div><div class='game'><div class='game-head'>🎮 Build This: Chest Pop Keyframes</div><div class='game-body'><p>Design a tween for a chest opening over 0.4 seconds.</p><ol><li>Choose the property to animate (the lid's rotation, say 0 to -110 degrees).</li><li>Write keyframes: t=0 closed, t=0.4 open. Note the duration.</li><li>Pick ease-out so the lid flings open then settles; write the eased <code>t</code> formula.</li><li>Add a tiny back-easing overshoot at the end for extra juice and describe the visual effect.</li></ol></div></div>"},{"id":"p0-9","part":"00 · Foundations","nav":"Scenes & ECS","num":"0.9","kicker":"Part 00 · Lesson 9","title":"Scenes, Entities, Components & ECS","html":"<h3>Scenes: the container for a slice of game</h3><p>A <strong>scene</strong> (Unity), <em>node tree</em> (Godot), or <em>level</em> is a container holding all the objects active at one time: the player, enemies, the camera, lights, UI. Loading a new scene swaps one set of objects for another (main menu to gameplay, level 1 to level 2). Scenes are how you carve a big game into shippable, loadable chunks, and how you keep memory in check by unloading what you are not using.</p><h3>The problem with deep inheritance</h3><p>Early game code modeled objects with class inheritance: <code>GameObject -&gt; Character -&gt; Enemy -&gt; FlyingEnemy</code>. This breaks fast. What about a flying enemy that can also be picked up? Or a destructible object that also heals? Inheritance forces a single rigid tree, and you end up with a god-class or duplicated code. The industry answer is <strong>composition over inheritance</strong>.</p><div class='box law'><div class='bt'>Composition over inheritance.</div> Do not ask what <em>is</em> this object? Ask what <em>parts</em> does it have? Build objects by attaching small, reusable components instead of deriving from a tall class hierarchy.</div><h3>The entity/component pattern</h3><p>An <strong>entity</strong> is a container with an identity but little behavior of its own. <strong>Components</strong> are small modules you attach to it, each owning one concern. A player is not a <code>Player</code> class; it is an entity with a Transform, a Sprite, a Rigidbody, a Health, and a PlayerInput component. This is the model behind Unity's <code>GameObject</code> + <code>MonoBehaviour</code> and Godot's node composition.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>entity-composition (pseudocode)</span></div><div class='term-body'>player = Entity()\nplayer.add(Transform(pos))\nplayer.add(Sprite(\"hero.png\"))\nplayer.add(Rigidbody(mass=1))\nplayer.add(Health(max=100))\nplayer.add(PlayerInput())\n\n<span class='cm'>// an enemy reuses the same parts, swaps the input</span>\nenemy = Entity()\nenemy.add(Transform(pos)); enemy.add(Sprite(\"orc.png\"))\nenemy.add(Rigidbody(mass=2)); enemy.add(Health(max=40))\nenemy.add(AIBrain())</div></div><h3>From components to ECS</h3><p>Classic entity/component still puts logic <em>inside</em> each component. Full <strong>ECS</strong> (Entity Component System) takes the idea further and is a key buzzword to understand:</p><ul><li><strong>Entity</strong>: just an ID, a number. No data, no logic.</li><li><strong>Component</strong>: pure <em>data</em>, no behavior (a Position is just x,y; a Velocity is just dx,dy).</li><li><strong>System</strong>: pure <em>logic</em> that runs over every entity having a specific set of components. A MovementSystem reads all entities with Position + Velocity and updates them.</li></ul><p>This separation has two payoffs. First, it is flexible: behavior is decided by which components an entity has, composable at runtime. Second, and the real reason AAA and simulation-heavy games adopt it, is <strong>performance</strong>: storing components of the same type contiguously in memory (data-oriented design) lets a system rip through thousands of them with cache-friendly, parallelizable loops. Unity's DOTS and engines like Bevy are built on this.</p><table><thead><tr><th>When to use</th><th>Pattern</th></tr></thead><tbody><tr><td>Most games, small/medium teams</td><td>Entity + components with behavior (GameObject/Node)</td></tr><tr><td>Thousands of similar entities, perf-critical sims</td><td>Full data-oriented ECS</td></tr></tbody></table><div class='box tip'><div class='bt'>Do not cargo-cult ECS.</div> Full ECS adds boilerplate and indirection. For a platformer or a puzzle game the built-in component model is simpler and plenty fast. Reach for full ECS when profiling shows you need it, or when entity counts are huge.</div><div class='game'><div class='game-head'>🎮 Build This: Component Inventory</div><div class='game-body'><p>Model three objects with the entity/component pattern.</p><ol><li>List the components for a Player, an Enemy, and a Pickup.</li><li>Mark which components are shared (e.g. Transform, Sprite) and which are unique.</li><li>Name three systems (e.g. Movement, Render, Collision) and note which components each reads.</li><li>State whether this game needs full ECS or the basic component model, and why.</li></ol></div></div>"},{"id":"p0-10","part":"00 · Foundations","nav":"State Machines","num":"0.10","kicker":"Part 00 · Lesson 10","title":"Game States & Finite State Machines","html":"<h3>Why state machines are everywhere</h3><p>A <strong>finite state machine</strong> (FSM) is the most-used pattern in all of game development. The idea: at any moment the system is in exactly <em>one</em> of a finite set of <strong>states</strong>, and it moves between them along defined <strong>transitions</strong> triggered by events or conditions. FSMs tame complexity by making every behavior explicit and every transition deliberate.</p><p>You will use FSMs at two scales:</p><ul><li><strong>Game flow</strong>: Menu to Play to Pause to GameOver. Only one is active; each owns its own update and draw.</li><li><strong>Entity behavior</strong>: an enemy that is Patrolling, Chasing, Attacking, or Returning; a character that is Idle, Running, Jumping, Falling.</li></ul><h3>Anatomy of an FSM</h3><p>Each state defines three things: what happens on <strong>enter</strong> (set up, play an animation), what happens every <strong>update</strong> (the ongoing behavior), and what happens on <strong>exit</strong> (clean up). Transitions live as conditions checked during update.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>fsm (pseudocode)</span></div><div class='term-body'>state = MENU\n\nfunction update(dt):\n    switch state:\n        case MENU:\n            if pressed(\"Start\"): changeState(PLAY)\n        case PLAY:\n            updateGameplay(dt)\n            if pressed(\"Pause\"): changeState(PAUSE)\n            if player.health &lt;= 0: changeState(GAMEOVER)\n        case PAUSE:\n            if pressed(\"Pause\"): changeState(PLAY)\n        case GAMEOVER:\n            if pressed(\"Confirm\"): changeState(MENU)\n\nfunction changeState(next):\n    onExit(state)        <span class='cm'>// stop music, hide UI...</span>\n    state = next\n    onEnter(state)       <span class='cm'>// show UI, reset timers...</span></div></div><div class='box law'><div class='bt'>One state at a time.</div> The whole value of an FSM is the guarantee that exactly one state is active. If you find yourself wanting two states at once (e.g. paused-but-also-animating), that is a sign you need a <em>stack</em> of states or layered FSMs, not booleans scattered everywhere.</div><h3>Game flow with a state stack</h3><p>A plain FSM forgets where it came from. Pausing is the classic example: when you unpause you want to resume exactly the gameplay underneath, not rebuild it. A <strong>state stack</strong> (pushdown automaton) solves this: <em>push</em> Pause on top of Play, and <em>pop</em> it to return. The state below keeps its data and simply stops updating while it is covered.</p><h3>Entity AI as an FSM</h3><p>A guard enemy is a perfect FSM. Each state has clear behavior and clear exits:</p><table><thead><tr><th>State</th><th>Behavior</th><th>Transition out</th></tr></thead><tbody><tr><td>Patrol</td><td>Walk a fixed route</td><td>Sees player -&gt; Chase</td></tr><tr><td>Chase</td><td>Move toward player</td><td>In attack range -&gt; Attack; lost player -&gt; Return</td></tr><tr><td>Attack</td><td>Strike, play attack anim</td><td>Player leaves range -&gt; Chase; player dead -&gt; Patrol</td></tr><tr><td>Return</td><td>Walk back to post</td><td>Reached post -&gt; Patrol; sees player -&gt; Chase</td></tr></tbody></table><p>When FSMs grow past a dozen states with tangled transitions, teams graduate to <strong>behavior trees</strong> or <strong>hierarchical state machines</strong> (previewed in Lesson 11) which scale better. But the FSM is where every game AI conversation starts, and most enemies never need anything fancier.</p><div class='game'><div class='game-head'>🎮 Build This: Guard FSM Diagram</div><div class='game-body'><p>Draw a finite state machine for a patrolling guard.</p><ol><li>Draw four boxes: Patrol, Chase, Attack, Return.</li><li>Draw arrows between them and label each with its trigger condition.</li><li>Mark the starting state and what each state does on <em>enter</em> (e.g. Attack plays the swing animation).</li><li>Add one note: which transition would you make use a state stack and why?</li></ol></div></div>"},{"id":"p0-11","part":"00 · Foundations","nav":"Beyond the Basics","num":"0.11","kicker":"Part 00 · Lesson 11","title":"Tilemaps, Audio, AI, UI, Assets, Saving, Performance & Beyond","html":"<h3>The rest of the toolbox</h3><p>You now have the core mental models. This lesson is a guided tour of the remaining systems every game uses, plus the production practices that turn ideas into shipped games. Treat it as a map: each topic gets a full part later, but knowing the vocabulary now means nothing surprises you.</p><h3>Tilemaps and level design</h3><p>A <strong>tilemap</strong> builds 2D levels from a grid of reusable <em>tiles</em> drawn from a tileset (one atlas). Instead of placing thousands of sprites, you paint a grid; the engine batches it into a handful of draw calls. <strong>Autotiling</strong> picks the right edge/corner tile automatically, and a separate collision layer marks which tiles are solid. Good <strong>level design</strong> teaches mechanics through space: introduce, then test, then combine.</p><h3>Audio</h3><p>Three layers: <strong>SFX</strong> (short one-shots like jumps and hits), <strong>music</strong> (looping tracks, sometimes adaptive), and <strong>spatial/positional</strong> audio (sounds that pan and attenuate by distance in 3D). Engines route everything through <strong>buses</strong> (mixer channels) so you can have Master, Music, SFX, and UI sliders, apply effects per bus, and duck the music when dialogue plays.</p><h3>Game AI</h3><p>Beyond the FSM (Lesson 10), the core AI toolkit is: <strong>A* pathfinding</strong> (find the shortest route across a grid or navmesh by exploring nodes ordered by cost-so-far plus a heuristic), <strong>steering behaviors</strong> (seek, flee, arrive, wander, flocking: smooth force-based movement), and <strong>behavior trees</strong> (a scalable tree of selectors and sequences that replaces sprawling FSMs in complex agents).</p><div class='box tip'><div class='bt'>A* in one breath.</div> Keep an open set of frontier nodes; always expand the one with the lowest <code>f = g + h</code> (g = cost from start, h = estimated cost to goal). When you pop the goal, walk the parent links back to build the path.</div><h3>UI and HUD</h3><p>The <strong>HUD</strong> shows live game state (health, score, ammo, minimap); <strong>UI</strong> covers menus, inventories, and dialogs. UI is laid out with anchors and containers so it adapts to any resolution (tie this back to Lesson 5's aspect-ratio handling), and is usually drawn in screen space on top of the world.</p><h3>Asset pipeline and formats</h3><p>The <strong>asset pipeline</strong> imports source files (PSD, FBX, WAV) and processes them into engine-ready forms (compressed textures, atlases, audio banks). Know the common formats: PNG (lossless 2D + alpha), glTF/FBX (3D models), OGG/WAV (audio), and the engine's own scene/prefab formats.</p><h3>Save systems and serialization</h3><p><strong>Serialization</strong> turns live objects into bytes you can store and later <em>deserialize</em> back. Saves come in flavors: JSON (human-readable, easy to debug), binary (compact, fast), and key-value stores for settings. Decide early <em>what</em> is save-worthy (progress, inventory, position) versus derived state you can rebuild, and version your save format so old saves still load.</p><h3>Performance</h3><table><thead><tr><th>Technique</th><th>What it saves</th></tr></thead><tbody><tr><td>Culling (frustum/occlusion)</td><td>Skip drawing what the camera cannot see</td></tr><tr><td>Batching / instancing</td><td>Combine draws sharing a material into one call</td></tr><tr><td>Object pooling</td><td>Reuse objects (bullets, enemies) instead of allocating, avoiding GC spikes</td></tr><tr><td>LOD</td><td>Use simpler meshes at distance</td></tr></tbody></table><div class='box law'><div class='bt'>Profile before you optimize.</div> Use the engine's profiler to find the real bottleneck (CPU? GPU? memory?). Guessing wastes days; the slow thing is rarely what you assume.</div><h3>Advanced topics in one paragraph each</h3><p><strong>Shaders</strong>: small programs (GLSL in OpenGL/Vulkan, HLSL in DirectX) running on the GPU per-vertex and per-pixel; they drive everything from water to outlines. <strong>Particles</strong>: thousands of tiny sprites/meshes spawned by emitters for fire, smoke, sparks. <strong>Networking</strong>: pick a model. lockstep (send inputs, simulate identically, great for RTS), or client-server with authority + client-side prediction (most action games). <strong>Procedural generation</strong>: build content from rules and noise (terrain, dungeons, loot). <strong>Juice / game-feel</strong>: the polish layer. screen shake, hit-stop, particles, easing, sound. that makes simple actions feel great.</p><h3>Production, source control, and scope</h3><p>Use <strong>git</strong> for code (and Git LFS or Perforce for big binary assets). A simple branching plan: <code>main</code> stays shippable, you branch <code>feature/*</code> per task and merge back via review. <strong>Scoping</strong> is the skill that ships games: list your features, then aggressively cut to a vertical slice you can finish. A maintained <em>cut-list</em> (nice-to-haves you will drop under pressure) is your best friend.</p><div class='game'><div class='game-head'>🎮 Build This: One-Page Scope Doc</div><div class='game-body'><p>Scope a tiny game so it is actually finishable.</p><ol><li>Pick a tiny game idea and write its core loop in one sentence (callback to Lesson 1).</li><li>List the systems it needs from this part (e.g. tilemap, input map, FSM, SFX, save).</li><li>Write a feature cut-list: 3 must-haves and 3 nice-to-haves you will drop first.</li><li>Sketch a git branching plan: <code>main</code> plus the feature branches and how they merge.</li></ol></div></div>"},{"id":"p1-1","part":"01 · Godot","nav":"Install & Editor Tour","num":"1.1","kicker":"Part 01 · Lesson 1","title":"Install Godot 4 & Tour the Editor","html":"<h3>Get Godot 4 running</h3><p>Godot is a free, open-source engine that ships as a single executable with no installer required. Go to <code>godotengine.org/download</code> and grab the <strong>Godot 4.x Standard</strong> build for your OS. The <strong>.NET / C#</strong> build is a separate download you only need if you plan to write C#; this course uses GDScript, so the Standard build is correct.</p><ul><li><strong>Windows/Linux:</strong> unzip and double-click the executable. It is fully portable, so put it anywhere.</li><li><strong>macOS:</strong> unzip, drag <code>Godot.app</code> to Applications. The first launch may need a right-click → Open to bypass Gatekeeper.</li></ul><div class='box tip'><div class='bt'>One file, no install.</div> Godot does not write to system folders. To upgrade, you just download a newer executable. Keep old versions around — projects are tied to engine versions.</div><h3>The Project Manager</h3><p>The first window is the <strong>Project Manager</strong>, not the editor. Click <strong>New</strong>, give the project a name like <code>DragDemo</code>, choose an empty folder, and leave the renderer on <strong>Forward+</strong> for desktop (or <strong>Compatibility</strong> if you also target web/mobile). Click <strong>Create & Edit</strong>.</p><h3>The four main docks</h3><p>The editor layout is consistent across every Godot project. Learn these four regions and you can navigate anything.</p><table><thead><tr><th>Region</th><th>What it does</th></tr></thead><tbody><tr><td>Scene dock (top-left)</td><td>The tree of nodes in the currently open scene</td></tr><tr><td>FileSystem dock (bottom-left)</td><td>Every file on disk under <code>res://</code> (your project folder)</td></tr><tr><td>Viewport (center)</td><td>The 2D/3D editing canvas; tabs <strong>2D</strong>, <strong>3D</strong>, <strong>Script</strong>, <strong>AssetLib</strong> across the top</td></tr><tr><td>Inspector (right)</td><td>Every editable property of the selected node</td></tr></tbody></table><div class='box law'><div class='bt'>res:// vs user://</div> <code>res://</code> is your read-only project (bundled into exports). <code>user://</code> is a writable per-user folder for save files. Never try to write into <code>res://</code> at runtime.</div><h3>Running a project</h3><p>The play buttons are top-right. <strong>F5</strong> (Run Project) launches the <em>main</em> scene; <strong>F6</strong> (Run Current Scene) launches whatever scene tab is open. A brand-new project has no main scene, so F5 will prompt you to pick one. Use F6 while building individual scenes.</p><h3>Build the drag demo</h3><p>Create a root node: in the Scene dock click <strong>Other Node</strong>, choose <code>Node2D</code> (a plain 2D node). Add a child: click the <strong>+</strong>, add a <code>Sprite2D</code>. With the Sprite2D selected, in the Inspector set its <strong>Texture</strong> to Godot's built-in icon by dragging <code>icon.svg</code> from the FileSystem dock onto the Texture slot. To attach behaviour, select the Sprite2D and click the <strong>Attach Script</strong> icon (scroll-with-plus) above the Scene tree.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>draggable.gd</span></div><div class='term-body'>extends Sprite2D\n\nvar dragging := false\n\nfunc _input(event: InputEvent) -&gt; void:\n  <span class='cm'># Start/stop drag on left mouse button</span>\n  if event is InputEventMouseButton and event.button_index == MOUSE_BUTTON_LEFT:\n    if event.pressed:\n      <span class='cm'># Only grab if the click is over our texture</span>\n      var rect := Rect2(global_position - texture.get_size() * 0.5, texture.get_size())\n      dragging = rect.has_point(event.position)\n    else:\n      dragging = false\n  <span class='cm'># Follow the mouse while dragging</span>\n  elif event is InputEventMouseMotion and dragging:\n    global_position = event.position</div></div><p>Press <strong>F6</strong>. A window opens with the icon; click and drag it. You have a running interactive scene.</p><div class='game'><div class='game-head'>🎮 Build This: Draggable Sprite</div><div class='game-body'><p>A window showing a sprite you can pick up and move with the mouse.</p><ol><li>New project, root <code>Node2D</code>, child <code>Sprite2D</code> with the icon texture.</li><li>Attach <code>draggable.gd</code> above and paste the script.</li><li>Press F6, set this as the current scene, and drag the sprite around.</li><li>Bonus: set the window title in Project Settings → Display → Window.</li></ol></div></div>"},{"id":"p1-2","part":"01 · Godot","nav":"Nodes & Scene Tree","num":"1.2","kicker":"Part 01 · Lesson 2","title":"Nodes, Scenes & the Scene Tree","html":"<h3>Everything is a node</h3><p>A <strong>node</strong> is the atomic unit in Godot. Each node does one job: <code>Sprite2D</code> draws a texture, <code>AudioStreamPlayer</code> plays sound, <code>Timer</code> counts down, <code>CollisionShape2D</code> defines a hitbox. You build behaviour by composing many small nodes into a tree, not by writing one giant class.</p><h3>Scenes are reusable trees</h3><p>A <strong>scene</strong> is a saved tree of nodes (a <code>.tscn</code> file). The key insight: there is no real difference between a \"scene\" and a \"game object.\" A coin, an enemy, a bullet, a whole level, and the entire game are all just scenes. A scene can be <strong>instanced</strong> (dropped) inside another scene as many times as you want.</p><div class='box law'><div class='bt'>The composition rule.</div> If a subtree of nodes is something you will reuse or spawn at runtime, make it its own scene. One scene = one reusable thing.</div><h3>Build a Coin scene</h3><p>Create a new scene: <strong>Scene → New Scene</strong>. For the root, choose <code>Node2D</code> and rename it <code>Coin</code> (double-click the node name). Add a child <code>Sprite2D</code> with the icon texture, and tint it gold in the Inspector under <strong>Modulate</strong>. Save with <strong>Ctrl/Cmd+S</strong> as <code>coin.tscn</code>. Notice it now appears as a file in the FileSystem dock with a distinctive scene icon.</p><h3>The owner and ready order</h3><p>When a scene loads, nodes enter the tree <strong>depth-first, children before parents finish</strong>. Godot calls <code>_ready()</code> on a node only after all its children are ready — so a parent's <code>_ready()</code> can safely touch its children. This is why <code>_ready()</code> is the place to grab node references.</p><h3>Instance the Coin into a grid</h3><p>Make another new scene with a <code>Node2D</code> root named <code>CoinField</code>. To place a coin, click the <strong>chain/link</strong> icon in the Scene dock (\"Instantiate Child Scene\") and pick <code>coin.tscn</code>. It appears with a special instance icon — you can move it but its internals are locked to the original. Edit <code>coin.tscn</code> and <em>every</em> instance updates. That is the power of scene instancing.</p><p>Rather than placing dozens by hand, spawn the grid in code on the parent:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>coin_field.gd</span></div><div class='term-body'>extends Node2D\n\n<span class='cm'># preload bakes the scene into the script at compile time</span>\nconst CoinScene := preload(\"res://coin.tscn\")\n\nconst COLS := 8\nconst ROWS := 5\nconst SPACING := 80\n\nfunc _ready() -&gt; void:\n  for row in ROWS:\n    for col in COLS:\n      var coin := CoinScene.instantiate()        <span class='cm'># make a new copy</span>\n      coin.position = Vector2(col, row) * SPACING + Vector2(64, 64)\n      add_child(coin)                             <span class='cm'># attach it to the tree</span></div></div><div class='box tip'><div class='bt'>preload vs load.</div> <code>preload()</code> runs when the script is parsed (faster, errors caught early) and only takes a constant path. <code>load()</code> runs at the moment it is called and accepts a variable path — use it for assets chosen at runtime.</div><div class='box danger'><div class='bt'>instantiate() does not add to the tree.</div> A freshly instantiated scene exists in memory but is invisible and gets no <code>_process</code> calls until you <code>add_child()</code> it. Forgetting <code>add_child</code> is the #1 \"why is nothing showing\" bug.</div><p>Run <strong>F6</strong>: a tidy 8×5 grid of coins. Because each coin is an instance, changing the gold tint in <code>coin.tscn</code> recolors all 40 at once.</p><div class='game'><div class='game-head'>🎮 Build This: Coin Grid</div><div class='game-body'><p>A grid of instanced coin scenes spawned from a tileable scene.</p><ol><li>Build <code>coin.tscn</code>: <code>Node2D</code> root + tinted <code>Sprite2D</code>.</li><li>Build <code>coin_field.tscn</code> and attach <code>coin_field.gd</code>.</li><li>Spawn an 8×5 grid in <code>_ready()</code> with the loop above.</li><li>Bonus: scale each coin slightly differently with <code>coin.scale = Vector2.ONE * randf_range(0.8, 1.2)</code>.</li></ol></div></div>"},{"id":"p1-3","part":"01 · Godot","nav":"GDScript Basics","num":"1.3","kicker":"Part 01 · Lesson 3","title":"GDScript Basics & the _process Loop","html":"<h3>GDScript in 90 seconds</h3><p>GDScript is a Python-like language built for Godot. It uses indentation for blocks, optional static typing, and integrates directly with the node tree. A script always begins with <code>extends</code>, naming the node class it attaches to.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>syntax.gd</span></div><div class='term-body'>extends Node2D\n\nvar speed := 200.0          <span class='cm'># := infers float type</span>\nvar lives: int = 3          <span class='cm'># explicit type annotation</span>\nconst MAX_LIVES := 5        <span class='cm'># constant, cannot change</span>\n\nfunc add_score(points: int) -&gt; int:\n  return points * 10        <span class='cm'># typed return value</span>\n\nfunc _ready() -&gt; void:\n  var v := Vector2(1, 0)    <span class='cm'># built-in 2D vector type</span>\n  print(\"start at \", position, \" v=\", v.normalized())</div></div><div class='box tip'><div class='bt'>Type your variables.</div> The <code>:=</code> and <code>: Type</code> forms enable autocompletion and catch errors before you run. Untyped code works but loses these safety nets — prefer typed GDScript.</div><h3>The two lifecycle callbacks you need now</h3><table><thead><tr><th>Callback</th><th>When</th><th>Use for</th></tr></thead><tbody><tr><td><code>_ready()</code></td><td>Once, after the node and its children enter the tree</td><td>Setup, caching references, initial state</td></tr><tr><td><code>_process(delta)</code></td><td>Every rendered frame</td><td>Movement, animation, anything visual</td></tr></tbody></table><p>There is also <code>_physics_process(delta)</code>, called at a fixed rate (60 Hz by default) — use it for physics and <code>CharacterBody2D</code> movement. For now, <code>_process</code> is fine.</p><h3>Why delta matters</h3><p><code>delta</code> is the seconds elapsed since the previous frame. A 60 Hz monitor gives <code>delta ≈ 0.0166</code>; a 144 Hz monitor gives <code>≈ 0.0069</code>. If you move <code>position.x += 5</code> per frame, the sprite travels at different speeds on different machines. Multiply by delta and movement becomes <strong>framerate-independent</strong>: <code>position.x += speed * delta</code> always means \"speed pixels per second.\"</p><div class='box law'><div class='bt'>Multiply motion by delta.</div> Any per-frame change to position, rotation, or a timer should be scaled by <code>delta</code>. Forgetting this is the most common motion bug for beginners.</div><h3>Build the bouncing square</h3><p>New scene, <code>Node2D</code> root, child <code>Sprite2D</code> (the icon, tinted). Attach this to the root:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>bouncer.gd</span></div><div class='term-body'>extends Node2D\n\n@onready var sprite: Sprite2D = $Sprite2D   <span class='cm'># $ finds a child by name</span>\n\nvar velocity := Vector2(220, 160)           <span class='cm'># pixels per second</span>\nvar bounds := Vector2(1152, 648)            <span class='cm'># default window size</span>\nvar half: Vector2\n\nfunc _ready() -&gt; void:\n  half = sprite.texture.get_size() * sprite.scale * 0.5\n  sprite.position = bounds * 0.5            <span class='cm'># start centered</span>\n\nfunc _process(delta: float) -&gt; void:\n  sprite.position += velocity * delta       <span class='cm'># frame-independent move</span>\n  <span class='cm'># Reverse direction at each edge</span>\n  if sprite.position.x - half.x &lt; 0 or sprite.position.x + half.x &gt; bounds.x:\n    velocity.x = -velocity.x\n  if sprite.position.y - half.y &lt; 0 or sprite.position.y + half.y &gt; bounds.y:\n    velocity.y = -velocity.y</div></div><div class='box tip'><div class='bt'>@onready and $.</div> <code>$Sprite2D</code> is shorthand for <code>get_node(\"Sprite2D\")</code>. The <code>@onready</code> annotation defers the assignment until <code>_ready()</code>, when children exist — assigning at variable-declaration time would crash because the tree is not built yet.</div><div class='box danger'><div class='bt'>Sticky edges.</div> If you only flip velocity without checking direction, a fast object can re-trigger the flip next frame and jitter at the wall. Robust code also clamps position back inside, or checks that velocity points outward before flipping.</div><p>Run F6 — the square ricochets endlessly around the window at a constant real-world speed.</p><div class='game'><div class='game-head'>🎮 Build This: Bouncing Square</div><div class='game-body'><p>A sprite that drifts and bounces off all four window edges.</p><ol><li>Scene with <code>Node2D</code> + <code>Sprite2D</code>; attach <code>bouncer.gd</code>.</li><li>Give it a <code>velocity</code> and move by <code>velocity * delta</code> in <code>_process</code>.</li><li>Flip <code>velocity.x</code> / <code>velocity.y</code> at the matching edges.</li><li>Bonus: randomize the start direction with <code>velocity = Vector2.from_angle(randf() * TAU) * 250</code>.</li></ol></div></div>"},{"id":"p1-4","part":"01 · Godot","nav":"Signals & Input","num":"1.4","kicker":"Part 01 · Lesson 4","title":"Signals & the Input Map","html":"<h3>Signals: nodes that announce, not command</h3><p>A <strong>signal</strong> is Godot's built-in observer pattern. A node <em>emits</em> a signal when something happens; other nodes <em>connect</em> to it and react. This decouples code: a Ball does not need to know a Scoreboard exists — it just shouts \"I scored!\" and whoever cares listens.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ball.gd (declaring a signal)</span></div><div class='term-body'>extends Area2D\n\nsignal scored(who: String)   <span class='cm'># custom signal with one argument</span>\n\nfunc _on_goal_reached(side: String) -&gt; void:\n  scored.emit(side)           <span class='cm'># Godot 4: signal.emit(args)</span></div></div><p>Connect signals in code or in the editor. In the editor, select the emitting node, open the <strong>Node → Signals</strong> dock, double-click a signal, and pick the receiving node — Godot generates a callback stub. In code:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.gd (connecting)</span></div><div class='term-body'>func _ready() -&gt; void:\n  $Ball.scored.connect(_on_ball_scored)\n\nfunc _on_ball_scored(who: String) -&gt; void:\n  print(who, \" scored!\")</div></div><div class='box tip'><div class='bt'>Built-in signals everywhere.</div> Buttons emit <code>pressed</code>, timers emit <code>timeout</code>, <code>Area2D</code> emits <code>body_entered</code>. You connect to them the same way as custom ones.</div><h3>The Input Map: never hard-code keys</h3><p>Open <strong>Project → Project Settings → Input Map</strong>. Add named <strong>actions</strong> like <code>left_up</code>, <code>left_down</code>, <code>right_up</code>, <code>right_down</code>. For each, click <strong>+</strong> and press the physical key to bind it (e.g. W/S for the left paddle, Up/Down for the right). Now your code asks about <em>intent</em>, not hardware:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>paddle.gd</span></div><div class='term-body'>extends CharacterBody2D\n\n@export var up_action := \"left_up\"      <span class='cm'># set per paddle in Inspector</span>\n@export var down_action := \"left_down\"\nvar speed := 500.0\n\nfunc _physics_process(delta: float) -&gt; void:\n  var dir := Input.get_axis(up_action, down_action)  <span class='cm'># -1, 0, or 1</span>\n  velocity.y = dir * speed\n  move_and_slide()\n  position.y = clampf(position.y, 40, 608)            <span class='cm'># keep on screen</span></div></div><div class='box law'><div class='bt'>Actions, not scancodes.</div> Input-map actions let you rebind keys, support gamepads, and add multiple bindings per action — all without touching gameplay code. <code>@export</code> exposes a variable in the Inspector so the same paddle script serves both players.</div><h3>Build Pong</h3><p>Scene structure: a <code>Node2D</code> root named <code>Pong</code> holding two <code>CharacterBody2D</code> paddles (each with a <code>CollisionShape2D</code> rectangle and a <code>Sprite2D</code>/ColorRect), one <code>CharacterBody2D</code> ball, and a <code>Label</code> for the score. The ball uses <code>move_and_collide</code> and flips velocity on hit:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong_ball.gd</span></div><div class='term-body'>extends CharacterBody2D\n\nsignal scored(side: String)\nvar speed := 420.0\n\nfunc _ready() -&gt; void:\n  velocity = Vector2(1, randf_range(-0.4, 0.4)).normalized() * speed\n\nfunc _physics_process(delta: float) -&gt; void:\n  var hit := move_and_collide(velocity * delta)\n  if hit:\n    velocity = velocity.bounce(hit.get_normal())   <span class='cm'># reflect off paddle/wall</span>\n    velocity = velocity.normalized() * speed\n  <span class='cm'># Off the left/right edge = a point</span>\n  if position.x &lt; 0:\n    scored.emit(\"right\"); reset()\n  elif position.x &gt; 1152:\n    scored.emit(\"left\"); reset()\n\nfunc reset() -&gt; void:\n  position = Vector2(576, 324)\n  velocity = Vector2([-1, 1].pick_random(), randf_range(-0.4, 0.4)).normalized() * speed</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong.gd (root)</span></div><div class='term-body'>extends Node2D\nvar left := 0\nvar right := 0\n\nfunc _ready() -&gt; void:\n  $Ball.scored.connect(_on_scored)\n\nfunc _on_scored(side: String) -&gt; void:\n  if side == \"left\": left += 1\n  else: right += 1\n  $Score.text = \"%d  -  %d\" % [left, right]</div></div><div class='game'><div class='game-head'>🎮 Build This: Pong</div><div class='game-body'><p>Two-player Pong with input-map controls and a signal-driven score.</p><ol><li>Add input actions for both paddles in the Input Map.</li><li>Build paddles from <code>CharacterBody2D</code>; set each paddle's <code>@export</code> actions.</li><li>Ball reflects with <code>velocity.bounce()</code> and emits <code>scored</code>.</li><li>Root connects <code>scored</code> and updates a <code>Label</code>.</li></ol></div></div>"},{"id":"p1-5","part":"01 · Godot","nav":"Sprites & Animation","num":"1.5","kicker":"Part 01 · Lesson 5","title":"Sprites, AnimatedSprite2D & Atlases","html":"<h3>Importing pixel art the right way</h3><p>Drop a PNG into your project folder and it appears in the FileSystem dock. Before using it, select it and open the <strong>Import</strong> tab (top-left
