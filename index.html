eleport everything off-screen when you return.</div><h3>A box that moves</h3><p>Give the box a position and a velocity (pixels per second) and move it with <code>dt</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>box.js</span></div><div class='term-body'><span class='pr'>const</span> box = { x: <span class='am'>40</span>, y: <span class='am'>40</span>, vx: <span class='am'>120</span>, vy: <span class='am'>90</span>, s: <span class='am'>30</span> };\n\n<span class='pr'>function</span> <span class='pr'>update</span>(dt) {\n  box.x += box.vx * dt;  <span class='cm'>// move 120 px every second</span>\n  box.y += box.vy * dt;\n}\n<span class='pr'>function</span> <span class='pr'>render</span>() {\n  ctx.fillStyle = <span class='ok'>'#111'</span>;\n  ctx.fillRect(<span class='am'>0</span>, <span class='am'>0</span>, canvas.width, canvas.height); <span class='cm'>// clear</span>\n  ctx.fillStyle = <span class='ok'>'#3cf'</span>;\n  ctx.fillRect(box.x, box.y, box.s, box.s);\n}</div></div><p>Run it: the box slides off-screen forever. Next lesson it will bounce — but first, your job.</p><div class='box lab'><div class='bt'>Lab.</div> Open the page, then change <code>vx</code> and <code>vy</code>. Comment out the clear line in <code>render</code> and watch the box smear into a trail — proof the loop redraws every frame.</div><div class='game'><div class='game-head'>🎮 Build This: Toy — Bouncing Box</div><div class='game-body'><p><strong>Genre: Toy.</strong> This STARTS the arc — your very first canvas program, the seed every later game grows from.</p><ol><li>Create <code>index.html</code> with a 480x320 canvas and a <code>&lt;script&gt;</code>.</li><li>Grab the context and set up the rAF loop with clamped <code>dt</code>.</li><li>Give the box <code>x, y, vx, vy</code> and move it in <code>update(dt)</code>.</li><li>Make it BOUNCE: if <code>box.x &lt; 0</code> or <code>box.x + box.s &gt; canvas.width</code>, flip <code>box.vx = -box.vx</code>. Same for y with <code>vy</code>.</li><li>Bonus: change the fill color each time it bounces.</li></ol></div></div>"},{"id":"p6-2","part":"06 · JavaScript (from scratch)","nav":"Input & Pong","num":"6.2","kicker":"Part 06 · Lesson 2","title":"Keyboard, Mouse, Touch — and Pong","html":"<h3>Games listen for input</h3><p>Last lesson the box moved on its own. A <em>game</em> responds to a player. The browser fires <strong>events</strong> for keys, mouse, and touch. The trick: do not act inside the event itself — instead record input in a state object that <code>update(dt)</code> reads every frame. This keeps movement smooth and tied to delta time.</p><h3>Keyboard</h3><p>Track which keys are currently held in a plain object keyed by <code>event.code</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>keys.js</span></div><div class='term-body'><span class='pr'>const</span> keys = {};\naddEventListener(<span class='ok'>'keydown'</span>, e =&gt; { keys[e.code] = <span class='pr'>true</span>; });\naddEventListener(<span class='ok'>'keyup'</span>,   e =&gt; { keys[e.code] = <span class='pr'>false</span>; });\n\n<span class='cm'>// in update(dt):</span>\n<span class='pr'>if</span> (keys[<span class='ok'>'ArrowUp'</span>])   player.y -= speed * dt;\n<span class='pr'>if</span> (keys[<span class='ok'>'ArrowDown'</span>]) player.y += speed * dt;</div></div><p><code>e.code</code> gives physical key names like <code>'KeyW'</code>, <code>'Space'</code>, <code>'ArrowLeft'</code> — independent of keyboard layout. Use it, not <code>e.key</code>, for movement.</p><h3>Mouse &amp; touch</h3><p>For pointer position you must convert from page coordinates to <em>canvas</em> coordinates using the canvas's bounding box. Touch is almost identical — a touch carries the same <code>clientX/clientY</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pointer.js</span></div><div class='term-body'><span class='pr'>const</span> mouse = { x: <span class='am'>0</span>, y: <span class='am'>0</span> };\n<span class='pr'>function</span> <span class='pr'>toCanvas</span>(clientX, clientY) {\n  <span class='pr'>const</span> r = canvas.getBoundingClientRect();\n  mouse.x = clientX - r.left;\n  mouse.y = clientY - r.top;\n}\ncanvas.addEventListener(<span class='ok'>'mousemove'</span>, e =&gt; toCanvas(e.clientX, e.clientY));\ncanvas.addEventListener(<span class='ok'>'touchmove'</span>, e =&gt; {\n  e.preventDefault();                 <span class='cm'>// stop the page scrolling</span>\n  <span class='pr'>const</span> t = e.touches[<span class='am'>0</span>];\n  toCanvas(t.clientX, t.clientY);\n}, { passive: <span class='pr'>false</span> });</div></div><div class='box tip'><div class='bt'>Tip.</div> <code>preventDefault()</code> on touch stops the browser scrolling or zooming while the player drags. Pass <code>{ passive: false }</code> or the browser ignores your preventDefault.</div><h3>Building Pong</h3><p>Pong is two paddles, a ball, and scores. We reuse everything from lesson 1: a velocity-driven ball that bounces, plus paddles driven by input. Here is the left paddle (W/S keys) and a mouse/touch-driven right paddle.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong.js</span></div><div class='term-body'><span class='pr'>const</span> W = canvas.width, H = canvas.height;\n<span class='pr'>const</span> ball  = { x: W/<span class='am'>2</span>, y: H/<span class='am'>2</span>, vx: <span class='am'>200</span>, vy: <span class='am'>140</span>, r: <span class='am'>7</span> };\n<span class='pr'>const</span> left  = { x: <span class='am'>20</span>,    y: H/<span class='am'>2</span>-<span class='am'>30</span>, w: <span class='am'>10</span>, h: <span class='am'>60</span> };\n<span class='pr'>const</span> right = { x: W-<span class='am'>30</span>, y: H/<span class='am'>2</span>-<span class='am'>30</span>, w: <span class='am'>10</span>, h: <span class='am'>60</span> };\n<span class='pr'>const</span> PADDLE = <span class='am'>260</span>; <span class='cm'>// px/sec</span>\n\n<span class='pr'>function</span> <span class='pr'>update</span>(dt) {\n  <span class='pr'>if</span> (keys[<span class='ok'>'KeyW'</span>]) left.y -= PADDLE * dt;\n  <span class='pr'>if</span> (keys[<span class='ok'>'KeyS'</span>]) left.y += PADDLE * dt;\n  right.y = mouse.y - right.h/<span class='am'>2</span>;      <span class='cm'>// follow pointer</span>\n\n  ball.x += ball.vx * dt;\n  ball.y += ball.vy * dt;\n  <span class='pr'>if</span> (ball.y &lt; <span class='am'>0</span> || ball.y &gt; H) ball.vy *= -<span class='am'>1</span>; <span class='cm'>// top/bottom</span>\n}</div></div><p>To bounce off a paddle, check overlap between the ball and the paddle rectangle, then reverse <code>vx</code>. (We will formalize this rectangle test next lesson; for now an inline check is fine.)</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>paddle-hit.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>hits</span>(p) {\n  <span class='pr'>return</span> ball.x &gt; p.x &amp;&amp; ball.x &lt; p.x+p.w &amp;&amp;\n         ball.y &gt; p.y &amp;&amp; ball.y &lt; p.y+p.h;\n}\n<span class='pr'>if</span> (hits(left) || hits(right)) {\n  ball.vx *= -<span class='am'>1.05</span>; <span class='cm'>// reverse + speed up a touch</span>\n}</div></div><p>Render is just rectangles and a circle (<code>ctx.beginPath(); ctx.arc(...); ctx.fill();</code>). Add a score: increment when the ball passes an edge, then reset the ball to center.</p><div class='box lab'><div class='bt'>Lab.</div> Clamp the paddles inside the field: <code>left.y = Math.max(0, Math.min(H - left.h, left.y));</code> so they cannot slide off the top or bottom.</div><div class='game'><div class='game-head'>🎮 Build This: Arcade — Pong</div><div class='game-body'><p><strong>Genre: Arcade.</strong> This STARTS the arcade genre, building directly on the bouncing-box loop from Lesson 1.</p><ol><li>Set up the loop and the <code>keys</code> + <code>mouse</code>/touch trackers.</li><li>Left paddle on W/S; right paddle follows the mouse OR touch.</li><li>Ball bounces off top and bottom; reverses (and speeds up) on paddle hits.</li><li>When the ball exits left or right, award a point to the other side and reset the ball to center with a random vy.</li><li>Draw the two scores with <code>ctx.fillText</code>. Bonus: a dashed center net.</li></ol></div></div>"},{"id":"p6-3","part":"06 · JavaScript (from scratch)","nav":"Collision & Breakout","num":"6.3","kicker":"Part 06 · Lesson 3","title":"Collision Detection & Breakout","html":"<h3>The most useful trick in 2D games</h3><p>Pong's paddle check was a one-off. Now we make it reusable. The workhorse of 2D collision is <strong>AABB</strong> — Axis-Aligned Bounding Box. Two rectangles overlap if they overlap on BOTH the x-axis and the y-axis. One tiny function powers Breakout, platformers, shooters — almost everything.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>aabb.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>aabb</span>(a, b) {\n  <span class='pr'>return</span> a.x &lt; b.x + b.w &amp;&amp;\n         a.x + a.w &gt; b.x &amp;&amp;\n         a.y &lt; b.y + b.h &amp;&amp;\n         a.y + a.h &gt; b.y;\n}\n<span class='cm'>// each object just needs x, y, w, h</span></div></div><p>Read it as: \"a's left edge is left of b's right edge, AND a's right edge is right of b's left edge\" — repeated for the vertical axis. All four true means the boxes touch.</p><div class='box tip'><div class='bt'>Tip.</div> A ball is round, but treating it as a small square for AABB is fine for Breakout and most arcade games. A true circle-vs-rect test clamps the circle center to the rectangle and measures distance — overkill here.</div><h3>Which side did we hit?</h3><p>Knowing you collided is not enough — you need to know whether to flip <code>vx</code> or <code>vy</code>. A simple, reliable approach: compare the ball-to-rect offset on each axis (normalized by half-size) and bounce off the dominant axis.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>resolve.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>bounceOff</span>(ball, rect) {\n  <span class='pr'>const</span> bx = ball.x + ball.w/<span class='am'>2</span>, by = ball.y + ball.h/<span class='am'>2</span>;\n  <span class='pr'>const</span> rx = rect.x + rect.w/<span class='am'>2</span>, ry = rect.y + rect.h/<span class='am'>2</span>;\n  <span class='pr'>const</span> dx = (bx - rx) / (rect.w/<span class='am'>2</span>);\n  <span class='pr'>const</span> dy = (by - ry) / (rect.h/<span class='am'>2</span>);\n  <span class='pr'>if</span> (Math.abs(dx) &gt; Math.abs(dy)) ball.vx = Math.sign(dx) * Math.abs(ball.vx);\n  <span class='pr'>else</span>                            ball.vy = Math.sign(dy) * Math.abs(ball.vy);\n}</div></div><h3>Breakout: the brick grid</h3><p>Breakout is Pong with a twist: instead of an opponent, a wall of bricks. Generate the grid as an array of rectangles, each with an <code>alive</code> flag.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>bricks.js</span></div><div class='term-body'><span class='pr'>const</span> bricks = [];\n<span class='pr'>const</span> COLS = <span class='am'>8</span>, ROWS = <span class='am'>4</span>, BW = <span class='am'>54</span>, BH = <span class='am'>18</span>, PAD = <span class='am'>4</span>;\n<span class='pr'>for</span> (<span class='pr'>let</span> r = <span class='am'>0</span>; r &lt; ROWS; r++)\n  <span class='pr'>for</span> (<span class='pr'>let</span> c = <span class='am'>0</span>; c &lt; COLS; c++)\n    bricks.push({\n      x: <span class='am'>20</span> + c*(BW+PAD),\n      y: <span class='am'>30</span> + r*(BH+PAD),\n      w: BW, h: BH, alive: <span class='pr'>true</span>\n    });</div></div><p>Each frame, after moving the ball, loop the bricks. On a hit, kill the brick, bounce, and add score. The paddle uses the same AABB.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>update.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>update</span>(dt) {\n  paddle.x = mouse.x - paddle.w/<span class='am'>2</span>;\n  ball.x += ball.vx * dt;\n  ball.y += ball.vy * dt;\n  <span class='pr'>if</span> (ball.x &lt; <span class='am'>0</span> || ball.x+ball.w &gt; W) ball.vx *= -<span class='am'>1</span>;\n  <span class='pr'>if</span> (ball.y &lt; <span class='am'>0</span>) ball.vy *= -<span class='am'>1</span>;\n\n  <span class='pr'>if</span> (aabb(ball, paddle)) bounceOff(ball, paddle);\n  <span class='pr'>for</span> (<span class='pr'>const</span> b <span class='pr'>of</span> bricks) {\n    <span class='pr'>if</span> (b.alive &amp;&amp; aabb(ball, b)) {\n      b.alive = <span class='pr'>false</span>; score += <span class='am'>10</span>; bounceOff(ball, b);\n      <span class='pr'>break</span>; <span class='cm'>// one brick per frame avoids double-bounces</span>\n    }\n  }\n  <span class='pr'>if</span> (ball.y &gt; H) { lives--; resetBall(); } <span class='cm'>// fell off bottom</span>\n}</div></div><p>Render bricks with a quick loop, skipping dead ones. You now have a complete, satisfying arcade game.</p><div class='box lab'><div class='bt'>Lab.</div> Make the bounce angle depend on WHERE the ball hits the paddle: <code>const t = (ball.x - paddle.x) / paddle.w; ball.vx = (t - 0.5) * 400;</code>. Now players can aim — the heart of Breakout's skill.</div><div class='game'><div class='game-head'>🎮 Build This: Arcade — Breakout</div><div class='game-body'><p><strong>Genre: Arcade.</strong> This EXTENDS your Pong code — keep the loop, ball, and paddle; replace the second paddle with a brick wall.</p><ol><li>Add the <code>aabb</code> helper and the <code>bounceOff</code> resolver.</li><li>Generate an 8x4 brick grid as an array of <code>{x,y,w,h,alive}</code>.</li><li>Paddle follows mouse/touch; ball bounces off walls, paddle, and bricks.</li><li>Kill bricks on hit, add score, lose a life when the ball drops off the bottom.</li><li>Win when all bricks are dead; show \"You Win!\". Bonus: paddle-position aiming from the Lab.</li></ol></div></div>"},{"id":"p6-4","part":"06 · JavaScript (from scratch)","nav":"Gravity & Flappy","num":"6.4","kicker":"Part 06 · Lesson 4","title":"Gravity, Tap Input & a Flappy Tapper","html":"<h3>A brand-new genre</h3><p>Arcade bouncing is symmetric — energy in, energy out. Real-feeling movement needs <strong>acceleration</strong>: a force that constantly changes velocity. The most famous force is gravity, and the most famous one-button game built on it is the Flappy-style tapper. This lesson STARTS a new genre, and the physics here carry straight into next lesson's platformer.</p><h3>The physics of gravity</h3><p>Every frame, gravity adds to vertical velocity; velocity then moves the object. Both steps scale by <code>dt</code>. Gravity is just a constant acceleration in px/sec².</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>gravity.js</span></div><div class='term-body'><span class='pr'>const</span> GRAV = <span class='am'>1400</span>;   <span class='cm'>// px per second, per second</span>\n<span class='pr'>const</span> FLAP = <span class='am'>-420</span>;   <span class='cm'>// upward velocity on a tap (y is down!)</span>\n<span class='pr'>const</span> bird = { x: <span class='am'>80</span>, y: <span class='am'>150</span>, vy: <span class='am'>0</span>, r: <span class='am'>12</span> };\n\n<span class='pr'>function</span> <span class='pr'>update</span>(dt) {\n  bird.vy += GRAV * dt;    <span class='cm'>// accelerate downward</span>\n  bird.y  += bird.vy * dt;  <span class='cm'>// integrate position</span>\n}</div></div><p>That is the entire feel of the game. A tap sets <code>vy</code> to a fixed negative number — an instant upward kick that gravity immediately fights. The arc you feel is acceleration at work.</p><h3>Tap input: one action, three devices</h3><p>This genre needs a single \"flap\" action triggered by a key press, a click, or a touch. Wire all three to one function. Note we use <code>keydown</code> (a discrete press) rather than the held-key state from Pong.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>tap.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>flap</span>() { bird.vy = FLAP; }\n\naddEventListener(<span class='ok'>'keydown'</span>, e =&gt; { <span class='pr'>if</span> (e.code === <span class='ok'>'Space'</span>) flap(); });\ncanvas.addEventListener(<span class='ok'>'mousedown'</span>, flap);\ncanvas.addEventListener(<span class='ok'>'touchstart'</span>, e =&gt; { e.preventDefault(); flap(); }, { passive: <span class='pr'>false</span> });</div></div><h3>Scrolling pipes</h3><p>The bird stays put horizontally; the world scrolls left. Each pipe is a pair of rectangles with a gap. Spawn on a timer, move them left, remove off-screen ones.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pipes.js</span></div><div class='term-body'><span class='pr'>let</span> pipes = [], timer = <span class='am'>0</span>;\n<span class='pr'>const</span> GAP = <span class='am'>110</span>, SPEED = <span class='am'>160</span>, W = canvas.width, H = canvas.height;\n\n<span class='pr'>function</span> <span class='pr'>spawnPipe</span>() {\n  <span class='pr'>const</span> top = <span class='am'>40</span> + Math.random() * (H - GAP - <span class='am'>80</span>);\n  pipes.push({ x: W, top, bottom: top + GAP, w: <span class='am'>52</span>, passed: <span class='pr'>false</span> });\n}\n\n<span class='pr'>function</span> <span class='pr'>updatePipes</span>(dt) {\n  timer += dt;\n  <span class='pr'>if</span> (timer &gt; <span class='am'>1.4</span>) { timer = <span class='am'>0</span>; spawnPipe(); }\n  <span class='pr'>for</span> (<span class='pr'>const</span> p <span class='pr'>of</span> pipes) p.x -= SPEED * dt;\n  pipes = pipes.filter(p =&gt; p.x + p.w &gt; <span class='am'>0</span>); <span class='cm'>// drop off-screen pipes</span>\n}</div></div><h3>Collision &amp; scoring</h3><p>Reuse AABB from Breakout: treat the bird as a box, test it against the top and bottom pipe rects. Hitting either — or the ground/ceiling — ends the run. Score a point when a pipe's right edge passes the bird.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>check.js</span></div><div class='term-body'><span class='pr'>const</span> b = { x: bird.x-bird.r, y: bird.y-bird.r, w: bird.r*<span class='am'>2</span>, h: bird.r*<span class='am'>2</span> };\n<span class='pr'>for</span> (<span class='pr'>const</span> p <span class='pr'>of</span> pipes) {\n  <span class='pr'>const</span> topR = { x: p.x, y: <span class='am'>0</span>, w: p.w, h: p.top };\n  <span class='pr'>const</span> botR = { x: p.x, y: p.bottom, w: p.w, h: H - p.bottom };\n  <span class='pr'>if</span> (aabb(b, topR) || aabb(b, botR)) gameOver();\n  <span class='pr'>if</span> (!p.passed &amp;&amp; p.x + p.w &lt; bird.x) { p.passed = <span class='pr'>true</span>; score++; }\n}\n<span class='pr'>if</span> (bird.y &gt; H || bird.y &lt; <span class='am'>0</span>) gameOver();</div></div><div class='box tip'><div class='bt'>Tip.</div> Tune <code>GRAV</code> and <code>FLAP</code> together. High gravity with a strong flap feels twitchy; low values feel floaty. This pair IS your game's personality — spend time on it.</div><div class='game'><div class='game-head'>🎮 Build This: Tapper — Flappy Square</div><div class='game-body'><p><strong>Genre: One-button tapper (NEW genre).</strong> This STARTS a new genre but reuses the <code>aabb</code> helper from your Breakout build.</p><ol><li>Bird with <code>y, vy</code>; gravity each frame; a tap sets <code>vy = FLAP</code>.</li><li>Wire flap to Space, mouse, and touch.</li><li>Spawn pipe pairs on a timer; scroll them left; remove off-screen ones.</li><li>AABB the bird against both pipe rects and the screen edges; end the run on contact.</li><li>Score when a pipe passes; show score and a \"tap to restart\" on game over. Bonus: a downward tilt based on <code>vy</code> using <code>ctx.rotate</code>.</li></ol></div></div>"},{"id":"p6-5","part":"06 · JavaScript (from scratch)","nav":"Platformer","num":"6.5","kicker":"Part 06 · Lesson 5","title":"Vectors, Tiles & a 2D Platformer","html":"<h3>A new genre: gravity meets ground</h3><p>The Flappy tapper had gravity but nothing to stand on. A platformer adds <strong>solid ground</strong> and <strong>jumping</strong> — the player accelerates downward until landing on a platform, then can leap. This STARTS a new genre and leans on the gravity you learned last lesson.</p><h3>Vectors, briefly</h3><p>A <strong>vector</strong> is just an (x, y) pair representing a position, velocity, or direction. We have used them informally as <code>{x, y}</code> and <code>{vx, vy}</code>. Two operations matter most: adding vectors (apply velocity to position) and scaling (multiply by <code>dt</code>). That is the whole foundation of movement.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>vec.js</span></div><div class='term-body'><span class='cm'>// position += velocity * dt  -- the universal movement step</span>\np.x += p.vx * dt;\np.y += p.vy * dt;</div></div><h3>The player &amp; horizontal movement</h3><p>Left/right is direct: held keys set horizontal velocity. We multiply by <code>dt</code> as always.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>player.js</span></div><div class='term-body'><span class='pr'>const</span> p = { x: <span class='am'>40</span>, y: <span class='am'>100</span>, w: <span class='am'>22</span>, h: <span class='am'>30</span>, vx: <span class='am'>0</span>, vy: <span class='am'>0</span>, onGround: <span class='pr'>false</span> };\n<span class='pr'>const</span> SPEED = <span class='am'>200</span>, GRAV = <span class='am'>1500</span>, JUMP = <span class='am'>-520</span>;\n\n<span class='pr'>function</span> <span class='pr'>update</span>(dt) {\n  p.vx = <span class='am'>0</span>;\n  <span class='pr'>if</span> (keys[<span class='ok'>'ArrowLeft'</span>])  p.vx = -SPEED;\n  <span class='pr'>if</span> (keys[<span class='ok'>'ArrowRight'</span>]) p.vx =  SPEED;\n  <span class='pr'>if</span> (keys[<span class='ok'>'Space'</span>] &amp;&amp; p.onGround) { p.vy = JUMP; p.onGround = <span class='pr'>false</span>; }\n  p.vy += GRAV * dt;\n  move(dt);\n}</div></div><h3>The platforms &amp; landing</h3><p>Platforms are just rectangles. The classic robust technique is <strong>axis-separated movement</strong>: move on x, resolve x collisions, THEN move on y, resolve y collisions. This prevents snagging on edges and makes \"landing\" reliable.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>resolve.js</span></div><div class='term-body'><span class='pr'>const</span> platforms = [\n  { x: <span class='am'>0</span>,   y: <span class='am'>290</span>, w: <span class='am'>480</span>, h: <span class='am'>30</span> }, <span class='cm'>// floor</span>\n  { x: <span class='am'>120</span>, y: <span class='am'>220</span>, w: <span class='am'>100</span>, h: <span class='am'>14</span> },\n  { x: <span class='am'>300</span>, y: <span class='am'>170</span>, w: <span class='am'>110</span>, h: <span class='am'>14</span> }\n];\n\n<span class='pr'>function</span> <span class='pr'>move</span>(dt) {\n  p.x += p.vx * dt;\n  <span class='pr'>for</span> (<span class='pr'>const</span> t <span class='pr'>of</span> platforms) <span class='pr'>if</span> (aabb(p, t)) {\n    <span class='pr'>if</span> (p.vx &gt; <span class='am'>0</span>) p.x = t.x - p.w; <span class='pr'>else</span> <span class='pr'>if</span> (p.vx &lt; <span class='am'>0</span>) p.x = t.x + t.w;\n  }\n  p.y += p.vy * dt;\n  p.onGround = <span class='pr'>false</span>;\n  <span class='pr'>for</span> (<span class='pr'>const</span> t <span class='pr'>of</span> platforms) <span class='pr'>if</span> (aabb(p, t)) {\n    <span class='pr'>if</span> (p.vy &gt; <span class='am'>0</span>) { p.y = t.y - p.h; p.onGround = <span class='pr'>true</span>; } <span class='cm'>// landed</span>\n    <span class='pr'>else</span> <span class='pr'>if</span> (p.vy &lt; <span class='am'>0</span>) p.y = t.y + t.h;                <span class='cm'>// bonked head</span>\n    p.vy = <span class='am'>0</span>;\n  }\n}</div></div><p>When falling (<code>vy &gt; 0</code>) and overlapping a platform, snap the player to sit on top and flag <code>onGround</code> — exactly what the jump check reads. That single flag is the difference between a floaty mess and a real platformer.</p><div class='box tip'><div class='bt'>Tip.</div> Add <strong>coyote time</strong> for game feel: allow a jump for ~0.1s AFTER leaving a ledge. Keep a <code>coyote</code> timer that resets to 0.1 when grounded and counts down otherwise; let the jump check use <code>coyote &gt; 0</code>. Players will swear the controls feel \"tight.\"</div><h3>A camera (optional but easy)</h3><p>For a level wider than the canvas, offset all drawing by a camera that follows the player. Before drawing, <code>ctx.save(); ctx.translate(-camX, 0);</code> then <code>ctx.restore()</code> after. The world scrolls; your collision code is unchanged.</p><div class='game'><div class='game-head'>🎮 Build This: Platformer — Square Quest</div><div class='game-body'><p><strong>Genre: 2D platformer (NEW genre).</strong> This STARTS a new genre and reuses gravity from the Flappy tapper plus <code>aabb</code> from Breakout.</p><ol><li>Player with <code>vx, vy, onGround</code>; arrow keys move, Space jumps only when grounded.</li><li>Apply gravity each frame; implement axis-separated movement and resolution.</li><li>Lay out at least 4 platforms at different heights, including a floor.</li><li>Add a few collectible coins (AABB pickups) and a goal flag that wins the level.</li><li>Bonus: add coyote time and a camera that follows the player across a wide level.</li></ol></div></div>"},{"id":"p6-6","part":"06 · JavaScript (from scratch)","nav":"Sprites & shooter","num":"6.6","kicker":"Part 06 · Lesson 6","title":"Images, Spritesheet Animation & a Top-Down Shooter","html":"<h3>From rectangles to real art</h3><p>Every game so far used <code>fillRect</code>. Now we draw <strong>images</strong> and animate <strong>spritesheets</strong>, then build a top-down shooter that spawns enemies and fires bullets using vectors. This STARTS a new genre.</p><h3>Loading and drawing an image</h3><p>Create an <code>Image</code>, set its <code>src</code>, and wait for <code>onload</code> before drawing. Use simple <code>drawImage(img, x, y)</code>, or the scaled form with width and height.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>image.js</span></div><div class='term-body'><span class='pr'>const</span> ship = <span class='pr'>new</span> Image();\nship.src = <span class='ok'>'ship.png'</span>;\n<span class='pr'>let</span> ready = <span class='pr'>false</span>;\nship.onload = () =&gt; { ready = <span class='pr'>true</span>; };\n\n<span class='cm'>// in render, once ready:</span>\nctx.drawImage(ship, player.x, player.y, <span class='am'>32</span>, <span class='am'>32</span>);</div></div><div class='box tip'><div class='bt'>Tip.</div> Pixel art looks blurry when scaled. Turn off smoothing once: <code>ctx.imageSmoothingEnabled = false;</code>. Also add <code>image-rendering:pixelated</code> to the canvas style for crisp upscaled pixels.</div><h3>Spritesheet animation</h3><p>A spritesheet packs many frames into one image. Animation = drawing a different <em>source rectangle</em> each frame. The 9-argument <code>drawImage</code> cuts a sub-rectangle from the source and paints it to a destination rectangle.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>anim.js</span></div><div class='term-body'><span class='cm'>// drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh)</span>\n<span class='pr'>const</span> FW = <span class='am'>16</span>, FH = <span class='am'>16</span>, FRAMES = <span class='am'>4</span>;\n<span class='pr'>let</span> frame = <span class='am'>0</span>, animTimer = <span class='am'>0</span>;\n\n<span class='pr'>function</span> <span class='pr'>animate</span>(dt) {\n  animTimer += dt;\n  <span class='pr'>if</span> (animTimer &gt; <span class='am'>0.12</span>) { animTimer = <span class='am'>0</span>; frame = (frame + <span class='am'>1</span>) % FRAMES; }\n}\n<span class='pr'>function</span> <span class='pr'>drawSprite</span>(img, row, x, y) {\n  ctx.drawImage(img, frame*FW, row*FH, FW, FH, x, y, FW*<span class='am'>2</span>, FH*<span class='am'>2</span>);\n}</div></div><p>The <code>frame</code> picks the column; a <code>row</code> argument picks the animation (walk, idle, etc.). Advancing on a timer — not every frame — keeps animation speed independent of frame rate.</p><h3>The shooter: vectors for aiming</h3><p>Top-down means no gravity; the player moves freely with WASD. To fire toward the mouse, build a <strong>direction vector</strong> from player to cursor and <strong>normalize</strong> it (scale to length 1) so bullet speed is constant in every direction.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>shoot.js</span></div><div class='term-body'><span class='pr'>const</span> bullets = [];\n<span class='pr'>function</span> <span class='pr'>fire</span>() {\n  <span class='pr'>let</span> dx = mouse.x - player.x, dy = mouse.y - player.y;\n  <span class='pr'>const</span> len = Math.hypot(dx, dy) || <span class='am'>1</span>; <span class='cm'>// vector length</span>\n  dx /= len; dy /= len;                  <span class='cm'>// normalize</span>\n  bullets.push({ x: player.x, y: player.y, vx: dx*<span class='am'>500</span>, vy: dy*<span class='am'>500</span>, w: <span class='am'>6</span>, h: <span class='am'>6</span> });\n}\ncanvas.addEventListener(<span class='ok'>'mousedown'</span>, fire);</div></div><h3>Spawning enemies &amp; hits</h3><p>Enemies spawn at the edges and steer toward the player using the same normalize trick. Each frame: move bullets, move enemies, then check every bullet against every enemy with AABB; remove both on a hit.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>enemies.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>steer</span>(e, dt) {\n  <span class='pr'>let</span> dx = player.x - e.x, dy = player.y - e.y;\n  <span class='pr'>const</span> len = Math.hypot(dx, dy) || <span class='am'>1</span>;\n  e.x += (dx/len) * <span class='am'>90</span> * dt;\n  e.y += (dy/len) * <span class='am'>90</span> * dt;\n}\n<span class='cm'>// collision pass (loop backwards so splice is safe)</span>\n<span class='pr'>for</span> (<span class='pr'>let</span> i = enemies.length-<span class='am'>1</span>; i &gt;= <span class='am'>0</span>; i--)\n  <span class='pr'>for</span> (<span class='pr'>let</span> j = bullets.length-<span class='am'>1</span>; j &gt;= <span class='am'>0</span>; j--)\n    <span class='pr'>if</span> (aabb(enemies[i], bullets[j])) {\n      enemies.splice(i, <span class='am'>1</span>); bullets.splice(j, <span class='am'>1</span>); score += <span class='am'>10</span>; <span class='pr'>break</span>;\n    }</div></div><div class='box tip'><div class='bt'>Tip.</div> No art? You can still ship: draw the player and enemies as colored circles or rotated triangles. Swap in spritesheet drawing later — your game logic does not change.</div><div class='game'><div class='game-head'>🎮 Build This: Shooter — Twin-Stick Survivor</div><div class='game-body'><p><strong>Genre: Top-down shooter (NEW genre).</strong> This STARTS a new genre and reuses <code>aabb</code>, plus the normalize-vector aiming introduced here.</p><ol><li>WASD moves the player freely (no gravity); clamp to the screen.</li><li>Click fires a bullet toward the mouse using a normalized direction vector.</li><li>Spawn enemies at random edges on a timer; steer them toward the player.</li><li>Bullet-vs-enemy AABB removes both and scores; enemy-vs-player ends the game.</li><li>Bonus: load a spritesheet and animate the player and enemies; turn off image smoothing.</li></ol></div></div>"},{"id":"p6-7","part":"06 · JavaScript (from scratch)","nav":"Audio, state & match","num":"6.7","kicker":"Part 06 · Lesson 7","title":"Web Audio, State Machines & a Match Puzzle","html":"<h3>Two missing pieces: sound and structure</h3><p>You can make things move and collide. Two things separate a tech demo from a game: <strong>sound</strong> and a clear <strong>state machine</strong> (menu, playing, game over). We add both, then build a grid-based <strong>match puzzle</strong> — a brand-new genre with no physics at all. This STARTS a new genre.</p><h3>Web Audio: sound with zero files</h3><p>The Web Audio API can synthesize beeps and blips in code — perfect for prototypes. Create one <code>AudioContext</code>, then for each sound make an oscillator and a gain node and stop it after a moment.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sound.js</span></div><div class='term-body'><span class='pr'>const</span> audio = <span class='pr'>new</span> (window.AudioContext || window.webkitAudioContext)();\n\n<span class='pr'>function</span> <span class='pr'>beep</span>(freq, dur) {\n  <span class='pr'>const</span> osc = audio.createOscillator();\n  <span class='pr'>const</span> gain = audio.createGain();\n  osc.frequency.value = freq;\n  osc.type = <span class='ok'>'square'</span>;\n  gain.gain.value = <span class='am'>0.08</span>;             <span class='cm'>// keep it gentle</span>\n  osc.connect(gain).connect(audio.destination);\n  osc.start();\n  osc.stop(audio.currentTime + dur);  <span class='cm'>// auto-stops</span>\n}\nbeep(<span class='am'>660</span>, <span class='am'>0.08</span>); <span class='cm'>// a short click</span></div></div><div class='box law'><div class='bt'>Browser rule.</div> Browsers block audio until the user interacts. Call <code>audio.resume()</code> inside your first click or keydown handler, or sounds will be silent on page load. This is non-negotiable across all modern browsers.</div><p>To play a sound FILE instead, use an <code>Audio</code> element: <code>const s = new Audio('hit.wav'); s.play();</code>. For overlapping sounds, clone it: <code>s.cloneNode().play();</code>.</p><h3>A state machine</h3><p>Until now <code>update</code> always assumed \"playing.\" Real games switch between screens. Model it as a single <code>state</code> string and branch on it in both <code>update</code> and <code>render</code>. This one pattern scales from Pong to your capstone.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>state.js</span></div><div class='term-body'><span class='pr'>let</span> state = <span class='ok'>'menu'</span>; <span class='cm'>// 'menu' | 'play' | 'over'</span>\n\n<span class='pr'>function</span> <span class='pr'>update</span>(dt) {\n  <span class='pr'>if</span> (state === <span class='ok'>'play'</span>) updatePlay(dt);\n}\n<span class='pr'>function</span> <span class='pr'>render</span>() {\n  <span class='pr'>if</span> (state === <span class='ok'>'menu'</span>) drawMenu();\n  <span class='pr'>else</span> <span class='pr'>if</span> (state === <span class='ok'>'play'</span>) drawPlay();\n  <span class='pr'>else</span> drawOver();\n}\naddEventListener(<span class='ok'>'keydown'</span>, e =&gt; {\n  audio.resume();\n  <span class='pr'>if</span> (state !== <span class='ok'>'play'</span> &amp;&amp; e.code === <span class='ok'>'Space'</span>) startGame();\n});</div></div><h3>The match puzzle: a grid of gems</h3><p>No velocity here — just a 2D array of color indices. The player clicks two adjacent cells to swap; if the swap makes a line of three, those clear and the column refills. We store the grid and convert a click to grid coordinates.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>grid.js</span></div><div class='term-body'><span class='pr'>const</span> N = <span class='am'>8</span>, CELL = <span class='am'>40</span>, COLORS = <span class='am'>5</span>;\n<span class='pr'>const</span> grid = [];\n<span class='pr'>for</span> (<span class='pr'>let</span> y = <span class='am'>0</span>; y &lt; N; y++) {\n  grid[y] = [];\n  <span class='pr'>for</span> (<span class='pr'>let</span> x = <span class='am'>0</span>; x &lt; N; x++)\n    grid[y][x] = (Math.random() * COLORS) | <span class='am'>0</span>; <span class='cm'>// 0..4</span>\n}\n\ncanvas.addEventListener(<span class='ok'>'mousedown'</span>, e =&gt; {\n  <span class='pr'>const</span> r = canvas.getBoundingClientRect();\n  <span class='pr'>const</span> gx = ((e.clientX - r.left) / CELL) | <span class='am'>0</span>;\n  <span class='pr'>const</span> gy = ((e.clientY - r.top) / CELL) | <span class='am'>0</span>;\n  select(gx, gy);\n});</div></div><h3>Finding matches</h3><p>Scan each row and column for three-or-more of the same value. Mark them, clear, then collapse cells downward and refill the top — the satisfying cascade.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>match.js</span></div><div class='term-body'><span class='pr'>function</span> <span class='pr'>findMatches</span>() {\n  <span class='pr'>const</span> dead = [];\n  <span class='pr'>for</span> (<span class='pr'>let</span> y = <span class='am'>0</span>; y &lt; N; y++)\n    <span class='pr'>for</span> (<span class='pr'>let</span> x = <span class='am'>0</span>; x &lt; N-<span class='am'>2</span>; x++) {\n      <span class='pr'>const</span> v = grid[y][x];\n      <span class='pr'>if</span> (v === grid[y][x+<span class='am'>1</span>] &amp;&amp; v === grid[y][x+<span class='am'>2</span>])\n        dead.push([y,x],[y,x+<span class='am'>1</span>],[y,x+<span class='am'>2</span>]);\n    }\n  <span class='cm'>// repeat vertically with grid[y+1][x], grid[y+2][x]</span>\n  <span class='pr'>return</span> dead;\n}</div></div><p>Clear the dead cells (set to <code>-1</code>), then for each column pull surviving gems down and drop fresh random gems in from the top. Play a <code>beep</code> on each clear for instant juice.</p><div class='game'><div class='game-head'>🎮 Build This: Puzzle — Gem Match</div><div class='game-body'><p><strong>Genre: Match-3 puzzle (NEW genre).</strong> This STARTS a new genre with no physics; it reuses the click-to-grid math and adds the new state machine and Web Audio.</p><ol><li>Build an 8x8 grid of random color indices; draw each cell as a colored square.</li><li>Click to select a gem, click an adjacent one to swap them.</li><li>After a swap, find all horizontal AND vertical runs of 3+; clear them.</li><li>Collapse columns down and refill from the top; loop until no matches remain. Add score per gem cleared and a <code>beep</code> on each clear.</li><li>Wrap it in a menu / play / game-over state machine. Bonus: undo a swap that makes no match.</li></ol></div></div>"},{"id":"p6-8","part":"06 · JavaScript (from scratch)","nav":"Capstone & deploy","num":"6.8","kicker":"Part 06 · Lesson 8","title":"Polish, Package & Deploy Your Capstone","html":"<h3>From project to portfolio</h3><p>You have built a toy, two arcade games, a tapper, a platformer, a shooter, and a puzzle — across SIX genres, all from scratch. The final step is the one most learners skip: <strong>polish a game and ship it to the public web</strong> so you can put a link on your resume. This lesson's capstone is a portfolio-ready arcade game, deployed.</p><h3>Choosing &amp; scoping the capstone</h3><p>Pick the game you enjoyed most and make it <em>finished</em>, not bigger. A small, polished game beats an ambitious unfinished one every time. A great target: a single-screen arcade game (an Asteroids-style blaster, an enhanced Breakout, or a wave-survival shooter) with a menu, score, sound, and a game-over loop.</p><h3>Polish that players notice</h3><ul><li><strong>Juice</strong> — screen shake on impact, a brief hit-flash, particles when something dies.</li><li><strong>Feedback</strong> — sound on every meaningful action (reuse last lesson's <code>beep</code>).</li><li><strong>Flow</strong> — a clean menu, a pause key, a restart without reloading the page.</li><li><strong>Persistence</strong> — save the high score with <code>localStorage</code>.</li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>polish.js</span></div><div class='term-body'><span class='cm'>// high score that survives reloads</span>\n<span class='pr'>let</span> best = +(localStorage.getItem(<span class='ok'>'best'</span>) || <span class='am'>0</span>);\n<span class='pr'>function</span> <span class='pr'>setScore</span>(s) {\n  <span class='pr'>if</span> (s &gt; best) { best = s; localStorage.setItem(<span class='ok'>'best'</span>, best); }\n}\n\n<span class='cm'>// quick screen shake</span>\n<span class='pr'>let</span> shake = <span class='am'>0</span>;\n<span class='pr'>function</span> <span class='pr'>render</span>() {\n  ctx.save();\n  <span class='pr'>if</span> (shake &gt; <span class='am'>0</span>) {\n    ctx.translate((Math.random()-<span class='am'>.5</span>)*shake, (Math.random()-<span class='am'>.5</span>)*shake);\n    shake -= <span class='am'>0.5</span>;\n  }\n  drawWorld();\n  ctx.restore();\n}\n<span class='cm'>// on a big hit: shake = 8;</span></div></div><h3>A tiny particle burst</h3><p>Particles are just short-lived objects with velocity and a fading life. Spawn a handful on each kill; the effect is dramatic for almost no code.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>particles.js</span></div><div class='term-body'><span class='pr'>const</span> parts = [];\n<span class='pr'>function</span> <span class='pr'>burst</span>(x, y) {\n  <span class='pr'>for</span> (<span class='pr'>let</span> i = <span class='am'>0</span>; i &lt; <span class='am'>12</span>; i++) {\n    <span class='pr'>const</span> a = Math.random() * Math.PI * <span class='am'>2</span>;\n    parts.push({ x, y, vx: Math.cos(a)*<span class='am'>120</span>, vy: Math.sin(a)*<span class='am'>120</span>, life: <span class='am'>0.5</span> });\n  }\n}\n<span class='pr'>function</span> <span class='pr'>updateParts</span>(dt) {\n  <span class='pr'>for</span> (<span class='pr'>const</span> p <span class='pr'>of</span> parts) { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt; }\n  <span class='pr'>for</span> (<span class='pr'>let</span> i = parts.length-<span class='am'>1</span>; i &gt;= <span class='am'>0</span>; i--) <span class='pr'>if</span> (parts[i].life &lt;= <span class='am'>0</span>) parts.splice(i,<span class='am'>1</span>);\n}</div></div><h3>Make it fit any screen</h3><p>Set the canvas internal resolution in code and scale it with CSS so it fills the window while keeping aspect ratio. Read input through <code>getBoundingClientRect</code> (you already do) and it just works on phones too.</p><div class='box tip'><div class='bt'>Tip.</div> Keep your whole capstone in ONE <code>index.html</code>. A single self-contained file with no build step is the easiest possible thing to host — and impossible to break in deployment.</div><h3>Deploying to the public web</h3><p>A canvas game is static files, so hosting is free and instant. Three solid options:</p><table><thead><tr><th>Host</th><th>How</th><th>Best for</th></tr></thead><tbody><tr><td>itch.io</td><td>Zip your files (<code>index.html</code> at the root), create a project, upload, mark \"playable in browser\"</td><td>Game portfolios, a real game page</td></tr><tr><td>GitHub Pages</td><td>Push to a repo, enable Pages on the main branch</td><td>Free, version-controlled, custom domain</td></tr><tr><td>Netlify / Cloudflare Pages</td><td>Drag the folder into the dashboard, or connect the repo</td><td>One-click deploys, instant URLs</td></tr></tbody></table><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>deploy.sh</span></div><div class='term-body'><span class='cm'># GitHub Pages in a few commands</span>\ngit init\ngit add . &amp;&amp; git commit -m <span class='ok'>'My capstone game'</span>\ngit branch -M main\n<span class='cm'># create the repo on github, then:</span>\ngit remote add origin &lt;your-repo-url&gt; &amp;&amp; git push -u origin main\n<span class='cm'># Settings -&gt; Pages -&gt; Source: main / root -&gt; Save</span></div></div><div class='box law'><div class='bt'>Deploy gotcha.</div> Hosts are case-sensitive and serve from the repo root. If your file is <code>Ship.png</code> but your code says <code>ship.png</code>, it works on a Mac but breaks live. Match case exactly, and keep <code>index.html</code> at the top level of what you upload.</div><div class='game'><div class='game-head'>🎮 Build This: Capstone — Polished Arcade Game, DEPLOYED</div><div class='game-body'><p><strong>Genre: Polished arcade (your choice).</strong> This is the CAPSTONE — extend one of your earlier games (Breakout, the shooter, or a fresh Asteroids-style blaster) into a finished, portfolio-ready title and ship it live.</p><ol><li>Pick a game and wrap it in a full state machine: menu, play, pause, game over.</li><li>Add sound on every key action and a <code>localStorage</code> high score.</li><li>Add juice: screen shake, a hit-flash, and particle bursts on kills.</li><li>Make the canvas scale to the window so it plays on desktop and mobile.</li><li>Deploy it to itch.io, GitHub Pages, or Cloudflare Pages, and confirm the live URL plays in a fresh browser. Put that link in your portfolio — you are now a game developer.</li></ol></div></div>"},{"id":"p8-1","part":"07 · 3D Art (Blender)","nav":"Blender Setup & Navigation","num":"7.1","kicker":"Part 07 · Lesson 1","title":"Getting Started: Installing Blender and Navigating the Viewport","html":"<h3>Why Blender for Game Art</h3><p>Blender is a free, open-source 3D suite that handles modeling, sculpting, UVs, texturing, rigging, and animation in one package. For game developers that means zero licensing cost and a direct pipeline into Godot, Unity, and Unreal. This part of the masterclass treats Blender as a <strong>game-asset factory</strong>: every technique we cover serves the goal of shipping clean, optimized meshes into a real-time engine.</p><h3>Installing Blender</h3><p>Download the current Long Term Support (LTS) release from blender.org. LTS builds receive bug fixes for two years, which matters when a course or a studio standardizes on one version. Avoid Steam-only installs if you plan to script or use external add-ons; the standalone installer is the most predictable.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>install</span></div><div class='term-body'><span class='cm'># Windows: run the .msi installer</span>\n<span class='cm'># macOS: drag Blender.app into /Applications</span>\n<span class='cm'># Linux (Flatpak):</span>\nflatpak install flathub org.blender.Blender <span class='ok'>✓</span>\n<span class='cm'># Verify version on the splash screen: 4.2 LTS or newer</span></div></div><h3>The Interface at a Glance</h3><p>When Blender opens you see the <strong>3D Viewport</strong> (center), the <strong>Outliner</strong> (top-right, a tree of every object), the <strong>Properties editor</strong> (bottom-right, tabs for render, modifiers, materials), and the <strong>Timeline</strong> (bottom). The strip of buttons across the top is the <strong>Topbar</strong> with workspace tabs: Layout, Modeling, Sculpting, UV Editing, Shading, Animation. These tabs are pre-built editor arrangements — you will live in Modeling, UV Editing, and Shading the most.</p><h3>Viewport Navigation</h3><p>Navigation is muscle memory. A three-button mouse plus numpad is strongly recommended; if you lack a numpad, enable <em>Edit &gt; Preferences &gt; Input &gt; Emulate Numpad</em>.</p><table><thead><tr><th>Action</th><th>Input</th></tr></thead><tbody><tr><td>Orbit</td><td>Middle Mouse Button (MMB) drag</td></tr><tr><td>Pan</td><td>Shift + MMB drag</td></tr><tr><td>Zoom</td><td>Scroll wheel or Ctrl + MMB</td></tr><tr><td>Frame selected</td><td>Numpad . (period)</td></tr><tr><td>Front / Side / Top</td><td>Numpad 1 / 3 / 7</td></tr><tr><td>Toggle perspective/ortho</td><td>Numpad 5</td></tr></tbody></table><p>The colored <strong>navigation gizmo</strong> in the top-right corner of the viewport does the same thing with the mouse: click an axis ball to snap to that view, drag it to orbit. Below it sit icons for zoom, pan, camera view, and toggling perspective. Beginners lean on the gizmo; pros switch to the numpad for speed.</p><div class='box tip'><div class='bt'>Tip.</div> For game art, work in <strong>orthographic</strong> views (Numpad 5 to toggle) when modeling. Perspective distorts proportions; ortho keeps measurements honest, which matters when an asset must match a grid or collision box.</div><h3>The 3D Cursor and Selection</h3><p>The little crosshair-and-ring in the scene is the <strong>3D cursor</strong>: new objects spawn there and it acts as a pivot point. Reset it to the world origin with <em>Shift + C</em>. Select objects by clicking; <em>A</em> selects all, <em>Alt + A</em> deselects all. The <strong>transform gizmos</strong> on the left toolbar (or shortcuts G/R/S for grab/rotate/scale) move, rotate, and scale the active selection. Type an axis letter after the shortcut to constrain — <em>G then Z</em> moves only up/down.</p><h3>Saving Your Project</h3><p>Blender files use the <code>.blend</code> extension. Save with <em>Ctrl + S</em>; Save As is <em>Ctrl + Shift + S</em>. Enable incremental saves and auto-save in Preferences so a crash never costs you an hour. Set a sensible startup file: arrange your editors, then <em>File &gt; Defaults &gt; Save Startup File</em> so every new project opens the way you like.</p><div class='box lab'><div class='bt'>Heads up.</div> Blender does not auto-save into your <code>.blend</code> path by default — it writes recovery files to a temp folder. After a crash use <em>File &gt; Recover &gt; Auto Save</em>. Still, hit Ctrl+S often.</div><div class='game'><div class='game-head'>🎮 Build This: First Scene</div><div class='game-body'><p>Goal: get comfortable moving around and persist a project file.</p><ol><li>Launch Blender and dismiss the splash screen by clicking in the viewport.</li><li>Orbit around the default cube with MMB, pan with Shift+MMB, and zoom with the scroll wheel.</li><li>Press Numpad . to frame the cube, then cycle Numpad 1, 3, 7 for front, side, top.</li><li>Press Numpad 5 to toggle between perspective and orthographic — notice the difference.</li><li>Click the cube, press G then Z, move it up, left-click to confirm; press Alt+A to deselect.</li><li>Save with Ctrl+S as <code>my-first-scene.blend</code> in a dedicated project folder.</li></ol></div></div>"},{"id":"p8-2","part":"07 · 3D Art (Blender)","nav":"Mesh Modeling Basics","num":"7.2","kicker":"Part 07 · Lesson 2","title":"Mesh Fundamentals: Vertices, Edges, Faces, and Edit Mode","html":"<h3>The Anatomy of a Mesh</h3><p>Every game model is built from three primitives: <strong>vertices</strong> (points in space), <strong>edges</strong> (lines connecting two vertices), and <strong>faces</strong> (flat surfaces bounded by edges). A face with three edges is a <em>triangle</em> (tri); four edges make a <em>quad</em>. Engines ultimately render triangles, but you model in quads because they subdivide and deform predictably. Faces with five or more sides are <em>n-gons</em> — convenient while blocking out but a liability near seams and animation, so clean them up before export.</p><h3>Object Mode vs Edit Mode</h3><p>Press <strong>Tab</strong> to toggle between Object Mode (move whole objects) and <strong>Edit Mode</strong> (reshape the mesh itself). In Edit Mode the top-left of the header shows three selection-mode buttons, bound to keys <strong>1</strong> (vertex), <strong>2</strong> (edge), and <strong>3</strong> (face). Switching between them constantly is normal.</p><div class='box tip'><div class='bt'>Tip.</div> <em>Alt + click</em> an edge selects an entire <strong>edge loop</strong>; <em>Ctrl + click</em> selects the shortest path between two elements. These two shortcuts alone will double your modeling speed.</div><h3>The Core Editing Operators</h3><p>Four operators do most of the work in hard-surface game modeling:</p><table><thead><tr><th>Operator</th><th>Key</th><th>What it does</th></tr></thead><tbody><tr><td>Extrude</td><td>E</td><td>Pulls new geometry out of selected faces/edges</td></tr><tr><td>Inset</td><td>I</td><td>Creates a smaller face inside the selected face</td></tr><tr><td>Loop Cut</td><td>Ctrl + R</td><td>Adds an edge loop around the mesh</td></tr><tr><td>Bevel</td><td>Ctrl + B</td><td>Rounds or chamfers an edge into multiple edges</td></tr></tbody></table><p>After invoking any of these, you can type a number to set an exact value, scroll to add segments (for bevel/loop cut), and left-click to confirm. The operator panel in the bottom-left lets you tweak the result afterward — always check it.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>edit-mode flow</span></div><div class='term-body'><span class='cm'># Start from default cube, enter Edit Mode</span>\nTab <span class='dim'>→ Edit Mode</span>\n3 <span class='dim'>→ Face select</span>\n<span class='cm'># Inset the top face to make a rim</span>\nI <span class='dim'>type</span> 0.1 <span class='dim'>Enter</span>\n<span class='cm'># Push that inset face down to recess it</span>\nE Z -0.15 <span class='dim'>Enter</span> <span class='ok'>✓ recessed panel</span></div></div><h3>Keeping Topology Clean</h3><p>Good topology means evenly sized quads, edge loops that follow the form, and no stray vertices. Bad topology causes shading artifacts and breaks normal-map baking later. Useful cleanup tools: <strong>M</strong> to merge selected vertices (Merge by Distance removes doubles), <strong>X</strong> to delete (choose vertices/edges/faces/dissolve), and <strong>F</strong> to fill a face between selected vertices or edges. Use <em>Mesh &gt; Normals &gt; Recalculate Outside</em> (Shift+N) so all faces point outward — flipped normals render black or invisible in engines.</p><div class='box law'><div class='bt'>Rule.</div> Model in quads, triangulate only at export. Avoid n-gons and overlapping faces. Every poly you add must justify its cost — geometry is not free in a real-time scene.</div><h3>Applying Transforms</h3><p>When you scale or rotate in Object Mode, the object stores a transform that engines may interpret oddly. Before export — and before adding many modifiers — use <em>Ctrl + A &gt; All Transforms</em> to bake position, rotation, and scale back to clean values (scale 1,1,1). This is one of the most common fixes for assets that import at the wrong size or orientation.</p><div class='game'><div class='game-head'>🎮 Build This: Low-Poly Wooden Crate</div><div class='game-body'><p>Goal: turn the default cube into a believable crate using only extrude and inset, keeping clean quad topology.</p><ol><li>Select the cube, Tab into Edit Mode, press 3 for Face select.</li><li>Select all faces (A), Inset with I and type 0.05 to create a border frame on every side.</li><li>Select the inner faces and Extrude inward (E then type a small negative value) to recess the panels.</li><li>Select the top face, Inset slightly, and Extrude up by 0.05 to suggest a lid lip.</li><li>Add a small Bevel (Ctrl+B) to the outer edges, 1-2 segments, so corners catch light.</li><li>Press Shift+N to recalculate normals, Tab back to Object Mode, and Ctrl+A &gt; All Transforms.</li><li>Save as <code>crate.blend</code>. Check the triangle count in the top-right statistics overlay.</li></ol></div></div>"},{"id":"p8-3","part":"07 · 3D Art (Blender)","nav":"Low-Poly & Poly Budgets","num":"7.3","kicker":"Part 07 · Lesson 3","title":"Low-Poly Modeling and Why Poly Budgets Matter","html":"<h3>What Low-Poly Really Means</h3><p>Low-poly is not a visual style alone — it is a performance discipline. Every triangle a GPU draws costs vertex processing, and every object costs a draw call. A modern game might render millions of triangles per frame, but that budget is shared across hundreds of objects, characters, and effects. As a game artist your job is to spend polygons where they read in the silhouette and save them everywhere else.</p><h3>Thinking in a Triangle Budget</h3><p>A <strong>poly budget</strong> is a target triangle count assigned to an asset based on its importance and screen size. Rough modern guidelines:</p><table><thead><tr><th>Asset type</th><th>Typical budget (tris)</th></tr></thead><tbody><tr><td>Small prop (crate, lantern)</td><td>200 - 1,500</td></tr><tr><td>Hero prop / weapon</td><td>3,000 - 10,000</td></tr><tr><td>Background character (mobile)</td><td>1,500 - 5,000</td></tr><tr><td>Hero character (PC/console)</td><td>30,000 - 90,000</td></tr></tbody></table><p>These are starting points, not laws — a stylized mobile game and a AAA shooter live in different worlds. The skill is matching detail to how big the object appears on screen. Detail that needs only a few pixels should come from a <strong>normal map</strong> (next lessons), never from geometry.</p><div class='box tip'><div class='bt'>Tip.</div> Enable <em>Statistics</em> in the viewport overlays dropdown to see live vertex/face/tri counts. Watch the <strong>Triangles</strong> number, not faces — a single n-gon hides many tris.</div><h3>Modifiers: Non-Destructive Modeling</h3><p>Modifiers are operations layered on top of your base mesh, recalculated live and editable in any order. They live in the wrench icon of the Properties editor. Three are essential for game props.</p><h4>Mirror</h4><p>Most props and characters are symmetrical. Model one half, add a <strong>Mirror</strong> modifier, and the other half is generated for free. Enable <em>Clipping</em> so center vertices weld at the seam. You only edit half the geometry, halving your work and guaranteeing symmetry.</p><h4>Subdivision Surface</h4><p>Adds smoothing by subdividing faces (shortcut Ctrl+1 through Ctrl+3 sets the level). Mostly used to generate a smooth <em>high-poly</em> source for baking — you rarely ship subdivided geometry in a real-time asset.</p><h4>Bevel</h4><p>A modifier version of edge bevel driven by <em>Weight</em> or <em>Angle</em>, useful for adding uniform chamfers to all sharp edges so they catch light.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>modifier stack</span></div><div class='term-body'><span class='cm'># Order matters - top to bottom</span>\nMirror <span class='dim'>(X axis, clipping on)</span>\nBevel <span class='dim'>(0.02m, 2 segments)</span>\n<span class='cm'># Apply before export (or let glTF apply on export)</span>\nCtrl+A <span class='dim'>on modifier → bakes to mesh</span> <span class='ok'>✓</span></div></div><div class='box law'><div class='bt'>Rule.</div> Modifiers are non-destructive in Blender but <strong>most must be applied</strong> before or during export — an engine sees only the final mesh. The glTF exporter applies modifiers automatically; FBX has an <em>Apply Modifiers</em> checkbox. Confirm it.</div><h3>Reading the Silhouette</h3><p>Squint at your model or view it as a flat black shape against the background. If it still reads as a barrel or a lantern in pure silhouette, your geometry budget is well spent. Anything that does not change the outline — surface bolts, wood grain, scratches — is a texture job, not a geometry job.</p><div class='game'><div class='game-head'>🎮 Build This: Low-Poly Lantern</div><div class='game-body'><p>Goal: model a readable stylized lantern under 1,000 triangles using the Mirror modifier.</p><ol><li>Start with a cube; delete half along X (B to box-select, X &gt; Vertices).</li><li>Add a Mirror modifier on the X axis with Clipping enabled.</li><li>Block out the lantern body: a tapered base, a glass cage middle, and a top cap, using Extrude (E) and Loop Cuts (Ctrl+R).</li><li>Inset the cage faces (I) and extrude them inward to suggest panes and frame bars.</li><li>Add a small loop or handle on top using extruded edges.</li><li>Add a Bevel modifier (small width, 2 segments) for light-catching edges.</li><li>Keep checking the Triangles stat — stay under 1,000. Apply modifiers, Ctrl+A &gt; All Transforms, and save as <code>lantern.blend</code>.</li></ol></div></div>"},{"id":"p8-4","part":"07 · 3D Art (Blender)","nav":"UV Unwrapping","num":"7.4","kicker":"Part 07 · Lesson 4","title":"UV Unwrapping: Flattening Meshes for Texturing","html":"<h3>What UVs Are</h3><p>A texture is a flat 2D image, but your model is 3D. <strong>UV unwrapping</strong> is the process of telling the renderer how to wrap that flat image onto the surface — like peeling an orange and flattening the skin. The 2D coordinate space is called <em>UV space</em> (U is horizontal, V vertical), running 0 to 1 in both directions. Each vertex gets a UV coordinate that maps it to a spot on the texture.</p><p>Without good UVs, textures stretch, smear, or repeat wrong. Every textured game asset needs a UV layout, so this step sits between modeling and texturing in the pipeline.</p><h3>Seams: Where the Skin Is Cut</h3><p>To flatten a 3D shape you must cut it. Those cuts are <strong>seams</strong>. Place seams where they will be hidden (inside a barrel rim, along a back edge, where parts join) because the texture can break slightly across a seam. Select edges in Edit Mode and use <em>Edge &gt; Mark Seam</em> (or right-click menu). Marked seams show as red lines.</p><div class='box tip'><div class='bt'>Tip.</div> Think like a tailor. Cut seams where clothing would have them — armpits, insides, backs. Fewer, well-placed seams mean fewer visible texture breaks but more potential stretching; it is always a trade-off.</div><h3>Unwrapping</h3><p>Open the <strong>UV Editing</strong> workspace tab. With the mesh in Edit Mode and all faces selected (A), press <strong>U</strong> to open the Unwrap menu. Options:</p><table><thead><tr><th>Method</th><th>Use case</th></tr></thead><tbody><tr><td>Unwrap</td><td>General — respects your seams</td></tr><tr><td>Smart UV Project</td><td>Fast auto-unwrap by angle; good for hard-surface props</td></tr><tr><td>Cube / Cylinder / Sphere Projection</td><td>Primitive-shaped objects</td></tr></tbody></table><p>After unwrapping, the flattened islands appear in the UV Editor on the left. The mesh-to-UV link is live: select a face in the viewport and it highlights in the UV editor.</p><h3>Checking for Stretching and Overlap</h3><p>Apply a <strong>checker texture</strong> to verify quality. In the UV editor header choose the test grid, or assign a checker material. Squares should stay roughly square and the same size across the whole model. Stretched rectangles mean stretched textures; uneven square sizes mean inconsistent <em>texel density</em> (texture resolution per surface area).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>unwrap flow</span></div><div class='term-body'><span class='cm'># Edit Mode, edge select</span>\n2 <span class='dim'>edge mode</span>\n<span class='cm'># Select hidden edges, mark them</span>\nEdge &gt; Mark Seam <span class='ok'>✓ red lines appear</span>\nA <span class='dim'>select all faces</span>\nU &gt; Unwrap\n<span class='cm'># Inspect with checker - squares should stay square</span>\n<span class='bad'>✗ stretched = add a seam</span></div></div><h3>Packing the Islands</h3><p>For real-time assets you want a single square texture (1024, 2048, 4096 px). All UV islands must fit inside the 0-1 square without overlapping (unless intentionally sharing texture, e.g. mirrored parts). Select all in the UV editor (A) and use <em>UV &gt; Pack Islands</em>. Set a small margin (0.005-0.01) so neighboring islands do not bleed into each other when the texture is mipmapped. Scale islands so important, close-up surfaces get more texture space — that is deliberate texel density allocation.</p><div class='box law'><div class='bt'>Rule.</div> Keep UVs inside the 0-1 space for game assets unless you are intentionally tiling. Use one consistent texel density per object so nothing looks blurrier than its neighbors.</div><div class='game'><div class='game-head'>🎮 Build This: Unwrap the Lantern</div><div class='game-body'><p>Goal: produce a clean, packed, non-overlapping UV layout for your low-poly prop.</p><ol><li>Open <code>lantern.blend</code>, switch to the UV Editing workspace, Tab into Edit Mode.</li><li>In edge mode (2), mark seams on hidden edges — the back of the body, inside the cage, under the cap.</li><li>Select all faces (A) and press U &gt; Unwrap.</li><li>Apply a checker texture and orbit the model; add seams anywhere squares stretch.</li><li>In the UV editor select all, run UV &gt; Pack Islands with a 0.01 margin.</li><li>Scale the cage/glass island slightly larger if it is seen up close; keep everything inside the 0-1 square.</li><li>Save. You now have UVs ready for texturing and baking.</li></ol></div></div>"},{"id":"p8-5","part":"07 · 3D Art (Blender)","nav":"PBR Materials & Baking","num":"7.5","kicker":"Part 07 · Lesson 5","title":"Materials and Texturing: PBR Workflow and Normal Map Baking","html":"<h3>What PBR Is</h3><p><strong>Physically Based Rendering (PBR)</strong> is the standard lighting model in modern engines. Instead of hand-faking shading, you describe a surface with a small set of texture maps and the engine computes realistic light response that holds up under any lighting. The metal/roughness workflow (used by glTF, Unity URP, Unreal, Godot) relies on four core maps:</p><table><thead><tr><th>Map</th><th>Controls</th><th>Type</th></tr></thead><tbody><tr><td>Albedo (Base Color)</td><td>The raw surface color, no lighting baked in</td><td>Color (sRGB)</td></tr><tr><td>Normal</td><td>Fake surface bumps via per-pixel normals</td><td>Non-color (linear)</td></tr><tr><td>Roughness</td><td>Matte (white) to glossy (black)</td><td>Non-color, grayscale</td></tr><tr><td>Metallic</td><td>Non-metal (black) to metal (white)</td><td>Non-color, grayscale</td></tr></tbody></table><div class='box law'><div class='bt'>Rule.</div> Albedo is set to <strong>sRGB</strong> color space; normal, roughness, and metallic are <strong>Non-Color</strong> data. Getting this wrong is the most common reason a material looks washed out or wrong in-engine.</div><h3>Building a Material in the Shader Editor</h3><p>Open the <strong>Shading</strong> workspace. New objects get a <strong>Principled BSDF</strong> shader — a single node with inputs for Base Color, Metallic, Roughness, Normal, and more. This node matches the engine PBR model almost one-to-one, which is why it exports cleanly. Plug Image Texture nodes into each input. For the normal input you must route through a <em>Normal Map</em> node so Blender interprets the colors as directions.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>node graph</span></div><div class='term-body'>ImageTex(albedo,sRGB) ──► Base Color\nImageTex(metallic,NonColor) ──► Metallic\nImageTex(roughness,NonColor) ──► Roughness\nImageTex(normal,NonColor) ─► NormalMap ─► Normal\n<span class='ok'>✓ Principled BSDF → Material Output</span></div></div><h3>Texturing Approaches</h3><p>You can paint maps in Blender's <strong>Texture Paint</strong> mode, generate them procedurally with nodes, or use an external tool like the free Materialize or a Substance-style app and import the maps. Many studios use procedural smart-materials; for this course we will hand-assign tiling PBR textures and then add unique surface detail through baking.</p><h3>Why Bake Normal Maps</h3><p>A normal map lets a flat, low-poly face <em>look</em> like it has bumps, grooves, rivets, and grain — without any extra geometry. The trick: build a <strong>high-poly</strong> version with all that detail (sculpted or modeled), then <strong>bake</strong> the difference between high and low onto the low-poly's normal map. The engine renders cheap geometry but expensive-looking surfaces. This is the single biggest technique behind modern game-art efficiency.</p><h3>The Baking Process</h3><p>Baking in Blender uses the Cycles render engine. The workflow:</p><ol><li>Have a low-poly mesh (UV-unwrapped) and a high-poly mesh occupying the same space.</li><li>Create a new image (e.g. 2048x2048) and add it as an Image Texture node on the low-poly material, with the node <em>selected but not connected</em> — Cycles bakes into the active image node.</li><li>Select the high-poly first, then shift-select the low-poly so it is active.</li><li>In Render Properties set engine to Cycles. In the Bake panel choose <strong>Normal</strong>, enable <em>Selected to Active</em>, and set a small <strong>Extrusion/Ray Distance</strong> (a cage) so rays catch detail without skipping.</li><li>Click <strong>Bake</strong>. Save the resulting image as a PNG and plug it into the Normal input (through a Normal Map node).</li></ol><div class='box tip'><div class='bt'>Tip.</div> If the bake shows red/blue artifacts or missing edges, increase Ray Distance or use a <strong>cage</strong> object. Always bake normals in <em>tangent space</em> for game assets — it deforms correctly with animation.</div><div class='game'><div class='game-head'>🎮 Build This: Texture and Bake the Lantern</div><div class='game-body'><p>Goal: give your unwrapped prop a full PBR material and bake surface detail from a high-poly version.</p><ol><li>In the Shading workspace, add a Principled BSDF if not present, and plug in albedo (sRGB), roughness, and metallic (Non-Color) textures for metal and glass.</li><li>Duplicate the lantern, add a Subdivision Surface modifier, and add detail (bevels, dents) to make a high-poly source.</li><li>Create a new 2048x2048 image, add it as a selected Image Texture node on the low-poly material.</li><li>Set render engine to Cycles, select high-poly then shift-select low-poly.</li><li>In the Bake panel choose Normal, enable Selected to Active, set Ray Distance, and Bake.</li><li>Save the baked PNG, route it through a Normal Map node into the Normal input.</li><li>Check the result in Material Preview shading — the flat low-poly now shows the high-poly detail. Save.</li></ol></div></div>"},{"id":"p8-6","part":"07 · 3D Art (Blender)","nav":"Sculpting Overview","num":"7.6","kicker":"Part 07 · Lesson 6","title":"Sculpting Basics: Organic Detail and High-Poly Source Meshes","html":"<h3>What Sculpting Is For</h3><p>Box modeling is great for hard-surface props, but organic shapes — creatures, faces, cloth wrinkles, rock, wood grain, weathered metal — are painful to push vertex by vertex. <strong>Sculpting</strong> lets you treat the mesh like digital clay, pushing and pulling millions of polygons with brushes. In a game pipeline sculpting almost always produces a <strong>high-poly source mesh</strong> whose detail you bake down onto a low-poly model (as in the previous lesson). You rarely ship a sculpt directly.</p><h3>Entering Sculpt Mode</h3><p>Switch to the <strong>Sculpting</strong> workspace tab, or pick Sculpt Mode from the mode dropdown. The left toolbar holds the brushes; the top header has brush radius, strength, and symmetry settings. Brush size is <strong>F</strong> (drag, then click), strength is <strong>Shift+F</strong>, and holding <strong>Ctrl</strong> inverts a brush (Draw becomes carve-in, Inflate becomes deflate).</p><h3>The Core Brushes</h3><table><thead><tr><th>Brush</th><th>Use</th></tr></thead><tbody><tr><td>Draw</td><td>Add or (Ctrl) subtract surface bumps</td></tr><tr><td>Clay Strips</td><td>Build up volume in flat strokes — workhorse for forms</td></tr><tr><td>Grab (G)</td><td>Pull large areas to block out shapes</td></tr><tr><td>Smooth (hold Shift)</td><td>Relax and blend any stroke</td></tr><tr><td>Crease</td><td>Sharp grooves — cracks, panel lines</td></tr><tr><td>Inflate</td><td>Push surface out along normals</td></tr></tbody></table><div class='box tip'><div class='bt'>Tip.</div> Hold <strong>Shift</strong> with any brush to temporarily smooth. Sculpting is a rhythm of build-up then smooth-down. Turn on <strong>X symmetry</strong> in the header for anything bilateral so both sides sculpt at once.</div><h3>Getting Enough Geometry: Dyntopo and Multires</h3><p>Sculpting fine detail needs lots of polygons. Two ways to get them:</p><ul><li><strong>Dynamic Topology (Dyntopo)</strong>: dynamically adds geometry under the brush as you sculpt. Great for free-form blocking, but produces uneven triangles, so it is best for the bake source, not for animation.</li><li><strong>Multiresolution modifier</strong>: subdivides the mesh into levels you can sculpt on and step between (sculpt coarse on level 1, fine on level 4). It keeps clean quad topology and can itself be baked.</li></ul><p>A third option, <strong>Remesh</strong> (Ctrl+R in sculpt, or the Remesh panel), rebuilds the mesh into uniform voxels — perfect when a blocked-out shape gets messy and you want even density before detailing.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sculpt-to-bake pipeline</span></div><div class='term-body'><span class='cm'># 1. Block big forms with Grab + Clay Strips</span>\n<span class='cm'># 2. Remesh to even density</span>\nRemesh <span class='dim'>voxel 0.02</span> <span class='ok'>✓</span>\n<span class='cm'># 3. Detail: Crease for cracks, Draw for grain</span>\n<span class='cm'># 4. This high-poly = bake source</span>\n<span class='cm'># 5. Bake normals → low-poly (Lesson 7.5)</span></div></div><h3>From Sculpt to Game Asset</h3><p>A finished sculpt may have millions of triangles — unusable in-engine. You generate a low-poly version either by <strong>retopology</strong> (rebuilding clean low-res geometry over the sculpt, manually or with the Quad Remesher-style tools) or by reusing your original box model. Then you UV-unwrap the low-poly and bake the sculpt's normal (and ambient occlusion) detail onto it. The sculpt's job ends at the bake — it lives in your source files, never in the shipped game.</p><div class='box law'><div class='bt'>Rule.</div> Never export a raw sculpt to a game engine. The sculpt is a <em>source</em>; the deliverable is a low-poly mesh carrying baked maps. Keep the sculpt in your working <code>.blend</code> for re-baking later.</div><div class='game'><div class='game-head'>🎮 Build This: Sculpt a Bake Source</div><div class='game-body'><p>Goal: sculpt surface detail onto a high-poly asset to use as a normal-map bake source.</p><ol><li>Take a copy of a prop (a crate plank, a rock, or a barrel band), enter Sculpt Mode.</li><li>Remesh to a uniform density so you have polygons to work with.</li><li>Use Clay Strips and Draw to build dents and bulges; hold Shift to smooth between strokes.</li><li>Use the Crease brush for wood-grain lines or rock cracks; enable X symmetry where appropriate.</li><li>Add fine detail with a small Draw brush, occasionally smoothing to keep it natural.</li><li>Keep this high-poly mesh aligned with your low-poly version in the same space.</li><li>Bake its Normal (and try Ambient Occlusion) onto the low-poly using the Lesson 7.5 workflow, then save.</li></ol></div></div>"},{"id":"p8-7","part":"07 · 3D Art (Blender)","nav":"Rigging & Animation","num":"7.7","kicker":"Part 07 · Lesson 7","title":"Rigging and Skeletal Animation: Armatures, Weights, and a Walk Cycle","html":"<h3>Why Skeletal Animation</h3><p>Game characters animate with a <strong>skeleton</strong> (an armature of bones) bound to the mesh. Moving a bone deforms the surrounding vertices, so one rig drives unlimited animations — walk, run, jump — that the engine blends at runtime. This is far cheaper and more flexible than baking vertex positions per frame. The pipeline is: build armature, bind mesh to it (skinning), refine which vertices each bone controls (weight painting), then author actions on the timeline.</p><h3>Building an Armature</h3><p>Add an armature with <em>Shift+A &gt; Armature &gt; Single Bone</em>. Enter <strong>Edit Mode</strong> on the armature to position bones: select a bone's tip and Extrude (E) to chain a new bone, just like extruding mesh. Build a simple biped: a root/hip bone, a spine, two leg chains (thigh, shin, foot), and two arm chains. Name every bone clearly (<code>thigh.L</code>, <code>shin.L</code>) — names with <code>.L</code>/<code>.R</code> suffixes let Blender mirror poses and the engine identify limbs.</p><div class='box tip'><div class='bt'>Tip.</div> Enable <em>X-Axis Mirror</em> in the armature Edit Mode tool settings so building/posing the left side mirrors to the right automatically. Use <em>Armature &gt; Symmetrize</em> to copy one side to the other once names end in <code>.L</code>.</div><h3>Binding the Mesh: Skinning</h3><p>Select the mesh first, then Shift-select the armature so the armature is active, and press <strong>Ctrl+P &gt; With Automatic Weights</strong>. Blender parents the mesh to the armature and estimates how much each bone influences each vertex, storing those values in <strong>vertex groups</strong> (one per bone). Now posing bones (in <strong>Pose Mode</strong>) deforms the mesh.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='ter
