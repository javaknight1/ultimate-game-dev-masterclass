 on a clean machine.</div> Always unzip and run on a computer that never had your dev tools. Missing runtimes, missing assets, and absolute paths you forgot all surface here — not on the machine where everything is already installed.</div><div class='box law'><div class='bt'>Version and changelog every build.</div> Name artifacts with a version (<code>Asteroids-v1.0</code>). When a player reports a bug, you must know exactly which build they ran.</div><div class='game'><div class='game-head'>🎮 Build This: Asteroids Capstone + Ship It</div><div class='game-body'><p>A complete asteroids-style shooter, then a distributable build.</p><ol><li>Add bullet-vs-asteroid and ship-vs-asteroid collisions; split large asteroids into two smaller ones on hit.</li><li>Track <code>score</code> and <code>lives</code>, draw a HUD, and end the game at zero lives; spawn a faster new wave when all asteroids are cleared.</li><li>Call <code>ChangeDirectory(GetApplicationDirectory())</code> at startup so assets load when double-clicked.</li><li>Build with <code>-DCMAKE_BUILD_TYPE=Release</code>, place the binary beside <code>assets/</code>, and zip it with a version name.</li><li>Unzip and run it on a different machine to confirm it is truly self-contained, then share it.</li></ol></div></div>"},{"id":"p5-1","part":"05 · Python (from scratch)","nav":"Install & Window","num":"5.1","kicker":"Part 05 · Lesson 1","title":"Install Pygame & Open a Window","html":"<h3>Why Pygame</h3><p>Pygame is a thin, friendly wrapper over SDL2. It gives you a window, a frame buffer (the <em>display surface</em>), input events, image/sound loading, and timing. It does not give you a scene tree, a physics engine, or an editor. That is the point: in Python with Pygame you write the engine yourself, which is the fastest way to truly understand how games work under the hood.</p><h3>Install a clean environment first</h3><p>Always work inside a virtual environment so your game's dependencies never collide with other Python projects. Create one, activate it, then install the maintained <code>pygame-ce</code> (Community Edition) fork, which is the actively developed version most tutorials now target.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='pr'>$</span> python3 -m venv .venv\n<span class='pr'>$</span> source .venv/bin/activate      <span class='cm'># macOS/Linux</span>\n<span class='pr'>$</span> .venv\\Scripts\\activate          <span class='cm'># Windows (PowerShell)</span>\n<span class='pr'>$</span> pip install pygame-ce\n<span class='pr'>$</span> python -m pygame.examples.aliens   <span class='cm'># sanity check: a game runs</span></div></div><div class='box tip'><div class='bt'>pygame vs pygame-ce.</div> They share the same <code>import pygame</code> name, so you can only install one at a time. <code>pygame-ce</code> ships more features and fixes; if you already had <code>pygame</code>, run <code>pip uninstall pygame</code> first.</div><h3>The four steps every Pygame program needs</h3><p>Every Pygame app follows the same shape: initialize, create a display, run a loop that drains events and draws, then quit. Here is the smallest program that opens a real, titled, closable window.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.py</span></div><div class='term-body'>import pygame, sys\n\npygame.init()                                  <span class='cm'># start all subsystems</span>\nscreen = pygame.display.set_mode((800, 600))   <span class='cm'># the display surface</span>\npygame.display.set_caption(\"My First Window\")  <span class='cm'># title bar text</span>\n\nrunning = True\nwhile running:\n    for event in pygame.event.get():           <span class='cm'># MUST drain the queue</span>\n        if event.type == pygame.QUIT:          <span class='cm'># the X / Cmd-Q</span>\n            running = False\n\n    screen.fill((30, 30, 46))                  <span class='cm'># R,G,B (0-255)</span>\n    pygame.display.flip()                      <span class='cm'># show the new frame</span>\n\npygame.quit()                                  <span class='cm'># release the window</span>\nsys.exit()</div></div><h3>What each line does</h3><ul><li><code>pygame.init()</code> boots every subsystem (video, font, mixer). It returns a tuple of (successes, failures); you can ignore it for now.</li><li><code>set_mode((w, h))</code> returns the <strong>display surface</strong> — the canvas the window shows. You draw to it, then call <code>flip()</code> to present it.</li><li><code>pygame.event.get()</code> empties the OS event queue. If you never read it, the OS thinks your app has frozen and the window becomes unresponsive (the dreaded \"not responding\").</li><li><code>fill</code> + <code>flip</code> is the minimal render: paint the whole surface, then swap it onto the screen.</li></ul><div class='box danger'><div class='bt'>The single most common beginner bug.</div> If your window opens then immediately closes, or hangs and shows a beachball/spinner, you almost certainly forgot the <code>for event in pygame.event.get()</code> loop. Draining events every frame is not optional.</div><div class='box law'><div class='bt'>Colors are RGB tuples.</div> <code>(255, 0, 0)</code> is red, <code>(0, 0, 0)</code> black, <code>(255, 255, 255)</code> white. A fourth value is alpha: <code>(255, 0, 0, 128)</code> is half-transparent red (only on surfaces that support alpha).</div><div class='game'><div class='game-head'>🎮 Build This: Blank Window</div><div class='game-body'><p>A titled 800x600 window filled with a color that quits cleanly on the close button.</p><ol><li>Make a venv and <code>pip install pygame-ce</code>.</li><li>Copy the four-step program above into <code>main.py</code>.</li><li>Change the caption to your game's name and the fill to your favorite RGB color.</li><li>Run <code>python main.py</code> and confirm the X button closes it without errors.</li></ol></div></div>"},{"id":"p5-2","part":"05 · Python (from scratch)","nav":"Loop & Clock","num":"5.2","kicker":"Part 05 · Lesson 2","title":"The Game Loop & Clock","html":"<h3>A game is a loop</h3><p>The loop you wrote in 5.1 ran as fast as the CPU allowed — possibly thousands of pointless frames per second, pinning a core and draining the battery. A real game loop does three things every iteration at a controlled pace: <strong>process input</strong>, <strong>update state</strong>, <strong>render</strong>. The pacing comes from <code>pygame.time.Clock</code>.</p><h3>Clock and a frame budget</h3><p>Create one Clock before the loop. Call <code>clock.tick(fps)</code> once per frame. It sleeps just long enough to cap your loop at the target FPS, and it returns the number of <em>milliseconds since the last call</em> — your raw delta time.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>loop.py</span></div><div class='term-body'>clock = pygame.time.Clock()\nFPS = 60\n\nwhile running:\n    dt = clock.tick(FPS) / 1000.0   <span class='cm'># ms -> seconds</span>\n\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n            running = False\n\n    update(dt)                       <span class='cm'># move things by speed * dt</span>\n    render(screen)\n    pygame.display.flip()</div></div><h3>Why delta time matters</h3><p>If you move a dot with <code>x += 5</code> every frame, it travels 5px/frame. On a 60Hz monitor that is 300px/sec; on a 144Hz monitor it is 720px/sec — your game runs at different speeds on different machines. The fix is to express speed in <strong>pixels per second</strong> and multiply by <code>dt</code>:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>movement</span></div><div class='term-body'><span class='bad'>x += 5</span>                 <span class='cm'># framerate-DEPENDENT, wrong</span>\n<span class='ok'>x += 200 * dt</span>          <span class='cm'># 200 px/sec, framerate-independent</span></div></div><div class='box tip'><div class='bt'>Use floats for position.</div> <code>dt</code> is fractional, so <code>200 * dt</code> is rarely a whole number. Track position in <code>float</code> variables and only round to <code>int</code> when you draw. If you store position as int you will lose sub-pixel motion and slow movement will stutter or stop entirely.</div><h3>The moving-dot demo</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>dot.py</span></div><div class='term-body'>import pygame, sys\npygame.init()\nscreen = pygame.display.set_mode((800, 600))\nclock = pygame.time.Clock()\n\nx, y = 0.0, 300.0\nspeed = 250.0   <span class='cm'># pixels per second</span>\n\nrunning = True\nwhile running:\n    dt = clock.tick(60) / 1000.0\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n            running = False\n\n    x += speed * dt\n    if x > 800:\n        x = 0.0                <span class='cm'># wrap to the left edge</span>\n\n    screen.fill((15, 15, 25))\n    pygame.draw.circle(screen, (240, 200, 60), (int(x), int(y)), 20)\n    pygame.display.flip()\n\npygame.quit(); sys.exit()</div></div><h3>Measuring real FPS</h3><p>Call <code>clock.get_fps()</code> to see the smoothed actual frame rate. If it sits well below your target, your <code>update</code>/<code>render</code> is doing too much work per frame — profile before optimizing.</p><div class='box danger'><div class='bt'>tick() caps, it does not guarantee.</div> If a frame takes longer than the budget (16.6ms at 60fps), <code>dt</code> grows. A huge <code>dt</code> after a stall (alt-tab, breakpoint) can teleport objects through walls. Clamp it: <code>dt = min(dt, 0.05)</code>.</div><div class='box law'><div class='bt'>The loop order is sacred.</div> Events first (so input is fresh), then update (logic moves the world), then render (draw the result), then flip. Never draw before you have processed input for the frame.</div><div class='game'><div class='game-head'>🎮 Build This: Moving Dot</div><div class='game-body'><p>A circle that slides across the window at a steady, framerate-independent rate.</p><ol><li>Add a <code>Clock</code> and compute <code>dt</code> from <code>tick(60)</code>.</li><li>Store <code>x</code> as a float; update with <code>x += speed * dt</code>.</li><li>Wrap to <code>0</code> when <code>x > width</code>.</li><li>Draw with <code>pygame.draw.circle</code> using <code>int(x)</code>; flip the display.</li><li>Print <code>clock.get_fps()</code> once a second and confirm it sits near 60.</li></ol></div></div>"},{"id":"p5-3","part":"05 · Python (from scratch)","nav":"Drawing & Images","num":"5.3","kicker":"Part 05 · Lesson 3","title":"Drawing & Loading Images","html":"<h3>Two ways to put pixels on screen</h3><p>You either <strong>draw primitives</strong> (rectangles, circles, lines) with the <code>pygame.draw</code> module, or you <strong>blit surfaces</strong> (loaded images, rendered text) onto the display. Both write to a Surface; the display surface is just the special one the window shows.</p><h3>Drawing primitives</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>draw.py</span></div><div class='term-body'>pygame.draw.rect(screen, (255,255,255), (x, y, w, h))     <span class='cm'># filled rect</span>\npygame.draw.rect(screen, (255,255,255), rect, width=2)    <span class='cm'># outline, 2px</span>\npygame.draw.circle(screen, (240,200,60), (cx, cy), radius)\npygame.draw.line(screen, (90,90,120), (x1,y1), (x2,y2), 3)</div></div><p>The rect argument can be a 4-tuple <code>(x, y, w, h)</code> or a <code>pygame.Rect</code>. Pass <code>width</code> for an outline; omit it (or pass 0) for a filled shape.</p><h3>Loading and blitting images</h3><p><code>pygame.image.load(path)</code> returns a Surface. <strong>Always call <code>.convert()</code> or <code>.convert_alpha()</code> on it immediately.</strong> Loaded images are in the file's pixel format; <code>convert</code> rematches them to the display's format, which makes every later blit dramatically faster.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>images.py</span></div><div class='term-body'>player_img = pygame.image.load(\"assets/player.png\").convert_alpha()\nbg_img     = pygame.image.load(\"assets/bg.png\").convert()    <span class='cm'># no transparency</span>\n\nscreen.blit(bg_img, (0, 0))           <span class='cm'># background first</span>\nscreen.blit(player_img, (px, py))     <span class='cm'># then the player on top</span></div></div><div class='box danger'><div class='bt'>convert() needs a display.</div> You can only call <code>.convert()</code> <em>after</em> <code>set_mode()</code> has created the window. Calling it earlier raises <code>pygame.error: cannot convert without pygame.display initialized</code>. Use <code>convert_alpha()</code> for PNGs with transparency; plain <code>convert()</code> drops the alpha channel.</div><div class='box tip'><div class='bt'>Use file paths that survive packaging.</div> Build paths relative to the script with <code>os.path.join(os.path.dirname(__file__), \"assets\", \"player.png\")</code>. Hard-coded relative paths break the moment you run from another folder or bundle with PyInstaller (covered in 5.8).</div><h3>Text is a rendered image too</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>text.py</span></div><div class='term-body'>font = pygame.font.SysFont(\"consolas\", 48)\nlabel = font.render(\"PONG\", True, (255,255,255))   <span class='cm'># True = antialiased</span>\nrect = label.get_rect(center=(400, 50))\nscreen.blit(label, rect)</div></div><h3>Pong rendered with shapes</h3><p>Pong needs no art at all — two paddle rects and a ball. We will give it input and physics in the next lesson; here we just lay out and draw the board.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong_draw.py</span></div><div class='term-body'>WIDTH, HEIGHT = 800, 600\nWHITE = (235, 235, 235)\n\nleft  = pygame.Rect(30, HEIGHT//2 - 50, 12, 100)\nright = pygame.Rect(WIDTH-42, HEIGHT//2 - 50, 12, 100)\nball  = pygame.Rect(WIDTH//2 - 8, HEIGHT//2 - 8, 16, 16)\n\nwhile running:\n    dt = clock.tick(60) / 1000.0\n    for e in pygame.event.get():\n        if e.type == pygame.QUIT: running = False\n\n    screen.fill((10, 10, 15))\n    pygame.draw.aaline(screen, (60,60,70), (WIDTH//2,0), (WIDTH//2,HEIGHT))  <span class='cm'># net</span>\n    pygame.draw.rect(screen, WHITE, left)\n    pygame.draw.rect(screen, WHITE, right)\n    pygame.draw.ellipse(screen, WHITE, ball)\n    pygame.display.flip()</div></div><div class='box law'><div class='bt'>Painter's algorithm.</div> Pygame has no z-ordering. Whatever you blit last lands on top. Draw back-to-front every frame: background, then world objects, then UI text.</div><div class='game'><div class='game-head'>🎮 Build This: Pong Board (visuals)</div><div class='game-body'><p>Draw the full Pong scene: two paddles, a ball, a center net, and a score line.</p><ol><li>Define three <code>pygame.Rect</code>s for left paddle, right paddle, and ball.</li><li>Each frame, <code>fill</code> the background and draw the net with <code>aaline</code>.</li><li>Draw the paddles as filled rects and the ball as an ellipse.</li><li>Render a score string with a <code>SysFont</code> and blit it centered at the top.</li><li>Confirm the layout looks right before adding movement next lesson.</li></ol></div></div>"},{"id":"p5-4","part":"05 · Python (from scratch)","nav":"Events & Input","num":"5.4","kicker":"Part 05 · Lesson 4","title":"Events & Input Handling","html":"<h3>Two input models, used together</h3><p>Pygame gives you input in two flavors, and good games use both:</p><ul><li><strong>Events</strong> are discrete, one-time notifications in a queue: a key was pressed <em>this frame</em>, the window was closed, the mouse was clicked. Read them with <code>pygame.event.get()</code>. Use events for things that should happen once per press: jump, fire, pause, menu select.</li><li><strong>Polled state</strong> is the snapshot of what is held down <em>right now</em>: <code>pygame.key.get_pressed()</code>, <code>pygame.mouse.get_pos()</code>. Use it for continuous actions: holding a paddle up, walking left.</li></ul><div class='box danger'><div class='bt'>Don't poll for one-shot actions.</div> If you fire a bullet whenever <code>get_pressed()[K_SPACE]</code> is true, you spew dozens of bullets per second from a single tap. Fire on the <code>KEYDOWN</code> <em>event</em> instead. Conversely, don't move a paddle on KEYDOWN events — you'll get one nudge, not smooth motion.</div><h3>Reading the event queue</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>events.py</span></div><div class='term-body'>for event in pygame.event.get():\n    if event.type == pygame.QUIT:\n        running = False\n    elif event.type == pygame.KEYDOWN:\n        if event.key == pygame.K_ESCAPE:\n            running = False\n        elif event.key == pygame.K_SPACE:\n            serve_ball()          <span class='cm'># fires exactly once</span>\n    elif event.type == pygame.MOUSEBUTTONDOWN:\n        print(\"click at\", event.pos, \"button\", event.button)</div></div><h3>Reading held keys</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>held.py</span></div><div class='term-body'>keys = pygame.key.get_pressed()      <span class='cm'># call once per frame</span>\nif keys[pygame.K_w]: left.y  -= PADDLE_SPEED * dt\nif keys[pygame.K_s]: left.y  += PADDLE_SPEED * dt\nif keys[pygame.K_UP]:   right.y -= PADDLE_SPEED * dt\nif keys[pygame.K_DOWN]: right.y += PADDLE_SPEED * dt</div></div><div class='box tip'><div class='bt'>Rect coordinates are ints.</div> <code>rect.y</code> stores integers. Adding <code>PADDLE_SPEED * dt</code> (a float) truncates each frame, which is fine for fast paddles. For slow, precise objects keep a float position and assign <code>rect.y = int(fy)</code>. We'll lean on that in Snake.</div><h3>Finishing Pong</h3><p>Now we combine both models: held keys drive the paddles continuously, SPACE serves the ball once, the ball bounces off the top/bottom walls and the paddles, and a miss scores a point and re-centers the ball.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong.py</span></div><div class='term-body'>PADDLE_SPEED = 420.0\nbvx, bvy = 0.0, 0.0          <span class='cm'># ball velocity, starts unserved</span>\nscore_l = score_r = 0\n\ndef serve():\n    global bvx, bvy\n    ball.center = (WIDTH//2, HEIGHT//2)\n    bvx, bvy = 300.0, 200.0\n\nwhile running:\n    dt = clock.tick(60) / 1000.0\n    for e in pygame.event.get():\n        if e.type == pygame.QUIT: running = False\n        elif e.type == pygame.KEYDOWN and e.key == pygame.K_SPACE:\n            if bvx == 0: serve()      <span class='cm'># serve only when idle</span>\n\n    keys = pygame.key.get_pressed()\n    if keys[pygame.K_w]: left.y  -= int(PADDLE_SPEED*dt)\n    if keys[pygame.K_s]: left.y  += int(PADDLE_SPEED*dt)\n    if keys[pygame.K_UP]:   right.y -= int(PADDLE_SPEED*dt)\n    if keys[pygame.K_DOWN]: right.y += int(PADDLE_SPEED*dt)\n    left.clamp_ip(screen.get_rect())     <span class='cm'># keep on-screen</span>\n    right.clamp_ip(screen.get_rect())\n\n    ball.x += int(bvx*dt); ball.y += int(bvy*dt)\n    if ball.top <= 0 or ball.bottom >= HEIGHT: bvy = -bvy\n    if ball.colliderect(left) or ball.colliderect(right): bvx = -bvx\n    if ball.left <= 0:  score_r += 1; bvx = 0\n    if ball.right >= WIDTH: score_l += 1; bvx = 0\n\n    screen.fill((10,10,15))\n    pygame.draw.rect(screen, (235,235,235), left)\n    pygame.draw.rect(screen, (235,235,235), right)\n    pygame.draw.ellipse(screen, (235,235,235), ball)\n    pygame.display.flip()</div></div><div class='box law'><div class='bt'>clamp_ip keeps things in bounds.</div> <code>rect.clamp_ip(area)</code> moves a Rect (in place) so it stays inside another Rect — perfect for keeping paddles on screen without manual min/max math.</div><div class='game'><div class='game-head'>🎮 Build This: Playable Pong</div><div class='game-body'><p>Two-player Pong with held-key paddles and a space-to-serve ball.</p><ol><li>Drive both paddles with <code>get_pressed()</code> (W/S and Up/Down).</li><li>Serve the ball only on the <code>KEYDOWN</code> SPACE event when it's idle.</li><li>Bounce <code>bvy</code> off top/bottom; bounce <code>bvx</code> on paddle <code>colliderect</code>.</li><li>Score and reset the ball when it passes a side edge.</li><li>Render the live score with a font at the top center.</li></ol></div></div>"},{"id":"p5-5","part":"05 · Python (from scratch)","nav":"Rects & Movement","num":"5.5","kicker":"Part 05 · Lesson 5","title":"Rects & Movement","html":"<h3>The Rect is Pygame's workhorse</h3><p><code>pygame.Rect(x, y, width, height)</code> represents an axis-aligned rectangle. It is used for positions, collision, and layout. Its real power is the dozen named edge/anchor attributes you can read <em>and assign</em>:</p><table><thead><tr><th>Attribute</th><th>Meaning</th></tr></thead><tbody><tr><td><code>x, y</code> / <code>left, top</code></td><td>Top-left corner</td></tr><tr><td><code>right, bottom</code></td><td>Far edges</td></tr><tr><td><code>centerx, centery, center</code></td><td>Center point</td></tr><tr><td><code>width, height, size</code></td><td>Dimensions</td></tr><tr><td><code>topleft, midbottom, ...</code></td><td>9 anchor points</td></tr></tbody></table><p>Assigning to any of these moves the rect <em>without resizing it</em>. <code>rect.center = (400, 300)</code> recenters; <code>rect.bottom = HEIGHT</code> snaps it to the floor. This makes positioning declarative and bug-resistant.</p><div class='box tip'><div class='bt'>move vs move_ip.</div> <code>rect.move(dx, dy)</code> returns a <em>new</em> rect; <code>rect.move_ip(dx, dy)</code> mutates in place. Use <code>move</code> when you want to test a destination before committing (great for collision lookahead).</div><h3>Grid-based movement</h3><p>Snake doesn't move continuously — it hops cell by cell on a timer. Design the grid first: pick a <code>CELL</code> size and derive the playfield in cells. Every snake segment is one cell-sized Rect snapped to the grid.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>grid.py</span></div><div class='term-body'>CELL = 24\nCOLS, ROWS = 30, 22\nWIDTH, HEIGHT = COLS*CELL, ROWS*CELL    <span class='cm'># 720 x 528</span>\n\n<span class='cm'># snake is a list of (col,row) cells, head first</span>\nsnake = [(15, 11), (14, 11), (13, 11)]\ndirection = (1, 0)          <span class='cm'># moving right, in grid units</span></div></div><h3>A movement timer, not per-frame motion</h3><p>The loop still runs at 60 FPS for smooth input, but the snake only steps every <code>STEP</code> seconds. Accumulate <code>dt</code> and step when the accumulator overflows.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>snake_move.py</span></div><div class='term-body'>STEP = 0.12          <span class='cm'># seconds per move</span>\nacc = 0.0\n\nwhile running:\n    dt = clock.tick(60) / 1000.0\n    acc += dt\n\n    for e in pygame.event.get():\n        if e.type == pygame.QUIT: running = False\n        elif e.type == pygame.KEYDOWN:\n            if   e.key == pygame.K_UP    and direction != (0,1):  next_dir = (0,-1)\n            elif e.key == pygame.K_DOWN  and direction != (0,-1): next_dir = (0,1)\n            elif e.key == pygame.K_LEFT  and direction != (1,0):  next_dir = (-1,0)\n            elif e.key == pygame.K_RIGHT and direction != (-1,0): next_dir = (1,0)\n\n    if acc >= STEP:\n        acc -= STEP\n        direction = next_dir\n        hx, hy = snake[0]\n        new_head = (hx + direction[0], hy + direction[1])\n\n        <span class='cm'># wrap around the walls (toroidal)</span>\n        new_head = (new_head[0] % COLS, new_head[1] % ROWS)\n        snake.insert(0, new_head)\n        snake.pop()          <span class='cm'># remove tail unless we ate (next lesson)</span></div></div><div class='box danger'><div class='bt'>Buffer the direction; reject 180-degree turns.</div> Read input into a <code>next_dir</code> and only apply it at the step. If you mutate <code>direction</code> directly, a fast double-tap (up then left in one step) can reverse the snake into its own neck. Also block direct reversals: a snake moving right cannot instantly go left.</div><h3>Rendering the grid snake</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>snake_draw.py</span></div><div class='term-body'>screen.fill((12, 18, 12))\nfor i, (c, r) in enumerate(snake):\n    color = (120, 230, 120) if i == 0 else (70, 170, 70)\n    cell = pygame.Rect(c*CELL, r*CELL, CELL-2, CELL-2)   <span class='cm'># -2 = gap</span>\n    pygame.draw.rect(screen, color, cell)\npygame.display.flip()</div></div><div class='box law'><div class='bt'>Store grid coords, render pixel coords.</div> Keep game logic in cells <code>(col,row)</code> — integer math is exact and collision is just <code>==</code>. Multiply by <code>CELL</code> only at draw time. Mixing pixels into logic invites off-by-one bugs.</div><div class='game'><div class='game-head'>🎮 Build This: Snake (movement)</div><div class='game-body'><p>A grid snake that steps on a timer, turns with the arrow keys, and wraps at the walls.</p><ol><li>Define <code>CELL</code>, <code>COLS</code>, <code>ROWS</code>; size the window from them.</li><li>Hold the snake as a list of <code>(col,row)</code> cells; head at index 0.</li><li>Buffer arrow input into <code>next_dir</code>, blocking 180-degree reversals.</li><li>Accumulate <code>dt</code>; every <code>STEP</code> seconds insert a new head and pop the tail.</li><li>Wrap the head with <code>% COLS</code> / <code>% ROWS</code> and draw each cell as a Rect.</li></ol></div></div>"},{"id":"p5-6","part":"05 · Python (from scratch)","nav":"Collision","num":"5.6","kicker":"Part 05 · Lesson 6","title":"Collision: Rect & Mask","html":"<h3>Rect collision: fast and good enough</h3><p>Most 2D games run entirely on axis-aligned rectangle overlap tests. They are cheap and the API is clean:</p><ul><li><code>a.colliderect(b)</code> — do two Rects overlap? Returns bool.</li><li><code>rect.collidepoint(x, y)</code> — is a point inside? (mouse hit-testing).</li><li><code>rect.collidelist(rects)</code> — index of the first overlapping rect, or -1.</li><li><code>rect.collidelistall(rects)</code> — indices of <em>all</em> overlaps.</li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>rectcol.py</span></div><div class='term-body'>if player.colliderect(coin):\n    score += 1\n\nhit = bullet.collidelist(enemy_rects)\nif hit != -1:\n    del enemy_rects[hit]</div></div><h3>Mask collision: pixel-perfect</h3><p>Rects are too generous for irregular shapes — a triangular ship's bounding box overlaps long before the visible pixels touch. A <strong>mask</strong> is a 1-bit-per-pixel map of an image's non-transparent pixels. <code>mask.overlap(other, offset)</code> returns the first colliding point (or <code>None</code>), accounting only for solid pixels.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>maskcol.py</span></div><div class='term-body'>ship_mask = pygame.mask.from_surface(ship_surf)   <span class='cm'># needs alpha</span>\nrock_mask = pygame.mask.from_surface(rock_surf)\n\noffset = (rock_rect.x - ship_rect.x, rock_rect.y - ship_rect.y)\nif ship_mask.overlap(rock_mask, offset):\n    explode()</div></div><div class='box tip'><div class='bt'>Broad phase, then narrow phase.</div> Masks are heavier than rects. The pro pattern is: first do a cheap <code>colliderect</code>; only if that passes do the precise <code>mask.overlap</code>. This keeps thousands of objects fast while staying pixel-accurate where it counts.</div><div class='box danger'><div class='bt'>Masks come from alpha.</div> <code>pygame.mask.from_surface</code> reads transparency, so the source surface must be loaded with <code>convert_alpha()</code>. A fully opaque surface produces a solid rectangular mask — identical to a rect test, just slower. Rebuild the mask if you rotate/scale the image; the old mask no longer matches.</div><h3>Finishing Snake</h3><p>Snake needs exactly two collision rules, and on a grid both are simple equality checks on cells — no Rect needed for the logic, just for drawing. <strong>Eating food:</strong> the new head equals the food cell. <strong>Dying:</strong> the new head is already in the body.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>snake_collide.py</span></div><div class='term-body'>import random\n\ndef spawn_food(snake):\n    while True:\n        f = (random.randrange(COLS), random.randrange(ROWS))\n        if f not in snake:        <span class='cm'># never spawn on the snake</span>\n            return f\n\nfood = spawn_food(snake)\nscore = 0\n\n<span class='cm'># inside the STEP block, after computing new_head:</span>\nif new_head in snake:             <span class='cm'># ran into own body -> game over</span>\n    running = False\nelse:\n    snake.insert(0, new_head)\n    if new_head == food:          <span class='cm'># ate: grow (skip the pop)</span>\n        score += 1\n        food = spawn_food(snake)\n    else:\n        snake.pop()               <span class='cm'># normal: tail follows</span></div></div><p>The growth trick is elegant: every step you insert a head. Normally you also pop the tail, keeping length constant. When you eat, you <em>skip</em> the pop, so the snake grows by exactly one cell. No separate length counter needed.</p><div class='box law'><div class='bt'>Check self-collision before inserting.</div> Test <code>new_head in snake</code> while the old body is intact. If you insert the head first, the head trivially equals itself and you'd never detect a real crash. Order matters.</div><h3>If you wanted rect-based collision instead</h3><p>For a non-grid game you'd compare actual Rects: build a <code>food_rect</code> and <code>head_rect</code> at pixel positions and call <code>head_rect.colliderect(food_rect)</code>. On a grid the cell-equality test is faster and exact, which is why we prefer it here.</p><div class='game'><div class='game-head'>🎮 Build This: Complete Snake</div><div class='game-body'><p>Add food and death to your timer-driven snake.</p><ol><li>Write <code>spawn_food</code> that picks a random empty cell (not on the snake).</li><li>Each step, compute <code>new_head</code> first.</li><li>If <code>new_head in snake</code>, end the game.</li><li>Otherwise insert the head; if it equals <code>food</code>, grow (skip the pop) and respawn food; else pop the tail.</li><li>Draw the food cell in a contrasting color and show the live score.</li></ol></div></div>"},{"id":"p5-7","part":"05 · Python (from scratch)","nav":"Sprites & Groups","num":"5.7","kicker":"Part 05 · Lesson 7","title":"The Sprite Class, Groups, Sound & Music","html":"<h3>Stop tracking objects by hand</h3><p>Managing parallel lists of positions, velocities, and rects gets unmanageable past a few entities. Pygame's <code>sprite</code> module fixes this. A <strong>Sprite</strong> is any object with two attributes: <code>.image</code> (a Surface) and <code>.rect</code> (its position). A <strong>Group</strong> is a container that can <code>update()</code> and <code>draw()</code> all its sprites at once.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sprite.py</span></div><div class='term-body'>class Invader(pygame.sprite.Sprite):\n    def __init__(self, x, y, img):\n        super().__init__()                <span class='cm'># REQUIRED</span>\n        self.image = img\n        self.rect = self.image.get_rect(topleft=(x, y))\n\n    def update(self, dt, dx):\n        self.rect.x += int(dx * dt)       <span class='cm'># group passes args through</span>\n\nclass Bullet(pygame.sprite.Sprite):\n    def __init__(self, x, y):\n        super().__init__()\n        self.image = pygame.Surface((4, 12)); self.image.fill((255,255,0))\n        self.rect = self.image.get_rect(center=(x, y))\n    def update(self, dt, *_):\n        self.rect.y -= int(500 * dt)\n        if self.rect.bottom < 0:\n            self.kill()                   <span class='cm'># remove from ALL groups</span></div></div><div class='box tip'><div class='bt'>super().__init__() is mandatory.</div> The base Sprite constructor sets up the internal group bookkeeping. Forget it and adding the sprite to a group raises <code>AttributeError</code>. And <code>self.kill()</code> is how a sprite removes itself — no manual list deletion.</div><h3>Groups: update and draw everything</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>groups.py</span></div><div class='term-body'>invaders = pygame.sprite.Group()\nbullets  = pygame.sprite.Group()\nfor row in range(4):\n    for col in range(10):\n        invaders.add(Invader(60 + col*60, 60 + row*50, invader_img))\n\n<span class='cm'># in the loop:</span>\ninvaders.update(dt, dx)      <span class='cm'># calls every invader's update(dt,dx)</span>\nbullets.update(dt)\ninvaders.draw(screen)        <span class='cm'># blits every .image at its .rect</span>\nbullets.draw(screen)</div></div><h3>Group-to-group collision</h3><p>This is where Groups shine. <code>groupcollide</code> tests every sprite in one group against another and returns a dict of the collisions, optionally killing the hit sprites.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>collide.py</span></div><div class='term-body'><span class='cm'># kill bullet AND invader on hit; dict maps bullet -> [invaders hit]</span>\nhits = pygame.sprite.groupcollide(bullets, invaders, True, True)\nfor bullet in hits:\n    score += 10\n    explosion_snd.play()\n\n<span class='cm'># single sprite vs group (player vs enemy bullets)</span>\nif pygame.sprite.spritecollideany(player, enemy_bullets):\n    lives -= 1</div></div><h3>Sound effects and music</h3><p>The mixer handles two separate things. <strong>Sounds</strong> (short SFX) are loaded fully into memory as <code>pygame.mixer.Sound</code> objects and played on channels — many at once. <strong>Music</strong> (long background tracks) is streamed from disk via <code>pygame.mixer.music</code> — one track at a time.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio.py</span></div><div class='term-body'>pygame.mixer.pre_init(44100, -16, 2, 512)   <span class='cm'># before pygame.init(): low latency</span>\npygame.init()\n\nshoot_snd     = pygame.mixer.Sound(\"sfx/shoot.wav\")\nexplosion_snd = pygame.mixer.Sound(\"sfx/boom.wav\")\nshoot_snd.set_volume(0.4)\nshoot_snd.play()                <span class='cm'># fire-and-forget, overlapping</span>\n\npygame.mixer.music.load(\"music/loop.ogg\")\npygame.mixer.music.set_volume(0.3)\npygame.mixer.music.play(-1)     <span class='cm'># -1 = loop forever</span></div></div><div class='box danger'><div class='bt'>Audio latency and formats.</div> If sounds lag behind the action, lower the mixer buffer with <code>pre_init(44100, -16, 2, 512)</code> <em>before</em> <code>pygame.init()</code>. Prefer <code>.ogg</code> and <code>.wav</code>; MP3 support is inconsistent across platforms. Don't reload a Sound every shot — load it once at startup.</div><div class='box law'><div class='bt'>Sound = short & many; music = long & one.</div> Use <code>mixer.Sound</code> for effects you fire repeatedly and overlap, and <code>mixer.music</code> for a single streamed background track. Mixing these up wastes memory or cuts off your SFX.</div><div class='game'><div class='game-head'>🎮 Build This: Space Invaders</div><div class='game-body'><p>Sprite-grouped invaders and bullets with group collisions and audio.</p><ol><li>Make <code>Player</code>, <code>Invader</code>, and <code>Bullet</code> subclasses of <code>Sprite</code> with <code>.image</code> and <code>.rect</code>.</li><li>Fill an <code>invaders</code> Group in a grid; march them sideways and drop down at the edges.</li><li>Spawn a <code>Bullet</code> into a group on the SPACE KEYDOWN event; play <code>shoot_snd</code>.</li><li>Each frame run <code>groupcollide(bullets, invaders, True, True)</code>, add score, play <code>explosion_snd</code>.</li><li>End the game if <code>spritecollideany(player, enemy_bullets)</code> or invaders reach the bottom; loop background music with <code>play(-1)</code>.</li></ol></div></div>"},{"id":"p5-8","part":"05 · Python (from scratch)","nav":"Capstone & Package","num":"5.8","kicker":"Part 05 · Lesson 8","title":"Capstone: A Platformer, Scenes & Packaging","html":"<h3>Scenes: one game, many states</h3><p>A real game is not one loop — it is a menu, then gameplay, then a game-over screen, each with its own input, update, and draw. The clean pattern is a <strong>Scene base class</strong> and a tiny manager that runs the current scene and lets scenes request a switch.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>scene.py</span></div><div class='term-body'>class Scene:\n    def __init__(self): self.next = self     <span class='cm'># stay on self by default</span>\n    def handle(self, events): pass\n    def update(self, dt): pass\n    def draw(self, screen): pass\n    def switch(self, scene): self.next = scene\n\nclass MenuScene(Scene):\n    def handle(self, events):\n        for e in events:\n            if e.type == pygame.KEYDOWN and e.key == pygame.K_RETURN:\n                self.switch(PlayScene())\n    def draw(self, screen):\n        screen.fill((20,20,35))\n        # blit \"PRESS ENTER\" text here\n\nclass GameOverScene(Scene):\n    def __init__(self, score): super().__init__(); self.score = score\n    def handle(self, events):\n        for e in events:\n            if e.type == pygame.KEYDOWN and e.key == pygame.K_RETURN:\n                self.switch(MenuScene())</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.py (manager)</span></div><div class='term-body'>scene = MenuScene()\nwhile running:\n    dt = clock.tick(60) / 1000.0\n    events = pygame.event.get()\n    for e in events:\n        if e.type == pygame.QUIT: running = False\n    scene.handle(events)\n    scene.update(dt)\n    scene.draw(screen)\n    pygame.display.flip()\n    scene = scene.next            <span class='cm'># switch takes effect next frame</span></div></div><h3>Platformer physics in PlayScene</h3><p>A platformer adds gravity, jumping, and one-way-blocking collision against tiles. The classic trick is <strong>axis-separated collision</strong>: move on X and resolve X overlaps, then move on Y and resolve Y overlaps. Resolving both at once produces sticky corners and tunneling.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>platformer.py</span></div><div class='term-body'>GRAVITY = 2000.0      <span class='cm'># px/s^2</span>\nJUMP    = -650.0      <span class='cm'># upward velocity</span>\nvx, vy  = 0.0, 0.0\non_ground = False\n\nkeys = pygame.key.get_pressed()\nvx = (keys[pygame.K_RIGHT] - keys[pygame.K_LEFT]) * 300.0\nif keys[pygame.K_SPACE] and on_ground:\n    vy = JUMP; on_ground = False\nvy += GRAVITY * dt\n\n<span class='cm'># --- X axis ---</span>\nplayer.x += round(vx * dt)\nfor t in tiles:\n    if player.colliderect(t):\n        if vx > 0: player.right = t.left\n        elif vx < 0: player.left = t.right\n\n<span class='cm'># --- Y axis ---</span>\nplayer.y += round(vy * dt)\non_ground = False\nfor t in tiles:\n    if player.colliderect(t):\n        if vy > 0: player.bottom = t.top; on_ground = True; vy = 0\n        elif vy < 0: player.top = t.bottom; vy = 0</div></div><div class='box tip'><div class='bt'>Snap to the edge you hit.</div> When colliding, don't just stop — set the matching anchor (<code>player.bottom = t.top</code>) so the player rests exactly on the surface. Then zero the velocity on that axis. Setting <code>on_ground</code> only inside the downward-Y branch gives you reliable jump gating.</div><h3>Packaging with PyInstaller</h3><p>To ship a single double-clickable file, freeze the game with PyInstaller. Install it, then bundle. The critical flag is <code>--add-data</code>, which copies your assets into the bundle.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='pr'>$</span> pip install pyinstaller\n<span class='pr'>$</span> pyinstaller --onefile --windowed \\\n      --add-data \"assets:assets\" \\\n      --add-data \"sfx:sfx\" main.py    <span class='cm'># use ; instead of : on Windows</span>\n<span class='pr'>$</span> ./dist/main                       <span class='cm'># the standalone executable</span></div></div><div class='box danger'><div class='bt'>Assets vanish after bundling.</div> A frozen app unpacks to a temp folder, so plain relative paths break. Resolve assets through PyInstaller's <code>sys._MEIPASS</code>: <code>base = getattr(sys, \"_MEIPASS\", os.path.dirname(__file__))</code>, then <code>os.path.join(base, \"assets\", \"player.png\")</code>. The <code>--add-data</code> separator is <code>:</code> on macOS/Linux but <code>;</code> on Windows.</div><div class='box law'><div class='bt'>--windowed hides the console.</div> Use <code>--windowed</code> (alias <code>--noconsole</code>) so a black terminal doesn't pop up behind your game. Build <em>with</em> the console first to read tracebacks, then rebuild windowed for release. Test the executable on a clean machine without Python installed.</div><div class='game'><div class='game-head'>🎮 Build This: Platformer Capstone + Executable</div><div class='game-body'><p>A small platformer with menu, play, and game-over scenes, packaged into a standalone app.</p><ol><li>Build the <code>Scene</code> base class and a manager loop that does <code>scene = scene.next</code>.</li><li>Implement Menu (ENTER to play), Play (gravity + jump + axis-separated tile collision), and GameOver (ENTER to menu) scenes.</li><li>Add a goal/coins and pass the final score into <code>GameOverScene</code>.</li><li>Load all assets through a <code>_MEIPASS</code>-aware path helper.</li><li>Package with <code>pyinstaller --onefile --windowed --add-data</code> and run <code>dist/</code> to confirm assets and audio load.</li></ol></div></div>"},{"id":"p6-1","part":"06 · JavaScript (from scratch)","nav":"Canvas Page","num":"6.1","kicker":"Part 06 · Lesson 1","title":"A Self-Contained Canvas Page","html":"<h3>Zero install, one file</h3><p>The browser is the most widely deployed game runtime on earth. There is no SDK to download, no license, no build step required to get pixels on screen. You write an HTML file, double-click it, and it runs. In this lesson we build the smallest possible foundation: a single page with a <code>&lt;canvas&gt;</code> element and the JavaScript that grabs its 2D drawing context.</p><p>A canvas is a rectangular bitmap you draw into with code. It has no shapes, layers, or memory of what you drew — every frame you paint pixels, and they stay until you paint over them. That simplicity is exactly why it is great for learning game dev: nothing is hidden.</p><h3>The full page</h3><p>Everything lives in one file. The <code>&lt;canvas&gt;</code> gets an explicit <code>width</code> and <code>height</code> (these are the bitmap's pixel dimensions, not CSS size). We grab it by id and ask for the <code>'2d'</code> context — the object that holds every drawing command.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>index.html</span></div><div class='term-body'>&lt;!DOCTYPE html&gt;\n&lt;html lang='en'&gt;\n&lt;head&gt;\n  &lt;meta charset='utf-8'&gt;\n  &lt;title&gt;My Canvas&lt;/title&gt;\n  &lt;meta name='viewport' content='width=device-width, initial-scale=1'&gt;\n&lt;/head&gt;\n&lt;body style='margin:0; background:#111;'&gt;\n  &lt;canvas id='game' width='640' height='360'&gt;&lt;/canvas&gt;\n\n  &lt;script&gt;\n    const canvas = document.getElementById('game');\n    const ctx = canvas.getContext('2d'); <span class='cm'>// the 2D drawing API</span>\n\n    <span class='cm'>// Fill the whole canvas with a background color</span>\n    ctx.fillStyle = '#1d2b53';\n    ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n    <span class='cm'>// A red square</span>\n    ctx.fillStyle = '#ff004d';\n    ctx.fillRect(40, 40, 80, 80);\n\n    <span class='cm'>// A green circle</span>\n    ctx.fillStyle = '#00e436';\n    ctx.beginPath();\n    ctx.arc(300, 180, 50, 0, Math.PI * 2);\n    ctx.fill();\n\n    <span class='cm'>// Some text</span>\n    ctx.fillStyle = '#fff';\n    ctx.font = '24px sans-serif';\n    ctx.fillText('Hello, canvas!', 380, 60);\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</div></div><h3>Coordinate system</h3><p>The canvas origin <code>(0, 0)</code> is the <strong>top-left</strong> corner. X grows to the right, Y grows <em>downward</em>. This trips up everyone coming from math class — moving an object \"up\" means <em>decreasing</em> its Y. <code>fillRect(x, y, w, h)</code> draws from the top-left corner of the rectangle.</p><table><thead><tr><th>Call</th><th>What it draws</th></tr></thead><tbody><tr><td><code>ctx.fillStyle = '#rrggbb'</code></td><td>Sets the fill color for the next shapes</td></tr><tr><td><code>ctx.fillRect(x,y,w,h)</code></td><td>A filled rectangle</td></tr><tr><td><code>ctx.strokeRect(x,y,w,h)</code></td><td>An outlined rectangle</td></tr><tr><td><code>ctx.beginPath()</code> / <code>arc</code> / <code>fill</code></td><td>A filled circle or curve</td></tr><tr><td><code>ctx.fillText(str,x,y)</code></td><td>Text, where y is the baseline</td></tr></tbody></table><div class='box tip'><div class='bt'>The script goes after the canvas.</div> The browser parses top to bottom. If your <code>&lt;script&gt;</code> runs before the <code>&lt;canvas&gt;</code> exists, <code>getElementById</code> returns <code>null</code>. Putting the script at the end of <code>&lt;body&gt;</code> (or wrapping it in a load handler) avoids this.</div><div class='box danger'><div class='bt'>Don't size the canvas with CSS.</div> Setting <code>width</code>/<code>height</code> in CSS <em>stretches</em> the bitmap and blurs it. Set them as HTML attributes (or via <code>canvas.width = 640</code> in JS) to control the actual pixel grid. CSS sizing is only for the display box.</div><h3>How to run it</h3><p>Save as <code>index.html</code> and double-click. That's it — no server needed for static drawing. Later, when you load images and audio, browsers block <code>file://</code> access for security, so you'll run a tiny local server (<code>npx serve</code> or VS Code's Live Server). Get in that habit early.</p><div class='box lab'><div class='bt'>Inspect with DevTools.</div> Press F12, open the Console. Any typo throws an error there with a line number. If your canvas is blank, the Console almost always tells you why.</div><div class='game'><div class='game-head'>🎮 Build This: Static Scene</div><div class='game-body'><p>A single canvas page that paints a small scene.</p><ol><li>Create <code>index.html</code> with a 640×360 canvas and a script at the end of the body.</li><li>Grab the context with <code>getContext('2d')</code> and fill the background.</li><li>Draw at least three shapes: a rectangle, a circle, and a line of text.</li><li>Open it in a browser. Then change a color and refresh to confirm your edit loop works.</li></ol></div></div>"},{"id":"p6-2","part":"06 · JavaScript (from scratch)","nav":"rAF & Delta Time","num":"6.2","kicker":"Part 06 · Lesson 2","title":"The requestAnimationFrame Loop & Delta Time","html":"<h3>Why a loop, not a one-shot script</h3><p>Last lesson drew once and stopped. A game must repeat forever: read input, update the world, render, repeat — many times per second. That repetition is the <strong>game loop</strong>, the beating heart of every game ever made.</p><p>The browser gives us <code>requestAnimationFrame</code> (rAF) to drive it. You hand rAF a function; the browser calls it right before the next screen repaint — typically 60 times a second, or 144 on a high-refresh display. Crucially, rAF passes your function a <strong>timestamp</strong> (in milliseconds since page load). You schedule the next frame from inside the callback, creating a self-perpetuating loop.</p><h3>Delta time: the single most important concept</h3><p>If you move a box <code>5</code> pixels every frame, it travels 300 px/sec on a 60Hz monitor but 720 px/sec on a 144Hz monitor. Your game would literally run faster on better hardware. The fix is <strong>delta time</strong> (<code>dt</code>): the number of seconds that elapsed since the last frame. You multiply all motion by <code>dt</code>, so speeds are expressed in <em>pixels per second</em> and stay identical on any display.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>game.js</span></div><div class='term-body'>const canvas = document.getElementById('game');\nconst ctx = canvas.getContext('2d');\n\nconst box = { x: 50, y: 150, w: 40, h: 40, speed: 200 }; <span class='cm'>// px/sec</span>\n\nlet last = 0;\nfunction loop(now) {\n  const dt = (now - last) / 1000; <span class='cm'>// ms -&gt; seconds</span>\n  last = now;\n\n  update(dt);\n  render();\n\n  requestAnimationFrame(loop); <span class='cm'>// schedule the next frame</span>\n}\n\nfunction update(dt) {\n  box.x += box.speed * dt; <span class='cm'>// frame-rate independent!</span>\n  if (box.x &gt; canvas.width)  { box.x = canvas.width; box.speed *= -1; }\n  if (box.x &lt; 0)             { box.x = 0;            box.speed *= -1; }\n}\n\nfunction render() {\n  ctx.fillStyle = '#1d2b53';\n  ctx.fillRect(0, 0, canvas.width, canvas.height); <span class='cm'>// clear</span>\n  ctx.fillStyle = '#ffec27';\n  ctx.fillRect(box.x, box.y, box.w, box.h);\n}\n\nrequestAnimationFrame(loop); <span class='cm'>// kick it off</span></div></div><h3>The first-frame gotcha</h3><p>On the very first call, <code>last</code> is <code>0</code> but <code>now</code> might be <code>3000</code>, giving a <code>dt</code> of 3 seconds and a box that teleports. Two common fixes: initialize <code>last</code> on the first frame, or clamp <code>dt</code> to a maximum.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>safe-dt.js</span></div><div class='term-body'>let dt = (now - last) / 1000;\nlast = now;\nif (dt &gt; 0.05) dt = 0.05; <span class='cm'>// clamp: never step more than 50ms at once</span></div></div><p>Clamping also protects you when the player switches tabs — the browser <em>pauses</em> rAF, and on return you'd otherwise get a giant <code>dt</code> that flings objects across the screen or through walls.</p><h3>Clear every frame</h3><p>The canvas keeps whatever you last drew. If you don't clear it, the box leaves a trail. Either <code>fillRect</code> the whole background (also sets your backdrop) or use <code>ctx.clearRect(0, 0, canvas.width, canvas.height)</code> for transparency.</p><table><thead><tr><th>Term</th><th>Meaning</th></tr></thead><tbody><tr><td><code>now</code></td><td>Timestamp rAF passes in, in ms</td></tr><tr><td><code>dt</code></td><td>Seconds since the previous frame</td></tr><tr><td>speed × dt</td><td>Distance moved this frame</td></tr><tr><td>FPS</td><td>Frames per second; <code>1/dt</code></td></tr></tbody></table><div class='box law'><div class='bt'>Rule: every movement multiplies by dt.</div> Position, rotation, timers, spawn rates — if it changes over time, multiply by <code>dt</code>. The instant you write <code>x += 5</code> with no <code>dt</code>, you've coupled your game to one specific refresh rate.</div><div class='box tip'><div class='bt'>Show your FPS.</div> While developing, draw <code>Math.round(1/dt)</code> in a corner with <code>fillText</code>. It's the quickest way to spot a performance regression.</div><div class='game'><div class='game-head'>🎮 Build This: Bouncing Box</div><div class='game-body'><p>A rectangle that glides across the canvas and bounces off both walls, identical on any monitor.</p><ol><li>Set up the rAF loop with <code>dt</code> in seconds, clamped to 0.05.</li><li>Give the box <code>x</code>, <code>speed</code> (px/sec), and update <code>x += speed * dt</code>.</li><li>Flip <code>speed</code> when it hits the left or right edge.</li><li>Clear and redraw each frame. Add an FPS readout in the corner.</li></ol></div></div>"},{"id":"p6-3","part":"06 · JavaScript (from scratch)","nav":"Drawing Sprites","num":"6.3","kicker":"Part 06 · Lesson 3","title":"Drawing Shapes, Images & Sprites","html":"<h3>From shapes to pictures</h3><p>You can build a whole game with just rectangles and circles — Pong needs nothing more. But real games use <strong>images</strong>: a player drawn from a PNG, backgrounds, particle textures. The canvas draws images with <code>ctx.drawImage</code>, and the catch is timing — an image isn't ready to draw until it has finished loading.</p><h3>Loading an image correctly</h3><p>Create an <code>Image</code> object, set its <code>src</code>, and listen for <code>onload</code>. Until that fires, the image has zero width and <code>drawImage</code> silently draws nothing. The safe pattern is to track loaded assets and only start the loop once they're ready.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>assets.js</span></div><div class='term-body'>const ball = new Image();\nball.src = 'ball.png';\n\nball.onload = () =&gt; {\n  requestAnimationFrame(loop); <span class='cm'>// start only after it loads</span>\n};\nball.onerror = () =&gt; console.error('Could not load ball.png');\n\n<span class='cm'>// later, inside render():</span>\nctx.drawImage(ball, x, y);              <span class='cm'>// natural size</span>\nctx.drawImage(ball, x, y, 32, 32);      <span class='cm'>// scaled to 32x32</span></div></div><div class='box danger'><div class='bt'>file:// blocks images.</div> If you double-click your HTML, the browser may refuse to load local images for security (CORS). Run a local server: <code>npx serve</code> in the project folder, then open the <code>localhost</code> URL it prints. This is the moment a static server becomes mandatory.</div><h3>The nine-argument drawImage</h3><p>The most powerful form crops a sub-rectangle out of a source image and draws it scaled. This is the foundation of spritesheets (lesson 6.7): <code>drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh)</code> — source rect first, destination rect second.</p><h3>Build Pong's visuals</h3><p>Pong is just three rectangles and one ball, redrawn each frame. We'll lay out the objects now and add motion and input next lesson. Notice everything is data in plain objects — that's all a game state really is.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong-draw.js</span></div><div class='term-body'>const W = canvas.width, H = canvas.height;\n\nconst left  = { x: 20,    y: H/2 - 40, w: 12, h: 80 };\nconst right = { x: W-32,  y: H/2 - 40, w: 12, h: 80 };\nconst ballPos = { x: W/2, y: H/2, r: 8 };\nlet scoreL = 0, scoreR = 0;\n\nfunction render() {\n  ctx.fillStyle = '#000';\n  ctx.fillRect(0, 0, W, H);\n\n  <span class='cm'>// dashed center line</span>\n  ctx.fillStyle = '#333';\n  for (let y = 0; y &lt; H; y += 24) ctx.fillRect(W/2 - 2, y, 4, 12);\n\n  <span class='cm'>// paddles + ball, all white</span>\n  ctx.fillStyle = '#fff';\n  ctx.fillRect(left.x,  left.y,  left.w,  left.h);\n  ctx.fillRect(right.x, right.y, right.w, right.h);\n  ctx.beginPath();\n  ctx.arc(ballPos.x, ballPos.y, ballPos.r, 0, Math.PI * 2);\n  ctx.fill();\n\n  <span class='cm'>// score</span>\n  ctx.font = '32px monospace';\n  ctx.textAlign = 'center';\n  ctx.fillText(scoreL, W/2 - 60, 48);\n  ctx.fillText(scoreR, W/2 + 60, 48);\n}</div></div><table><thead><tr><th>Property</th><th>Effect</th></tr></thead><tbody><tr><td><code>ctx.textAlign</code></td><td><code>'left'</code>, <code>'center'</code>, <code>'right'</code> relative to x</td></tr><tr><td><code>ctx.textBaseline</code></td><td><code>'top'</code>, <code>'middle'</code>, <code>'alphabetic'</code></td></tr><tr><td><code>ctx.globalAlpha</code></td><td>0–1 transparency for following draws</td></tr><tr><td><code>ctx.save()</code> / <code>ctx.restore()</code></td><td>Push/pop the style + transform state</td></tr></tbody></table><div class='box tip'><div class='bt'>Crisp pixels.</div> For pixel-art games, scaled images look blurry by default. Set <code>ctx.imageSmoothingEnabled = false</code> once after getting the context to keep hard edges when you scale up sprites.</div><div class='box law'><div class='bt'>Draw order is paint order.</div> The canvas has no z-index. Whatever you draw last sits on top. Render background first, then game objects, then UI/score last so they're never hidden.</div><div class='game'><div class='game-head'>🎮 Build This: Pong (visuals)</div><div class='game-body'><p>Render the full Pong board — it won't move yet, but every piece is on screen.</p><ol><li>Define <code>left</code>, <code>right</code> paddle objects and a <code>ball</code> object with x, y, r.</li><li>In <code>render()</code>, clear to black, draw the dashed center line, paddles, and ball in white.</li><li>Draw the two scores centered near the top.</li><li>Optionally load a <code>ball.png</code> via <code>onload</code> and swap the circle for <code>drawImage</code> — run it through <code>npx serve</code>.</li></ol></div></div>"},{"id":"p6-4","part":"06 · JavaScript (from scratch)","nav":"Input","num":"6.4","kicker":"Part 06 · Lesson 4","title":"Keyboard, Mouse & Touch Input","html":"<h3>Events vs. polling</h3><p>The browser fires <strong>events</strong> — <code>keydown</code>, <code>mousemove</code>, <code>touchstart</code> — at unpredictable times. But your game loop runs at a fixed rhythm and wants to ask, every frame, \"is the up arrow held right now?\" The bridge is simple: event handlers write into a state object; the loop reads that object. This is the <strong>input buffer</strong> pattern and it's how nearly all games handle input.</p><h3>Keyboard: track held keys</h3><p>Don't move the paddle inside the <code>keydown</code> handler — key-repeat is laggy and inconsistent. Instead record which keys are down in a <code>keys</code> map and act on it in <code>update</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>keyboard.js</span></div><div class='term-body'>const keys = {};\nwindow.addEventListener('keydown', e =&gt; { keys[e.code] = true; });\nwindow.addEventListener('keyup',   e =&gt; { keys[e.code] = false; });\n\nfunction update(dt) {\n  const v = left.speed * dt;\n  if (keys['KeyW']     || keys['ArrowUp'])   left.y -= v;\n  if (keys['KeyS']     || keys['ArrowDown']) left.y += v;\n  <span class='cm'>// clamp inside the board</span>\n  left.y = Math.max(0, Math.min(H - left.h, left.y));\n}</div></div><div class='box tip'><div class='bt'>Use e.code, not e.key.</div> <code>e.code</code> is the physical key (<code>'KeyW'</code>, <code>'ArrowUp'</code>) and is layout-independent. <code>e.key</code> returns <code>'w'</code> vs <code>'W'</code> depending on Shift and changes on non-QWERTY layouts. For WASD movement always use <code>e.code</code>.</div><div class='box danger'><div class='bt'>Stop the page from scrolling.</div> Arrow keys and Space scroll the page by default, jerking your game around. Call <code>e.preventDefault()</code> in <code>keydown</code> for the keys you use — but only those, so normal browser shortcuts still work.</div><h3>Mouse: convert to canvas coordinates</h3><p>Mouse events report coordinates relative to the <em>page</em>, not your canvas. You must subtract the canvas's position with <code>getBoundingClientRect()</code>. If the canvas is also CSS-scaled, multiply by the ratio of bitmap size to displayed size.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>mouse.js</span></div><div class='term-body'>function canvasPos(clientX, clientY) {\n  const r = canvas.getBoundingClientRect();\n  return {\n    x: (clientX - r.left) * (canvas.width  / r.width),\n    y: (clientY - r.top)  * (canvas.height / r.height)\n  };\n}\n\ncanvas.addEventListener('mousemove', e =&gt; {\n  const p = canvasPos(e.clientX, e.clientY);\n  left.y = p.y - left.h / 2; <span class='cm'>// center paddle on cursor</span>\n});</div></div><h3>Touch: one handler for both paddles</h3><p>Touch events carry a <code>touches</code> list — potentially several fingers at once. We read each touch's position and move whichever paddle is on that side of the screen. <code>touchmove</code> needs <code>preventDefault()</code> (with <code>{passive:false}</code>) or the page pinch-zooms and scrolls.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>touch.js</span></div><div class='term-body'>canvas.addEventListener('touchmove', e =&gt; {\n  e.preventDefault();\n  for (const t of e.touches) {\n    const p = canvasPos(t.clientX, t.clientY);\n    const paddle = p.x &lt; W / 2 ? left : right;\n    paddle.y = Math.max(0, Math.min(H - paddle.h, p.y - paddle.h / 2));\n  }\n}, { passive: false });</div></div><table><thead><tr><th>Event</th><th>Use for</th></tr></thead><tbody><tr><td><code>keydown</code> / <code>keyup</code></td><td>Held movement, action buttons</td></tr><tr><td><code>mousemove</code> / <code>mousedown</code></td><td>Aiming, dragging, clicks</td></tr><tr><td><code>touchstart</code> / <code>touchmove</code></td><td>Mobile dragging and taps</td></tr><tr><td><code>pointermove</code></td><td>Unified mouse+touch (one handler)</td></tr></tbody></table><div class='box law'><div class='bt'>Handlers set state, the loop reads it.</div> Never run game logic directly in an event handler — it desyncs from your frame timing. Record intent (\"up is held\", \"pointer at x,y\") and resolve it in <code>update(dt)</code>.</div><div class='game'><div class='game-head'>🎮 Build This: Playable Pong</div><div class='game-body'><p>Make Pong fully playable on desktop and mobile.</p><ol><li>Add the <code>keys</code> map; move the left paddle with W/S and the right with the arrow keys, clamped to the board.</li><li>Give the ball a velocity; bounce it off the top/bottom walls and off paddles; score when it passes an edge and reset to center.</li><li>Add the <code>canvasPos</code> helper and a <code>touchmove</code> handler so each side's finger drags that paddle.</li><li>Call <code>preventDefault()</code> on arrow keys and touchmove. Test on your phone via <code>npx serve</code> and your machine's LAN IP.</li></ol></div></div>"},{"id":"p6-5","part":"06 · JavaScript (from scratch)","nav":"Vectors & Movement","num":"6.5","kicker":"Part 06 · Lesson 5","title":"Vectors & Movement","html":"<h3>A position is two numbers that belong together</h3><p>So far we've tracked <code>x</code> and <code>y</code> as loose variables. As games grow you'll want to add, scale, and measure distances between points constantly. A <strong>vector</strong> — an <code>{x, y}</code> pair — packages those operations. A position is a vector; a velocity is a vector (direction + speed); the difference between two positions is a vector pointing from one to the other.</p><p>You don't need a fancy library. A handful of small functions covers 90% of 2D game math.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>vec.js</span></div><div class='term-body'>const Vec = {\n  add:   (a, b)    =&gt; ({ x: a.x + b.x, y: a.y + b.y }),\n  sub:   (a, b)    =&gt; ({ x: a.x - b.x, y: a.y - b.y }),\n  scale: (a, s)    =&gt; ({ x: a.x * s,   y: a.y * s }),\n  len:   (a)       =&gt; Math.hypot(a.x, a.y),\n  norm:  (a) =&gt; {                 <span class='cm'>// unit vector (length 1)</span>\n    const l = Math.hypot(a.x, a.y) || 1;\n    return { x: a.x / l, y: a.y / l };\n  },\n  fromAngle: (rad, mag = 1) =&gt;     <span class='cm'>// direction -&gt; vector</span>\n    ({ x: Math.cos(rad) * mag, y: Math.sin(rad) * mag })\n};</div></div><h3>Velocity = direction × speed</h3><p>To move an object, store a velocity vector measured in <strong>pixels per second</strong>, then each frame add <code>velocity × dt</code> to position. This is exactly the <code>speed * dt</code> rule from lesson 6.2, now in two dimensions. The key insight: <em>velocity already encodes both how fast and which way</em>, so movement is a single line.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>move.js</span></div><div class='term-body'>const ball = {\n  pos: { x: W/2, y: H/2 },\n  vel: { x: 180, y: 120 }, <span class='cm'>// px/sec, heading down-right</span>\n  r: 7\n};\n\nfunction update(dt) {\n  ball.pos = Vec.add(ball.pos, Vec.scale(ball.vel, dt));\n\n  <span class='cm'>// bounce off top/bottom by flipping the y component</span>\n  if (ball.pos.y &lt; ball.r)        { ball.pos.y = ball.r;     ball.vel.y *= -1; }\n  if (ball.pos.y &gt; H - ball.r)    { ball.pos.y = H - ball.r; ball.vel.y *= -1; }\n}</div></div><h3>Launching at an angle</h3><p>To serve the ball in a random upward direction, pick an angle and build the velocity from it. Angles in JS are in <strong>radians</strong> (<code>2π</code> = full circle), and remember Y points down, so a negative Y component goes up.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>serve.js</span></div><div class='term-body'>function serve() {\n  const speed = 260;\n  <span class='cm'>// angle between -45 and -135 deg (upward fan), in radians</span>\n  const a = (-45 - Math.random() * 90) * Math.PI / 180;\n  ball.pos = { x: W/2, y: H/2 };\n  ball.vel = Vec.fromAngle(a, speed);\n}</div></div><h3>Keeping a constant speed</h3><p>When you bounce by flipping a component the speed stays the same. But if you ever <em>add</em> influence (like steering the ball based on where it hits a paddle), the vector can drift faster or slower. Re-normalize and re-scale to lock the magnitude: <code>ball.vel = Vec.scale(Vec.norm(ball.vel), speed)</code>.</p><table><thead><tr><th>Operation</th><th>Meaning</th></tr></thead><tbody><tr><td><code>Vec.add(pos, Vec.scale(vel, dt))</code></td><td>Step forward one frame</td></tr><tr><td><code>Vec.len(Vec.sub(a, b))</code></td><td>Distance between two points</td></tr><tr><td><code>Vec.norm(v)</code></td><td>Same direction, length 1</td></tr><tr><td><code>Vec.fromAngle(rad, speed)</code></td><td>Velocity from a heading</td></tr></tbody></table><div class='box danger'><div class='bt'>Normalize diagonals.</div> If a paddle moves with <code>vel = {x: s, y: s}</code> on diagonals it travels <code>s·√2</code> ≈ 1.41× faster than along an axis. Normalize the input direction before scaling by speed so diagonal movement isn't faster.</div><div class='box tip'><div class='bt'>Don't over-engineer.</div> Plain <code>{x, y}</code> objects and these helpers are enough for everything in this part. Reach for a class or library only when profiling says object churn is a real cost.</div><div class='game'><div class='game-head'>🎮 Build This: Breakout (core)</div><div class='game-body'><p>Lay out Breakout and get the ball flying with a velocity vector.</p><ol><li>Add the <code>Vec</code> helpers. Give the ball <code>pos</code> and <code>vel</code>; move it with <code>Vec.add(pos, Vec.scale(vel, dt))</code>.</li><li>Bounce the ball off the top and side walls by flipping the matching velocity component.</li><li>Build a grid of brick objects (rows × columns) with x, y, w, h, and an <code>alive</code> flag; draw them in rows of different colors.</li><li>Add a paddle that moves left/right with the keys, clamped to the canvas. Use <code>serve()</code> to launch the ball at a random upward angle.</li></ol></div></div>"},{"id":"p6-6","part":"06 · JavaScript (from scratch)","nav":"Collision","num":"6.6","kicker":"Part 06 · Lesson 6","title":"Collision Detection","html":"<h3>Two shapes you'll use forever</h3><p>Nearly every 2D collision in arcade games reduces to two tests: <strong>rectangle vs. rectangle</strong> (AABB — axis-aligned bounding box) and <strong>circle vs. rectangle</strong>. They're cheap, exact for these shapes, and easy to reason about. We'll write both and use them to finish Breakout.</p><h3>Rectangle vs. rectangle (AABB)</h3><p>Two axis-aligned rectangles overlap only if they overlap on <em>both</em> axes. The test is four comparisons. The mental model: they <em>miss</em> if A is entirely left of B, or entirely right, or above, or below — so they <em>hit</em> when none of those is true.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>aabb.js</span></div><div class='term-body'>function aabb(a, b) {\n  return a.x &lt; b.x + b.w &amp;&amp;\n         a.x + a.w &gt; b.x &amp;&amp;\n         a.y &lt; b.y + b.h &amp;&amp;\n         a.y + a.h &gt; b.y;\n}</div></div><h3>Circle vs. rectangle</h3><p>The trick is to find the point on the rectangle <em>closest</em> to the circle's center by clamping the center into the rectangle's bounds. If that closest point is within one radius of the center, they collide. This is more accurate than treating the ball as a box and matters for corner hits.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>circle-rect.js</span></div><div class='term-body'>function circleRect(c, r) { <span class='cm'>// c={x,y,r}  r={x,y,w,h}</span>\n  const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));\n  const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));\n  const dx = c.x - cx, dy = c.y - cy;\n  return dx * dx + dy * dy &lt; c.r * c.r; <span class='cm'>// compare squared distance</span>\n}</div></div><div class='box tip'><div class='bt'>Compare squared distances.</div> <code>Math.sqrt</code> is relatively slow and unnecessary for a yes/no test. Comparing <code>dx*dx + dy*dy</code> against <code>r*r</code> gives the same answer faster. Reach for the actual distance only when you need the real length.</div><h3>Responding: which way to bounce?</h3><p>Detecting a hit is half the job — you must respond believably. For the ball hitting a brick, decide whether it struck a vertical or horizontal side by comparing the overlap on each axis, then flip only that velocity component. A simple, reliable heuristic: compare how far the ball's center is from the brick's center on each axis relative to their combined half-sizes.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>breakout-collide.js</span></div><div class='term-body'>function hitBrick(brick) {\n  brick.alive = false;\n  score += 10;\n\n  <span class='cm'>// brick center vs ball center to pick bounce axis</span>\n  const bx = brick.x + brick.w / 2;\n  const by = brick.y + brick.h / 2;\n  const dx = (ball.pos.x - bx) / (brick.w / 2);\n  const dy = (ball.pos.y - by) / (brick.h / 2);\n  if (Math.abs(dx) &gt; Math.abs(dy)) ball.vel.x *= -1; <span class='cm'>// side hit</span>\n  else                            ball.vel.y *= -1; <span class='cm'>// top/bottom hit</span>\n}\n\nfunction update(dt) {\n  ball.pos = Vec.add(ball.pos, Vec.scale(ball.vel, dt));\n  <span class='cm'>// walls handled earlier...</span>\n\n  for (const b of bricks) {\n    if (b.alive &amp;&amp; circleRect(ball.pos, b)) { hitBrick(b); break; }\n  }\n\n  <span class='cm'>// paddle: steer the ball by where it lands</span>\n  if (circleRect(ball.pos, paddle) &amp;&amp; ball.vel.y &gt; 0) {\n    const hit = (ball.pos.x - (paddle.x + paddle.w/2)) / (paddle.w/2); <span class='cm'>// -1..1</span>\n    const speed = Vec.len(ball.vel);\n    ball.vel = Vec.scale(Vec.norm({ x: hit, y: -1 }), speed);\n  }\n}</div></div><div class='box danger'><div class='bt'>Push out after bouncing.</div> If you only flip velocity, a fast ball can stay overlapping the brick for several frames and flip repeatedly, jittering or sticking. After a hit, nudge the ball back outside the brick (set its position to the surface) so it cleanly separates. The <code>break</code> after the first brick hit also prevents clearing two bricks in one frame.</div><div class='box law'><div class='bt'>Tunneling: fast objects skip through thin walls.</div> If <code>vel × dt</code> exceeds an object's thickness, the ball can teleport past it without ever overlapping. Cap ball speed, keep bricks/walls thick enough, or sub-step the movement (move in several small increments per frame) for very fast objects.</div><div class='game'><div class='game-head'>🎮 Build This: Breakout (finished)</div><div class='game-body'><p>Make the ball clear bricks and bounce off the paddle.</p><ol><li>Add <code>circleRect</code>. Each frame, test the ball against every alive brick; on a hit, kill the brick, add score, and bounce.</li><li>Decide the bounce axis from the ball-vs-brick center comparison; nudge the ball outside the brick.</li><li>Test the ball against the paddle and steer it left/right based on where it lands, keeping speed constant.</li><li>Lose a life when the ball falls below the paddle; show \"You win\" when all bricks are gone.</li></ol></div></div>"},{"id":"p6-7","part":"06 · JavaScript (from scratch)","nav":"Animation & Audio","num":"6.7","kicker":"Part 06 · Lesson 7","title":"Spritesheet Animation & Web Audio","html":"<h3>Animation is just cropping over time</h3><p>A character's walk cycle is a strip of frames packed into one image — a <strong>spritesheet</strong>. To animate, you draw a different sub-rectangle each tick using the nine-argument <code>drawImage</code> from lesson 6.3. An animation timer advances the frame index at a fixed rate (independent of your render FPS, thanks to <code>dt</code>).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>anim.js</span></div><div class='term-body'>const sheet = new Image();\nsheet.src = 'bird.png'; <span class='cm'>// 3 frames, each 34x24, in a horizontal strip</span>\n\nconst FRAME_W = 34, FRAME_H = 24, FRAMES = 3;\nlet frame = 0, frameTimer = 0;\nconst FRAME_TIME = 0.08; <span class='cm'>// seconds per frame</span>\n\nfunction updateAnim(dt) {\n  frameTimer += dt;\n  if (frameTimer &gt;= FRAME_TIME) {\n    frameTimer -= FRAME_TIME;\n    frame = (frame + 1) % FRAMES; <span class='cm'>// loop 0,1,2,0,1,2...</span>\n  }\n}\n\nfunction drawBird(x, y) {\n  ctx.drawImage(\n    sheet,\n    frame * FRAME_W, 0, FRAME_W, FRAME_H, <span class='cm'>// source crop</span>\n    x, y, FRAME_W, FRAME_H               <span class='cm'>// destination</span>\n  );\n}</div></div><div class='box tip'><div class='bt'>Accumulate, don't reset.</div> Write <code>frameTimer -= FRAME_TIME</code> (not <code>= 0</code>). Subtracting keeps any leftover time, so on slow frames the animation can advance multiple frames and stays in sync with wall-clock time.</div><h3>Rotating a sprite</h3><p>To tilt the bird based on its velocity, wrap the draw in <code>save</code>/<code>translate</code>/<code>rotate</code>/<code>restore</code>. <code>translate</code> moves the origin to the bird's center, <code>rotate</code> spins around it, and you draw offset by half its size so it rotates about its middle.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>rotate.js</span></div><div class='term-body'>ctx.save();\nctx.translate(bird.x, bird.y);\nctx.rotate(Math.max(-0.5, Math.min(1, bird.vy / 600))); <span class='cm'>// tilt with fall speed</span>\nctx.drawImage(sheet, frame*FRAME_W, 0, FRAME_W, FRAME_H,\n  -FRAME_W/2, -FRAME_H/2, FRAME_W, FRAME_H);\nctx.restore();</div></div><h3>Sound with the Web Audio API</h3><p>The simplest sound is an <code>&lt;audio&gt;</code> element, but it can't overlap with itself and has latency. The <strong>Web Audio API</strong> is the real tool: decode a sound once into an <code>AudioBuffer</code>, then fire a fresh, cheap <code>BufferSource</code> every time you want to play it — overlapping freely with near-zero lag.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio.js</span></div><div class='term-body'>const audioCtx = new (window.AudioContext || window.webkitAudioContext)();\nconst buffers = {};\n\nasync function loadSound(name, url) {\n  const res  = await fetch(url);\n  const data = await res.arrayBuffer();\n  buffers[name] = await audioCtx.decodeAudioData(data);\n}\n\nfunction play(name, volume = 1) {\n  const buf = buffers[name];\n  if (!buf) return;\n  const src  = audioCtx.createBufferSource();\n  const gain = audioCtx.createGain();\n  gain.gain.value = volume;\n  src.buffer = buf;\n  src.connect(gain).connect(audioCtx.destination);\n  src.start(0); <span class='cm'>// one-shot; can overlap with itself</span>\n}\n\nPromise.all([ loadSound('flap','flap.wav'), loadS
