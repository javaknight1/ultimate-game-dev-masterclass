re, Plane, lights, cameras, triggers.</li></ul><p>Add a cube, then resize it into a floor. With it selected, the <strong>Details</strong> panel shows the <em>Transform</em>: Location, Rotation, Scale.</p><h3>The transform gizmos</h3><p>Switch tools with keyboard:</p><table><thead><tr><th>Key</th><th>Gizmo</th></tr></thead><tbody><tr><td><code>W</code></td><td>Move (translate)</td></tr><tr><td><code>E</code></td><td>Rotate</td></tr><tr><td><code>R</code></td><td>Scale</td></tr></tbody></table><p>Drag the colored axes to move along X (red), Y (green), Z (blue). Toggle <strong>grid snapping</strong> from the icons on the top-right of the viewport — snap moves to e.g. 10 units and rotations to 15 degrees so geometry lines up cleanly.</p><div class='box tip'><div class='bt'>Type exact transforms.</div> For a blockout, click into the Details numbers and type values. A 1000×1000 floor: scale a Plane to <code>X=10, Y=10</code> (the default Plane is 100 units). Walls: scale a Cube thin and tall and place along the edges.</div><h3>Collision and walking through your space</h3><p>Static Mesh primitives ship with simple collision, so the default character can walk on the floor and into walls. If you place a custom mesh and fall through it, open the mesh asset and check <strong>Collision &gt; Add Box Simplified Collision</strong>, or set <em>Collision Complexity</em> to <em>Use Complex as Simple</em>.</p><div class='box danger'><div class='bt'>No PlayerStart, no spawn.</div> An empty level has nowhere to place the player. From <strong>+ Add</strong>, search <em>Player Start</em> and drop it slightly above the floor, or PIE will spawn the pawn at the world origin (possibly under the floor).</div><div class='game'><div class='game-head'>🎮 Build This: Blockout Room</div><div class='game-body'><p>A small playable space you can walk through with the default pawn.</p><ol><li>New Level (Basic). Save it as <code>Maps/Blockout</code>.</li><li>Add a Plane scaled to 10×10 as the floor.</li><li>Add four Cubes, scale them thin/tall, and place them as walls snapped to the floor edges (use grid snap).</li><li>Drag a couple of Starter Content props inside as obstacles; give custom meshes simple collision if needed.</li><li>Place a Player Start in the room. Press Play and walk the room. Save All.</li></ol></div></div>"},{"id":"p3-3","part":"03 · Unreal","nav":"Blueprints vs C++","num":"3.3","kicker":"Part 03 · Lesson 3","title":"Blueprints & C++: When to Use Each","html":"<h3>Two ways to write the same logic</h3><p>Unreal gives you <strong>Blueprints</strong> (a visual node graph) and <strong>C++</strong> (compiled code). They are not rivals — they interoperate. A common pro pattern: write the systems and performance-critical logic in C++, then expose tunable values and per-instance behavior to Blueprint for designers.</p><table><thead><tr><th>Reach for Blueprint when…</th><th>Reach for C++ when…</th></tr></thead><tbody><tr><td>Prototyping fast, iterating on feel</td><td>Building reusable base classes / systems</td></tr><tr><td>Wiring up UI, level scripting, one-offs</td><td>Heavy per-frame math, large loops</td></tr><tr><td>Designers need to tweak it</td><td>You want version-control-friendly diffs</td></tr><tr><td>Event-driven gameplay glue</td><td>Networking internals, save systems</td></tr></tbody></table><h3>A Blueprint pickup, described</h3><p>Create a Blueprint: Content Drawer &gt; <strong>+ Add &gt; Blueprint Class &gt; Actor</strong>, name it <code>BP_Pickup</code>. Open it. In the <strong>Components</strong> panel, add a <em>Static Mesh</em> (set it to a shape) as the root visual.</p><p>Switch to the <strong>Event Graph</strong>. To spin it: drag off the <em>Event Tick</em> node, search <strong>AddLocalRotation</strong>, target the mesh component, and feed a Rotator. Multiply the yaw by <em>Delta Seconds</em> (from Tick) times a speed variable so it is framerate-independent.</p><p>To change color over time: create a <strong>Dynamic Material Instance</strong> on BeginPlay (node <em>Create Dynamic Material Instance</em>, assign back to the mesh), then on Tick call <em>Set Vector Parameter Value</em> with an HSV-cycled color into a parameter your material exposes.</p><div class='box tip'><div class='bt'>Graph reading order.</div> White wires are <em>execution</em> (the order things run); colored wires are <em>data</em>. Execution flows left to right out of red event nodes like BeginPlay and Tick.</div><h3>The same pickup in C++</h3><p>Add a C++ class: <strong>Tools &gt; New C++ Class &gt; Actor</strong>, name it <code>SpinPickup</code>. Edit the source:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>SpinPickup.h</span></div><div class='term-body'>UCLASS()\nclass FIRSTPROTO_API ASpinPickup : public AActor\n{\n  GENERATED_BODY()\npublic:\n  ASpinPickup();\n  virtual void Tick(float DeltaTime) override;\n\n  UPROPERTY(VisibleAnywhere)\n  UStaticMeshComponent* Mesh;\n\n  UPROPERTY(EditAnywhere, Category=\"Spin\")\n  float SpinSpeed = 90.f; <span class='cm'>// degrees/sec</span>\n\nprivate:\n  UMaterialInstanceDynamic* DynMat = nullptr;\n  float Hue = 0.f;\n};</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>SpinPickup.cpp</span></div><div class='term-body'>ASpinPickup::ASpinPickup()\n{\n  PrimaryActorTick.bCanEverTick = true;\n  Mesh = CreateDefaultSubobject&lt;UStaticMeshComponent&gt;(TEXT(\"Mesh\"));\n  RootComponent = Mesh;\n}\n\nvoid ASpinPickup::BeginPlay()\n{\n  Super::BeginPlay();\n  DynMat = Mesh-&gt;CreateAndSetMaterialInstanceDynamic(0);\n}\n\nvoid ASpinPickup::Tick(float DeltaTime)\n{\n  Super::Tick(DeltaTime);\n  AddActorLocalRotation(FRotator(0.f, SpinSpeed * DeltaTime, 0.f));\n  Hue = FMath::Fmod(Hue + DeltaTime * 60.f, 360.f);\n  if (DynMat)\n    DynMat-&gt;SetVectorParameterValue(\"Color\",\n      FLinearColor::MakeFromHSV8((uint8)(Hue/360.f*255), 255, 255));\n}</div></div><div class='box danger'><div class='bt'>Macros are mandatory.</div> <code>UCLASS()</code>, <code>UPROPERTY()</code>, and <code>GENERATED_BODY()</code> are not decoration — they generate reflection code that lets the editor see your class. Forget <code>EditAnywhere</code> on a property and it will not show in the Details panel; forget <code>UPROPERTY</code> on a pointer and the garbage collector may delete your object.</div><div class='box law'><div class='bt'>Compile after every C++ change.</div> Use the editor's <strong>Live Coding</strong> (<code>Ctrl+Alt+F11</code>) for quick rebuilds, or build from your IDE. Blueprints compile when you click <em>Compile</em> in their editor.</div><div class='game'><div class='game-head'>🎮 Build This: Spinning Color Pickup (twice)</div><div class='game-body'><p>One spinning, color-changing pickup as a Blueprint, and again as a C++ Actor.</p><ol><li>Make a material with a <code>Color</code> vector parameter plugged into Base Color.</li><li>Build <code>BP_Pickup</code> with Tick rotation + a dynamic material color cycle.</li><li>Build <code>ASpinPickup</code> in C++ using the snippets above; assign the same material.</li><li>Place both side by side, press Play, and confirm they behave identically.</li></ol></div></div>"},{"id":"p3-4","part":"03 · Unreal","nav":"Gameplay Framework","num":"3.4","kicker":"Part 03 · Lesson 4","title":"The Gameplay Framework: GameMode, Pawn & PlayerController","html":"<h3>The cast of the framework</h3><p>Unreal's gameplay framework is a set of classes that hand off responsibility cleanly:</p><table><thead><tr><th>Class</th><th>Owns / answers</th></tr></thead><tbody><tr><td><strong>GameMode</strong></td><td>The rules: which Pawn, Controller, HUD classes to use; who wins; spawning.</td></tr><tr><td><strong>Pawn</strong> / <strong>Character</strong></td><td>The physical thing in the world that can be possessed. Character adds a CharacterMovementComponent + capsule.</td></tr><tr><td><strong>PlayerController</strong></td><td>The player's will — it receives input and tells the Pawn what to do. Persists even when the Pawn dies.</td></tr><tr><td><strong>PlayerState / GameState</strong></td><td>Replicated data: a player's score; the match's shared state.</td></tr></tbody></table><div class='box law'><div class='bt'>Mental model.</div> The <em>Controller</em> is the brain/soul; the <em>Pawn</em> is the body. <em>Possession</em> connects them. The <em>GameMode</em> is the referee that exists only on the server/host.</div><h3>A Character with movement</h3><p>Create a Blueprint based on <strong>Character</strong> (not plain Pawn) — call it <code>BP_PlayerChar</code>. It already has a CapsuleComponent root, a SkeletalMesh, and a <strong>CharacterMovementComponent</strong> that handles walking, gravity, and jumping for you. Add a <em>SpringArm</em> and a <em>Camera</em> on the end for a third-person view; enable <em>Use Pawn Control Rotation</em> on the spring arm.</p><h3>Enhanced Input (the modern way)</h3><p>UE5 uses the <strong>Enhanced Input</strong> system. Create <em>Input Actions</em> (e.g. <code>IA_Move</code> as Axis2D, <code>IA_Look</code> as Axis2D, <code>IA_Jump</code> as Digital) and an <em>Input Mapping Context</em> that binds keys/stick to them. In the Character's BeginPlay, get the local player subsystem and <strong>Add Mapping Context</strong>.</p><p>In the Event Graph, bind the actions:</p><ul><li><em>IA_Move</em> &rarr; break the Vector2D &rarr; <strong>Add Movement Input</strong> along the controller's forward (Y) and right (X) vectors.</li><li><em>IA_Look</em> &rarr; <strong>Add Controller Yaw/Pitch Input</strong>.</li><li><em>IA_Jump</em> &rarr; call <strong>Jump</strong> on Started, <strong>Stop Jumping</strong> on Completed.</li></ul><h3>The same wiring in C++</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>PlayerChar.cpp (excerpt)</span></div><div class='term-body'>void APlayerChar::SetupPlayerInputComponent(UInputComponent* Input)\n{\n  auto* EI = Cast&lt;UEnhancedInputComponent&gt;(Input);\n  EI-&gt;BindAction(MoveAction, ETriggerEvent::Triggered, this, &amp;APlayerChar::Move);\n  EI-&gt;BindAction(JumpAction, ETriggerEvent::Started, this, &amp;ACharacter::Jump);\n}\n\nvoid APlayerChar::Move(const FInputActionValue&amp; Value)\n{\n  const FVector2D Axis = Value.Get&lt;FVector2D&gt;();\n  const FRotator Yaw(0, Controller-&gt;GetControlRotation().Yaw, 0);\n  AddMovementInput(FRotationMatrix(Yaw).GetUnitAxis(EAxis::X), Axis.Y);\n  AddMovementInput(FRotationMatrix(Yaw).GetUnitAxis(EAxis::Y), Axis.X);\n}</div></div><h3>Wiring the GameMode</h3><p>Create <code>BP_GameMode</code> from <strong>GameModeBase</strong>. In its Class Defaults, set <em>Default Pawn Class</em> = <code>BP_PlayerChar</code> and <em>Player Controller Class</em> = your controller (or the default). Then in <strong>Project Settings &gt; Maps &amp; Modes</strong>, set <em>Default GameMode</em> to <code>BP_GameMode</code> — or override it per-level in <strong>World Settings &gt; GameMode Override</strong>.</p><div class='box danger'><div class='bt'>Two reasons you cannot move.</div> (1) No mapping context was added — check BeginPlay. (2) The GameMode is not using your Character — check Default Pawn Class. A black screen usually means no camera or no PlayerStart.</div><div class='game'><div class='game-head'>🎮 Build This: Third-Person Prototype</div><div class='game-body'><p>A possessed Pawn driven through a custom PlayerController and GameMode.</p><ol><li>Create <code>BP_PlayerChar</code> (Character) with SpringArm + Camera.</li><li>Make IA_Move, IA_Look, IA_Jump and an IMC_Default mapping context; add it on BeginPlay.</li><li>Wire movement, look, and jump in the Event Graph.</li><li>Create <code>BP_GameMode</code>; set Default Pawn = your character.</li><li>Set the GameMode in World Settings, add a PlayerStart, and play.</li></ol></div></div>"},{"id":"p3-5","part":"03 · Unreal","nav":"Level Design & Landscape","num":"3.5","kicker":"Part 03 · Lesson 5","title":"Level Design & Landscape Basics","html":"<h3>From blockout to landscape</h3><p>Indoor spaces are built from meshes; outdoor terrain uses the <strong>Landscape</strong> system — a heightfield you sculpt and paint. Open the <strong>Landscape</strong> mode from the mode dropdown in the top-left toolbar (or <code>Shift+2</code>).</p><h3>Creating a landscape</h3><p>In Landscape mode &gt; <strong>Manage &gt; New</strong>, you set:</p><ul><li><strong>Section Size</strong> and <strong>Sections Per Component</strong> — leave defaults for now; these control LOD granularity.</li><li><strong>Number of Components</strong> — the overall size. A few components (e.g. 8×8) is plenty for a prototype.</li><li><strong>Material</strong> — optionally assign a landscape material now.</li></ul><p>Click <strong>Create</strong>. You get a flat green plane that is one editable Actor.</p><h3>Sculpting</h3><p>Switch to the <strong>Sculpt</strong> sub-tab. Pick a brush and tool:</p><table><thead><tr><th>Tool</th><th>Effect</th></tr></thead><tbody><tr><td>Sculpt</td><td>Raise terrain (hold <code>Shift</code> to lower)</td></tr><tr><td>Smooth</td><td>Soften jagged areas</td></tr><tr><td>Flatten</td><td>Level a region to a target height</td></tr><tr><td>Ramp</td><td>Click two points to build a graded path</td></tr><tr><td>Erosion / Noise</td><td>Add natural detail</td></tr></tbody></table><p>Adjust <strong>Brush Size</strong>, <strong>Falloff</strong>, and <strong>Tool Strength</strong> in the panel. Paint hills around the edges, carve a valley, and use <em>Flatten</em> to make a buildable plateau.</p><div class='box tip'><div class='bt'>Use the Ramp tool for paths.</div> It creates a smooth navigable grade between two heights — far better than freehand sculpting a slope the character can actually climb.</div><h3>Walkable slopes &amp; navigation</h3><p>The CharacterMovementComponent has a <strong>Walkable Floor Angle</strong> (default 44°). Slopes steeper than that block the character. Keep your paths gentle. Check the actual playable angle by walking it in PIE — if the character slides or stops, flatten the grade.</p><p>For AI to navigate, add a <strong>NavMeshBoundsVolume</strong> (from Place Actors), scale it to enclose your landscape, and press <code>P</code> to visualize the green navigable area. If green does not appear on a slope, it is too steep for the agent.</p><div class='box danger'><div class='bt'>Landscape collision is automatic — but heavy.</div> Sculpting changes collision in real time. Avoid making one gigantic landscape for a tiny level; the heightfield collision and tessellation cost scales with component count.</div><h3>Layout principles</h3><ul><li><strong>Sightlines &amp; landmarks:</strong> give the player a tall feature to orient by.</li><li><strong>Readable affordances:</strong> a path of flattened ground reads as \"go here\".</li><li><strong>Blockout first:</strong> place gray-box meshes for structures, validate the flow in PIE, then beautify.</li><li><strong>Player metrics:</strong> build to your character's jump height and step size so traversal feels right.</li></ul><div class='box law'><div class='bt'>Test by playing, not looking.</div> A level only \"works\" once you walk it. Re-enter PIE after every significant sculpt to confirm the path is traversable and nothing traps the character.</div><div class='game'><div class='game-head'>🎮 Build This: Outdoor Playground</div><div class='game-body'><p>A sculpted landscape with hills and a path your third-person character can traverse.</p><ol><li>Create a Landscape (~8×8 components) in a new level.</li><li>Sculpt hills around the perimeter and a central valley.</li><li>Use the Ramp tool to carve a gentle, walkable path up one hill.</li><li>Place your <code>BP_GameMode</code>, character, and a PlayerStart on the path.</li><li>Play and walk the path; flatten any slope too steep to climb. Add a NavMeshBoundsVolume and press P to check coverage.</li></ol></div></div>"},{"id":"p3-6","part":"03 · Unreal","nav":"Materials & Lighting","num":"3.6","kicker":"Part 03 · Lesson 6","title":"Materials & Lighting with Lumen","html":"<h3>What a material is</h3><p>A <strong>Material</strong> in UE5 is a node graph that computes surface properties per pixel. Create one via Content Drawer &gt; <strong>+ Add &gt; Material</strong>, name it <code>M_Floor</code>, and double-click to open the <strong>Material Editor</strong>. The big node on the right is the <strong>Result node</strong> with inputs for the PBR model:</p><table><thead><tr><th>Input</th><th>Drives</th></tr></thead><tbody><tr><td>Base Color</td><td>The albedo / diffuse color</td></tr><tr><td>Metallic</td><td>0 = dielectric, 1 = metal</td></tr><tr><td>Roughness</td><td>0 = mirror, 1 = matte</td></tr><tr><td>Normal</td><td>Surface bump detail (from a normal map)</td></tr><tr><td>Emissive Color</td><td>Light the surface emits (glow)</td></tr></tbody></table><h3>Building a textured material</h3><ol><li>Drag a <strong>Texture Sample</strong> node into the graph (hold <code>T</code> and click) and pick a base color texture.</li><li>Connect its RGB to <strong>Base Color</strong>.</li><li>Add a <strong>Constant</strong> (key <code>1</code> + click) set to ~0.5 into <strong>Roughness</strong>.</li><li>Plug a normal map's output into <strong>Normal</strong>.</li><li>For tiling, add a <strong>TexCoord</strong> node, multiply by a scalar, and feed the UVs of your texture samples.</li></ol><div class='box tip'><div class='bt'>Expose parameters for reuse.</div> Right-click a Constant and <em>Convert to Parameter</em>, or use a <strong>ScalarParameter</strong>/<strong>VectorParameter</strong>. Then create <strong>Material Instances</strong> from the master material to tweak values without recompiling the shader. This is the core workflow pros use.</div><h3>Emissive glow for collectibles</h3><p>For a glowing pickup, plug a bright <strong>VectorParameter</strong> color into <strong>Emissive Color</strong> and multiply it by a scalar (e.g. 5–20) to push it beyond 1.0 so it blooms. This emissive surface will also <em>cast light</em> into the scene under Lumen.</p><h3>Lighting with Lumen</h3><p>Lumen is UE5's real-time <strong>global illumination</strong> and reflection system — no light baking required. New projects on the high preset enable it by default. Verify in <strong>Project Settings &gt; Rendering</strong>: <em>Dynamic Global Illumination Method = Lumen</em> and <em>Reflection Method = Lumen</em>.</p><p>Core lights you place:</p><ul><li><strong>Directional Light</strong> — the sun; set its rotation for time of day.</li><li><strong>Sky Light</strong> — captures ambient sky color; set to <em>Real Time Capture</em> so it updates with Lumen.</li><li><strong>SkyAtmosphere + ExponentialHeightFog</strong> — sky color and depth.</li><li><strong>Point / Spot / Rect Lights</strong> — local artificial light.</li></ul><div class='box danger'><div class='bt'>Lumen needs lit surfaces to bounce.</div> If GI looks flat or dark, check: the Sky Light is set to Real Time Capture, surfaces are not pure black (no albedo = no bounce), and <em>Generate Mesh Distance Fields</em> is on in Rendering settings (Lumen relies on it for software tracing).</div><div class='box law'><div class='bt'>Movable lights, no bake.</div> Keep lights set to <em>Movable</em> when using Lumen — its strength is fully dynamic lighting. Stationary/Static lighting with lightmaps is the older baked path you generally do not mix with Lumen GI.</div><div class='game'><div class='game-head'>🎮 Build This: Lit Collectathon Space</div><div class='game-body'><p>Textured surfaces and emissive glowing collectibles under Lumen.</p><ol><li>Author <code>M_Floor</code> with a tiling base color + roughness; apply to your floor and walls.</li><li>Make <code>M_Glow</code> with an emissive VectorParameter (×10) and create two Material Instances in different colors.</li><li>Apply the glow instances to your pickup meshes; confirm they bloom and cast colored light.</li><li>Add a Directional Light, a Sky Light (Real Time Capture), and SkyAtmosphere.</li><li>Confirm Lumen GI is on, then dim the sun and watch the emissive pickups light the room.</li></ol></div></div>"},{"id":"p3-7","part":"03 · Unreal","nav":"Physics & Interaction","num":"3.7","kicker":"Part 03 · Lesson 7","title":"Physics & Gameplay Interaction","html":"<h3>Simulating physics</h3><p>Any <strong>Primitive Component</strong> (Static Mesh, etc.) can simulate rigid-body physics. Select a Static Mesh Actor, and in Details under <strong>Physics</strong> enable <em>Simulate Physics</em>. Set <em>Mass</em> (override or via density) and toggle <em>Enable Gravity</em>. The mesh's <strong>Collision</strong> presets must be set so it actually collides — use <em>PhysicsActor</em> or <em>BlockAllDynamic</em>.</p><div class='box danger'><div class='bt'>Simulate Physics needs collision geometry.</div> A mesh with no simple collision will either fall through the world or refuse to simulate. Open the mesh and add box/sphere collision, or it will warn \"using complex collision for simulation\" — which is expensive and often broken for dynamics.</div><h3>Applying force and impulse</h3><p>To shove a physics body, call on its component:</p><ul><li><strong>AddImpulse</strong> — instant velocity change (a hit/explosion). Pass a world-space vector.</li><li><strong>AddForce</strong> — continuous push applied each tick (wind, thrust).</li><li><strong>AddRadialImpulse</strong> — explosion from a point with falloff.</li></ul><h3>Detecting interaction: three flavors</h3><table><thead><tr><th>Mechanism</th><th>Use for</th></tr></thead><tbody><tr><td><strong>Overlap</strong> events</td><td>Triggers, pickups, zones — needs <em>Generate Overlap Events</em> on both</td></tr><tr><td><strong>Hit</strong> events</td><td>Blocking collisions / physical contact (OnComponentHit)</td></tr><tr><td><strong>Line/Sweep Trace</strong></td><td>Instant raycasts: hitscan weapons, line-of-sight, ground checks</td></tr></tbody></table><p>For a pickup, give the collectible a Sphere collision set to <em>OverlapAllDynamic</em> and bind <strong>OnComponentBeginOverlap</strong>: check the other Actor is the player, add score, then <em>Destroy Actor</em>.</p><h3>A line-trace weapon in C++</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Fire (line trace + impulse)</span></div><div class='term-body'>void AWeapon::Fire()\n{\n  FVector Start = Camera-&gt;GetComponentLocation();\n  FVector End = Start + Camera-&gt;GetForwardVector() * 10000.f;\n\n  FHitResult Hit;\n  FCollisionQueryParams Params;\n  Params.AddIgnoredActor(GetOwner());\n\n  bool bHit = GetWorld()-&gt;LineTraceSingleByChannel(\n      Hit, Start, End, ECC_Visibility, Params);\n\n  if (bHit)\n  {\n    DrawDebugLine(GetWorld(), Start, Hit.ImpactPoint, FColor::Red, false, 1.f);\n    UPrimitiveComponent* Comp = Hit.GetComponent();\n    if (Comp &amp;&amp; Comp-&gt;IsSimulatingPhysics())\n    {\n      FVector Dir = (End - Start).GetSafeNormal();\n      Comp-&gt;AddImpulseAtLocation(Dir * 50000.f, Hit.ImpactPoint);\n    }\n  }\n}</div></div><p>The Blueprint equivalent: a <strong>LineTraceByChannel</strong> node from the camera location forward; branch on <em>Return Value</em>; from <em>Out Hit</em> break the struct, get the Hit Component, and call <strong>AddImpulseAtLocation</strong>.</p><div class='box tip'><div class='bt'>Trace channels matter.</div> <code>ECC_Visibility</code> ignores invisible blockers; <code>ECC_Camera</code> is for camera collision. For gameplay you often define a custom <em>Weapon</em> channel in Project Settings &gt; Collision so traces hit exactly what you intend.</div><div class='box law'><div class='bt'>Draw your debug lines.</div> <code>DrawDebugLine</code> (or the <em>Draw Debug</em> option on trace nodes) is the fastest way to see where your trace actually went. Half of \"my gun does nothing\" bugs are the trace pointing the wrong way.</div><div class='game'><div class='game-head'>🎮 Build This: Shooter Core</div><div class='game-body'><p>A line-trace weapon that knocks physics targets around the room.</p><ol><li>Place several cube/barrel meshes with <em>Simulate Physics</em> on and proper collision.</li><li>On the player, add a Fire input action.</li><li>On Fire, line-trace from the camera forward; draw a debug line.</li><li>If the hit component is simulating physics, AddImpulseAtLocation along the shot direction.</li><li>Play and shoot the props — they should tumble and scatter.</li></ol></div></div>"},{"id":"p3-8","part":"03 · Unreal","nav":"UI with UMG","num":"3.8","kicker":"Part 03 · Lesson 8","title":"UI with UMG","html":"<h3>What UMG is</h3><p><strong>UMG (Unreal Motion Graphics)</strong> is the widget-based UI system. You design screens visually in a <strong>Widget Blueprint</strong> and drive them with the same Blueprint/C++ logic as gameplay. Create one via <strong>+ Add &gt; User Interface &gt; Widget Blueprint</strong>; name it <code>WBP_HUD</code>.</p><h3>The Designer and the Palette</h3><p>A Widget Blueprint has two tabs: <strong>Designer</strong> (drag-and-drop layout) and <strong>Graph</strong> (logic). From the <strong>Palette</strong> drag widgets onto the canvas:</p><table><thead><tr><th>Widget</th><th>Role</th></tr></thead><tbody><tr><td>Canvas Panel</td><td>Free-position container (the root by default)</td></tr><tr><td>Horizontal/Vertical Box</td><td>Auto-arranging layout containers</td></tr><tr><td>Text / Image</td><td>Display label and graphics</td></tr><tr><td>Button</td><td>Clickable, fires OnClicked</td></tr><tr><td>Progress Bar</td><td>Health/stamina fill</td></tr></tbody></table><div class='box law'><div class='bt'>Anchors prevent broken layouts.</div> Every widget on a Canvas Panel has <strong>Anchors</strong> — the point it sticks to as resolution changes. Anchor a health bar to the bottom-left, a score to the top-right. Without anchors, your HUD drifts off-screen on other displays.</div><h3>Binding to gameplay data</h3><p>Static text is useless for a HUD. Bind it. Select a Text widget; next to its <em>Text</em> property click <strong>Bind &gt; Create Binding</strong>. This makes a function that runs every frame and returns the value to display — e.g. cast the player character and return its <code>Health</code> as text.</p><div class='box danger'><div class='bt'>Property Bind runs every frame.</div> Per-frame bindings are convenient but can be a performance trap with many widgets. The pro pattern is <strong>event-driven updates</strong>: when health changes, the character calls an <em>UpdateHealth</em> event on the HUD widget that sets the Progress Bar percent once.</div><h3>Creating and showing widgets</h3><p>A widget asset is just a class — it does nothing until you instantiate and add it to the viewport. In your PlayerController BeginPlay:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Show HUD (C++)</span></div><div class='term-body'>void AMyPlayerController::BeginPlay()\n{\n  Super::BeginPlay();\n  if (HUDClass) <span class='cm'>// a TSubclassOf&lt;UUserWidget&gt; set in defaults</span>\n  {\n    HUD = CreateWidget&lt;UUserWidget&gt;(this, HUDClass);\n    HUD-&gt;AddToViewport();\n  }\n}</div></div><p>In Blueprint that is <strong>Create Widget</strong> (class = WBP_HUD) &rarr; <strong>Add to Viewport</strong>, ideally storing the reference in a variable so you can update it.</p><h3>A main menu</h3><p>Make <code>WBP_MainMenu</code> with a title and two buttons (Play, Quit). On the Play button's <strong>OnClicked</strong>: call <strong>Open Level (by name)</strong> with your gameplay map. On Quit: <strong>Quit Game</strong>. For menus, set the input mode so the mouse works:</p><ul><li>Call <strong>Set Input Mode UI Only</strong> on the PlayerController and <strong>Set Show Mouse Cursor = true</strong>.</li><li>For gameplay HUD, use <strong>Set Input Mode Game Only</strong> and hide the cursor.</li></ul><div class='box tip'><div class='bt'>Put the menu in its own level.</div> A dedicated <code>MainMenu</code> map with a simple GameMode that creates the menu widget keeps your gameplay map clean and load fast.</div><div class='game'><div class='game-head'>🎮 Build This: Shooter Shell</div><div class='game-body'><p>A UMG main menu plus an in-game HUD showing health and a score count.</p><ol><li>Build <code>WBP_MainMenu</code>: title, Play (Open Level), Quit buttons; show it from a MainMenu-level GameMode with UI input mode.</li><li>Build <code>WBP_HUD</code>: a Progress Bar (anchored bottom-left) and a Score Text (anchored top-right).</li><li>Give the player a <code>Health</code> and <code>Score</code> variable.</li><li>Add HUD to viewport in the PlayerController BeginPlay (Game input mode).</li><li>Update the bar/text via events when health changes or a collectible is grabbed.</li></ol></div></div>"},{"id":"p3-9","part":"03 · Unreal","nav":"Capstone & Packaging","num":"3.9","kicker":"Part 03 · Lesson 9","title":"Capstone: A Shooter/Collectathon & Packaging","html":"<h3>Assembling the whole game</h3><p>Everything so far becomes one project. The capstone is a small third-person shooter or collectathon. Decide the core loop first, then connect the systems you have built:</p><ul><li><strong>Framework:</strong> GameMode sets your Character + PlayerController (Lesson 4).</li><li><strong>Level:</strong> a lit landscape or interior with collision-correct geometry (Lessons 2, 5, 6).</li><li><strong>Mechanic:</strong> line-trace weapon knocking physics targets, OR overlap collectibles that increment score (Lesson 7).</li><li><strong>UI:</strong> main menu + HUD with health/score, plus a win/lose screen (Lesson 8).</li></ul><h3>A win condition with GameState</h3><p>Track progress on the GameMode/GameState, not scattered across Actors. For a collectathon: store <code>TotalPickups</code> and <code>Collected</code>. Each pickup, on overlap, calls a GameMode function that increments <code>Collected</code> and checks for the win. On win, open a results level or show a <code>WBP_WinScreen</code> and call <strong>Set Game Paused</strong>.</p><div class='box tip'><div class='bt'>Centralize game rules.</div> When a pickup is destroyed, it should report to the GameMode rather than the HUD reading every pickup each frame. The GameMode then fires one event the HUD listens to. One source of truth, no per-frame scanning.</div><h3>Pre-package checklist</h3><ol><li>Set <strong>Project Settings &gt; Maps &amp; Modes</strong>: Game Default Map = your menu, and confirm the gameplay map opens via the Play button.</li><li>Set <strong>Project Settings &gt; Description</strong>: project name, version, company.</li><li>Pick the <strong>Build Configuration</strong>: <em>Shipping</em> for the final build (no debug overhead), <em>Development</em> while testing.</li><li>Remove debug draws and on-screen Print String nodes.</li></ol><h3>Packaging a build</h3><p>Use <strong>Platforms &gt; Windows &gt; Package Project</strong> (toolbar). Choose an output folder. UE cooks all assets for the target platform and produces a runnable build.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal — command-line cook (optional)</span></div><div class='term-body'><span class='pr'>$</span> RunUAT.bat BuildCookRun -project=\"D:/UE/Shooter/Shooter.uproject\" \\\n   -platform=Win64 -clientconfig=Shipping -cook -stage -pak -archive \\\n   -archivedirectory=\"D:/Builds\"\n<span class='dim'>... cooking 412 assets ...</span>\n<span class='ok'>BUILD SUCCESSFUL</span></div></div><div class='box danger'><div class='bt'>Common packaging failures.</div> (1) <em>No compiler</em> — packaging C++ projects requires Visual Studio/Xcode installed. (2) <em>Missing maps</em> — if you Open Level by name, that level must be added under <em>List of maps to include in a packaged build</em>. (3) <em>Editor-only assets</em> referenced in gameplay get stripped and crash. Always test the packaged build, not just PIE.</div><div class='box law'><div class='bt'>Cook errors are in the log.</div> If packaging fails, read <code>Saved/Logs</code> and the Output Log — it names the exact asset or shader that broke. Fix that one thing and re-cook; never guess.</div><p>The result is a folder with an <code>.exe</code> (Windows) you can zip and share. Test it on a clean machine if possible to catch missing redistributables.</p><div class='game'><div class='game-head'>🎮 Build This: The Capstone</div><div class='game-body'><p>A complete small third-person shooter or collectathon, packaged.</p><ol><li>Build a lit level (landscape or interior) with your character and GameMode.</li><li>Place the core mechanic: trace-weapon targets or overlap collectibles with score on the GameMode.</li><li>Add main menu, in-game HUD (health/score), and a win screen driven by a GameState win condition.</li><li>Clean up debug output; set Default Maps and Shipping config.</li><li>Package for Windows, then run and play the packaged .exe end to end.</li></ol></div></div>"},{"id":"p4-1","part":"04 · C++ (from scratch)","nav":"Toolchain & raylib","num":"4.1","kicker":"Part 04 · Lesson 1","title":"Toolchain, CMake & Installing raylib","html":"<h3>What you are building toward</h3><p>This part takes you from an empty folder to a distributable C++ game. The first job is the least glamorous and the most important: a working <strong>toolchain</strong>. A toolchain is a compiler (turns C++ into machine code), a build system (CMake — decides what to compile and how to link), and a library (raylib — the code that draws pixels, plays sound, and reads input for you). Get this right once and every later lesson just works.</p><h3>Why raylib (and where SFML/SDL2 fit)</h3><p><strong>raylib</strong> is a small C library with a flat, friendly API: <code>InitWindow</code>, <code>DrawRectangle</code>, <code>IsKeyDown</code>. No inheritance, no engine, no scene graph — just functions. That makes it perfect for learning what a game actually <em>does</em>. We use it as our primary library.</p><ul><li><strong>SFML</strong> — a C++ library (classes like <code>sf::RenderWindow</code>, <code>sf::Sprite</code>). More object-oriented; great if you prefer C++ idioms. Same concepts apply.</li><li><strong>SDL2</strong> — lower level and ubiquitous (raylib itself can sit on top of it). You manage more yourself; choose it when you need maximum portability or are targeting consoles/mobile.</li></ul><p>Everything you learn here transfers: a window, a loop, draw calls, input, delta time, and collision are universal.</p><h3>Install a compiler</h3><ul><li><strong>macOS:</strong> run <code>xcode-select --install</code> to get Clang. Install CMake with <code>brew install cmake</code>.</li><li><strong>Windows:</strong> install <strong>MSYS2</strong> then <code>pacman -S mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-cmake</code>, or use Visual Studio with the \"Desktop development with C++\" workload.</li><li><strong>Linux:</strong> <code>sudo apt install build-essential cmake git</code>.</li></ul><p>Verify everything is on your PATH before continuing:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='pr'>$</span> cc --version\nApple clang version 16.0.0\n<span class='pr'>$</span> cmake --version\ncmake version 3.29.2\n<span class='pr'>$</span> git --version\ngit version 2.45.0</div></div><h3>Let CMake fetch raylib for you</h3><p>You could install raylib system-wide, but the most reproducible approach is <code>FetchContent</code>: CMake downloads and builds raylib as part of your project. No version surprises, works on every machine. Create this folder layout:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>project layout</span></div><div class='term-body'>hello-raylib/\n├── CMakeLists.txt\n└── src/\n    └── main.cpp</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>CMakeLists.txt</span></div><div class='term-body'>cmake_minimum_required(VERSION 3.16)\nproject(hello_raylib CXX)\n\nset(CMAKE_CXX_STANDARD 17)\nset(CMAKE_CXX_STANDARD_REQUIRED ON)\n\ninclude(FetchContent)\nFetchContent_Declare(\n  raylib\n  GIT_REPOSITORY https://github.com/raysan5/raylib.git\n  GIT_TAG 5.5  <span class='cm'># pin a version, never \"master\"</span>\n)\nset(BUILD_EXAMPLES OFF CACHE BOOL \"\" FORCE)\nFetchContent_MakeAvailable(raylib)\n\nadd_executable(game src/main.cpp)\ntarget_link_libraries(game PRIVATE raylib)</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>src/main.cpp</span></div><div class='term-body'>#include &lt;cstdio&gt;\n#include \"raylib.h\"\n\nint main() {\n    <span class='cm'>// Prove the toolchain links raylib without opening a window yet.</span>\n    printf(\"raylib version: %s\\n\", RAYLIB_VERSION);\n    printf(\"Toolchain OK \\u2014 ready to make games!\\n\");\n    return 0;\n}</div></div><h3>Configure and build</h3><p>CMake works in two phases: <em>configure</em> (reads <code>CMakeLists.txt</code>, downloads raylib) then <em>build</em> (compiles and links). Run from the project root:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='pr'>$</span> cmake -S . -B build\n<span class='dim'>-- Fetching raylib 5.5 ... done</span>\n<span class='pr'>$</span> cmake --build build\n<span class='ok'>[100%] Built target game</span>\n<span class='pr'>$</span> ./build/game\nraylib version: 5.5\nToolchain OK — ready to make games!</div></div><div class='box tip'><div class='bt'>The first build is slow.</div> CMake compiles all of raylib once (a minute or two). Every build after is fast because it is cached in <code>build/</code>. Never commit <code>build/</code> to git — add it to <code>.gitignore</code>.</div><div class='box danger'><div class='bt'>\"raylib.h not found\".</div> You almost always forgot <code>target_link_libraries(game PRIVATE raylib)</code>, or you ran <code>cmake --build</code> before re-running the configure step after editing <code>CMakeLists.txt</code>. On Linux you may also need system deps for the windowing backend: <code>sudo apt install libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev</code>.</div><div class='box law'><div class='bt'>Pin your dependencies.</div> Always set an explicit <code>GIT_TAG</code> (a release like <code>5.5</code>), never a moving branch. Six months from now your build should still produce the same binary.</div><div class='game'><div class='game-head'>🎮 Build This: Hello Window Check</div><div class='game-body'><p>Prove your compiler + CMake + raylib all work together before writing any game code.</p><ol><li>Create the folder layout above with the three files.</li><li>Run <code>cmake -S . -B build</code> and watch raylib download.</li><li>Run <code>cmake --build build</code> until you see <code>Built target game</code>.</li><li>Run the executable and confirm it prints the raylib version and the OK message.</li><li>Add a <code>.gitignore</code> containing <code>build/</code> and <code>git init</code> the folder.</li></ol></div></div>"},{"id":"p4-2","part":"04 · C++ (from scratch)","nav":"Window & Loop","num":"4.2","kicker":"Part 04 · Lesson 2","title":"Opening a Window & the Game Loop","html":"<h3>The shape of every game</h3><p>Every real-time game is the same loop, forever, until the player quits:</p><ol><li><strong>Input</strong> — what did the player press?</li><li><strong>Update</strong> — advance the world (move things, check rules).</li><li><strong>Render</strong> — draw the current state of the world to the screen.</li></ol><p>raylib gives you three primitives to build that loop: <code>InitWindow</code> opens the window and creates the GPU context, <code>WindowShouldClose()</code> returns true when the user clicks the close button or you choose to exit, and <code>BeginDrawing()</code> / <code>EndDrawing()</code> wrap the render phase. <code>EndDrawing</code> is also where raylib swaps the back buffer to the screen and sleeps to hit your target frame rate.</p><h3>The minimal complete program</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.cpp</span></div><div class='term-body'>#include \"raylib.h\"\n\nint main() {\n    const int screenW = 800;\n    const int screenH = 450;\n\n    InitWindow(screenW, screenH, \"Blank Canvas\");\n    SetTargetFPS(60);  <span class='cm'>// cap the loop at 60 frames per second</span>\n\n    while (!WindowShouldClose()) {  <span class='cm'>// also true when ESC is pressed</span>\n        <span class='cm'>// --- update would go here ---</span>\n\n        BeginDrawing();\n            ClearBackground(RAYWHITE);  <span class='cm'>// wipe last frame</span>\n            DrawText(\"Press ESC to quit\", 250, 200, 20, DARKGRAY);\n        EndDrawing();\n    }\n\n    CloseWindow();  <span class='cm'>// free the GPU context and window</span>\n    return 0;\n}</div></div><p>Build and run it exactly as in Lesson 1. You get a resizable-looking 800x450 window titled \"Blank Canvas\" that fills with off-white every frame. By default raylib maps the <code>ESC</code> key to \"should close\", which is why <code>WindowShouldClose()</code> returns true when you tap it. That is the \"closes cleanly\" behavior for free.</p><h3>Why ClearBackground every frame?</h3><p>The window is a buffer of pixels that keeps whatever you drew last. If you never clear it, moving objects leave smeared trails. <code>ClearBackground</code> resets every pixel to a solid color first, giving you a clean slate. Always call it as the first thing inside <code>BeginDrawing</code>.</p><h3>Colors and the coordinate system</h3><p>raylib ships named <code>Color</code> constants: <code>RAYWHITE</code>, <code>BLACK</code>, <code>RED</code>, <code>DARKBLUE</code>, <code>LIME</code>, and more. Make your own with <code>Color c = { 30, 30, 46, 255 };</code> (R, G, B, A, each 0–255). The screen origin <code>(0,0)</code> is the <strong>top-left</strong> corner; X grows right, Y grows <em>down</em>. This trips up people used to math graphs — a higher Y is lower on screen.</p><div class='box tip'><div class='bt'>SetTargetFPS is not your timestep.</div> It caps how often the loop runs so you do not melt the CPU, but it does not guarantee 60. A slow machine drops frames. That is exactly why movement must use delta time (Lesson 4) instead of assuming a fixed frame rate.</div><h3>Useful loop helpers</h3><ul><li><code>GetFPS()</code> — current measured frames per second (great for a debug readout).</li><li><code>DrawFPS(x, y)</code> — draws the FPS counter for you.</li><li><code>GetScreenWidth()</code> / <code>GetScreenHeight()</code> — current window size.</li><li><code>SetConfigFlags(FLAG_VSYNC_HINT)</code> — call <em>before</em> <code>InitWindow</code> to sync to the monitor refresh.</li></ul><div class='box danger'><div class='bt'>Order matters.</div> Call <code>InitWindow</code> before any draw or texture/sound function — those need the GPU/audio context that <code>InitWindow</code> creates. Anything between <code>BeginDrawing</code> and <code>EndDrawing</code> is a draw call; do not put your update logic there or you mix concerns and make bugs harder to find. And never forget <code>EndDrawing()</code> — without it the screen never updates and the app appears frozen.</div><div class='box law'><div class='bt'>One loop, three phases.</div> Keep input, update, and render visually separated in <code>main</code> even before you split them into functions. Future-you will thank present-you when the game grows.</div><div class='game'><div class='game-head'>🎮 Build This: Blank Canvas</div><div class='game-body'><p>A titled window that clears to a color each frame and quits cleanly on ESC.</p><ol><li>Start from the program above; rename the window title to your game's name.</li><li>Change <code>ClearBackground</code> to a custom dark color like <code>{ 24, 24, 37, 255 }</code>.</li><li>Add <code>DrawFPS(10, 10);</code> inside the draw block and confirm it reads ~60.</li><li>Run it, resize-test it, and press ESC to confirm the window closes and the program returns 0.</li></ol></div></div>"},{"id":"p4-3","part":"04 · C++ (from scratch)","nav":"Drawing & Input","num":"4.3","kicker":"Part 04 · Lesson 3","title":"Drawing Shapes/Text & Reading Input","html":"<h3>Drawing primitives</h3><p>raylib has a draw function for every basic shape. They all take screen coordinates and a <code>Color</code>:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>draw calls</span></div><div class='term-body'>DrawRectangle(x, y, width, height, color);\nDrawRectangleRec(rectangle, color);          <span class='cm'>// takes a Rectangle struct</span>\nDrawCircle(centerX, centerY, radius, color);\nDrawCircleV(position, radius, color);         <span class='cm'>// takes a Vector2</span>\nDrawLine(x1, y1, x2, y2, color);\nDrawText(\"text\", x, y, fontSize, color);\nint w = MeasureText(\"text\", fontSize);        <span class='cm'>// pixel width, for centering</span></div></div><p>To center text horizontally, measure it and subtract half from the screen midpoint: <code>DrawText(s, screenW/2 - MeasureText(s, 40)/2, y, 40, WHITE);</code>.</p><h3>Reading input</h3><p>There are two flavors of input check, and the difference is everything:</p><ul><li><code>IsKeyDown(KEY_W)</code> — true <strong>every frame</strong> the key is held. Use for continuous motion (moving a paddle).</li><li><code>IsKeyPressed(KEY_SPACE)</code> — true only on the <strong>frame the key goes down</strong>. Use for one-shot actions (jump, fire, pause).</li></ul><p>Mouse mirrors this: <code>IsMouseButtonDown(MOUSE_BUTTON_LEFT)</code>, <code>IsMouseButtonPressed(...)</code>, and <code>GetMousePosition()</code> returns a <code>Vector2</code>. Key names are <code>KEY_W</code>, <code>KEY_UP</code>, <code>KEY_SPACE</code>, <code>KEY_ESCAPE</code>, etc.</p><h3>Building Pong</h3><p>Pong is two paddles and a ball that bounces inside the window. We track each object's position as plain variables and move the paddles with held keys. We will use raylib's <code>Rectangle</code> struct (<code>x, y, width, height</code>) for the paddles.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong.cpp</span></div><div class='term-body'>#include \"raylib.h\"\n\nint main() {\n    const int W = 800, H = 450;\n    InitWindow(W, H, \"Pong\");\n    SetTargetFPS(60);\n\n    Rectangle left  = { 30,  H/2 - 40, 15, 80 };\n    Rectangle right = { W-45, H/2 - 40, 15, 80 };\n    float paddleSpeed = 6.0f;\n\n    Vector2 ball = { W/2.0f, H/2.0f };\n    Vector2 ballVel = { 5.0f, 4.0f };\n    float ballR = 9.0f;\n\n    while (!WindowShouldClose()) {\n        <span class='cm'>// --- input + update ---</span>\n        if (IsKeyDown(KEY_W) &amp;&amp; left.y &gt; 0)        left.y -= paddleSpeed;\n        if (IsKeyDown(KEY_S) &amp;&amp; left.y &lt; H-left.height)  left.y += paddleSpeed;\n        if (IsKeyDown(KEY_UP) &amp;&amp; right.y &gt; 0)      right.y -= paddleSpeed;\n        if (IsKeyDown(KEY_DOWN) &amp;&amp; right.y &lt; H-right.height) right.y += paddleSpeed;\n\n        ball.x += ballVel.x;\n        ball.y += ballVel.y;\n        if (ball.y &lt; ballR || ball.y &gt; H - ballR) ballVel.y *= -1;  <span class='cm'>// bounce top/bottom</span>\n        if (ball.x &lt; 0 || ball.x &gt; W) {  <span class='cm'>// off the side: reset to center</span>\n            ball = { W/2.0f, H/2.0f };\n        }\n\n        <span class='cm'>// --- render ---</span>\n        BeginDrawing();\n            ClearBackground(BLACK);\n            DrawRectangleRec(left, RAYWHITE);\n            DrawRectangleRec(right, RAYWHITE);\n            DrawCircleV(ball, ballR, RAYWHITE);\n            DrawLine(W/2, 0, W/2, H, GRAY);  <span class='cm'>// center net</span>\n        EndDrawing();\n    }\n    CloseWindow();\n    return 0;\n}</div></div><p>Run it: W/S drive the left paddle, the arrow keys drive the right, and the ball bounces off the top and bottom walls. Notice we <em>clamp</em> each paddle so it cannot leave the screen by checking <code>left.y &gt; 0</code> and <code>left.y &lt; H - left.height</code> before moving.</p><div class='box tip'><div class='bt'>Speed in pixels-per-frame is temporary.</div> We hardcode <code>paddleSpeed = 6</code> and add it directly. That assumes 60 FPS. In Lesson 4 we switch to <code>speed * GetFrameTime()</code> so the game plays identically on any monitor. For now, fixed FPS keeps Pong simple.</div><div class='box danger'><div class='bt'>Bounce can stick.</div> Reversing velocity when the ball is already <em>past</em> the wall can re-trigger next frame and \"vibrate\" the ball at the edge. The safe pattern is to also clamp the position back inside: <code>if (ball.y &lt; ballR) { ball.y = ballR; ballVel.y *= -1; }</code>. We will lean on this in collision (Lesson 5).</div><div class='game'><div class='game-head'>🎮 Build This: Pong</div><div class='game-body'><p>Two paddles and a ball that bounces inside the window.</p><ol><li>Type in the program above and confirm both paddles move with their keys.</li><li>Make the ball bounce off a paddle: if its rectangle contains the ball, flip <code>ballVel.x</code> (collision details come next lesson, but a quick X-overlap check works now).</li><li>Add two integer score variables; increment one when the ball exits the opposite side, and draw both with <code>DrawText</code> + <code>TextFormat(\"%d\", score)</code>.</li><li>Speed the ball up slightly each paddle hit for difficulty.</li></ol></div></div>"},{"id":"p4-4","part":"04 · C++ (from scratch)","nav":"Vectors & Movement","num":"4.4","kicker":"Part 04 · Lesson 4","title":"Vectors & Movement with Delta Time","html":"<h3>Vector2: position and direction in one type</h3><p>raylib's <code>Vector2</code> is just <code>{ float x; float y; }</code>, but treating it as a single mathematical object makes movement code clean. A vector can mean a <em>position</em> (where something is) or a <em>velocity</em> (how fast and in what direction it moves). The <code>raymath.h</code> header gives you the operations:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>raymath helpers</span></div><div class='term-body'>#include \"raymath.h\"\n\nVector2 a = { 3, 4 };\nVector2 b = { 1, 0 };\nVector2 sum   = Vector2Add(a, b);          <span class='cm'>// { 4, 4 }</span>\nVector2 scaled= Vector2Scale(a, 2.0f);     <span class='cm'>// { 6, 8 }</span>\nfloat   len   = Vector2Length(a);          <span class='cm'>// 5.0  (sqrt(3^2+4^2))</span>\nVector2 dir   = Vector2Normalize(a);       <span class='cm'>// length 1, same direction</span>\nfloat   dist  = Vector2Distance(a, b);</div></div><p><strong>Normalizing</strong> is the key trick: a normalized vector has length 1, so it is pure <em>direction</em>. Multiply it by a speed to get a velocity that is the same magnitude in any direction — essential so diagonal movement is not faster than straight movement.</p><h3>Delta time: the cure for frame-rate dependence</h3><p>In Pong we wrote <code>ball.x += 5</code>. On a 60Hz screen that is 300 pixels/second; on a 144Hz screen it is 720 — the game runs more than twice as fast. The fix is to express speed in <strong>pixels per second</strong> and multiply by the time the last frame took:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>delta time</span></div><div class='term-body'>float dt = GetFrameTime();   <span class='cm'>// seconds since last frame, e.g. 0.0166 at 60fps</span>\nfloat speed = 300.0f;        <span class='cm'>// pixels PER SECOND now</span>\nball.x += speed * dt;        <span class='cm'>// always 300px/s regardless of FPS</span></div></div><p>At 60 FPS, <code>dt ≈ 0.0167</code> so you move ~5px/frame; at 144 FPS, <code>dt ≈ 0.0069</code> so you move ~2px/frame — but 144 of those add up to the same 300px in a second. Velocity-based movement becomes one clean line: <code>pos = Vector2Add(pos, Vector2Scale(vel, dt));</code>.</p><h3>Building Breakout: paddle + moving ball + brick grid</h3><p>We lay out a grid of bricks, a mouse- or key-controlled paddle, and a velocity-vector ball. Collision response is next lesson — here we get everything <em>moving</em> with delta time.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>breakout.cpp (movement)</span></div><div class='term-body'>#include \"raylib.h\"\n#include \"raymath.h\"\n\nstruct Brick { Rectangle rect; bool alive; };\n\nint main() {\n    const int W = 800, H = 600;\n    InitWindow(W, H, \"Breakout\");\n    SetTargetFPS(144);\n\n    Rectangle paddle = { W/2.0f - 50, H - 40, 100, 16 };\n    float paddleSpeed = 600.0f;  <span class='cm'>// px/sec</span>\n\n    Vector2 ball = { W/2.0f, H/2.0f };\n    Vector2 ballVel = Vector2Scale(Vector2Normalize({ 1, 1 }), 350.0f);\n    float ballR = 8.0f;\n\n    const int cols = 10, rows = 5;\n    Brick bricks[rows * cols];\n    for (int r = 0; r &lt; rows; r++)\n        for (int c = 0; c &lt; cols; c++)\n            bricks[r*cols + c] = { { 60.0f + c*70, 60.0f + r*30, 64, 22 }, true };\n\n    while (!WindowShouldClose()) {\n        float dt = GetFrameTime();\n        if (IsKeyDown(KEY_LEFT))  paddle.x -= paddleSpeed * dt;\n        if (IsKeyDown(KEY_RIGHT)) paddle.x += paddleSpeed * dt;\n        paddle.x = Clamp(paddle.x, 0, W - paddle.width);\n\n        ball = Vector2Add(ball, Vector2Scale(ballVel, dt));\n        if (ball.x &lt; ballR || ball.x &gt; W - ballR) ballVel.x *= -1;\n        if (ball.y &lt; ballR) ballVel.y *= -1;\n\n        BeginDrawing();\n            ClearBackground({ 24,24,37,255 });\n            DrawRectangleRec(paddle, SKYBLUE);\n            DrawCircleV(ball, ballR, RAYWHITE);\n            for (auto&amp; b : bricks)\n                if (b.alive) DrawRectangleRec(b.rect, ORANGE);\n        EndDrawing();\n    }\n    CloseWindow();\n    return 0;\n}</div></div><p>Set the target FPS to 144 and then 30 — the ball crosses the screen in the same wall-clock time both ways. That is delta time working.</p><div class='box tip'><div class='bt'>Normalize, then scale.</div> To launch a ball at a chosen speed in a chosen direction: <code>Vector2Scale(Vector2Normalize(dir), speed)</code>. Never hand-pick component velocities like <code>{350,350}</code> — that is actually ~495px/s diagonally.</div><div class='box danger'><div class='bt'>Beware a giant dt spike.</div> If the window is dragged or the game stalls, one frame's <code>dt</code> can be huge and a fast object can teleport through a wall (\"tunneling\"). Clamp it: <code>dt = fminf(dt, 0.05f);</code>. We solve tunneling properly with collision tests next lesson.</div><div class='game'><div class='game-head'>🎮 Build This: Breakout (movement phase)</div><div class='game-body'><p>A paddle and a velocity-vector ball moving with delta time toward a brick grid.</p><ol><li>Build the program above; control the paddle with arrow keys and confirm it clamps to the screen.</li><li>Switch <code>SetTargetFPS</code> between 30, 60, and 144 — verify ball speed is identical.</li><li>Add mouse control: set <code>paddle.x = GetMousePosition().x - paddle.width/2;</code> then clamp.</li><li>Launch the ball in a random upward direction at start using <code>Vector2Normalize</code>.</li></ol></div></div>"},{"id":"p4-5","part":"04 · C++ (from scratch)","nav":"Collision","num":"4.5","kicker":"Part 04 · Lesson 5","title":"Collision: AABB & Circle Tests","html":"<h3>The two collision shapes you need</h3><p>Almost every 2D game gets by with two cheap tests: <strong>AABB</strong> (axis-aligned bounding box — rectangle vs rectangle) and <strong>circle</strong> (point/circle distance). raylib ships both so you rarely write the math, but you must understand it to respond correctly.</p><h4>AABB: rectangle vs rectangle</h4><p>Two rectangles overlap only if they overlap on <em>both</em> axes. If there is any gap on the X axis or any gap on the Y axis, they miss. raylib's function:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>AABB test</span></div><div class='term-body'>bool hit = CheckCollisionRecs(rectA, rectB);\n\n<span class='cm'>// what it does under the hood:</span>\nbool overlap = (a.x &lt; b.x + b.width)  &amp;&amp; (a.x + a.width  &gt; b.x) &amp;&amp;\n               (a.y &lt; b.y + b.height) &amp;&amp; (a.y + a.height &gt; b.y);</div></div><h4>Circle tests</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>circle tests</span></div><div class='term-body'>bool cc = CheckCollisionCircles(c1, r1, c2, r2);   <span class='cm'>// distance(c1,c2) &lt; r1+r2</span>\nbool cr = CheckCollisionCircleRec(center, radius, rect);\nbool cp = CheckCollisionPointRec(point, rect);</div></div><h3>Detection is easy — response is the craft</h3><p>Knowing two things touch is half the job. The other half is reacting believably. For a ball hitting a brick, the key question is: <em>which side did it hit?</em> A common, robust approach is to compare how far the ball has penetrated on each axis and reflect the smaller one. A simpler heuristic that feels great in Breakout: decide the bounce axis from the ball's position relative to the brick center.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>breakout.cpp (collision)</span></div><div class='term-body'><span class='cm'>// inside the update loop, after moving the ball:</span>\nfor (auto&amp; b : bricks) {\n    if (!b.alive) continue;\n    if (CheckCollisionCircleRec(ball, ballR, b.rect)) {\n        b.alive = false;\n        score += 10;\n        <span class='cm'>// pick bounce axis: which overlap is smaller?</span>\n        float overlapL = (ball.x + ballR) - b.rect.x;\n        float overlapR = (b.rect.x + b.rect.width) - (ball.x - ballR);\n        float overlapT = (ball.y + ballR) - b.rect.y;\n        float overlapB = (b.rect.y + b.rect.height) - (ball.y - ballR);\n        float minX = fminf(overlapL, overlapR);\n        float minY = fminf(overlapT, overlapB);\n        if (minX &lt; minY) ballVel.x *= -1;  <span class='cm'>// hit a vertical face</span>\n        else             ballVel.y *= -1;  <span class='cm'>// hit a horizontal face</span>\n        break;  <span class='cm'>// one brick per frame keeps bounces clean</span>\n    }\n}\n\n<span class='cm'>// paddle: reflect up, and steer by where it struck the paddle</span>\nif (CheckCollisionCircleRec(ball, ballR, paddle) &amp;&amp; ballVel.y &gt; 0) {\n    ballVel.y *= -1;\n    float hit = (ball.x - (paddle.x + paddle.width/2)) / (paddle.width/2);\n    ballVel.x = hit * 300.0f;   <span class='cm'>// edge hits angle the ball outward</span>\n    ball.y = paddle.y - ballR;  <span class='cm'>// nudge out so it can't re-trigger</span>\n}\n\nif (ball.y &gt; H) { lives--; /* reset ball */ }  <span class='cm'>// missed the paddle</span></div></div><p>That paddle code is the trick that makes Breakout feel like a game and not a physics demo: the ball's horizontal velocity depends on <em>where</em> on the paddle it lands, so the player can aim.</p><div class='box tip'><div class='bt'>Check the velocity direction before reflecting.</div> The guard <code>ballVel.y &gt; 0</code> means \"only bounce if the ball is moving downward into the paddle\". Without it, a ball already moving up that still overlaps the paddle flips again and gets stuck. The same idea applies to walls.</div><div class='box danger'><div class='bt'>Always push the object out after a hit.</div> Detecting a collision and only flipping velocity can leave the ball still overlapping next frame — it re-collides and jitters or sticks. After reflecting, reposition it to just outside the surface (<code>ball.y = paddle.y - ballR;</code>). This is the single most common collision bug.</div><div class='box law'><div class='bt'>Detect, then resolve, then respond.</div> (1) Detect overlap. (2) Resolve by moving objects apart so they no longer overlap. (3) Respond by changing velocities / game state. Doing them in this order eliminates the classic \"stuck inside a wall\" class of bugs.</div><h3>A note on broad performance</h3><p>Checking every ball against every brick each frame (a few hundred tests) is trivially fast. When you scale to thousands of objects you add a <em>broad phase</em> (a grid or quadtree) to skip pairs that cannot possibly touch — but do not optimize that until a profiler tells you to.</p><div class='game'><div class='game-head'>🎮 Build This: Finish Breakout</div><div class='game-body'><p>Ball-vs-brick and ball-vs-paddle collisions that destroy bricks and reflect the ball.</p><ol><li>Add <code>int score = 0; int lives = 3;</code> and the collision block above to last lesson's Breakout.</li><li>Destroy bricks on hit, increment score, and reflect on the correct axis.</li><li>Make the paddle steer the ball based on hit position; reset the ball and lose a life when it drops below the screen.</li><li>Draw score and lives with <code>DrawText(TextFormat(\"Score %d  Lives %d\", score, lives), 10, 10, 20, WHITE);</code></li><li>Show a \"You Win\" message when all bricks are dead and \"Game Over\" at zero lives.</li></ol></div></div>"},{"id":"p4-6","part":"04 · C++ (from scratch)","nav":"Sprites & Animation","num":"4.6","kicker":"Part 04 · Lesson 6","title":"Textures, Sprites & Animation","html":"<h3>From shapes to textures</h3><p>Rectangles got us far, but real games draw images. In raylib an image on disk becomes a <code>Texture2D</code> (pixels living on the GPU). The lifecycle is always the same: load once before the loop, draw many times inside it, unload once at the end.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>texture lifecycle</span></div><div class='term-body'>Texture2D snake = LoadTexture(\"assets/snake.png\");  <span class='cm'>// after InitWindow!</span>\n\n<span class='cm'>// inside the loop:</span>\nDrawTexture(snake, x, y, WHITE);          <span class='cm'>// at a position, full size</span>\nDrawTextureV(snake, position, WHITE);     <span class='cm'>// Vector2 position</span>\n\nUnloadTexture(snake);  <span class='cm'>// before CloseWindow</span></div></div><p>The <code>WHITE</code> argument is a <em>tint</em>: <code>WHITE</code> means \"draw as-is\". Tint with another color to fade or recolor; use <code>{255,255,255,128}</code> for 50% transparency.</p><h3>Sprite sheets and source rectangles</h3><p>Animation in 2D is a flipbook: several frames packed side by side in one image (a <strong>sprite sheet</strong>). You draw only one cell at a time using a <strong>source rectangle</strong> — the slice of the texture to copy — and a <strong>destination rectangle</strong> — where and how big to draw it on screen. <code>DrawTexturePro</code> handles both plus rotation:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>frame stepping</span></div><div class='term-body'>Texture2D sheet = LoadTexture(\"assets/walk.png\"); <span class='cm'>// 4 frames, 32px each = 128x32</span>\nint frameW = sheet.width / 4;   <span class='cm'>// 32</span>\nint frameH = sheet.height;      <span class='cm'>// 32</span>\nint frame = 0;\nfloat timer = 0, frameTime = 0.12f;  <span class='cm'>// advance every 120ms</span>\n\n<span class='cm'>// in the loop:</span>\ntimer += GetFrameTime();\nif (timer &gt;= frameTime) { timer = 0; frame = (frame + 1) % 4; }\n\nRectangle src = { (float)frame * frameW, 0, (float)frameW, (float)frameH };\nRectangle dst = { posX, posY, frameW * 2.0f, frameH * 2.0f }; <span class='cm'>// 2x scale</span>\nDrawTexturePro(sheet, src, dst, { 0, 0 }, 0.0f, WHITE);</div></div><p>The animation advances on a <em>timer</em>, not on every frame — again decoupled from frame rate via <code>GetFrameTime()</code>. To flip a sprite to face left, make the source rectangle's width negative: <code>src.width = -frameW;</code>.</p><h3>Building Snake on a grid</h3><p>Snake is the cleanest grid game. The world is a grid of cells (say 25x25 of 24px each). The snake is a list of grid cells; it moves one cell per <em>tick</em> (a fixed interval, not every frame), grows when it eats food, and dies if it hits a wall or itself.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>snake.cpp (core)</span></div><div class='term-body'>#include \"raylib.h\"\n#include &lt;deque&gt;\n#include &lt;raymath.h&gt;\n\nconst int CELL = 24, COLS = 25, ROWS = 25;\n\nint main() {\n    InitWindow(COLS*CELL, ROWS*CELL, \"Snake\");\n    SetTargetFPS(60);\n    Texture2D body = LoadTexture(\"assets/segment.png\");\n\n    std::deque&lt;Vector2&gt; snake = { {12,12}, {11,12}, {10,12} };\n    Vector2 dir = { 1, 0 };\n    Vector2 food = { 5, 5 };\n    float tick = 0, tickRate = 0.15f;  <span class='cm'>// snake steps 6.6x/sec</span>\n\n    while (!WindowShouldClose()) {\n        <span class='cm'>// turn (block 180-degree reversals)</span>\n        if (IsKeyPressed(KEY_UP)    &amp;&amp; dir.y == 0) dir = { 0,-1 };\n        if (IsKeyPressed(KEY_DOWN)  &amp;&amp; dir.y == 0) dir = { 0, 1 };\n        if (IsKeyPressed(KEY_LEFT)  &amp;&amp; dir.x == 0) dir = { -1,0 };\n        if (IsKeyPressed(KEY_RIGHT) &amp;&amp; dir.x == 0) dir = { 1, 0 };\n\n        tick += GetFrameTime();\n        if (tick &gt;= tickRate) {\n            tick = 0;\n            Vector2 head = Vector2Add(snake.front(), dir);\n            snake.push_front(head);\n            if (head.x == food.x &amp;&amp; head.y == food.y) {\n                food = { (float)GetRandomValue(0,COLS-1), (float)GetRandomValue(0,ROWS-1) };\n            } else {\n                snake.pop_back();  <span class='cm'>// no growth: drop the tail</span>\n            }\n        }\n\n        BeginDrawing();\n            ClearBackground({ 20,30,20,255 });\n            DrawRectangle(food.x*CELL, food.y*CELL, CELL, CELL, RED);\n            for (auto&amp; s : snake)\n                DrawTexture(body, s.x*CELL, s.y*CELL, WHITE);\n        EndDrawing();\n    }\n    UnloadTexture(body);\n    CloseWindow();\n    return 0;\n}</div></div><p>The growth logic is the elegant part: every tick we push a new head; if we ate, we keep the tail so the body lengthens; otherwise we drop the tail so the snake appears to slide.</p><div class='box tip'><div class='bt'>No art? Use placeholders.</div> Ship gameplay first with <code>DrawRectangle</code>, then swap in textures. raylib can also <code>GenImageColor</code> / <code>LoadTextureFromImage</code> at runtime so you never block on an artist.</div><div class='box danger'><div class='bt'>Move on ticks, animate on time, never on frames.</div> If the snake stepped every frame it would be unplayably fast at 144 FPS. Accumulate <code>GetFrameTime()</code> and act when the timer crosses your interval. The same accumulator pattern drives sprite-frame stepping.</div><div class='game'><div class='game-head'>🎮 Build This: Snake</div><div class='game-body'><p>A grid snake drawn from segment textures that grows when it eats food.</p><ol><li>Build the core above; confirm the snake slides, turns, and grows on food.</li><li>Add death: end the game if the head leaves the grid or matches any body cell.</li><li>Use a sprite sheet for an animated head (frame-step its source rectangle) and rotate it to face <code>dir</code>.</li><li>Add a score = snake length minus 3, drawn with <code>DrawText</code>, and a restart on <code>KEY_ENTER</code>.</li></ol></div></div>"},{"id":"p4-7","part":"04 · C++ (from scratch)","nav":"Sound & Structure","num":"4.7","kicker":"Part 04 · Lesson 7","title":"Sound & Structuring a Game with Entities & State","html":"<h3>Audio in raylib</h3><p>Sound needs an audio device, initialized once after the window. Short effects load as <code>Sound</code> (decompressed in memory, instant playback); long music streams as <code>Music</code> (decoded as it plays, must be ticked each frame).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio</span></div><div class='term-body'>InitAudioDevice();                          <span class='cm'>// after InitWindow</span>\nSound shoot  = LoadSound(\"assets/shoot.wav\");\nSound thrust = LoadSound(\"assets/thrust.wav\");\nMusic bgm    = LoadMusicStream(\"assets/song.ogg\");\nPlayMusicStream(bgm);\n\n<span class='cm'>// in the loop:</span>\nUpdateMusicStream(bgm);                     <span class='cm'>// REQUIRED every frame for music</span>\nif (IsKeyPressed(KEY_SPACE)) PlaySound(shoot);\nSetSoundVolume(thrust, 0.4f);\n\n<span class='cm'>// at shutdown:</span>\nUnloadSound(shoot); UnloadMusicStream(bgm); CloseAudioDevice();</div></div><h3>Entities: stop using loose variables</h3><p>So far each object was a pile of separate variables. That does not scale to dozens of asteroids and bullets. Group related data into a <code>struct</code> — the entity — and keep many of them in a <code>std::vector</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>entities</span></div><div class='term-body'>struct Ship    { Vector2 pos, vel; float rot; };\nstruct Bullet  { Vector2 pos, vel; float life; bool alive; };\nstruct Asteroid{ Vector2 pos, vel; float radius; bool alive; };\n\nShip ship = { { 400, 300 }, { 0, 0 }, 0 };\nstd::vector&lt;Bullet&gt;  bullets;\nstd::vector&lt;Asteroid&gt; asteroids;</div></div><p>Updating becomes a loop over the vector, and \"despawning\" is just setting <code>alive = false</code> then removing dead entities once per frame.</p><h3>A simple game-state machine</h3><p>A real game is not always \"playing\" — it has a menu, the gameplay, and a game-over screen. Model that explicitly with an <code>enum</code> and a <code>switch</code>. This is the single most valuable structural pattern for small games.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>state machine</span></div><div class='term-body'>enum class GameState { Menu, Playing, GameOver };\nGameState state = GameState::Menu;\n\nwhile (!WindowShouldClose()) {\n    float dt = GetFrameTime();\n    UpdateMusicStream(bgm);\n    BeginDrawing();\n    ClearBackground(BLACK);\n\n    switch (state) {\n    case GameState::Menu:\n        DrawText(\"ASTEROIDS\", 280, 200, 50, WHITE);\n        DrawText(\"Press ENTER to play\", 290, 270, 20, GRAY);\n        if (IsKeyPressed(KEY_ENTER)) { ResetGame(); state = GameState::Playing; }\n        break;\n\n    case GameState::Playing:\n        <span class='cm'>// thrust</span>\n        if (IsKeyDown(KEY_UP)) {\n            Vector2 fwd = { sinf(ship.rot*DEG2RAD), -cosf(ship.rot*DEG2RAD) };\n            ship.vel = Vector2Add(ship.vel, Vector2Scale(fwd, 250*dt));\n            if (!IsSoundPlaying(thrust)) PlaySound(thrust);\n        }\n        if (IsKeyDown(KEY_LEFT))  ship.rot -= 200*dt;\n        if (IsKeyDown(KEY_RIGHT)) ship.rot += 200*dt;\n        if (IsKeyPressed(KEY_SPACE)) {\n            Vector2 fwd = { sinf(ship.rot*DEG2RAD), -cosf(ship.rot*DEG2RAD) };\n            bullets.push_back({ ship.pos, Vector2Scale(fwd, 500), 1.5f, true });\n            PlaySound(shoot);\n        }\n        UpdateWorld(dt);\n        if (asteroids.empty() || playerDead) state = GameState::GameOver;\n        DrawWorld();\n        break;\n\n    case GameState::GameOver:\n        DrawText(\"GAME OVER\", 270, 220, 50, RED);\n        if (IsKeyPressed(KEY_ENTER)) state = GameState::Menu;\n        break;\n    }\n    EndDrawing();\n}</div></div><p>Notice each state owns its input, update, and draw. Switching states is one assignment. Adding a Pause state later is just a new <code>enum</code> value and <code>case</code>.</p><div class='box tip'><div class='bt'>Screen wrap is the Asteroids feel.</div> Make objects that leave one edge appear on the opposite: <code>if (pos.x &lt; 0) pos.x += W; if (pos.x &gt; W) pos.x -= W;</code> (same for Y). Apply it to the ship, bullets, and asteroids.</div><div class='box danger'><div class='bt'>Removing entities mid-loop invalidates iterators.</div> Do not <code>erase</code> from a vector while a range-for is iterating it. Mark <code>alive = false</code>, then sweep once at the end of the frame with the erase-remove idiom: <code>v.erase(std::remove_if(v.begin(), v.end(), [](auto&amp; e){ return !e.alive; }), v.end());</code></div><div class='box law'><div class='bt'>Update then draw, never interleave.</div> Finish all state changes for the frame before any draw call. Drawing mid-update gives objects that lag a frame behind each other and produces visual jitter that is maddening to debug.</div><div class='game'><div class='game-head'>🎮 Build This: Asteroids Prototype</div><div class='game-body'><p>A ship and asteroid entities with thrust/shoot sounds and Menu/Play/GameOver states.</p><ol><li>Define the three entity structs and the <code>GameState</code> enum; wire up the state switch above.</li><li>Implement ship rotation + thrust (with screen wrap) and firing bullets that expire via <code>life -= dt</code>.</li><li>Spawn a handful of drifting asteroids; play <code>shoot</code> on fire and <code>thrust</code> while accelerating.</li><li>Transition Menu → Playing on ENTER and Playing → GameOver when the player dies. Collisions and scoring come next lesson.</li></ol></div></div>"},{"id":"p4-8","part":"04 · C++ (from scratch)","nav":"Capstone & Distribute","num":"4.8","kicker":"Part 04 · Lesson 8","title":"Capstone: Asteroids & Distributing the Build","html":"<h3>Completing the game</h3><p>The prototype has movement, sound, and states. A <em>game</em> needs goals and stakes: <strong>scoring</strong>, <strong>lives</strong>, and the loop of breaking big asteroids into smaller ones. Use the circle-collision skill from Lesson 5 — every Asteroids object is a circle.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>collisions + scoring</span></div><div class='term-body'>int score = 0, lives = 3;\n\nvoid SplitAsteroid(std::vector&lt;Asteroid&gt;&amp; a, const Asteroid&amp; hit) {\n    if (hit.radius &lt; 20) return;  <span class='cm'>// smallest size: just vanishes</span>\n    float r = hit.radius / 2;\n    for (int i = 0; i &lt; 2; i++)\n        a.push_back({ hit.pos,\n            { (float)GetRandomValue(-120,120), (float)GetRandomValue(-120,120) },\n            r, true });\n}\n\n<span class='cm'>// bullet vs asteroid</span>\nfor (auto&amp; b : bullets) for (auto&amp; a : asteroids) {\n    if (b.alive &amp;&amp; a.alive &amp;&amp; CheckCollisionCircles(b.pos, 2, a.pos, a.radius)) {\n        b.alive = false; a.alive = false;\n        score += (a.radius &gt; 40) ? 20 : (a.radius &gt; 20 ? 50 : 100);\n        SplitAsteroid(asteroids, a);\n        PlaySound(boom);\n    }\n}\n<span class='cm'>// ship vs asteroid</span>\nfor (auto&amp; a : asteroids)\n    if (a.alive &amp;&amp; CheckCollisionCircles(ship.pos, 12, a.pos, a.radius)) {\n        lives--; ship.pos = { W/2.0f, H/2.0f }; ship.vel = {0,0};\n        if (lives &lt;= 0) state = GameState::GameOver;\n    }</div></div><p>Smaller asteroids score more (they are harder to hit), and clearing them all can spawn a fresh, faster wave — that is your difficulty curve. Draw <code>score</code> and <code>lives</code> with <code>DrawText(TextFormat(...))</code> in the HUD.</p><h3>Building a Release binary</h3><p>Debug builds are big and slow. For anything you hand to a player, build in <strong>Release</strong> mode — the optimizer turns on and the binary shrinks:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>release build</span></div><div class='term-body'><span class='pr'>$</span> cmake -S . -B build -DCMAKE_BUILD_TYPE=Release\n<span class='pr'>$</span> cmake --build build --config Release\n<span class='ok'>[100%] Built target game</span></div></div><p>Statically linking raylib (the default with FetchContent) means the library is baked into your executable — no separate <code>.dll</code>/<code>.so</code> to ship. That is exactly what you want for distribution.</p><h3>Packaging: assets travel with the binary</h3><p>The most common \"works on my machine\" failure: the game can't find <code>assets/</code>. raylib resolves relative paths against the <em>working directory</em>, not the executable. Two fixes — use both:</p><ul><li>Ship the <code>assets/</code> folder <em>next to</em> the executable in the zip.</li><li>At startup, set the working directory to the executable's folder so double-clicking works: <code>ChangeDirectory(GetApplicationDirectory());</code></li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>distribution layout</span></div><div class='term-body'>Asteroids-v1.0-mac/\n├── game            <span class='cm'># or game.exe on Windows</span>\n└── assets/\n    ├── shoot.wav\n    ├── thrust.wav\n    └── boom.wav\n\n<span class='pr'>$</span> zip -r Asteroids-v1.0-mac.zip Asteroids-v1.0-mac/</div></div><h3>Per-platform notes</h3><table><thead><tr><th>Platform</th><th>You ship</th><th>Gotcha</th></tr></thead><tbody><tr><td>Windows</td><td><code>game.exe</code> + assets</td><td>Static-link the C++ runtime, or users hit \"missing VCRUNTIME140.dll\".</td></tr><tr><td>macOS</td><td>App bundle or zip</td><td>Unsigned apps trigger Gatekeeper; users right-click → Open the first time.</td></tr><tr><td>Linux</td><td>Binary + assets + run script</td><td>Build on an older glibc for forward compatibility.</td></tr><tr><td>Web</td><td>raylib + Emscripten → HTML/WASM</td><td>Best reach; runs in any browser, no install.</td></tr></tbody></table><div class='box tip'><div class='bt'>Web is the easiest \"send to a friend\".</div> raylib compiles to WebAssembly with Emscripten (<code>emcmake cmake .. && emmake make</code>), producing an <code>.html</code> + <code>.wasm</code> + <code>.data</code> you can host anywhere — no installer, instant play.</div><div class='box danger'><div class='bt'>Test the zip
