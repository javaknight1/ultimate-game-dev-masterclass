n> hp &lt;= <span class='ok'>0</span>:\n        hp = <span class='ok'>0</span>\n        alive = <span class='bad'>false</span>\n        print(<span class='ok'>\"You died\"</span>)\n    <span class='pr'>elif</span> hp &lt; <span class='ok'>20</span>:\n        print(<span class='ok'>\"Low health!\"</span>)\n\n<span class='pr'>func</span> heal_all() -&gt; <span class='cm'>void</span>:\n    <span class='pr'>for</span> i <span class='pr'>in</span> range(<span class='ok'>3</span>):\n        hp = min(hp + <span class='ok'>10</span>, MAX_HP)</div></div><h3>The node toolbox</h3><p>You will reach for the same handful of nodes constantly. Learn what each is <em>for</em>:</p><table><thead><tr><th>Node</th><th>Role</th></tr></thead><tbody><tr><td><code>Node2D</code></td><td>Base for anything with a 2D position/rotation/scale</td></tr><tr><td><code>Sprite2D</code></td><td>Draws a single image</td></tr><tr><td><code>AnimatedSprite2D</code></td><td>Draws frame-based animations</td></tr><tr><td><code>CharacterBody2D</code></td><td>A body you move with code (players, enemies)</td></tr><tr><td><code>Area2D</code></td><td>Detects overlaps (pickups, triggers, hitboxes)</td></tr><tr><td><code>CollisionShape2D</code></td><td>Defines the physical shape of a body/area</td></tr><tr><td><code>Label</code> / <code>Button</code></td><td>UI (a <code>Control</code> node)</td></tr><tr><td><code>Timer</code></td><td>Fires after a delay or repeatedly</td></tr></tbody></table><h3>Finding nodes from script</h3><p>A script often needs to reach a sibling or child node. The cleanest way is <code>@onready</code> plus the <code>$</code> shorthand or <code>%</code> unique-name access.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>access.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node2D\n\n<span class='cm'># $Name walks the child path; @onready waits until the tree is built</span>\n<span class='am'>@onready</span> <span class='pr'>var</span> label: Label = $ScoreLabel\n<span class='am'>@onready</span> <span class='pr'>var</span> timer: Timer = $Spawn/Timer\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    label.text = <span class='ok'>\"Score: 0\"</span></div></div><div class='box danger'><div class='bt'>Watch out.</div> Using <code>$Child</code> in a variable's initializer at the top of the file will crash, because children do not exist yet when the script object is created. That is exactly why <code>@onready</code> exists — it defers the lookup until <code>_ready()</code>.</div><h3>Classes and instances</h3><p>Each script implicitly defines a class. Add <code>class_name Enemy</code> at the top and it becomes a type you can reference everywhere and even add from the node-creation dialog. This is how you will build reusable game objects.</p><div class='box tip'><div class='bt'>Tip.</div> Run with the <em>Output</em> and <em>Debugger</em> panels open at the bottom. <code>print()</code> goes to Output; runtime errors with a full stack trace go to Debugger. Reading stack traces is the single fastest way to improve.</div><div class='game'><div class='game-head'>🎮 Build This: Interactive Scene — Roam v2 (Collectibles)</div><div class='game-body'><p>This <strong>extends Roam</strong> from Lesson 1 — still pre-genre groundwork, now adding state and logic with GDScript.</p><ol><li>Open <code>roam.tscn</code> and attach a fresh script to the root with <code>class_name RoamGame</code>.</li><li>Add a <code>Label</code> child named <code>ScoreLabel</code>; reference it with <code>@onready</code>.</li><li>Add a <code>var score: int = 0</code> and a function <code>add_point()</code> that increments it and updates the label text.</li><li>For now, call <code>add_point()</code> when the player presses the Space key (use <code>Input.is_action_just_pressed</code> next lesson; for today <code>Input.is_key_pressed(KEY_SPACE)</code> with a cooldown works).</li><li>Run and confirm the score label updates. You now have movement plus game state — the foundation for Pong.</li></ol></div></div>"},{"id":"p1-3","part":"01 · Godot","nav":"Signals & Input","num":"1.3","kicker":"Part 01 · Lesson 3","title":"Signals, Input Mapping, and Building PONG","html":"<h3>Signals: how nodes talk</h3><p>Polling input every frame works, but Godot's real superpower is <strong>signals</strong> — an event system where one node emits a message and any number of others react, without the emitter knowing who is listening. A button emits <code>pressed</code>. A timer emits <code>timeout</code>. An Area2D emits <code>body_entered</code>. This keeps your code <em>decoupled</em>.</p><h4>Connecting signals</h4><p>You can connect in the editor (Node dock &gt; Signals tab, double-click a signal, pick a target) or in code. In code is explicit and version-control-friendly:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>signals.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node\n\n<span class='am'>@onready</span> <span class='pr'>var</span> timer: Timer = $Timer\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    <span class='cm'># connect Timer.timeout to our handler function</span>\n    timer.timeout.connect(_on_timer_timeout)\n    timer.start()\n\n<span class='pr'>func</span> _on_timer_timeout() -&gt; <span class='cm'>void</span>:\n    print(<span class='ok'>\"tick\"</span>)</div></div><h4>Defining your own signals</h4><p>Declare a custom signal with <code>signal</code> and fire it with <code>emit()</code>. This is how a ball tells the game it scored.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ball.gd</span></div><div class='term-body'><span class='pr'>extends</span> Area2D\n\n<span class='pr'>signal</span> scored(side: <span class='cm'>String</span>)\n\n<span class='pr'>func</span> _on_left_goal() -&gt; <span class='cm'>void</span>:\n    scored.emit(<span class='ok'>\"right\"</span>)  <span class='cm'># right player gets the point</span></div></div><h3>Input mapping</h3><p>Hard-coding <code>KEY_UP</code> is fragile. Instead define named <strong>actions</strong> in <em>Project &gt; Project Settings &gt; Input Map</em>. Add actions like <code>p1_up</code>, <code>p1_down</code>, <code>p2_up</code>, <code>p2_down</code> and bind keys (and gamepad buttons) to each. Then read them by name:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>input.gd</span></div><div class='term-body'><span class='cm'># returns -1..1 from a pair of actions, gamepad-aware</span>\n<span class='pr'>var</span> dir := Input.get_axis(<span class='ok'>\"p1_up\"</span>, <span class='ok'>\"p1_down\"</span>)\n<span class='cm'># one-shot events (jump, fire) use just_pressed</span>\n<span class='pr'>if</span> Input.is_action_just_pressed(<span class='ok'>\"ui_accept\"</span>):\n    print(<span class='ok'>\"start\"</span>)</div></div><div class='box law'><div class='bt'>Rule.</div> Never reference raw key codes in gameplay scripts. Map an action, read the action. Your future self (and your gamepad-using players) will thank you.</div><h3>Pong's anatomy</h3><p>Pong is the perfect first real game: two paddles, one ball, a score. Paddles are simple bodies clamped to the screen. The ball moves at a constant velocity and bounces. Two <code>Area2D</code> goals on the left and right edges detect the ball and emit a score.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>paddle.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> up_action := <span class='ok'>\"p1_up\"</span>\n<span class='am'>@export</span> <span class='pr'>var</span> down_action := <span class='ok'>\"p1_down\"</span>\n<span class='am'>@export</span> <span class='pr'>var</span> speed := <span class='ok'>400.0</span>\n\n<span class='pr'>func</span> _process(delta: <span class='cm'>float</span>) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> v := Input.get_axis(up_action, down_action)\n    position.y += v * speed * delta\n    position.y = clamp(position.y, <span class='ok'>40</span>, <span class='ok'>608</span>)</div></div><div class='game'><div class='game-head'>🎮 Build This: Arcade — PONG</div><div class='game-body'><p>This <strong>starts the ARCADE genre</strong> — your first complete game. It introduces the paddle-and-ball collision you will reuse in Breakout next lesson.</p><ol><li>New scene <code>pong.tscn</code>, root <code>Node2D</code>. Add two paddle <code>Node2D</code>s (left/right) with the script above; set their actions to <code>p1_*</code> and <code>p2_*</code>.</li><li>Define those four actions plus <code>ui_accept</code> in the Input Map.</li><li>Add a ball as an <code>Area2D</code> with a <code>CollisionShape2D</code>; give it a <code>velocity: Vector2</code> and move it each frame. Reflect <code>velocity.x</code> when it overlaps a paddle, reflect <code>velocity.y</code> at top/bottom.</li><li>Add left/right goal <code>Area2D</code>s. Emit a custom <code>scored(side)</code> signal; the main script listens, increments a <code>Label</code> score, and resets the ball to center.</li><li>Wire start/restart to <code>ui_accept</code>. Run with two players and play a full match.</li></ol></div></div>"},{"id":"p1-4","part":"01 · Godot","nav":"Sprites & Audio","num":"1.4","kicker":"Part 01 · Lesson 4","title":"Sprites, AnimatedSprite2D, Audio, and BREAKOUT","html":"<h3>From static images to animation</h3><p>A <code>Sprite2D</code> shows one image. For frames that change over time — a flickering coin, a walking character — use <code>AnimatedSprite2D</code>, which holds a <code>SpriteFrames</code> resource: a set of named animations, each a list of frames with a playback speed.</p><h4>Building a SpriteFrames resource</h4><ol><li>Add an <code>AnimatedSprite2D</code> node.</li><li>In the Inspector, click the <em>Sprite Frames</em> property and choose <em>New SpriteFrames</em>.</li><li>Click it to open the <em>SpriteFrames</em> editor at the bottom. Create animations like <code>idle</code> and <code>spin</code>.</li><li>Drag image frames in, set FPS, and toggle <em>Loop</em>.</li></ol><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>coin.gd</span></div><div class='term-body'><span class='pr'>extends</span> AnimatedSprite2D\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    play(<span class='ok'>\"spin\"</span>)        <span class='cm'># start an animation by name</span>\n\n<span class='pr'>func</span> pop() -&gt; <span class='cm'>void</span>:\n    play(<span class='ok'>\"collect\"</span>)\n    <span class='pr'>await</span> animation_finished   <span class='cm'># pause until it ends</span>\n    queue_free()             <span class='cm'># remove this node</span></div></div><p><code>await</code> pauses a function until a signal fires — here we wait for the collect animation, then delete the node. <code>queue_free()</code> is the safe way to destroy a node at the end of the frame.</p><h3>Sprite sheets</h3><p>If your art is one image with many frames in a grid, set <code>AnimatedSprite2D</code> to use a sheet, or use a plain <code>Sprite2D</code> with <em>Hframes/Vframes</em> and the <code>frame</code> property. For tile-based art later you will slice sheets automatically.</p><h3>Audio</h3><p>Two nodes cover almost everything: <code>AudioStreamPlayer</code> for non-positional sound (music, UI clicks) and <code>AudioStreamPlayer2D</code> for sound that pans/attenuates by position. Drag a <code>.wav</code> or <code>.ogg</code> into the <em>Stream</em> slot and call <code>play()</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sfx.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node\n\n<span class='am'>@onready</span> <span class='pr'>var</span> bounce: AudioStreamPlayer = $Bounce\n<span class='am'>@onready</span> <span class='pr'>var</span> music: AudioStreamPlayer = $Music\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    music.play()\n\n<span class='pr'>func</span> on_hit() -&gt; <span class='cm'>void</span>:\n    bounce.pitch_scale = randf_range(<span class='ok'>0.9</span>, <span class='ok'>1.1</span>)  <span class='cm'># vary pitch so it feels alive</span>\n    bounce.play()</div></div><div class='box tip'><div class='bt'>Tip.</div> Use <em>Audio Buses</em> (the Audio panel at the bottom) to group sounds: a <code>Music</code> bus and an <code>SFX</code> bus you can mute or volume-control independently. Your settings menu in the capstone will adjust these.</div><h3>Reusing Pong's collision in Breakout</h3><p>Breakout is Pong with one paddle, a wall of bricks, and a ball that destroys what it touches. The paddle and ball-bounce logic transfer almost directly — you are <em>extending the arcade genre</em>. The new idea is <strong>instancing many objects</strong>: build one <code>brick.tscn</code>, then spawn a grid of them.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>brick_grid.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> brick_scene: PackedScene\n<span class='am'>@export</span> <span class='pr'>var</span> cols := <span class='ok'>10</span>\n<span class='am'>@export</span> <span class='pr'>var</span> rows := <span class='ok'>5</span>\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    <span class='pr'>for</span> r <span class='pr'>in</span> range(rows):\n        <span class='pr'>for</span> c <span class='pr'>in</span> range(cols):\n            <span class='pr'>var</span> b := brick_scene.instantiate()\n            b.position = Vector2(<span class='ok'>80</span> + c * <span class='ok'>96</span>, <span class='ok'>80</span> + r * <span class='ok'>40</span>)\n            add_child(b)</div></div><div class='game'><div class='game-head'>🎮 Build This: Arcade — BREAKOUT</div><div class='game-body'><p>This <strong>extends the ARCADE genre</strong> from Pong, reusing your paddle and ball-bounce code while adding instancing, animation, and audio.</p><ol><li>New scene <code>breakout.tscn</code>. Copy your Pong paddle and ball logic; keep only one paddle at the bottom that moves left/right.</li><li>Make <code>brick.tscn</code> as an <code>Area2D</code> with an <code>AnimatedSprite2D</code>; on overlap with the ball play a <code>break</code> animation then <code>queue_free()</code>.</li><li>Spawn a grid using <code>brick_grid.gd</code> and an exported <code>brick_scene</code>.</li><li>Add a bounce SFX (vary pitch) and looping music via audio buses.</li><li>Track score on a <code>Label</code>; when all bricks are gone, show a win and let <code>ui_accept</code> restart. Lose the ball off the bottom = game over.</li></ol></div></div>"},{"id":"p1-5","part":"01 · Godot","nav":"Physics & Platformer","num":"1.5","kicker":"Part 01 · Lesson 5","title":"2D Physics, Tilemaps, and a 2D PLATFORMER","html":"<h3>Real physics bodies</h3><p>So far you moved nodes by hand. Now meet Godot's 2D physics. Three body types matter:</p><table><thead><tr><th>Body</th><th>Use it for</th></tr></thead><tbody><tr><td><code>StaticBody2D</code></td><td>Walls, ground — never moves</td></tr><tr><td><code>CharacterBody2D</code></td><td>Player/enemies you move with code but want collision response</td></tr><tr><td><code>RigidBody2D</code></td><td>Objects fully simulated by the physics engine</td></tr></tbody></table><p>For platformers and most action games you want <code>CharacterBody2D</code>: you control it, but it slides along walls and stops at floors automatically via <code>move_and_slide()</code>.</p><h4>Gravity and jumping</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>player.gd</span></div><div class='term-body'><span class='pr'>extends</span> CharacterBody2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> speed := <span class='ok'>300.0</span>\n<span class='am'>@export</span> <span class='pr'>var</span> jump_force := <span class='ok'>-600.0</span>   <span class='cm'># negative = up</span>\n<span class='am'>@export</span> <span class='pr'>var</span> gravity := <span class='ok'>1500.0</span>\n\n<span class='pr'>func</span> _physics_process(delta: <span class='cm'>float</span>) -&gt; <span class='cm'>void</span>:\n    <span class='cm'># apply gravity while airborne</span>\n    <span class='pr'>if</span> <span class='pr'>not</span> is_on_floor():\n        velocity.y += gravity * delta\n    <span class='cm'># jump only when grounded</span>\n    <span class='pr'>if</span> Input.is_action_just_pressed(<span class='ok'>\"jump\"</span>) <span class='pr'>and</span> is_on_floor():\n        velocity.y = jump_force\n    <span class='cm'># horizontal movement</span>\n    <span class='pr'>var</span> dir := Input.get_axis(<span class='ok'>\"move_left\"</span>, <span class='ok'>\"move_right\"</span>)\n    velocity.x = dir * speed\n    move_and_slide()</div></div><p>Use <code>_physics_process</code> (fixed timestep) for physics, not <code>_process</code>. <code>move_and_slide()</code> reads <code>velocity</code>, moves the body, resolves collisions, and updates <code>is_on_floor()</code> for next frame.</p><h3>Collision layers and masks</h3><p>Every body has a <strong>layer</strong> (what it <em>is</em>) and a <strong>mask</strong> (what it <em>scans for</em>). A coin sits on the <em>pickups</em> layer; the player's mask includes <em>pickups</em> so it detects them, while enemies ignore them. Name your layers in <em>Project Settings &gt; Layer Names &gt; 2D Physics</em> so the checkboxes read like <code>Player</code>, <code>World</code>, <code>Enemy</code>, <code>Pickup</code>.</p><div class='box law'><div class='bt'>Rule.</div> Two objects only interact if one's <em>mask</em> includes the other's <em>layer</em>. Most collision bugs are layer/mask mistakes — check these first.</div><h3>Tilemaps</h3><p>Hand-placing platforms is painful. A <strong>TileMapLayer</strong> lets you paint a level from a <code>TileSet</code> — a palette of tiles, each able to carry its own collision shape. Workflow:</p><ol><li>Add a <code>TileMapLayer</code> node.</li><li>Create a <code>TileSet</code> in its <em>Tile Set</em> property; add your tile sheet as an atlas and auto-slice it.</li><li>In the TileSet editor, give solid tiles a <em>physics layer</em> and draw collision polygons on them.</li><li>Use the <em>TileMap</em> bottom panel to paint your level.</li></ol><p>Now your painted ground is solid automatically — no per-platform <code>StaticBody2D</code> needed. This is how you build whole worlds fast.</p><h3>Area2D for pickups and hazards</h3><p>Use an <code>Area2D</code> (not a body) for coins, spikes, and checkpoints. Connect its <code>body_entered</code> signal and check what entered:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>coin.gd</span></div><div class='term-body'><span class='pr'>extends</span> Area2D\n\n<span class='pr'>signal</span> collected\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    body_entered.connect(_on_body_entered)\n\n<span class='pr'>func</span> _on_body_entered(body: Node2D) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>if</span> body.is_in_group(<span class='ok'>\"player\"</span>):\n        collected.emit()\n        queue_free()</div></div><div class='box tip'><div class='bt'>Tip.</div> Add nodes to <strong>groups</strong> (Node dock &gt; Groups, e.g. <code>player</code>) so detection code asks \"are you a player?\" instead of checking exact class paths. Groups keep gameplay code flexible.</div><div class='game'><div class='game-head'>🎮 Build This: Platformer — Leap</div><div class='game-body'><p>This <strong>STARTS A NEW GENRE: the 2D platformer</strong> — your first game with gravity, jumping, and tile-painted levels.</p><ol><li>New scene <code>leap.tscn</code>. Add a <code>CharacterBody2D</code> player with the gravity/jump script and an <code>AnimatedSprite2D</code> (idle/run/jump animations).</li><li>Define <code>move_left</code>, <code>move_right</code>, and <code>jump</code> actions.</li><li>Add a <code>TileMapLayer</code>, build a <code>TileSet</code> with collision, and paint a level with gaps and platforms.</li><li>Set layers/masks: player on <em>Player</em>, ground on <em>World</em>, coins on <em>Pickup</em>.</li><li>Scatter <code>coin.tscn</code> Area2Ds and add a spike hazard that resets the player to a start position. Track coins on a <code>Label</code>. Reach a goal flag to win.</li></ol></div></div>"},{"id":"p1-6","part":"01 · Godot","nav":"Top-Down Shooter","num":"1.6","kicker":"Part 01 · Lesson 6","title":"Top-Down Movement, Aiming, and Shooting Projectiles","html":"<h3>A different kind of character</h3><p>A platformer pulls you down with gravity. A <strong>top-down</strong> game has no gravity — the player moves freely in eight directions and usually <em>aims</em> independently of movement. The body is still a <code>CharacterBody2D</code>, but the movement code changes.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>topdown_player.gd</span></div><div class='term-body'><span class='pr'>extends</span> CharacterBody2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> speed := <span class='ok'>260.0</span>\n<span class='am'>@export</span> <span class='pr'>var</span> bullet_scene: PackedScene\n<span class='am'>@onready</span> <span class='pr'>var</span> muzzle: Marker2D = $Muzzle\n\n<span class='pr'>func</span> _physics_process(_delta: <span class='cm'>float</span>) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> dir := Input.get_vector(<span class='ok'>\"move_left\"</span>, <span class='ok'>\"move_right\"</span>, <span class='ok'>\"move_up\"</span>, <span class='ok'>\"move_down\"</span>)\n    velocity = dir * speed\n    move_and_slide()\n    <span class='cm'># face the mouse</span>\n    look_at(get_global_mouse_position())\n    <span class='pr'>if</span> Input.is_action_just_pressed(<span class='ok'>\"fire\"</span>):\n        shoot()</div></div><p><code>Input.get_vector(...)</code> returns a normalized <code>Vector2</code> from four actions in one call — perfect for top-down. <code>look_at()</code> rotates the node toward a point; <code>get_global_mouse_position()</code> gives the cursor in world space.</p><h3>Spawning projectiles</h3><p>A bullet is its own scene you instantiate at the muzzle and add to the world. Crucially, add it to the <em>scene tree</em>, not as a child of the player — otherwise it moves and rotates with the player.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>shoot.gd</span></div><div class='term-body'><span class='pr'>func</span> shoot() -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> b := bullet_scene.instantiate()\n    b.global_position = muzzle.global_position\n    b.rotation = rotation\n    get_tree().current_scene.add_child(b)</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>bullet.gd</span></div><div class='term-body'><span class='pr'>extends</span> Area2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> speed := <span class='ok'>700.0</span>\n<span class='am'>@export</span> <span class='pr'>var</span> damage := <span class='ok'>1</span>\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    body_entered.connect(_on_hit)\n    $Lifetime.timeout.connect(queue_free)  <span class='cm'># Timer auto-deletes stray bullets</span>\n\n<span class='pr'>func</span> _physics_process(delta: <span class='cm'>float</span>) -&gt; <span class='cm'>void</span>:\n    position += Vector2.RIGHT.rotated(rotation) * speed * delta\n\n<span class='pr'>func</span> _on_hit(body: Node2D) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>if</span> body.has_method(<span class='ok'>\"take_damage\"</span>):\n        body.take_damage(damage)\n    queue_free()</div></div><div class='box danger'><div class='bt'>Watch out.</div> Always give bullets a <strong>lifetime</strong> Timer. A bullet that flies off-screen forever is a memory leak; thousands of them tank performance. The Timer's <code>timeout</code> calls <code>queue_free()</code>.</div><h3>Health and the duck-typed interface</h3><p>Notice <code>body.has_method(\"take_damage\")</code>. Instead of checking exact types, we ask \"can you take damage?\" Any node — enemy, breakable crate, the player — that defines <code>take_damage(amount)</code> works with every bullet. This loose coupling scales beautifully as you add content.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>enemy.gd</span></div><div class='term-body'><span class='pr'>extends</span> CharacterBody2D\n<span class='pr'>class_name</span> Enemy\n\n<span class='am'>@export</span> <span class='pr'>var</span> hp := <span class='ok'>3</span>\n\n<span class='pr'>func</span> take_damage(amount: <span class='cm'>int</span>) -&gt; <span class='cm'>void</span>:\n    hp -= amount\n    <span class='pr'>if</span> hp &lt;= <span class='ok'>0</span>:\n        queue_free()</div></div><div class='box tip'><div class='bt'>Tip.</div> Use a <code>Marker2D</code> as a muzzle so you can position the spawn point visually and even animate it. Markers are invisible at runtime and exist purely to mark a spot.</div><div class='game'><div class='game-head'>🎮 Build This: Top-Down Shooter — Outpost</div><div class='game-body'><p>This <strong>STARTS A NEW GENRE: the top-down adventure/shooter</strong>. The player you build here is reused for the wave-survival game next lesson.</p><ol><li>New scene <code>outpost.tscn</code>. Add the <code>CharacterBody2D</code> top-down player with eight-direction movement, mouse aiming, and a <code>Muzzle</code> marker.</li><li>Define <code>move_up/down/left/right</code> and <code>fire</code> actions.</li><li>Make <code>bullet.tscn</code> (Area2D + lifetime Timer) and wire shooting on the <code>fire</code> action.</li><li>Make <code>enemy.tscn</code> with <code>take_damage()</code> and simple chase behavior (move toward the player each frame).</li><li>Use collision layers: bullets hit <em>Enemy</em>, enemies hit <em>Player</em>. Add walls with a <code>TileMapLayer</code> and give the player health. Display HP and a kill count on Labels.</li></ol></div></div>"},{"id":"p1-7","part":"01 · Godot","nav":"Wave Survival","num":"1.7","kicker":"Part 01 · Lesson 7","title":"Spawners, Timers, Difficulty Curves, and WAVE SURVIVAL","html":"<h3>Procedural spawning</h3><p>A wave-survival game is a stress test of everything so far: your top-down player faces endless, escalating enemy waves. The new craft is <strong>controlled randomness and pacing</strong> — spawning enemies over time, at growing intensity, in a way that feels fair.</p><h4>A spawner with a Timer</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>spawner.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> enemy_scene: PackedScene\n<span class='am'>@export</span> <span class='pr'>var</span> spawn_radius := <span class='ok'>600.0</span>\n<span class='am'>@onready</span> <span class='pr'>var</span> timer: Timer = $Timer\n<span class='pr'>var</span> wave := <span class='ok'>1</span>\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    timer.timeout.connect(_spawn)\n    timer.start()\n\n<span class='pr'>func</span> _spawn() -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> e := enemy_scene.instantiate()\n    <span class='cm'># pick a random angle on a circle around the center</span>\n    <span class='pr'>var</span> angle := randf() * TAU\n    e.global_position = global_position + Vector2.RIGHT.rotated(angle) * spawn_radius\n    get_tree().current_scene.add_child(e)</div></div><p><code>randf()</code> gives a float in 0..1; <code>TAU</code> is a full circle in radians. Multiplying gives a uniformly random direction so enemies pour in from all sides.</p><h3>Difficulty curve</h3><p>A survival game lives or dies on pacing. Tie spawn rate and enemy stats to a rising <code>wave</code> counter. A second Timer advances the wave every N seconds and shortens the spawn interval:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>difficulty.gd</span></div><div class='term-body'><span class='pr'>func</span> next_wave() -&gt; <span class='cm'>void</span>:\n    wave += <span class='ok'>1</span>\n    <span class='cm'># spawn faster, but clamp so it never gets impossible</span>\n    timer.wait_time = max(<span class='ok'>0.25</span>, <span class='ok'>1.5</span> - wave * <span class='ok'>0.1</span>)\n    print(<span class='ok'>\"Wave \"</span> + str(wave))</div></div><div class='box tip'><div class='bt'>Tip.</div> Always <code>clamp</code> or <code>max</code> your difficulty values. An unbounded curve spawns thousands of enemies and freezes the game. Bound everything: spawn rate, enemy count, projectile count.</div><h3>Object pooling for performance</h3><p>Constantly instancing and freeing enemies/bullets can stutter. For heavy spawning, keep a <strong>pool</strong> of reusable nodes: hide and deactivate instead of <code>queue_free()</code>, then reactivate from the pool. Start simple (instantiate/free) and only pool if you see frame drops in the profiler (<em>Debugger &gt; Profiler</em>).</p><h3>An Autoload for global game state</h3><p>Score, wave, and game-over state need to live somewhere persistent. Create a singleton with <em>Project Settings &gt; Autoload</em>: add <code>game_state.gd</code> with a node name like <code>GameState</code>. Now any script reads <code>GameState.score</code> directly.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>game_state.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node\n\n<span class='pr'>signal</span> score_changed(value: <span class='cm'>int</span>)\n<span class='pr'>var</span> score := <span class='ok'>0</span>\n\n<span class='pr'>func</span> add_score(n: <span class='cm'>int</span>) -&gt; <span class='cm'>void</span>:\n    score += n\n    score_changed.emit(score)  <span class='cm'># UI listens and updates</span></div></div><div class='box law'><div class='bt'>Rule.</div> Autoloads are global state. Keep them small and focused (one for game state, maybe one for audio). Do not dump everything into one giant singleton — that becomes a maintenance nightmare.</div><div class='game'><div class='game-head'>🎮 Build This: Wave Survival — Last Stand</div><div class='game-body'><p>This <strong>STARTS A NEW GENRE: wave survival</strong>, and <strong>extends your top-down player and enemy</strong> from Lesson 6.</p><ol><li>New scene <code>last_stand.tscn</code>. Drop in your top-down player and bullet from Outpost.</li><li>Add a <code>Spawner</code> that rings enemies in around the arena using the radius/angle trick.</li><li>Add an <code>Autoload</code> <code>GameState</code> tracking score and connect <code>score_changed</code> to a Label.</li><li>Increase difficulty each wave by shortening the spawn interval (clamped) and nudging enemy speed.</li><li>On player death, show \"You survived N waves\" and let <code>ui_accept</code> restart. Add SFX for shots/hits and looping tense music.</li></ol></div></div>"},{"id":"p1-8","part":"01 · Godot","nav":"Puzzle & Runner","num":"1.8","kicker":"Part 01 · Lesson 8","title":"Grid Logic, UI (Control), and Two New Genres: PUZZLE & RUNNER","html":"<h3>Thinking in grids</h3><p>Puzzle games like Sokoban live on a <strong>grid</strong>, not in free space. The trick is to separate the <em>logic grid</em> (a 2D array of cell states) from the <em>visual</em> nodes. You compute moves on the array, then move sprites to match. A grid cell maps to a pixel position by multiplying by tile size.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sokoban.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node2D\n\n<span class='pr'>const</span> TILE := <span class='ok'>64</span>\n<span class='pr'>var</span> player_cell := Vector2i(<span class='ok'>2</span>, <span class='ok'>2</span>)\n<span class='pr'>var</span> walls := {}   <span class='cm'># Dictionary used as a set of Vector2i</span>\n<span class='pr'>var</span> boxes := {}   <span class='cm'># cell -&gt; box node</span>\n\n<span class='pr'>func</span> try_move(step: Vector2i) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> target := player_cell + step\n    <span class='pr'>if</span> walls.has(target): <span class='pr'>return</span>\n    <span class='pr'>if</span> boxes.has(target):\n        <span class='pr'>var</span> beyond := target + step\n        <span class='pr'>if</span> walls.has(beyond) <span class='pr'>or</span> boxes.has(beyond): <span class='pr'>return</span>\n        push_box(target, beyond)\n    player_cell = target\n    $Player.position = Vector2(player_cell) * TILE</div></div><p>Reading input as discrete steps (not continuous velocity) is what makes it a puzzle: each press is one grid move. Use <code>is_action_just_pressed</code> for crisp, one-step-per-tap control.</p><h3>UI with Control nodes</h3><p>Gameplay uses <code>Node2D</code>; interface uses <code>Control</code>. Control nodes have <strong>anchors</strong> and <strong>containers</strong> that lay themselves out responsively across screen sizes. Key nodes:</p><table><thead><tr><th>Node</th><th>Use</th></tr></thead><tbody><tr><td><code>Control</code></td><td>Base UI element with anchoring</td></tr><tr><td><code>Label</code> / <code>Button</code></td><td>Text and clickable buttons</td></tr><tr><td><code>VBoxContainer</code>/<code>HBoxContainer</code></td><td>Auto-stack children vertically/horizontally</td></tr><tr><td><code>CanvasLayer</code></td><td>Draws UI on top of the world, ignoring camera</td></tr></tbody></table><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>menu.gd</span></div><div class='term-body'><span class='pr'>extends</span> Control\n\n<span class='pr'>func</span> _ready() -&gt; <span class='cm'>void</span>:\n    $VBox/PlayButton.pressed.connect(_on_play)\n    $VBox/QuitButton.pressed.connect(get_tree().quit)\n\n<span class='pr'>func</span> _on_play() -&gt; <span class='cm'>void</span>:\n    get_tree().change_scene_to_file(<span class='ok'>\"res://runner.tscn\"</span>)</div></div><p><code>change_scene_to_file</code> swaps the whole running scene — that is your menu-to-game flow.</p><h3>Endless runner: procedural generation</h3><p>A runner scrolls the world toward a fixed-position player who only jumps. The world is generated on the fly: spawn ground/obstacle chunks ahead, recycle them once off-screen. The player's run is faked by moving the world left.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>runner.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node2D\n\n<span class='am'>@export</span> <span class='pr'>var</span> scroll_speed := <span class='ok'>400.0</span>\n<span class='am'>@export</span> <span class='pr'>var</span> obstacle_scene: PackedScene\n<span class='pr'>var</span> spawn_x := <span class='ok'>1200.0</span>\n\n<span class='pr'>func</span> _process(delta: <span class='cm'>float</span>) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>for</span> ob <span class='pr'>in</span> get_tree().get_nodes_in_group(<span class='ok'>\"scroll\"</span>):\n        ob.position.x -= scroll_speed * delta\n        <span class='pr'>if</span> ob.position.x &lt; <span class='ok'>-100</span>: ob.queue_free()\n\n<span class='pr'>func</span> spawn_obstacle() -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> o := obstacle_scene.instantiate()\n    o.add_to_group(<span class='ok'>\"scroll\"</span>)\n    o.position = Vector2(spawn_x, randi_range(<span class='ok'>500</span>, <span class='ok'>620</span>))\n    add_child(o)</div></div><div class='box tip'><div class='bt'>Tip.</div> For an infinite floor, place two ground tiles side by side; when one scrolls fully off the left, snap it back to the right of the other. This \"leapfrog\" trick gives a seamless treadmill cheaply.</div><div class='game'><div class='game-head'>🎮 Build This: TWO games — Puzzle (Shift) and Runner (Dash)</div><div class='game-body'><p>This <strong>STARTS TWO NEW GENRES</strong>. First a <strong>puzzle</strong> (Sokoban-style), then an <strong>endless runner</strong> (procedural) — broadening your portfolio to seven distinct games.</p><ol><li><strong>Shift (puzzle):</strong> grid-based Sokoban using the logic-array approach; push boxes onto goal tiles, win when all are covered. Add a move counter and reset key.</li><li><strong>Dash (runner):</strong> a fixed-position jumper (reuse your platformer gravity/jump) over scrolling, recycled obstacles; distance score increases over time and speed ramps up. Game over on collision.</li><li>Give both games a <code>Control</code>-based main menu with Play/Quit buttons using <code>change_scene_to_file</code>.</li><li>Put HUD (score, moves) on a <code>CanvasLayer</code> so it stays fixed on screen.</li></ol></div></div>"},{"id":"p1-9","part":"01 · Godot","nav":"Saving & Capstone","num":"1.9","kicker":"Part 01 · Lesson 9","title":"Saving, Polish (Juice), Exporting, and the CAPSTONE","html":"<h3>Saving and loading</h3><p>A portfolio game remembers things: high scores, settings, progress. Godot writes to a per-user folder accessed via the <code>user://</code> path (the real location differs per OS, but <code>user://</code> always works, including in web exports via browser storage). Use JSON for readable saves.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>save_system.gd</span></div><div class='term-body'><span class='pr'>extends</span> Node\n\n<span class='pr'>const</span> PATH := <span class='ok'>\"user://save.json\"</span>\n\n<span class='pr'>func</span> save_game(data: Dictionary) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> f := FileAccess.open(PATH, FileAccess.WRITE)\n    f.store_string(JSON.stringify(data))\n    f.close()\n\n<span class='pr'>func</span> load_game() -&gt; Dictionary:\n    <span class='pr'>if</span> <span class='pr'>not</span> FileAccess.file_exists(PATH): <span class='pr'>return</span> {}\n    <span class='pr'>var</span> f := FileAccess.open(PATH, FileAccess.READ)\n    <span class='pr'>var</span> text := f.get_as_text()\n    f.close()\n    <span class='pr'>var</span> result = JSON.parse_string(text)\n    <span class='pr'>return</span> result <span class='pr'>if</span> result <span class='pr'>is</span> Dictionary <span class='pr'>else</span> {}</div></div><div class='box danger'><div class='bt'>Watch out.</div> Never save to <code>res://</code> — that is your project, read-only once exported. Always use <code>user://</code> for anything written at runtime.</div><h3>Juice: the difference between a demo and a game</h3><p><strong>Juice</strong> is the cheap visual/audio feedback that makes a game feel alive. Add it last, add it everywhere:</p><ul><li><strong>Tweens</strong> for smooth motion: <code>create_tween().tween_property(node, \"scale\", Vector2(1.2,1.2), 0.1)</code> to pop a coin on pickup.</li><li><strong>Screen shake</strong>: nudge the <code>Camera2D</code> offset randomly for a few frames on impact.</li><li><strong>Particles</strong>: <code>GPUParticles2D</code> bursts for explosions and pickups.</li><li><strong>Hit-stop</strong>: briefly set <code>Engine.time_scale</code> low on a big hit.</li><li><strong>Sound on every action</strong> — even UI hovers.</li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>juice.gd</span></div><div class='term-body'><span class='pr'>func</span> pop(node: Node2D) -&gt; <span class='cm'>void</span>:\n    <span class='pr'>var</span> t := create_tween()\n    t.tween_property(node, <span class='ok'>\"scale\"</span>, Vector2(<span class='ok'>1.3</span>, <span class='ok'>1.3</span>), <span class='ok'>0.08</span>)\n    t.tween_property(node, <span class='ok'>\"scale\"</span>, Vector2.ONE, <span class='ok'>0.08</span>)</div></div><h3>Exporting to desktop and web</h3><p>Install <em>export templates</em> via <em>Editor &gt; Manage Export Templates</em>. Then <em>Project &gt; Export</em>, add a preset:</p><table><thead><tr><th>Target</th><th>Notes</th></tr></thead><tbody><tr><td>Windows/macOS/Linux</td><td>Produces a native executable; set an icon and app name</td></tr><tr><td>Web (HTML5)</td><td>Outputs <code>index.html</code> + data; runs in-browser, perfect for itch.io</td></tr></tbody></table><div class='box law'><div class='bt'>Rule.</div> For web, use the <em>Compatibility</em> renderer (you chose it in Lesson 1) and test the export locally with a server (<code>python -m http.server</code> in the export folder) — opening <code>index.html</code> directly will fail due to browser security.</div><div class='box tip'><div class='bt'>Tip.</div> Upload the web build's zipped folder to itch.io, tick \"This file will be played in the browser,\" and you have a public, playable portfolio link to share with employers.</div><h3>Choosing your capstone</h3><p>Pick the game you love most from the arc — Breakout, Leap, Outpost, Last Stand, Shift, or Dash — and finish it properly. A portfolio game is judged on <em>completeness and feel</em>, not scope. One polished game beats six prototypes.</p><div class='game'><div class='game-head'>🎮 Build This: CAPSTONE — Ship One Game</div><div class='game-body'><p>This is the <strong>CAPSTONE</strong>: it <strong>extends ONE</strong> of the games you built earlier into a finished, portfolio-ready product across whatever genre you chose.</p><ol><li>Pick one prior game. Add a <code>Control</code> <strong>main menu</strong> (Play, Settings, Quit) and a <strong>game-over/win screen</strong> with restart.</li><li>Add a <strong>settings menu</strong> that controls Music and SFX bus volumes.</li><li>Implement <strong>save/load</strong> with the JSON system: persist the high score (and progress if relevant) to <code>user://</code>.</li><li>Add <strong>juice</strong>: tweened pops, screen shake on impact, a particle burst, and sound on every meaningful action.</li><li>Set the app icon and name, then <strong>export</strong> to desktop and to web; test the web build via a local server.</li><li>Upload the web build to itch.io. You now have a shareable, finished Godot game and a multi-genre portfolio behind it. Congratulations.</li></ol></div></div>"},{"id":"p2-1","part":"02 · Unity","nav":"Hub & Editor","num":"2.1","kicker":"Part 02 · Lesson 1","title":"Welcome to Unity: Hub, Editor & Your First Roll-A-Ball","html":"<h3>This is your engine</h3><p>You finished Foundations and you chose <strong>Unity</strong> as your single path. Good choice. Unity is a battle-tested, C#-driven engine behind countless shipped games across every genre, and from here on this track stands entirely on its own. You will not need any other engine to go from zero to a real portfolio.</p><p>Here is the portfolio you will build across these nine lessons, each in this one engine:</p><ul><li><strong>Roll-A-Ball</strong> — a 3D arcade collect-em-up (starts today).</li><li><strong>2D Platformer</strong> — jumping, gravity, tiles.</li><li><strong>Top-down Twin-Stick Shooter</strong> — aim and fire in all directions.</li><li><strong>Endless Runner</strong> — procedural spawning and scoring.</li><li><strong>Brick-Breaker</strong> — physics-driven arcade.</li><li><strong>Tower Defense</strong> — prefabs, waves, and enemy paths.</li><li><strong>Puzzle game</strong> — grid logic and state.</li><li><strong>Capstone</strong> — one game polished into a portfolio-ready build.</li></ul><p>Seven genres, one engine, your name on all of them.</p><h3>Unity Hub: your launcher and project manager</h3><p>Unity ships in two pieces. <strong>Unity Hub</strong> is a desktop app that manages engine versions and projects. The <strong>Unity Editor</strong> is the actual game-making tool. You install one or more Editor versions through the Hub, then create projects against them.</p><ol><li>Download Unity Hub from unity.com and sign in with a (free) Unity account.</li><li>In the Hub, open the <strong>Installs</strong> tab and add a recent <strong>LTS</strong> (Long-Term Support) Editor version. LTS releases are the stable ones you want for learning and shipping.</li><li>During install, include the <strong>build support modules</strong> for your platform (Windows/Mac) plus <strong>WebGL</strong> so you can later publish playable browser builds.</li></ol><div class='box tip'><div class='bt'>Tip.</div> Always pick an LTS version. Bleeding-edge releases break tutorials and plugins. Stability beats novelty while you learn.</div><h3>Creating a project</h3><p>In the Hub's <strong>Projects</strong> tab, click <strong>New project</strong>. You choose a <em>template</em> (3D, 2D, URP, etc.), a name, and a folder. Templates just preconfigure render settings and packages — pick the plain <strong>3D</strong> template for today.</p><h3>The Editor layout</h3><p>Unity's Editor is a set of dockable panels. The five you live in:</p><table><thead><tr><th>Panel</th><th>What it does</th></tr></thead><tbody><tr><td><strong>Scene</strong></td><td>3D/2D viewport where you arrange your world.</td></tr><tr><td><strong>Game</strong></td><td>What the player's camera actually sees when you press Play.</td></tr><tr><td><strong>Hierarchy</strong></td><td>A list of every object in the current scene.</td></tr><tr><td><strong>Inspector</strong></td><td>Properties of whatever is selected.</td></tr><tr><td><strong>Project</strong></td><td>All files (assets) on disk for this project.</td></tr></tbody></table><p>The toolbar at top center holds <strong>Play</strong>, <strong>Pause</strong>, and <strong>Step</strong>. Press Play to run your game inside the Editor; press it again to stop.</p><div class='box danger'><div class='bt'>Danger.</div> Changes you make to objects <em>while Play is running</em> are discarded when you stop. The Editor tints slightly to remind you. Never tune values in Play mode and expect them to stick.</div><h3>Navigating the Scene view</h3><p>Right-drag to look around. Hold right-drag and use <code>W A S D</code> to fly (flythrough mode). Scroll to zoom, and press <code>F</code> with an object selected to frame it. The colored gizmo at top-right snaps to axis views. Master this now — you will spend hundreds of hours in this viewport.</p><div class='box lab'><div class='bt'>Lab.</div> Create a 3D project. Add a Cube via <code>GameObject &gt; 3D Object &gt; Cube</code>. Practice flying around it, framing it with F, and switching to top/front views with the gizmo. Press Play and confirm nothing crashes. Save the scene with <code>Ctrl/Cmd+S</code>.</div><div class='game'><div class='game-head'>🎮 Build This: 3D Arcade — Roll-A-Ball (Part 1)</div><div class='game-body'><p>This <strong>STARTS a new genre</strong>: a 3D arcade collect-em-up, the foundation game we extend over the next lessons.</p><ol><li>Create a new 3D project named <code>RollABall</code>.</li><li>Add a <strong>Plane</strong> (<code>GameObject &gt; 3D Object &gt; Plane</code>) as the floor and rename it <code>Ground</code>.</li><li>Add a <strong>Sphere</strong>, rename it <code>Player</code>, and move it just above the plane.</li><li>In the Inspector, set the Player's Position to <code>(0, 0.5, 0)</code> so it rests on the ground.</li><li>Press Play and confirm you can see the sphere on the plane in the Game view.</li><li>Save the scene as <code>Main</code> inside an <code>Assets/Scenes</code> folder.</li></ol></div></div>"},{"id":"p2-2","part":"02 · Unity","nav":"GameObjects","num":"2.2","kicker":"Part 02 · Lesson 2","title":"GameObjects, Components & the Inspector","html":"<h3>Everything is a GameObject</h3><p>A Unity scene is a tree of <strong>GameObjects</strong>. A GameObject by itself does almost nothing — it is an empty container with a name and a position. Its behavior comes entirely from the <strong>components</strong> attached to it. This is the single most important mental model in Unity: <em>GameObject = container, Component = behavior</em>.</p><p>That Sphere you made? It is a GameObject carrying a <code>Transform</code>, a <code>Mesh Filter</code> (the shape), a <code>Mesh Renderer</code> (how it draws), and a <code>Sphere Collider</code> (its physical bounds). Strip those components and you have a nameless empty point in space.</p><h3>The Transform: the one component every object has</h3><p>Every GameObject has exactly one <strong>Transform</strong>, and you cannot remove it. It stores three things:</p><ul><li><strong>Position</strong> — where it is, in world or local units.</li><li><strong>Rotation</strong> — its orientation, shown in degrees (Euler angles).</li><li><strong>Scale</strong> — its size multiplier per axis.</li></ul><p>Unity uses a <strong>left-handed, Y-up</strong> coordinate system: X is right, Y is up, Z is forward. Get comfortable reading the gizmo colors — red=X, green=Y, blue=Z.</p><h3>Parenting and the Hierarchy</h3><p>Drag one object onto another in the Hierarchy to make it a <strong>child</strong>. A child's Transform becomes <em>relative</em> to its parent: move the parent and children follow; the child's Inspector now shows <em>local</em> position. This is how you build composite objects — a car body with wheel children, a player with a camera child.</p><div class='box tip'><div class='bt'>Tip.</div> Use empty GameObjects (<code>GameObject &gt; Create Empty</code>) as organizational folders in the Hierarchy. Name one <code>---Environment---</code> and parent your ground, walls, and props under it to keep large scenes navigable.</div><h3>Working in the Inspector</h3><p>Select any object and the <strong>Inspector</strong> shows a stacked list of its components, each with editable fields. You can:</p><ul><li><strong>Add Component</strong> at the bottom to attach new behavior (a Rigidbody, a script, a Light).</li><li>Toggle a component's checkbox to enable/disable it without removing it.</li><li>Right-click a component header to <strong>Reset</strong>, <strong>Remove</strong>, or <strong>Copy/Paste</strong> its values.</li></ul><h3>Transform tools</h3><p>The top-left toolbar gives you handles in the Scene view, bound to hotkeys:</p><table><thead><tr><th>Key</th><th>Tool</th></tr></thead><tbody><tr><td><code>Q</code></td><td>Pan (Hand)</td></tr><tr><td><code>W</code></td><td>Move</td></tr><tr><td><code>E</code></td><td>Rotate</td></tr><tr><td><code>R</code></td><td>Scale</td></tr></tbody></table><h3>Materials: giving objects color</h3><p>A bare object renders matte gray. To color it you create a <strong>Material</strong> asset (<code>right-click in Project &gt; Create &gt; Material</code>), set its <strong>Albedo</strong> (base color), and drag the material onto the object. Materials are reusable assets — assign the same one to many objects and changing it updates them all.</p><div class='box lab'><div class='bt'>Lab.</div> Select your Ground plane and create a green Material and drag it on. Create a second Material in blue and apply it to the Player sphere. Create an empty GameObject named <code>Walls</code> and parent four scaled cubes under it to box in the play area.</div><div class='game'><div class='game-head'>🎮 Build This: 3D Arcade — Roll-A-Ball (Part 2)</div><div class='game-body'><p>This <strong>EXTENDS your Roll-A-Ball</strong> from Lesson 1, dressing the play area.</p><ol><li>Give the <code>Ground</code> a green material and the <code>Player</code> a distinct blue material.</li><li>Create an empty GameObject named <code>Walls</code> at the world origin.</li><li>Add a Cube, scale it long and thin (e.g. <code>(0.5, 2, 20)</code>), position it at one edge of the plane, and parent it under <code>Walls</code>.</li><li>Duplicate it with <code>Ctrl/Cmd+D</code> three times and arrange the copies to enclose all four sides of the ground.</li><li>Add an empty GameObject named <code>Pickups</code>; you will fill it later. Save the scene.</li></ol></div></div>"},{"id":"p2-3","part":"02 · Unity","nav":"MonoBehaviour","num":"2.3","kicker":"Part 02 · Lesson 3","title":"C# Scripting with MonoBehaviour","html":"<h3>Scripts are components you write</h3><p>You have used built-in components. Now you write your own. A Unity script is a C# class that inherits from <strong>MonoBehaviour</strong>. Once attached to a GameObject it <em>is</em> a component, appearing in the Inspector like any other.</p><p>Create one via <code>right-click in Project &gt; Create &gt; C# Script</code>. Name it carefully — the file name <strong>must</strong> match the class name. Double-click to open it in your code editor (VS Code, Rider, or Visual Studio).</p><h3>The MonoBehaviour lifecycle</h3><p>Unity calls special methods on your script at specific times. You do not call these yourself — the engine does.</p><table><thead><tr><th>Method</th><th>When it runs</th></tr></thead><tbody><tr><td><code>Awake()</code></td><td>Once, when the object loads — before anything else.</td></tr><tr><td><code>Start()</code></td><td>Once, just before the first frame.</td></tr><tr><td><code>Update()</code></td><td>Every frame. Game logic and input go here.</td></tr><tr><td><code>FixedUpdate()</code></td><td>On a fixed physics timestep. Physics code goes here.</td></tr></tbody></table><h3>A first script</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Spinner.cs</span></div><div class='term-body'><span class='cm'>// Rotates whatever it is attached to.</span>\n<span class='pr'>using</span> UnityEngine;\n\n<span class='pr'>public class</span> Spinner : MonoBehaviour\n{\n    <span class='cm'>// public fields appear in the Inspector</span>\n    <span class='pr'>public float</span> speed = <span class='ok'>90f</span>;\n\n    <span class='pr'>void</span> Update()\n    {\n        <span class='cm'>// Time.deltaTime makes motion frame-rate independent</span>\n        transform.Rotate(Vector3.up * speed * Time.deltaTime);\n    }\n}</div></div><h3>Frame-rate independence</h3><p><code>Update()</code> runs more often on fast machines. If you moved an object by a fixed amount each frame, it would move faster on a gaming PC than a laptop. The fix is <strong>Time.deltaTime</strong> — the seconds elapsed since the last frame. Multiply movement by it and your speed becomes <em>units per second</em>, identical on every machine.</p><h3>Public fields and the Inspector</h3><p>Any <code>public</code> field shows up in the Inspector and can be tuned without recompiling. This is huge: you can balance the game by dragging sliders. To expose a private field too, add <code>[SerializeField]</code> above it — preferred, because it keeps the field private to other code while still editable.</p><div class='box tip'><div class='bt'>Tip.</div> Prefer <code>[SerializeField] private float speed;</code> over <code>public float speed;</code>. You get Inspector editing without letting unrelated scripts mutate your value. Encapsulation matters even in game code.</div><h3>Reading player input early</h3><p>To read movement, the classic approach uses <code>Input.GetAxis(\"Horizontal\")</code> and <code>\"Vertical\"</code>, which return a value from -1 to 1 from WASD/arrow keys. We will upgrade to the modern Input System in Lesson 6, but this older API is perfect for getting your ball rolling today.</p><div class='box lab'><div class='bt'>Lab.</div> Write the <code>Spinner</code> script above, attach it to a Cube, press Play, and watch it spin. Then change <code>speed</code> in the Inspector during Play to see live tuning (remember the value resets on stop).</div><div class='game'><div class='game-head'>🎮 Build This: 3D Arcade — Roll-A-Ball (Part 3)</div><div class='game-body'><p>This <strong>EXTENDS your Roll-A-Ball</strong>: the ball now responds to keys.</p><ol><li>Create a script <code>PlayerController.cs</code> and attach it to the <code>Player</code> sphere.</li><li>In <code>Update()</code>, read <code>float h = Input.GetAxis(\"Horizontal\");</code> and <code>float v = Input.GetAxis(\"Vertical\");</code>.</li><li>Add a <code>[SerializeField] private float moveSpeed = 8f;</code> field.</li><li>For now, move directly: <code>transform.Translate(new Vector3(h, 0, v) * moveSpeed * Time.deltaTime);</code>.</li><li>Press Play and steer the ball with WASD. Notice it slides through walls — we fix that with physics next lesson.</li></ol></div></div>"},{"id":"p2-4","part":"02 · Unity","nav":"Physics","num":"2.4","kicker":"Part 02 · Lesson 4","title":"Physics: Rigidbody, Colliders & Triggers","html":"<h3>Letting the engine push things for you</h3><p>So far you moved objects by editing their Transform directly. That ignores physics — your ball slid through walls. To get collisions, gravity, and momentum, you hand control to Unity's physics engine by adding a <strong>Rigidbody</strong>.</p><h3>Rigidbody: the physics body</h3><p>Add a <code>Rigidbody</code> (3D) or <code>Rigidbody2D</code> to a GameObject and the engine now drives its motion. Gravity pulls it down, forces push it, and it stops at colliders. Key fields:</p><ul><li><strong>Mass</strong> — heavier bodies resist forces more.</li><li><strong>Drag</strong> — air resistance that slows linear motion.</li><li><strong>Use Gravity</strong> — toggle the downward pull.</li><li><strong>Is Kinematic</strong> — if on, the body ignores forces and you move it by script; used for platforms and scripted motion.</li><li><strong>Constraints</strong> — freeze position or rotation on chosen axes.</li></ul><div class='box danger'><div class='bt'>Danger.</div> Once an object has a Rigidbody, <strong>do not move it with <code>transform.position</code></strong>. That teleports it past the physics solver and causes tunneling and jitter. Move it with <code>rb.MovePosition()</code> or by applying forces inside <code>FixedUpdate()</code>.</div><h3>Colliders: the shape physics sees</h3><p>A <strong>Collider</strong> defines the volume that participates in collisions. Primitives (<code>Box</code>, <code>Sphere</code>, <code>Capsule</code>) are cheap and accurate; <code>Mesh Collider</code> matches arbitrary geometry but costs more. A collider does <em>not</em> require a Rigidbody — static level geometry (walls, floors) uses colliders with no Rigidbody, and the physics engine treats them as immovable.</p><h3>Forces vs. velocity</h3><p>Inside <code>FixedUpdate()</code> you influence a Rigidbody two main ways:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>PlayerController.cs</span></div><div class='term-body'><span class='pr'>using</span> UnityEngine;\n\n<span class='pr'>public class</span> PlayerController : MonoBehaviour\n{\n    [SerializeField] <span class='pr'>private float</span> moveForce = <span class='ok'>20f</span>;\n    <span class='pr'>private</span> Rigidbody rb;\n    <span class='pr'>private float</span> h, v;\n\n    <span class='pr'>void</span> Awake() { rb = GetComponent&lt;Rigidbody&gt;(); }\n\n    <span class='pr'>void</span> Update() {\n        h = Input.GetAxis(<span class='ok'>\"Horizontal\"</span>);\n        v = Input.GetAxis(<span class='ok'>\"Vertical\"</span>);\n    }\n\n    <span class='pr'>void</span> FixedUpdate() {\n        <span class='cm'>// push the ball; physics handles the wall stops</span>\n        rb.AddForce(<span class='pr'>new</span> Vector3(h, <span class='ok'>0</span>, v) * moveForce);\n    }\n}</div></div><p>Note the split: read <em>input</em> in <code>Update()</code> (runs every frame, catches every keypress) but apply <em>force</em> in <code>FixedUpdate()</code> (runs on the physics clock).</p><h3>Triggers: overlap without collision</h3><p>Sometimes you want to detect overlap without a physical bounce — a coin pickup, a checkpoint, a damage zone. Check a collider's <strong>Is Trigger</strong> box and it stops blocking movement but still fires callbacks:</p><table><thead><tr><th>Callback</th><th>Fires when</th></tr></thead><tbody><tr><td><code>OnCollisionEnter</code></td><td>Two solid colliders hit.</td></tr><tr><td><code>OnTriggerEnter</code></td><td>Something enters a trigger volume.</td></tr><tr><td><code>OnTriggerExit</code></td><td>Something leaves a trigger volume.</td></tr></tbody></table><p>For a trigger to fire, at least one of the two objects must have a Rigidbody. <strong>Tags</strong> (set at the top of the Inspector) let you check <em>what</em> entered: <code>if (other.CompareTag(\"Pickup\"))</code>.</p><div class='box lab'><div class='bt'>Lab.</div> Add a Rigidbody to your Player sphere and rewrite movement to use <code>AddForce</code> in <code>FixedUpdate</code>. Confirm the ball now bumps off the walls instead of passing through.</div><div class='game'><div class='game-head'>🎮 Build This: 3D Arcade — Roll-A-Ball (Part 4: collectibles)</div><div class='game-body'><p>This <strong>EXTENDS your Roll-A-Ball</strong> into a real collect-em-up.</p><ol><li>Give the Player a <code>Rigidbody</code> and switch movement to <code>AddForce</code> in <code>FixedUpdate</code>.</li><li>Add a small Cube as a pickup. Create a tag <code>Pickup</code> and assign it. Check its collider's <strong>Is Trigger</strong>, and give it a glowing material plus a <code>Spinner</code> script for flair.</li><li>On the Player, add <code>OnTriggerEnter(Collider other)</code>; if <code>other.CompareTag(\"Pickup\")</code>, call <code>Destroy(other.gameObject)</code> and increment an <code>int score</code>.</li><li>Duplicate the pickup a dozen times around the arena, parented under <code>Pickups</code>.</li><li>Play and roll around collecting cubes. Log the score with <code>Debug.Log(score)</code>.</li></ol></div></div>"},{"id":"p2-5","part":"02 · Unity","nav":"2D & Prefabs","num":"2.5","kicker":"Part 02 · Lesson 5","title":"Going 2D: Sprites, Prefabs & a Platformer","html":"<h3>A whole new genre: 2D</h3><p>Unity is just as strong in 2D as 3D. Internally a 2D game is a 3D scene viewed straight down the Z axis with an <strong>orthographic</strong> camera (no perspective). The physics swaps to a 2D variant: <code>Rigidbody2D</code>, <code>BoxCollider2D</code>, <code>CircleCollider2D</code>. Time to start a brand-new genre — a side-scrolling <strong>platformer</strong>.</p><h3>Sprites and the SpriteRenderer</h3><p>A <strong>Sprite</strong> is a 2D image asset. Import a PNG, set its <strong>Texture Type</strong> to <code>Sprite (2D and UI)</code> in the Inspector, and drag it into the scene — Unity wraps it in a GameObject with a <strong>SpriteRenderer</strong>. The <strong>Pixels Per Unit</strong> setting controls how many texture pixels equal one world unit; keep it consistent across your art so everything scales together.</p><h3>Sorting: who draws in front</h3><p>In 2D, draw order is controlled by <strong>Sorting Layers</strong> and <strong>Order in Layer</strong> on the SpriteRenderer, not by depth. Create sorting layers like <code>Background</code>, <code>Default</code>, <code>Player</code>, <code>Foreground</code> so your character always renders over the scenery.</p><h3>Prefabs: reusable GameObject blueprints</h3><p>Here is one of Unity's most powerful features. A <strong>Prefab</strong> is a saved GameObject — components, children, values, and all — stored as an asset you can stamp out repeatedly. Make one coin, save it as a prefab, and every coin in your level is an <em>instance</em> of that prefab.</p><p>The magic is <strong>propagation</strong>: edit the prefab asset and every instance updates instantly. Build a hundred platforms, then decide they need a different collider — change the prefab once.</p><ol><li>Drag a configured GameObject from the Hierarchy into the Project window to create a prefab.</li><li>Drag the prefab back into the scene to make instances.</li><li>Double-click the prefab to enter <strong>Prefab Mode</strong> and edit the master copy.</li><li><strong>Overrides</strong> on an instance (bolded fields) can be applied back to the prefab or reverted.</li></ol><div class='box tip'><div class='bt'>Tip.</div> Spawn prefabs at runtime with <code>Instantiate(prefab, position, rotation)</code>. You will lean on this for bullets, enemies, and obstacles in the next several genres. Drag the prefab into a <code>[SerializeField] private GameObject</code> field to reference it.</div><h3>A 2D move + jump script</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>PlatformerMove.cs</span></div><div class='term-body'><span class='pr'>using</span> UnityEngine;\n\n<span class='pr'>public class</span> PlatformerMove : MonoBehaviour\n{\n    [SerializeField] <span class='pr'>private float</span> speed = <span class='ok'>6f</span>;\n    [SerializeField] <span class='pr'>private float</span> jump = <span class='ok'>12f</span>;\n    [SerializeField] <span class='pr'>private</span> Transform groundCheck;\n    [SerializeField] <span class='pr'>private</span> LayerMask groundMask;\n    <span class='pr'>private</span> Rigidbody2D rb;\n\n    <span class='pr'>void</span> Awake() { rb = GetComponent&lt;Rigidbody2D&gt;(); }\n\n    <span class='pr'>void</span> Update() {\n        <span class='pr'>float</span> x = Input.GetAxis(<span class='ok'>\"Horizontal\"</span>);\n        rb.velocity = <span class='pr'>new</span> Vector2(x * speed, rb.velocity.y);\n        <span class='pr'>bool</span> grounded = Physics2D.OverlapCircle(groundCheck.position, <span class='ok'>0.1f</span>, groundMask);\n        <span class='pr'>if</span> (grounded &amp;&amp; Input.GetButtonDown(<span class='ok'>\"Jump\"</span>))\n            rb.velocity = <span class='pr'>new</span> Vector2(rb.velocity.x, jump);\n    }\n}</div></div><p>The <strong>ground check</strong> is the standard trick: an empty child at the character's feet, plus a tiny overlap test against a <code>Ground</code> layer, so you can only jump when standing on something.</p><div class='box lab'><div class='bt'>Lab.</div> Create a 2D scene. Make a player sprite with <code>Rigidbody2D</code> + <code>BoxCollider2D</code>, a few ground sprites with colliders on a <code>Ground</code> layer, and an empty <code>GroundCheck</code> child at the feet. Wire up the script and confirm you can run and jump.</div><div class='game'><div class='game-head'>🎮 Build This: 2D Platformer — Hop Quest (new genre)</div><div class='game-body'><p>This <strong>STARTS a new genre</strong>: a 2D side-scrolling platformer (separate from Roll-A-Ball).</p><ol><li>New 2D scene with an orthographic camera, a player sprite (Rigidbody2D + collider + GroundCheck), and the <code>PlatformerMove</code> script.</li><li>Build a few platforms; turn one into a <strong>Prefab</strong> and stamp out a level.</li><li>Make a <strong>Coin</strong> prefab: sprite, CircleCollider2D set to <strong>Is Trigger</strong>, spinning or bobbing for life.</li><li>On the player, <code>OnTriggerEnter2D</code> destroys coins and adds to a score.</li><li>Add a <strong>Goal</strong> trigger that logs \"You win!\" when reached. Play, run, jump, collect, finish.</li></ol></div></div>"},{"id":"p2-6","part":"02 · Unity","nav":"Input System","num":"2.6","kicker":"Part 02 · Lesson 6","title":"The Input System & a Twin-Stick Shooter","html":"<h3>Upgrading how you read input</h3><p>The old <code>Input.GetAxis</code> API is simple but rigid — it hard-codes keys and does not handle rebinding or gamepads cleanly. Modern Unity ships the <strong>Input System</strong> package: an action-based, device-agnostic system that supports keyboard, mouse, and controllers at once, with rebinding for free. A <strong>twin-stick shooter</strong> — move with one stick, aim/fire with the other — is the perfect genre to learn it.</p><h3>Installing and the action map</h3><ol><li>Open <code>Window &gt; Package Manager</code>, find <strong>Input System</strong>, and install it. Accept the prompt to enable the new backend (the Editor restarts).</li><li>Create an <strong>Input Actions</strong> asset (<code>Create &gt; Input Actions</code>) and double-click it.</li><li>Define an <strong>Action Map</strong> (e.g. <code>Gameplay</code>) containing <strong>Actions</strong>: <code>Move</code> (Value, Vector2), <code>Aim</code> (Value, Vector2), <code>Fire</code> (Button).</li><li>Add <strong>Bindings</strong>: WASD and the left stick for Move, mouse position / right stick for Aim, left-click / right-trigger for Fire.</li><li>Tick <strong>Generate C# Class</strong> so you get a typed wrapper to reference in code.</li></ol><div class='box tip'><div class='bt'>Tip.</div> Think in <em>actions</em>, not keys. \"Fire\" is an intent; whether it comes from a mouse button or a trigger is a binding detail. This separation is why rebinding and controller support become trivial.</div><h3>Reading actions in code</h3><p>The simplest path adds a <strong>PlayerInput</strong> component to your player, points it at the actions asset, and lets it call methods. Or read directly from the generated class:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ShipController.cs</span></div><div class='term-body'><span class='pr'>using</span> UnityEngine;\n<span class='pr'>using</span> UnityEngine.InputSystem;\n\n<span class='pr'>public class</span> ShipController : MonoBehaviour\n{\n    [SerializeField] <span class='pr'>private float</span> speed = <span class='ok'>8f</span>;\n    [SerializeField] <span class='pr'>private</span> GameObject bulletPrefab;\n    [SerializeField] <span class='pr'>private</span> Transform muzzle;\n    <span class='pr'>private</span> Rigidbody2D rb;\n    <span class='pr'>private</span> Vector2 moveInput;\n\n    <span class='pr'>void</span> Awake() { rb = GetComponent&lt;Rigidbody2D&gt;(); }\n\n    <span class='cm'>// called by PlayerInput \"Move\" action</span>\n    <span class='pr'>public void</span> OnMove(InputAction.CallbackContext ctx) {\n        moveInput = ctx.ReadValue&lt;Vector2&gt;();\n    }\n\n    <span class='pr'>public void</span> OnFire(InputAction.CallbackContext ctx) {\n        <span class='pr'>if</span> (ctx.performed)\n            Instantiate(bulletPrefab, muzzle.position, transform.rotation);\n    }\n\n    <span class='pr'>void</span> Update() {\n        <span class='cm'>// aim toward the mouse in world space</span>\n        Vector3 m = Camera.main.ScreenToWorldPoint(Mouse.current.position.ReadValue());\n        Vector2 dir = ((Vector2)m - rb.position).normalized;\n        transform.up = dir;\n    }\n\n    <span class='pr'>void</span> FixedUpdate() {\n        rb.velocity = moveInput * speed;\n    }\n}</div></div><h3>Aiming and firing</h3><p>In a top-down shooter the ship rotates to face the aim direction (<code>transform.up = dir</code> in 2D), and firing spawns a <strong>bullet prefab</strong> at a muzzle point. The bullet carries its own script: a Rigidbody2D given forward velocity in <code>Start()</code>, plus a self-<code>Destroy</code> after a few seconds so bullets do not pile up forever.</p><div class='box danger'><div class='bt'>Danger.</div> Always destroy spawned bullets and enemies — by lifetime or off-screen check. A shooter that <code>Instantiate</code>s without ever destroying will leak thousands of objects and tank your frame rate within seconds.</div><div class='box lab'><div class='bt'>Lab.</div> Install the Input System, build a <code>Gameplay</code> action map with Move/Aim/Fire, add a PlayerInput component to your ship, and confirm the ship moves with WASD and rotates to face the mouse.</div><div class='game'><div class='game-head'>🎮 Build This: Twin-Stick Shooter — Star Sweeper (new genre)</div><div class='game-body'><p>This <strong>STARTS a new genre</strong>: a top-down twin-stick shooter, using the Input System and prefab spawning you just learned.</p><ol><li>2D top-down scene; a ship sprite with <code>Rigidbody2D</code> (gravity scale 0) and the <code>ShipController</code> script.</li><li>Make a <strong>Bullet prefab</strong>: sprite, Rigidbody2D, a script that moves it forward and self-destructs after 2s; trigger collider tagged <code>Bullet</code>.</li><li>Make an <strong>Enemy prefab</strong> that drifts toward the player; on bullet trigger it dies and adds score.</li><li>Add an <strong>EnemySpawner</strong> script that <code>Instantiate</code>s enemies at the screen edges on a timer.</li><li>Move with WASD/left stick, aim with mouse/right stick, fire to clear waves. Track score.</li></ol></div></div>"},{"id":"p2-7","part":"02 · Unity","nav":"UI & Brick-Breaker","num":"2.7","kicker":"Part 02 · Lesson 7","title":"UI with Canvas/uGUI, an Endless Runner & a Brick-Breaker","html":"<h3>Putting things on screen</h3><p>Every score counter, health bar, menu, and button lives on a <strong>Canvas</strong> — Unity's UI layer (uGUI). UI elements are GameObjects too, but they render in screen space and use a special <code>RectTransform</code> instead of a plain Transform. This lesson pairs UI with two new genres: a fast <strong>endless runner</strong> (reusing input and spawning) and a physics-driven <strong>brick-breaker</strong>.</p><h3>The Canvas and render modes</h3><p>Add <code>GameObject &gt; UI &gt; Canvas</code> and Unity creates a Canvas plus an <strong>EventSystem</strong> (which handles clicks). The Canvas has a <strong>Render Mode</strong>:</p><table><thead><tr><th>Mode</th><th>Use</th></tr></thead><tbody><tr><td><strong>Screen Space - Overlay</strong></td><td>Drawn flat over everything. Default for HUDs and menus.</td></tr><tr><td><strong>Screen Space - Camera</strong></td><td>Rendered by a camera; allows perspective/effects.</td></tr><tr><td><strong>World Space</strong></td><td>UI lives in the 3D world (floating health bars, in-world signs).</td></tr></tbody></table><h3>RectTransform and anchors</h3><p>The hardest UI concept: <strong>anchors</strong>. A RectTransform is positioned relative to its parent via anchor points. Anchor a score label to the top-left and it stays top-left on any screen size; anchor a button's edges to stretch and it grows with the window. Master the anchor presets (the little grid widget in the Inspector) and responsive UI becomes easy.</p><div class='box tip'><div class='bt'>Tip.</div> Add a <strong>Canvas Scaler</strong> set to <em>Scale With Screen Size</em> with a reference resolution (e.g. 1920x1080). This keeps your UI proportional across phones, laptops, and monitors instead of tiny on 4K and huge on small screens.</div><h3>Core UI elements</h3><ul><li><strong>Text - TextMeshPro</strong> — crisp text; the modern default. Unity prompts to import TMP Essentials the first time.</li><li><strong>Image</strong> — panels, icons, bars (use the <em>Filled</em> image type for health/progress bars).</li><li><strong>Button</strong> — clickable; wire its <code>OnClick</code> event in the Inspector to call a public method.</li></ul><h3>Updating UI from code</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>HUD.cs</span></div><div class='term-body'><span class='pr'>using</span> UnityEngine;\n<span class='pr'>using</span> TMPro;\n\n<span class='pr'>public class</span> HUD : MonoBehaviour\n{\n    [SerializeField] <span class='pr'>private</span> TMP_Text scoreLabel;\n    <span class='pr'>private int</span> score;\n\n    <span class='pr'>public void</span> AddScore(<span class='pr'>int</span> amount) {\n        score += amount;\n        scoreLabel.text = <span class='ok'>$\"Score: {score}\"</span>;\n    }\n}</div></div><p>Drag the TextMeshPro object into the <code>scoreLabel</code> slot in the Inspector, then call <code>AddScore</code> from gameplay code. Wiring references in the Inspector — instead of finding objects by name in code — is the clean, fast Unity way.</p><div class='box lab'><div class='bt'>Lab.</div> Add a Canvas with a Canvas Scaler, a TextMeshPro score label anchored top-left, and a TextMeshPro \"Game Over\" panel anchored center that starts disabled. Write a small script that toggles the panel on a key press.</div><div class='game'><div class='game-head'>🎮 Build This: Endless Runner — Dash Lane (new genre)</div><div class='game-body'><p>This <strong>STARTS a new genre</strong>: an endless runner. It reuses the Input System (Lesson 6) and prefab spawning (Lesson 5), now driving a live UI HUD.</p><ol><li>A player that auto-runs forward; input only switches lanes (left/right) or jumps.</li><li>An <strong>ObstacleSpawner</strong> that <code>Instantiate</code>s obstacle prefabs ahead on a timer, scrolling them toward the player; destroy them once passed.</li><li>A <strong>Canvas HUD</strong> with a TextMeshPro distance/score label that ticks up over time via the <code>HUD</code> script.</li><li>Colliding with an obstacle ends the run: show a center-anchored <strong>Game Over</strong> panel with a <strong>Restart</strong> button whose OnClick reloads the scene.</li><li>Speed up over time so it gets harder. Play and chase a high score.</li></ol></div></div><div class='game'><div class='game-head'>🎮 Build This: Brick-Breaker — Brick Buster (new genre, physics)</div><div class='game-body'><p>This <strong>STARTS a new genre</strong>: a physics arcade brick-breaker, combining Lesson 4 physics with this lesson's UI.</p><ol><li>A paddle with <code>Rigidbody2D</code> (Kinematic) moved left/right by input along the bottom.</li><li>A ball with <code>Rigidbody2D</code> and a <strong>bouncy Physics Material 2D</strong> (friction 0, bounciness 1) so it ricochets off paddle and walls.</li><li>Make a <strong>Brick prefab</strong> with a collider; on collision it is destroyed and adds score via the <code>HUD</code> script. Lay out a grid of bricks.
