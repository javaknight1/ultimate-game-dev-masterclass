, next to Scene). For crisp pixel art, set <strong>Filter</strong> to <code>Nearest</code> (or turn off filtering) and <strong>Mipmaps</strong> off, then click <strong>Reimport</strong>. Linear filtering blurs pixels — Nearest keeps hard edges.</p><div class='box tip'><div class='bt'>Project-wide default.</div> Set Project Settings → Rendering → Textures → <em>Canvas Textures → Default Texture Filter</em> to <code>Nearest</code> so every imported sprite is crisp without per-file fiddling.</div><h3>Sprite2D regions vs AtlasTexture</h3><p>A <strong>sprite sheet</strong> packs many frames into one image. To show just one frame on a <code>Sprite2D</code>, enable <strong>Region</strong> in the Inspector and set the rect, or use <strong>Hframes/Vframes</strong> to split the sheet into a grid and pick a <strong>Frame</strong> index. For shared sub-images across many nodes, create an <code>AtlasTexture</code> resource pointing at the sheet with a region — it behaves like its own texture.</p><h3>AnimatedSprite2D & SpriteFrames</h3><p>For frame-based animation, use <code>AnimatedSprite2D</code>. Add the node, then in the Inspector create a new <strong>SpriteFrames</strong> resource on its <code>Sprite Frames</code> property. Click it to open the <strong>SpriteFrames editor</strong> at the bottom. There you:</p><ol><li>Rename the default animation (e.g. <code>spin</code>) and set its <strong>FPS</strong>.</li><li>Click <strong>Add frames from a Sprite Sheet</strong>, pick your PNG, set the grid (e.g. 4×1), and select frames.</li><li>Toggle <strong>Loop</strong> on for continuous animations.</li></ol><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>animated_ball.gd</span></div><div class='term-body'>extends AnimatedSprite2D\n\nfunc _ready() -&gt; void:\n  play(\"spin\")              <span class='cm'># start the looping animation</span>\n\nfunc flash() -&gt; void:\n  play(\"hit\")               <span class='cm'># one-shot animation on a hit</span>\n  await animation_finished  <span class='cm'># wait for the built-in signal</span>\n  play(\"spin\")              <span class='cm'># return to idle</span></div></div><div class='box tip'><div class='bt'>await a signal.</div> <code>await animation_finished</code> pauses the function until that signal fires, then resumes — clean sequencing without timers or state machines.</div><h3>Build Breakout (visuals + structure)</h3><p>Compose three scenes: <code>brick.tscn</code> (a <code>ColorRect</code> or <code>Sprite2D</code>), <code>paddle.tscn</code> (input-driven like Pong), and <code>ball.tscn</code> (an <code>AnimatedSprite2D</code> spinning). The root spawns a wall of bricks in a grid, identical to the coin-grid loop from Lesson 2:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>breakout.gd</span></div><div class='term-body'>extends Node2D\n\nconst Brick := preload(\"res://brick.tscn\")\nconst COLS := 10\nconst ROWS := 6\nvar bricks_left := 0\n\nfunc _ready() -&gt; void:\n  for row in ROWS:\n    for col in COLS:\n      var b := Brick.instantiate()\n      b.position = Vector2(col * 100 + 80, row * 40 + 80)\n      <span class='cm'># color rows differently for arcade feel</span>\n      b.modulate = Color.from_hsv(float(row) / ROWS, 0.8, 1.0)\n      b.cleared.connect(_on_brick_cleared)   <span class='cm'># signal stub for now</span>\n      add_child(b)\n      bricks_left += 1\n\nfunc _on_brick_cleared() -&gt; void:\n  bricks_left -= 1\n  if bricks_left == 0:\n    print(\"Level clear!\")</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>brick.gd (collision stubbed)</span></div><div class='term-body'>extends Node2D\n\nsignal cleared\n\nfunc hit() -&gt; void:        <span class='cm'># wired to real collision next lesson</span>\n  cleared.emit()\n  queue_free()             <span class='cm'># remove this brick from the tree</span></div></div><div class='box danger'><div class='bt'>queue_free, not free.</div> Call <code>queue_free()</code> to delete a node safely at the end of the frame. Calling <code>free()</code> mid-signal or mid-physics can crash with a freed-object error.</div><p>For now, trigger <code>hit()</code> manually (e.g. on a key press hitting a random brick) to confirm the wall clears and the level-clear message fires. Real ball-brick collision arrives next lesson with physics.</p><div class='game'><div class='game-head'>🎮 Build This: Breakout (visuals)</div><div class='game-body'><p>An arcade brick wall with an animated ball and an input-driven paddle.</p><ol><li>Import a 4-frame ball sheet; build <code>AnimatedSprite2D</code> with a looping <code>spin</code>.</li><li>Make <code>brick.tscn</code> with a <code>cleared</code> signal and <code>queue_free()</code>.</li><li>Spawn a 10×6 colored wall from <code>breakout.gd</code>.</li><li>Bonus: count <code>bricks_left</code> and print \"Level clear!\" at zero.</li></ol></div></div>"},{"id":"p1-6","part":"01 · Godot","nav":"2D Physics","num":"1.6","kicker":"Part 01 · Lesson 6","title":"2D Physics: CharacterBody2D, Area2D & Layers","html":"<h3>Three bodies, three jobs</h3><table><thead><tr><th>Node</th><th>Use it for</th></tr></thead><tbody><tr><td><code>CharacterBody2D</code></td><td>Player/enemy you move by code with <code>move_and_slide()</code></td></tr><tr><td><code>RigidBody2D</code></td><td>Objects the physics engine fully simulates (gravity, bounces)</td></tr><tr><td><code>Area2D</code></td><td>Non-solid trigger zones — detect overlap, no collision response</td></tr></tbody></table><p>Every body needs a child <code>CollisionShape2D</code> (or <code>CollisionPolygon2D</code>) with an actual shape resource assigned, or it does nothing.</p><h3>Moving a CharacterBody2D</h3><p><code>CharacterBody2D</code> exposes a <code>velocity</code> property; you set it, call <code>move_and_slide()</code>, and Godot moves the body, sliding along walls and stopping at collisions. Do this in <code>_physics_process</code> for stable timing.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>player.gd</span></div><div class='term-body'>extends CharacterBody2D\n\n@export var speed := 300.0\nconst Bullet := preload(\"res://bullet.tscn\")\n\nfunc _physics_process(delta: float) -&gt; void:\n  <span class='cm'># 2D 8-way movement from input-map actions</span>\n  var dir := Input.get_vector(\"left\", \"right\", \"up\", \"down\")\n  velocity = dir * speed\n  move_and_slide()\n  if Input.is_action_just_pressed(\"fire\"):\n    shoot()\n\nfunc shoot() -&gt; void:\n  var b := Bullet.instantiate()\n  b.global_position = global_position\n  <span class='cm'># aim toward the mouse</span>\n  b.direction = (get_global_mouse_position() - global_position).normalized()\n  get_tree().current_scene.add_child(b)   <span class='cm'># add to scene, not to player</span></div></div><div class='box danger'><div class='bt'>Spawn bullets on the scene, not the shooter.</div> If you <code>add_child(b)</code> to the player, the bullet inherits the player's transform and moves with them. Add it to <code>get_tree().current_scene</code> (or a dedicated bullets node) so it lives in world space.</div><h3>Area2D bullets and overlap detection</h3><p>Bullets are <code>Area2D</code> nodes: they fly through the world and report overlaps without bouncing off things. Connect the built-in <code>area_entered</code> / <code>body_entered</code> signals.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>bullet.gd</span></div><div class='term-body'>extends Area2D\n\nvar direction := Vector2.RIGHT\nvar speed := 700.0\n\nfunc _ready() -&gt; void:\n  area_entered.connect(_on_area_entered)\n  <span class='cm'># auto-despawn after 2s so bullets do not leak</span>\n  get_tree().create_timer(2.0).timeout.connect(queue_free)\n\nfunc _physics_process(delta: float) -&gt; void:\n  position += direction * speed * delta\n\nfunc _on_area_entered(area: Area2D) -&gt; void:\n  if area.is_in_group(\"enemies\"):\n    area.queue_free()   <span class='cm'># destroy enemy</span>\n    queue_free()        <span class='cm'># destroy bullet</span></div></div><h3>Layers and masks: who collides with whom</h3><p>Each physics node has a <strong>collision layer</strong> (\"what I am\") and a <strong>collision mask</strong> (\"what I scan for\"). Two nodes interact only if one's mask includes the other's layer. Name your layers in <strong>Project Settings → Layer Names → 2D Physics</strong> to stay sane.</p><table><thead><tr><th>Object</th><th>Layer</th><th>Mask</th></tr></thead><tbody><tr><td>Player</td><td>Player</td><td>Enemy, Walls</td></tr><tr><td>Enemy</td><td>Enemy</td><td>Player, PlayerBullet</td></tr><tr><td>Player bullet</td><td>PlayerBullet</td><td>Enemy</td></tr></tbody></table><div class='box law'><div class='bt'>Layer = identity, Mask = interest.</div> Set the player bullet's mask to only the Enemy layer and it physically ignores walls and the player — no code checks needed. Combine with <code>add_to_group(\"enemies\")</code> for clean code-side filtering.</div><div class='box tip'><div class='bt'>Monitorable matters.</div> For two <code>Area2D</code>s to detect each other, the target must have <strong>Monitorable</strong> on and the detector must have <strong>Monitoring</strong> on. If overlaps never fire, check these two toggles first.</div><p>Make enemies simple <code>Area2D</code> nodes added to the <code>enemies</code> group. The bullet's <code>area_entered</code> then deletes both on contact. Player-enemy contact can damage the player via the player's own <code>Area2D</code> hitbox.</p><div class='game'><div class='game-head'>🎮 Build This: Top-Down Shooter Core</div><div class='game-body'><p>A player who walks 8 ways, shoots at the mouse, and kills enemies on hit.</p><ol><li>Player <code>CharacterBody2D</code> with <code>Input.get_vector</code> movement and <code>move_and_slide()</code>.</li><li><code>bullet.tscn</code> as an <code>Area2D</code> aimed at the mouse, self-despawning after 2s.</li><li>Enemies as <code>Area2D</code> in group <code>enemies</code>; configure layers/masks so bullets hit only enemies.</li><li>On <code>area_entered</code>, free both bullet and enemy.</li></ol></div></div>"},{"id":"p1-7","part":"01 · Godot","nav":"Tilemaps","num":"1.7","kicker":"Part 01 · Lesson 7","title":"Tilemaps & Level Building","html":"<h3>TileMapLayer in Godot 4</h3><p>Godot 4.3+ replaced the old monolithic <code>TileMap</code> node with <strong><code>TileMapLayer</code></strong>: each layer (background, ground, decoration) is its own node, which is cleaner to manage. Add a <code>TileMapLayer</code> node; its core property is a <strong>TileSet</strong> resource that defines the available tiles.</p><h3>Building a TileSet</h3><ol><li>Select the <code>TileMapLayer</code> and create a new <strong>TileSet</strong> on its <code>Tile Set</code> property.</li><li>At the bottom, the <strong>TileSet</strong> panel opens. Set the tile size (e.g. 16×16 or 32×32) to match your art.</li><li>Drag your tile-sheet PNG into the <strong>TileSet</strong> panel as an atlas source. Godot offers to auto-create tiles for the whole sheet — accept it.</li></ol><div class='box tip'><div class='bt'>Match tile size to art.</div> If your sheet is 16px tiles but the TileSet is set to 32, tiles will be cropped or doubled. Set the size before importing the atlas.</div><h3>Adding collision to tiles</h3><p>Solid ground needs collision data baked into the tiles. In the <strong>TileSet</strong> panel:</p><ol><li>Add a <strong>Physics Layer</strong> in the TileSet's Inspector (this defines which collision layer the tiles occupy).</li><li>Switch the bottom panel to <strong>Select</strong>, choose the ground tile, and in the tile's properties draw the <strong>collision polygon</strong> — usually the full square (a one-click \"reset to full rect\" is available).</li><li>Repeat for each solid tile. Decorative tiles get no collision polygon.</li></ol><div class='box law'><div class='bt'>Collision lives in the TileSet, not the map.</div> You define a tile's shape once; every painted instance of that tile is solid automatically. This is why tilemaps are so efficient for level geometry.</div><h3>Painting the level</h3><p>With the <code>TileMapLayer</code> selected, the bottom panel switches to the <strong>TileMap</strong> editor. Pick a tile from the palette and left-click-drag in the 2D viewport to paint. Right-click erases. Use the rectangle and bucket tools for large fills. Build a floor and a couple of platforms.</p><h3>A platformer player</h3><p>The player is a <code>CharacterBody2D</code> with gravity. Godot 4 provides <code>get_gravity()</code> from project settings, and <code>is_on_floor()</code> works because the tilemap supplies collision.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>platformer_player.gd</span></div><div class='term-body'>extends CharacterBody2D\n\n@export var speed := 250.0\n@export var jump_velocity := -450.0\nvar gravity := ProjectSettings.get_setting(\"physics/2d/default_gravity\")\n\nfunc _physics_process(delta: float) -&gt; void:\n  <span class='cm'># apply gravity while airborne</span>\n  if not is_on_floor():\n    velocity.y += gravity * delta\n  <span class='cm'># jump only when grounded</span>\n  if Input.is_action_just_pressed(\"jump\") and is_on_floor():\n    velocity.y = jump_velocity\n  <span class='cm'># horizontal run</span>\n  var dir := Input.get_axis(\"left\", \"right\")\n  if dir != 0:\n    velocity.x = dir * speed\n    $Sprite2D.flip_h = dir &lt; 0\n  else:\n    velocity.x = move_toward(velocity.x, 0, speed)  <span class='cm'># friction</span>\n  move_and_slide()</div></div><div class='box tip'><div class='bt'>Up is negative Y.</div> In 2D, the Y axis points down, so a jump uses a <em>negative</em> velocity (<code>-450</code>) and gravity adds positive Y. This trips up everyone once.</div><div class='box danger'><div class='bt'>is_on_floor stale data.</div> <code>is_on_floor()</code> reflects the <em>last</em> <code>move_and_slide()</code>. Always call your jump/gravity logic before <code>move_and_slide()</code> in the same frame, and let <code>move_and_slide()</code> update floor state for next frame.</div><p>Set the player's collision mask to include the tilemap's physics layer so they land on the ground. Run F6 and you can run and jump around a real, painted level. Add a few coins (Area2D, group <code>coins</code>) for the player to collect, reusing the overlap pattern from Lesson 6.</p><div class='game'><div class='game-head'>🎮 Build This: Platformer Level</div><div class='game-body'><p>A tilemap world with solid ground and a jumping CharacterBody2D player.</p><ol><li>Add a <code>TileMapLayer</code>, build a TileSet with a physics layer and per-tile collision.</li><li>Paint a floor and two platforms.</li><li>Add the <code>CharacterBody2D</code> player with gravity, run, and jump from the script above.</li><li>Bonus: scatter Area2D coins and collect them on <code>body_entered</code>.</li></ol></div></div>"},{"id":"p1-8","part":"01 · Godot","nav":"UI, Audio & Saving","num":"1.8","kicker":"Part 01 · Lesson 8","title":"UI Control Nodes, Audio & Save Files","html":"<h3>Control nodes & anchors</h3><p>UI in Godot uses <strong>Control</strong> nodes, not Node2D. They live under a <strong>CanvasLayer</strong> so they stay fixed on screen regardless of camera movement. The core layout tool is <strong>anchors</strong>: a Control's edges are pinned to fractions of its parent. Use the <strong>Layout</strong> menu in the toolbar (\"Full Rect\", \"Center\", \"Top Wide\") to set common presets instead of dragging by hand.</p><table><thead><tr><th>Control</th><th>Purpose</th></tr></thead><tbody><tr><td><code>Label</code></td><td>Display text (score, title)</td></tr><tr><td><code>Button</code></td><td>Clickable; emits <code>pressed</code></td></tr><tr><td><code>VBoxContainer</code> / <code>HBoxContainer</code></td><td>Auto-arrange children in a column/row</td></tr><tr><td><code>MarginContainer</code></td><td>Add padding around a child</td></tr></tbody></table><div class='box tip'><div class='bt'>Let containers do layout.</div> Put buttons inside a <code>VBoxContainer</code> and they stack and resize automatically. Manually positioning UI breaks on different window sizes — containers and anchors do not.</div><h3>A start menu and HUD</h3><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main_menu.gd</span></div><div class='term-body'>extends Control\n\nfunc _ready() -&gt; void:\n  $VBox/PlayButton.pressed.connect(_on_play)\n  $VBox/QuitButton.pressed.connect(get_tree().quit)\n\nfunc _on_play() -&gt; void:\n  get_tree().change_scene_to_file(\"res://level.tscn\")</div></div><p>The in-game HUD is a <code>CanvasLayer</code> containing a <code>Label</code> for the score, updated whenever the score changes (via a signal from the game logic).</p><h3>Audio</h3><p>Use <code>AudioStreamPlayer</code> for non-positional sound (music, UI clicks) and <code>AudioStreamPlayer2D</code> for sounds with a world position (panning). Assign a sound file to the <code>Stream</code> property and call <code>play()</code>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>player.gd (audio bits)</span></div><div class='term-body'>@onready var jump_sfx: AudioStreamPlayer = $JumpSound\n@onready var coin_sfx: AudioStreamPlayer = $CoinSound\n\nfunc jump() -&gt; void:\n  velocity.y = jump_velocity\n  jump_sfx.play()\n\nfunc collect_coin() -&gt; void:\n  coin_sfx.play()</div></div><div class='box tip'><div class='bt'>Audio buses & looping music.</div> Mark a music file's import as <strong>Loop</strong> on (in the Import tab) so it repeats seamlessly. Route SFX and Music to separate <strong>audio buses</strong> (Audio panel) so a settings menu can mute or set volumes independently.</div><h3>Saving a high score</h3><p>Persist data to <code>user://</code> — never <code>res://</code>. JSON is the simplest portable format. Read it back defensively in case the file does not exist yet.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>save.gd (autoload singleton)</span></div><div class='term-body'>extends Node\n\nconst PATH := \"user://save.json\"\nvar high_score := 0\n\nfunc _ready() -&gt; void:\n  load_game()\n\nfunc save_game() -&gt; void:\n  var f := FileAccess.open(PATH, FileAccess.WRITE)\n  f.store_string(JSON.stringify({\"high_score\": high_score}))\n  <span class='cm'># f closes automatically when it goes out of scope</span>\n\nfunc load_game() -&gt; void:\n  if not FileAccess.file_exists(PATH):\n    return\n  var f := FileAccess.open(PATH, FileAccess.READ)\n  var data: Variant = JSON.parse_string(f.get_as_text())\n  if data is Dictionary:\n    high_score = int(data.get(\"high_score\", 0))\n\nfunc try_set_high_score(score: int) -&gt; bool:\n  if score &gt; high_score:\n    high_score = score\n    save_game()\n    return true\n  return false</div></div><div class='box law'><div class='bt'>Make Save an autoload.</div> In Project Settings → Autoload, register <code>save.gd</code> as <code>Save</code>. Now any script can call <code>Save.high_score</code> and <code>Save.try_set_high_score(n)</code> from anywhere — a global singleton that survives scene changes.</div><div class='box danger'><div class='bt'>JSON parses floats.</div> <code>JSON.parse_string</code> returns numbers as floats, so an int saved as <code>5</code> comes back as <code>5.0</code>. Wrap reads in <code>int(...)</code> to avoid subtle type bugs.</div><div class='game'><div class='game-head'>🎮 Build This: Platformer Shell</div><div class='game-body'><p>A start menu, score HUD, jump/coin sounds, and a persistent high score.</p><ol><li>Build <code>main_menu.tscn</code> with Play/Quit in a <code>VBoxContainer</code>; Play changes scene.</li><li>Add a HUD <code>CanvasLayer</code> with a score <code>Label</code> updated on coin pickup.</li><li>Add <code>AudioStreamPlayer</code> jump and coin sounds; call <code>play()</code> on each event.</li><li>Register <code>Save</code> as an autoload; on level end, call <code>Save.try_set_high_score(score)</code>.</li></ol></div></div>"},{"id":"p1-9","part":"01 · Godot","nav":"Capstone & Export","num":"1.9","kicker":"Part 01 · Lesson 9","title":"Capstone: A Polished Platformer & Exporting","html":"<h3>Assemble the whole game</h3><p>The capstone pulls every system together: the tilemap level (1.7), the CharacterBody2D player (1.6/1.7), Control-node menus and HUD (1.8), audio, and the <code>Save</code> autoload. Structure your scene flow with a small game manager.</p><table><thead><tr><th>Scene</th><th>Role</th></tr></thead><tbody><tr><td><code>main_menu.tscn</code></td><td>Title, Play, shows saved high score</td></tr><tr><td><code>level.tscn</code></td><td>Tilemap world, player, coins, HUD</td></tr><tr><td><code>game_over.tscn</code></td><td>Final score, \"new high score!\", Retry/Menu</td></tr></tbody></table><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>level.gd</span></div><div class='term-body'>extends Node2D\n\nvar score := 0\n\nfunc _ready() -&gt; void:\n  for coin in get_tree().get_nodes_in_group(\"coins\"):\n    coin.collected.connect(_on_coin_collected)\n  $HUD/Score.text = \"Score: 0\"\n  $HUD/Best.text = \"Best: %d\" % Save.high_score\n\nfunc _on_coin_collected() -&gt; void:\n  score += 100\n  $HUD/Score.text = \"Score: %d\" % score\n  $CoinSound.play()\n\nfunc finish_level() -&gt; void:\n  var is_best := Save.try_set_high_score(score)\n  get_tree().change_scene_to_file(\"res://game_over.tscn\")</div></div><h3>Polish that matters</h3><ul><li><strong>Camera follow:</strong> add a <code>Camera2D</code> as a child of the player and enable it; set limits so it stops at level edges.</li><li><strong>Coyote time:</strong> allow a jump for ~0.1s after leaving a ledge using a small timer — it dramatically improves feel.</li><li><strong>Particles / tween juice:</strong> a quick <code>create_tween()</code> scale-punch on coin pickup adds life.</li><li><strong>Window settings:</strong> set the project name, icon, and a fixed/expand stretch mode in Project Settings → Display.</li></ul><div class='box tip'><div class='bt'>Set the main scene.</div> Project Settings → Application → Run → <em>Main Scene</em> = <code>main_menu.tscn</code>. Now F5 and exported builds boot into your menu.</div><h3>Export templates</h3><p>Before exporting, download the matching <strong>export templates</strong>: <strong>Editor → Manage Export Templates → Download and Install</strong>. These are the engine binaries Godot bundles into your game. They must match your editor version exactly.</p><h3>Desktop export</h3><p>Open <strong>Project → Export</strong>. Click <strong>Add…</strong> and choose <strong>Windows Desktop</strong>, <strong>Linux/X11</strong>, or <strong>macOS</strong>. Set an output path and click <strong>Export Project</strong>. For Windows, enable <strong>Embed PCK</strong> to ship a single .exe; otherwise you get an .exe plus a .pck data file that must stay together.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal — verify the build</span></div><div class='term-body'><span class='pr'>$</span> ./MyPlatformer.x86_64        <span class='cm'># Linux: run the exported binary</span>\n<span class='ok'>Godot Engine v4.x.stable</span>\n<span class='cm'># the game window opens at the main menu</span></div></div><h3>Web (HTML5) export</h3><p>Add a <strong>Web</strong> export preset. Web requires the <strong>Compatibility</strong> renderer (Project Settings → Rendering → Renderer) — Forward+ will not run in browsers. Export to an empty folder; you get <code>index.html</code>, a <code>.wasm</code>, a <code>.pck</code>, and JS glue.</p><div class='box danger'><div class='bt'>Web needs a server with the right headers.</div> Browsers block opening <code>index.html</code> via <code>file://</code>, and Godot's threaded web build requires <strong>cross-origin isolation</strong> headers (<code>COOP</code>/<code>COEP</code>). Use the editor's built-in <strong>Remote Debug → Run in Browser</strong>, or serve over HTTP with those headers set, or disable threads in the export preset.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal — quick local web test</span></div><div class='term-body'><span class='pr'>$</span> python3 -m http.server 8000 --directory export/web\n<span class='cm'># open http://localhost:8000  (note: no COOP/COEP — disable threads or use Godot's server)</span></div></div><div class='box law'><div class='bt'>Match templates to version.</div> The single most common export failure is a template/editor version mismatch after an engine upgrade. Re-download templates whenever you change Godot versions.</div><div class='game'><div class='game-head'>🎮 Build This: Capstone Platformer + Export</div><div class='game-body'><p>A complete small platformer with menus, HUD, audio, save, and shipped builds.</p><ol><li>Wire <code>main_menu → level → game_over</code> with <code>change_scene_to_file</code>; set the main scene.</li><li>Show saved best on the menu; update it via <code>Save.try_set_high_score</code> at level end.</li><li>Add a Camera2D follow, coin SFX/juice, and coyote-time jump.</li><li>Install export templates; export a desktop build and run it.</li><li>Switch to Compatibility renderer; export an HTML5 build and test it over HTTP.</li></ol></div></div>"},{"id":"p2-1","part":"02 · Unity","nav":"Hub & Editor Tour","num":"2.1","kicker":"Part 02 · Lesson 1","title":"Install via Unity Hub & Tour the Editor","html":"<h3>Why Unity Hub exists</h3><p>Unity ships as two things: the <strong>Hub</strong> (a launcher that manages installs and projects) and the <strong>Editor</strong> (the actual engine). You almost never install the Editor directly — the Hub installs and version-manages it for you, which matters because real teams pin a project to one exact Editor version to avoid subtle behavior differences.</p><h4>Install steps</h4><ol><li>Download <strong>Unity Hub</strong> from unity.com/download and install it. Sign in with a free <em>Personal</em> license (fine for learning and small revenue).</li><li>In the Hub, go to the <strong>Installs</strong> tab and click <strong>Install Editor</strong>. Pick the latest <strong>LTS</strong> (Long-Term Support) version — LTS gets two years of patches and is what you ship on.</li><li>In the module selection screen, add the build support you need now: <strong>Windows/Mac Build Support</strong> is included for your OS; add the <strong>Mac/Windows Build Support (Mono)</strong> for the other desktop, and consider <strong>WebGL</strong>. You can add modules later via the gear menu.</li></ol><div class='box tip'><div class='bt'>LTS, not Tech Stream.</div> The newest \"Tech Stream\" builds add features but also bugs. For a course and for shipping, choose the highest <strong>LTS</strong> number available.</div><h4>Create your first project</h4><p>Go to the <strong>Projects</strong> tab → <strong>New project</strong>. Choose a <strong>template</strong>: <strong>3D (Built-in Render Pipeline)</strong> is the simplest place to start. Name it <code>RollABall</code>, pick a folder, and create. The first open is slow — Unity is importing packages and compiling.</p><h3>The five views you live in</h3><table><thead><tr><th>View</th><th>What it is</th></tr></thead><tbody><tr><td><strong>Scene</strong></td><td>The 3D/2D editing viewport. You arrange objects here. Not the running game.</td></tr><tr><td><strong>Game</strong></td><td>What the player sees through the active Camera when you press Play.</td></tr><tr><td><strong>Hierarchy</strong></td><td>A list of every GameObject in the open scene, with parent/child nesting.</td></tr><tr><td><strong>Inspector</strong></td><td>The properties of whatever is selected — its components and their values.</td></tr><tr><td><strong>Project</strong></td><td>Your asset files on disk (scripts, models, prefabs, scenes).</td></tr></tbody></table><h4>Navigating the Scene view</h4><p>This is muscle memory you must build now:</p><ul><li><strong>Orbit:</strong> hold <strong>Alt</strong> (Option on Mac) + left-drag.</li><li><strong>Pan:</strong> middle-mouse drag, or Alt + middle-drag.</li><li><strong>Zoom:</strong> scroll wheel.</li><li><strong>Flythrough:</strong> hold <strong>right-mouse</strong> and use <strong>W A S D</strong> like an FPS; <strong>Q/E</strong> for down/up.</li><li><strong>Frame selected:</strong> select an object and press <strong>F</strong> to snap the camera to it. This is the single most useful shortcut.</li></ul><p>The transform tools are on the toolbar and bound to <strong>Q</strong> (hand/pan), <strong>W</strong> (move), <strong>E</strong> (rotate), <strong>R</strong> (scale), <strong>T</strong> (rect).</p><div class='box danger'><div class='bt'>Scene Camera ≠ Main Camera.</div> Moving around in the Scene view does <em>not</em> move the camera the player sees. The player's view comes from the <strong>Main Camera</strong> GameObject. Beginners panic when Play looks nothing like the Scene view — that's why.</div><h4>Adding objects</h4><p>Right-click in the Hierarchy → <strong>3D Object → Plane</strong> for a ground. Right-click → <strong>3D Object → Sphere</strong> and <strong>→ Cube</strong> for a couple of primitives. Select each and use the <strong>Move (W)</strong> gizmo to spread them out. Press <strong>F</strong> to frame them.</p><h4>Position the player camera</h4><p>Select <strong>Main Camera</strong> in the Hierarchy. A small preview shows its view. Use <strong>GameObject → Align With View</strong> to snap the Main Camera to your current Scene view angle — a fast way to set up a decent starting shot. Then press <strong>Play</strong> (the triangle at top center) to enter Play mode; the Game view shows your scene through that camera. Press Play again to stop.</p><div class='box law'><div class='bt'>Save the scene.</div> Press <strong>Ctrl/Cmd+S</strong>. Scenes are files; if you never save, closing Unity loses your layout. Save it as <code>Main</code> inside an <code>Assets/Scenes</code> folder.</div><div class='game'><div class='game-head'>🎮 Build This: First Scene</div><div class='game-body'><p>A navigable scene with primitives and a positioned camera.</p><ol><li>Create a 3D project in the Hub on the latest LTS.</li><li>Add a Plane, a Sphere, and a Cube; spread them out with the Move tool.</li><li>Practice orbit (Alt-drag), flythrough (right-mouse + WASD), and Frame Selected (F).</li><li>Select Main Camera, frame a nice angle in Scene view, then GameObject → Align With View.</li><li>Press Play to confirm the Game view matches; save the scene as Main.</li></ol></div></div>"},{"id":"p2-2","part":"02 · Unity","nav":"GameObjects & Components","num":"2.2","kicker":"Part 02 · Lesson 2","title":"GameObjects, Components & the Inspector","html":"<h3>The core idea: composition over inheritance</h3><p>A <strong>GameObject</strong> by itself is almost nothing — an empty container with a name and a <strong>Transform</strong>. All behavior and appearance comes from <strong>Components</strong> you attach to it. A camera is a GameObject + Camera component. A visible cube is a GameObject + Mesh Filter + Mesh Renderer. You <em>compose</em> objects from parts rather than inheriting from a deep class tree. This is the single most important mental model in Unity.</p><div class='box law'><div class='bt'>Every GameObject has exactly one Transform.</div> You can't remove it. Position, rotation, and scale live there, and child objects inherit their parent's transform — move the parent, the children move with it.</div><h4>Reading the Inspector</h4><p>Select a GameObject and the <strong>Inspector</strong> stacks its components top to bottom. Each component is a collapsible block with a checkbox to enable/disable it. The header row has the GameObject's <strong>name</strong>, an <strong>active</strong> checkbox, a <strong>Tag</strong>, and a <strong>Layer</strong>. Tags label objects for code lookups (\"Player\", \"Enemy\"); Layers control physics and rendering grouping.</p><h4>Anatomy of a visible mesh</h4><p>Create a <strong>3D Object → Sphere</strong> and look at its Inspector. You'll see:</p><table><thead><tr><th>Component</th><th>Job</th></tr></thead><tbody><tr><td>Transform</td><td>Where/how it sits in space.</td></tr><tr><td>Mesh Filter</td><td>Holds the geometry (the sphere mesh).</td></tr><tr><td>Mesh Renderer</td><td>Draws the mesh using one or more <strong>Materials</strong>.</td></tr><tr><td>Sphere Collider</td><td>The physics shape (added automatically on primitives).</td></tr></tbody></table><h3>Build a lit scene with no code</h3><ol><li>Create a <strong>3D Object → Plane</strong>. In its Transform set <strong>Scale</strong> to (2, 1, 2) so it's a roomy floor. Leave Position at (0,0,0).</li><li>Create a <strong>3D Object → Sphere</strong>. Set Position to (0, 0.5, 0) so it rests on the plane (the sphere's radius is 0.5).</li><li>A new 3D scene already has a <strong>Directional Light</strong> in the Hierarchy. Select it. The Transform's <strong>rotation</strong> is what matters for a directional light — position is irrelevant; it acts like the sun, lighting everything from an angle. Set rotation to about (50, -30, 0).</li></ol><h4>Make a material and tune it</h4><p>A plain primitive uses a default gray material. Create your own: in the Project window, right-click → <strong>Create → Material</strong>, name it <code>BallMat</code>. Select it; in the Inspector set <strong>Base Map / Albedo</strong> to a color, and drag the <strong>Metallic</strong> and <strong>Smoothness</strong> sliders to taste. Then <strong>drag the material from Project onto the Sphere</strong> in the Scene or Hierarchy to assign it.</p><div class='box tip'><div class='bt'>Drag-and-drop is wiring.</div> Assigning materials, dropping objects into component slots, parenting in the Hierarchy — most non-code setup in Unity is dragging one thing onto another. Get comfortable with it.</div><h4>Parenting and Reset</h4><p>Drag the Sphere onto an empty GameObject in the Hierarchy to make it a <strong>child</strong>; now the child's Transform values are <em>relative</em> to the parent. To zero a transform, click the component's context menu (the three dots) → <strong>Reset</strong>. To add any component, use the <strong>Add Component</strong> button at the bottom of the Inspector and search by name.</p><div class='box danger'><div class='bt'>Light settings can wash out everything.</div> If your scene is blindingly bright or pitch black, check the Directional Light's <strong>Intensity</strong> and the ambient lighting in <strong>Window → Rendering → Lighting</strong>. A too-high intensity or a stray skybox setting is the usual culprit.</div><div class='game'><div class='game-head'>🎮 Build This: Lit Studio Scene</div><div class='game-body'><p>A clean ground + sphere lit by a directional light, configured entirely in the Inspector.</p><ol><li>Add a Plane scaled to (2,1,2) as the floor.</li><li>Add a Sphere at (0, 0.5, 0).</li><li>Create a Material, color it, set Metallic/Smoothness, and drag it onto the sphere.</li><li>Select the Directional Light and rotate it (~50, -30, 0) so the sphere casts a shadow.</li><li>Adjust light Intensity until the shading reads well; save the scene.</li></ol></div></div>"},{"id":"p2-3","part":"02 · Unity","nav":"C# & MonoBehaviour","num":"2.3","kicker":"Part 02 · Lesson 3","title":"C# Scripting: MonoBehaviour, Update & [SerializeField]","html":"<h3>Scripts are components too</h3><p>When you write a C# class that inherits from <strong>MonoBehaviour</strong>, Unity lets you attach it to a GameObject as a component. That's the bridge between your code and the engine. Unity calls special methods on your class at the right times — you don't run <code>main()</code>, you fill in event methods and the engine invokes them.</p><h4>Create a script</h4><p>In the Project window, right-click → <strong>Create → C# Script</strong> (or use <strong>Add Component → New Script</strong> on the GameObject). Name it <code>PlayerMovement</code>. <strong>Important:</strong> the filename must match the class name exactly, or Unity refuses to attach it. Double-click to open it in your editor (Visual Studio, VS Code, or Rider).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>PlayerMovement.cs</span></div><div class='term-body'>using UnityEngine;\n\npublic class PlayerMovement : MonoBehaviour\n{\n    <span class='cm'>// Shows in the Inspector but stays private to other code</span>\n    [SerializeField] private float speed = 5f;\n\n    <span class='cm'>// Called once before the first frame</span>\n    void Start()\n    {\n        Debug.Log(\"Player ready\");\n    }\n\n    <span class='cm'>// Called every frame</span>\n    void Update()\n    {\n        float h = Input.GetAxisRaw(\"Horizontal\"); <span class='cm'>// A/D or arrows: -1..1</span>\n        float v = Input.GetAxisRaw(\"Vertical\");   <span class='cm'>// W/S or arrows</span>\n        Vector3 move = new Vector3(h, 0f, v);\n        <span class='cm'>// dt keeps speed the same on any framerate</span>\n        transform.Translate(move * speed * Time.deltaTime);\n    }\n}</div></div><h3>The lifecycle methods that matter</h3><table><thead><tr><th>Method</th><th>When it runs</th></tr></thead><tbody><tr><td><code>Awake()</code></td><td>When the object loads — before any Start. Wire up references here.</td></tr><tr><td><code>Start()</code></td><td>Once, before the first Update. Safe to access other objects' Awake results.</td></tr><tr><td><code>Update()</code></td><td>Every rendered frame. Input and most game logic.</td></tr><tr><td><code>FixedUpdate()</code></td><td>On the fixed physics timestep. Physics/Rigidbody code goes here (next lesson).</td></tr></tbody></table><h4>Why <code>[SerializeField]</code> instead of public</h4><p>You want <code>speed</code> tunable in the Inspector without recompiling, but you don't want other scripts reaching in and changing it. <strong>public</strong> exposes it to the Inspector <em>and</em> all code. <strong><code>[SerializeField] private</code></strong> exposes it to the Inspector only — it keeps your encapsulation clean. This is the professional default.</p><div class='box law'><div class='bt'>Always scale movement by <code>Time.deltaTime</code>.</div> <code>Update</code> runs more times per second on a faster machine. Multiplying by <code>deltaTime</code> (seconds since last frame) makes <code>speed</code> mean \"units per second\" regardless of framerate.</div><h4>Build Roll-a-Ball movement</h4><ol><li>Open your scene with the Plane and Sphere. Rename the Sphere to <strong>Player</strong>.</li><li>Attach <code>PlayerMovement</code> to the Player (drag the script onto it, or Add Component).</li><li>In the Inspector you'll now see a <strong>Speed</strong> field with the value 5. Change it to 8 and notice you didn't touch code.</li><li>Press <strong>Play</strong> and drive with the arrow keys / WASD.</li></ol><div class='box danger'><div class='bt'>Edits during Play don't persist.</div> Any value you tweak in the Inspector <em>while in Play mode</em> resets the instant you stop. Tune in Play to find good numbers, then re-enter them with Play stopped. Unity tints the editor when you're in Play mode as a reminder.</div><div class='box tip'><div class='bt'>Use <code>Debug.Log</code> liberally.</div> Output appears in the <strong>Console</strong> window. It's your fastest debugging tool before you reach for breakpoints. <code>Debug.Log($\"h={h} v={v}\");</code> with string interpolation shows live values each frame.</div><div class='game'><div class='game-head'>🎮 Build This: Roll-a-Ball (movement)</div><div class='game-body'><p>A sphere you drive across a plane at a serialized speed.</p><ol><li>Reuse the Plane + Sphere scene; rename the sphere to Player.</li><li>Create <code>PlayerMovement</code> with a <code>[SerializeField] float speed</code>.</li><li>In Update, read Horizontal/Vertical, build a Vector3, and Translate by <code>speed * Time.deltaTime</code>.</li><li>Attach it to Player; press Play and steer with the arrow keys.</li><li>Tune Speed in the Inspector until it feels right.</li></ol></div></div>"},{"id":"p2-4","part":"02 · Unity","nav":"Physics & Triggers","num":"2.4","kicker":"Part 02 · Lesson 4","title":"Physics: Rigidbody, Colliders & Triggers","html":"<h3>Two pieces: Rigidbody and Collider</h3><p>Real physics needs two components working together. A <strong>Collider</strong> defines the shape used for contact tests. A <strong>Rigidbody</strong> tells the physics engine to <em>simulate</em> the object — apply gravity, respond to forces, resolve collisions. A collider without a Rigidbody is a static, immovable wall; add a Rigidbody and it falls and bounces.</p><div class='box law'><div class='bt'>Move Rigidbodies with forces, not the Transform.</div> If you teleport a physics object via <code>transform.position</code> every frame, you fight the simulation and get jitter and tunneling. Drive it with <code>AddForce</code> / <code>velocity</code> inside <code>FixedUpdate</code> instead.</div><h4>Rebuild Roll-a-Ball on physics</h4><ol><li>Select the <strong>Player</strong> sphere → <strong>Add Component → Rigidbody</strong>. It now has mass, drag, and gravity. Press Play and it falls onto the plane and rolls.</li><li>Replace the Translate-based movement with force-based movement in <code>FixedUpdate</code>.</li></ol><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>BallController.cs</span></div><div class='term-body'>using UnityEngine;\n\n[RequireComponent(typeof(Rigidbody))]\npublic class BallController : MonoBehaviour\n{\n    [SerializeField] private float force = 12f;\n    private Rigidbody rb;\n    private Vector3 input;\n    private int score;\n\n    void Awake() => rb = GetComponent&lt;Rigidbody&gt;();\n\n    void Update()\n    {\n        <span class='cm'>// Read input every frame (cheap, responsive)</span>\n        float h = Input.GetAxisRaw(\"Horizontal\");\n        float v = Input.GetAxisRaw(\"Vertical\");\n        input = new Vector3(h, 0f, v);\n    }\n\n    void FixedUpdate()\n    {\n        <span class='cm'>// Apply physics on the fixed timestep</span>\n        rb.AddForce(input * force);\n    }\n\n    <span class='cm'>// Fires when this collider enters a TRIGGER collider</span>\n    void OnTriggerEnter(Collider other)\n    {\n        if (other.CompareTag(\"Pickup\"))\n        {\n            other.gameObject.SetActive(false); <span class='cm'>// hide it</span>\n            score++;\n            Debug.Log($\"Score: {score}\");\n        }\n    }\n}</div></div><h3>Colliders vs. triggers</h3><p>A collider has an <strong>Is Trigger</strong> checkbox. Unchecked (the default), it's <em>solid</em> — objects physically stop against it and you get <code>OnCollisionEnter</code>. Checked, it's a <em>ghost</em> — objects pass through it and you get <code>OnTriggerEnter</code>. Pickups, checkpoints, and damage zones are triggers; walls and floors are solid colliders.</p><table><thead><tr><th>Event</th><th>Fires when</th><th>Param</th></tr></thead><tbody><tr><td><code>OnCollisionEnter</code></td><td>Two solid colliders touch</td><td><code>Collision</code></td></tr><tr><td><code>OnTriggerEnter</code></td><td>Something enters a trigger</td><td><code>Collider</code></td></tr><tr><td><code>OnTriggerExit</code></td><td>Something leaves a trigger</td><td><code>Collider</code></td></tr></tbody></table><div class='box danger'><div class='bt'>The collision matrix rule.</div> For <em>any</em> of these events to fire, at least one of the two objects must have a <strong>Rigidbody</strong>, and both need <strong>Colliders</strong>. Two static colliders with no Rigidbody never report a collision. This is the #1 reason \"my OnTrigger isn't firing.\"</div><h4>Make pickups</h4><ol><li>Create a small <strong>Cube</strong> or <strong>Capsule</strong>; position it on the plane. Set its scale small.</li><li>In the Inspector, check <strong>Is Trigger</strong> on its collider.</li><li>Create a <strong>Tag</strong> called <code>Pickup</code> (Tag dropdown → Add Tag, then assign it).</li><li>Duplicate it (<strong>Ctrl/Cmd+D</strong>) several times and spread them around.</li></ol><p>Now roll the ball through them — each one disappears and the Console prints a rising score. The <code>CompareTag</code> check (rather than <code>other.tag ==</code>) avoids a string allocation and is the recommended idiom.</p><div class='box tip'><div class='bt'>Use <code>GetAxisRaw</code> for snappy control.</div> <code>GetAxis</code> smooths input over time (good for a plane's throttle); <code>GetAxisRaw</code> returns hard -1/0/1 for instant response — usually what you want for a tight-feeling character.</div><div class='game'><div class='game-head'>🎮 Build This: Roll-a-Ball (collect)</div><div class='game-body'><p>A physics ball that rolls through pickups and scores.</p><ol><li>Add a Rigidbody to the Player; drive it with <code>AddForce</code> in FixedUpdate.</li><li>Create a Pickup tag and several small cubes with <strong>Is Trigger</strong> enabled.</li><li>In <code>OnTriggerEnter</code>, check the tag, deactivate the pickup, and increment score.</li><li>Print the score with <code>Debug.Log</code> and confirm pickups vanish on contact.</li></ol></div></div>"},{"id":"p2-5","part":"02 · Unity","nav":"Prefabs & 2D","num":"2.5","kicker":"Part 02 · Lesson 5","title":"Prefabs & 2D Essentials","html":"<h3>Prefabs: reusable GameObject blueprints</h3><p>A <strong>Prefab</strong> is a saved GameObject (with all its components and children) stored as an asset. You can drop many copies into scenes or spawn them at runtime, and editing the prefab asset updates every instance. They're how you avoid hand-placing identical objects and how you spawn things in code.</p><h4>Make a prefab</h4><ol><li>Build the object you want once (a platform, an enemy, a coin).</li><li>Drag it from the <strong>Hierarchy</strong> into the <strong>Project</strong> window. It turns blue in the Hierarchy — that means \"this is now a prefab instance.\"</li><li>Double-click the prefab asset to enter <strong>Prefab Mode</strong> and edit the master. Changes propagate to all instances.</li></ol><div class='box tip'><div class='bt'>Overrides are per-instance.</div> Change a value on one instance and it shows in bold with a blue line; that's an <strong>override</strong> that won't be touched by prefab edits. Use the <strong>Overrides</strong> dropdown to Apply (push to prefab) or Revert.</div><h4>Spawn prefabs in code</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>PlatformSpawner.cs</span></div><div class='term-body'>using UnityEngine;\n\npublic class PlatformSpawner : MonoBehaviour\n{\n    [SerializeField] private GameObject platformPrefab;\n    [SerializeField] private int count = 8;\n    [SerializeField] private float gap = 2.5f;\n\n    void Start()\n    {\n        for (int i = 0; i &lt; count; i++)\n        {\n            Vector3 pos = new Vector3(i * gap, Random.Range(-1f, 2f), 0f);\n            <span class='cm'>// Instantiate(prefab, position, rotation)</span>\n            Instantiate(platformPrefab, pos, Quaternion.identity);\n        }\n    }\n}</div></div><p>Drag your platform prefab asset into the <strong>Platform Prefab</strong> slot in the Inspector. Now <code>Instantiate</code> creates fresh copies at runtime.</p><h3>Switching to 2D</h3><p>2D in Unity is the same engine viewed down the Z axis with 2D-specific components. Click the <strong>2D</strong> button in the Scene view to lock to an orthographic top-down editing view. The key swaps:</p><table><thead><tr><th>3D</th><th>2D equivalent</th></tr></thead><tbody><tr><td>Mesh Renderer</td><td><strong>Sprite Renderer</strong></td></tr><tr><td>Rigidbody</td><td><strong>Rigidbody2D</strong></td></tr><tr><td>Box/Sphere Collider</td><td><strong>BoxCollider2D / CircleCollider2D</strong></td></tr><tr><td>Camera (Perspective)</td><td>Camera (<strong>Orthographic</strong>)</td></tr></tbody></table><h4>A sprite player with run and jump</h4><p>Import a PNG (drag it into Project), set its <strong>Texture Type</strong> to <strong>Sprite (2D and UI)</strong> in the Inspector, then drag it into the scene to create a Sprite Renderer GameObject. Add a <strong>Rigidbody2D</strong> and a <strong>BoxCollider2D</strong>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Platformer2D.cs</span></div><div class='term-body'>using UnityEngine;\n\n[RequireComponent(typeof(Rigidbody2D))]\npublic class Platformer2D : MonoBehaviour\n{\n    [SerializeField] private float moveSpeed = 6f;\n    [SerializeField] private float jumpForce = 9f;\n    [SerializeField] private LayerMask groundLayer;\n    [SerializeField] private Transform groundCheck;\n    private Rigidbody2D rb;\n\n    void Awake() => rb = GetComponent&lt;Rigidbody2D&gt;();\n\n    void Update()\n    {\n        float x = Input.GetAxisRaw(\"Horizontal\");\n        rb.velocity = new Vector2(x * moveSpeed, rb.velocity.y);\n\n        bool grounded = Physics2D.OverlapCircle(\n            groundCheck.position, 0.1f, groundLayer);\n        if (grounded &amp;&amp; Input.GetButtonDown(\"Jump\"))\n            rb.velocity = new Vector2(rb.velocity.x, jumpForce);\n    }\n}</div></div><div class='box danger'><div class='bt'>Don't jump without a ground check.</div> If you let Jump fire whenever Space is pressed, the player double/triple-jumps midair. The <code>OverlapCircle</code> against a Ground layer at the character's feet is the standard fix — put an empty child <code>groundCheck</code> at the sprite's base and assign your platform's layer to <strong>groundLayer</strong>.</div><div class='box tip'><div class='bt'>Keep gravity on the Rigidbody2D.</div> Set <strong>Gravity Scale</strong> to ~3 for a snappy platformer feel rather than the floaty default of 1, and freeze <strong>Rotation Z</strong> in the Rigidbody2D constraints so the player doesn't tip over.</div><div class='game'><div class='game-head'>🎮 Build This: 2D Platformer Base</div><div class='game-body'><p>A sprite player that runs and jumps across spawned prefab platforms.</p><ol><li>Switch Scene to 2D; import a sprite and add Sprite Renderer + Rigidbody2D + BoxCollider2D.</li><li>Write <code>Platformer2D</code> with velocity-based move and a ground-checked jump.</li><li>Make one platform, turn it into a prefab, set its layer to Ground.</li><li>Write <code>PlatformSpawner</code> and Instantiate a row of platforms at Start.</li><li>Assign the groundCheck child and groundLayer; press Play and traverse the level.</li></ol></div></div>"},{"id":"p2-6","part":"02 · Unity","nav":"Input System","num":"2.6","kicker":"Part 02 · Lesson 6","title":"The New Input System","html":"<h3>Why replace <code>Input.GetAxis</code></h3><p>The old <code>Input</code> class hard-codes keys and doesn't cleanly support multiple gamepads, rebinding, or touch. The modern <strong>Input System</strong> package decouples <em>actions</em> (\"Move\", \"Jump\", \"Dash\") from <em>bindings</em> (WASD, left stick, a button), so the same gameplay code works across keyboard, gamepad, and controller without changes.</p><h4>Install and enable</h4><ol><li><strong>Window → Package Manager</strong> → Unity Registry → install <strong>Input System</strong>.</li><li>It prompts to enable the new backend and restart the Editor — accept it. (You can also set <strong>Edit → Project Settings → Player → Active Input Handling</strong> to <em>Both</em> during migration.)</li></ol><h4>Create an Input Actions asset</h4><ol><li>Project window → right-click → <strong>Create → Input Actions</strong>. Name it <code>PlayerControls</code>.</li><li>Double-click to open the editor. Add an <strong>Action Map</strong> called <code>Gameplay</code>.</li><li>Add actions: <strong>Move</strong> (Action Type: <em>Value</em>, Control Type: <em>Vector2</em>), <strong>Jump</strong> (<em>Button</em>), <strong>Dash</strong> (<em>Button</em>).</li><li>For Move, add a <strong>2D Vector Composite</strong> binding and wire Up/Down/Left/Right to W/S/A/D, plus a second binding to the gamepad's <strong>Left Stick</strong>. For Jump bind <em>Space</em> and gamepad <em>South button</em>. For Dash bind <em>Left Shift</em> and gamepad <em>West button</em>.</li><li>Check <strong>Generate C# Class</strong> at the top of the asset's Inspector and Apply — this creates a typed wrapper class.</li></ol><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>PlayerInputHandler.cs</span></div><div class='term-body'>using UnityEngine;\nusing UnityEngine.InputSystem;\n\npublic class PlayerInputHandler : MonoBehaviour\n{\n    private PlayerControls controls; <span class='cm'>// generated class</span>\n    private Vector2 moveInput;\n    private Rigidbody2D rb;\n    [SerializeField] private float moveSpeed = 6f;\n    [SerializeField] private float jumpForce = 9f;\n    [SerializeField] private float dashForce = 18f;\n\n    void Awake()\n    {\n        rb = GetComponent&lt;Rigidbody2D&gt;();\n        controls = new PlayerControls();\n\n        <span class='cm'>// Event callbacks fire on press, not polled</span>\n        controls.Gameplay.Jump.performed += OnJump;\n        controls.Gameplay.Dash.performed += OnDash;\n    }\n\n    void OnEnable()  =&gt; controls.Gameplay.Enable();\n    void OnDisable() =&gt; controls.Gameplay.Disable();\n\n    void Update()\n    {\n        <span class='cm'>// Value actions are polled each frame</span>\n        moveInput = controls.Gameplay.Move.ReadValue&lt;Vector2&gt;();\n        rb.velocity = new Vector2(moveInput.x * moveSpeed, rb.velocity.y);\n    }\n\n    void OnJump(InputAction.CallbackContext ctx)\n    {\n        rb.velocity = new Vector2(rb.velocity.x, jumpForce);\n    }\n\n    void OnDash(InputAction.CallbackContext ctx)\n    {\n        float dir = Mathf.Sign(moveInput.x == 0 ? 1 : moveInput.x);\n        rb.AddForce(new Vector2(dir * dashForce, 0f), ForceMode2D.Impulse);\n    }\n}</div></div><div class='box law'><div class='bt'>Enable and disable maps with the object.</div> Always call <code>Enable()</code> in <code>OnEnable</code> and <code>Disable()</code> in <code>OnDisable</code>. Forgetting to enable the map is why \"nothing happens\" — the actions exist but aren't listening. Disabling on teardown prevents leaked callbacks.</div><h3>Value vs. Button actions</h3><table><thead><tr><th>Action type</th><th>How you read it</th></tr></thead><tbody><tr><td><strong>Value</strong> (e.g. Move)</td><td>Poll with <code>ReadValue&lt;T&gt;()</code> in Update — it has a continuous state.</td></tr><tr><td><strong>Button</strong> (Jump, Dash)</td><td>Subscribe to <code>.performed</code> — fires once on press. Also <code>.started</code> / <code>.canceled</code>.</td></tr></tbody></table><div class='box tip'><div class='bt'>Test devices instantly.</div> The Input Actions editor and the <strong>Input Debugger</strong> (Window → Analysis → Input Debugger) show live device input. Plug in a controller and watch the left stick feed the Move action — no code needed to verify bindings.</div><div class='box danger'><div class='bt'>Don't mix old and new carelessly.</div> If <strong>Active Input Handling</strong> is set to the new system only, any leftover <code>Input.GetAxis</code> call throws an exception at runtime. Either migrate fully or set the handler to <em>Both</em> while transitioning.</div><div class='game'><div class='game-head'>🎮 Build This: Platformer with Actions</div><div class='game-body'><p>Replace direct key reads with Input System actions for move, jump, and dash.</p><ol><li>Install the Input System package and enable the new backend.</li><li>Create a PlayerControls asset with Move (Vector2), Jump, and Dash; bind keyboard <em>and</em> gamepad.</li><li>Enable Generate C# Class and Apply.</li><li>Write <code>PlayerInputHandler</code>: poll Move in Update, subscribe Jump/Dash to <code>.performed</code>.</li><li>Enable/Disable the map in OnEnable/OnDisable; test with both keyboard and a controller.</li></ol></div></div>"},{"id":"p2-7","part":"02 · Unity","nav":"UI with uGUI","num":"2.7","kicker":"Part 02 · Lesson 7","title":"UI with Canvas & uGUI","html":"<h3>Everything UI lives on a Canvas</h3><p>uGUI (Unity's built-in UI) draws all elements as children of a <strong>Canvas</strong>. Add one via <strong>GameObject → UI → Canvas</strong>; Unity also auto-creates an <strong>EventSystem</strong> (required for buttons to receive clicks). A Canvas has a <strong>Render Mode</strong>:</p><table><thead><tr><th>Render Mode</th><th>Use</th></tr></thead><tbody><tr><td><strong>Screen Space - Overlay</strong></td><td>Default. Draws on top of everything, ignores cameras. HUDs, menus.</td></tr><tr><td><strong>Screen Space - Camera</strong></td><td>Rendered by a camera; can sit at a distance and respect perspective.</td></tr><tr><td><strong>World Space</strong></td><td>The canvas is a physical object in the scene (e.g. a sign, a health bar over an enemy).</td></tr></tbody></table><h4>Make the Canvas resolution-independent</h4><p>Select the Canvas → on the <strong>Canvas Scaler</strong> component set <strong>UI Scale Mode</strong> to <strong>Scale With Screen Size</strong> and a reference resolution like <strong>1920×1080</strong>. Without this, UI is sized in raw pixels and breaks on other screens.</p><h3>Anchors: the thing everyone gets wrong</h3><p>Every UI element has a <strong>RectTransform</strong> with <strong>anchors</strong> — points it stays pinned to relative to its parent. Anchor a score label to the top-left corner and it stays in the corner on any resolution; leave it centered and it drifts. Use the anchor presets widget (top-left of the RectTransform), and <strong>hold Alt</strong> while clicking a preset to also set position.</p><div class='box law'><div class='bt'>Anchor to the nearest edge.</div> Top-left HUD → anchor top-left. Centered menu → anchor center. A bar that should stretch full-width → set left/right anchors apart so it grows with the screen. Get anchors right and your UI just works on every device.</div><h4>Wire UI to code</h4><p>Add a <strong>TextMeshPro</strong> text for the score (UI → Text - TextMeshPro; import TMP Essentials when prompted — TMP is sharper than legacy Text). Add a <strong>Button - TextMeshPro</strong> for Restart. Then drive them from a manager.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>RunnerUI.cs</span></div><div class='term-body'>using UnityEngine;\nusing UnityEngine.UI;\nusing TMPro;\n\npublic class RunnerUI : MonoBehaviour\n{\n    [SerializeField] private TMP_Text scoreText;\n    [SerializeField] private GameObject gameOverPanel;\n    [SerializeField] private Button restartButton;\n    private float distance;\n    private bool dead;\n\n    void Start()\n    {\n        gameOverPanel.SetActive(false);\n        <span class='cm'>// Hook the button click in code (or via Inspector)</span>\n        restartButton.onClick.AddListener(Restart);\n    }\n\n    void Update()\n    {\n        if (dead) return;\n        distance += Time.deltaTime * 10f;\n        scoreText.text = $\"Score: {Mathf.FloorToInt(distance)}\";\n    }\n\n    public void GameOver()\n    {\n        dead = true;\n        gameOverPanel.SetActive(true);\n    }\n\n    void Restart()\n    {\n        UnityEngine.SceneManagement.SceneManager.LoadScene(\n            UnityEngine.SceneManagement.SceneManager.GetActiveScene().buildIndex);\n    }\n}</div></div><p>Drag the score Text, the game-over Panel, and the Button into the matching Inspector slots. You can wire <code>onClick</code> either in code (shown above) or by clicking <strong>+</strong> on the Button's <strong>On Click ()</strong> list and selecting a public method — both are valid; code-wiring survives prefab refactors better.</p><h4>The endless runner</h4><p>An auto-runner is the perfect UI showcase: the player moves on its own, obstacles spawn, and the only inputs are jump and the restart button. Reuse last lesson's player but give it constant forward velocity. Spawn obstacle prefabs on a timer ahead of the player; when an obstacle's trigger overlaps the player, call <code>RunnerUI.GameOver()</code>.</p><div class='box danger'><div class='bt'>No EventSystem = dead buttons.</div> If clicking a Button does nothing, check the Hierarchy for an <strong>EventSystem</strong> object. Deleting it (or having a fullscreen invisible Image with <strong>Raycast Target</strong> on top) silently eats every click.</div><div class='box tip'><div class='bt'>Pause time on game over.</div> Set <code>Time.timeScale = 0f</code> to freeze gameplay behind the panel, and reset it to <code>1f</code> on restart. Remember UI animations using unscaled time still run.</div><div class='game'><div class='game-head'>🎮 Build This: Endless Runner</div><div class='game-body'><p>An auto-running player with spawned obstacles, live score, and a game-over screen.</p><ol><li>Give the player constant forward velocity and a jump.</li><li>Spawn obstacle prefabs on a timer in front of the player; despawn them behind it.</li><li>Add a Canvas (Scale With Screen Size); place a top-anchored TMP score and a centered game-over Panel + Restart button.</li><li>Write <code>RunnerUI</code>: increment score in Update, show the panel on death, wire Restart to reload the scene.</li><li>On obstacle-trigger collision, call GameOver and freeze with <code>Time.timeScale</code>.</li></ol></div></div>"},{"id":"p2-8","part":"02 · Unity","nav":"Animation","num":"2.8","kicker":"Part 02 · Lesson 8","title":"Animation with the Animator","html":"<h3>Clips, Controllers, and the state machine</h3><p>Unity animation has three layers. <strong>Animation Clips</strong> are recorded property changes over time (a run cycle, a muzzle flash). An <strong>Animator Controller</strong> is a state machine that decides which clip plays and how states transition. The <strong>Animator</strong> component on a GameObject runs a Controller. You drive transitions with <strong>parameters</strong> your code sets.</p><h4>Create clips</h4><ol><li>Select your character. Open <strong>Window → Animation → Animation</strong>. Click <strong>Create</strong> and save a clip named <code>Idle</code>.</li><li>For sprite animation, drag a sequence of sprites onto the timeline to make a frame-by-frame clip; for property animation, hit <strong>record</strong> and change values at different keyframes.</li><li>Make <code>Run</code> and <code>Shoot</code> clips the same way. Set Idle and Run to <strong>Loop Time</strong> in their import settings; leave Shoot non-looping.</li></ol><h4>Build the state machine</h4><p>Open <strong>Window → Animation → Animator</strong>. You'll see your clips as states with <strong>Entry → Idle</strong> as default. Add <strong>parameters</strong> (the + in the Parameters panel):</p><table><thead><tr><th>Parameter</th><th>Type</th><th>Drives</th></tr></thead><tbody><tr><td><code>Speed</code></td><td>Float</td><td>Idle ↔ Run</td></tr><tr><td><code>Shoot</code></td><td>Trigger</td><td>Any → Shoot (one-shot)</td></tr></tbody></table><p>Right-click <code>Idle</code> → <strong>Make Transition</strong> → click <code>Run</code>. Select the arrow and add a <strong>Condition</strong>: <code>Speed &gt; 0.1</code>. Make the reverse transition Run → Idle with <code>Speed &lt; 0.1</code>. For shooting, use a transition from <strong>Any State</strong> → Shoot with condition <code>Shoot</code> (trigger), and Shoot → Idle with <strong>Has Exit Time</strong> checked so it returns when the clip finishes.</p><div class='box tip'><div class='bt'>Turn off Has Exit Time for responsive moves.</div> By default a transition waits for the current clip to finish (Exit Time). For instant Idle↔Run swaps, <strong>uncheck Has Exit Time</strong> and set transition duration low (~0.05). Keep it <em>on</em> for fire-and-finish animations like Shoot.</div><h4>Drive it from code</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>ShooterCharacter.cs</span></div><div class='term-body'>using UnityEngine;\n\npublic class ShooterCharacter : MonoBehaviour\n{\n    [SerializeField] private float moveSpeed = 5f;\n    [SerializeField] private GameObject bulletPrefab;\n    [SerializeField] private Transform muzzle;\n    private Animator anim;\n    private Rigidbody2D rb;\n\n    <span class='cm'>// Cache parameter hashes — faster than string lookups</span>\n    private static readonly int SpeedHash = Animator.StringToHash(\"Speed\");\n    private static readonly int ShootHash = Animator.StringToHash(\"Shoot\");\n\n    void Awake()\n    {\n        anim = GetComponent&lt;Animator&gt;();\n        rb = GetComponent&lt;Rigidbody2D&gt;();\n    }\n\n    void Update()\n    {\n        Vector2 move = new Vector2(\n            Input.GetAxisRaw(\"Horizontal\"),\n            Input.GetAxisRaw(\"Vertical\"));\n        rb.velocity = move * moveSpeed;\n        anim.SetFloat(SpeedHash, move.sqrMagnitude); <span class='cm'>// 0 when idle</span>\n\n        if (Input.GetButtonDown(\"Fire1\"))\n        {\n            anim.SetTrigger(ShootHash);\n            Instantiate(bulletPrefab, muzzle.position, muzzle.rotation);\n        }\n    }\n}</div></div><div class='box law'><div class='bt'>Hash your parameter names once.</div> <code>SetFloat(\"Speed\", x)</code> hashes the string every call. <code>Animator.StringToHash</code> in a static readonly field does it once. With many animated characters this is real savings — and it's the pro idiom.</div><div class='box danger'><div class='bt'>Triggers can stick.</div> A <strong>Trigger</strong> stays \"set\" until a transition consumes it. If your Any State → Shoot transition condition is wrong, the trigger queues and fires later unexpectedly. Make sure exactly one transition consumes the trigger, and avoid setting it every frame.</div><div class='box tip'><div class='bt'>Use sqrMagnitude for the Speed check.</div> Comparing <code>move.sqrMagnitude</code> avoids a square root and works fine since you only test against a threshold. Idle reads ~0; moving reads &gt;0.</div><div class='game'><div class='game-head'>🎮 Build This: Top-Down Shooter Core</div><div class='game-body'><p>A character that animates idle/run/shoot and fires prefab bullets.</p><ol><li>Make Idle, Run (looping), and Shoot (one-shot) clips for your sprite.</li><li>In the Animator add a Float <code>Speed</code> and a Trigger <code>Shoot</code>; wire Idle↔Run and Any→Shoot transitions.</li><li>Create a bullet prefab with a Rigidbody2D and a script that moves it forward.</li><li>Write <code>ShooterCharacter</code>: set <code>Speed</code> from movement, SetTrigger on fire, and Instantiate a bullet at a muzzle Transform.</li><li>Tune transition Has Exit Time so Run is snappy and Shoot finishes its clip.</li></ol></div></div>"},{"id":"p2-9","part":"02 · Unity","nav":"Capstone & Builds","num":"2.9","kicker":"Part 02 · Lesson 9","title":"Capstone: Scenes, Build Settings & Shipping","html":"<h3>Multiple scenes, one game</h3><p>Real games split into <strong>scenes</strong>: a Main Menu, the gameplay level(s), maybe a separate Game Over. Each scene is a saved file. You move between them at runtime with the <strong>SceneManager</strong>, and you must register every scene that ships in <strong>Build Settings</strong> or it won't be included.</p><h4>Set up scene flow</h4><ol><li>Create <code>MainMenu</code> and <code>Game</code> scenes (File → New Scene, then Save As into <code>Assets/Scenes</code>).</li><li>Open <strong>File → Build Settings</strong>. Drag both scenes into <strong>Scenes In Build</strong>. The <strong>order matters</strong>: index 0 is what loads first — put <code>MainMenu</code> on top.</li></ol><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>MenuManager.cs</span></div><div class='term-body'>using UnityEngine;\nusing UnityEngine.SceneManagement;\n\npublic class MenuManager : MonoBehaviour\n{\n    <span class='cm'>// Wire these to button On Click() events</span>\n    public void PlayGame()\n    {\n        SceneManager.LoadScene(\"Game\");\n    }\n\n    public void QuitGame()\n    {\n        Application.Quit();\n        Debug.Log(\"Quit (no effect in the Editor)\");\n    }\n}</div></div><p>On your menu, add a Play Button whose <strong>On Click()</strong> calls <code>MenuManager.PlayGame</code>, and a Quit Button calling <code>QuitGame</code>. Reference scenes by name (as above) or build index — name is more readable.</p><div class='box law'><div class='bt'>If it's not in Build Settings, it doesn't exist.</div> <code>LoadScene(\"Game\")</code> works in the Editor only if the scene is registered. A standalone build that omits a scene throws \"Scene couldn't be loaded.\" Always confirm the Scenes In Build list before building.</div><h4>Persisting data across scenes</h4><p>Loading a scene destroys the previous one's GameObjects. To carry a score or settings across scenes, mark a manager with <code>DontDestroyOnLoad(gameObject)</code> in its <code>Awake</code>, or store values in <code>PlayerPrefs</code> for simple persistence between sessions.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>GameManager.cs</span></div><div class='term-body'>using UnityEngine;\n\npublic class GameManager : MonoBehaviour\n{\n    public static GameManager Instance;\n\n    void Awake()\n    {\n        <span class='cm'>// Singleton that survives scene loads</span>\n        if (Instance != null) { Destroy(gameObject); return; }\n        Instance = this;\n        DontDestroyOnLoad(gameObject);\n    }\n\n    public int HighScore\n    {\n        get =&gt; PlayerPrefs.GetInt(\"HighScore\", 0);\n        set =&gt; PlayerPrefs.SetInt(\"HighScore\", value);\n    }\n}</div></div><h3>Producing a desktop build</h3><ol><li><strong>File → Build Settings</strong> → choose your platform (<strong>Windows / Mac / Linux</strong>) and click <strong>Switch Platform</strong> if needed.</li><li>Open <strong>Player Settings</strong>: set <strong>Company Name</strong>, <strong>Product Name</strong>, an icon, and the default <strong>resolution / fullscreen mode</strong>.</li><li>Click <strong>Build</strong>, pick an empty output folder, and wait. Unity produces an executable plus a <code>_Data</code> folder (Windows) or an <code>.app</code> bundle (Mac).</li><li>Use <strong>Build And Run</strong> to launch it immediately and confirm it works outside the Editor.</li></ol><div class='box danger'><div class='bt'>The Editor lies about some things.</div> Things that work in Play mode can break in a build: <code>Application.Quit</code> does nothing in the Editor, files in <code>Assets</code> may not exist at the same path, and <code>Debug.Log</code> noise costs performance. Always test the actual build before calling it done.</div><div class='box tip'><div class='bt'>Strip and compress for release.</div> In Player Settings, set the <strong>scripting backend</strong> appropriately, enable <strong>managed stripping</strong>, and check texture compression. A debug build is fine for testing; flip to a release configuration before sharing.</div><h4>Your capstone checklist</h4><p>Combine everything: a MainMenu scene with Play/Quit, a Game scene using physics or 2D movement, an Animator-driven character, a uGUI HUD with live score and a game-over flow, and a persistent high score. Then ship a standalone build.</p><div class='game'><div class='game-head'>🎮 Build This: Capstone Game + Build</div><div class='game-body'><p>A complete small Unity game with menu and gameplay scenes, animation, UI, and a desktop build.</p><ol><li>Create MainMenu and Game scenes; add both to Build Settings with MainMenu at index 0.</li><li>Wire a Play button to <code>SceneManager.LoadScene(\"Game\")</code> and a Quit button to <code>Application.Quit</code>.</li><li>Build gameplay reusing earlier skills: input-driven movement, an Animator character, physics/triggers, and a uGUI HUD.</li><li>Add a <code>GameManager</code> with <code>DontDestroyOnLoad</code> + PlayerPrefs to persist a high score.</li><li>Set Player Settings (name, icon, resolution); use Build And Run to produce and launch a desktop build, then test it outside the Editor.</li></ol></div></div>"},{"id":"p3-1","part":"03 · Unreal","nav":"Install & Editor Tour","num":"3.1","kicker":"Part 03 · Lesson 1","title":"Install UE5 & Tour the Editor","html":"<h3>Getting Unreal onto your machine</h3><p>Unreal Engine 5 ships through the <strong>Epic Games Launcher</strong>. You do not download the engine directly; you install the launcher first, then add engine versions from inside it.</p><ol><li>Go to unrealengine.com, create a free Epic account, and download the Epic Games Launcher for your OS.</li><li>Open the launcher, sign in, and click the <strong>Unreal Engine</strong> tab on the left.</li><li>Open the <strong>Library</strong> sub-tab. Next to <em>Engine Versions</em>, click the <code>+</code> and pick the latest 5.x release (e.g. 5.4).</li><li>Click <strong>Install</strong>. Expect 30–60 GB. Under <em>Options</em> you can uncheck platforms you do not need (Android, iOS, Linux) to save space, but keep <em>Starter Content</em> and <em>Engine Source</em> if you plan to write C++.</li></ol><div class='box danger'><div class='bt'>C++ needs a compiler.</div> On Windows install <strong>Visual Studio 2022</strong> (Community is free) with the <em>Game development with C++</em> workload AND the <em>Desktop development with C++</em> workload. On macOS install <strong>Xcode</strong> from the App Store and run it once to accept the license. Without these, C++ projects will not compile.</div><h3>Creating your first project</h3><p>Hit <strong>Launch</strong> on your engine version. The <strong>Project Browser</strong> opens. Pick a category (Games), then a template. For now choose <strong>Third Person</strong>. Set:</p><ul><li><strong>Blueprint</strong> vs <strong>C++</strong> — choose Blueprint for this first project; you can add C++ later.</li><li><strong>Quality Preset</strong> — Maximum for desktop.</li><li><strong>Starter Content</strong> — leave on; it gives you meshes and materials.</li><li><strong>Project name & location</strong> — avoid spaces and deep paths; e.g. <code>D:/UE/FirstProto</code>.</li></ul><h3>Touring the editor</h3><p>The editor opens to the <strong>Level Editor</strong>. Learn these regions:</p><table><thead><tr><th>Region</th><th>What it is</th></tr></thead><tbody><tr><td>Viewport (center)</td><td>The 3D view of your level.</td></tr><tr><td>Outliner (top-right)</td><td>A tree of every Actor in the level.</td></tr><tr><td>Details (bottom-right)</td><td>Properties of whatever is selected.</td></tr><tr><td>Content Drawer (bottom)</td><td>Your asset browser — meshes, materials, Blueprints.</td></tr><tr><td>Toolbar (top)</td><td>Save, Play (PIE), platform/build settings.</td></tr></tbody></table><h3>Navigating the viewport</h3><p>This is the single most important skill. With the viewport focused:</p><ul><li><strong>Fly mode:</strong> hold <em>Right Mouse Button</em> and use <code>W A S D</code> to fly; <code>Q</code>/<code>E</code> drop/raise; mouse wheel changes speed.</li><li><strong>Orbit:</strong> hold <em>Alt + Left Mouse</em> to tumble around the selection.</li><li><strong>Pan:</strong> hold <em>Middle Mouse</em> and drag.</li><li><strong>Focus:</strong> select an Actor and press <code>F</code> to frame it.</li></ul><div class='box tip'><div class='bt'>Press Play (Alt+P).</div> This is <em>Play In Editor</em> (PIE). The Third Person template drops you in as a controllable character. Press <code>Esc</code> or click Stop to return to editing.</div><div class='box law'><div class='bt'>Save early, save the level.</div> <code>Ctrl+S</code> saves the current level. <strong>File &gt; Save All</strong> saves every dirty asset. The engine does not autosave your edits to disk by default.</div><div class='game'><div class='game-head'>🎮 Build This: First Prototype Flythrough</div><div class='game-body'><p>Open a template level and fly the camera around a placed set of meshes.</p><ol><li>Create a Third Person project with Starter Content.</li><li>Open the <em>ThirdPersonMap</em> (or the Open World template) from the Content Drawer.</li><li>Drag two or three meshes from <em>StarterContent/Props</em> into the viewport.</li><li>Practice fly-cam: RMB + WASD to orbit the scene, <code>F</code> to focus each mesh.</li><li>Press Play, walk the character around your props, then Stop and Save All.</li></ol></div></div>"},{"id":"p3-2","part":"03 · Unreal","nav":"Projects & Levels","num":"3.2","kicker":"Part 03 · Lesson 2","title":"Projects, Levels & Placing Actors","html":"<h3>How a project is organized</h3><p>A UE5 project is a folder containing a <code>.uproject</code> file, a <code>Content/</code> folder (all your assets), and — if you use C++ — <code>Source/</code>, <code>Config/</code>, and generated <code>Binaries/</code> and <code>Intermediate/</code> folders. The <strong>Content Drawer</strong> mirrors <code>Content/</code> on disk.</p><div class='box law'><div class='bt'>Folder discipline pays off.</div> Make top-level folders like <code>Maps/</code>, <code>Blueprints/</code>, <code>Materials/</code>, <code>Meshes/</code>, <code>UI/</code>. Never move or rename assets in your OS file explorer — always do it inside the Content Drawer so the engine can fix references.</div><h3>Levels (maps)</h3><p>A <strong>Level</strong> is a single <code>.umap</code> file holding a collection of Actors. Create one with <strong>File &gt; New Level</strong> and pick <em>Empty Level</em> or <em>Basic</em> (Basic gives you a floor, light, and sky). Save it into <code>Content/Maps/</code>.</p><p>To make a level load when the game starts, set it in <strong>Edit &gt; Project Settings &gt; Maps &amp; Modes &gt; Default Maps</strong>. There are two slots: <em>Editor Startup Map</em> and <em>Game Default Map</em>.</p><h3>Placing Actors</h3><p>An <strong>Actor</strong> is anything you can place in a level. Add them via:</p><ul><li>Drag a Static Mesh from the Content Drawer into the viewport.</li><li>Use the <strong>+ Add</strong> button (or the Place Actors panel) for primitives: Cube, Sphe
