 info. Make keys easy with a key-distribution service (Keymailer, Woovit, or Steam's own key requests).</p><h3>Demos and festivals</h3><p>A polished <strong>demo</strong> is the strongest wishlist driver available. The flagship opportunity is <strong>Steam Next Fest</strong>, a week-long event of playable demos held a few times a year. Mechanics that matter:</p><ul><li>You register your demo for a specific Next Fest in Steamworks; the demo gets its own app/depot.</li><li><strong>Build wishlists going in</strong> — Next Fest ranking and visibility favor games that already have momentum, so don't launch a cold page into it.</li><li>Run a livestream during the fest; streaming slots boost placement.</li><li>Treat the demo as a slice you'll <em>remove or update</em> at launch; keep it tight (15-30 min) and end on a hook + wishlist prompt.</li></ul><div class='box danger'><div class='bt'>Don't burn Next Fest early.</div> You can only feature a game in one Next Fest. Use it close to launch (a few weeks out) so the wishlist surge converts to day-one sales while it's still warm — not a year before when momentum fades.</div><h3>The launch calendar</h3><table><thead><tr><th>When</th><th>Action</th></tr></thead><tbody><tr><td>~12 mo out</td><td>Steam page live; weekly devlog/GIF cadence begins</td></tr><tr><td>~3 mo out</td><td>Build press/streamer list; finalize press kit + trailer</td></tr><tr><td>~3-6 wk out</td><td>Demo live; participate in Next Fest; send embargoed keys</td></tr><tr><td>Launch week</td><td>Wishlist emails fire; coordinate streamer/press coverage; day-one patch ready</td></tr><tr><td>Post-launch</td><td>Discount events, updates, community engagement</td></tr></tbody></table><div class='game'><div class='game-head'>🎮 Build This: Launch-Marketing Plan</div><div class='game-body'><p>Goal: a concrete calendar and outreach kit you can execute.</p><ol><li>Write a dated launch-marketing calendar from page-live to post-launch.</li><li>Identify your one repeatable, shareable GIF moment and a weekly posting cadence.</li><li>Draft a personalized press/streamer outreach email and a key list of 15-30 relevant contacts.</li><li>Assemble a press kit (logo, capsule, screenshots, trailer, fact sheet).</li><li>Register a demo for the next Steam Next Fest (or equivalent) with a wishlist call-to-action.</li></ol></div></div>"},{"id":"p7-7","part":"09 · Ship It","nav":"Monetization & Pricing","num":"9.7","kicker":"Part 09 · Lesson 7","title":"Monetization Models & Pricing","html":"<h3>Match the model to the game</h3><p>There is no &quot;best&quot; monetization model; there is a model that fits your genre, platform, and audience, and many that fight against it. The wrong model can kill an otherwise great game (ads in a premium narrative game; a $40 price on a five-minute mobile toy). Choose deliberately.</p><table><thead><tr><th>Model</th><th>Fits</th><th>Watch out for</th></tr></thead><tbody><tr><td><strong>Premium</strong> (pay once)</td><td>Story, single-player, PC/console, itch/Steam</td><td>No recurring revenue; needs marketing spike at launch</td></tr><tr><td><strong>Free-to-play</strong></td><td>Multiplayer, live-service, mobile, huge audiences</td><td>Needs scale + retention design or it earns nothing</td></tr><tr><td><strong>IAP</strong> (in-app purchase)</td><td>F2P mobile, cosmetics, currency</td><td>Pay-to-win backlash; platform takes 30%</td></tr><tr><td><strong>Ads</strong></td><td>Casual/hyper-casual mobile, web</td><td>Tiny per-user revenue; hurts premium feel</td></tr><tr><td><strong>DLC / expansions</strong></td><td>Content-rich games with a fanbase</td><td>Don't carve out base-game content as DLC</td></tr><tr><td><strong>Season pass / battle pass</strong></td><td>Live-service with steady content</td><td>Requires a content treadmill you must sustain</td></tr><tr><td><strong>Donations / NYP</strong></td><td>Jam games, devlogs, open-source, early itch</td><td>Unpredictable; not a salary</td></tr></tbody></table><h3>Premium pricing</h3><p>For premium PC/console indies, price by <strong>scope and genre comparables</strong>, not hours of work. Survey 5-10 similar successful games and their prices. Common indie tiers: small/short ($5-10), mid ($15-20), substantial ($25-30). <em>Pricing too low signals low value</em> and leaves money on the table — and it's hard to raise a price later. You can always discount down; you can rarely move up.</p><div class='box law'><div class='bt'>Discount, don't underprice.</div> Set an honest full price, then use Steam's seasonal sales (and a launch discount of 10-15% to nudge wishlist conversion) to reach price-sensitive buyers. Frequent deep discounts train your audience to wait, so plan a discount schedule.</div><h3>F2P math</h3><p>Free-to-play lives and dies on <strong>retention</strong> and <strong>conversion</strong>. Key metrics: <em>D1/D7/D30 retention</em>, <em>conversion rate</em> (% of players who ever pay, often 1-5%), <em>ARPU/ARPPU</em> (average revenue per user / per paying user), and <em>LTV</em> (lifetime value). If LTV exceeds your cost to acquire a user (CPI), you can grow profitably. Without massive reach, F2P usually loses to premium for solo devs.</p><h3>Ethical IAP</h3><p>Sell <strong>cosmetics, convenience, and content</strong> — not power and not loot boxes (which face legal restrictions in several countries and require odds disclosure). Avoid pay-to-win in competitive games; it poisons the community and your reviews. Be transparent about prices and what currency buys.</p><h3>Regional pricing</h3><p>A $20 USD price is unaffordable in many countries; charging the USD-converted equivalent crushes sales there and invites grey-market key reselling. Storefronts let you set <strong>per-region prices</strong> tuned to local purchasing power. Steam suggests regional prices, but review them — and don't set a region so low it becomes an arbitrage source.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>regional-pricing.tsv (base $19.99 USD)</span></div><div class='term-body'>Region        Currency   Price   ~USD\nUnited States USD        19.99   19.99\nEurozone      EUR        19.50   ~21\nUnited Kingdom GBP       16.75   ~21\nBrazil        BRL        39.99   ~7\nTurkey        TRY        219     ~7\nIndia         INR        599     ~7\nChina         CNY        70      ~10</div></div><p>Note how PPP-adjusted regions land well below the USD figure — that is intentional. The alternative is near-zero sales in those markets.</p><div class='box tip'><div class='bt'>Set price before the page is public if possible.</div> Steam restricts how often and how steeply you can change base price after launch (you can't raise it within 30 days of a discount, etc.). Decide thoughtfully up front.</div><div class='game'><div class='game-head'>🎮 Build This: Monetization &amp; Pricing Plan</div><div class='game-body'><p>Goal: a justified model and a concrete price table.</p><ol><li>Pick one monetization model and write 2-3 sentences justifying it against your genre/platform/audience.</li><li>Survey 5 comparable games' prices and set your base price with reasoning.</li><li>Decide your launch discount (e.g. 10-15%) and a sale cadence.</li><li>Fill a regional pricing table for your top 5-7 markets, PPP-adjusted.</li><li>If using IAP/ads, list exactly what you sell and confirm it isn't pay-to-win or a loot box.</li></ol></div></div>"},{"id":"p7-8","part":"09 · Ship It","nav":"Business, Legal & Post-Launch","num":"9.8","kicker":"Part 09 · Lesson 8","title":"Business, Legal & Post-Launch Operations","html":"<h3>You're running a business now</h3><p>The moment money changes hands, you have a business with legal and tax obligations. Handling this badly creates real liability; handling it well is mostly paperwork done once. (This is general education, not legal or tax advice — consult a professional for your jurisdiction.)</p><h3>Entity and taxes</h3><p>Many indies operate as a <strong>sole proprietor</strong> at first, then form an <strong>LLC</strong> (or local equivalent) to separate personal assets from business liability and to look professional to partners. An LLC also clarifies ownership when collaborators are involved. Practical steps:</p><ul><li>Register the entity; get a business ID/EIN.</li><li>Open a <strong>separate business bank account</strong> — never commingle funds; it preserves the liability shield and simplifies taxes.</li><li>Track income and expenses (storefront payouts, asset purchases, contractor pay) from day one.</li><li>Complete the <strong>tax forms storefronts require</strong> (e.g. W-9/W-8 for Steam, App Store, Google) or they withhold up to 30% and delay payouts. Non-US devs file treaty forms to reduce withholding.</li><li>Remember storefronts handle <strong>sales tax/VAT</strong> collection in most regions, but you still owe income tax on payouts.</li></ul><div class='box danger'><div class='bt'>Missing tax forms freeze your money.</div> Steam, Apple, and Google all hold payouts until tax interviews are complete. Do these the day you register, not the week you launch.</div><h3>Age ratings</h3><p>Many storefronts and regions require an age rating. The big ones: <strong>ESRB</strong> (North America), <strong>PEGI</strong> (Europe), <strong>USK</strong> (Germany), <strong>CERO</strong> (Japan), and <strong>IARC</strong> — a single questionnaire that generates multiple regional ratings at once and is what Steam, Google Play, and others use. You answer questions about violence, language, sexual content, gambling, and user interaction; the rating is assigned automatically for digital titles. Physical releases and consoles often need formal ESRB/PEGI submission.</p><h3>Music and asset licensing</h3><p>Every asset you ship must be licensed for commercial use and for the platforms you ship on. This is where indies get sued or DMCA'd.</p><ul><li>Read the <strong>actual license</strong> for every store asset, font, plugin, sound, and music track. &quot;Free&quot; often means non-commercial or requires attribution.</li><li><strong>CC-BY</strong> requires crediting the author; <strong>CC-BY-SA</strong> can force you to share-alike; <strong>CC-NC</strong> forbids commercial use entirely — avoid it for commercial games.</li><li>Keep a <strong>license ledger</strong>: asset, source, license type, date, proof/receipt, attribution text.</li><li>Don't use copyrighted music or trademarks. &quot;It's just for the trailer&quot; is how you get the trailer taken down and the channel struck.</li><li>For commissioned work, get a <strong>written contract</strong> with explicit IP assignment (a &quot;work for hire&quot; clause), so you own the art/music outright.</li></ul><div class='box law'><div class='bt'>If you can't prove the license, don't ship the asset.</div> A spreadsheet of every third-party asset with its license and receipt is your insurance. Audit it before every release.</div><h3>Contracts</h3><p>Any time someone else contributes (artist, composer, programmer, publisher, port studio) get it in writing: scope, deliverables, payment, deadlines, <strong>IP ownership/assignment</strong>, and revenue split. Verbal agreements between friends are the most common source of post-success disputes.</p><h3>Post-launch operations</h3><p>Launch is the midpoint, not the finish line. Run the live game with data:</p><ul><li><strong>Analytics:</strong> track funnel (page views → wishlists → sales), crash/error rates, retention, and (with consent) gameplay events to find where players quit or get stuck. Respect privacy laws (GDPR/CCPA) and your storefront's data rules.</li><li><strong>Updates:</strong> ship a <strong>day-one patch</strong> for issues found after gold, then a steady cadence of fixes and content. Read reviews — early negative reviews about bugs are fixable; respond and patch.</li><li><strong>Community:</strong> a Discord or forum, prompt patch notes, and visible responsiveness convert buyers into advocates who drive word-of-mouth.</li><li><strong>Ports:</strong> with PC sales data, you can justify console ports — apply to dev programs, budget for cert, and consider a porting partner.</li></ul><div class='game'><div class='game-head'>🎮 Build This: Business, Legal &amp; 90-Day Plan</div><div class='game-body'><p>Goal: a launch-ready legal/business setup and a post-launch roadmap.</p><ol><li>Confirm your entity (sole prop or LLC), separate bank account, and completed storefront tax forms.</li><li>Obtain an age rating via IARC (and ESRB/PEGI if needed) by completing the content questionnaire.</li><li>Build a license ledger auditing every music/asset/font/plugin with source, license, and proof.</li><li>Put any collaborator agreement in writing with explicit IP assignment.</li><li>Write a 90-day post-launch plan: day-one patch, update cadence, community channel, analytics to watch, and a ports decision checkpoint.</li></ol></div></div>"}];
/* ===== RENDER ENGINE ===== */
const nav=document.getElementById('nav');
const content=document.getElementById('content');
const crumbPath=document.getElementById('crumbPath');
const pfill=document.getElementById('pfill');
const pctTxt=document.getElementById('pctTxt');
const completed=new Set();
let current=0;
let lastPart=null;
L.forEach((les,i)=>{
  if(les.part!==lastPart){
    const lab=document.createElement('span');lab.className='part-label';lab.textContent=les.part;nav.appendChild(lab);lastPart=les.part;
  }
  const b=document.createElement('button');
  b.className='nav-item';b.dataset.i=i;
  b.innerHTML=`<span class="num">${les.num||'»'}</span><span class="ntxt">${les.nav}</span><span class="done">✓</span>`;
  b.addEventListener('click',()=>{go(i);closeSidebar();});
  nav.appendChild(b);
});
function updateNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    const i=+el.dataset.i;
    el.classList.toggle('active',i===current);
    el.classList.toggle('completed',completed.has(i));
  });
}
function updateProgress(){
  const total=L.filter(x=>!x.cover).length;
  const doneCount=[...completed].filter(i=>!L[i].cover).length;
  const pct=Math.round(doneCount/total*100);
  pfill.style.width=pct+'%';pctTxt.textContent=pct+'%';
}
function go(i){
  current=i;const les=L[i];
  crumbPath.textContent=les.num?`./module-${les.num}`:'./start';
  let foot=`<div class="lesson-foot">`;
  foot+=i>0?`<button class="btn ghost" onclick="go(${i-1})">← prev</button>`:`<span></span>`;
  if(!les.cover){
    const mark=completed.has(i);
    foot+=`<button class="btn" id="markBtn" onclick="toggleDone(${i})">${mark?'✓ completed — click to undo':'mark lesson complete'}</button>`;
  } else {foot+=`<span></span>`;}
  foot+=i<L.length-1?`<button class="btn primary" onclick="go(${i+1})">next →</button>`:`<span></span>`;
  foot+=`</div>`;
  const head=les.cover?'':`<span class="lesson-kicker">${les.kicker}</span><h2 class="lesson-title">${les.title}</h2>`;
  content.innerHTML=head+les.html+foot;
  window.scrollTo({top:0,behavior:'smooth'});
  updateNav();
}
function toggleDone(i){
  if(completed.has(i))completed.delete(i);else completed.add(i);
  updateProgress();updateNav();
  const btn=document.getElementById('markBtn');
  if(btn)btn.textContent=completed.has(i)?'✓ completed — click to undo':'mark lesson complete';
}
window.go=go;window.toggleDone=toggleDone;
const sidebar=document.getElementById('sidebar');
const scrim=document.getElementById('scrim');
document.getElementById('menuBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');scrim.classList.toggle('show');});
scrim.addEventListener('click',closeSidebar);
function closeSidebar(){sidebar.classList.remove('open');scrim.classList.remove('show');}
go(0);updateProgress();
</script>
