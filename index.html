ound('score','score.wav') ]);</div></div><div class='box danger'><div class='bt'>Autoplay is blocked until a gesture.</div> Browsers create the <code>AudioContext</code> in a suspended state and won't make sound until the user interacts. On your first <code>keydown</code>/<code>click</code>/<code>touchstart</code>, call <code>audioCtx.resume()</code>. Without this your game is silent and you'll waste an hour wondering why.</div><table><thead><tr><th>Concept</th><th>Role</th></tr></thead><tbody><tr><td><code>AudioContext</code></td><td>The audio engine; create one and reuse it</td></tr><tr><td><code>decodeAudioData</code></td><td>Turns a file into a reusable buffer</td></tr><tr><td><code>BufferSource</code></td><td>A one-shot player; make a new one each play</td></tr><tr><td><code>GainNode</code></td><td>Volume control between source and output</td></tr></tbody></table><div class='box law'><div class='bt'>Keep effects short and decode once.</div> Decode every sound at load time, never per play. Use small WAV/OGG files for SFX. For background music, looping an <code>&lt;audio&gt;</code> element is fine and lighter on memory.</div><div class='game'><div class='game-head'>🎮 Build This: Flappy-style Game</div><div class='game-body'><p>An animated bird that flaps through scrolling pipes, with sound.</p><ol><li>Apply gravity to the bird's <code>vy</code> each frame; on flap (space/tap) set <code>vy</code> to a negative jump value and <code>play('flap')</code>.</li><li>Animate the wings from a 3-frame spritesheet and tilt the sprite by its fall speed.</li><li>Spawn pipe pairs at the right edge with a random gap, scroll them left with <code>dt</code>, and recycle them off-screen.</li><li>Score and <code>play('score')</code> when a pipe passes; collide with pipes/ground using AABB. Call <code>audioCtx.resume()</code> on the first input.</li></ol></div></div>"},{"id":"p6-8","part":"06 · JavaScript (from scratch)","nav":"State & Deploy","num":"6.8","kicker":"Part 06 · Lesson 8","title":"Capstone: A State Machine & Deploying to the Web","html":"<h3>Why a state machine</h3><p>A real game isn't always \"playing.\" It shows a menu, plays, pauses, and ends. Cramming all that into one <code>update</code> with a forest of <code>if</code> flags becomes unmaintainable fast. A <strong>finite state machine</strong> (FSM) keeps exactly one state active at a time, each with its own <code>update</code> and <code>render</code>, and explicit transitions between them. Your loop simply delegates to the current state.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>states.js</span></div><div class='term-body'>let current;\nfunction setState(s) {\n  current = s;\n  if (current.enter) current.enter(); <span class='cm'>// reset on entry</span>\n}\n\nconst Menu = {\n  enter() {},\n  update(dt) { if (keys['Space']) setState(Play); },\n  render() {\n    drawCenteredText('ARCADE', 64, H/2 - 30);\n    drawCenteredText('Press Space to start', 20, H/2 + 30);\n  }\n};\n\nconst Play = {\n  enter() { resetGame(); },\n  update(dt) {\n    movePlayer(dt); moveEnemies(dt); checkCollisions();\n    if (lives &lt;= 0) setState(GameOver);\n  },\n  render() { drawWorld(); drawHud(); }\n};\n\nconst GameOver = {\n  enter() { saveHighScore(score); },\n  update(dt) { if (keys['Space']) setState(Menu); },\n  render() {\n    drawWorld();\n    drawCenteredText('GAME OVER', 56, H/2 - 20);\n    drawCenteredText('Score: ' + score, 24, H/2 + 30);\n  }\n};\n\nfunction loop(now) {\n  const dt = Math.min((now - last) / 1000, 0.05); last = now;\n  current.update(dt);\n  ctx.clearRect(0, 0, W, H);\n  current.render();\n  requestAnimationFrame(loop);\n}\nsetState(Menu);\nlast = performance.now();\nrequestAnimationFrame(loop);</div></div><div class='box tip'><div class='bt'>enter() is where you reset.</div> Put initialization in each state's <code>enter()</code> — reset score and spawn enemies in <code>Play.enter()</code>, save the high score in <code>GameOver.enter()</code>. Transitions stay clean because each state owns its own setup.</div><h3>Persisting a high score</h3><p><code>localStorage</code> survives page reloads — perfect for a high score. It only stores strings, so parse on read.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>highscore.js</span></div><div class='term-body'>function getHigh()        { return Number(localStorage.getItem('hi') || 0); }\nfunction saveHighScore(s) { if (s &gt; getHigh()) localStorage.setItem('hi', s); }</div></div><h3>Preparing to ship</h3><p>Your game is already a static site — HTML, JS, images, audio. No backend, no build step required. Before deploying, tidy it up.</p><ul><li>Put everything in one folder with <code>index.html</code> at its root.</li><li>Use <strong>relative paths</strong> (<code>'bird.png'</code>, not <code>'/bird.png'</code>) so it works in a subfolder.</li><li>Make the canvas scale responsively with CSS (<code>max-width:100%</code>) while keeping its bitmap size fixed.</li><li>Test the whole thing through <code>npx serve</code> one final time, including a hard refresh to catch missing assets.</li></ul><h3>Deploying to itch.io</h3><p>itch.io hosts HTML5 games for free and is the standard for indie/jam games.</p><ol><li>Zip your project folder so <code>index.html</code> is at the <em>top level</em> of the zip (not inside a nested folder).</li><li>On itch.io: <em>Upload new project</em> → set <strong>Kind of project</strong> to <em>HTML</em>.</li><li>Upload the zip and tick <strong>This file will be played in the browser</strong>.</li><li>Set the viewport dimensions to your canvas size (e.g. 640×360), enable fullscreen, and save.</li><li>Set visibility to Public and play it from the page.</li></ol><div class='box tip'><div class='bt'>Any static host works.</div> The same folder deploys to GitHub Pages (push to a repo, enable Pages), Netlify or Vercel (drag-and-drop the folder), or Cloudflare Pages — all free. itch.io just adds a games audience and a built-in browser player.</div><div class='box danger'><div class='bt'>The zip-root mistake.</div> If itch.io shows a blank frame, you almost certainly zipped a folder <em>containing</em> index.html instead of zipping its contents. itch serves the zip's root — <code>index.html</code> must be right there. Re-zip from inside the folder.</div><div class='box law'><div class='bt'>Mute by default, license your assets.</div> Many players browse with sound off-screen; start muted or require a click to enable audio. And only ship art/audio you made or that's licensed for use — credit sources in your itch description.</div><div class='game'><div class='game-head'>🎮 Build This: Arcade Capstone + Deploy</div><div class='game-body'><p>Ship a small arcade game with proper states, live on the web.</p><ol><li>Pick a simple arcade loop (dodge falling blocks, shoot invaders, collect coins under a timer).</li><li>Implement <code>Menu</code>, <code>Play</code>, and <code>GameOver</code> states with the FSM above; delegate update/render to the current state.</li><li>Track score and persist a high score in <code>localStorage</code>; reuse delta time, vectors, collision, animation, and audio from this part.</li><li>Test through a local server with relative paths, then zip with <code>index.html</code> at the root and upload to itch.io as an HTML project. Share the link.</li></ol></div></div>"},{"id":"p8-1","part":"07 · 3D Art (Blender)","nav":"Blender Setup & Navigation","num":"7.1","kicker":"Part 07 · Lesson 1","title":"Getting Started: Installing Blender and Navigating the Viewport","html":"<h3>Why Blender for Game Art</h3><p>Blender is a free, open-source 3D suite that handles modeling, sculpting, UVs, texturing, rigging, and animation in one package. For game developers that means zero licensing cost and a direct pipeline into Godot, Unity, and Unreal. This part of the masterclass treats Blender as a <strong>game-asset factory</strong>: every technique we cover serves the goal of shipping clean, optimized meshes into a real-time engine.</p><h3>Installing Blender</h3><p>Download the current Long Term Support (LTS) release from blender.org. LTS builds receive bug fixes for two years, which matters when a course or a studio standardizes on one version. Avoid Steam-only installs if you plan to script or use external add-ons; the standalone installer is the most predictable.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>install</span></div><div class='term-body'><span class='cm'># Windows: run the .msi installer</span>\n<span class='cm'># macOS: drag Blender.app into /Applications</span>\n<span class='cm'># Linux (Flatpak):</span>\nflatpak install flathub org.blender.Blender <span class='ok'>✓</span>\n<span class='cm'># Verify version on the splash screen: 4.2 LTS or newer</span></div></div><h3>The Interface at a Glance</h3><p>When Blender opens you see the <strong>3D Viewport</strong> (center), the <strong>Outliner</strong> (top-right, a tree of every object), the <strong>Properties editor</strong> (bottom-right, tabs for render, modifiers, materials), and the <strong>Timeline</strong> (bottom). The strip of buttons across the top is the <strong>Topbar</strong> with workspace tabs: Layout, Modeling, Sculpting, UV Editing, Shading, Animation. These tabs are pre-built editor arrangements — you will live in Modeling, UV Editing, and Shading the most.</p><h3>Viewport Navigation</h3><p>Navigation is muscle memory. A three-button mouse plus numpad is strongly recommended; if you lack a numpad, enable <em>Edit &gt; Preferences &gt; Input &gt; Emulate Numpad</em>.</p><table><thead><tr><th>Action</th><th>Input</th></tr></thead><tbody><tr><td>Orbit</td><td>Middle Mouse Button (MMB) drag</td></tr><tr><td>Pan</td><td>Shift + MMB drag</td></tr><tr><td>Zoom</td><td>Scroll wheel or Ctrl + MMB</td></tr><tr><td>Frame selected</td><td>Numpad . (period)</td></tr><tr><td>Front / Side / Top</td><td>Numpad 1 / 3 / 7</td></tr><tr><td>Toggle perspective/ortho</td><td>Numpad 5</td></tr></tbody></table><p>The colored <strong>navigation gizmo</strong> in the top-right corner of the viewport does the same thing with the mouse: click an axis ball to snap to that view, drag it to orbit. Below it sit icons for zoom, pan, camera view, and toggling perspective. Beginners lean on the gizmo; pros switch to the numpad for speed.</p><div class='box tip'><div class='bt'>Tip.</div> For game art, work in <strong>orthographic</strong> views (Numpad 5 to toggle) when modeling. Perspective distorts proportions; ortho keeps measurements honest, which matters when an asset must match a grid or collision box.</div><h3>The 3D Cursor and Selection</h3><p>The little crosshair-and-ring in the scene is the <strong>3D cursor</strong>: new objects spawn there and it acts as a pivot point. Reset it to the world origin with <em>Shift + C</em>. Select objects by clicking; <em>A</em> selects all, <em>Alt + A</em> deselects all. The <strong>transform gizmos</strong> on the left toolbar (or shortcuts G/R/S for grab/rotate/scale) move, rotate, and scale the active selection. Type an axis letter after the shortcut to constrain — <em>G then Z</em> moves only up/down.</p><h3>Saving Your Project</h3><p>Blender files use the <code>.blend</code> extension. Save with <em>Ctrl + S</em>; Save As is <em>Ctrl + Shift + S</em>. Enable incremental saves and auto-save in Preferences so a crash never costs you an hour. Set a sensible startup file: arrange your editors, then <em>File &gt; Defaults &gt; Save Startup File</em> so every new project opens the way you like.</p><div class='box lab'><div class='bt'>Heads up.</div> Blender does not auto-save into your <code>.blend</code> path by default — it writes recovery files to a temp folder. After a crash use <em>File &gt; Recover &gt; Auto Save</em>. Still, hit Ctrl+S often.</div><div class='game'><div class='game-head'>🎮 Build This: First Scene</div><div class='game-body'><p>Goal: get comfortable moving around and persist a project file.</p><ol><li>Launch Blender and dismiss the splash screen by clicking in the viewport.</li><li>Orbit around the default cube with MMB, pan with Shift+MMB, and zoom with the scroll wheel.</li><li>Press Numpad . to frame the cube, then cycle Numpad 1, 3, 7 for front, side, top.</li><li>Press Numpad 5 to toggle between perspective and orthographic — notice the difference.</li><li>Click the cube, press G then Z, move it up, left-click to confirm; press Alt+A to deselect.</li><li>Save with Ctrl+S as <code>my-first-scene.blend</code> in a dedicated project folder.</li></ol></div></div>"},{"id":"p8-2","part":"07 · 3D Art (Blender)","nav":"Mesh Modeling Basics","num":"7.2","kicker":"Part 07 · Lesson 2","title":"Mesh Fundamentals: Vertices, Edges, Faces, and Edit Mode","html":"<h3>The Anatomy of a Mesh</h3><p>Every game model is built from three primitives: <strong>vertices</strong> (points in space), <strong>edges</strong> (lines connecting two vertices), and <strong>faces</strong> (flat surfaces bounded by edges). A face with three edges is a <em>triangle</em> (tri); four edges make a <em>quad</em>. Engines ultimately render triangles, but you model in quads because they subdivide and deform predictably. Faces with five or more sides are <em>n-gons</em> — convenient while blocking out but a liability near seams and animation, so clean them up before export.</p><h3>Object Mode vs Edit Mode</h3><p>Press <strong>Tab</strong> to toggle between Object Mode (move whole objects) and <strong>Edit Mode</strong> (reshape the mesh itself). In Edit Mode the top-left of the header shows three selection-mode buttons, bound to keys <strong>1</strong> (vertex), <strong>2</strong> (edge), and <strong>3</strong> (face). Switching between them constantly is normal.</p><div class='box tip'><div class='bt'>Tip.</div> <em>Alt + click</em> an edge selects an entire <strong>edge loop</strong>; <em>Ctrl + click</em> selects the shortest path between two elements. These two shortcuts alone will double your modeling speed.</div><h3>The Core Editing Operators</h3><p>Four operators do most of the work in hard-surface game modeling:</p><table><thead><tr><th>Operator</th><th>Key</th><th>What it does</th></tr></thead><tbody><tr><td>Extrude</td><td>E</td><td>Pulls new geometry out of selected faces/edges</td></tr><tr><td>Inset</td><td>I</td><td>Creates a smaller face inside the selected face</td></tr><tr><td>Loop Cut</td><td>Ctrl + R</td><td>Adds an edge loop around the mesh</td></tr><tr><td>Bevel</td><td>Ctrl + B</td><td>Rounds or chamfers an edge into multiple edges</td></tr></tbody></table><p>After invoking any of these, you can type a number to set an exact value, scroll to add segments (for bevel/loop cut), and left-click to confirm. The operator panel in the bottom-left lets you tweak the result afterward — always check it.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>edit-mode flow</span></div><div class='term-body'><span class='cm'># Start from default cube, enter Edit Mode</span>\nTab <span class='dim'>→ Edit Mode</span>\n3 <span class='dim'>→ Face select</span>\n<span class='cm'># Inset the top face to make a rim</span>\nI <span class='dim'>type</span> 0.1 <span class='dim'>Enter</span>\n<span class='cm'># Push that inset face down to recess it</span>\nE Z -0.15 <span class='dim'>Enter</span> <span class='ok'>✓ recessed panel</span></div></div><h3>Keeping Topology Clean</h3><p>Good topology means evenly sized quads, edge loops that follow the form, and no stray vertices. Bad topology causes shading artifacts and breaks normal-map baking later. Useful cleanup tools: <strong>M</strong> to merge selected vertices (Merge by Distance removes doubles), <strong>X</strong> to delete (choose vertices/edges/faces/dissolve), and <strong>F</strong> to fill a face between selected vertices or edges. Use <em>Mesh &gt; Normals &gt; Recalculate Outside</em> (Shift+N) so all faces point outward — flipped normals render black or invisible in engines.</p><div class='box law'><div class='bt'>Rule.</div> Model in quads, triangulate only at export. Avoid n-gons and overlapping faces. Every poly you add must justify its cost — geometry is not free in a real-time scene.</div><h3>Applying Transforms</h3><p>When you scale or rotate in Object Mode, the object stores a transform that engines may interpret oddly. Before export — and before adding many modifiers — use <em>Ctrl + A &gt; All Transforms</em> to bake position, rotation, and scale back to clean values (scale 1,1,1). This is one of the most common fixes for assets that import at the wrong size or orientation.</p><div class='game'><div class='game-head'>🎮 Build This: Low-Poly Wooden Crate</div><div class='game-body'><p>Goal: turn the default cube into a believable crate using only extrude and inset, keeping clean quad topology.</p><ol><li>Select the cube, Tab into Edit Mode, press 3 for Face select.</li><li>Select all faces (A), Inset with I and type 0.05 to create a border frame on every side.</li><li>Select the inner faces and Extrude inward (E then type a small negative value) to recess the panels.</li><li>Select the top face, Inset slightly, and Extrude up by 0.05 to suggest a lid lip.</li><li>Add a small Bevel (Ctrl+B) to the outer edges, 1-2 segments, so corners catch light.</li><li>Press Shift+N to recalculate normals, Tab back to Object Mode, and Ctrl+A &gt; All Transforms.</li><li>Save as <code>crate.blend</code>. Check the triangle count in the top-right statistics overlay.</li></ol></div></div>"},{"id":"p8-3","part":"07 · 3D Art (Blender)","nav":"Low-Poly & Poly Budgets","num":"7.3","kicker":"Part 07 · Lesson 3","title":"Low-Poly Modeling and Why Poly Budgets Matter","html":"<h3>What Low-Poly Really Means</h3><p>Low-poly is not a visual style alone — it is a performance discipline. Every triangle a GPU draws costs vertex processing, and every object costs a draw call. A modern game might render millions of triangles per frame, but that budget is shared across hundreds of objects, characters, and effects. As a game artist your job is to spend polygons where they read in the silhouette and save them everywhere else.</p><h3>Thinking in a Triangle Budget</h3><p>A <strong>poly budget</strong> is a target triangle count assigned to an asset based on its importance and screen size. Rough modern guidelines:</p><table><thead><tr><th>Asset type</th><th>Typical budget (tris)</th></tr></thead><tbody><tr><td>Small prop (crate, lantern)</td><td>200 - 1,500</td></tr><tr><td>Hero prop / weapon</td><td>3,000 - 10,000</td></tr><tr><td>Background character (mobile)</td><td>1,500 - 5,000</td></tr><tr><td>Hero character (PC/console)</td><td>30,000 - 90,000</td></tr></tbody></table><p>These are starting points, not laws — a stylized mobile game and a AAA shooter live in different worlds. The skill is matching detail to how big the object appears on screen. Detail that needs only a few pixels should come from a <strong>normal map</strong> (next lessons), never from geometry.</p><div class='box tip'><div class='bt'>Tip.</div> Enable <em>Statistics</em> in the viewport overlays dropdown to see live vertex/face/tri counts. Watch the <strong>Triangles</strong> number, not faces — a single n-gon hides many tris.</div><h3>Modifiers: Non-Destructive Modeling</h3><p>Modifiers are operations layered on top of your base mesh, recalculated live and editable in any order. They live in the wrench icon of the Properties editor. Three are essential for game props.</p><h4>Mirror</h4><p>Most props and characters are symmetrical. Model one half, add a <strong>Mirror</strong> modifier, and the other half is generated for free. Enable <em>Clipping</em> so center vertices weld at the seam. You only edit half the geometry, halving your work and guaranteeing symmetry.</p><h4>Subdivision Surface</h4><p>Adds smoothing by subdividing faces (shortcut Ctrl+1 through Ctrl+3 sets the level). Mostly used to generate a smooth <em>high-poly</em> source for baking — you rarely ship subdivided geometry in a real-time asset.</p><h4>Bevel</h4><p>A modifier version of edge bevel driven by <em>Weight</em> or <em>Angle</em>, useful for adding uniform chamfers to all sharp edges so they catch light.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>modifier stack</span></div><div class='term-body'><span class='cm'># Order matters - top to bottom</span>\nMirror <span class='dim'>(X axis, clipping on)</span>\nBevel <span class='dim'>(0.02m, 2 segments)</span>\n<span class='cm'># Apply before export (or let glTF apply on export)</span>\nCtrl+A <span class='dim'>on modifier → bakes to mesh</span> <span class='ok'>✓</span></div></div><div class='box law'><div class='bt'>Rule.</div> Modifiers are non-destructive in Blender but <strong>most must be applied</strong> before or during export — an engine sees only the final mesh. The glTF exporter applies modifiers automatically; FBX has an <em>Apply Modifiers</em> checkbox. Confirm it.</div><h3>Reading the Silhouette</h3><p>Squint at your model or view it as a flat black shape against the background. If it still reads as a barrel or a lantern in pure silhouette, your geometry budget is well spent. Anything that does not change the outline — surface bolts, wood grain, scratches — is a texture job, not a geometry job.</p><div class='game'><div class='game-head'>🎮 Build This: Low-Poly Lantern</div><div class='game-body'><p>Goal: model a readable stylized lantern under 1,000 triangles using the Mirror modifier.</p><ol><li>Start with a cube; delete half along X (B to box-select, X &gt; Vertices).</li><li>Add a Mirror modifier on the X axis with Clipping enabled.</li><li>Block out the lantern body: a tapered base, a glass cage middle, and a top cap, using Extrude (E) and Loop Cuts (Ctrl+R).</li><li>Inset the cage faces (I) and extrude them inward to suggest panes and frame bars.</li><li>Add a small loop or handle on top using extruded edges.</li><li>Add a Bevel modifier (small width, 2 segments) for light-catching edges.</li><li>Keep checking the Triangles stat — stay under 1,000. Apply modifiers, Ctrl+A &gt; All Transforms, and save as <code>lantern.blend</code>.</li></ol></div></div>"},{"id":"p8-4","part":"07 · 3D Art (Blender)","nav":"UV Unwrapping","num":"7.4","kicker":"Part 07 · Lesson 4","title":"UV Unwrapping: Flattening Meshes for Texturing","html":"<h3>What UVs Are</h3><p>A texture is a flat 2D image, but your model is 3D. <strong>UV unwrapping</strong> is the process of telling the renderer how to wrap that flat image onto the surface — like peeling an orange and flattening the skin. The 2D coordinate space is called <em>UV space</em> (U is horizontal, V vertical), running 0 to 1 in both directions. Each vertex gets a UV coordinate that maps it to a spot on the texture.</p><p>Without good UVs, textures stretch, smear, or repeat wrong. Every textured game asset needs a UV layout, so this step sits between modeling and texturing in the pipeline.</p><h3>Seams: Where the Skin Is Cut</h3><p>To flatten a 3D shape you must cut it. Those cuts are <strong>seams</strong>. Place seams where they will be hidden (inside a barrel rim, along a back edge, where parts join) because the texture can break slightly across a seam. Select edges in Edit Mode and use <em>Edge &gt; Mark Seam</em> (or right-click menu). Marked seams show as red lines.</p><div class='box tip'><div class='bt'>Tip.</div> Think like a tailor. Cut seams where clothing would have them — armpits, insides, backs. Fewer, well-placed seams mean fewer visible texture breaks but more potential stretching; it is always a trade-off.</div><h3>Unwrapping</h3><p>Open the <strong>UV Editing</strong> workspace tab. With the mesh in Edit Mode and all faces selected (A), press <strong>U</strong> to open the Unwrap menu. Options:</p><table><thead><tr><th>Method</th><th>Use case</th></tr></thead><tbody><tr><td>Unwrap</td><td>General — respects your seams</td></tr><tr><td>Smart UV Project</td><td>Fast auto-unwrap by angle; good for hard-surface props</td></tr><tr><td>Cube / Cylinder / Sphere Projection</td><td>Primitive-shaped objects</td></tr></tbody></table><p>After unwrapping, the flattened islands appear in the UV Editor on the left. The mesh-to-UV link is live: select a face in the viewport and it highlights in the UV editor.</p><h3>Checking for Stretching and Overlap</h3><p>Apply a <strong>checker texture</strong> to verify quality. In the UV editor header choose the test grid, or assign a checker material. Squares should stay roughly square and the same size across the whole model. Stretched rectangles mean stretched textures; uneven square sizes mean inconsistent <em>texel density</em> (texture resolution per surface area).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>unwrap flow</span></div><div class='term-body'><span class='cm'># Edit Mode, edge select</span>\n2 <span class='dim'>edge mode</span>\n<span class='cm'># Select hidden edges, mark them</span>\nEdge &gt; Mark Seam <span class='ok'>✓ red lines appear</span>\nA <span class='dim'>select all faces</span>\nU &gt; Unwrap\n<span class='cm'># Inspect with checker - squares should stay square</span>\n<span class='bad'>✗ stretched = add a seam</span></div></div><h3>Packing the Islands</h3><p>For real-time assets you want a single square texture (1024, 2048, 4096 px). All UV islands must fit inside the 0-1 square without overlapping (unless intentionally sharing texture, e.g. mirrored parts). Select all in the UV editor (A) and use <em>UV &gt; Pack Islands</em>. Set a small margin (0.005-0.01) so neighboring islands do not bleed into each other when the texture is mipmapped. Scale islands so important, close-up surfaces get more texture space — that is deliberate texel density allocation.</p><div class='box law'><div class='bt'>Rule.</div> Keep UVs inside the 0-1 space for game assets unless you are intentionally tiling. Use one consistent texel density per object so nothing looks blurrier than its neighbors.</div><div class='game'><div class='game-head'>🎮 Build This: Unwrap the Lantern</div><div class='game-body'><p>Goal: produce a clean, packed, non-overlapping UV layout for your low-poly prop.</p><ol><li>Open <code>lantern.blend</code>, switch to the UV Editing workspace, Tab into Edit Mode.</li><li>In edge mode (2), mark seams on hidden edges — the back of the body, inside the cage, under the cap.</li><li>Select all faces (A) and press U &gt; Unwrap.</li><li>Apply a checker texture and orbit the model; add seams anywhere squares stretch.</li><li>In the UV editor select all, run UV &gt; Pack Islands with a 0.01 margin.</li><li>Scale the cage/glass island slightly larger if it is seen up close; keep everything inside the 0-1 square.</li><li>Save. You now have UVs ready for texturing and baking.</li></ol></div></div>"},{"id":"p8-5","part":"07 · 3D Art (Blender)","nav":"PBR Materials & Baking","num":"7.5","kicker":"Part 07 · Lesson 5","title":"Materials and Texturing: PBR Workflow and Normal Map Baking","html":"<h3>What PBR Is</h3><p><strong>Physically Based Rendering (PBR)</strong> is the standard lighting model in modern engines. Instead of hand-faking shading, you describe a surface with a small set of texture maps and the engine computes realistic light response that holds up under any lighting. The metal/roughness workflow (used by glTF, Unity URP, Unreal, Godot) relies on four core maps:</p><table><thead><tr><th>Map</th><th>Controls</th><th>Type</th></tr></thead><tbody><tr><td>Albedo (Base Color)</td><td>The raw surface color, no lighting baked in</td><td>Color (sRGB)</td></tr><tr><td>Normal</td><td>Fake surface bumps via per-pixel normals</td><td>Non-color (linear)</td></tr><tr><td>Roughness</td><td>Matte (white) to glossy (black)</td><td>Non-color, grayscale</td></tr><tr><td>Metallic</td><td>Non-metal (black) to metal (white)</td><td>Non-color, grayscale</td></tr></tbody></table><div class='box law'><div class='bt'>Rule.</div> Albedo is set to <strong>sRGB</strong> color space; normal, roughness, and metallic are <strong>Non-Color</strong> data. Getting this wrong is the most common reason a material looks washed out or wrong in-engine.</div><h3>Building a Material in the Shader Editor</h3><p>Open the <strong>Shading</strong> workspace. New objects get a <strong>Principled BSDF</strong> shader — a single node with inputs for Base Color, Metallic, Roughness, Normal, and more. This node matches the engine PBR model almost one-to-one, which is why it exports cleanly. Plug Image Texture nodes into each input. For the normal input you must route through a <em>Normal Map</em> node so Blender interprets the colors as directions.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>node graph</span></div><div class='term-body'>ImageTex(albedo,sRGB) ──► Base Color\nImageTex(metallic,NonColor) ──► Metallic\nImageTex(roughness,NonColor) ──► Roughness\nImageTex(normal,NonColor) ─► NormalMap ─► Normal\n<span class='ok'>✓ Principled BSDF → Material Output</span></div></div><h3>Texturing Approaches</h3><p>You can paint maps in Blender's <strong>Texture Paint</strong> mode, generate them procedurally with nodes, or use an external tool like the free Materialize or a Substance-style app and import the maps. Many studios use procedural smart-materials; for this course we will hand-assign tiling PBR textures and then add unique surface detail through baking.</p><h3>Why Bake Normal Maps</h3><p>A normal map lets a flat, low-poly face <em>look</em> like it has bumps, grooves, rivets, and grain — without any extra geometry. The trick: build a <strong>high-poly</strong> version with all that detail (sculpted or modeled), then <strong>bake</strong> the difference between high and low onto the low-poly's normal map. The engine renders cheap geometry but expensive-looking surfaces. This is the single biggest technique behind modern game-art efficiency.</p><h3>The Baking Process</h3><p>Baking in Blender uses the Cycles render engine. The workflow:</p><ol><li>Have a low-poly mesh (UV-unwrapped) and a high-poly mesh occupying the same space.</li><li>Create a new image (e.g. 2048x2048) and add it as an Image Texture node on the low-poly material, with the node <em>selected but not connected</em> — Cycles bakes into the active image node.</li><li>Select the high-poly first, then shift-select the low-poly so it is active.</li><li>In Render Properties set engine to Cycles. In the Bake panel choose <strong>Normal</strong>, enable <em>Selected to Active</em>, and set a small <strong>Extrusion/Ray Distance</strong> (a cage) so rays catch detail without skipping.</li><li>Click <strong>Bake</strong>. Save the resulting image as a PNG and plug it into the Normal input (through a Normal Map node).</li></ol><div class='box tip'><div class='bt'>Tip.</div> If the bake shows red/blue artifacts or missing edges, increase Ray Distance or use a <strong>cage</strong> object. Always bake normals in <em>tangent space</em> for game assets — it deforms correctly with animation.</div><div class='game'><div class='game-head'>🎮 Build This: Texture and Bake the Lantern</div><div class='game-body'><p>Goal: give your unwrapped prop a full PBR material and bake surface detail from a high-poly version.</p><ol><li>In the Shading workspace, add a Principled BSDF if not present, and plug in albedo (sRGB), roughness, and metallic (Non-Color) textures for metal and glass.</li><li>Duplicate the lantern, add a Subdivision Surface modifier, and add detail (bevels, dents) to make a high-poly source.</li><li>Create a new 2048x2048 image, add it as a selected Image Texture node on the low-poly material.</li><li>Set render engine to Cycles, select high-poly then shift-select low-poly.</li><li>In the Bake panel choose Normal, enable Selected to Active, set Ray Distance, and Bake.</li><li>Save the baked PNG, route it through a Normal Map node into the Normal input.</li><li>Check the result in Material Preview shading — the flat low-poly now shows the high-poly detail. Save.</li></ol></div></div>"},{"id":"p8-6","part":"07 · 3D Art (Blender)","nav":"Sculpting Overview","num":"7.6","kicker":"Part 07 · Lesson 6","title":"Sculpting Basics: Organic Detail and High-Poly Source Meshes","html":"<h3>What Sculpting Is For</h3><p>Box modeling is great for hard-surface props, but organic shapes — creatures, faces, cloth wrinkles, rock, wood grain, weathered metal — are painful to push vertex by vertex. <strong>Sculpting</strong> lets you treat the mesh like digital clay, pushing and pulling millions of polygons with brushes. In a game pipeline sculpting almost always produces a <strong>high-poly source mesh</strong> whose detail you bake down onto a low-poly model (as in the previous lesson). You rarely ship a sculpt directly.</p><h3>Entering Sculpt Mode</h3><p>Switch to the <strong>Sculpting</strong> workspace tab, or pick Sculpt Mode from the mode dropdown. The left toolbar holds the brushes; the top header has brush radius, strength, and symmetry settings. Brush size is <strong>F</strong> (drag, then click), strength is <strong>Shift+F</strong>, and holding <strong>Ctrl</strong> inverts a brush (Draw becomes carve-in, Inflate becomes deflate).</p><h3>The Core Brushes</h3><table><thead><tr><th>Brush</th><th>Use</th></tr></thead><tbody><tr><td>Draw</td><td>Add or (Ctrl) subtract surface bumps</td></tr><tr><td>Clay Strips</td><td>Build up volume in flat strokes — workhorse for forms</td></tr><tr><td>Grab (G)</td><td>Pull large areas to block out shapes</td></tr><tr><td>Smooth (hold Shift)</td><td>Relax and blend any stroke</td></tr><tr><td>Crease</td><td>Sharp grooves — cracks, panel lines</td></tr><tr><td>Inflate</td><td>Push surface out along normals</td></tr></tbody></table><div class='box tip'><div class='bt'>Tip.</div> Hold <strong>Shift</strong> with any brush to temporarily smooth. Sculpting is a rhythm of build-up then smooth-down. Turn on <strong>X symmetry</strong> in the header for anything bilateral so both sides sculpt at once.</div><h3>Getting Enough Geometry: Dyntopo and Multires</h3><p>Sculpting fine detail needs lots of polygons. Two ways to get them:</p><ul><li><strong>Dynamic Topology (Dyntopo)</strong>: dynamically adds geometry under the brush as you sculpt. Great for free-form blocking, but produces uneven triangles, so it is best for the bake source, not for animation.</li><li><strong>Multiresolution modifier</strong>: subdivides the mesh into levels you can sculpt on and step between (sculpt coarse on level 1, fine on level 4). It keeps clean quad topology and can itself be baked.</li></ul><p>A third option, <strong>Remesh</strong> (Ctrl+R in sculpt, or the Remesh panel), rebuilds the mesh into uniform voxels — perfect when a blocked-out shape gets messy and you want even density before detailing.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sculpt-to-bake pipeline</span></div><div class='term-body'><span class='cm'># 1. Block big forms with Grab + Clay Strips</span>\n<span class='cm'># 2. Remesh to even density</span>\nRemesh <span class='dim'>voxel 0.02</span> <span class='ok'>✓</span>\n<span class='cm'># 3. Detail: Crease for cracks, Draw for grain</span>\n<span class='cm'># 4. This high-poly = bake source</span>\n<span class='cm'># 5. Bake normals → low-poly (Lesson 7.5)</span></div></div><h3>From Sculpt to Game Asset</h3><p>A finished sculpt may have millions of triangles — unusable in-engine. You generate a low-poly version either by <strong>retopology</strong> (rebuilding clean low-res geometry over the sculpt, manually or with the Quad Remesher-style tools) or by reusing your original box model. Then you UV-unwrap the low-poly and bake the sculpt's normal (and ambient occlusion) detail onto it. The sculpt's job ends at the bake — it lives in your source files, never in the shipped game.</p><div class='box law'><div class='bt'>Rule.</div> Never export a raw sculpt to a game engine. The sculpt is a <em>source</em>; the deliverable is a low-poly mesh carrying baked maps. Keep the sculpt in your working <code>.blend</code> for re-baking later.</div><div class='game'><div class='game-head'>🎮 Build This: Sculpt a Bake Source</div><div class='game-body'><p>Goal: sculpt surface detail onto a high-poly asset to use as a normal-map bake source.</p><ol><li>Take a copy of a prop (a crate plank, a rock, or a barrel band), enter Sculpt Mode.</li><li>Remesh to a uniform density so you have polygons to work with.</li><li>Use Clay Strips and Draw to build dents and bulges; hold Shift to smooth between strokes.</li><li>Use the Crease brush for wood-grain lines or rock cracks; enable X symmetry where appropriate.</li><li>Add fine detail with a small Draw brush, occasionally smoothing to keep it natural.</li><li>Keep this high-poly mesh aligned with your low-poly version in the same space.</li><li>Bake its Normal (and try Ambient Occlusion) onto the low-poly using the Lesson 7.5 workflow, then save.</li></ol></div></div>"},{"id":"p8-7","part":"07 · 3D Art (Blender)","nav":"Rigging & Animation","num":"7.7","kicker":"Part 07 · Lesson 7","title":"Rigging and Skeletal Animation: Armatures, Weights, and a Walk Cycle","html":"<h3>Why Skeletal Animation</h3><p>Game characters animate with a <strong>skeleton</strong> (an armature of bones) bound to the mesh. Moving a bone deforms the surrounding vertices, so one rig drives unlimited animations — walk, run, jump — that the engine blends at runtime. This is far cheaper and more flexible than baking vertex positions per frame. The pipeline is: build armature, bind mesh to it (skinning), refine which vertices each bone controls (weight painting), then author actions on the timeline.</p><h3>Building an Armature</h3><p>Add an armature with <em>Shift+A &gt; Armature &gt; Single Bone</em>. Enter <strong>Edit Mode</strong> on the armature to position bones: select a bone's tip and Extrude (E) to chain a new bone, just like extruding mesh. Build a simple biped: a root/hip bone, a spine, two leg chains (thigh, shin, foot), and two arm chains. Name every bone clearly (<code>thigh.L</code>, <code>shin.L</code>) — names with <code>.L</code>/<code>.R</code> suffixes let Blender mirror poses and the engine identify limbs.</p><div class='box tip'><div class='bt'>Tip.</div> Enable <em>X-Axis Mirror</em> in the armature Edit Mode tool settings so building/posing the left side mirrors to the right automatically. Use <em>Armature &gt; Symmetrize</em> to copy one side to the other once names end in <code>.L</code>.</div><h3>Binding the Mesh: Skinning</h3><p>Select the mesh first, then Shift-select the armature so the armature is active, and press <strong>Ctrl+P &gt; With Automatic Weights</strong>. Blender parents the mesh to the armature and estimates how much each bone influences each vertex, storing those values in <strong>vertex groups</strong> (one per bone). Now posing bones (in <strong>Pose Mode</strong>) deforms the mesh.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>rig setup</span></div><div class='term-body'><span class='cm'># Build skeleton in Edit Mode</span>\nShift+A &gt; Armature\nE <span class='dim'>extrude bone chains, name them .L/.R</span>\n<span class='cm'># Bind mesh to armature</span>\nselect mesh, Shift+select armature\nCtrl+P &gt; With Automatic Weights <span class='ok'>✓</span>\nCtrl+Tab <span class='dim'>→ Pose Mode, test deformation</span></div></div><h3>Weight Painting</h3><p>Automatic weights are a good start but imperfect — a knee bone might pull belly vertices. Switch to <strong>Weight Paint</strong> mode (with the mesh selected and a bone chosen). Red means full influence (1.0), blue means none (0.0). Paint to fix bad deformation: add weight where a joint should pull, subtract where it should not. Use a low brush strength and the <strong>Blur</strong> brush to smooth the falloff across joints so bends look natural rather than creased.</p><div class='box law'><div class='bt'>Rule.</div> Each vertex's weights across all bones should sum to 1.0. Use <em>Normalize All</em> to enforce this — stray un-normalized weights cause vertices to fly off or collapse during animation.</div><h3>Animating a Walk Cycle</h3><p>Animation uses <strong>keyframes</strong>: you pose the rig at certain frames and Blender interpolates between them. Open the <strong>Animation</strong> workspace. Set the scene to a manageable length (e.g. 24 frames for a one-second loop). A basic walk cycle has four key poses:</p><ol><li><strong>Contact</strong> (frame 1): legs apart, one heel forward, opposite arm forward.</li><li><strong>Down/passing</strong> (frame 6-7): weight on the planted leg, body lowest.</li><li><strong>Contact mirrored</strong> (frame 13): the opposite stride.</li><li><strong>Passing mirrored</strong> (frame 18-19), then back to frame 1 to loop.</li></ol><p>Pose bones in Pose Mode and press <strong>I</strong> to insert a keyframe (choose Location/Rotation or use a keying set). Make frame 24 identical to frame 1 so the loop is seamless. Group these keyframes as an <strong>Action</strong> in the Dope Sheet's Action Editor and name it <code>Walk</code> — engines import each action as a named animation clip.</p><div class='box tip'><div class='bt'>Tip.</div> Use the <strong>Graph Editor</strong> to smooth motion, and set the loop's interpolation to keep velocity consistent. Stamp a <em>Fake User</em> (the shield icon) on the Action so Blender does not discard it on save.</div><div class='game'><div class='game-head'>🎮 Build This: Rig and Walk-Cycle a Character</div><div class='game-body'><p>Goal: rig a simple low-poly character and author a looping walk action ready for an engine.</p><ol><li>Model or import a simple humanoid (a blocky biped is fine). Apply transforms (Ctrl+A).</li><li>Add an armature; in Edit Mode extrude a hip, spine, two leg chains, and two arm chains. Name bones with .L/.R.</li><li>Select mesh, Shift-select armature, Ctrl+P &gt; With Automatic Weights.</li><li>Enter Pose Mode, test bends, then Weight Paint to fix any pinching at the joints.</li><li>In the Animation workspace, set the end frame to 24. Pose the four walk keys, inserting keyframes with I.</li><li>Copy frame 1's pose to frame 24 for a seamless loop; name the Action <code>Walk</code> and give it a Fake User.</li><li>Scrub the timeline to confirm the loop reads clearly. Save the file.</li></ol></div></div>"},{"id":"p8-8","part":"07 · 3D Art (Blender)","nav":"Export & Optimization","num":"7.8","kicker":"Part 07 · Lesson 8","title":"Export Pipeline and Optimization: glTF/FBX into a Game Engine","html":"<h3>Choosing a Format</h3><p>Two formats dominate game-art handoff. <strong>glTF</strong> (<code>.glb</code>/<code>.gltf</code>) is an open, modern standard — it carries meshes, PBR materials, textures, skins, and animations in one file and maps almost perfectly onto the Principled BSDF. <strong>FBX</strong> is older and proprietary but still the default for Unity and Unreal. As a rule: prefer glTF for Godot and for clean PBR transfer; use FBX when a Unity/Unreal pipeline expects it.</p><table><thead><tr><th>Engine</th><th>Best format</th></tr></thead><tbody><tr><td>Godot</td><td>glTF (.glb) — native, recommended</td></tr><tr><td>Unity</td><td>FBX (or glTF via package)</td></tr><tr><td>Unreal</td><td>FBX or glTF</td></tr></tbody></table><h3>The Scale and Orientation Gotchas</h3><p>This is where most assets break. Two long-standing conventions collide:</p><ul><li><strong>Units</strong>: Blender's default unit is meters, which matches Godot, Unity, and Unreal — but only if you actually modeled at real-world scale and applied your transforms. A character should be roughly 1.8 units tall, not 0.018 or 180.</li><li><strong>Up axis</strong>: Blender is <strong>Z-up</strong>; most engines (Unity, glTF) are <strong>Y-up</strong>. The exporter has <em>Forward</em> and <em>Up</em> settings to convert. The glTF exporter handles Y-up automatically. For FBX into Unity, set Forward <code>-Z</code> and Up <code>Y</code>, or models import lying on their back.</li></ul><div class='box law'><div class='bt'>Rule.</div> Before <em>every</em> export: <strong>Apply All Transforms</strong> (Ctrl+A) so scale is 1,1,1 and rotation is zero. Un-applied scale is the number-one cause of objects that import tiny, giant, or with broken physics and animation.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>export checklist</span></div><div class='term-body'>Ctrl+A &gt; All Transforms <span class='ok'>✓ scale 1,1,1</span>\nRecalculate Normals (Shift+N) <span class='ok'>✓</span>\nApply / enable modifiers on export <span class='ok'>✓</span>\nUVs present, materials assigned <span class='ok'>✓</span>\nArmature + Action selected for skinned export\n<span class='cm'>File &gt; Export &gt; glTF 2.0 (.glb)</span>\n  Include: Selected Objects, +Y up\n  Data: Mesh, Materials, Animations <span class='ok'>✓</span></div></div><h3>Exporting</h3><p>Use <em>File &gt; Export &gt; glTF 2.0</em>. In the panel: under <strong>Include</strong> enable <em>Selected Objects</em> (export only what you mean to); under <strong>Transform</strong> keep +Y Up; under <strong>Data</strong> enable Mesh, Materials, and (for the character) the Armature and Animation tabs with <em>all actions</em> exported as separate clips. For FBX use <em>File &gt; Export &gt; FBX</em>, set <em>Apply Scalings</em> to <em>FBX All</em>, tick <em>Apply Modifiers</em>, and choose the right Forward/Up.</p><h3>Optimization for Runtime</h3><p>Shipping an asset is not the end — it must run fast at scale.</p><h4>Poly count and LODs</h4><p>A <strong>Level of Detail (LOD)</strong> system swaps in simpler meshes as an object moves away from the camera. Author LOD0 (full), LOD1 (~50%), LOD2 (~25%) using the <strong>Decimate</strong> modifier or manual retopology, and let the engine switch based on screen size. Distant objects costing thousands of tris is pure waste.</p><h4>Texture atlases</h4><p>Each material is typically a separate <strong>draw call</strong>, and draw calls are expensive. Combine many small textures into one larger <strong>atlas</strong> and re-pack UVs so several objects share a single material — fewer draw calls, faster frames. This is why we packed UVs into one square earlier.</p><h4>Other wins</h4><ul><li>Power-of-two texture sizes (512, 1024, 2048) for proper mipmapping.</li><li>Remove hidden faces and interior geometry the camera never sees.</li><li>Reuse materials and instances; do not duplicate unique meshes that could be instanced.</li><li>Keep bone counts reasonable for skinned meshes on lower-end hardware.</li></ul><div class='box tip'><div class='bt'>Tip.</div> After import, always test in-engine: confirm scale against a known reference, play the animation clip, and check that albedo reads in sRGB while normals/roughness read as linear. A five-minute import sanity check saves hours of confusion.</div><div class='game'><div class='game-head'>🎮 Build This: Export and Import Into an Engine</div><div class='game-body'><p>Goal: deliver your rigged, textured character into Godot, Unity, or Unreal with materials and animation intact.</p><ol><li>Select the character mesh and its armature. Apply all transforms (Ctrl+A &gt; All Transforms) and confirm scale is 1,1,1.</li><li>Recalculate normals (Shift+N) and verify UVs and the PBR material are assigned.</li><li>Export as glTF 2.0 (.glb): Selected Objects, +Y up, include Mesh, Materials, Armature, and the <code>Walk</code> animation.</li><li>Also export an FBX with Apply Scalings = FBX All and Apply Modifiers on, for comparison.</li><li>Import the .glb into your engine. Verify the character stands upright at the correct height.</li><li>Check the material maps assigned correctly (albedo sRGB, normal/roughness linear) and play the Walk clip.</li><li>Bonus: add a Decimate-based LOD1 and a texture atlas, then re-import and compare draw calls.</li></ol></div></div>"},{"id":"p9-1","part":"08 · Game Audio","nav":"Audio & Game Feel","num":"8.1","kicker":"Part 08 · Lesson 1","title":"The Role of Audio in Game Feel","html":"<h3>Why audio is half of game feel</h3><p>Game feel is the felt sense of control and responsiveness a game gives you, and audio carries far more of it than most people realize. When a button click has a crisp sound, a jump has a satisfying <em>whoomph</em>, and a hit lands with a meaty thud, the game feels <strong>tactile</strong> even though you are only touching a controller. Mute a great game and it instantly feels lifeless. Audio is the fastest, cheapest way to make actions feel like they matter.</p><p>Audio in games does three jobs at once: it provides <strong>feedback</strong> (confirming an action happened), <strong>information</strong> (telling you where an enemy is, that your health is low, that a quest updated), and <strong>emotion</strong> (tension, triumph, dread, calm). A single gunshot sound confirms you fired, tells nearby players your direction, and contributes to the visceral mood of combat.</p><h3>The four audio layers</h3><p>Almost every game soundscape decomposes into four layers. Learning to hear them separately is the core skill of an audio designer.</p><table><thead><tr><th>Layer</th><th>What it is</th><th>Examples</th></tr></thead><tbody><tr><td>UI</td><td>Menu and HUD feedback</td><td>Button clicks, hovers, error beeps, level-up chimes</td></tr><tr><td>SFX</td><td>Diegetic gameplay sounds</td><td>Footsteps, weapons, doors, pickups, impacts</td></tr><tr><td>Ambience</td><td>The continuous bed of the world</td><td>Wind, rain, crowd murmur, machine hum, birds</td></tr><tr><td>Music</td><td>Scored, often non-diegetic emotion</td><td>Loops, stingers, adaptive layers</td></tr></tbody></table><p><strong>Diegetic</strong> sounds exist in the game world (a character can hear them); <strong>non-diegetic</strong> sounds are for the player only (most music, UI). Knowing which is which guides spatialization and mixing decisions later.</p><h3>Feedback timing and the 100ms rule</h3><p>Feedback that arrives late feels broken. Aim for sound to trigger within roughly <strong>100 milliseconds</strong> of the action. Latency beyond that breaks the cause-and-effect illusion. This is why UI clicks fire on press, not on release, and why footstep sounds are tied to the exact frame a foot plants.</p><div class='box tip'><div class='bt'>Tip.</div> When a game feels mushy or unresponsive, check audio latency before you blame the controls. A 200ms delay on hit-confirmation sounds will make perfectly tuned combat feel sluggish.</div><h3>Auditing a soundscape critically</h3><p>To analyze any clip, listen four times, once for each layer, ignoring the others. Ask of each sound: <strong>Why is it here? What does it tell me? Could the player function without it?</strong> Good audio is intentional. Bad audio is either missing (silence where feedback should be) or cluttered (everything loud, nothing readable).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>audio-audit-checklist</span></div><div class='term-body'><span class='cm'># For each gameplay moment, ask:</span>\n<span class='ok'>UI</span>      <span class='dim'>Does every interaction give feedback within 100ms?</span>\n<span class='ok'>SFX</span>     <span class='dim'>Does each action have a distinct, readable sound?</span>\n<span class='ok'>Ambience</span> <span class='dim'>Is there a continuous bed selling the location?</span>\n<span class='ok'>Music</span>   <span class='dim'>Does it match emotional intensity and adapt?</span>\n<span class='am'>Mix</span>     <span class='dim'>Can you hear the important sound over everything?</span></div></div><h3>Writing an audio brief</h3><p>Before making a single sound, list what the game needs. An <strong>audio brief</strong> is a spreadsheet-like inventory: every event that needs a sound, its layer, its mood, and a reference. This prevents the classic mistake of polishing one cool sound while the game has fifty silent events.</p><div class='box lab'><div class='bt'>Lab note.</div> A brief column for <code>variation count</code> matters: footsteps with one sample sound robotic. Plan 3-5 variations for any frequently repeated sound from the start.</div><div class='game'><div class='game-head'>🎮 Build This: Audit & Brief</div><div class='game-body'><p>Map the audio of a real game, then plan the audio for your own prototype.</p><ol><li>Pick a 60-second gameplay clip of any game you know well.</li><li>Watch it four times, once per layer (UI, SFX, ambience, music). Write down every sound you hear in that layer.</li><li>For each, note: diegetic or not, what it communicates, and whether it could be removed.</li><li>Now make an audio brief for a simple prototype (say, a top-down explorer). List every event needing sound: footsteps, UI click, item pickup, door, ambient wind, one music loop.</li><li>Add columns for layer, mood (1-3 words), reference sound, and variation count.</li><li>You now have a shopping list that drives every following lesson.</li></ol></div></div>"},{"id":"p9-2","part":"08 · Game Audio","nav":"Sourcing & Creating SFX","num":"8.2","kicker":"Part 08 · Lesson 2","title":"Sourcing and Creating Sound Effects: Recording, Foley, Libraries, and Synthesis","html":"<h3>Four ways to get a sound</h3><p>Every SFX you will ever use comes from one of four sources: you <strong>record</strong> the real thing, you perform <strong>foley</strong> (fake the real thing with props), you pull from a <strong>library</strong> of pre-made sounds, or you <strong>synthesize</strong> it from scratch. Real projects mix all four. The art is picking the right source for each sound.</p><h3>Field recording</h3><p>Recording real-world sound gives unmatched authenticity. You do not need a film rig: a modern phone records usable audio, and a cheap USB or handheld recorder (Zoom H1n class) is a huge upgrade. The rules that matter most:</p><ul><li><strong>Get close.</strong> Proximity beats expensive gear. Microphones capture the room as much as the source, so reduce the distance to reduce unwanted reverb.</li><li><strong>Record quiet.</strong> Background hum, traffic, and fridge noise are nearly impossible to remove cleanly. Find the quietest moment and place.</li><li><strong>Set levels with headroom.</strong> Aim for peaks around <strong>-12 dB</strong>. Digital clipping (going over 0 dB) is unrecoverable distortion.</li><li><strong>Record many takes.</strong> You want variations, and most takes have a cough, a click, or a bump you will discard.</li></ul><h3>Foley</h3><p>Foley is performing sound with surrogate props. Footsteps are recorded by a person stepping in a box of gravel or on a wood board. Classic substitutions that sound better than the real thing:</p><table><thead><tr><th>Game sound</th><th>Foley prop</th></tr></thead><tbody><tr><td>Footsteps on snow</td><td>Squeezing a bag of cornstarch</td></tr><tr><td>Fire crackle</td><td>Crumpling cellophane / crushing a chip bag</td></tr><tr><td>Bone break / punch</td><td>Snapping celery, hitting raw meat</td></tr><tr><td>Leather creak / saddle</td><td>Twisting an old wallet or belt</td></tr></tbody></table><div class='box tip'><div class='bt'>Tip.</div> Foley a footstep by recording on the actual surface the prop suggests. Step deliberately and record at least eight individual steps so you have variations to layer later.</div><h3>Free libraries</h3><p>You do not have to make everything. High-quality free sources include <strong>Freesound.org</strong> (community uploads, check licenses), <strong>BBC Sound Effects</strong> archive, and bundled engine libraries. Always verify the license: many require attribution (Creative Commons BY) and some forbid commercial use. Keep a record of every clip's source and license in your project.</p><div class='box law'><div class='bt'>Licensing.</div> Using a sound without checking its license can force you to pull a shipped game. Save the URL, author, and license text for every downloaded asset. CC0 means no attribution required; CC-BY requires credit; never assume.</div><h3>Synthesis</h3><p>Synthetic sounds are generated from oscillators and noise rather than recordings. They are ideal for UI blips, sci-fi effects, lasers, and retro game sounds because they are clean, tiny, and infinitely tweakable. A basic UI blip is a short sine or square tone with a fast attack and a quick decay envelope. Free synth tools include the synth built into any DAW, the web-based <strong>Bfxr/Sfxr</strong> (perfect for arcade-style blips and pickups), and Audacity's <code>Generate</code> menu.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>synthesize a UI blip in Audacity</span></div><div class='term-body'><span class='cm'># A simple confirmation blip from a tone + envelope</span>\n<span class='pr'>1.</span> Generate &gt; Tone: <span class='ok'>Sine</span>, frequency <span class='am'>880 Hz</span>, duration <span class='am'>0.12s</span>\n<span class='pr'>2.</span> Select the clip, Effect &gt; <span class='ok'>Fade Out</span>  <span class='cm'># gives a percussive decay</span>\n<span class='pr'>3.</span> Generate a second tone at <span class='am'>1320 Hz</span> on a new track\n<span class='pr'>4.</span> Offset it ~20ms later for a two-note &quot;ding&quot;\n<span class='pr'>5.</span> Export &gt; <span class='ok'>blip_confirm.wav</span></div></div><div class='game'><div class='game-head'>🎮 Build This: Three Sounds, Three Sources</div><div class='game-body'><p>Build a tiny SFX palette using a different source for each sound.</p><ol><li><strong>Foley:</strong> Record 8 footsteps on a real surface with your phone or a recorder, peaks near -12 dB. Save the raw file.</li><li><strong>Library:</strong> Find a clean ambience or impact on Freesound. Record its URL, author, and license in a text file in your project.</li><li><strong>Synthesis:</strong> Make a UI confirmation blip using the Audacity tone steps above, or Bfxr.</li><li>Keep all raw files unedited for now in a <code>raw/</code> folder. The next lesson polishes them.</li></ol></div></div>"},{"id":"p9-3","part":"08 · Game Audio","nav":"Editing in a DAW","num":"8.3","kicker":"Part 08 · Lesson 3","title":"Editing Audio: Trim, Fades, Layering, and Pitch in a DAW","html":"<h3>From raw take to game-ready asset</h3><p>Raw recordings are never ready to ship. They have silence at the start, room noise, inconsistent volume, and no punch. Editing turns a raw clip into a tight, reliable game asset. You can do all of it in a free tool like <strong>Audacity</strong> or any DAW (Reaper, Ableton, GarageBand, FL Studio). The five core operations are <strong>trim, normalize, fade, layer, and pitch</strong>.</p><h3>1. Trim</h3><p>The single most important edit. Game sounds must trigger instantly, so dead air at the start adds latency and makes feedback feel late. Zoom in on the waveform, find where the sound actually begins, and cut everything before it. Trim the tail too, leaving only as much as the natural decay needs.</p><div class='box tip'><div class='bt'>Tip.</div> Always leave the very first sample a hair before the transient, but never trim into the attack. Cutting too tight clicks; cutting too loose feels laggy. Zero-crossing trims (cut where the wave crosses 0) avoid clicks.</div><h3>2. Normalize / level</h3><p>Bring each clip to a consistent peak (commonly <strong>-3 to -1 dB</strong> for one-shots) so your sounds are roughly balanced before they ever reach the engine. Use <code>Effect &gt; Normalize</code> in Audacity. Remove steady background hiss with noise reduction: sample a silent region, then apply it gently. Heavy noise reduction sounds underwater, so use the lightest setting that works.</p><h3>3. Fades</h3><p>A fade is a gradual volume ramp. Tiny fades (5-20ms) at the start and end of a clip eliminate the <strong>click</strong> that happens when a waveform starts or stops mid-cycle. Longer fades shape character: a fast fade-in keeps a transient punchy, a slow fade-out makes a tail feel natural. Apply with <code>Effect &gt; Fade In / Fade Out</code>.</p><h3>4. Layering</h3><p>Big game sounds are almost always several sounds stacked. A satisfying footstep might be a <em>thud</em> (the weight) plus a <em>scuff</em> (the surface) plus a tiny <em>cloth rustle</em>. Place each on its own track, line up their transients, and balance their levels. The classic recipe: a <strong>low</strong> layer for body, a <strong>mid</strong> layer for the main character, and a <strong>high</strong> layer for detail and definition.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>layer a footstep</span></div><div class='term-body'><span class='cm'># Three tracks, transients aligned</span>\n<span class='ok'>Track 1 (low)</span>  <span class='dim'>soft heel thud, EQ low-pass ~400Hz</span>  <span class='am'>-6 dB</span>\n<span class='ok'>Track 2 (mid)</span>  <span class='dim'>the foley step itself</span>             <span class='am'>0 dB</span>\n<span class='ok'>Track 3 (high)</span> <span class='dim'>gravel/cloth scuff, slight delay</span>   <span class='am'>-9 dB</span>\n<span class='cm'># Mixdown &gt; one punchy step. Repeat with different takes for variations.</span></div></div><h3>5. Pitch</h3><p>Pitch shifting transposes a sound up or down. Two big uses: <strong>tuning</strong> (a UI ding sounds nicer in tune with your music) and <strong>variation</strong> (shifting the same footstep by &plusmn;2-4 semitones gives free variety so repeats do not sound robotic). Use <code>Effect &gt; Change Pitch</code>. Pitching down also adds weight and size; pitching up adds energy and smallness.</p><div class='box lab'><div class='bt'>Lab note.</div> Generate variations programmatically at runtime too: many engines let you randomize pitch &plusmn;5% per playback. But baking a few distinct files plus runtime randomization gives the most natural result.</div><h3>Export discipline</h3><p>Export each finished sound as its own file with a clear name: <code>footstep_grass_01.wav</code>, <code>footstep_grass_02.wav</code>, <code>ui_click.wav</code>. Consistent naming saves hours when wiring into the engine. We choose formats and sample rates in the next lesson; for now export as 44.1kHz WAV.</p><div class='game'><div class='game-head'>🎮 Build This: Polish Your Palette</div><div class='game-body'><p>Turn last lesson's raw sounds into clean, punchy assets.</p><ol><li>Open your raw footstep recording. Split out 3 of the best individual steps.</li><li>Trim each tight to the transient with a 10ms fade in and out. Normalize to about -2 dB.</li><li>Layer in a low thud and a high scuff under one step, mix down to a punchy master step.</li><li>Pitch-shift copies by -2 and +2 semitones to create <code>footstep_01/02/03.wav</code>.</li><li>Trim and fade your UI blip, tune its pitch if needed, export as <code>ui_click.wav</code>.</li><li>Export all files at 44.1kHz WAV with clear names.</li></ol></div></div>"},{"id":"p9-4","part":"08 · Game Audio","nav":"Formats & Looping","num":"8.4","kicker":"Part 08 · Lesson 4","title":"Audio Formats and Optimization: WAV vs OGG, Mono vs Stereo, and Seamless Loops","html":"<h3>The format trade-off</h3><p>Game audio balances <strong>quality, file size, CPU cost, and latency</strong>. The two formats you will use most are uncompressed <strong>WAV/PCM</strong> and compressed <strong>OGG Vorbis</strong> (or MP3/AAC on some platforms). The rule of thumb is simple:</p><table><thead><tr><th>Use case</th><th>Format</th><th>Why</th></tr></thead><tbody><tr><td>Short SFX, UI, footsteps</td><td>WAV (PCM)</td><td>Tiny anyway; no decode latency; can fire instantly and often</td></tr><tr><td>Music, long ambience, dialogue</td><td>OGG / compressed</td><td>10x smaller; the decode cost is worth it for long files</td></tr></tbody></table><p>WAV is uncompressed, so a 2-second clip is small but a 3-minute track is huge. Compressed formats shrink that 10:1 but cost CPU to decode and add a little latency, which matters for a rapid-fire footstep but not for a 90-second loop. Engines often re-import to their own format anyway; you control this with import settings (Unity: Decompress on Load / Compressed in Memory / Streaming; Godot: Force Mono, loop, compression mode; Unreal: compression quality slider).</p><h3>Mono vs stereo</h3><p>This decision saves more memory than almost anything else. <strong>Mono</strong> = one channel; <strong>stereo</strong> = two (left and right). Critical rule: <strong>any sound that will be positioned in 3D must be mono.</strong> The engine places a mono source in space and computes the left/right balance itself based on listener position. A stereo source cannot be spatialized correctly. So:</p><ul><li><strong>Mono:</strong> footsteps, weapons, impacts, anything 3D-positioned, most SFX.</li><li><strong>Stereo:</strong> music, 2D UI sounds, and wide ambience beds that are not positional.</li></ul><div class='box tip'><div class='bt'>Tip.</div> Importing a stereo footstep into a 3D game wastes double the memory and breaks attenuation. In Godot tick <code>Force Mono</code>; in Unity tick <code>Force To Mono</code> on the import settings.</div><h3>Sample rate and bit depth</h3><p>Sample rate is how many times per second the audio is measured. <strong>44.1kHz</strong> (CD quality) is the standard for music and most SFX; <strong>48kHz</strong> aligns with video. You rarely need higher. You can drop very dull sounds (a low rumble, a muffled thud) to 22kHz to save space since they have no high frequencies to lose. Keep <strong>16-bit</strong> for delivery; 24-bit is for editing headroom only.</p><h3>Seamless looping</h3><p>A loop that clicks or stutters at the seam ruins immersion. Two things cause a bad loop: a <strong>discontinuity</strong> in the waveform at the loop point (click), and an <strong>audible event</strong> that does not line up (gap or bump). To author a seamless loop:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>author a seamless ambience loop</span></div><div class='term-body'><span class='pr'>1.</span> <span class='dim'>Find a region with consistent texture (no unique one-off events).</span>\n<span class='pr'>2.</span> <span class='dim'>Trim start AND end to zero-crossings to avoid clicks.</span>\n<span class='pr'>3.</span> <span class='ok'>Crossfade the tail over the head:</span> copy the last ~1s, fade it\n   <span class='dim'>over the first ~1s so the seam blends. (Audacity: paste + Fade.)</span>\n<span class='pr'>4.</span> <span class='dim'>Test by looping playback. Listen for the seam at the boundary.</span>\n<span class='pr'>5.</span> <span class='ok'>Export as OGG</span>, and set the import loop flag in the engine.\n<span class='bad'># Avoid MP3 for loops: it can pad silence at the ends, breaking seams.</span></div></div><div class='box danger'><div class='bt'>Watch out.</div> MP3 and some AAC encoders add tiny silent padding to the start/end of files, which creates an audible gap on every loop. Use OGG Vorbis or WAV for anything that loops.</div><h3>Loudness across formats</h3><p>Lossy compression slightly changes peaks; if you normalized to exactly 0 dB before encoding, the OGG can clip. Leave 1 dB of headroom (normalize to -1 dB) before exporting compressed audio.</p><div class='game'><div class='game-head'>🎮 Build This: Export the Right Way</div><div class='game-body'><p>Make correct format and channel choices for two different assets.</p><ol><li>Take a 30-60s ambience bed (wind, room tone). Author a seamless loop using the crossfade steps above.</li><li>Normalize it to -1 dB, export as <strong>stereo OGG</strong>, and verify the seam is inaudible on repeat.</li><li>Take your three footsteps and UI click. Export them as <strong>mono WAV, 44.1kHz, 16-bit</strong>.</li><li>Write one sentence per file justifying its format and channel count.</li></ol></div></div>"},{"id":"p9-5","part":"08 · Game Audio","nav":"Implementing in Engines","num":"8.5","kicker":"Part 08 · Lesson 5","title":"Implementing Audio in Engines: Event Triggers, 3D Spatial Sound, and Buses","html":"<h3>From file to playing sound</h3><p>An audio file in your project does nothing until something <strong>triggers</strong> it. Implementation is wiring sounds to game events, choosing whether they play in 2D or 3D space, and routing them through <strong>buses</strong> so you can mix them. The concepts are identical across engines; only the API names differ.</p><h3>Triggering on events</h3><p>You play a sound when a game event fires: a button is pressed, a foot plants, a bullet hits. Two patterns dominate. <strong>One-shots</strong> fire and forget (footstep, click). <strong>Looping sources</strong> start and stop with state (engine hum while driving, ambience while in a zone). For footsteps, the cleanest trigger is the animation system: an animation event on the frame the foot touches the ground. Simpler prototypes trigger on a timer while moving.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>trigger a footstep with pitch variation (Godot 4)</span></div><div class='term-body'><span class='cm'># AudioStreamPlayer3D on the player, footsteps[] = your 3 WAVs</span>\n<span class='pr'>func</span> <span class='ok'>play_footstep</span>():\n    $Step.stream = footsteps[<span class='am'>randi</span>() % footsteps.size()]\n    $Step.pitch_scale = <span class='am'>randf_range</span>(0.95, 1.05)  <span class='cm'># subtle variety</span>\n    $Step.play()</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>UI click on a button (Unity C#)</span></div><div class='term-body'><span class='cm'>// AudioSource set to 2D (Spatial Blend = 0), assigned to UI bus</span>\n<span class='pr'>public</span> <span class='ok'>AudioSource</span> uiSource;\n<span class='pr'>public</span> <span class='ok'>AudioClip</span> click;\n<span class='cm'>// Hook OnClick in the Button inspector:</span>\n<span class='pr'>public void</span> <span class='ok'>OnButtonClick</span>() { uiSource.PlayOneShot(click); }</div></div><h3>2D vs 3D spatial audio</h3><p><strong>2D sound</strong> plays at a fixed left/right balance regardless of where things are; it is for UI and music. <strong>3D sound</strong> is positioned in the world: the engine pans and attenuates it based on the listener (usually the camera or player). Footsteps, weapons, and world objects should be 3D so players can locate them by ear.</p><table><thead><tr><th>Engine</th><th>2D control</th><th>3D control</th></tr></thead><tbody><tr><td>Unity</td><td>Spatial Blend = 0</td><td>Spatial Blend = 1, set rolloff curve</td></tr><tr><td>Godot</td><td>AudioStreamPlayer (2D)</td><td>AudioStreamPlayer3D + Attenuation</td></tr><tr><td>Unreal</td><td>No attenuation asset</td><td>Attenuation Settings asset</td></tr></tbody></table><h3>Attenuation</h3><p>Attenuation is how a 3D sound fades with distance. You set a <strong>min distance</strong> (full volume inside this radius) and a <strong>max distance</strong> (silent beyond it), plus a falloff curve. <strong>Logarithmic</strong> rolloff is realistic; <strong>linear</strong> is simpler and easier to tune for gameplay readability. Set the max distance so distant sounds do not clutter the mix but important nearby ones stay clear.</p><div class='box tip'><div class='bt'>Tip.</div> One listener only. Make sure exactly one AudioListener (Unity) / Listener / Camera (Godot, Unreal) is active, usually on the camera or player. Two listeners cause doubled, phasey audio.</div><h3>Buses and mixing</h3><p>A <strong>bus</strong> (or mixer group) is a channel that many sounds route into, so you can control them as a group. Set up a bus per layer: <code>Master</code> &rarr; (<code>Music</code>, <code>SFX</code>, <code>UI</code>, <code>Ambience</code>). Now a single SFX volume slider in your options menu controls every gameplay sound at once, and you can apply effects (reverb, EQ, compression) to a whole group. In Godot you add buses in the Audio panel and set each player's <code>Bus</code> property; in Unity you create groups in an AudioMixer and assign <code>Output</code>; in Unreal you use Submixes and Sound Classes.</p><div class='box lab'><div class='bt'>Lab note.</div> Always route through buses from day one, even with three sounds. Retrofitting bus routing late is tedious, and you will want it the moment you build an options menu or set up ducking.</div><div class='game'><div class='game-head'>🎮 Build This: Wire the SFX</div><div class='game-body'><p>Get your edited sounds playing in an engine with proper routing.</p><ol><li>Create buses: Master with child buses Music, SFX, UI, Ambience.</li><li>Add a 3D audio source to your player; assign your 3 footstep WAVs, route to the SFX bus. Trigger one per step (animation event or movement timer) with random selection and &plusmn;5% pitch.</li><li>Set attenuation: min distance ~1m, max ~20m, so a distant character's steps fade out.</li><li>Add a 2D audio source on a UI button; play <code>ui_click.wav</code> on press, routed to the UI bus.</li><li>Walk toward and away from a sound source and confirm the footsteps attenuate and pan correctly.</li></ol></div></div>"},{"id":"p9-6","part":"08 · Game Audio","nav":"Composing Game Music","num":"8.6","kicker":"Part 08 · Lesson 6","title":"Composing Simple Game Music: Loops, Motifs, and Tension and Release","html":"<h3>Music that survives repetition</h3><p>Game music is different from a song. A song plays once; a game loop plays for hours. The central challenge of composing for games is writing music that <strong>does not fatigue</strong> when repeated. That changes how you write: simpler, more spacious, motif-driven, and arranged to support gameplay rather than demand attention.</p><h3>You do not need to be a trained composer</h3><p>A DAW (GarageBand, Reaper, LMMS, FL Studio) plus free instrument plugins is enough. You will work with a <strong>MIDI piano roll</strong>, drawing notes on a grid, so you do not need to play an instrument. The musical building blocks are few: pick a <strong>key</strong>, build chords from its scale, write a <strong>motif</strong>, and arrange.</p><h3>Motif: the memorable hook</h3><p>A <strong>motif</strong> is a short, recognizable musical idea, often just 3-5 notes. Think of the most famous game themes; their hooks are tiny. A motif gives a loop identity and lets you create variation by transforming the same idea (move it up, change its rhythm, harmonize it) instead of writing endless new material. Write one short motif and reuse it. Repetition with variation feels intentional; random new melodies feel noisy.</p><h3>Harmony, tension, and release</h3><p>Music creates emotion by building <strong>tension</strong> and then <strong>releasing</strong> it. The simplest engine for this is a chord progression that moves away from the home chord (<strong>tonic</strong>) and returns. A reliable, pleasant loop in a minor key:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>a calm loopable progression (A minor)</span></div><div class='term-body'><span class='cm'># 4 bars, one chord per bar, ~80 BPM</span>\n<span class='ok'>Am</span>  <span class='dim'>(home / rest)</span>  &rarr;  <span class='ok'>F</span>  <span class='dim'>(lift, warmth)</span>\n<span class='ok'>C</span>   <span class='dim'>(brightness)</span>  &rarr;  <span class='ok'>G</span>  <span class='dim'>(tension, wants to resolve)</span>\n<span class='cm'># G pulls back to Am, so the loop point feels natural, not abrupt.</span>\n<span class='am'>Tip:</span> <span class='dim'>end the loop on G so returning to Am at bar 1 = release.</span></div></div><p>The trick for a seamless musical loop: arrange so the <strong>last chord wants to move to the first chord</strong>. The harmonic pull across the loop seam makes the repeat feel like a continuation rather than a restart.</p><h3>Arrangement for low fatigue</h3><ul><li><strong>Leave space.</strong> Constant busy melody tires the ear fast. Let the motif breathe; use sustained pads and gaps.</li><li><strong>Limit the high-attention layer.</strong> A prominent lead melody draws focus. For background loops, keep melody sparse and lean on harmony and texture.</li><li><strong>Match the gameplay.</strong> Exploration music is calm and slow; combat is driving and dense. Tempo and density carry mood more than melody.</li><li><strong>Keep loops longer than they feel.</strong> A 30-60 second loop fatigues far less than an 8-second one, even though both repeat.</li></ul><div class='box tip'><div class='bt'>Tip.</div> Compose to a <strong>grid and fixed tempo</strong> from the start. Bar-aligned, tempo-locked music is essential for the adaptive layering and crossfading you will build next lesson.</div><h3>Mixing the loop</h3><p>Keep the music mix simple: bass, a pad/harmony, a light melody, and optionally percussion. Pan layers slightly for width, leave headroom (peaks around -6 dB so SFX have room to sit on top), and export as a seamless loop using the techniques from Lesson 8.4. Music is usually stereo and OGG.</p><div class='box lab'><div class='bt'>Lab note.</div> If you cannot write a melody, a loop can be just a bass line plus a pad plus rhythmic texture. Atmospheric exploration music often has no real melody at all, which also makes it less fatiguing.</div><div class='game'><div class='game-head'>🎮 Build This: A Loop With a Motif</div><div class='game-body'><p>Compose a short, seamless background loop.</p><ol><li>In a DAW, set a tempo (e.g. 80 BPM) and pick a minor key.</li><li>Lay down a 4-bar chord progression that ends wanting to return to the home chord (e.g. Am-F-C-G).</li><li>Write a 3-5 note motif over it; keep it sparse and leave space.</li><li>Add a bass line following the chord roots and a soft pad for warmth.</li><li>Make it loop: ensure the end leads musically into the start, and that any reverb tail does not cut off abruptly.</li><li>Mix with peaks around -6 dB, export as a seamless stereo OGG. Loop it for 5 minutes and check that it does not grate.</li></ol></div></div>"},{"id":"p9-7","part":"08 · Game Audio","nav":"Adaptive Music & Middleware","num":"8.7","kicker":"Part 08 · Lesson 7","title":"Adaptive Music and Middleware: Vertical Layering, Horizontal Re-sequencing, FMOD vs Wwise","html":"<h3>Music that responds to the game</h3><p>A static loop ignores what the player is doing. <strong>Adaptive (or dynamic) music</strong> changes with the game state: it intensifies in combat, calms when you
