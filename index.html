 explore, swells at a discovery. There are two fundamental techniques, and most games use both.</p><h3>Vertical layering (re-orchestration)</h3><p>You compose multiple layers that all play in <strong>perfect sync</strong> on the same timeline and the same chord progression. You then change the music by fading layers in and out. A calm scene plays just the pad and bass; as danger rises you fade in a percussion layer, then a lead/strings layer. Because all layers share tempo and harmony, they can be mixed in any combination at any moment without a transition point.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>vertical layers, one shared 60s timeline</span></div><div class='term-body'><span class='ok'>Layer A (base)</span>   <span class='dim'>pad + bass</span>          <span class='am'>always on</span>\n<span class='ok'>Layer B (tension)</span> <span class='dim'>percussion + arp</span>    <span class='am'>fade in at intensity &gt; 0.5</span>\n<span class='ok'>Layer C (combat)</span>  <span class='dim'>lead + heavy drums</span>  <span class='am'>fade in at intensity &gt; 0.8</span>\n<span class='cm'># All three loop in sync. Crossfade volumes, never restart playback.</span></div></div><h3>Horizontal re-sequencing</h3><p>Here you have distinct music <strong>segments</strong> (explore, combat, victory) and you switch between them over time. The key problem is the <strong>transition</strong>: jumping mid-bar sounds jarring. Solutions include waiting for the next bar or beat to switch (<strong>quantized transitions</strong>), and using short <strong>transition stingers</strong> to bridge segments. Horizontal works well for distinct gameplay phases; vertical works well for a continuously variable intensity.</p><table><thead><tr><th></th><th>Vertical layering</th><th>Horizontal re-sequencing</th></tr></thead><tbody><tr><td>Changes</td><td>Density / orchestration</td><td>Which section plays</td></tr><tr><td>Best for</td><td>Continuous intensity (a threat meter)</td><td>Discrete states (explore vs boss)</td></tr><tr><td>Transition</td><td>Instant crossfade, always in sync</td><td>Needs quantization or stingers</td></tr></tbody></table><h3>Middleware vs engine-native</h3><p><strong>Middleware</strong> is dedicated audio software that sits between your sounds and the engine. The two industry standards are <strong>FMOD</strong> and <strong>Wwise</strong>. Both let sound designers build adaptive behavior (layers, transitions, randomization, real-time parameters, mixing) in their own authoring tool, then the programmer just sends simple events and parameters from the game. This decouples audio work from code.</p><table><thead><tr><th>Option</th><th>Strengths</th><th>Consider when</th></tr></thead><tbody><tr><td>Engine-native (Unity/Godot/Unreal audio)</td><td>No extra integration; free; fine for simple needs</td><td>Small projects, basic layering, learning</td></tr><tr><td>FMOD</td><td>Approachable, great for music systems, free for small budgets</td><td>Indie to mid-size, music-heavy games</td></tr><tr><td>Wwise</td><td>Deep, powerful profiler, huge AAA adoption</td><td>Large projects, big SFX counts, complex mixing</td></tr></tbody></table><div class='box tip'><div class='bt'>Tip.</div> For your first adaptive system, engine-native is perfect. The concepts (synced layers, crossfading, parameters) transfer directly to FMOD/Wwise later. Do not adopt middleware until you feel native audio limiting you.</div><h3>Building vertical layering natively</h3><p>The implementation is straightforward. Start both layers playing at the same time (so they stay sample-synced) and animate their <strong>volumes</strong> with an intensity value. Never start a layer late, or it will be out of phase.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>2-layer crossfade by intensity (Godot 4)</span></div><div class='term-body'><span class='cm'># Two AudioStreamPlayers, both .play() at start, both looping in sync</span>\n<span class='pr'>func</span> <span class='ok'>set_intensity</span>(t: float):  <span class='cm'># t = 0.0 calm .. 1.0 intense</span>\n    $Base.volume_db   = <span class='am'>linear_to_db</span>(1.0)        <span class='cm'># base always full</span>\n    $Layer.volume_db  = <span class='am'>linear_to_db</span>(clamp(t, 0, 1)) <span class='cm'># fade in tension</span>\n<span class='cm'># Smooth t over ~1s with lerp so the change is a crossfade, not a jump.</span></div></div><div class='game'><div class='game-head'>🎮 Build This: 2-Layer Adaptive Loop</div><div class='game-body'><p>Turn your composition into a system that responds to game state.</p><ol><li>From last lesson's loop, bounce two synced versions on the same timeline: a <strong>base</strong> (pad + bass) and an <strong>intensity</strong> layer (add percussion + lead). Same tempo, length, and loop point.</li><li>Export both as seamless OGG loops.</li><li>In the engine, load both into separate audio sources on the Music bus. Start both playing and looping at the same moment.</li><li>Add an <code>intensity</code> variable (0-1). Map it to the intensity layer's volume; keep the base at full.</li><li>Smoothly lerp intensity over ~1 second so transitions crossfade. Bind it to a key or a proximity trigger (near enemy = 1, far = 0).</li><li>Test: the music should thicken near danger and thin out when safe, with no restart or sync drift.</li></ol></div></div>"},{"id":"p9-8","part":"08 · Game Audio","nav":"Mixing for Games","num":"8.8","kicker":"Part 08 · Lesson 8","title":"Mixing for Games: Ducking, Loudness, and the Final Soundscape","html":"<h3>The mix is where it all comes together</h3><p>You can have great sounds and still have a bad soundscape if the <strong>mix</strong> is wrong: music drowning footsteps, a UI click that pierces, ambience so loud nobody hears dialogue. Mixing for games is balancing every layer so the <strong>most important sound at any moment is always audible</strong>, and the whole output sits at a comfortable, consistent loudness.</p><h3>Set a level hierarchy</h3><p>Decide what matters most and build the mix around it. A common priority order: <strong>dialogue/critical cues &gt; key SFX (the player's own actions) &gt; music &gt; ambience &gt; minor SFX</strong>. Set your bus levels to reflect that. Music in particular is almost always too loud in first drafts; pull it back until SFX read clearly.</p><table><thead><tr><th>Bus</th><th>Typical relationship</th></tr></thead><tbody><tr><td>SFX (player actions)</td><td>Reference level, the loudest gameplay element</td><td></td></tr><tr><td>Music</td><td>Sits under SFX; ducks when key sounds play</td><td></td></tr><tr><td>Ambience</td><td>Quiet bed, felt more than heard</td><td></td></tr><tr><td>UI</td><td>Clear but not piercing</td><td></td></tr></tbody></table><h3>Ducking: making room automatically</h3><p><strong>Ducking</strong> lowers one bus when another plays, so important sounds cut through. The classic use is ducking <strong>music and ambience under dialogue</strong> or under loud SFX. It is implemented with a <strong>sidechain compressor</strong>: the dialogue bus signal triggers volume reduction on the music bus. When dialogue stops, music returns. This keeps music full when it can be, but gets out of the way the instant something important happens.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>sidechain duck: music under dialogue</span></div><div class='term-body'><span class='cm'># On the Music bus, add a Compressor in sidechain mode:</span>\n<span class='ok'>Sidechain input</span> = Dialogue bus\n<span class='ok'>Threshold</span>       <span class='dim'>set so dialogue triggers it</span>\n<span class='ok'>Ratio</span>           <span class='am'>4:1</span>  <span class='dim'>(amount of duck)</span>\n<span class='ok'>Attack</span>          <span class='am'>~20ms</span> <span class='dim'>(fast, so it ducks promptly)</span>\n<span class='ok'>Release</span>         <span class='am'>~300ms</span> <span class='dim'>(smooth return after dialogue)</span>\n<span class='cm'># Unity: AudioMixer + Duck Volume effect. FMOD/Wwise: sidechain/ducking built in.</span></div></div><div class='box tip'><div class='bt'>Tip.</div> No dialogue in your game? Duck music slightly under important SFX (hits, pickups, alerts) instead. A small, fast duck makes every key action pop without you turning the music down permanently.</div><h3>Loudness: the target that matters</h3><p>Loudness is not peak level; it is <strong>perceived</strong> volume measured in <strong>LUFS</strong> (Loudness Units Full Scale). Mixing to a consistent integrated loudness keeps players from constantly reaching for the volume knob and meets platform requirements. Useful targets:</p><ul><li><strong>-14 LUFS</strong> integrated is a common, sensible target for game output (also the streaming norm).</li><li>Keep <strong>true peak</strong> below <strong>-1 dBTP</strong> to avoid clipping after compression/encoding.</li><li>Preserve <strong>dynamic range</strong>: games are not loudness-war pop tracks. A quiet exploration scene should be quieter than combat. Do not crush everything to maximum.</li></ul><div class='box danger'><div class='bt'>Watch out.</div> Do not mix loud. Set a comfortable monitoring volume and leave it. If you mix at high volume, everything sounds good and balanced; played back quietly it falls apart. Mix at a moderate, fixed level and check on different devices (headphones, laptop speakers, phone).</div><h3>Metering and final delivery</h3><p>Put a <strong>loudness meter</strong> on the master bus (free options exist for every DAW; engines and middleware have built-in meters too). Play through representative gameplay and watch the integrated LUFS over time. Adjust the master so typical gameplay sits near your target, then verify true peak stays under -1 dBTP. Finally, do a <strong>mono check</strong>: collapse to mono and confirm nothing important disappears (phase cancellation between stereo layers can erase sounds in mono playback on some devices).</p><div class='box lab'><div class='bt'>Lab note.</div> Add a brick-wall <strong>limiter</strong> as the last effect on the master to catch stray peaks, but use it as a safety net, not as a way to make the whole game louder. The limiter should barely engage during normal play.</div><div class='game'><div class='game-head'>🎮 Build This: Final Mix Pass</div><div class='game-body'><p>Mix your full prototype soundscape into a cohesive whole.</p><ol><li>With footsteps, UI click, ambience loop, and 2-layer adaptive music all running, set bus levels: SFX clear and present, music under it, ambience as a quiet bed.</li><li>Add ducking: a fast, light duck on the Music bus triggered by key SFX (or dialogue if you have it).</li><li>Put a loudness meter on the master. Play through calm and intense states; aim for roughly -14 LUFS integrated.</li><li>Add a limiter on the master with a ceiling of -1 dBTP as a safety net.</li><li>Check the mix on headphones, laptop speakers, and in mono. Confirm footsteps stay audible during music, and nothing clips or vanishes.</li><li>Adjust until the important sound is always readable in every game state.</li></ol></div></div>"},{"id":"p7-1","part":"09 · Ship It","nav":"Builds Per Platform","num":"9.1","kicker":"Part 09 · Lesson 1","title":"Building & Exporting for Every Platform","html":"<h3>Debug vs release builds</h3><p>A <strong>debug build</strong> keeps symbols, assertions, verbose logging, and the engine's hot-reload hooks. It is bigger, slower, and only for you. A <strong>release build</strong> strips debug symbols, enables optimizations, disables the in-engine console, and is what players install. The single most common shipping mistake is sending a debug build to a store: it leaks stack traces, runs at half the framerate, and may include test assets. Always produce both, but only ship the release.</p><p>The second most common mistake is testing only on your dev machine. Your machine has the engine, the SDKs, fonts, codecs, and a graphics driver you updated last week. A player's machine has none of that. <em>You must run the release build on a clean machine</em> (or a fresh VM / a friend's PC) with no dev tools installed.</p><h3>The export pipeline conceptually</h3><p>Every engine does the same four things when it exports: (1) bundle your scripts/scenes/assets into a package format, (2) link them against a platform-specific runtime binary, (3) embed metadata (icon, name, version, permissions), and (4) sign/package the result for the target OS. Knowing these stages helps you debug: a black screen usually means assets did not bundle; a crash on launch usually means the runtime/architecture is wrong; a refusal to open usually means signing.</p><h4>Godot (export templates + presets)</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='cm'># headless export from CI or command line</span>\n<span class='pr'>$</span> godot --headless --export-debug \"Windows Desktop\" build/game_debug.exe\n<span class='pr'>$</span> godot --headless --export-release \"Windows Desktop\" build/game.exe\n<span class='cm'># macOS must be a signed .app or notarized .dmg to open without warnings</span>\n<span class='pr'>$</span> godot --headless --export-release \"macOS\" build/game.dmg</div></div><p>In the editor: <code>Project &gt; Export</code>, add a preset per platform, install export templates first (<code>Editor &gt; Manage Export Templates</code>), set the icon and version, then export. The <em>Embed PCK</em> option keeps everything in one file.</p><h4>Unity</h4><p><code>File &gt; Build Settings</code>, pick the platform, click <em>Switch Platform</em> (this re-imports assets and can take a while), set <em>Development Build</em> for debug, uncheck it for release. <em>Player Settings</em> holds icon, company name, bundle identifier, scripting backend (IL2CPP for release on most platforms), and target architecture.</p><h4>Web (WASM/HTML5)</h4><p>Web builds need the right MIME types and headers. WASM threads require <code>Cross-Origin-Opener-Policy: same-origin</code> and <code>Cross-Origin-Embedder-Policy: require-corp</code>, or the game silently fails to start. Test the exported folder over HTTP, never by double-clicking <code>index.html</code> (browsers block module/WASM loads from <code>file://</code>).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>serve-web-build</span></div><div class='term-body'><span class='pr'>$</span> cd build/web\n<span class='pr'>$</span> python3 -m http.server 8080\n<span class='ok'>Serving HTTP on 0.0.0.0 port 8080</span>\n<span class='cm'># open http://localhost:8080 in a fresh browser profile</span></div></div><div class='box danger'><div class='bt'>Architecture mismatch is silent and deadly.</div> An ARM64 build will not run on x86, and a 64-bit build will not run on 32-bit Windows. For macOS, ship a Universal binary (x86_64 + arm64) or Apple Silicon users get nothing. Always confirm the target arch matches the test machine.</div><h3>Versioning and verification</h3><p>Stamp every build with a version string (<code>1.0.3+build142</code>) and show it on the title screen. When a player reports a bug, the version tells you exactly which binary they ran. Keep a checklist: build, copy to clean machine, launch, play five minutes, check the version string, confirm no console window pops up, confirm saves write to a real user folder (not your project directory).</p><div class='box tip'><div class='bt'>Clean machine = clean truth.</div> A spare laptop, a fresh VM snapshot, or a cloud Windows instance you reset each test is worth more than any amount of in-editor testing for catching missing-dependency crashes.</div><div class='game'><div class='game-head'>🎮 Build This: Clean-Machine Verification</div><div class='game-body'><p>Goal: prove your game runs for a stranger, not just for you.</p><ol><li>Export a <strong>debug</strong> build and a <strong>release</strong> build for one platform.</li><li>Stamp both with a visible version string on the title screen.</li><li>Copy the release build to a clean machine or fresh VM with no engine/SDKs installed.</li><li>Launch it; confirm no dev console, correct icon, correct arch, and saves go to the OS user folder.</li><li>Play five minutes and write down anything that differs from your dev machine.</li></ol></div></div>"},{"id":"p7-2","part":"09 · Ship It","nav":"itch.io","num":"9.2","kicker":"Part 09 · Lesson 2","title":"Publishing on itch.io, Step by Step","html":"<h3>Why start on itch.io</h3><p>itch.io is the lowest-friction storefront in games: no application fee, no review queue, no gatekeeper. You can have a live page in fifteen minutes. It is the ideal place to publish jam games, demos, prototypes, and early commercial releases, and it is where you should make your <em>first</em> public release to learn the mechanics of shipping without Steam's $100 fee and review delay.</p><h3>Create the project</h3><p>From your dashboard choose <em>Create new project</em>. The key fields:</p><ul><li><strong>Title</strong> and <strong>Project URL</strong> (the slug; pick it carefully, changing it later breaks links).</li><li><strong>Classification</strong>: Game.</li><li><strong>Kind of project</strong>: <em>Downloadable</em> for desktop binaries, or <em>HTML</em> for a web build that plays in the browser.</li><li><strong>Pricing</strong>: <em>$0 or donate</em> (name-your-price), a fixed price, or <em>No payments</em>. Name-your-price is the friendliest default for early work.</li></ul><h3>Upload the build</h3><p>For downloadable games, zip each platform build into its own archive (<code>game-win.zip</code>, <code>game-mac.zip</code>, <code>game-linux.zip</code>). Upload each, then tag each file with its platform using the checkboxes (Windows / macOS / Linux). This makes the itch desktop app and the download buttons work correctly.</p><div class='box danger'><div class='bt'>Zip the contents, not the parent folder twice.</div> Players should unzip and immediately see <code>game.exe</code> (or a single folder containing it). A double-nested zip or a zip that only contains a <code>.pck</code> with no executable is the number-one itch support complaint.</div><h4>HTML5 web games</h4><p>For an HTML build, your zip's <strong>root must contain <code>index.html</code></strong>. Check <em>This file will be played in the browser</em>. Set the viewport dimensions to match your game's resolution and enable <em>Mobile friendly</em> and <em>Fullscreen button</em> if relevant. itch serves these with the COOP/COEP headers needed for threaded WASM if you enable <em>SharedArrayBuffer support</em> in the embed options.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>web-build.zip layout</span></div><div class='term-body'>web-build.zip\n├── index.html   <span class='ok'>← required at root</span>\n├── game.wasm\n├── game.js\n└── game.pck</div></div><h3>Page craft on itch</h3><p>itch pages support a cover image (<strong>630×500</strong> recommended, shown in listings), a banner, embedded screenshots, GIFs, and YouTube/Vimeo trailers. The description uses a simple rich-text editor. Above the fold you need: a one-sentence hook, an animated GIF showing the core loop, and the download/play button. Add at least three screenshots and a 30-second GIF — motion sells far better than static shots on itch.</p><h3>Publishing and butler</h3><p>Set <em>Visibility &amp; access</em> to <strong>Draft</strong> while you work, <strong>Restricted</strong> for a private test link you can DM to testers, and <strong>Public</strong> when ready. A restricted page is the perfect way to verify the full purchase/download flow before launch.</p><p>For repeated updates, install <strong>butler</strong>, itch's command-line uploader. It does delta patching, so updates only transfer changed bytes:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>butler</span></div><div class='term-body'><span class='pr'>$</span> butler login\n<span class='pr'>$</span> butler push build/win user/game-slug:windows\n<span class='pr'>$</span> butler push build/web user/game-slug:html5\n<span class='ok'>✓ Build is now processing, should be up in a bit.</span>\n<span class='pr'>$</span> butler status user/game-slug:windows</div></div><p>The <code>:channel</code> suffix (e.g. <code>:windows</code>, <code>:html5</code>) maps to the platform tags automatically based on the binaries it finds.</p><div class='box tip'><div class='bt'>Channels beat manual uploads.</div> Once you wire butler into your build script, shipping an update is one command. This habit pays off enormously when you move to Steam's depot system, which works the same way.</div><div class='game'><div class='game-head'>🎮 Build This: Ship a Test Release to itch.io</div><div class='game-body'><p>Goal: a real, downloadable/playable release behind a private link.</p><ol><li>Create the project; set Kind to Downloadable or HTML and pick a permanent slug.</li><li>Upload zipped builds (root-level executable / <code>index.html</code>) and tag each platform.</li><li>Add a 630×500 cover, three screenshots, and one GIF of the core loop.</li><li>Set pricing (name-your-price is fine) and visibility to <strong>Restricted</strong>.</li><li>Open the link on another device, download/play it end to end, then flip to Public.</li></ol></div></div>"},{"id":"p7-3","part":"09 · Ship It","nav":"Steam & Steamworks","num":"9.3","kicker":"Part 09 · Lesson 3","title":"Steam: Steamworks, the Page & Wishlists","html":"<h3>The Steamworks onramp</h3><p>Steam is where most PC games make most of their money, and wishlists are its engine. Getting on Steam: create a Steamworks partner account, pay the <strong>$100 Steam Direct recoupable fee per app</strong> (returned after you earn $1,000), complete tax and bank forms (this can take days — start early), then you get an <strong>App ID</strong>. The fee is per game, not per account.</p><h3>App admin and the store page</h3><p>Inside the App's admin you build the store page in the <em>Store Presence</em> section. The required assets and their exact sizes are the part developers always get wrong:</p><table><thead><tr><th>Asset</th><th>Size (px)</th><th>Where it shows</th></tr></thead><tbody><tr><td>Header capsule</td><td>460×215</td><td>Top of page, search results</td></tr><tr><td>Small capsule</td><td>231×87</td><td>Search lists, recommendations</td></tr><tr><td>Main capsule</td><td>616×353</td><td>Front-page features</td></tr><tr><td>Vertical capsule</td><td>374×448</td><td>Sales, daily deals</td></tr><tr><td>Library capsule</td><td>600×900</td><td>Player's library grid</td></tr><tr><td>Screenshots</td><td>1920×1080</td><td>Page gallery (min 5)</td></tr></tbody></table><div class='box danger'><div class='bt'>The capsule must be readable at thumbnail size.</div> Steam shows your small capsule the size of a postage stamp. If the logo isn't legible and the art isn't instantly readable when scaled down, you lose clicks. Put the title big, use one strong focal image, avoid busy backgrounds.</div><h3>Trailer, description, tags</h3><p>Upload a <strong>trailer</strong> (the first video — Steam autoplays it muted, so the first 3 seconds must show gameplay, not your logo). Write a <strong>short description</strong> (the blurb under the capsule, ~300 chars, your elevator pitch) and a <strong>long description</strong> with embedded GIFs/headers. Tags drive Steam's discovery algorithm: pick the 5-7 tags that genuinely match your game; let players add the rest. Wrong tags poison your recommendations.</p><h3>Wishlists are the whole game</h3><p>Wishlists are the single most important pre-launch metric. They drive Steam's algorithmic visibility, and on launch day every wishlister gets an email. A launch-day wishlist-to-sale conversion of 10-20% in week one is typical for a healthy page. The strategy: <strong>get the page live as early as possible</strong> (often a year before launch) so wishlists accrue for the entire dev period, because you cannot collect a wishlist before the page exists.</p><div class='box law'><div class='bt'>Launch your store page, not your game, first.</div> A &quot;Coming Soon&quot; page with a trailer and a wishlist button is the foundation of every PC marketing plan. Aim to enter launch with a strong wishlist base; many successful indies target 7,000+ before launching.</div><h3>Builds, depots, and SteamPipe</h3><p>You upload builds via <strong>SteamPipe</strong> using <code>steamcmd</code> and VDF scripts. A <em>depot</em> is a bucket of files (often one per OS); a <em>build</em> assigns depot manifests to a <em>branch</em> (e.g. <code>default</code> or a private <code>beta</code>).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>app_build_480.vdf</span></div><div class='term-body'>\"appbuild\"\n{\n  \"appid\" \"480\"\n  \"desc\" \"v1.0.0 launch\"\n  \"buildoutput\" \"output/\"\n  \"contentroot\" \"build/win/\"\n  \"setlive\" \"\"  <span class='cm'>// blank = do NOT auto-publish; set branch manually</span>\n  \"depots\" { \"481\" \"depot_481.vdf\" }\n}</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>upload</span></div><div class='term-body'><span class='pr'>$</span> steamcmd +login partner_account +run_app_build app_build_480.vdf +quit\n<span class='ok'>Successfully finished AppID build</span></div></div><p>Set the build live on a private <code>beta</code> branch first, password-protect it, and test the full Steam install path before ever touching <code>default</code>.</p><div class='game'><div class='game-head'>🎮 Build This: Draft Your Steam Page</div><div class='game-body'><p>Goal: a review-ready &quot;Coming Soon&quot; page that collects wishlists.</p><ol><li>Register the Steamworks app, pay the $100, and finish tax/bank forms.</li><li>Produce the five capsule sizes (460×215, 231×87, 616×353, 374×448, 600×900) and 5+ 1080p screenshots.</li><li>Upload a trailer whose first 3 seconds are gameplay; write short + long descriptions.</li><li>Pick 5-7 accurate tags; set a release window so wishlists open.</li><li>Submit the page for Valve review and confirm the wishlist button is live.</li></ol></div></div>"},{"id":"p7-4","part":"09 · Ship It","nav":"Mobile, Web & Console","num":"9.4","kicker":"Part 09 · Lesson 4","title":"Mobile, Web Hosting & a Console Overview","html":"<h3>App Store (iOS)</h3><p>Publishing to iOS requires the <strong>Apple Developer Program ($99/year)</strong>, a Mac with Xcode, and code signing. The flow: in App Store Connect create the app record with a unique <strong>bundle identifier</strong> (<code>com.studio.game</code>), build/archive in Xcode, upload via Xcode or Transporter, then submit for <strong>App Review</strong>. Review typically takes a day or two and is a real human who will reject you for crashes, broken links in metadata, missing privacy labels, or misuse of IAP.</p><p>You must provide: an app icon (1024×1024, no alpha, no rounded corners — Apple rounds them), screenshots at exact device sizes (e.g. 6.7&quot; iPhone, 12.9&quot; iPad), a privacy policy URL, an age rating questionnaire, and a <strong>privacy nutrition label</strong> declaring what data you collect.</p><h3>Google Play (Android)</h3><p>Google Play requires a <strong>one-time $25</strong> developer registration. Modern Play requires the <strong>Android App Bundle (.aab)</strong>, not a raw APK; Google generates per-device APKs from it. You must <strong>sign</strong> the bundle (enroll in Play App Signing so Google manages the upload/release keys).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>build & sign aab</span></div><div class='term-body'><span class='pr'>$</span> ./gradlew bundleRelease\n<span class='pr'>$</span> jarsigner -keystore release.keystore app-release.aab my-key\n<span class='cm'># or let Play App Signing manage keys; you keep only the upload key</span></div></div><p>Use <strong>internal testing</strong> and <strong>closed testing</strong> tracks before production. New personal developer accounts now require a closed test with a minimum number of testers over several days before you can publish to production — plan for this.</p><div class='box danger'><div class='bt'>Lose your signing key, lose your app.</div> If you self-manage keys and lose the keystore, you can never update that app again. Back up keystores and passwords in two places. Play App Signing exists specifically to avoid this.</div><h3>Web hosting</h3><p>A web build is just static files (<code>index.html</code>, <code>.wasm</code>, <code>.js</code>, data). Host on itch.io (easiest), GitHub Pages, Netlify, Cloudflare Pages, or any static host. The non-obvious requirement: threaded WASM needs cross-origin isolation headers, which you set on the host.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>_headers (Netlify / Cloudflare Pages)</span></div><div class='term-body'>/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: require-corp\n  Content-Type: application/wasm  <span class='cm'>// ensure .wasm served correctly</span></div></div><p>If the game starts but threading fails, it is almost always these headers. Also enable gzip/brotli — WASM compresses dramatically and load time is your retention.</p><h3>Console overview (Switch, PlayStation, Xbox)</h3><p>Consoles are <strong>closed platforms</strong>: you cannot publish without being an approved developer. The path:</p><ol><li><strong>Apply</strong> to the platform's developer program (Nintendo Developer Portal, PlayStation Partners, ID@Xbox). They vet your studio and game.</li><li>Once approved, buy or borrow a <strong>devkit</strong> — specialized hardware that runs unsigned/debug builds. Devkits are NDA'd and not for sale to the public.</li><li>Port using the platform SDK (often through an engine's console export, which itself requires approval and a separate licensed module).</li><li>Pass <strong>certification (&quot;cert&quot;)</strong>: a long checklist (suspend/resume, controller disconnect handling, correct error messages, save-data rules, trophy/achievement compliance). Failing cert means resubmitting.</li></ol><div class='box tip'><div class='bt'>Don't plan consoles as your first launch.</div> Ship on PC/mobile first to prove the game, then apply for console programs with sales numbers and a polished build. Approval is far easier when you have traction.</div><div class='game'><div class='game-head'>🎮 Build This: Prepare One Mobile/Web Submission</div><div class='game-body'><p>Goal: a submittable mobile listing or a live, isolated web build.</p><ol><li>Pick one track: App Store, Google Play, or web hosting.</li><li>Mobile: create the app record, set the bundle/package ID, generate the icon (1024×1024) and required screenshot sizes, write the privacy policy and age-rating answers.</li><li>Build the signed artifact (.aab / archived .ipa) and push to an internal/test track.</li><li>Web: deploy the static build with COOP/COEP headers and confirm it loads cross-origin-isolated.</li><li>Open it on a real device and verify input, audio, and saves work.</li></ol></div></div>"},{"id":"p7-5","part":"09 · Ship It","nav":"Store-Page Craft","num":"9.5","kicker":"Part 09 · Lesson 5","title":"Store-Page Craft: Capsule, Screenshots & Trailer","html":"<h3>The page is the product, for buyers</h3><p>Players never see your code, your clever architecture, or your hundred hours of polish. They see a capsule, a few screenshots, a trailer, and a paragraph — and they decide in under ten seconds. Treating the store page as an afterthought is the most expensive mistake an indie makes. Every asset has one job: communicate the game's fantasy fast.</p><h3>Capsule art</h3><p>The capsule is a thumbnail, not a poster. It must work at <strong>postage-stamp size</strong> in a crowded grid.</p><ul><li><strong>One focal subject.</strong> A character, a creature, an iconic object — not a wide vista.</li><li><strong>Legible logo.</strong> Big, high-contrast, readable when shrunk 80%.</li><li><strong>Strong silhouette and color.</strong> Pick a distinctive palette so it pops against Steam's dark UI.</li><li><strong>No fine detail.</strong> Tiny text and intricate scenes vanish at thumbnail size.</li></ul><div class='box tip'><div class='bt'>The squint test.</div> Shrink your capsule to 231×87, blur it slightly, and look from across the room. If you can't tell what genre it is and read the title, redesign it.</div><h3>Screenshots</h3><p>You need at least five, and order matters because most players only look at the first two or three. Rules:</p><ul><li><strong>First shot = the hook.</strong> Show the core gameplay at its most exciting, with HUD on.</li><li>Show <em>variety</em>: different environments, abilities, enemies, modes.</li><li>Use real gameplay, not posed beauty shots that misrepresent the experience (Valve and players punish this).</li><li>Capture at native store resolution (1920×1080) with the UI players will actually see.</li><li>Avoid screenshots that are 90% empty sky or menu.</li></ul><h3>The trailer</h3><p>A 30-60 second trailer converts better than a 3-minute one. Structure:</p><ol><li><strong>0-3s: gameplay immediately.</strong> Steam autoplays muted; lead with motion, not a studio logo or slow fade.</li><li><strong>3-20s: the core loop.</strong> Show what the player does, repeatedly and clearly.</li><li><strong>20-45s: escalation/variety.</strong> Bigger moments, more systems, the &quot;oh, it also does this&quot; beats.</li><li><strong>End: title card + &quot;Wishlist Now&quot; + platform logos.</strong></li></ol><div class='box danger'><div class='bt'>Cutscenes and logos are not gameplay.</div> The fastest way to kill trailer retention is 8 seconds of your team logo before anything moves. Players bounce in the first 5 seconds. Show the game.</div><h3>Description and tags</h3><p>The <strong>short description</strong> (the blurb) is your one-sentence pitch: genre + hook + fantasy. The <strong>long description</strong> should front-load with a GIF and a punchy paragraph, then use short feature bullets — not walls of lore. Most players skim. Lead each bullet with the benefit.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>short-description.txt</span></div><div class='term-body'>A roguelike deck-builder where every card is also a spell\nyou can cast OR craft into a weapon. Build a deck, forge a\nblade, descend the shifting tower.</div></div><p><strong>Tags</strong> feed discovery algorithms. Choose 5-7 that are genuinely accurate and order them by relevance. Mixing aspirational-but-false tags (&quot;Open World&quot; on a linear game) tanks your recommendation quality and earns refunds. On Steam, also fill <em>features</em> (controller support, cloud saves, co-op) accurately — these are filters players use.</p><h3>Iterate with data</h3><p>Your capsule's job is the <strong>click-through rate</strong> from impressions; the page's job is the wishlist/buy <strong>conversion</strong>. Steam shows both in your analytics. If impressions are high but clicks are low, fix the capsule. If clicks are high but conversion is low, fix the screenshots/trailer/price. A/B test the capsule by swapping it and watching CTR shift.</p><div class='game'><div class='game-head'>🎮 Build This: Finalize Your Store-Page Assets</div><div class='game-body'><p>Goal: a complete, conversion-ready set of page assets.</p><ol><li>Design capsule art that passes the squint test at 231×87.</li><li>Capture 5+ 1080p screenshots; order so the first shows the core loop with HUD.</li><li>Cut a 30-60s trailer that opens with gameplay in the first 3 seconds and ends on &quot;Wishlist Now.&quot;</li><li>Write a one-sentence short description and a bulleted long description.</li><li>Pick 5-7 accurate, relevance-ordered tags and fill the features checkboxes honestly.</li></ol></div></div>"},{"id":"p7-6","part":"09 · Ship It","nav":"Marketing","num":"9.6","kicker":"Part 09 · Lesson 6","title":"Marketing: Wishlists, Devlogs, Press & Festivals","html":"<h3>Marketing starts the day you have a vertical slice</h3><p>The biggest marketing mistake is starting at launch. By then it's over — Steam's launch-week visibility is gated by your existing wishlists, and press/streamers plan weeks ahead. Marketing is a slow accrual that should begin as soon as you have one beautiful, GIF-able moment, often a year out. The goal of all pre-launch marketing is one number: <strong>wishlists</strong>.</p><h3>Devlogs and social</h3><p>A devlog is a regular post (text, video, or both) about making the game. It builds an audience that feels invested. The discipline that works:</p><ul><li><strong>Post the same hook everywhere on a schedule.</strong> One good GIF/clip per week to Twitter/X, Bluesky, TikTok, Reddit, and YouTube Shorts.</li><li><strong>Lead with motion.</strong> A 5-second loop of a satisfying mechanic outperforms paragraphs.</li><li><strong>End with a call to action:</strong> &quot;Wishlist on Steam&quot; + link, every time.</li><li><strong>Use the right subreddits and hashtags</strong> (#screenshotsaturday, #indiedev, #wishlistwednesday) and genre communities — don't spam, contribute.</li></ul><div class='box tip'><div class='bt'>One repeatable, shareable moment beats a feature list.</div> Vampire Survivors, Brotato, and countless hits spread on a single hypnotic GIF. Find your game's GIF and post it relentlessly.</div><h3>Press and streamer outreach</h3><p>Build a <strong>contact list</strong>: journalists who covered games like yours, and streamers/YouTubers whose audience matches your genre. Personalize every email — the &quot;Dear Sir/Madam, please cover my game&quot; blast gets deleted. A good pitch is short, leads with the hook, includes a GIF/trailer link and a <strong>press kit</strong>, and offers a free key.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>outreach-email.txt</span></div><div class='term-body'>Subject: Roguelike deck-builder where cards become weapons — review key?\n\nHi [Name],\n\nI loved your coverage of [Specific Game They Covered]. I think\n[My Game] hits the same itch: every card is a spell you can cast\nOR forge into a weapon.\n\n30s trailer: [link]   Press kit: [link]\nLaunches [date] on Steam. Happy to send a key — interested?\n\nThanks,\n[Name], [Studio]</div></div><p>A <strong>press kit</strong> (presskit() / itch page / a simple folder) contains: logo, capsule, 5-10 screenshots, the trailer, fact sheet (price, platforms, release date, studio), a short and long description, and contact info. Make keys easy with a key-distribution service (Keymailer, Woovit, or Steam's own key requests).</p><h3>Demos and festivals</h3><p>A polished <strong>demo</strong> is the strongest wishlist driver available. The flagship opportunity is <strong>Steam Next Fest</strong>, a week-long event of playable demos held a few times a year. Mechanics that matter:</p><ul><li>You register your demo for a specific Next Fest in Steamworks; the demo gets its own app/depot.</li><li><strong>Build wishlists going in</strong> — Next Fest ranking and visibility favor games that already have momentum, so don't launch a cold page into it.</li><li>Run a livestream during the fest; streaming slots boost placement.</li><li>Treat the demo as a slice you'll <em>remove or update</em> at launch; keep it tight (15-30 min) and end on a hook + wishlist prompt.</li></ul><div class='box danger'><div class='bt'>Don't burn Next Fest early.</div> You can only feature a game in one Next Fest. Use it close to launch (a few weeks out) so the wishlist surge converts to day-one sales while it's still warm — not a year before when momentum fades.</div><h3>The launch calendar</h3><table><thead><tr><th>When</th><th>Action</th></tr></thead><tbody><tr><td>~12 mo out</td><td>Steam page live; weekly devlog/GIF cadence begins</td></tr><tr><td>~3 mo out</td><td>Build press/streamer list; finalize press kit + trailer</td></tr><tr><td>~3-6 wk out</td><td>Demo live; participate in Next Fest; send embargoed keys</td></tr><tr><td>Launch week</td><td>Wishlist emails fire; coordinate streamer/press coverage; day-one patch ready</td></tr><tr><td>Post-launch</td><td>Discount events, updates, community engagement</td></tr></tbody></table><div class='game'><div class='game-head'>🎮 Build This: Launch-Marketing Plan</div><div class='game-body'><p>Goal: a concrete calendar and outreach kit you can execute.</p><ol><li>Write a dated launch-marketing calendar from page-live to post-launch.</li><li>Identify your one repeatable, shareable GIF moment and a weekly posting cadence.</li><li>Draft a personalized press/streamer outreach email and a key list of 15-30 relevant contacts.</li><li>Assemble a press kit (logo, capsule, screenshots, trailer, fact sheet).</li><li>Register a demo for the next Steam Next Fest (or equivalent) with a wishlist call-to-action.</li></ol></div></div>"},{"id":"p7-7","part":"09 · Ship It","nav":"Monetization & Pricing","num":"9.7","kicker":"Part 09 · Lesson 7","title":"Monetization Models & Pricing","html":"<h3>Match the model to the game</h3><p>There is no &quot;best&quot; monetization model; there is a model that fits your genre, platform, and audience, and many that fight against it. The wrong model can kill an otherwise great game (ads in a premium narrative game; a $40 price on a five-minute mobile toy). Choose deliberately.</p><table><thead><tr><th>Model</th><th>Fits</th><th>Watch out for</th></tr></thead><tbody><tr><td><strong>Premium</strong> (pay once)</td><td>Story, single-player, PC/console, itch/Steam</td><td>No recurring revenue; needs marketing spike at launch</td></tr><tr><td><strong>Free-to-play</strong></td><td>Multiplayer, live-service, mobile, huge audiences</td><td>Needs scale + retention design or it earns nothing</td></tr><tr><td><strong>IAP</strong> (in-app purchase)</td><td>F2P mobile, cosmetics, currency</td><td>Pay-to-win backlash; platform takes 30%</td></tr><tr><td><strong>Ads</strong></td><td>Casual/hyper-casual mobile, web</td><td>Tiny per-user revenue; hurts premium feel</td></tr><tr><td><strong>DLC / expansions</strong></td><td>Content-rich games with a fanbase</td><td>Don't carve out base-game content as DLC</td></tr><tr><td><strong>Season pass / battle pass</strong></td><td>Live-service with steady content</td><td>Requires a content treadmill you must sustain</td></tr><tr><td><strong>Donations / NYP</strong></td><td>Jam games, devlogs, open-source, early itch</td><td>Unpredictable; not a salary</td></tr></tbody></table><h3>Premium pricing</h3><p>For premium PC/console indies, price by <strong>scope and genre comparables</strong>, not hours of work. Survey 5-10 similar successful games and their prices. Common indie tiers: small/short ($5-10), mid ($15-20), substantial ($25-30). <em>Pricing too low signals low value</em> and leaves money on the table — and it's hard to raise a price later. You can always discount down; you can rarely move up.</p><div class='box law'><div class='bt'>Discount, don't underprice.</div> Set an honest full price, then use Steam's seasonal sales (and a launch discount of 10-15% to nudge wishlist conversion) to reach price-sensitive buyers. Frequent deep discounts train your audience to wait, so plan a discount schedule.</div><h3>F2P math</h3><p>Free-to-play lives and dies on <strong>retention</strong> and <strong>conversion</strong>. Key metrics: <em>D1/D7/D30 retention</em>, <em>conversion rate</em> (% of players who ever pay, often 1-5%), <em>ARPU/ARPPU</em> (average revenue per user / per paying user), and <em>LTV</em> (lifetime value). If LTV exceeds your cost to acquire a user (CPI), you can grow profitably. Without massive reach, F2P usually loses to premium for solo devs.</p><h3>Ethical IAP</h3><p>Sell <strong>cosmetics, convenience, and content</strong> — not power and not loot boxes (which face legal restrictions in several countries and require odds disclosure). Avoid pay-to-win in competitive games; it poisons the community and your reviews. Be transparent about prices and what currency buys.</p><h3>Regional pricing</h3><p>A $20 USD price is unaffordable in many countries; charging the USD-converted equivalent crushes sales there and invites grey-market key reselling. Storefronts let you set <strong>per-region prices</strong> tuned to local purchasing power. Steam suggests regional prices, but review them — and don't set a region so low it becomes an arbitrage source.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>regional-pricing.tsv (base $19.99 USD)</span></div><div class='term-body'>Region        Currency   Price   ~USD\nUnited States USD        19.99   19.99\nEurozone      EUR        19.50   ~21\nUnited Kingdom GBP       16.75   ~21\nBrazil        BRL        39.99   ~7\nTurkey        TRY        219     ~7\nIndia         INR        599     ~7\nChina         CNY        70      ~10</div></div><p>Note how PPP-adjusted regions land well below the USD figure — that is intentional. The alternative is near-zero sales in those markets.</p><div class='box tip'><div class='bt'>Set price before the page is public if possible.</div> Steam restricts how often and how steeply you can change base price after launch (you can't raise it within 30 days of a discount, etc.). Decide thoughtfully up front.</div><div class='game'><div class='game-head'>🎮 Build This: Monetization &amp; Pricing Plan</div><div class='game-body'><p>Goal: a justified model and a concrete price table.</p><ol><li>Pick one monetization model and write 2-3 sentences justifying it against your genre/platform/audience.</li><li>Survey 5 comparable games' prices and set your base price with reasoning.</li><li>Decide your launch discount (e.g. 10-15%) and a sale cadence.</li><li>Fill a regional pricing table for your top 5-7 markets, PPP-adjusted.</li><li>If using IAP/ads, list exactly what you sell and confirm it isn't pay-to-win or a loot box.</li></ol></div></div>"},{"id":"p7-8","part":"09 · Ship It","nav":"Business, Legal & Post-Launch","num":"9.8","kicker":"Part 09 · Lesson 8","title":"Business, Legal & Post-Launch Operations","html":"<h3>You're running a business now</h3><p>The moment money changes hands, you have a business with legal and tax obligations. Handling this badly creates real liability; handling it well is mostly paperwork done once. (This is general education, not legal or tax advice — consult a professional for your jurisdiction.)</p><h3>Entity and taxes</h3><p>Many indies operate as a <strong>sole proprietor</strong> at first, then form an <strong>LLC</strong> (or local equivalent) to separate personal assets from business liability and to look professional to partners. An LLC also clarifies ownership when collaborators are involved. Practical steps:</p><ul><li>Register the entity; get a business ID/EIN.</li><li>Open a <strong>separate business bank account</strong> — never commingle funds; it preserves the liability shield and simplifies taxes.</li><li>Track income and expenses (storefront payouts, asset purchases, contractor pay) from day one.</li><li>Complete the <strong>tax forms storefronts require</strong> (e.g. W-9/W-8 for Steam, App Store, Google) or they withhold up to 30% and delay payouts. Non-US devs file treaty forms to reduce withholding.</li><li>Remember storefronts handle <strong>sales tax/VAT</strong> collection in most regions, but you still owe income tax on payouts.</li></ul><div class='box danger'><div class='bt'>Missing tax forms freeze your money.</div> Steam, Apple, and Google all hold payouts until tax interviews are complete. Do these the day you register, not the week you launch.</div><h3>Age ratings</h3><p>Many storefronts and regions require an age rating. The big ones: <strong>ESRB</strong> (North America), <strong>PEGI</strong> (Europe), <strong>USK</strong> (Germany), <strong>CERO</strong> (Japan), and <strong>IARC</strong> — a single questionnaire that generates multiple regional ratings at once and is what Steam, Google Play, and others use. You answer questions about violence, language, sexual content, gambling, and user interaction; the rating is assigned automatically for digital titles. Physical releases and consoles often need formal ESRB/PEGI submission.</p><h3>Music and asset licensing</h3><p>Every asset you ship must be licensed for commercial use and for the platforms you ship on. This is where indies get sued or DMCA'd.</p><ul><li>Read the <strong>actual license</strong> for every store asset, font, plugin, sound, and music track. &quot;Free&quot; often means non-commercial or requires attribution.</li><li><strong>CC-BY</strong> requires crediting the author; <strong>CC-BY-SA</strong> can force you to share-alike; <strong>CC-NC</strong> forbids commercial use entirely — avoid it for commercial games.</li><li>Keep a <strong>license ledger</strong>: asset, source, license type, date, proof/receipt, attribution text.</li><li>Don't use copyrighted music or trademarks. &quot;It's just for the trailer&quot; is how you get the trailer taken down and the channel struck.</li><li>For commissioned work, get a <strong>written contract</strong> with explicit IP assignment (a &quot;work for hire&quot; clause), so you own the art/music outright.</li></ul><div class='box law'><div class='bt'>If you can't prove the license, don't ship the asset.</div> A spreadsheet of every third-party asset with its license and receipt is your insurance. Audit it before every release.</div><h3>Contracts</h3><p>Any time someone else contributes (artist, composer, programmer, publisher, port studio) get it in writing: scope, deliverables, payment, deadlines, <strong>IP ownership/assignment</strong>, and revenue split. Verbal agreements between friends are the most common source of post-success disputes.</p><h3>Post-launch operations</h3><p>Launch is the midpoint, not the finish line. Run the live game with data:</p><ul><li><strong>Analytics:</strong> track funnel (page views → wishlists → sales), crash/error rates, retention, and (with consent) gameplay events to find where players quit or get stuck. Respect privacy laws (GDPR/CCPA) and your storefront's data rules.</li><li><strong>Updates:</strong> ship a <strong>day-one patch</strong> for issues found after gold, then a steady cadence of fixes and content. Read reviews — early negative reviews about bugs are fixable; respond and patch.</li><li><strong>Community:</strong> a Discord or forum, prompt patch notes, and visible responsiveness convert buyers into advocates who drive word-of-mouth.</li><li><strong>Ports:</strong> with PC sales data, you can justify console ports — apply to dev programs, budget for cert, and consider a porting partner.</li></ul><div class='game'><div class='game-head'>🎮 Build This: Business, Legal &amp; 90-Day Plan</div><div class='game-body'><p>Goal: a launch-ready legal/business setup and a post-launch roadmap.</p><ol><li>Confirm your entity (sole prop or LLC), separate bank account, and completed storefront tax forms.</li><li>Obtain an age rating via IARC (and ESRB/PEGI if needed) by completing the content questionnaire.</li><li>Build a license ledger auditing every music/asset/font/plugin with source, license, and proof.</li><li>Put any collaborator agreement in writing with explicit IP assignment.</li><li>Write a 90-day post-launch plan: day-one patch, update cadence, community channel, analytics to watch, and a ports decision checkpoint.</li></ol></div></div>"}];
/* ===== RENDER ENGINE ===== */
const nav=document.getElementById('nav');
const content=document.getElementById('content');
const crumbPath=document.getElementById('crumbPath');
const pfill=document.getElementById('pfill');
const pctTxt=document.getElementById('pctTxt');
const completed=new Set();
let current=0;
let lastPart=null;
L.forEach((les,i)=>{
  if(les.part!==lastPart){
    const lab=document.createElement('span');lab.className='part-label';lab.textContent=les.part;nav.appendChild(lab);lastPart=les.part;
  }
  const b=document.createElement('button');
  b.className='nav-item';b.dataset.i=i;
  b.innerHTML=`<span class="num">${les.num||'»'}</span><span class="ntxt">${les.nav}</span><span class="done">✓</span>`;
  b.addEventListener('click',()=>{go(i);closeSidebar();});
  nav.appendChild(b);
});
function updateNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    const i=+el.dataset.i;
    el.classList.toggle('active',i===current);
    el.classList.toggle('completed',completed.has(i));
  });
}
function updateProgress(){
  const total=L.filter(x=>!x.cover).length;
  const doneCount=[...completed].filter(i=>!L[i].cover).length;
  const pct=Math.round(doneCount/total*100);
  pfill.style.width=pct+'%';pctTxt.textContent=pct+'%';
}
function go(i){
  current=i;const les=L[i];
  crumbPath.textContent=les.num?`./module-${les.num}`:'./start';
  let foot=`<div class="lesson-foot">`;
  foot+=i>0?`<button class="btn ghost" onclick="go(${i-1})">← prev</button>`:`<span></span>`;
  if(!les.cover){
    const mark=completed.has(i);
    foot+=`<button class="btn" id="markBtn" onclick="toggleDone(${i})">${mark?'✓ completed — click to undo':'mark lesson complete'}</button>`;
  } else {foot+=`<span></span>`;}
  foot+=i<L.length-1?`<button class="btn primary" onclick="go(${i+1})">next →</button>`:`<span></span>`;
  foot+=`</div>`;
  const head=les.cover?'':`<span class="lesson-kicker">${les.kicker}</span><h2 class="lesson-title">${les.title}</h2>`;
  content.innerHTML=head+les.html+foot;
  window.scrollTo({top:0,behavior:'smooth'});
  updateNav();
}
function toggleDone(i){
  if(completed.has(i))completed.delete(i);else completed.add(i);
  updateProgress();updateNav();
  const btn=document.getElementById('markBtn');
  if(btn)btn.textContent=completed.has(i)?'✓ completed — click to undo':'mark lesson complete';
}
window.go=go;window.toggleDone=toggleDone;
const sidebar=document.getElementById('sidebar');
const scrim=document.getElementById('scrim');
document.getElementById('menuBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');scrim.classList.toggle('show');});
scrim.addEventListener('click',closeSidebar);
function closeSidebar(){sidebar.classList.remove('open');scrim.classList.remove('show');}
go(0);updateProgress();
</script>
