</li><li>Bottom edge is a trigger: if the ball falls through, lose a life. Show lives and score on the Canvas.</li><li>Clear all bricks to win; show a Win panel. Play and break every brick.</li></ol></div></div>"},{"id":"p2-8","part":"02 · Unity","nav":"Animation & Waves","num":"2.8","kicker":"Part 02 · Lesson 8","title":"Animation, the Animator & a Tower Defense","html":"<h3>Bringing things to life</h3><p>Static games feel dead. Unity's <strong>animation</strong> system has two halves: the <strong>Animation</strong> window, where you author clips by keyframing properties over time, and the <strong>Animator</strong>, a state machine that decides which clip plays and blends between them. We pair this with a new genre built on everything so far — a <strong>tower defense</strong>, heavy on prefabs and timed waves.</p><h3>Animation clips</h3><p>An <strong>Animation Clip</strong> records property values (position, rotation, scale, color, sprite frame...) over a timeline. Open <code>Window &gt; Animation &gt; Animation</code>, select an object, create a clip, and add <strong>keyframes</strong> at different times. Unity interpolates between them. This works for anything — a bobbing coin, a pulsing button, a sprite-frame walk cycle, a turret recoil.</p><h3>The Animator Controller and states</h3><p>An <strong>Animator Controller</strong> asset is a graph of <strong>states</strong> (each playing a clip) connected by <strong>transitions</strong>. The Animator component on a GameObject runs this graph. You drive transitions with <strong>Parameters</strong>:</p><table><thead><tr><th>Parameter</th><th>Use</th></tr></thead><tbody><tr><td><strong>Bool</strong></td><td>On/off states (isWalking).</td></tr><tr><td><strong>Trigger</strong></td><td>One-shot events (Attack, Die).</td></tr><tr><td><strong>Float</strong></td><td>Continuous values (Speed) for blend logic.</td></tr><tr><td><strong>Int</strong></td><td>Enumerated states.</td></tr></tbody></table><p>You set these from code, and the state machine reacts:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>EnemyAnim.cs</span></div><div class='term-body'><span class='pr'>using</span> UnityEngine;\n\n<span class='pr'>public class</span> EnemyAnim : MonoBehaviour\n{\n    [SerializeField] <span class='pr'>private</span> Animator anim;\n\n    <span class='pr'>public void</span> SetMoving(<span class='pr'>bool</span> moving) {\n        anim.SetBool(<span class='ok'>\"isWalking\"</span>, moving);\n    }\n\n    <span class='pr'>public void</span> Die() {\n        anim.SetTrigger(<span class='ok'>\"Die\"</span>);\n    }\n}</div></div><div class='box tip'><div class='bt'>Tip.</div> Use a <strong>Trigger</strong> for events that happen once (an explosion, a death) and a <strong>Bool</strong> for ongoing states (walking, idle). Mixing them up is the most common Animator bug — a Bool that never resets gets stuck.</div><h3>Waves and spawning logic</h3><p>A tower defense is a spawning problem dressed as a game. A <strong>WaveManager</strong> uses <strong>coroutines</strong> — methods that pause and resume across frames — to spew enemies on a schedule:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>WaveManager.cs</span></div><div class='term-body'><span class='pr'>using</span> System.Collections;\n<span class='pr'>using</span> UnityEngine;\n\n<span class='pr'>public class</span> WaveManager : MonoBehaviour\n{\n    [SerializeField] <span class='pr'>private</span> GameObject enemyPrefab;\n    [SerializeField] <span class='pr'>private</span> Transform spawnPoint;\n\n    <span class='pr'>IEnumerator</span> SpawnWave(<span class='pr'>int</span> count) {\n        <span class='pr'>for</span> (<span class='pr'>int</span> i = <span class='ok'>0</span>; i &lt; count; i++) {\n            Instantiate(enemyPrefab, spawnPoint.position, Quaternion.identity);\n            <span class='pr'>yield return new</span> WaitForSeconds(<span class='ok'>0.8f</span>);\n        }\n    }\n\n    <span class='pr'>void</span> Start() { StartCoroutine(SpawnWave(<span class='ok'>10</span>)); }\n}</div></div><p>Enemies follow a path of waypoints (an array of Transforms, advancing to the next when close). Towers detect enemies in range with <code>Physics.OverlapSphere</code> and fire on a cooldown.</p><div class='box lab'><div class='bt'>Lab.</div> Make a coin or turret with an Animator: a bobbing idle clip and a one-shot action clip driven by a Trigger. Fire the trigger from a key press and confirm the state machine transitions and returns to idle.</div><div class='game'><div class='game-head'>🎮 Build This: Tower Defense — Last Stand (new genre)</div><div class='game-body'><p>This <strong>STARTS a new genre</strong>: tower defense, combining prefabs (L5), spawning (L6/L7), UI (L7), and animation.</p><ol><li>Lay out a path as a list of waypoint Transforms from a spawn point to a base.</li><li>Make an <strong>Enemy prefab</strong> that walks the waypoints with a walk animation, has health, and damages the base if it arrives.</li><li>Build a <strong>WaveManager</strong> coroutine that spawns increasing waves with delays between them.</li><li>Make a <strong>Tower prefab</strong> that detects enemies in range, fires bullet prefabs on a cooldown, and plays a fire animation.</li><li>Add UI for base health and current wave; let the player place towers by clicking buildable spots. Survive all waves to win.</li></ol></div></div>"},{"id":"p2-9","part":"02 · Unity","nav":"Scenes & Capstone","num":"2.9","kicker":"Part 02 · Lesson 9","title":"Scenes, Builds & the Portfolio Capstone","html":"<h3>From project to shippable game</h3><p>You have built six genres. This final lesson teaches the last pieces — multi-scene flow, persistence, build settings — and then a <strong>capstone</strong>: a small <strong>puzzle</strong> game polished into a portfolio-ready, playable build with a real menu. By the end you have a finished thing to show, not just exercises.</p><h3>Scenes and scene flow</h3><p>A <strong>Scene</strong> is a saved arrangement of GameObjects — a level, a menu, a screen. Real games use several: a Main Menu scene, a Gameplay scene, maybe a Win/Lose scene. You switch between them in code:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>SceneNav.cs</span></div><div class='term-body'><span class='pr'>using</span> UnityEngine;\n<span class='pr'>using</span> UnityEngine.SceneManagement;\n\n<span class='pr'>public class</span> SceneNav : MonoBehaviour\n{\n    <span class='pr'>public void</span> LoadGame() { SceneManager.LoadScene(<span class='ok'>\"Gameplay\"</span>); }\n    <span class='pr'>public void</span> Restart() {\n        SceneManager.LoadScene(SceneManager.GetActiveScene().name);\n    }\n    <span class='pr'>public void</span> Quit() { Application.Quit(); }\n}</div></div><p>Wire these to menu Buttons via their <code>OnClick</code> event. To carry data between scenes (a high score, chosen level), use <strong>PlayerPrefs</strong> for tiny persistent values, or a <code>DontDestroyOnLoad</code> manager object that survives scene loads.</p><h3>Build Settings</h3><p>Open <code>File &gt; Build Settings</code> (or <strong>Build Profiles</strong> in newer versions). Two essentials:</p><ol><li><strong>Scenes In Build</strong> — drag every scene you want shipped into the list. Scene index 0 is what launches first. A scene not in this list cannot be loaded in a build, even if it loads fine in the Editor.</li><li><strong>Platform</strong> — choose Windows, Mac, or <strong>WebGL</strong> (great for portfolios — it runs in a browser, no install). Click <strong>Build</strong> and Unity produces a folder you can zip, upload to itch.io, or host.</li></ol><div class='box danger'><div class='bt'>Danger.</div> The number-one build-day bug: \"my menu's Play button does nothing in the build.\" Almost always the Gameplay scene was never added to <strong>Scenes In Build</strong>. Add every scene, and test the actual build — not just Play mode — before you call it done.</div><div class='box law'><div class='bt'>Polish law.</div> A portfolio game is judged in its first 30 seconds: a clean title screen, readable UI, audio feedback, and a clear win/lose loop. A simple game that feels finished beats an ambitious one that feels broken.</div><h3>Polish checklist</h3><ul><li><strong>Menu scene</strong> with title, Play, and Quit.</li><li><strong>Audio</strong> — add <code>AudioSource</code> components; play SFX on pickups/clicks, plus background music.</li><li><strong>Feedback</strong> — particles, screen shake, or a little animation on key events.</li><li><strong>Restart / win / lose</strong> states that always return cleanly to the menu.</li><li><strong>Icon and product name</strong> in <code>Edit &gt; Project Settings &gt; Player</code>.</li></ul><div class='box lab'><div class='bt'>Lab.</div> Build a two-scene project: a Menu scene whose Play button loads a Gameplay scene, and a Quit button. Add both to Scenes In Build, then make a WebGL build and open it in a browser.</div><div class='game'><div class='game-head'>🎮 Build This: CAPSTONE — Puzzle Game polished to portfolio quality</div><div class='game-body'><p>This <strong>STARTS a final new genre (a puzzle game)</strong> and is your <strong>capstone</strong>: take it all the way to a shippable build. You may instead choose to polish any earlier genre — but build something portfolio-ready end to end.</p><ol><li>Design a simple grid puzzle (match-3, sliding tiles, or a Sokoban-style box pusher) using prefabs for tiles and 2D input for selection/movement.</li><li>Implement the win condition and a move/score counter shown on a Canvas HUD.</li><li>Build a <strong>Menu scene</strong>: title, Play, Quit; and a clean Win screen with Restart and Menu buttons.</li><li>Add audio (move/click/win SFX + music), and a little animation or particle feedback on matches/moves.</li><li>Add all scenes to <strong>Scenes In Build</strong>, set product name and icon, and produce a <strong>WebGL build</strong>.</li><li>Upload it to itch.io. You now have a finished, playable, linkable game — across seven genres, all built in Unity. That is your portfolio.</li></ol></div></div>"},{"id":"p3-1","part":"03 · Unreal","nav":"Launcher & Editor","num":"3.1","kicker":"Part 03 · Lesson 1","title":"Welcome to Unreal: Launcher, Editor & Your First Movement Toy","html":"<h3>This is your path</h3><p>You finished Foundations, and you chose <strong>Unreal Engine 5</strong> as your single engine. Good choice. This track stands entirely on its own: you will not need any other engine to build a portfolio. By the end of these nine lessons you will have shipped a connected arc of small games spanning many genres, all in Unreal: a <strong>movement toy</strong>, a <strong>3D collectathon</strong>, an <strong>FPS shooting gallery</strong>, a <strong>physics push/obstacle course</strong>, a <strong>time-trial racer</strong>, a <strong>wave shooter</strong>, a <strong>physics puzzle room</strong>, and finally a polished, packaged <strong>capstone level</strong> you can show employers.</p><p>Each lesson teaches concepts the engine actually needs, then ends with a <strong>Build This</strong> game that either extends what you built before or kicks off a brand-new genre. You will write both <strong>Blueprints</strong> (visual scripting) and <strong>C++</strong>, and learn when each is the right tool.</p><h3>The Epic Games Launcher</h3><p>Everything starts at the <strong>Epic Games Launcher</strong>. Install it, sign in, and open the <em>Unreal Engine</em> tab. Here you install engine versions, browse <strong>Fab</strong> (the asset marketplace), and manage projects. Install <strong>UE 5.4 or newer</strong>. Engine installs are large (tens of GB) because they include source, templates, and starter content.</p><h4>Creating a project</h4><p>Click <strong>Launch</strong>, then pick a category (Games), then a template. Templates are starting points:</p><ul><li><strong>Blank</strong> — nothing but the essentials.</li><li><strong>Third Person</strong> — a character you can run around with, camera behind. Perfect for us this lesson.</li><li><strong>First Person</strong> — a gun and an FPS camera.</li></ul><p>Choose <strong>Blueprint</strong> as the project default (you can add C++ anytime). Enable <strong>Starter Content</strong> for free meshes and materials. Pick a folder, name it, and create.</p><h3>The editor at a glance</h3><p>The Unreal Editor is a set of dockable panels:</p><table><thead><tr><th>Panel</th><th>What it does</th></tr></thead><tbody><tr><td>Viewport</td><td>The 3D world. Navigate with right-mouse + WASD.</td></tr><tr><td>Outliner</td><td>A tree of every Actor in the level.</td></tr><tr><td>Details</td><td>Properties of whatever is selected.</td></tr><tr><td>Content Browser</td><td>All your assets (meshes, materials, Blueprints).</td></tr><tr><td>Toolbar</td><td>Save, Play (PIE), Settings, Build.</td></tr></tbody></table><div class='box tip'><div class='bt'>Play In Editor.</div> The big <strong>Play</strong> button (PIE) runs the game inside the editor instantly — no compiling, no packaging. <code>Esc</code> stops it. This is your fastest iteration loop; use it constantly.</div><h4>Navigation muscle memory</h4><ul><li><strong>Right-mouse held + WASD</strong> — fly around like a camera.</li><li><strong>Alt + left-drag</strong> — orbit a point.</li><li><strong>F</strong> — focus the selected Actor.</li><li><strong>W / E / R</strong> — Move / Rotate / Scale gizmos.</li></ul><h3>Saving and project structure</h3><p>Your project is a folder on disk. The important parts: <code>Content/</code> holds all assets, <code>Config/</code> holds <code>.ini</code> settings, and a <code>.uproject</code> file launches it. <strong>Save the level often</strong> (<code>Ctrl+S</code>) and <strong>Save All</strong> from File before closing — Unreal does not autosave aggressively.</p><div class='box lab'><div class='bt'>Lab.</div> Create a Third Person Blueprint project with Starter Content. Press Play and run the default mannequin around. Practice viewport navigation until flying feels natural. Drag a few Starter Content props (a chair, a cube) from the Content Browser into the level, then move/rotate/scale them with W/E/R.</div><div class='game'><div class='game-head'>🎮 Build This: Movement Toy — Stroll</div><div class='game-body'><p>Genre: <strong>third-person movement prototype</strong>. This <strong>STARTS our arc</strong> — it is the first game and the foundation everything else extends.</p><ol><li>Create the Third Person template project (Blueprint, Starter Content).</li><li>Delete the default floor and build a small playground: drop several Starter Content cube and ramp meshes to make platforms at different heights.</li><li>Scale a large cube flat to act as ground so the character cannot fall off the world.</li><li>Press Play and verify you can run, jump, and navigate every platform.</li><li>Save the level as <code>L_Stroll</code>. You now have a playable toy and a clean base to grow.</li></ol></div></div>"},{"id":"p3-2","part":"03 · Unreal","nav":"Projects & Levels","num":"3.2","kicker":"Part 03 · Lesson 2","title":"Projects, Levels & the Content Browser","html":"<h3>What is a level?</h3><p>A <strong>Level</strong> (also called a Map, file extension <code>.umap</code>) is a container of <strong>Actors</strong> — everything you place in the world: meshes, lights, cameras, volumes, and your gameplay objects. A project can hold many levels: a main menu, several gameplay maps, a test sandbox. The level your game opens with is set in <strong>Project Settings &gt; Maps &amp; Modes &gt; Editor Startup Map / Game Default Map</strong>.</p><h3>The Content Browser is your library</h3><p>The Content Browser shows everything inside <code>Content/</code>. Treat it like a real codebase — organize from day one or you will drown later.</p><div class='box tip'><div class='bt'>Folder hygiene.</div> Make top-level folders: <code>Blueprints/</code>, <code>Maps/</code>, <code>Materials/</code>, <code>Meshes/</code>, <code>UI/</code>, <code>Audio/</code>. Prefix asset names by type: <code>BP_</code> Blueprint, <code>M_</code> material, <code>MI_</code> material instance, <code>SM_</code> static mesh, <code>L_</code> level, <code>WBP_</code> UI widget. Future-you will thank present-you.</div><h4>Importing and finding assets</h4><p>Drag files (FBX, PNG, WAV) straight into the Content Browser to import them. Use the search bar and the <strong>filter</strong> dropdown to find assets by type. Right-click an asset for actions like <em>Duplicate</em>, <em>Reference Viewer</em> (shows what uses it), and <em>Migrate</em> (copy an asset and all its dependencies into another project).</p><h3>Actors and the Outliner</h3><p>Every object in a level is an <strong>Actor</strong>. The <strong>Outliner</strong> lists them. You can group Actors into <strong>folders</strong> in the Outliner (purely organizational) and attach Actors to each other to form parent/child hierarchies (moving the parent moves the children).</p><h4>Transform: the core of placement</h4><p>Every Actor has a <strong>Transform</strong> in the Details panel: <strong>Location</strong>, <strong>Rotation</strong>, <strong>Scale</strong>. Unreal units are centimeters — a value of <code>100</code> is one meter. <strong>Mobility</strong> matters too:</p><ul><li><strong>Static</strong> — never moves; cheapest, can bake lighting.</li><li><strong>Movable</strong> — can move at runtime; needed for anything gameplay drives.</li></ul><h3>World Settings and project settings</h3><p><strong>World Settings</strong> (a panel) configures the current level — most importantly its <strong>GameMode Override</strong> (more in Lesson 4). <strong>Project Settings</strong> configures the whole project: input, rendering, default maps, packaging. Get comfortable opening both.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>project-layout.txt</span></div><div class='term-body'><span class='dim'>MyGame/</span>\n<span class='cm'>  Content/</span>\n<span class='ok'>    Blueprints/   BP_*</span>\n<span class='ok'>    Maps/         L_*</span>\n<span class='ok'>    Materials/    M_*  MI_*</span>\n<span class='ok'>    Meshes/       SM_*</span>\n<span class='ok'>    UI/           WBP_*</span>\n<span class='dim'>  Config/  DefaultEngine.ini ...</span>\n<span class='dim'>  MyGame.uproject</span></div></div><div class='box lab'><div class='bt'>Lab.</div> In your Stroll project, create the folder structure above. Move the level into <code>Maps/</code> and rename it <code>L_Stroll</code>. Create a second empty level (File &gt; New Level &gt; Empty) named <code>L_Sandbox</code> for experiments. Set <code>L_Stroll</code> as the Editor Startup Map.</div><div class='game'><div class='game-head'>🎮 Build This: Movement Toy — Stroll: The Playground</div><div class='game-body'><p>Genre: still the <strong>movement prototype</strong>. This <strong>EXTENDS Stroll</strong> from Lesson 1 — we are turning a flat test into an organized, deliberate playground level.</p><ol><li>Organize your project into the folder structure from the Lab.</li><li>Block out a proper obstacle playground using Starter Content meshes: a starting platform, a series of jumps with gaps, and a tall tower of platforms to climb.</li><li>Group related Actors into Outliner folders (<code>Floor</code>, <code>Jumps</code>, <code>Tower</code>).</li><li>Set every non-moving mesh to <strong>Static</strong> mobility.</li><li>Add a goal platform at the top with a Starter Content light above it. Save. You now have a clean, navigable course ready for gameplay.</li></ol></div></div>"},{"id":"p3-3","part":"03 · Unreal","nav":"Blueprints vs C++","num":"3.3","kicker":"Part 03 · Lesson 3","title":"Blueprints AND C++: When to Use Each","html":"<h3>Two languages, one engine</h3><p>Unreal gives you two ways to write gameplay logic. They are not rivals — professionals use <strong>both, together</strong>.</p><ul><li><strong>Blueprints</strong> — a visual node graph. You wire events to actions. Fast to iterate, no compile step, designer-friendly, great for prototyping and high-level glue.</li><li><strong>C++</strong> — Unreal's native language. Faster at runtime, version-control friendly (plain text), and the only way to touch some low-level systems. Requires a compiler and a build step.</li></ul><h3>When to use which</h3><table><thead><tr><th>Use Blueprints when</th><th>Use C++ when</th></tr></thead><tbody><tr><td>Prototyping fast</td><td>Performance-critical loops</td></tr><tr><td>Designer-tweakable values</td><td>Core systems / base classes</td></tr><tr><td>Level-specific one-off logic</td><td>Reusable, testable code</td></tr><tr><td>UI wiring</td><td>Heavy math, large data</td></tr></tbody></table><p>The common professional pattern: write a <strong>C++ base class</strong> that holds the heavy logic and exposes tunable values, then create a <strong>Blueprint child</strong> of it to set those values and add level-specific tweaks. Best of both worlds.</p><h3>Your first Blueprint</h3><p>Right-click in the Content Browser &gt; <strong>Blueprint Class</strong> &gt; pick a parent (e.g. <strong>Actor</strong>). Open it: the <strong>Event Graph</strong> is where you wire logic. Key nodes:</p><ul><li><strong>Event BeginPlay</strong> — fires once when the Actor spawns.</li><li><strong>Event Tick</strong> — fires every frame (use sparingly; it costs CPU).</li><li><strong>Print String</strong> — prints debug text to the screen.</li></ul><p>Drag from a node's output pin to create the next node; the white wire is <strong>execution</strong> flow, colored wires are <strong>data</strong>.</p><div class='box tip'><div class='bt'>Variables &amp; functions.</div> In the left <em>My Blueprint</em> panel, add <strong>Variables</strong> (typed data) and <strong>Functions</strong> (reusable graphs). Check a variable's <strong>eye icon</strong> to make it editable from the Details panel — this is how you expose tunables to designers.</div><h3>Your first C++ class</h3><p>From the editor: <strong>Tools &gt; New C++ Class</strong>. Pick a parent (Actor), name it, and Unreal generates a header (<code>.h</code>) and source (<code>.cpp</code>) and adds a compiler. UPROPERTY and UFUNCTION macros expose C++ to Blueprints and the editor.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Spinner.h</span></div><div class='term-body'><span class='pr'>UCLASS</span>()\n<span class='cm'>class AMySpinner : public AActor {</span>\n  GENERATED_BODY()\n<span class='dim'>public:</span>\n  <span class='pr'>UPROPERTY</span>(EditAnywhere, Category=<span class='ok'>\"Spin\"</span>)\n  float SpinSpeed = <span class='am'>90.f</span>;\n  virtual void Tick(float Dt) override;\n};</div></div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>Spinner.cpp</span></div><div class='term-body'><span class='cm'>void AMySpinner::Tick(float Dt) {</span>\n  AddActorLocalRotation(FRotator(<span class='am'>0</span>, SpinSpeed*Dt, <span class='am'>0</span>));\n}</div></div><p>Compile (the editor's <strong>Live Coding</strong>, <code>Ctrl+Alt+F11</code>, hot-reloads most changes). <code>EditAnywhere</code> makes <code>SpinSpeed</code> show up in the Details panel of any instance — a designer can tune it without touching code.</p><div class='box lab'><div class='bt'>Lab.</div> Make a Blueprint Actor that on BeginPlay prints \"Hello from Blueprint\". Then make a C++ Actor class with an <code>EditAnywhere</code> float and a Tick that rotates it. Place both in <code>L_Sandbox</code> and watch them work.</div><div class='game'><div class='game-head'>🎮 Build This: Collectathon — Coin Rush (foundations)</div><div class='game-body'><p>Genre: <strong>3D collectathon</strong> — a NEW genre (pickups + score). This <strong>STARTS a new game</strong> built on the playground level you made in Lesson 2.</p><ol><li>Create a C++ <code>Actor</code> class <code>ACollectible</code> with an <code>EditAnywhere</code> float <code>SpinSpeed</code> and a Tick that rotates it (so coins visibly spin).</li><li>Create a Blueprint child <code>BP_Coin</code> of <code>ACollectible</code>; give it a small spinning Starter Content mesh and set <code>SpinSpeed</code> in the Details panel.</li><li>Scatter ten <code>BP_Coin</code> instances across your playground platforms.</li><li>For now, on BeginPlay each coin prints its name to screen (proof of life). We will make collecting them work next lesson with components and collision.</li></ol></div></div>"},{"id":"p3-4","part":"03 · Unreal","nav":"Actors & Framework","num":"3.4","kicker":"Part 03 · Lesson 4","title":"Actors, Components & the Gameplay Framework","html":"<h3>Actors are built from Components</h3><p>An <strong>Actor</strong> is a thing in the world, but it does almost nothing by itself — its capabilities come from <strong>Components</strong> attached to it:</p><ul><li><strong>Static Mesh Component</strong> — renders a 3D model.</li><li><strong>Collision components</strong> (Box, Sphere, Capsule) — detect overlaps and block movement.</li><li><strong>Audio, Light, Particle, Movement</strong> components — add behavior.</li></ul><p>One component is the <strong>Root</strong>; everything else attaches under it. In a Blueprint, the <strong>Components</strong> panel (top-left) is where you add and arrange them.</p><h3>Collision &amp; overlap events</h3><p>To make a pickup, add a collision shape and respond to overlap. A collision component fires <strong>OnComponentBeginOverlap</strong> when something enters it. You filter <em>what</em> can overlap via <strong>Collision Presets</strong> (e.g. <em>OverlapAllDynamic</em>).</p><div class='box tip'><div class='bt'>Overlap vs Block.</div> <strong>Overlap</strong> = things pass through but you get an event (pickups, triggers). <strong>Block</strong> = physical collision that stops movement (walls, floors). Set this per channel in Collision Presets.</div><h3>The Gameplay Framework</h3><p>Unreal ships a structured set of base classes. Learn these four — they appear in every game:</p><table><thead><tr><th>Class</th><th>Responsibility</th></tr></thead><tbody><tr><td><strong>GameMode</strong></td><td>The rules: score, win/lose, which Pawn/Controller to use. Server-only.</td></tr><tr><td><strong>Pawn / Character</strong></td><td>The physical body the player controls. <em>Character</em> adds walking/jumping.</td></tr><tr><td><strong>PlayerController</strong></td><td>The player's intent: input, possessing a Pawn, owning the HUD.</td></tr><tr><td><strong>GameState / PlayerState</strong></td><td>Replicated game-wide and per-player data.</td></tr></tbody></table><p>The flow: the <strong>GameMode</strong> spawns a <strong>PlayerController</strong>, which <strong>possesses</strong> a <strong>Pawn</strong>. Input goes Controller to Pawn. The GameMode decides who wins.</p><h4>Wiring a custom GameMode</h4><p>Create a Blueprint GameMode (or C++ child of <code>AGameModeBase</code>), then in <strong>World Settings &gt; GameMode Override</strong>, assign it and set its Default Pawn Class. Now your level uses your rules.</p><h3>Enhanced Input (the modern input system)</h3><p>UE5 uses <strong>Enhanced Input</strong>: you define <strong>Input Actions</strong> (e.g. <em>IA_Jump</em>, a boolean) and bind them in an <strong>Input Mapping Context</strong> (e.g. Spacebar to IA_Jump). The PlayerController adds the context, the Pawn reacts to the actions. The Third Person template already wires this — study its <code>BP_ThirdPersonCharacter</code> graph.</p><div class='box lab'><div class='bt'>Lab.</div> Open <code>BP_Coin</code>. Add a <strong>Sphere Collision</strong> component as root, mesh under it. Set the sphere to <em>OverlapAllDynamic</em>. Add an <strong>OnComponentBeginOverlap</strong> event; check if the other actor is the player character; if so, <strong>Destroy Actor</strong>. Play and walk into a coin — it vanishes.</div><div class='game'><div class='game-head'>🎮 Build This: Collectathon — Coin Rush</div><div class='game-body'><p>Genre: <strong>3D collectathon</strong>. This <strong>EXTENDS Coin Rush</strong> from Lesson 3 into a real, scored game.</p><ol><li>Give <code>BP_Coin</code> a sphere collision that overlaps the player and destroys itself on pickup.</li><li>Create <code>BP_CoinGameMode</code> with an integer variable <code>Score</code>. On pickup, the coin calls a custom event on the GameMode to add one to <code>Score</code> and print the total.</li><li>Create <code>BP_CoinController</code> (a PlayerController) and assign it plus your Third Person Character in the GameMode.</li><li>Set the GameMode Override in World Settings. Collect all ten coins; when <code>Score</code> reaches 10, print \"You Win!\".</li><li>Save. You now have a complete collect-and-score loop driven by the gameplay framework.</li></ol></div></div>"},{"id":"p3-5","part":"03 · Unreal","nav":"Materials","num":"3.5","kicker":"Part 03 · Lesson 5","title":"Materials, the Material Graph & an FPS Shooting Gallery","html":"<h3>What a material is</h3><p>A <strong>Material</strong> describes how a surface looks and reacts to light. Unreal uses a <strong>physically based rendering (PBR)</strong> model, so materials are defined by physical-ish inputs that feed the <strong>Main Material node</strong>:</p><table><thead><tr><th>Input</th><th>Meaning</th></tr></thead><tbody><tr><td><strong>Base Color</strong></td><td>The surface's albedo (its flat color).</td></tr><tr><td><strong>Metallic</strong></td><td>0 = non-metal, 1 = metal.</td></tr><tr><td><strong>Roughness</strong></td><td>0 = mirror, 1 = matte.</td></tr><tr><td><strong>Normal</strong></td><td>Fake surface detail via a normal map.</td></tr><tr><td><strong>Emissive</strong></td><td>Light the surface emits (glow).</td></tr></tbody></table><h3>The Material Editor graph</h3><p>Double-click a material to open its node graph (it looks like a Blueprint). You wire nodes into the Main node's inputs. Common nodes: <strong>Constant</strong> (a number), <strong>Constant3Vector</strong> (an RGB color), <strong>Texture Sample</strong> (an image), <strong>Multiply / Add / Lerp</strong> (math), and <strong>Time</strong> + <strong>Sine</strong> (animation).</p><h4>Parameters &amp; Material Instances</h4><p>If you convert a Constant into a <strong>Parameter</strong> (right-click &gt; Convert to Parameter), you can create a <strong>Material Instance</strong> (right-click the material &gt; Create Material Instance) and tweak that parameter <em>without recompiling the graph</em>. This is hugely efficient — one master material, many cheap instances in different colors.</p><div class='box tip'><div class='bt'>One master, many instances.</div> Build a master material with color/roughness/emissive parameters, then make instances <code>MI_Red</code>, <code>MI_Gold</code>, <code>MI_GlowBlue</code>. Changing the master updates them all; changing an instance is instant and free.</div><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>emissive-pulse.graph</span></div><div class='term-body'><span class='cm'>Time --> Sine --> *0.5 +0.5  (0..1 pulse)</span>\n<span class='ok'>Pulse * Color  --> Emissive Color</span>\n<span class='dim'>Color = Constant3Vector parameter</span></div></div><h3>Applying materials</h3><p>Drag a material from the Content Browser onto a mesh in the viewport, or assign it in the mesh's Details under <strong>Materials</strong>. Meshes can have multiple material slots (one per surface section).</p><h3>Dynamic materials at runtime</h3><p>To change a material from gameplay (e.g. flash a target when hit), create a <strong>Dynamic Material Instance</strong> in Blueprint (<em>Create Dynamic Material Instance</em>), then <em>Set Vector/Scalar Parameter Value</em> on it. This lets a hit target flash red for a moment.</p><div class='box lab'><div class='bt'>Lab.</div> Build a master material with a <code>Color</code> parameter and an <code>Emissive</code> pulse. Make three instances in different colors. Apply them to props in <code>L_Sandbox</code>.</div><div class='game'><div class='game-head'>🎮 Build This: FPS Shooting Gallery — Range Day</div><div class='game-body'><p>Genre: <strong>FPS shooting gallery</strong> — a NEW genre. This <strong>STARTS a new game</strong> (a fresh First Person level), bringing forward your component, framework, and material skills.</p><ol><li>Create a new level <code>L_Range</code> using a First Person Pawn (template character or a Pawn with a Camera + arrow for aim).</li><li>Make <code>BP_Target</code>: a mesh + box collision, using a glowing material instance you built this lesson.</li><li>On fire input, do a <strong>Line Trace</strong> from the camera forward; if it hits a <code>BP_Target</code>, swap its dynamic material to a \"hit\" color, add to score, and destroy it after a short delay.</li><li>Create <code>BP_RangeGameMode</code> tracking <code>Score</code> and a 30-second timer. Spawn targets at random points.</li><li>Print the final score when the timer ends. Save. You now have a timed shooting gallery.</li></ol></div></div>"},{"id":"p3-6","part":"03 · Unreal","nav":"Physics","num":"3.6","kicker":"Part 03 · Lesson 6","title":"Physics: Rigid Bodies, Forces & a Push Course","html":"<h3>The physics engine</h3><p>Unreal's <strong>Chaos</strong> physics simulates rigid bodies: gravity, collisions, friction, and forces. To make an Actor physical, enable <strong>Simulate Physics</strong> on its primitive component and make sure its mobility is <strong>Movable</strong>.</p><h4>Key physics properties</h4><table><thead><tr><th>Property</th><th>Effect</th></tr></thead><tbody><tr><td><strong>Simulate Physics</strong></td><td>Turns on the rigid-body sim for the component.</td></tr><tr><td><strong>Mass</strong></td><td>How heavy it is (affects forces).</td></tr><tr><td><strong>Linear/Angular Damping</strong></td><td>How quickly motion/spin bleeds off.</td></tr><tr><td><strong>Enable Gravity</strong></td><td>Whether it falls.</td></tr><tr><td><strong>Collision Preset</strong></td><td>What it blocks/overlaps; physics needs <em>Block</em> on relevant channels.</td></tr></tbody></table><h3>Collision must be set up right</h3><p>Physics bodies need <strong>collision geometry</strong>. Simple shapes (box/sphere/capsule) are cheap and stable; complex per-poly collision is expensive. In a Static Mesh's editor you can auto-generate simple <strong>collision primitives</strong>. For physics to push the player, the player's capsule must <strong>Block</strong> the physics object's channel and vice versa.</p><h3>Applying forces from Blueprint</h3><p>Once a component simulates physics, you can drive it:</p><ul><li><strong>Add Impulse</strong> — an instant kick (like a hit).</li><li><strong>Add Force</strong> — a continuous push (called each tick).</li><li><strong>Add Radial Impulse</strong> — an explosion radiating from a point.</li><li><strong>Set Physics Linear Velocity</strong> — directly set speed.</li></ul><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>launch-pad.bp</span></div><div class='term-body'><span class='cm'>OnComponentBeginOverlap (other = physics box)</span>\n<span class='ok'>Other.GetRootComponent -></span>\n<span class='ok'>  AddImpulse( Up * LaunchStrength )</span>\n<span class='dim'>LaunchStrength = 1500  (toggle velocity-change)</span></div></div><div class='box tip'><div class='bt'>Constraints &amp; triggers.</div> Use <strong>Physics Constraint</strong> Actors to make hinges, doors, and swings. Use <strong>Trigger volumes</strong> (a box that overlaps) to fire events — perfect for checkpoints, fall-detectors, and launch pads.</div><h3>Physics materials</h3><p>A <strong>Physical Material</strong> sets friction and restitution (bounciness). Assign one to a surface to make ice slippery or rubber bouncy. Combine with launch pads and ramps for a fun obstacle feel.</p><div class='box lab'><div class='bt'>Lab.</div> In <code>L_Sandbox</code>, drop several cubes, enable Simulate Physics on them, and stack them. Make a Blueprint that on overlap applies a radial impulse to nearby physics actors — a one-button explosion. Watch the stack scatter.</div><div class='game'><div class='game-head'>🎮 Build This: Physics Push/Obstacle Course — Tumble Run</div><div class='game-body'><p>Genre: <strong>physics push / obstacle course</strong> — a NEW genre. This <strong>STARTS a new game</strong>, reusing your Third Person Character from the early lessons as the runner.</p><ol><li>Create <code>L_Tumble</code>: a long course with gaps, ramps, and a goal at the end.</li><li>Add stacks of physics cubes the player must shove through, and rolling physics balls on ramps that knock the player back.</li><li>Build <code>BP_LaunchPad</code>: a trigger that adds an upward impulse to whatever overlaps (player capsule or physics box).</li><li>Add a <code>BP_FallVolume</code> at the bottom: if the player overlaps it, teleport them to the last checkpoint trigger they passed.</li><li>Place a goal trigger that prints \"Course Complete!\" and the elapsed time. Save. A chaotic, physics-driven obstacle run.</li></ol></div></div>"},{"id":"p3-7","part":"03 · Unreal","nav":"Level Design & Lumen","num":"3.7","kicker":"Part 03 · Lesson 7","title":"Level Design, Lighting & Lumen — Build a Time-Trial Racer","html":"<h3>From blockout to playable space</h3><p>Good levels start as <strong>greyboxing</strong>: rough geometry that nails layout and scale before any art. Unreal's <strong>Geometry Tools</strong> and basic meshes let you block out a track or arena fast. Iterate on the <em>feel</em> first; pretty comes later.</p><h4>Snapping &amp; measuring</h4><ul><li><strong>Grid snap</strong> (top-right of viewport) keeps placement clean — set it to 50 or 100 units.</li><li><strong>Rotation snap</strong> for clean angles.</li><li>Remember 100 units = 1 meter; a doorway is ~220 units tall.</li></ul><h3>Lighting basics</h3><p>Lights are Actors. The core types:</p><table><thead><tr><th>Light</th><th>Use</th></tr></thead><tbody><tr><td><strong>Directional</strong></td><td>The sun — one direction, lights everything.</td></tr><tr><td><strong>Point</strong></td><td>A bulb radiating in all directions.</td></tr><tr><td><strong>Spot</strong></td><td>A cone (flashlight, lamp).</td></tr><tr><td><strong>Sky Light</strong></td><td>Ambient light from the sky/environment.</td></tr></tbody></table><h3>Lumen — UE5's dynamic global illumination</h3><p><strong>Lumen</strong> is Unreal 5's real-time <strong>global illumination (GI)</strong> and reflection system. GI means light <em>bounces</em>: a red wall lit by the sun casts a subtle red glow onto the floor, with no baking. Lumen does this <strong>dynamically</strong> — move a light or open a door and the bounced lighting updates live. This is a huge deal: older engines required slow lightmap bakes for bounced light; Lumen makes lighting fully interactive.</p><div class='box tip'><div class='bt'>Lumen quick facts.</div> It is enabled by default in new UE5 projects (Project Settings &gt; Rendering &gt; Global Illumination = Lumen, Reflections = Lumen). It pairs with <strong>Nanite</strong> (virtualized geometry) and needs reasonably modern hardware. For your portfolio it gives near-cinematic lighting with almost no setup — just place lights and an emissive material and it bounces realistically.</div><h3>Post-process &amp; mood</h3><p>Add a <strong>Post Process Volume</strong> to control exposure, bloom, color grading, and more. Set it to <strong>Unbound</strong> to affect the whole level. Small tweaks to exposure and bloom dramatically change mood.</p><h3>Composition tips</h3><ul><li>Guide the eye with light — bright = \"go here\".</li><li>Vary height and width so spaces read clearly.</li><li>Use landmark shapes so players orient themselves.</li></ul><div class='box lab'><div class='bt'>Lab.</div> Greybox a closed-loop track with grid snapping. Add a Directional Light + Sky Light, drop a Post Process Volume (Unbound), and place an emissive-material strip along the track edge — watch Lumen bounce its glow onto the road.</div><div class='game'><div class='game-head'>🎮 Build This: Time-Trial Racer — Circuit Sprint</div><div class='game-body'><p>Genre: <strong>racing / time-trial</strong> — a NEW genre. This <strong>STARTS a new game</strong>, applying your physics (Lesson 6) to a driveable vehicle and your new level-design and Lumen skills to a track.</p><ol><li>Greybox a looping track in <code>L_Circuit</code> with start/finish and corners; light it with a Directional + Sky Light and a Post Process Volume.</li><li>Make <code>BP_Racer</code>: a physics box (or simple vehicle) the player steers with input — forward applies force, left/right applies steering torque.</li><li>Place <strong>checkpoint triggers</strong> around the loop that must be hit in order; a start/finish trigger completes a lap.</li><li>Add <code>BP_RaceGameMode</code> with a running <strong>lap timer</strong>; record and print the best lap.</li><li>Line the track edges with emissive material instances so Lumen lights the asphalt. Save. A lit, timed circuit racer.</li></ol></div></div>"},{"id":"p3-8","part":"03 · Unreal","nav":"UI (UMG)","num":"3.8","kicker":"Part 03 · Lesson 8","title":"UI with UMG — HUDs, Menus & a Wave Shooter","html":"<h3>UMG: Unreal's UI system</h3><p><strong>UMG (Unreal Motion Graphics)</strong> builds user interfaces from <strong>Widget Blueprints</strong> (prefix <code>WBP_</code>). Create one via right-click &gt; <strong>User Interface &gt; Widget Blueprint</strong>. It opens to two tabs:</p><ul><li><strong>Designer</strong> — drag-and-drop visual layout.</li><li><strong>Graph</strong> — the Blueprint logic behind the widget.</li></ul><h4>Core widgets</h4><table><thead><tr><th>Widget</th><th>Use</th></tr></thead><tbody><tr><td><strong>Text</strong></td><td>Labels, scores, timers.</td></tr><tr><td><strong>Button</strong></td><td>Clickable; fires OnClicked.</td></tr><tr><td><strong>Image</strong></td><td>Icons, backgrounds, health bars.</td></tr><tr><td><strong>Progress Bar</strong></td><td>Health, ammo, charge.</td></tr><tr><td><strong>Canvas / Vertical Box / Horizontal Box</strong></td><td>Layout containers.</td></tr></tbody></table><h3>Layout: anchors matter</h3><p>On a <strong>Canvas Panel</strong>, each widget has an <strong>anchor</strong> that pins it relative to the screen (top-left, center, stretch). Anchor a health bar to the bottom-left so it stays put on any resolution. Use <strong>Box</strong> containers for lists that auto-arrange.</p><h3>Showing a widget on screen</h3><p>From any Blueprint (often the PlayerController or HUD), <strong>Create Widget</strong> (pick the class), then <strong>Add to Viewport</strong>. To remove it, <strong>Remove from Parent</strong>. For menus, also <strong>Set Input Mode UI Only</strong> and <strong>Show Mouse Cursor</strong>; for gameplay HUD use <strong>Game Only</strong>.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>show-hud.bp</span></div><div class='term-body'><span class='cm'>Event BeginPlay (PlayerController)</span>\n<span class='ok'>CreateWidget(WBP_HUD) -> AddToViewport</span>\n<span class='dim'>store ref so we can update it later</span></div></div><h3>Binding data to the UI</h3><p>Two ways to keep a Text/ProgressBar current:</p><ol><li><strong>Property Binding</strong> — bind a Text's content to a function that returns the value (easy, runs each frame).</li><li><strong>Event-driven updates</strong> — call <em>Set Text</em> only when the value changes (more efficient). Prefer this for things that change rarely.</li></ol><div class='box tip'><div class='bt'>Menus &amp; pause.</div> A main menu is just a widget shown in a menu level with buttons that <em>Open Level</em> or <em>Quit Game</em>. A pause menu sets <strong>Game Paused</strong> true, shows a widget in UI-only input mode, and unpauses on resume.</div><div class='box lab'><div class='bt'>Lab.</div> Build <code>WBP_HUD</code> with a score Text (top-right) and a health Progress Bar (bottom-left). Add it to the viewport on BeginPlay. Update the score via an event when it changes; bind the health bar's Percent to the player's health.</div><div class='game'><div class='game-head'>🎮 Build This: Wave Shooter — Last Stand</div><div class='game-body'><p>Genre: <strong>twin-stick / wave shooter</strong> — a NEW genre. This <strong>STARTS a new game</strong>, reusing your shooting logic from the Range (Lesson 5) and dressing it with a full UMG HUD.</p><ol><li>Create <code>L_LastStand</code>: an arena with the player Pawn able to move and shoot (line trace or projectile).</li><li>Make <code>BP_Enemy</code>: a Pawn that moves toward the player; on contact it deals damage; when shot it dies and adds score.</li><li>Build <code>BP_WaveGameMode</code> that spawns escalating waves of enemies with short breaks between them.</li><li>Create <code>WBP_HUD</code> showing <strong>score</strong>, <strong>wave number</strong>, and a <strong>health bar</strong> — all bound to live data.</li><li>On death, show <code>WBP_GameOver</code> with the final score and a <strong>Restart</strong> button that reopens the level. Save. A complete arcade survival loop with real UI.</li></ol></div></div>"},{"id":"p3-9","part":"03 · Unreal","nav":"Puzzle, Packaging & Capstone","num":"3.9","kicker":"Part 03 · Lesson 9","title":"Packaging & Capstone: Ship a Polished, Portfolio-Ready Game","html":"<h3>One more genre: a physics puzzle room</h3><p>Before we package, let's prove how far Blueprint logic alone can carry a game by sketching a <strong>physics puzzle room</strong>. Puzzles are pure logic: <strong>triggers</strong>, <strong>state variables</strong>, and <strong>physics constraints</strong>. A pressure plate is a trigger that flips a boolean; a door is a Blueprint that opens when all required booleans are true; a movable physics crate is something the player shoves onto the plate. Wire these together and you have emergent puzzles with no new engine systems — just the Actors, components, physics, and Blueprint logic you already know.</p><h3>From editor to a real, shippable build</h3><p>So far you have played everything in PIE. <strong>Packaging</strong> cooks your content and compiles a standalone executable a stranger can run without Unreal installed. This is what turns a project into a <em>portfolio piece</em>.</p><h4>Pre-flight project settings</h4><ul><li><strong>Maps &amp; Modes</strong> — set <strong>Game Default Map</strong> to your menu level and a sensible <strong>Editor Startup Map</strong>.</li><li><strong>Project Description</strong> — game name, company, version, and icon/thumbnail.</li><li><strong>Supported Platforms / Target Hardware</strong> — pick Desktop + your quality target.</li><li><strong>Packaging</strong> — choose <strong>Shipping</strong> build configuration for a final release (smaller, faster, no debug overhead).</li></ul><h3>Packaging steps</h3><ol><li><strong>Platforms &gt; Windows (or Mac) &gt; Package Project</strong> from the toolbar.</li><li>Choose an output folder. Unreal <strong>cooks</strong> content (converts assets to platform format) and builds the executable.</li><li>When done, open the folder and run the <code>.exe</code> (or <code>.app</code>) — your game, standalone.</li></ol><div class='box danger'><div class='bt'>Watch out.</div> First packages are slow (cooking everything). If it fails, read the <strong>Output Log</strong> — common culprits: a missing default map, a referenced asset that fails to cook, or no platform SDK installed. Fix the first error and repeat; errors cascade.</div><h3>Polish that makes a portfolio piece</h3><ul><li><strong>Main menu</strong> — Play / Quit, game title, clean layout (UMG).</li><li><strong>Pause menu</strong> — Resume / Restart / Quit to menu.</li><li><strong>HUD</strong> — score, timer, health, objective.</li><li><strong>Audio</strong> — footsteps, pickups, music, UI clicks.</li><li><strong>Lighting</strong> — let Lumen and a Post Process Volume set the mood.</li><li><strong>Win/lose states</strong> — clear feedback and a way to replay.</li></ul><div class='box tip'><div class='bt'>Show your work.</div> Record a short gameplay clip, write a one-paragraph description (genre, what you built, what tech you used: Blueprints + C++, Lumen, physics, UMG), and keep the packaged build downloadable. That trio is your portfolio entry.</div><div class='box lab'><div class='bt'>Lab.</div> Set your Game Default Map to a menu level, choose a Shipping configuration, set the project name and icon, and package a Windows (or Mac) build. Run the standalone executable and confirm the menu, gameplay, and quit all work outside the editor.</div><div class='game'><div class='game-head'>🎮 Build This: CAPSTONE — A Polished Playable Level</div><div class='game-body'><p>Genre: <strong>your choice</strong> — including the new <strong>physics puzzle room</strong> sketched above. This is the <strong>CAPSTONE</strong>: it <strong>ASSEMBLES the skills and assets from every prior game</strong> (movement, collectibles, shooting, physics, racing, waves, puzzle logic, UI) into one finished, packaged title.</p><ol><li>Pick one genre you enjoyed most and build a single <strong>polished level</strong> around it — e.g. a physics puzzle room with crates and pressure-plate doors, a collectathon-platformer with a timed goal, or a wave-shooter arena.</li><li>Add a <strong>main menu</strong> level (<code>WBP_MainMenu</code>: Play, Quit) and set it as the Game Default Map.</li><li>Add a <strong>UMG HUD</strong> (score/health/timer) and a <strong>pause menu</strong> (Resume/Restart/Quit).</li><li>Light it with Lumen + a Post Process Volume; add sound effects and music; add clear win/lose screens with replay.</li><li>Mix <strong>C++ and Blueprints</strong>: at least one C++ base class (e.g. your collectible or enemy) with Blueprint children for tuning.</li><li><strong>Package a Shipping build</strong>, run the standalone executable end to end, and record a clip. You now have a finished, portfolio-ready Unreal game — and a whole arc of genre prototypes behind it.</li></ol></div></div>"},{"id":"p4-1","part":"04 · C++ (from scratch)","nav":"Toolchain & raylib","num":"4.1","kicker":"Part 04 · Lesson 1","title":"Your Path: C++ & raylib From Scratch","html":"<h3>Welcome to your chosen path</h3><p>You finished Foundations, and you picked the road that builds games <em>from the metal up</em>: <strong>C++ with raylib</strong> — no engine, no editor, just code, a compiler, and a tiny library that hands you a window and a render loop. This is the path the people who write engines walk. By the end you will not just have made games; you will understand what an engine actually <em>does</em>, because you will have done it yourself.</p><p>Here is the arc of games you will ship across these 8 lessons — every one in this single language and library:</p><ul><li><strong>A bouncing shape</strong> — your first window and loop (toy).</li><li><strong>Pong</strong> — your first real arcade game.</li><li><strong>Breakout</strong> — reusing paddles and collision.</li><li><strong>Snake</strong> — grid logic, a brand-new genre.</li><li><strong>Asteroids</strong> — vectors, rotation, screen wrapping.</li><li><strong>A 2D platformer</strong> — gravity, jumping, tiles.</li><li><strong>A wave-survival shooter</strong> — spawning and scaling difficulty.</li><li><strong>A polished capstone</strong> — menu, score, sound, and a packaged build you can hand to anyone.</li></ul><p>That is seven distinct genres. Let's get your tools in place.</p><h3>The three pieces of a C++ setup</h3><p>Unlike a managed runtime, C++ needs three things working together: a <strong>compiler</strong> (turns code into a native binary), a <strong>build system</strong> (orchestrates compiling and linking — we use CMake), and the <strong>library</strong> itself (raylib).</p><h4>1. Get a compiler</h4><ul><li><strong>macOS:</strong> run <code>xcode-select --install</code> to get Clang.</li><li><strong>Linux:</strong> <code>sudo apt install build-essential</code> gives you GCC.</li><li><strong>Windows:</strong> install <strong>MSYS2</strong> and use its MinGW-w64 GCC, or use Visual Studio's MSVC.</li></ul><h4>2. Get CMake</h4><p>CMake is the de-facto standard for C++ projects. Download from cmake.org or install via your package manager (<code>brew install cmake</code>, <code>sudo apt install cmake</code>).</p><h4>3. Get raylib</h4><p>raylib is a small, friendly C library for games. We will let CMake fetch it automatically so you never fight a manual install. Why raylib over the alternatives? <strong>SDL2</strong> and <strong>SFML</strong> are also excellent — SDL2 is the most battle-tested (used by commercial games), and SFML has a clean C++ API. raylib wins for learning because it has the <em>least ceremony</em>: one function opens a window, one draws a circle. Everything you learn transfers.</p><div class='box tip'><div class='bt'>Tip.</div> Stick with raylib for this whole track. Once you understand the game loop here, picking up SDL2 or SFML later is an afternoon, not a mountain.</div><h3>Project layout & CMake</h3><p>Create a folder <code>bounce/</code> with two files. Here is the <code>CMakeLists.txt</code> that fetches raylib for you:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>CMakeLists.txt</span></div><div class='term-body'><span class='cm'># minimum CMake version and project name</span>\ncmake_minimum_required(VERSION 3.16)\nproject(bounce)\n\nset(CMAKE_CXX_STANDARD 17)\n\n<span class='cm'># download raylib automatically</span>\ninclude(FetchContent)\nFetchContent_Declare(\n  raylib\n  GIT_REPOSITORY https://github.com/raysan5/raylib.git\n  GIT_TAG 5.5\n)\nFetchContent_MakeAvailable(raylib)\n\n<span class='cm'># build our executable and link raylib</span>\nadd_executable(bounce main.cpp)\ntarget_link_libraries(bounce raylib)</div></div><p>Now a minimal <code>main.cpp</code> to prove the toolchain works:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n\n<span class='am'>int</span> main() {\n    InitWindow(800, 450, <span class='ok'>\"It works!\"</span>);\n    SetTargetFPS(60);\n    <span class='cm'>// loop until the window's close button or ESC</span>\n    <span class='pr'>while</span> (!WindowShouldClose()) {\n        BeginDrawing();\n        ClearBackground(RAYWHITE);\n        DrawText(<span class='ok'>\"Toolchain alive.\"</span>, 280, 200, 24, DARKGRAY);\n        EndDrawing();\n    }\n    CloseWindow();\n    <span class='pr'>return</span> 0;\n}</div></div><h4>Build & run</h4><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>terminal</span></div><div class='term-body'><span class='cm'># from inside the bounce/ folder</span>\ncmake -B build\ncmake --build build\n<span class='cm'># run it (the binary lands in build/)</span>\n./build/bounce        <span class='cm'># Windows: build\\Debug\\bounce.exe</span></div></div><p>The first build is slow because CMake compiles raylib once; later builds are fast. A grey window with text means you are ready.</p><div class='box lab'><div class='bt'>Lab.</div> Change the window title and the text. Rebuild. Then change the window size to 1280x720 and confirm the text re-centers (it won't perfectly — note that, we'll fix centering with <code>MeasureText</code> later).</div><div class='game'><div class='game-head'>🎮 Build This: Toy — Hello Window</div><div class='game-body'><p>This <strong>STARTS the arc</strong> with a tiny toy. No genre yet — just proof your machine builds and runs native C++ games.</p><ol><li>Get the project above building and running on your machine.</li><li>Draw your name centered-ish on screen with <code>DrawText</code>.</li><li>Change <code>ClearBackground</code> to a custom color, e.g. <code>(Color){20,20,40,255}</code>, and pick a readable text color.</li><li>Commit this folder to git — it is the seed every later game grows from.</li></ol></div></div>"},{"id":"p4-2","part":"04 · C++ (from scratch)","nav":"Window & game loop","num":"4.2","kicker":"Part 04 · Lesson 2","title":"The Game Loop & Drawing a Moving Shape","html":"<h3>What a game loop actually is</h3><p>Every game, from Pong to AAA blockbusters, is the same heartbeat repeated 60 times a second: <strong>process input → update the world → draw the world</strong>. raylib gives you that loop structure with <code>WindowShouldClose()</code> and the <code>BeginDrawing()</code>/<code>EndDrawing()</code> pair. Inside is where your game lives.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.cpp</span></div><div class='term-body'><span class='pr'>while</span> (!WindowShouldClose()) {\n    <span class='cm'>// 1. INPUT   (read keyboard/mouse)</span>\n    <span class='cm'>// 2. UPDATE  (move things, check rules)</span>\n    <span class='cm'>// 3. DRAW</span>\n    BeginDrawing();\n    ClearBackground(RAYWHITE);\n    EndDrawing();\n}</div></div><p>Keeping these three phases mentally separate is the single most important habit in game programming. Mixing drawing into update logic is how codebases rot.</p><h3>Drawing primitives</h3><p>raylib draws with simple immediate-mode calls — you call them every frame; nothing persists. The essentials:</p><table><thead><tr><th>Call</th><th>Draws</th></tr></thead><tbody><tr><td><code>DrawCircle(x, y, radius, color)</code></td><td>a filled circle</td></tr><tr><td><code>DrawRectangle(x, y, w, h, color)</code></td><td>a filled rectangle</td></tr><tr><td><code>DrawLine(x1, y1, x2, y2, color)</code></td><td>a line</td></tr><tr><td><code>DrawText(text, x, y, size, color)</code></td><td>text</td></tr></tbody></table><p>Colors are structs; raylib ships constants like <code>RED</code>, <code>BLUE</code>, <code>GOLD</code>, or build your own with <code>(Color){r,g,b,a}</code>.</p><h3>Making something move</h3><p>To move a shape, store its position in variables that live <em>outside</em> the loop, then change them <em>inside</em> the loop. Here is a ball that slides right and bounces off the edges:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>main.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n\n<span class='am'>int</span> main() {\n    <span class='am'>const int</span> W = 800, H = 450;\n    InitWindow(W, H, <span class='ok'>\"Bouncing Ball\"</span>);\n    SetTargetFPS(60);\n\n    <span class='cm'>// state lives outside the loop</span>\n    <span class='am'>float</span> x = 100, y = 225;\n    <span class='am'>float</span> vx = 4, vy = 3;   <span class='cm'>// velocity per frame</span>\n    <span class='am'>const float</span> r = 25;\n\n    <span class='pr'>while</span> (!WindowShouldClose()) {\n        <span class='cm'>// UPDATE</span>\n        x += vx;  y += vy;\n        <span class='pr'>if</span> (x - r < 0 || x + r > W) vx = -vx;  <span class='cm'>// bounce X</span>\n        <span class='pr'>if</span> (y - r < 0 || y + r > H) vy = -vy;  <span class='cm'>// bounce Y</span>\n\n        <span class='cm'>// DRAW</span>\n        BeginDrawing();\n        ClearBackground(RAYWHITE);\n        DrawCircle((<span class='am'>int</span>)x, (<span class='am'>int</span>)y, r, MAROON);\n        DrawFPS(10, 10);\n        EndDrawing();\n    }\n    CloseWindow();\n    <span class='pr'>return</span> 0;\n}</div></div><p>Notice the bounce trick: when the ball touches an edge, we <em>negate</em> the velocity. That single flip reverses direction. <code>DrawFPS</code> shows your frame rate — handy while learning.</p><div class='box tip'><div class='bt'>Tip.</div> We are moving by a fixed amount per <em>frame</em> here. That means faster computers move the ball faster. In Lesson 5 we fix this properly with <strong>delta-time</strong>. For now <code>SetTargetFPS(60)</code> keeps it consistent enough.</div><h3>Centering text properly</h3><p>From last lesson — to truly center text, measure it first:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>center.cpp</span></div><div class='term-body'><span class='am'>const char</span> *msg = <span class='ok'>\"GET READY\"</span>;\n<span class='am'>int</span> fs = 40;\n<span class='am'>int</span> tw = MeasureText(msg, fs);\nDrawText(msg, (W - tw) / 2, H / 2 - fs / 2, fs, BLACK);</div></div><div class='box lab'><div class='bt'>Lab.</div> Add a second ball with different start position and velocity. Then give the maroon ball gravity: add a small constant to <code>vy</code> every frame and see it arc and settle. Remove the gravity again before the build below.</div><div class='game'><div class='game-head'>🎮 Build This: Toy — Bounce Garden</div><div class='game-body'><p>This <strong>EXTENDS</strong> your Hello Window toy — still a toy, but now alive with motion. It is the launchpad for Pong next lesson.</p><ol><li>Spawn 5 balls, each with its own <code>x, y, vx, vy</code> (use parallel arrays or 5 sets of variables).</li><li>Give each a different color.</li><li>Make them all bounce off the four walls.</li><li>Display the FPS and a centered title using <code>MeasureText</code>.</li><li>Bonus: when two specific balls' centers come within a fixed distance, flash the background — your first taste of collision, which Pong needs.</li></ol></div></div>"},{"id":"p4-3","part":"04 · C++ (from scratch)","nav":"Input → Pong","num":"4.3","kicker":"Part 04 · Lesson 3","title":"Input & Your First Game: Pong","html":"<h3>Reading the player</h3><p>A game becomes a <em>game</em> the moment the player can affect it. raylib gives you two flavors of input checks:</p><table><thead><tr><th>Function</th><th>True when…</th></tr></thead><tbody><tr><td><code>IsKeyDown(KEY_W)</code></td><td>the key is held this frame (continuous — for movement)</td></tr><tr><td><code>IsKeyPressed(KEY_SPACE)</code></td><td>the key went down <em>this</em> frame only (one-shot — for jump/fire)</td></tr><tr><td><code>IsKeyReleased(KEY_E)</code></td><td>the key came up this frame</td></tr><tr><td><code>IsMouseButtonPressed(MOUSE_BUTTON_LEFT)</code></td><td>mouse click began</td></tr><tr><td><code>GetMousePosition()</code></td><td>returns a <code>Vector2</code> of the cursor</td></tr></tbody></table><p>The distinction matters: use <code>IsKeyDown</code> to glide a paddle while a key is held; use <code>IsKeyPressed</code> for things that should happen <em>once</em> per press.</p><h3>Designing Pong</h3><p>Pong is the perfect first real game: two paddles, one ball, simple rules. The state we track: each paddle's Y, the ball's position and velocity, and two scores. Player one uses W/S, player two uses Up/Down.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>pong.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n\n<span class='am'>int</span> main() {\n    <span class='am'>const int</span> W = 800, H = 450;\n    InitWindow(W, H, <span class='ok'>\"Pong\"</span>);\n    SetTargetFPS(60);\n\n    <span class='am'>float</span> pw = 14, ph = 90, speed = 6;\n    <span class='am'>float</span> ly = H/2 - ph/2, ry = H/2 - ph/2;\n    Vector2 ball = { W/2.0f, H/2.0f };\n    Vector2 bv   = { 5, 4 };\n    <span class='am'>float</span> br = 9;\n    <span class='am'>int</span> ls = 0, rs = 0;\n\n    <span class='pr'>while</span> (!WindowShouldClose()) {\n        <span class='cm'>// INPUT (held keys -> continuous movement)</span>\n        <span class='pr'>if</span> (IsKeyDown(KEY_W)) ly -= speed;\n        <span class='pr'>if</span> (IsKeyDown(KEY_S)) ly += speed;\n        <span class='pr'>if</span> (IsKeyDown(KEY_UP))   ry -= speed;\n        <span class='pr'>if</span> (IsKeyDown(KEY_DOWN)) ry += speed;\n        <span class='cm'>// clamp paddles to screen</span>\n        <span class='pr'>if</span> (ly < 0) ly = 0; <span class='pr'>if</span> (ly > H-ph) ly = H-ph;\n        <span class='pr'>if</span> (ry < 0) ry = 0; <span class='pr'>if</span> (ry > H-ph) ry = H-ph;\n\n        <span class='cm'>// UPDATE ball</span>\n        ball.x += bv.x; ball.y += bv.y;\n        <span class='pr'>if</span> (ball.y - br < 0 || ball.y + br > H) bv.y = -bv.y;\n\n        <span class='cm'>// paddle collision (left)</span>\n        <span class='pr'>if</span> (ball.x - br < pw && ball.y > ly && ball.y < ly+ph && bv.x < 0)\n            bv.x = -bv.x;\n        <span class='cm'>// paddle collision (right)</span>\n        <span class='pr'>if</span> (ball.x + br > W-pw && ball.y > ry && ball.y < ry+ph && bv.x > 0)\n            bv.x = -bv.x;\n\n        <span class='cm'>// scoring & reset</span>\n        <span class='pr'>if</span> (ball.x < 0) { rs++; ball = {W/2.0f,H/2.0f}; bv.x = 5; }\n        <span class='pr'>if</span> (ball.x > W) { ls++; ball = {W/2.0f,H/2.0f}; bv.x = -5; }\n\n        <span class='cm'>// DRAW</span>\n        BeginDrawing();\n        ClearBackground(BLACK);\n        DrawRectangle(0, (<span class='am'>int</span>)ly, (<span class='am'>int</span>)pw, (<span class='am'>int</span>)ph, RAYWHITE);\n        DrawRectangle(W-(<span class='am'>int</span>)pw, (<span class='am'>int</span>)ry, (<span class='am'>int</span>)pw, (<span class='am'>int</span>)ph, RAYWHITE);\n        DrawCircleV(ball, br, RAYWHITE);\n        DrawText(TextFormat(<span class='ok'>\"%d\"</span>, ls), W/2-60, 20, 40, GRAY);\n        DrawText(TextFormat(<span class='ok'>\"%d\"</span>, rs), W/2+40, 20, 40, GRAY);\n        EndDrawing();\n    }\n    CloseWindow();\n    <span class='pr'>return</span> 0;\n}</div></div><p>Two things to note. <code>DrawCircleV</code> takes a <code>Vector2</code> directly — handy. <code>TextFormat</code> is raylib's safe <code>printf</code>-style string builder, perfect for scores. The paddle collision checks the ball's edge against the paddle <em>and</em> that it is moving toward the paddle (<code>bv.x &lt; 0</code>) so it can't get stuck juddering.</p><div class='box tip'><div class='bt'>Tip.</div> A great Pong feel-improvement: change the ball's vertical velocity based on <em>where</em> it hits the paddle. Hit near the top, it deflects up; near the bottom, down. Compute <code>(ball.y - (ly+ph/2)) / (ph/2)</code> for a -1..1 factor and scale into <code>bv.y</code>.</div><div class='box lab'><div class='bt'>Lab.</div> Add a win condition: first to 5 points. When reached, freeze the ball and draw a centered \"P1 WINS\" using <code>MeasureText</code> for centering. Press R to reset scores.</div><div class='game'><div class='game-head'>🎮 Build This: Arcade — Pong</div><div class='game-body'><p>This <strong>STARTS a new genre: arcade</strong>. Your first competitive game, built on the input and motion skills from the toy.</p><ol><li>Get the two-paddle Pong above running.</li><li>Add the paddle-angle deflection from the Tip so rallies get interesting.</li><li>Speed the ball up slightly each time it hits a paddle.</li><li>Add the first-to-5 win screen with a reset key.</li><li>Bonus: add a simple AI for the right paddle that tracks the ball's Y (with a small max speed so it's beatable) — now it's single-player.</li></ol></div></div>"},{"id":"p4-4","part":"04 · C++ (from scratch)","nav":"Collision → Breakout","num":"4.4","kicker":"Part 04 · Lesson 4","title":"Collision Detection & Breakout","html":"<h3>The two collision shapes you need most</h3><p>You did ad-hoc collision in Pong. Let's formalize it, because every game depends on it. The two workhorses are <strong>AABB</strong> (axis-aligned bounding box — rectangle vs rectangle) and <strong>circle</strong> (distance-based).</p><h4>AABB: rectangle overlap</h4><p>Two rectangles overlap if they overlap on <em>both</em> axes. raylib gives you this for free with <code>CheckCollisionRecs</code>, but understand the math:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>collision.cpp</span></div><div class='term-body'><span class='am'>bool</span> aabb(Rectangle a, Rectangle b) {\n    <span class='pr'>return</span> a.x < b.x + b.width  && a.x + a.width  > b.x\n        && a.y < b.y + b.height && a.y + a.height > b.y;\n}\n<span class='cm'>// raylib built-ins do the same:</span>\n<span class='cm'>// CheckCollisionRecs(a, b)</span>\n<span class='cm'>// CheckCollisionCircles(c1, r1, c2, r2)</span>\n<span class='cm'>// CheckCollisionCircleRec(center, r, rect)</span></div></div><h4>Circle vs circle</h4><p>Two circles collide when the distance between centers is less than the sum of radii. Comparing squared distances avoids a square root:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>circle.cpp</span></div><div class='term-body'><span class='am'>bool</span> circles(Vector2 a, <span class='am'>float</span> ra, Vector2 b, <span class='am'>float</span> rb) {\n    <span class='am'>float</span> dx = a.x - b.x, dy = a.y - b.y;\n    <span class='am'>float</span> rs = ra + rb;\n    <span class='pr'>return</span> dx*dx + dy*dy < rs*rs;   <span class='cm'>// no sqrt needed</span>\n}</div></div><p>For Breakout the ball is a circle and bricks are rectangles, so <code>CheckCollisionCircleRec</code> is the perfect tool.</p><h3>Breakout reuses everything you have</h3><p>Breakout is Pong's child: keep the bottom paddle, keep the bouncing ball, but replace the second player with a wall of bricks to destroy. We store bricks in a fixed grid using a 2D array of bools (alive or not).</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>breakout.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n\n<span class='am'>const int</span> W = 800, H = 600;\n<span class='am'>const int</span> COLS = 10, ROWS = 6;\n<span class='am'>const float</span> BW = 70, BH = 24, GAP = 8, TOP = 50;\n\n<span class='am'>int</span> main() {\n    InitWindow(W, H, <span class='ok'>\"Breakout\"</span>);\n    SetTargetFPS(60);\n\n    <span class='am'>bool</span> brick[ROWS][COLS];\n    <span class='pr'>for</span> (<span class='am'>int</span> r=0;r<ROWS;r++) <span class='pr'>for</span> (<span class='am'>int</span> c=0;c<COLS;c++) brick[r][c]=<span class='ok'>true</span>;\n\n    Rectangle paddle = { W/2-50, H-40, 100, 16 };\n    Vector2 ball = { W/2.0f, H/2.0f };\n    Vector2 bv   = { 4, -4 };\n    <span class='am'>float</span> br = 8;\n    <span class='am'>int</span> score = 0;\n\n    <span class='pr'>while</span> (!WindowShouldClose()) {\n        <span class='cm'>// INPUT: paddle follows arrows</span>\n        <span class='pr'>if</span> (IsKeyDown(KEY_LEFT))  paddle.x -= 8;\n        <span class='pr'>if</span> (IsKeyDown(KEY_RIGHT)) paddle.x += 8;\n        <span class='pr'>if</span> (paddle.x < 0) paddle.x = 0;\n        <span class='pr'>if</span> (paddle.x > W-paddle.width) paddle.x = W-paddle.width;\n\n        <span class='cm'>// UPDATE ball + wall bounces</span>\n        ball.x += bv.x; ball.y += bv.y;\n        <span class='pr'>if</span> (ball.x-br<0 || ball.x+br>W) bv.x=-bv.x;\n        <span class='pr'>if</span> (ball.y-br<0) bv.y=-bv.y;\n\n        <span class='cm'>// paddle bounce</span>\n        <span class='pr'>if</span> (CheckCollisionCircleRec(ball, br, paddle) && bv.y>0) {\n            bv.y = -bv.y;\n            <span class='am'>float</span> hit = (ball.x-(paddle.x+paddle.width/2))/(paddle.width/2);\n            bv.x = hit*5;   <span class='cm'>// angle off paddle</span>\n        }\n\n        <span class='cm'>// brick collisions</span>\n        <span class='pr'>for</span> (<span class='am'>int</span> r=0;r<ROWS;r++) <span class='pr'>for</span> (<span class='am'>int</span> c=0;c<COLS;c++) {\n            <span class='pr'>if</span> (!brick[r][c]) <span class='pr'>continue</span>;\n            Rectangle bk = { GAP + c*(BW+GAP), TOP + r*(BH+GAP), BW, BH };\n            <span class='pr'>if</span> (CheckCollisionCircleRec(ball, br, bk)) {\n                brick[r][c]=<span class='ok'>false</span>; bv.y=-bv.y; score+=10;\n            }\n        }\n\n        <span class='pr'>if</span> (ball.y-br>H) { ball={W/2.0f,H/2.0f}; bv={4,-4}; } <span class='cm'>// lost ball</span>\n\n        <span class='cm'>// DRAW</span>\n        BeginDrawing();\n        ClearBackground(BLACK);\n        DrawRectangleRec(paddle, RAYWHITE);\n        DrawCircleV(ball, br, RAYWHITE);\n        <span class='pr'>for</span> (<span class='am'>int</span> r=0;r<ROWS;r++) <span class='pr'>for</span> (<span class='am'>int</span> c=0;c<COLS;c++)\n            <span class='pr'>if</span> (brick[r][c])\n                DrawRectangle(GAP+c*(BW+GAP), TOP+r*(BH+GAP), BW, BH,\n                              (Color){(<span class='am'>unsigned char</span>)(40+r*30),120,200,255});\n        DrawText(TextFormat(<span class='ok'>\"Score %d\"</span>, score), 10, 10, 20, GREEN);\n        EndDrawing();\n    }\n    CloseWindow();\n    <span class='pr'>return</span> 0;\n}</div></div><div class='box danger'><div class='bt'>Watch out.</div> Our brick bounce just flips <code>bv.y</code>, which is fine for most hits but can act oddly on corner/side hits. For learning it's perfect; for polish you'd compare the ball's penetration depth on each axis and flip the smaller one.</div><div class='box lab'><div class='bt'>Lab.</div> Add a lives counter (start at 3). Losing the ball costs a life; at zero, show \"GAME OVER\". When all bricks are cleared, show \"YOU WIN\". Count remaining bricks each frame to detect the win.</div><div class='game'><div class='game-head'>🎮 Build This: Arcade — Breakout</div><div class='game-body'><p>This <strong>EXTENDS the arcade genre</strong>, directly reusing Pong's paddle and bounce logic plus your new collision toolkit.</p><ol><li>Get the brick grid + paddle + ball running.</li><li>Add lives and the win/lose screens from the Lab.</li><li>Give bricks color rows that score differently (top rows worth more).</li><li>Bonus: a brick on every 12th destroyed drops a falling \"power-up\" rectangle; catching it with the paddle widens the paddle for 10 seconds.</li></ol></div></div>"},{"id":"p4-5","part":"04 · C++ (from scratch)","nav":"Delta-time → Snake","num":"4.5","kicker":"Part 04 · Lesson 5","title":"Vectors, Delta-Time & Snake","html":"<h3>The frame-rate bug, finally fixed</h3><p>So far we moved things by a fixed amount <em>per frame</em>. On a 144 Hz monitor your ball would fly twice as fast as on a 60 Hz one. The fix is <strong>delta-time</strong>: measure how many seconds the last frame took, and multiply movement by it. Then you express speed in <em>units per second</em>, and the game runs identically everywhere.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>deltatime.cpp</span></div><div class='term-body'><span class='am'>float</span> speed = 240.0f;   <span class='cm'>// pixels PER SECOND, not per frame</span>\n<span class='pr'>while</span> (!WindowShouldClose()) {\n    <span class='am'>float</span> dt = GetFrameTime();   <span class='cm'>// seconds since last frame</span>\n    <span class='pr'>if</span> (IsKeyDown(KEY_RIGHT)) x += speed * dt;\n    ...\n}</div></div><p>At 60 FPS <code>dt</code> is about 0.0167; at 144 FPS about 0.0069. Multiply by it and the result is frame-rate independent. From now on, <strong>every movement should be scaled by <code>dt</code></strong>.</p><h3>Vectors as your movement language</h3><p>A <code>Vector2</code> bundles an x and y. raylib ships <code>raymath.h</code> with vector operations that make movement clean:</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>vectors.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raymath.h\"</span>\n\nVector2 pos = {100, 100};\nVector2 vel = {1, 0};\nvel = Vector2Scale(Vector2Normalize(vel), 200.0f); <span class='cm'>// length 200/sec</span>\npos = Vector2Add(pos, Vector2Scale(vel, dt));      <span class='cm'>// move</span>\n<span class='am'>float</span> dist = Vector2Distance(pos, target);          <span class='cm'>// handy for AI</span></div></div><p><code>Normalize</code> gives a direction of length 1; <code>Scale</code> sets its magnitude. This combo — normalize then scale by speed — is how you move toward anything at a constant pace. You'll lean on it heavily in Asteroids and the shooter.</p><h3>Snake: a new genre on a grid</h3><p>Snake is your first <strong>grid-based</strong> game and a different brain entirely. The world is a grid of cells. The snake is a list of cell coordinates. It moves on a <em>timer</em>, not continuously — every fraction of a second, the head steps one cell and the body follows. This timer pattern (accumulate <code>dt</code>, act when it crosses a threshold) is everywhere in games.</p><div class='term'><div class='term-head'><span class='dot r'></span><span class='dot y'></span><span class='dot g'></span><span class='term-title'>snake.cpp</span></div><div class='term-body'><span class='pr'>#include</span> <span class='ok'>\"raylib.h\"</span>\n<span class='pr'>#include</span> <span class='ok'>&lt;vector&gt;</span>\n\n<span class='am'>const int</span> CELL = 24, GRID = 25;\n<span class='am'>const int</span> W = CELL*GRID, H = CELL*GRID;\n\n<span class='am'>int</span> main() {\n    InitWindow(W, H, <span class='ok'>\"Snake\"</span>);\n    SetTargetFPS(60);\n\n    std::vector&lt;Vector2&gt; snake = { {12,12} };  <span class='cm'>// grid coords</span>\n    Vector2 dir = {1, 0};\n    Vector2 food = {5, 5};\n    <span class='am'>float</span> timer = 0, step = 0.12f;  <span class='cm'>// move every 0.12s</span>\n    <span class='am'>bool</span> dead = <span class='ok'>false</span>;\n\n    <span class='pr'>while</span> (!WindowShouldClose()) {\n        <span class='cm'>// INPUT (can't reverse onto yourself)</span>\n        <span class='pr'>if</span> (IsKeyPressed(KEY_UP)    && dir.y==0) dir={0,-1};\n        <span class='pr'>if</span> (IsKeyPressed(KEY_DOWN)  && dir.y==0) dir={0, 1};\n        <span class='pr'>if</span> (IsKeyPressed(KEY_LEFT)  && dir.x==0) dir={-1,0};\n        <span class='pr'>if</span> (IsKeyPressed(KEY_RIGHT) && dir.x==0) dir={ 1,0};\n\n        timer += GetFrameTime();\n        <span class='pr'>if</span> (!dead && timer >= step) {\n
